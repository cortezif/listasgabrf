 JULGAMENTO: 24/08/2023)\r\n\r\n\r\n\r\nNa hipótese, a agravante é pensionista única do falecido autor, condição que a habilitaria à percepção de todo o valor objeto do precatório. Sem embargo, ela própria limita o seu pedido ao percentual de 75% do valor. Tratando-se de direito disponível, nada impede, assim, que os 25% restantes sejam destinados aos filhos do autor falecido, exatamente como pretendido pela recorrente.\r\n\r\n\r\n\r\nAssim, diante do exposto e dos fundamentos dos precedentes transcritos, DOU PROVIMENTO ao agravo de instrumento, para reformar a decisão agravada, no sentido de retificar o percentual deferido de 50% (cinquenta por cento) para 75% (setenta e cinco por cento).\r\n\r\n\r\n\r\nÉ como voto.\r\n\r\n\r\n\r\nFIM VOTO", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\nDecide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, DAR PROVIMENTO ao agravo de instrumento, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido", "obs_assessor": "", "tem_obs_assessor": false, "assunto": "", "ramo": "Outros", "subgrupo": "", "subclasse": ""}, {"nome": "20260320_120303_Re__VOTO.0811101-48.2025.4.05.0000.VIRTUAL.09.04.2026", "nome_arq": "VOTO.0811101-48.2025.4.05.0000.VIRTUAL.09.04.2026", "cnj": "0811101-48.2025.4.05.0000", "cab": "0811101-48.2025.4.05.0000", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "FABIO ROMERO ARAGAO CORDEIRO, GILENO DE ARAUJO CORDEIRO", "adv_polo_ativo": "ANA MARIA SANTA ROSA MACEDO CORDEIRO - PB16322", "polo_passivo": "INSTITUTO NACIONAL DE COLONIZACAO E REFORMA AGRARIA RELATOR(A): Desembargador(a) Federal ROGERIO DE MENESES FIALHO MOREIRA", "adv_polo_passivo": "Não informado", "ementa": "PROCESSUAL CIVIL E CIVIL. AGRAVO DE INSTRUMENTO. EXECUÇÃO DE SENTENÇA. AÇÃO DE DESAPROPRIAÇÃO. JUSTIÇA GRATUITA. INDEFERIMENTO. PRECLUSÃO. HONORÁRIOS SUCUMBENCIAIS FIXADOS COM BASE NO § 2º, DO ART. 85 DO CPC. CABIMENTO. DEVOLUÇÃO DO EXCESSO NOS PRÓPRIOS AUTOS. QUESTÃO PREJUDICADA. PARCIAL CONHECIMENTO E IMPROVIMENTO DO RECURSO.\r\n\r\n\r\n\r\n 1. Agravo de agravo de instrumento interposto por GILENO DE ARAUJO CORDEIRO e FABIO ROMERO ARAGAO CORDEIRO contra decisão proferida pelo Juízo da 1ª Vara Federal da Seção Judiciária da Paraíba que, em cumprimento de sentença, acolheu parcialmente a impugnação apresentada pelo Instituto Nacional de Colonização e Reforma Agrária - INCRA, reconhecendo o excesso de execução, fixando o valor do crédito principal e determinando a devolução de valores tidos por pagos a maior, bem como a condenação dos exequentes em honorários advocatícios, negando a justiça gratuita aos ora agravantes, e impondo-lhes o pagamento das respectivas cotas.\r\n\r\n\r\n\r\n 2. No que se refere à alegação de hipossuficiência para efeito de obtenção da justiça gratuita, observa-se que a matéria já houvera sido oportunamente apreciada e decidida no juízo de origem, sendo reconhecido o benefício da gratuidade apenas a alguns dos exequentes, mas não aos ora agravantes. Ausente a indicação de fatos novos/supervenientes que demonstrem alteração relevante na situação econômico-financeira das partes, sobre a matéria incide a preclusão temporal.\r\n\r\n\r\n\r\n 3. No que pertine à fixação da verba honorária em 10% incidentes sobre o valor do excesso de execução, não se vislumbra ilegalidade na decisão agravada ao observar os parâmetros fixados no art. 85, § 2º, do CPC. Não se evidencia, nesta fase, quaisquer das hipóteses que autorizariam o arbitramento equitativo da verba honorária, nos termos do § 8º do art. 85 do CPC.\r\n\r\n\r\n\r\n 4. No que toca à autorização de cobrança, nos próprios autos, do excesso indevidamente recebido pelos exequentes, verifica-se que a questão foi decidida por esta Turma quando do julgamento do Agravo de Instrumento nº 0811285-04.2025.4.05.0000, ocorrido em 27/11/2025. Na ocasião, a Turma decidiu que a restituição dos valores pagos a maior na presente execução de sentença não se daria nos próprios autos, sendo necessário ajuizamento de ação autônoma para tal fim. A questão, portanto, não merece sequer ser conhecida, sendo certo que a pretensão recursal restou prejudicada quanto à mesma.\r\n\r\n\r\n\r\n 5. Agravo de instrumento conhecido em parte e, na parte conhecida, improvido.", "relatorio": "Trata-se de agravo de instrumento interposto por GILENO DE ARAUJO CORDEIRO e FABIO ROMERO ARAGAO CORDEIRO contra decisão proferida pelo Juízo da 1ª Vara Federal da Seção Judiciária da Paraíba que, em cumprimento de sentença, acolheu parcialmente a impugnação apresentada pelo Instituto Nacional de Colonização e Reforma Agrária - INCRA, reconhecendo o excesso de execução, fixando o valor do crédito principal e determinando a devolução de valores tidos por pagos a maior, bem como a condenação dos exequentes em honorários advocatícios, negando a justiça gratuita aos ora agravantes, e impondo-lhes o pagamento das respectivas cotas.\r\n\r\n\r\n\r\n Nas razões recursais, traz os seguintes argumentos: a) a condenação em honorários não observou as peculiaridades do caso, notadamente o fato de os autores buscarem reparação de desapropriação ilegal reconhecida pelo STF, não sendo litigantes voluntários. Assim, não se revela justa a decisão que impõe aos prejudicados o pagamento de honorários sucumbenciais se não havia outra forma de serem reparados se não o ajuizamento da ação de reparação de danos; b) os agravantes apresentam comprovada hipossuficiência, seja por idade avançada e enfermidades (Gileno), seja por deficiência visual e encargos familiares (Fábio), o que justificaria a concessão da gratuidade; c) a execução imediata dos valores ou a cobrança dos honorários trará risco de dano grave ou de difícil reparação, havendo também plausibilidade do direito.\r\n\r\n\r\n\r\n Indeferido o pedido de atribuição de efeito suspensivo ao recurso.\r\n\r\n\r\n\r\n Contrarrazões apresentadas.\r\n\r\n\r\n\r\n Ouvido, o Ministério Público Federal, em parecer do Procurador Regional da República Uairandyr Tenório de Oliveira, opinou pelo improvimento do recurso (Id. 3259331).\r\n\r\n\r\n\r\n É o relatório.", "voto": "A decisão agravada acolheu parcialmente a impugnação apresentada pelo Instituto Nacional de Colonização e Reforma Agrária - INCRA, reconhecendo o excesso de execução, fixando o valor do crédito principal e determinando a devolução de valores tidos por pagos a maior, bem como a condenação dos exequentes em honorários advocatícios, negando a justiça gratuita aos ora agravantes, e impondo-lhes o pagamento das respectivas cotas.\r\n\r\n\r\n\r\n No que se refere à alegação de hipossuficiência para efeito de obtenção da justiça gratuita, observa-se que a matéria já houvera sido oportunamente apreciada e decidida no juízo de origem, sendo reconhecido o benefício da gratuidade apenas a alguns dos exequentes, mas não aos ora agravantes.\r\n\r\n\r\n\r\n Como consignado no parecer da PRR5, “a questão da hipossuficiência dos agravantes se tornou preclusa, pois a decisão que a analisou não foi contestada no momento oportuno, consoante o disposto no Código de Processo Civil, em seu artigo 507, que proíbe a rediscussão de questões já decididas no curso do processo”.\r\n\r\n\r\n\r\n Tem-se que, ausente a indicação de fatos novos/supervenientes que demonstrem alteração relevante na situação econômico-financeira das partes, sobre a matéria incide a preclusão temporal.\r\n\r\n\r\n\r\n Por sua vez, no que pertine à fixação da verba honorária em 10% incidentes sobre o valor do excesso de execução, não se vislumbra ilegalidade na decisão agravada ao observar os parâmetros fixados no art. 85, § 2º, do CPC. Não se evidencia, nesta fase, quaisquer das hipóteses que autorizariam o arbitramento equitativo da verba honorária, nos termos do § 8º do art. 85 do CPC.\r\n\r\n\r\n\r\n Por fim, no que toca à autorização de cobrança, nos próprios autos, do excesso indevidamente recebido pelos exequentes, verifico que a questão foi decidida por esta Turma quando do julgamento do Agravo de Instrumento nº 0811285-04.2025.4.05.0000, ocorrido em 27/11/2025. Na ocasião, a Turma decidiu que a restituição dos valores pagos a maior na presente execução de sentença não se dará nos próprios autos, sendo necessário ajuizamento de ação autônoma para tal fim.\r\n\r\n\r\n\r\n A questão, portanto, não merece sequer ser conhecida, sendo certo que a pretensão recursal restou prejudicada quanto à mesma.\r\n\r\n\r\n\r\n Posto isso, CONHEÇO EM PARTE DO AGRAVO DE INSTRUMENTO E, NA PARTE CONHECIDA, NEGO-LHE PROVIMENTO.\r\n\r\n\r\n\r\n É como voto.", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\n Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, CONHECER EM PARTE DO AGRAVO DE INSTRUMENTO E, NA PARTE CONHECIDA, NEGAR-LHE PROVIMENTO, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Resultado não identificado", "css": "outro", "obs_assessor": "﻿", "tem_obs_assessor": false, "assunto": "", "ramo": "Outros", "subgrupo": "", "subclasse": ""}, {"nome": "20260320_120444_Re__VOTO.0037985-88.2025.4.05.8200.VIRTUAL.09.04.2026", "nome_arq": "VOTO.0037985-88.2025.4.05.8200.VIRTUAL.09.04.2026", "cnj": "0037985-88.2025.4.05.8200", "cab": "0037985-88.2025.4.05.8200", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "UNIVERSIDADE FEDERAL DA PARAIBA", "adv_polo_ativo": "JOSE MARCIO ANSELMO DA SILVA - CE11534", "polo_passivo": "MARIA DE JESUS REIS BEZERRA", "adv_polo_passivo": "DIRCEU GALDINO BARBOSA DUARTE - PB13663\r\n, TALISSA ESTEFANIA TOMAZ TOMIYOSHI - PB20908", "ementa": "PROCESSUAL CIVIL E CIVIL. AGRAVO DE INSTRUMENTO. EXECUÇÃO DE SENTENÇA. HABILITAÇÃO DE SUCESSORES. PRESCRIÇÃO. INOCORRÊNCIA. PRECEDENTES. IMPROVIMENTO.\r\n\r\n\r\n\r\n 1. Agravo de instrumento interposto pela UNIVERSIDADE FEDERAL DA PARAÍBA - UFPB contra decisão proferida pelo Juízo da 3ª Vara Federal da Seção Judiciária da Paraíba que, afastando a prescrição, deferiu o pedido de habilitação dos herdeiros.\r\n\r\n\r\n\r\n 2. “Nos termos da jurisprudência do STJ e desta Corte, ressalvado entendimento diverso da 2ª Turma, a morte de uma das partes suspende imediatamente o processo (art. 313, I, do CPC) e, ante a ausência de prazo para habilitação dos sucessores, não há que se falar em prescrição da pretensão executória até o momento do pedido de habilitação dos herdeiros.” (PROCESSO: 08121388620204050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL FERNANDO BRAGA DAMASCENO, 3ª TURMA, JULGAMENTO: 29/04/2021).\r\n\r\n\r\n\r\n 3. A suspensão do processo, nos termos dos arts. 265, I, do CPC/1973 e 313, I, do CPC/2015, tem por objetivo proteger os interesses do falecido, de modo que poderão ser anulados os atos que causem prejuízo aos sucessores. (REsp n. 1.844.121/AL, relator Ministro Og Fernandes, Segunda Turma, julgado em 22/9/2020, DJe de 9/10/2020).\r\n\r\n\r\n\r\n 4. Não é hipótese de sobrestamento do feito, tendo em vista que o STJ, ao decidir pela afetação da questão referente à prescrição ou não da habilitação de herdeiros ou sucessores da parte falecida no curso da ação (Tema 1.254), foi claro ao determinar a suspensão do processamento apenas dos processos, individuais ou coletivos que versem sobre a mesma matéria, e nos quais tenha havido a interposição de recurso especial ou de agravo em recurso especial, na Segunda Instância, ou que estejam em tramitação no STJ, o que não é a situação dos autos.\r\n\r\n\r\n\r\n 5. Agravo de instrumento improvido.", "relatorio": "Trata-se de agravo de instrumento interposto pela UNIVERSIDADE FEDERAL DA PARAÍBA - UFPB contra decisão proferida pelo Juízo da 3ª Vara Federal da Seção Judiciária da Paraíba que, afastando a prescrição, deferiu o pedido de habilitação dos herdeiros.\r\n\r\n\r\n\r\n Nas razões recursais, traz os seguintes argumentos: a) a habilitação não pode ser admitida, uma vez que está sujeita a prazo prescricional; b) o falecimento do servidor autor da ação judicial ocorreu em 05/07/2005, ao passo que o pedido de habilitação somente foi formulado em 27/01/2025, mais de 05 anos após o óbito; c) se o direito de ação da parte autora para pleitear seu crédito prescreve em 5 (cinco) anos, a execução da parte sucessora também prescreverá no mesmo período; d) em que pese a legislação não fixar prazo para suspensão do processo ou mesmo habilitação dos herdeiros, não se pode concluir que o processo ficará indefinidamente à espera da iniciativa dos herdeiros; e) a necessidade de sobrestamento do feito até a ulterior decisão pela Corte Superior (Tema 1254); f) a manutenção da decisão agravada tem o condão de produzir grave lesão aos cofres públicos, sobretudo porque, diante da natureza alimentar da verba discutida, eventuais valores pagos serão considerados irrestituíveis.\r\n\r\n\r\n\r\n Indeferido o pedido de atribuição de efeito suspensivo ao recurso.\r\n\r\n\r\n\r\n Sem contrarrazões.\r\n\r\n\r\n\r\n É o relatório.", "voto": "No que toca à prescrição da pretensão de habilitação dos sucessores, observo que a decisão agravada se encontra em harmonia com o entendimento do eg. Superior Tribunal de Justiça, conforme se verifica a partir dos seguintes julgados:\r\n\r\n\r\n\r\n PROCESSUAL CIVIL. RECURSO ESPECIAL. EXECUÇÃO DE SENTENÇA. PRESCRIÇÃO. NÃO OCORRÊNCIA.\r\n\r\n\r\n\r\n 1. Segundo a jurisprudência do STJ, a morte de uma das partes, inclusive no curso da execução, implica a suspensão do processo, razão pela qual, na ausência de previsão legal que imponha prazo para a habilitação dos respectivos sucessores, não há que falar em prescrição. Ocorrendo o óbito do participante da relação processual, impõe-se a suspensão do feito, nos termos do art. 265, I, do Código Processual Civil/1973 (art. 313, I, do CPC/2015), até que se promova a habilitação.\r\n\r\n\r\n\r\n 2. Agravo interno desprovido. (AgInt no REsp n. 2.102.691/RJ, relator Ministro Gurgel de Faria, Primeira Turma, julgado em 26/2/2024, DJe de 6/3/2024.)\r\n\r\n\r\n\r\n PROCESSUAL CIVIL. AGRAVO INTERNO NO RECURSO ESPECIAL. CÓDIGO DE PROCESSO CIVIL DE 2015. APLICABILIDADE. VIOLAÇÃO AOS ARTS. 489 E 1.022 DO CPC. INOCORRÊNCIA. SERVIDOR FALECIDO ANTES DO AJUIZAMENTO DA EXECUÇÃO COLETIVA. SINDICATO. SUBSTITUTO PROCESSUAL. ILEGITIMIDADE. ARGUMENTOS INSUFICIENTES PARA DESCONSTITUIR A DECISÃO ATACADA. APLICAÇÃO DE MULTA. ART. 1.021, § 4º, DO CÓDIGO DE PROCESSO CIVIL DE 2015. DESCABIMENTO.\r\n\r\n\r\n\r\n I - Consoante o decidido pelo Plenário desta Corte na sessão realizada em 09.03.2016, o regime recursal será determinado pela data da publicação do provimento jurisdicional impugnado. In casu, aplica-se o Código de Processo Civil de 2015.\r\n\r\n\r\n\r\n II - A Corte de origem apreciou todas as questões relevantes apresentadas com fundamentos suficientes, mediante apreciação da disciplina normativa e cotejo ao posicionamento jurisprudencial aplicável à hipótese. Inexistência de omissão, contradição ou obscuridade.\r\n\r\n\r\n\r\n III - Pacífica a orientação desta Corte segundo a qual o falecimento do servidor público, apenas quando ocorrido após o início do processo de conhecimento, autoriza a habilitação de seus sucessores, sendo válidos os atos processuais praticados, salvo comprovada má-fé, não ocorrendo, ademais, a prescrição da pretensão executória, por ausência de previsão legal.\r\n\r\n\r\n\r\n IV - Não apresentação de argumentos suficientes para desconstituir a decisão recorrida.\r\n\r\n\r\n\r\n V - Em regra, descabe a imposição da multa, prevista no art. 1.021, § 4º, do Código de Processo Civil de 2015, em razão do mero improvimento do Agravo Interno em votação unânime, sendo necessária a configuração da manifesta inadmissibilidade ou improcedência do recurso a autorizar sua aplicação, o que não ocorreu no caso.\r\n\r\n\r\n\r\n VI - Agravo Interno improvido.(AgInt no REsp n. 2.104.535/PR, relatora Ministra Regina Helena Costa, Primeira Turma, julgado em 17/6/2024, DJe de 20/6/2024.)\r\n\r\n\r\n\r\n PROCESSUAL CIVIL. OFENSA AO ART. 1.022 DO CPC/2015 NÃO CARACTERIZADA. SERVIDOR PÚBLICO. AÇÃO COLETIVA. EXECUÇÃO INDIVIDUAL. SINDICATO. LEGITIMIDADE.\r\n\r\n\r\n\r\n 1. Constata-se que não se configura a ofensa ao art. 1.022 do Código de Processo Civil/2015, uma vez que o Tribunal de origem julgou integralmente a lide e solucionou a controvérsia, tal como lhe foi apresentada.\r\n\r\n\r\n\r\n 2. O acórdão recorrido está em consonância com a orientação desta Corte segundo a qual o falecimento do servidor público, em momento anterior ao processo de execução, autoriza a habilitação de seus sucessores, sendo válidos os atos processuais praticados, salvo comprovada má-fé, não ocorrendo, ademais, a prescrição da pretensão executória, por ausência de previsão legal.\r\n\r\n\r\n\r\n 3. Agravo Interno não provido. (AgInt no REsp n. 2.006.863/AL, relator Ministro Herman Benjamin, Segunda Turma, julgado em 15/12/2022, DJe de 19/12/2022.)\r\n\r\n\r\n\r\n De fato, \"nos termos da jurisprudência do STJ e desta Corte, ressalvado entendimento diverso da 2ª Turma, a morte de uma das partes suspende imediatamente o processo (art. 313, I, do CPC) e, ante a ausência de prazo para habilitação dos sucessores, não há que se falar em prescrição da pretensão executória até o momento do pedido de habilitação dos herdeiros.\" (PROCESSO: 08121388620204050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL FERNANDO BRAGA DAMASCENO, 3ª TURMA, JULGAMENTO: 29/04/2021).\r\n\r\n\r\n\r\n A suspensão do processo, de acordo com os arts. 265, I, do CPC/1973 e 313, I, do CPC/2015, tem por objetivo proteger os interesses do falecido, de modo que poderão ser anulados os atos que causem prejuízo aos sucessores. (REsp n. 1.844.121/AL, relator Ministro Og Fernandes, Segunda Turma, julgado em 22/9/2020, DJe de 9/10/2020.).\r\n\r\n\r\n\r\n Não é hipótese de sobrestamento do feito, tendo em vista que o STJ, ao decidir pela afetação da questão referente à prescrição ou não da habilitação de herdeiros ou sucessores da parte falecida no curso da ação (Tema 1.254), foi claro ao determinar a suspensão do processamento apenas dos processos, individuais ou coletivos que versem sobre a mesma matéria, e nos quais tenha havido a interposição de recurso especial ou de agravo em recurso especial, na Segunda Instância, ou que estejam em tramitação no STJ, o que não é a situação dos autos.\r\n\r\n\r\n\r\n Posto isso, NEGO PROVIMENTO ao agravo de instrumento.\r\n\r\n\r\n\r\n É como voto.", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\n Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO ao agravo de instrumento, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido", "obs_assessor": "﻿", "tem_obs_assessor": false, "assunto": "", "ramo": "Outros", "subgrupo": "", "subclasse": ""}, {"nome": "20260320_120517_Re__VOTO.0800121-68.2025.4.05.8204.VIRTUAL.09.04.2026", "nome_arq": "VOTO.0800121-68.2025.4.05.8204.VIRTUAL.09.04.2026", "cnj": "0800121-68.2025.4.05.8204", "cab": "0800121-68.2025.4.05.8204", "assessor": "Ariel C. Santana", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "ARABELA VIEIRA CLEMENTINO", "adv_polo_ativo": "FLAVIO ANDRE ALVES BRITTO - PB21661", "polo_passivo": "EMPRESA BRASILEIRA DE SERVICOS HOSPITALARES - EBSERH", "adv_polo_passivo": "PAULA CECILIA RODRIGUES DE SOUZA - MG205663\r\n, MONICA PORTO CARDOSO - SE10817", "ementa": "ADMINISTRATIVO. AGRAVO INTERNO. TEMA 784/STF. CONCURSO PÚBLICO. EBSERH. NUTRICIONISTA. CANDIDATA APROVADA FORA DO NÚMERO DE VAGAS OFERTADAS. PRETERIÇÃO. NÃO CONFIGURADA. AUSÊNCIA DE DIREITO SUBJETIVO A NOMEAÇÃO. AGRAVO INTERNO IMPROVIDO.\r\n\r\n\r\n\r\n 1. Agravo interno interposto por ARABELA VIEIRA CLEMENTINO em face de decisão que negou provimento ao Recurso de Apelação por ela interposto para aplicar o entendimento firmado pelo STF no julgamento do Tema 784, no qual restou consolidado que o surgimento de novas vagas ou a abertura de novo concurso para o mesmo cargo, durante o prazo de validade do certame anterior, não gera automaticamente o direito à nomeação dos candidatos aprovados fora das vagas previstas no edital, ressalvadas as hipóteses de preterição arbitrária e imotivada por parte da administração.\r\n\r\n\r\n\r\n 2. A agravante requer a reforma da decisão agravada sob os seguintes argumentos: a) ainda que se admita a aplicação indistinta da tese fixada pelo STF no Tema 784 aos concursos públicos que preveem tanto vagas imediatas quanto formação de cadastro de reserva, é imprescindível observar a ressalva quanto às hipóteses de preterição arbitrária e imotivada por parte da Administração; b) restou demonstrada a preterição da agravante para o cargo de nutricionista na unidade hospitalar, vez que este está sendo suprido por meio diverso da nomeação de candidatos regularmente aprovados; c) embora a Administração Pública detenha discricionariedade na condução de seus atos, tal prerrogativa não é absoluta, devendo ser exercida em estrita observância aos princípios da legalidade, impessoalidade, moralidade, publicidade e eficiência; d) no art. 37, II, da CF/88, foi definido que a investidura em cargo público depende da aprovação prévia em concurso público, salvo as hipóteses constitucionalmente previstas, de modo que, durante o prazo de validade do certame, o candidato aprovado em concurso público terá prioridade de convocação.\r\n\r\n\r\n\r\n 3. Não se verifica, no caso concreto, qualquer distinção relevante que permita afastar a aplicação do precedente vinculante firmado pelo STF. Conforme assentado na decisão agravada, a mera aprovação em cadastro de reserva, ainda que em primeiro lugar, não gera automaticamente o direito à nomeação dos candidatos aprovados fora das vagas previstas no edital, inexistindo demonstração de preterição ou de contratação irregular que pudesse ilidir tal conclusão.\r\n\r\n\r\n\r\n 4. Destacou-se que a realização de novo concurso para a formação de Cadastro de Reserva não comprova, por si só, a existência de vagas, tendo em vista que a abertura de novo concurso antes da expiração do certame anterior apenas indica a precaução da autoridade administrativa em não ficar sem a referida reserva de candidatos aprovados para que, sendo criadas novas vagas, possam ser imediatamente chamados.\r\n\r\n\r\n\r\n 5. Tratando-se de decisão fundada em precedente vinculante, a impugnação deve se limitar à demonstração da distinção entre o paradigma e o caso concreto, o que não ocorreu. A agravante, porém, limitou-se a reiterar fundamentos já apreciados, sem indicar situação excepcional apta a afastar a tese firmada pelo Supremo Tribunal Federal.\r\n\r\n\r\n\r\n 6. A decisão agravada encontra-se em conformidade com o entendimento firmado no julgamento do repetitivo, devendo ser mantida em sua integralidade.\r\n\r\n\r\n\r\n 7. Agravo interno improvido.", "relatorio": "Trata-se de agravo interno interposto por ARABELA VIEIRA CLEMENTINO em face de decisão que negou provimento ao Recurso de Apelação por ela interposto para aplicar o entendimento firmado pelo STF no julgamento do Tema 784, no qual restou consolidado que o surgimento de novas vagas ou a abertura de novo concurso para o mesmo cargo, durante o prazo de validade do certame anterior, não gera automaticamente o direito à nomeação dos candidatos aprovados fora das vagas previstas no edital, ressalvadas as hipóteses de preterição arbitrária e imotivada por parte da administração.\r\n\r\n\r\n\r\n A agravante requer a reforma da decisão agravada sob os seguintes argumentos: a) ainda que se admita a aplicação indistinta da tese fixada pelo STF no Tema 784 aos concursos públicos que preveem tanto vagas imediatas quanto formação de cadastro de reserva, é imprescindível observar a ressalva quanto às hipóteses de preterição arbitrária e imotivada por parte da Administração; b) restou demonstrada a preterição da agravante para o cargo de nutricionista na unidade hospitalar, vez que este está sendo suprido por meio diverso da nomeação de candidatos regularmente aprovados; c) embora a Administração Pública detenha discricionariedade na condução de seus atos, tal prerrogativa não é absoluta, devendo ser exercida em estrita observância aos princípios da legalidade, impessoalidade, moralidade, publicidade e eficiência; d) no art. 37, II, da CF/88, foi definido que a investidura em cargo público depende da aprovação prévia em concurso público, salvo as hipóteses constitucionalmente previstas, de modo que, durante o prazo de validade do certame, o candidato aprovado em concurso público terá prioridade de convocação.\r\n\r\n\r\n\r\n Sem contrarrazões.\r\n\r\n\r\n\r\n É o relatório.", "voto": "A decisão agravada findou por negar provimento ao apelo do particular para, aplicando o entendimento firmado pelo STF no julgamento do Tema 784, reconhecer que, não tendo a candidata sido aprovada dentro do número de vagas previsto no edital, sua inclusão em cadastro de reserva não lhe confere direito subjetivo à nomeação, mas apenas mera expectativa de direito.\r\n\r\n\r\n\r\n Em que pese o esforço argumentativo da recorrente, não se verifica, no caso concreto, qualquer distinção relevante que permita afastar a aplicação do precedente vinculante firmado pelo STF. Conforme assentado na decisão agravada, a mera aprovação em cadastro de reserva, ainda que em primeiro lugar, não gera automaticamente o direito à nomeação dos candidatos aprovados fora das vagas previstas no edital, inexistindo demonstração de preterição ou de contratação irregular que pudesse ilidir tal conclusão.\r\n\r\n\r\n\r\n Destacou-se, ainda, que a realização de novo concurso para a formação de Cadastro de Reserva não comprova, por si só, a existência de vagas, tendo em vista que a abertura de novo concurso antes da expiração do certame anterior apenas indica a precaução da autoridade administrativa em não ficar sem a referida reserva de candidatos aprovados para que, sendo criadas novas vagas, possam ser imediatamente chamados.\r\n\r\n\r\n\r\n Ressalte-se, por fim, que se tratando de decisão fundada em precedente vinculante, a impugnação deve se limitar à demonstração da distinção entre o paradigma e o caso concreto, o que não ocorreu. A agravante, porém, limitou-se a reiterar fundamentos já apreciados, sem indicar situação excepcional apta a afastar a tese firmada pelo Supremo Tribunal Federal.\r\n\r\n\r\n\r\n É possível observar, portanto, que a decisão agravada encontra-se em conformidade com o entendimento firmado no julgamento do repetitivo, devendo ser mantida em sua integralidade.\r\n\r\n\r\n\r\n Ante o exposto, NEGO PROVIMENTO ao agravo interno.\r\n\r\n\r\n\r\n É como voto.", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\n Decide a 3ª Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO ao Agravo Interno, nos termos do voto do relator e na forma do relatório constante dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido", "obs_assessor": "﻿\r\n\r\n Minuta revisada por Evellyn Barbosa\r\n\r\n Att.,\r\n\r\n Ariel Campos\r\n\r\n Residente Jurídica\r\n\r\nPoder Judiciário\r\n\r\n Tribunal Regional Federal da 5ª Região\r\n\r\n Gabinete do Desembargador Federal Rogério Fialho Moreira", "tem_obs_assessor": true, "assunto": "", "ramo": "Administrativo", "subgrupo": "Apelação/Remessa Necessária", "subclasse": "Agravo Interno"}, {"nome": "20260320_120644_Re__VOTO.0025897-15.2025.4.05.8201.VIRTUAL.09.04.2026", "nome_arq": "VOTO.0025897-15.2025.4.05.8201.VIRTUAL.09.04.2026", "cnj": "0025897-15.2025.4.05.8201", "cab": "0025897-15.2025.4.05.8201", "assessor": "Gabriel Santos Aquino De Oliveira", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "HAMILTON CARVALHO DE FREITAS", "adv_polo_ativo": "KALINY MARIA VISSOTO RIBEIRO - PB28703", "polo_passivo": "UNIAO FEDERAL", "adv_polo_passivo": "Não informado", "ementa": "ADMINISTRATIVO E PROCESSUAL CIVIL. APELAÇÃO CÍVEL. PROCESSO SELETIVO DE RESIDÊNCIA MÉDICA. BONIFICAÇÃO DE 10% (DEZ POR CENTO). PROGRAMA MAIS MÉDICOS PELO BRASIL (PMMB) E PROVAB. BONIFICAÇÃO DE 10%. DIREITO À PONTUAÇÃO ADICIONAL. LEI Nº 12.871/2013. DISPOSITIVO LEGAL REVOGADO. SEGURANÇA JURÍDICA. MANUTENÇÃO DOS EFEITOS. REQUISITOS PREENCHIDOS ANTES DA REVOGAÇÃO. RECURSO PROVIDO.\r\n\r\n\r\n\r\n 1. Recurso de Apelação interposto por HAMILTON CARVALHO DE FREITAS em face de sentença proferida pelo Juízo da 4ª Vara Federal da Seção Judiciária da Paraíba que denegou a segurança para que seja assegurada a inclusão do nome do impetrante na lista de candidatos aptos a utilizarem a bonificação de 10% da nota em todas as etapas dos processos seletivos de residência médica pela participação no Programa Mais Médicos pelo Brasil.\r\n\r\n\r\n\r\n 2. Ressalvado o entendimento pessoal do Relator, no sentido de que benefício pretendido é extensível tão somente para os candidatos egressos do PROVAB e do PRMGFC, motivo pelo qual a Apelante, integrante do PMMB, não faria jus à bonificação de 10% (dez por cento) na nota da prova da residência médica, a hipótese é de se privilegiar o entendimento colegiado firmado por esta eg. Terceira Turma.\r\n\r\n\r\n\r\n 3. A referida bonificação tem origem na Lei nº 12871/2013, que instituiu o Programa Mais Médicos e previu, no seu art. 22, pontuação adicional de 10% (dez por cento) na nota de todas as fases ou da fase única do processo de seleção pública dos Programas de Residência Médica, desde que realizado o programa em 1 (um) ano, nas ações de aperfeiçoamento na área de Atenção Básica em saúde em regiões prioritárias para o SUS, voltadas especificamente para os médicos formados em instituições de educação superior brasileiras ou com diploma revalidado, serão desenvolvidas por meio de projetos e programas dos Ministérios da Saúde e da Educação.\r\n\r\n\r\n\r\n 4. Consoante jurisprudência que se colhe deste Regional, em caso análogo ao presente, \"conquanto a norma editalícia possua status de lei entre as partes envolvidas no certame, ela não pode contrariar norma legal. Ainda que a questão controvertida tenha sido omissa no instrumento convocatório, como ocorreu no caso em análise, os ditames legais devem ser obedecidos. Precedente: (...) PROCESSO: 08009307620184050000, AG - Agravo de Instrumento, DESEMBARGADOR FEDERAL LEONARDO CARVALHO, 2ª Turma, JULGAMENTO: 18/12/2018\". \"Conclui-se que a omissão no corpo do edital não exclui a bonificação, eis que prevista em lei, vigente, de hierarquia superior àquela que se fundou o edital, no caso a Resolução nº 2/2015, do Conselho Nacional de Residência Médica.\" (TRF5 - Processo 0815065-77.2017.4.05.8100, Apelação Cível, Rel. Desembargador Federal Leonardo Henrique de Cavalcante Carvalho, 2ª Turma, Julgamento: 01/09/2020).\r\n\r\n\r\n\r\n 5. O Poder Judiciário não está substituindo a Banca Examinadora do Certame, na medida em que seu exame está restrito ao controle da legalidade do ato Administrativo, diante da inobservância dos preceitos da Lei nº 12871/2013, que estabeleceu apenas 2 (dois) requisitos para que o candidato obtenha a bonificação de 10% (dez por cento) na nota de todas as fases ou da fase única do processo de seleção pública dos Programas de Residência Médica, quais sejam: a) participação e cumprimento integral de ações na área de Atenção Básica em saúde em regiões prioritárias para o SUS; e b) realização do Programa em 1 (um) ano.\r\n\r\n\r\n\r\n 6. Precedentes desta Terceira Turma:  PROCESSO: 08000411420244058504, APELAÇÃO / REMESSA NECESSÁRIA, DESEMBARGADOR FEDERAL LUIZ BISPO DA SILVA NETO (CONVOCADO), 3ª TURMA, JULGAMENTO: 17/10/2024; PROCESSO: 0002570-06.2025.4.05.0000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL CID MARCONI, 3ª TURMA, JULGAMENTO: 02/10/2025.\r\n\r\n\r\n\r\n 7. Apesar de a Lei 15.233/25, de 07/10/25, ter revogado o trecho que prévia o acréscimo de 10% nas notas dos processos seletivos de residência médica para quem tivesse atuação por pelo menos 1 ano em programas relacionados à Atenção Básica, dada a necessidade de preservar a segurança jurídica, tal norma deve se restringir aos interessados que ainda não tenham completado 1 ano até 08/10/2025.\r\n\r\n\r\n\r\n 8. Constatado que o Apelante preenchia os requisitos legais previstos no dispositivo então vigente à época da publicação da Chamada Pública de Seleção nº 10/2025, destinada ao processo seletivo simplificado para residência médica da Secretaria Municipal de João Pessoa, publicada em 12 de setembro de 2025, impõe-se a concessão da segurança pleiteada.\r\n\r\n\r\n\r\n 9. Apelação provida para, reformando a sentença, conceder a segurança pleiteada. Sem condenação em honorários sucumbenciais (art. 25, Lei nº. 12.016/2009).", "relatorio": "Trata-se de Recurso de Apelação interposto por HAMILTON CARVALHO DE FREITAS em face de sentença proferida pelo Juízo da 4ª Vara Federal da Seção Judiciária da Paraíba que denegou a segurança para que seja assegurada a inclusão do nome do impetrante na lista de candidatos aptos a utilizarem a bonificação de 10% da nota em todas as etapas dos processos seletivos de residência médica pela participação no Programa Mais Médicos pelo Brasil.\r\n\r\n\r\n\r\n Em síntese, o Apelante alega que: a) o juízo de 1º grau denegou o pleito de inclusão do nome do apelante na lista de candidatos aptos à utilização da bonificação prevista no art. 22 da Lei 12.871/13 por entender que o dispositivo legal não se destina a todos os participantes do Projeto Mais Médicos, mas sim aos egressos do Projeto Mais Médicos para o Brasil que tenham realizado formação (especialização ou residência) em atenção básica ou medicina da família, como o PROVAB e/ou o Programa de Residência Médica; b) a interpretação dada pelo juízo não se adequa à finalidade social da legislação, e não observa a obrigatoriedade que o próprio programa apresenta em relação ao curso de especialização em medicina da família e comunidade e, nesse ponto, convém ressaltar que TODOS os médicos participantes do programa Mais Médicos devem cursar a Especialização em Medicina de Família e Comunidade; c) Lei nº 12.871/2013, em seu art. 22, §2º, é clara ao instituir que o médico participante das ações de aperfeiçoamento na Atenção Básica em regiões prioritárias para o SUS “fará jus à pontuação adicional de 10%” nas notas de todas as fases dos processos seletivos de residência médica, sem condicionar a bonificação ao PROVAB e sem diferenciar programas; d) precedentes favoráveis do TRF da 1ª Região.\r\n\r\n\r\n\r\n Contrarrazões apresentadas pela União Federal.\r\n\r\n\r\n\r\n É o relatório.", "voto": "De início, recebo a apelação, considerando presentes os pressupostos recursais intrínsecos (cabimento, legitimação, interesse e inexistência de fato impeditivo ou extintivo do direito de recorrer) e extrínsecos (preparo, tempestividade e regularidade formal) para a admissibilidade do recurso.\r\n\r\n\r\n\r\n Ressalvado o entendimento pessoal do Relator, no sentido de que benefício pretendido é extensível tão somente para os candidatos egressos do PROVAB e do PRMGFC, motivo pelo qual a Apelante, integrante do PMMB, não faria jus à bonificação de 10% (dez por cento) na nota da prova da residência médica, a hipótese é de se privilegiar o entendimento colegiado firmado por esta eg. Terceira Turma.\r\n\r\n\r\n\r\n A referida bonificação tem origem na Lei nº 12871/2013, que instituiu o Programa Mais Médicos e previu, no seu art. 22, o seguinte:\r\n\r\n\r\n\r\n \"Art. 22. As demais ações de aperfeiçoamento na área de Atenção Básica em saúde em regiões prioritárias para o SUS, voltadas especificamente para os médicos formados em instituições de educação superior brasileiras ou com diploma revalidado, serão desenvolvidas por meio de projetos e programas dos Ministérios da Saúde e da Educação.\r\n\r\n\r\n\r\n (...)\r\n\r\n\r\n\r\n 2º O candidato que tiver participado das ações previstas no caput deste artigo e tiver cumprido integralmente aquelas ações, desde que realizado o programa em 1 (um) ano, receberá pontuação adicional de 10% (dez por cento) na nota de todas as fases ou da fase única do processo de seleção pública dos Programas de Residência Médica a que se refere o art. 2º da Lei no 6.932, de 1981.\"\r\n\r\n\r\n\r\n Ademais, consoante jurisprudência que se colhe deste Regional, em caso análogo ao presente, \"conquanto a norma editalícia possua status de lei entre as partes envolvidas no certame, ela não pode contrariar norma legal. Ainda que a questão controvertida tenha sido omissa no instrumento convocatório, como ocorreu no caso em análise, os ditames legais devem ser obedecidos. Precedente: (...) PROCESSO: 08009307620184050000, AG - Agravo de Instrumento, DESEMBARGADOR FEDERAL LEONARDO CARVALHO, 2ª Turma, JULGAMENTO: 18/12/2018\". \"Conclui-se que a omissão no corpo do edital não exclui a bonificação, eis que prevista em lei, vigente, de hierarquia superior àquela que se fundou o edital, no caso a Resolução nº 2/2015, do Conselho Nacional de Residência Médica.\" (TRF5 - Processo 0815065-77.2017.4.05.8100, Apelação Cível, Rel. Desembargador Federal Leonardo Henrique de Cavalcante Carvalho, 2ª Turma, Julgamento: 01/09/2020).\r\n\r\n\r\n\r\n Importante esclarecer, ainda, que, decidindo assim, o Poder Judiciário não está substituindo a Banca Examinadora do Certame, na medida em que seu exame está restrito ao controle da legalidade do ato Administrativo, diante da inobservância dos preceitos da Lei nº 12871/2013.\r\n\r\n\r\n\r\n Portanto, a Lei nº 12871/2013 estabeleceu apenas 2 (dois) requisitos para que o candidato obtenha a bonificação de 10% (dez por cento) na nota de todas as fases ou da fase única do processo de seleção pública dos Programas de Residência Médica, quais sejam: a) participação e cumprimento integral de ações na área de Atenção Básica em saúde em regiões prioritárias para o SUS; e b) realização do Programa em 1 (um) ano.\r\n\r\n\r\n\r\n Do exame dos autos, verifica-se que a Apelante iniciou suas atividades no Programa Mais Médicos em 09/11/2023, permanecendo até os dias atuais.\r\n\r\n\r\n\r\n No mesmo sentido, precedentes desta Terceira Turma:\r\n\r\n\r\n\r\n \"ADMINISTRATIVO. CONCURSO. RESIDÊNCIA MÉDICA. BONIFICAÇÃO DE 10%. LEI Nº 12.871/2013. PREENCHIMENTOS DOS REQUISITOS. CONCESSÃO DA SEGURANÇA. MANUTENÇÃO. REMESSA OFICIAL IMPROVIDA. APELAÇÃO IMPROVIDA. 1. Apelação interposta em face de sentença que concedeu a segurança para determinar à autoridade impetrada que inclua o nome da impetrante na listagem de candidatos aptos à bonificação em processos seletivos de residência médica, conforme o art. 22, § 2º, da Lei n. 12.871/2013, intimando-se a presidência do Conselho Nacional de Residência Médica, vinculado ao MEC, para cumprir este decisório, no prazo de 15 (quinze) dias, sob pena de multa diária no importe de R$ 200,00 (duzentos reais), limitada, inicialmente, a R$ 3.000,00 (três mil reais).\r\n\r\n\r\n\r\n 2. A matéria foi apreciada por este eg. Tribunal, por ocasião do julgamento do AGTR nº 0803223-09.2024.4.05.0000, oportunidade em que a Terceira Turma, à unanimidade, negou provimento ao agravo de instrumento, concluindo que \"a impetrante comprovou, por meio de declaração emitida pela Secretaria Municipal de Saúde da Prefeitura de Feira Nova/SE anexada aos autos de origem, ser profissional médica, inscrita no CRM/SE sob n. 7.069, bem como sua participação, desde janeiro de 2022, no programa de Atenção Primária à Saúde na condição de médica da Estratégia de Saúde da Família\".\r\n\r\n\r\n\r\n 3. A Lei 12.871/2013 estabeleceu apenas dois requisitos para que o candidato obtenha a bonificação de 10% (dez por cento) na nota de todas as fases ou da fase única do processo de seleção pública dos Programas de Residência Médica, quais sejam: a) participação e cumprimento integral de ações na área de Atenção Básica em saúde em regiões prioritárias para o SUS; e b) realização do programa em 1 (um) ano (PROCESSO: 08009644120244050000, PEDIDO DE EFEITO SUSPENSIVO À APELAÇÃO, DESEMBARGADOR FEDERAL LUIZ BISPO DA SILVA NETO (CONVOCADO), 3ª TURMA, JULGAMENTO: 18/04/2024). 4. A conclusão do Juízo de Origem também está em consonância com o entendimento adotado pelo TRF5, em casos semelhantes: PROCESSO: 08014526220234058202, APELAÇÃO / REMESSA NECESSÁRIA, DESEMBARGADOR FEDERAL RUBENS DE MENDONÇA CANUTO NETO, 4ª TURMA, JULGAMENTO: 30/09/2024; PROCESSO: 08000182920234058205, APELAÇÃO / REMESSA NECESSÁRIA, DESEMBARGADOR FEDERAL RAFAEL CHALEGRE DO REGO BARROS (CONVOCADO), 3ª TURMA, JULGAMENTO: 26/09/2024; PROCESSO: 08014517720234058202, APELAÇÃO / REMESSA NECESSÁRIA, DESEMBARGADOR FEDERAL ANDRE LUIS MAIA TOBIAS GRANJA (CONVOCADO), 6ª TURMA, JULGAMENTO: 27/08/2024. 5. Considerando ainda que a previsão do edital não pode contrariar a norma legal, tampouco ser omissa quanto ao percentual em questão, deve a concessão da segurança ser mantida, por seus termos. 6. Remessa oficial improvida. Apelação improvida. Condenação da recorrente ao pagamento de honorários recursais, nos termos do art. 85, § 11, CPC/2015, ficando os honorários sucumbenciais que lhe cabem majorados em um ponto percentual, mantida a suspensão, por ser a parte beneficiária da assistência judiciária gratuita.\"\r\n\r\n\r\n\r\n (PROCESSO: 08000411420244058504, APELAÇÃO / REMESSA NECESSÁRIA, DESEMBARGADOR FEDERAL LUIZ BISPO DA SILVA NETO (CONVOCADO), 3ª TURMA, JULGAMENTO: 17/10/2024)\r\n\r\n\r\n\r\n ADMINISTRATIVO E PROCESSUAL CIVIL. AGRAVO DE INSTRUMENTO. PROCESSO SELETIVO PARA RESIDÊNCIA MÉDICA. CANDIDATA VINCULADA AO PROGRAMA DE ATENÇÃO PRIMÁRIA À SAÚDE DA ESTRATÉGIA DE SAÚDE DA FAMÍLIA EM REGIÃO PRIORITÁRIA PARA O SUS. BONIFICAÇÃO DE 10%. DIREITO À PONTUAÇÃO ADICIONAL. LEI Nº 12.871/2013. AGRAVO DE INSTRUMENTO PROVIDO.\r\n\r\n\r\n\r\n 1. Agravo de Instrumento interposto pela Impetrante do Mandado de Segurança originário em face de decisão que indeferiu o pedido de liminar, qual seja, o que pretendia a pontuação adicional de 10% (dez por cento) no processo seletivo para residência médica previsto no Edital nº 03/2025 - ENARE, por entender o douto Magistrado que a atuação na rede de Atenção Básica em Saúde, através da Estratégia Saúde da Família (ESF), não se encontra albergada pelo disciplinamento legal para fins da mencionada bonificação, uma vez que tem finalidade diversa do Programa Mais Médicos.\r\n\r\n\r\n\r\n 2. Na hipótese, o Edital 03/2025 - residência médica ENARE previu o bônus de 10% de pontuação para os candidatos que provarem ter participado por, no mínimo, 1 ano, do Programa de Valorização do Profissional da Atenção Básica - PROVAB.\r\n\r\n\r\n\r\n 3. Alega a Impetrante/Agravante que quem atua nas áreas de atenção básica tem direito ao mencionado acréscimo em sua nota na prova do ENARE.\r\n\r\n\r\n\r\n 4. Referida bonificação tem origem na Lei nº 12871/2013, que instituiu o Programa Mais Médicos e previu, no seu art. 22, o seguinte: \"Art. 22. As demais ações de aperfeiçoamento na área de Atenção Básica em saúde em regiões prioritárias para o SUS, voltadas especificamente para os médicos formados em instituições de educação superior brasileiras ou com diploma revalidado, serão desenvolvidas por meio de projetos e programas dos Ministérios da Saúde e da Educação. (...). 2º O candidato que tiver participado das ações previstas no caput deste artigo e tiver cumprido integralmente aquelas ações, desde que realizado o programa em 1 (um) ano, receberá pontuação adicional de 10% (dez por cento) na nota de todas as fases ou da fase única do processo de seleção pública dos Programas de Residência Médica a que se refere o art. 2º da Lei no 6.932, de 1981\".\r\n\r\n\r\n\r\n 5. Portanto, a Lei nº 12871/2013 estabeleceu apenas 2 (dois) requisitos para que o candidato obtenha a bonificação de 10% (dez por cento) na nota de todas as fases ou da fase única do processo de seleção pública dos Programas de Residência Médica, quais sejam: a) participação e cumprimento integral de ações na área de Atenção Básica em saúde em regiões prioritárias para o SUS; e b) realização do Programa em 1 (um) ano.\r\n\r\n\r\n\r\n 6. No caso, a Declaração de Vínculo, emitida pela Coordenação de Atenção Básica de Pombal e assinada pela Secretária Municipal de Saúde, informa que a Requerente vem atuando como médica de Estratégia de Saúde da Família do Município de Pombal/PB, desde dezembro de 2023 até o momento da emissão da certidão (julho de 2025), na UBS XIV Altiplano, com carga-horária de 40 horas semanais. Essa mesma declaração informa que a ESF a que está vinculada a Agravante está ligada à Unidade Básica de Saúde localizada em setor que compõe os 20% mais pobres do Município, considerada, portanto, área prioritária para o SUS.\r\n\r\n\r\n\r\n 7. A Agravante comprovou, portanto, ser profissional médica e estar participando, desde dezembro de 2023, do programa de Atenção Primária à Saúde da Estratégia de Saúde da Família em região prioritária para o SUS, cabendo-lhe a bonificação pretendida.\r\n\r\n\r\n\r\n 8. Ademais, consoante jurisprudência que se colhe deste Regional, em caso análogo ao presente, \"conquanto a norma editalícia possua status de lei entre as partes envolvidas no certame, ela não pode contrariar norma legal. Ainda que a questão controvertida tenha sido omissa no instrumento convocatório, como ocorreu no caso em análise, os ditames legais devem ser obedecidos. Precedente: (...) PROCESSO: 08009307620184050000, AG - Agravo de Instrumento, DESEMBARGADOR FEDERAL LEONARDO CARVALHO, 2ª Turma, JULGAMENTO: 18/12/2018\". \"Conclui-se que a omissão no corpo do edital não exclui a bonificação, eis que prevista em lei, vigente, de hierarquia superior àquela que se fundou o edital, no caso a Resolução nº 2/2015, do Conselho Nacional de Residência Médica.\" (TRF5 - Processo 0815065-77.2017.4.05.8100, Apelação Cível, Rel. Desembargador Federal Leonardo Henrique de Cavalcante Carvalho, 2ª Turma, Julgamento: 01/09/2020).\r\n\r\n\r\n\r\n 9. Importante esclarecer, ainda, que, decidindo assim, o Poder Judiciário não está substituindo a Banca Examinadora do Certame, na medida em que seu exame está restrito ao controle da legalidade do ato Administrativo, diante da inobservância dos preceitos da Lei nº 12871/2013.\r\n\r\n\r\n\r\n 10. Nesse mesmo sentido, colhem-se precedentes desta e. Terceira Turma: 08000411420244058504, APELAÇÃO / REMESSA NECESSÁRIA, DESEMBARGADOR FEDERAL LUIZ BISPO DA SILVA NETO (CONVOCADO), 3ª TURMA, JULGAMENTO: 17/10/2024; e 08032230920244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL ROGÉRIO DE MENESES FIALHO MOREIRA, 3ª TURMA, JULGAMENTO: 09/05/2024.\r\n\r\n\r\n\r\n 11. Agravo de Instrumento provido para determinar que seja computada, a título provisório, enquanto não decidido o processo originário, a pontuação adicional de 10% (dez por cento) na nota da Agravante, nos processos seletivos para residência médica.\r\n\r\n\r\n\r\n (PROCESSO: 0002570-06.2025.4.05.0000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL CID MARCONI, 3ª TURMA, JULGAMENTO: 02/10/2025)\r\n\r\n\r\n\r\n Vale ponderar, ainda, que apesar de a Lei 15.233/25, de 07/10/25, ter revogado o trecho que prévia o acréscimo de 10% nas notas dos processos seletivos de residência médica para quem tivesse atuação por pelo menos 1 ano em programas relacionados à Atenção Básica, dada a necessidade de preservar a segurança jurídica, tal norma deve se restringir aos interessados que ainda não tenham completado 1 ano até 08/10/2025.\r\n\r\n\r\n\r\n Constatado que o Apelante preenchia os requisitos legais previstos no dispositivo então vigente à época da publicação da Chamada Pública de Seleção nº 10/2025, destinada ao processo seletivo simplificado para residência médica da Secretaria Municipal de João Pessoa, publicada em 12 de setembro de 2025, impõe-se a concessão da segurança pleiteada.\r\n\r\n\r\n\r\n Ante o exposto, DOU PROVIMENTO à Apelação para, reformando a sentença, conceder a segurança pleiteada.\r\n\r\n\r\n\r\n Sem condenação em honorários sucumbenciais, com fundamento no art. 25, Lei nº. 12.016/2009.\r\n\r\n\r\n\r\n É como voto.", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\n Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, DAR PROVIMENTO à Apelação, nos termos do voto do relator e na forma do relatório constante dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Provido", "css": "provido", "obs_assessor": "﻿\r\n\r\n Dr. Rogério, minuta revisada por Évellyn.\r\n\r\nPoder Judiciário\r\n\r\n  Tribunal Regional Federal da 5ª Região\r\n\r\n  Gabinete do Desembargador Federal Rogério Fialho Moreira", "tem_obs_assessor": true, "assunto": "", "ramo": "Administrativo", "subgrupo": "Apelação/Remessa Necessária", "subclasse": ""}, {"nome": "20260320_120659_Re__VOTO.0004256-33.2025.4.05.0000.VIRTUAL.09.04.2026", "nome_arq": "VOTO.0004256-33.2025.4.05.0000.VIRTUAL.09.04.2026", "cnj": "0004256-33.2025.4.05.0000", "cab": "0004256-33.2025.4.05.0000", "assessor": "Gabriel Santos Aquino De Oliveira", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "MARINNA KARLA DA CUNHA LIMA VIANA", "adv_polo_ativo": "PAULO ANTONIO MAIA E SILVA JUNIOR - PB28412", "polo_passivo": "UNIAO FEDERAL, EMPRESA BRASILEIRA DE SERVICOS HOSPITALARES - EBSERH, FUNDACAO GETULIO VARGAS", "adv_polo_passivo": "Não informado", "ementa": "ADMINISTRATIVO. PROCESSUAL CIVIL. EMBARGOS DE DECLARAÇÃO. AUSÊNCIA DE OMISSÃO. FATO SUPERVENIENTE. CONCESSÃO DE GRATUIDADE DE JUSTIÇA PELO JUÍZO DE ORIGEM. POSSIBILIDADE DE APRECIAÇÃO DO PEDIDO PRINCIPAL. PROCESSO SELETIVO DE RESIDÊNCIA MÉDICA. BONIFICAÇÃO DE 10% (DEZ POR CENTO). PROGRAMA MAIS MÉDICOS PELO BRASIL (PMMB). AGRAVO DE INSTRUMENTO PROVIDO. EMBARGOS DE DECLARAÇÃO PREJUDICADOS.\r\n\r\n\r\n\r\n 1. Embargos de Declaração opostos por MARINNA KARLA DA CUNHA LIMA VIANA em face de acórdão desta Turma que, à unanimidade, deu parcial provimento ao Agravo de Instrumento, para determinar ao Juízo de Origem que realize nova análise acerca do pedido de gratuidade judiciária, após a abertura de prazo mínimo para que a agravante junte aos autos documentação hábil a comprovar o alegado comprometimento de sua renda.\r\n\r\n\r\n\r\n 2. O acórdão embargado, diante do indeferimento da gratuidade de justiça pelo juízo a quo, deu provimento parcial ao Agravo de Instrumento tão somente para oportunizar que a Agravante fosse intimada para comprovar o preenchimento dos pressupostos para concessão da gratuidade de justiça, nos termos do art. 99, §2º, CPC.\r\n\r\n\r\n\r\n 3. Não há omissão apta a justificar os Embargos de Declaração, pois conforme se depreende do acórdão, “a pendência da resolução quanto à concessão da gratuidade de justiça impede a análise do mérito quanto à bonificação em processo seletivo para residência médica”. Isto é, caberia à agravante recolher as custas sob pena de extinção do feito sem resolução de mérito caso não fosse comprovado o preenchimento dos pressupostos legais, de forma que estaria prejudicada a análise do pedido principal do Agravo de Instrumento.\r\n\r\n\r\n\r\n 4. Da análise dos autos na ação principal (0025823-61.2025.4.05.8200), percebe-se que foi concedido o benefício da gratuidade de justiça à Agravante em decisão (ID nº. 149935530) do dia 11/03/2026, de forma que a alteração do cenário fático afasta o óbice à análise do pedido principal.\r\n\r\n\r\n\r\n 5. Em que pese o Relator ter entendimento no sentido de que o benefício é direcionado apenas para projetos e programas dos Ministérios da Saúde e da Educação desenvolvidos para o aperfeiçoamento na área de Atenção Básica em saúde em regiões prioritárias para o SUS, sendo equivocada a interpretação de que todo e qualquer integrante do Programa Mais Médicos pelo Brasil faz jus à bonificação adicional de 10% (dez por cento) nas provas de residência médica, na forma do art. 22, §2º, da Lei n.º 12.871/13, e, portanto, ser indevida a equiparação do Programa Mais Médicos pelo Brasil ao PROVAB para fins de bonificação, a 1ª e 3ª Turmas têm aplicado o entendimento favorável aos médicos - no sentido de que é possível, sim, conceder a bonificação pleiteada aos egressos do PMMB, ponderando que o edital que não a contemplou restou omisso e que o Judiciário poderia se pronunciar para abarcá-la também - desde que: (i) tenha havido a participação e cumprimento integral de ações na área de Atenção Básica em saúde em regiões prioritárias para o SUS; bem como (ii) a realização do Programa em 1 (um) ano.\r\n\r\n\r\n\r\n 6. Apesar de a Lei 15.233/25, de 07/10/25, ter revogado o trecho que previa o acréscimo de 10% nas notas dos processos seletivos de residência medica para quem tivesse atuação por pelo menos 1 ano em programas relacionados à Atenção Básica, dada a necessidade de preservar a segurança jurídica, tal norma deve se restringir aos interessados que ainda não tenham completado 1 ano até 08/10/2025. Constatado que a Agravante havia preenchido, ao tempo da publicação do Edital do ENARE Edição 2025/2026, em 20 de junho de 2025, os requisitos legais previstos no dispositivo legal agora revogado, faz-se necessário reformar a decisão do juízo a quo.\r\n\r\n\r\n\r\n 7. Agravo de Instrumento provido para determinar a inclusão da agravante na lista de candidatos aptos a utilizarem a bonificação de 10% no ENARE 2025/2026. Embargos de Declaração prejudicados.", "relatorio": "Trata-se de Embargos de Declaração opostos por MARINNA KARLA DA CUNHA LIMA VIANA em face de acórdão desta Turma que, à unanimidade, deu parcial provimento ao Agravo de Instrumento, para determinar ao Juízo de Origem que realize nova análise acerca do pedido de gratuidade judiciária, após a abertura de prazo mínimo para que a agravante junte aos autos documentação hábil a comprovar o alegado comprometimento de sua renda.\r\n\r\n\r\n\r\n Nas razões recursais, traz os seguintes argumentos:\r\n\r\n\r\n\r\n a) o acórdão embargado incorre em omissão relevante, apta a ensejar a oposição dos presentes aclaratórios, na medida que deixou de se pronunciar sobre pedido específico e autônomo formulado no Agravo de Instrumento;\r\n\r\n\r\n\r\n b) dentre os pedidos expressamente formulados pela agravante no recurso, constou o requerimento para determinar a inclusão da agravante na lista de candidatos aptos a utilizarem a bonificação de 10% no ENARE 2025/2026;\r\n\r\n\r\n\r\n c) mão houve pronunciamento jurisdicional específico acerca do pedido de inclusão da agravante na lista oficial de candidatos aptos à bonificação, providência que possui natureza prática, urgente e autônoma.\r\n\r\n\r\n\r\n Contrarrazões apresentadas.\r\n\r\n\r\n\r\n É o relatório.", "voto": "A teor do que dispõe o art. 1.022 do Código de Processo Civil, cabem embargos de declaração \"contra qualquer decisão judicial para esclarecer obscuridade ou eliminar contradição; suprir omissão de ponto ou questão sobre o qual devia se pronunciar o juiz de ofício ou a requerimento; e/ou corrigir erro material\".\r\n\r\n\r\n\r\n O acórdão embargado, diante do indeferimento da gratuidade de justiça pelo juízo a quo, deu provimento parcial ao Agravo de Instrumento tão somente para oportunizar que a Agravante fosse intimada para comprovar o preenchimento dos pressupostos para concessão da gratuidade de justiça, nos termos do art. 99, §2º, CPC.\r\n\r\n\r\n\r\n Conforme se depreende do acórdão, “a pendência da resolução quanto à concessão da gratuidade de justiça impede a análise do mérito quanto à bonificação em processo seletivo para residência médica”.\r\n\r\n\r\n\r\n Isto é, caberia à agravante recolher as custas sob pena de extinção do feito sem resolução de mérito caso não fosse comprovado o preenchimento dos pressupostos legais, de forma que estaria prejudicada a análise do pedido principal do Agravo de Instrumento.\r\n\r\n\r\n\r\n Portanto, diferente do que alega a Agravante, não há omissão apta a justificar a oposição de Embargos de Declaração, espécie recursal que exige fundamentação específica. No entanto, da análise dos autos na ação principal (0025823-61.2025.4.05.8200), percebe-se que foi concedido o benefício da gratuidade de justiça à Agravante em decisão (ID nº. 149935530) do dia 11/03/2026.\r\n\r\n\r\n\r\n A alteração do cenário fático afasta o óbice à análise do pedido principal.\r\n\r\n\r\n\r\n Passo, portanto, à análise do pedido para inclusão da Agravante na lista de candidatos aptos à bonificação de 10% no ENARE 2025/2026.\r\n\r\n\r\n\r\n Em que pese esta Relatoria ter entendimento no sentido de que o benefício é direcionado apenas para projetos e programas dos Ministérios da Saúde e da Educação desenvolvidos para o aperfeiçoamento na área de Atenção Básica em saúde em regiões prioritárias para o SUS, sendo equivocada a interpretação de que todo e qualquer integrante do Programa Mais Médicos pelo Brasil faz jus à bonificação adicional de 10% (dez por cento) nas provas de residência médica, na forma do art. 22, §2º, da Lei n.º 12.871/13, e, portanto, ser indevida a equiparação do Programa Mais Médicos pelo Brasil ao PROVAB para fins de bonificação, a 1ª e 3ª Turmas têm aplicado o entendimento favorável aos médicos - no sentido de que é possível, sim, conceder a bonificação pleiteada aos egressos do PMMB, ponderando que o edital que não a contemplou restou omisso e que o Judiciário poderia se pronunciar para abarcá-la também - desde que: (i) tenha havido a participação e cumprimento integral de ações na área de Atenção Básica em saúde em regiões prioritárias para o SUS; bem como (ii) a realização do Programa em 1 (um) ano.\r\n\r\n\r\n\r\n A agravante, médica atuante no Projeto Mais Médicos para o Brasil (PMMPB) desde 07/02/2023, faz jus ao benefício pleiteado.\r\n\r\n\r\n\r\n Vale ponderar, ainda, que apesar de a Lei 15.233/25, de 07/10/25, ter revogado o trecho que previa o acréscimo de 10% nas notas dos processos seletivos de residência medica para quem tivesse atuação por pelo menos 1 ano em programas relacionados à Atenção Básica, dada a necessidade de preservar a segurança jurídica, tal norma deve se restringir aos interessados que ainda não tenham completado 1 ano até 08/10/2025.\r\n\r\n\r\n\r\n Constatado que a Agravante havia preenchido, ao tempo da publicação do Edital do ENARE Edição 2025/2026, em 20 de junho de 2025, os requisitos legais previstos no dispositivo legal agora revogado, faz-se necessário reformar a decisão do juízo  a quo.\r\n\r\n\r\n\r\n Ante o exposto, DOU PROVIMENTO ao Agravo de Instrumento para determinar a inclusão da agravante na lista de candidatos aptos a utilizarem a bonificação de 10% no ENARE 2025/2026.\r\n\r\n\r\n\r\n Julgo prejudicados os Embargos de Declaração.\r\n\r\n\r\n\r\n É como voto.", "acordao": "Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, DAR PROVIMENTO ao Agravo de Instrumento, julgando prejudicado os Embargos de Declaração, nos termos do voto do relator, na forma do relatório e das notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Provido", "css": "provido", "obs_assessor": "﻿\r\n\r\n Dr. Rogério, minuta revisada por Évellyn.\r\n\r\n Poder Judiciário\r\n\r\n Tribunal Regional Federal da 5ª Região\r\n\r\n Gabinete do Desembargador Federal Rogério Fialho Moreira", "tem_obs_assessor": true, "assunto": "", "ramo": "Administrativo", "subgrupo": "Apelação/Remessa Necessária", "subclasse": "Embargos de Declaração"}, {"nome": "20260320_121048_Re__VOTO.0023632-25.2025.4.05.8400.VIRTUAL09.04.2026", "nome_arq": "VOTO.0023632-25.2025.4.05.8400.VIRTUAL09.04.2026", "cnj": "0023632-25.2025.4.05.8400", "cab": "0023632-25.2025.4.05.8400", "assessor": "Gabriel Santos Aquino De Oliveira", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "", "classe": "", "polo_ativo": "UNIAO FEDERAL", "adv_polo_ativo": "Não informado", "polo_passivo": "BRUNO XAVIER DE SOUZA", "adv_polo_passivo": "GEORGE MAXIMUS DE MELO GARCIA - RN23146-A", "ementa": "ADMINISTRATIVO. MILITAR. APELAÇÃO CÍVEL. PRELIMINAR DE COMPETÊNCIA. JUIZADO ESPECIAL FEDERAL. INAPLICABILIDADE. ATO ADMINISTRATIVO. ART. 3º, § 1º, III, DA LEI Nº 10.259/2001.NPOR. ADICIONAL NATALINO PROPORCIONAL. BASE DE CÁLCULO. REMUNERAÇÃO DO MÊS DE DESLIGAMENTO. PROMOÇÃO A ASPIRANTE A OFICIAL. ATO FORMAL E CONCOMITANTE AO LICENCIAMENTO. REMUNERAÇÃO DE ALUNO. RECURSO PROVIDO.\r\n\r\n\r\n\r\n  1. Apelação interposta pela UNIÃO FEDERAL em face de sentença que julgou procedente o pedido formulado na exordial, para condenar a União a pagar as diferenças do adicional natalino (décimo terceiro salário) do autor referente ao ano de 2021, que deverá ser calculado proporcionalmente aos meses trabalhados naquele ano, tomando-se por base a remuneração do posto de Aspirante a Oficial, deduzidos os valores já pagos calculados sobre a remuneração de aluno do NPOR, acrescidos de juros de mora e correção monetária conforme Manual de Cálculos da Justiça Federal.\r\n\r\n\r\n\r\n 2. Preliminar rejeitada. A competência dos Juizados Especiais Federais não alcança os feitos que versem sobre anulação ou cancelamento de ato administrativo federal, nos termos do art. 3º, § 1º, III, da Lei nº 10.259/2001. A ausência de pedido expresso de anulação não afasta a exceção, quando a providência pleiteada implica necessariamente a desconstituição do ato. (CC 201400000006589, Des. Fed. Rogério Fialho Moreira, TRF5 – Pleno, DJE 11/09/2014.)\r\n\r\n\r\n\r\n 3. Nos termos do art. 81, § 1º, do Decreto nº 4.307/2002, o adicional natalino proporcional do militar excluído do serviço ativo por licenciamento é calculado sobre a remuneração do mês do desligamento, que deve ser compreendida como a remuneração efetivamente percebida pelo militar durante esse mês, e não sobre a remuneração do posto formalmente ocupado no instante do licenciamento.\r\n\r\n\r\n\r\n  4. A declaração como Aspirante a Oficial da Reserva de 2ª Classe – R/2 constitui condição formal e necessária para o próprio ato de licenciamento, vedada que é a promoção de militar na inatividade (art. 62 da Lei nº 6.880/1980). Promoção e desligamento são, portanto, atos concomitantes e indissociáveis, não configurando a primeira qualquer período de efetivo exercício no novo posto.\r\n\r\n\r\n\r\n 5. Admitir que um único dia formal no posto de Aspirante a Oficial — decorrente de ato jurídico instrumental ao licenciamento — sirva de base para recalcular o adicional natalino proporcional de meses de serviço prestados integralmente na condição de aluno implicaria efeito remuneratório manifestamente desproporcional e incompatível com a finalidade do instituto.\r\n\r\n\r\n\r\n  6. O exemplo prático constante da Nota Informativa nº 07/CPEx-2021 registra o lançamento de \"Adicional Natalino - Ajuste Contas\" exclusivamente na coluna referente à Graduação de Aluno, corroborando que a própria Administração Militar calcula o adicional natalino com base na remuneração percebida durante o período de efetivo serviço nessa condição.\r\n\r\n\r\n\r\n 7. O DIEx nº 770-ASSE1/SSEF/SEF, invocado pelo Apelado, trata especificamente de férias e indenização de férias, institutos regidos por normas próprias e com dinâmica diversa do adicional natalino, não sendo possível a transposição automática do raciocínio nele contido para a hipótese dos autos, que possui regramento específico no art. 81 do Decreto nº 4.307/2002.\r\n\r\n\r\n\r\n 8. Precedentes desta Terceira Turma: PROCESSO: 0019994-81.2025.4.05.8400, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL ALEXANDRE COSTA DE LUNA FREIRE, 3ª TURMA, JULGAMENTO: 12/02/2026; PROCESSO: 0022326-21.2025.4.05.8400, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL ALEXANDRE COSTA DE LUNA FREIRE, 3ª TURMA, JULGAMENTO: 12/02/2026; PROCESSO: 0020856-52.2025.4.05.8400, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL ROGÉRIO DE MENESES FIALHO MOREIRA, 3ª TURMA, JULGAMENTO: 12/03/2026.\r\n\r\n\r\n\r\n 9. Apelação provida para julgar improcedente a demanda. Inversão do ônus da sucumbência. Gratuidade de justiça concedida para reconhecer a condição suspensiva da condenação em honorários, nos termos do art. 98, §3º, CPC.", "relatorio": "Trata-se de Apelação interposta pela UNIÃO FEDERAL em face de sentença proferida pelo Juízo da 5ª Vara Federal da Seção Judiciária do Rio Grande do Norte que julgou procedente o pedido formulado na exordial, para condenar a União a pagar as diferenças do adicional natalino (décimo terceiro salário) do autor referente ao ano de 2021, que deverá ser calculado proporcionalmente aos meses trabalhados naquele ano, tomando-se por base a remuneração do posto de Aspirante a Oficial, deduzidos os valores já pagos calculados sobre a remuneração de aluno do NPOR, acrescidos de juros de mora e correção monetária conforme Manual de Cálculos da Justiça Federal.\r\n\r\n\r\n\r\n Nas razões recursais, a União apresenta preliminar arguindo que a competência para o julgamento do feito é dos Juizados Especiais Federais e, no mérito, aduz que: a) o autor foi excluído e desligado do CPOR/NPOR na condição de aluno e ato seguinte, na mesma data, foi declarado Aspirante-a-Oficial da reserva (não remunerada) de 2ª classe, conforme prevê o art. 53, II, da PORTARIA - C EX N° 1.799, DE 20 DE JULHO DE 2022, que aprova o Regulamento dos Centros de Preparação de Oficiais da Reserva (EB10-R-05.017) 3ª edição, 2022, de modo que a sentença apelada merece reforma integral, para se julgar improcedente o pedido autoral; b) considerando que os alunos do CPOR/NPOR são antes excluídos e desligados do CPOR/NPOR e ato seguinte, na mesma data, são declarados Aspirante-a-Oficial (art. 53, II, do do Regulamento dos Centros de Preparação de Oficiais da Reserva, aprovado pela PORTARIA - C EX N° 1.799, DE 20 DE JULHO DE 2022), é de se entender que o último mês de efetivo serviço deve ser pago - inclusive o adicional natalino proporcional - com o valor correspondente ao soldo de aluno, e não de Aspirante-a-Oficial; c) estabelecido que a base de cálculo para o adicional natalino da situação da parte autora é a remuneração que lhe foi paga correspondente à última remuneração na ativa, as fichas financeiras presentes nos autos indicam que a remuneração que foi paga à parte autora no mês do seu desligamento, enquanto ainda estava na ativa, foi a de ALUNO; d) na remotíssima hipótese de o pleito da parte autora ser acolhida, o que não se espera, a União invoca a aplicação do indexador monetária e de juros de mora determinado na EC nº 113/2021, para o período posterior a 09/12/2021.\r\n\r\n\r\n\r\n Contrarrazões apresentadas.\r\n\r\n\r\n\r\n É o relatório.", "voto": "De início, recebo a apelação, considerando presentes os pressupostos recursais intrínsecos (cabimento, legitimação, interesse e inexistência de fato impeditivo ou extintivo do direito de recorrer) e extrínsecos (preparo, tempestividade e regularidade formal) para a admissibilidade do recurso.\r\n\r\n\r\n\r\n Rejeito a preliminar, arguida pela União Federal, objetivando o reconhecimento da competência dos Juizados Especiais Federais para processar e julgar o presente feito.\r\n\r\n\r\n\r\n Com efeito, o caso sob análise amolda-se à exceção prevista no art. 3º, § 1º, III da Lei nº. 10.259/2001 que excepciona da competência dos Juizados Especiais Federais os feitos que versem sobre a anulação ou cancelamento de ato administrativo federal, salvo o de natureza previdenciária e o de lançamento fiscal.\r\n\r\n\r\n\r\n Outrossim, \"a ausência de pedido expresso no sentido de proceder-se à anulação de ato administrativo não impede que o pedido seja assim classificado, uma vez que, como visto, a providência pleiteada implica necessariamente a anulação de um ato administrativo.\" (CC 201400000006589, Desembargador Federal Rogério Fialho Moreira, TRF5 - Pleno, DJE - Data::11/09/2014 - Página::43.)\r\n\r\n\r\n\r\n Passo à análise do mérito.\r\n\r\n\r\n\r\n O cerne recursal cinge-se a verificar se é devida a condenação da União ao pagamento das diferenças do adicional natalino proporcional referente ao ano de 2021, utilizando como base de cálculo a remuneração do posto de Aspirante a Oficial, com a dedução dos valores já pagos com base na remuneração de aluno.\r\n\r\n\r\n\r\n No caso, o Apelado, após concluir o serviço militar obrigatório em dezembro de 2021, foi licenciado e promovido à graduação de Aspirante a Oficial. Nesse contexto, sustenta que, conforme o art. 81, § 1º, do Decreto nº 4.307/2002, o cálculo do adicional natalino proporcional deve usar a remuneração do mês de desligamento, que entende ser a de Aspirante a Oficial.\r\n\r\n\r\n\r\n Acerca da matéria, o Decreto nº 4.307/2002, ao regulamentar a Medida Provisória 2.215/01, dispõe que:\r\n\r\n\r\n\r\n Art. 81. O adicional natalino corresponde a um doze avos da remuneração a que o militar fizer jus no mês de dezembro, por mês de serviço, no respectivo ano.\r\n\r\n\r\n\r\n § 1º O militar excluído do serviço ativo e desligado da OM a que estiver vinculado, por motivo de demissão, licenciamento ou desincorporação, receberá o adicional de forma proporcional, calculado sobre a remuneração do mês do desligamento.\r\n\r\n\r\n\r\n Interpretado esse dispositivo à luz das circunstâncias do caso concreto, verifica-se que o Apelado concluiu o curso e foi considerado apto em inspeção de saúde em 04 de dezembro de 2021, quando foi excluído e desligado do Núcleo de Preparação de Oficiais da Reserva e do estado efetivo do batalhão, tendo sido declarado Aspirante a Oficial da reserva de segunda classe – R/2 na mesma data.\r\n\r\n\r\n\r\n Contudo, diferente do que sustenta o Apelado, a remuneração a ser utilizada como base para o cálculo do adicional natalino proporcional deve ser a de aluno.\r\n\r\n\r\n\r\n A correta aplicação do art. 81, § 1º, do Decreto nº 4.307/2002 exige compreender a natureza jurídica da promoção ao posto de Aspirante a Oficial no contexto do licenciamento do serviço militar obrigatório.\r\n\r\n\r\n\r\n Com efeito, a declaração como Aspirante a Oficial da Reserva de 2ª Classe – R/2, ocorrida em 07/12/2024, não se confunde com uma promoção funcional comum no âmbito da carreira militar da ativa. Trata-se, em verdade, de condição formal e necessária para o próprio ato de licenciamento, conforme se extrai do art. 62 da Lei nº 6.880/1980, que veda a promoção de militar na inatividade. O aluno do NPOR é declarado Aspirante a Oficial precisamente para que, nessa condição, possa ser regularmente licenciado — a promoção e o desligamento são, portanto, atos concomitantes e indissociáveis.\r\n\r\n\r\n\r\n Assim, a remuneração de Aspirante a Oficial jamais constituiu a contraprestação pelo serviço efetivamente prestado pelo Apelado ao longo do ano de 2021. Durante todo o período de apuração do adicional natalino, o Apelado exerceu suas atividades na condição de aluno, percebendo a remuneração correspondente a essa situação funcional. A promoção ao posto de Aspirante a Oficial foi mero ato jurídico formal, instrumental ao licenciamento, sem que houvesse qualquer período de efetivo exercício nessa graduação.\r\n\r\n\r\n\r\n Nesse sentido, a interpretação teleológica do art. 81, § 1º, do Decreto nº 4.307/2002 conduz à conclusão de que a expressão \"remuneração do mês do desligamento\" deve ser entendida como a remuneração efetivamente percebida pelo militar durante o mês em que se deu o desligamento — no caso, a remuneração de aluno, vigente durante praticamente toda a extensão de dezembro de 2024. Admitir interpretação diversa significaria permitir que uma promoção formal, realizada no mesmo instante do licenciamento, servisse de base para majorar artificialmente o cálculo do adicional natalino, em evidente desvio da finalidade da norma.\r\n\r\n\r\n\r\n O fato de ter havido o pagamento de valor equivalente a um dia de remuneração de Aspirante a Oficial em fevereiro de 2022 (R$ 261,25), por si só, não infirma esse entendimento. Referida parcela corresponde a mero acerto remuneratório decorrente do processamento administrativo do ato de declaração, e não ao exercício efetivo das funções do posto durante o mês de desligamento. Não se pode admitir que esse único dia — decorrente de ato formal e concomitante ao licenciamento — sirva de alavanca para recalcular, com base no soldo de Aspirante a Oficial (R$ 7.315,00), um adicional natalino proporcional que remunera meses de serviço prestados integralmente na condição de aluno (soldo de R$ 1.334,00). A tese do Apelado, levada às suas consequências práticas, permitiria que uma formalidade administrativa de encerramento do vínculo produzisse efeito remuneratório amplamente desproporcional em relação ao serviço efetivamente prestado — resultado incompatível com a finalidade do instituto.\r\n\r\n\r\n\r\n O fato de ter havido o pagamento de valor equivalente a um dia de remuneração de Aspirante a Oficial em fevereiro de 2026 (R$ 261,25), por si só, não infirma esse entendimento. Referida parcela corresponde a mero acerto remuneratório decorrente do processamento administrativo do ato de declaração, e não ao exercício efetivo das funções do posto durante o mês de desligamento.\r\n\r\n\r\n\r\n O documento juntado aos autos pelo Apelado, composto pelo DIEx nº 770-ASSE1/SSEF/SEF e pela Nota Informativa nº 07/CPEx-2021, não socorre a sua pretensão — ao contrário, reforça a correção da sentença.\r\n\r\n\r\n\r\n O DIEx nº 770-ASSE1/SSEF/SEF, embora conclua que indenizações de férias devem ser calculadas com base no posto ocupado no dia do licenciamento, trata especificamente de férias e indenização de férias, institutos regidos por normas próprias e com dinâmica diversa do adicional natalino. Não há como transpor automaticamente esse raciocínio para a hipótese dos autos, que tem regramento específico no art. 81 do Decreto nº 4.307/2002.\r\n\r\n\r\n\r\n Mais relevante, todavia, é o exemplo prático constante da Nota Informativa nº 07/CPEx-2021. A tabela de valores devidos por ocasião do licenciamento, que discrimina os lançamentos por período e posto/graduação, registra o \"Adicional Natalino - Ajuste Contas\" exclusivamente na coluna referente à Graduação de Aluno, sem qualquer lançamento equivalente para o dia no posto de Aspirante a Oficial. Esse modelo operacional adotado pelo próprio Centro de Pagamento do Exército evidencia que, na prática administrativa militar, o adicional natalino proporcional é calculado com base na remuneração percebida durante o período de efetivo serviço na condição de aluno — e não sobre a remuneração do posto de Aspirante a Oficial, ocupado apenas no momento formal e concomitante ao licenciamento. Assim, longe de amparar a tese autoral, o próprio documento invocado pelo Apelado demonstra que a pretensão deduzida não encontra respaldo nem na orientação administrativa do Exército Brasileiro.\r\n\r\n\r\n\r\n Diante do exposto, a sentença recorrida deve ser reformada, uma vez que a base de cálculo do adicional natalino proporcional deve ser a remuneração de aluno, percebida pelo Apelado ao longo do período de serviço no ano de 2024.\r\n\r\n\r\n\r\n No mesmo sentido, precedentes desta eg. Terceira Turma:  PROCESSO: 0019994-81.2025.4.05.8400, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL ALEXANDRE COSTA DE LUNA FREIRE, 3ª TURMA, JULGAMENTO: 12/02/2026; PROCESSO: 0022326-21.2025.4.05.8400, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL ALEXANDRE COSTA DE LUNA FREIRE, 3ª TURMA, JULGAMENTO: 12/02/2026; PROCESSO: 0020856-52.2025.4.05.8400, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL ROGÉRIO DE MENESES FIALHO MOREIRA, 3ª TURMA, JULGAMENTO: 12/03/2026.\r\n\r\n\r\n\r\n Ante o exposto, DOU PROVIMENTO à Apelação para, reformando a sentença, julgar improcedente a demanda. Consequentemente, determino a inversão do ônus da sucumbência e, considerando a declaração de hipossuficiência que consta dos autos, concedo a gratuidade de justiça e reconheço a condição suspensiva da condenação em honorários, nos termos do art. 98, §3º, CPC.\r\n\r\n\r\n\r\n É como voto.", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\n Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, DAR PROVIMENTO à Apelação, nos termos do voto do relator e na forma do relatório constante dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Provido", "css": "provido", "obs_assessor": "﻿\r\n\r\n Dr. Rogério, minuta revisada por Évellyn.\r\n\r\n Poder Judiciário\r\n\r\n Tribunal Regional Federal da 5ª Região\r\n\r\n Gabinete do Desembargador Federal Rogério Fialho Moreira", "tem_obs_assessor": true, "assunto": "", "ramo": "Administrativo", "subgrupo": "Apelação/Remessa Necessária", "subclasse": ""}, {"nome": "20260320_121114_Re__VOTO.0000908-70.2026.4.05.0000.VIRTUAL.09.04.2026", "nome_arq": "VOTO.0000908-70.2026.4.05.0000.VIRTUAL.09.04.2026", "cnj": "0000908-70.2026.4.05.0000", "cab": "0000908-70.2026.4.05.0000", "assessor": "Gabriel Santos Aquino De Oliveira", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "HENRIQUE RAMOS LAGES", "adv_polo_ativo": "THIAGO RAMOS LAGES - AL8239", "polo_passivo": "CENTRO BRASILEIRO DE PESQUISA EM AVALIACAO E SELECAO E DE PROMOCAO DE EVENTOS - CEBRASPE, UNIAO FEDERAL", "adv_polo_passivo": "Não informado", "ementa": "ADMINISTRATIVO. AGRAVO DE INSTRUMENTO. CONCURSO PÚBLICO (CPNUJE – EDITAL Nº 1/2024). PROVA DE TÍTULOS. REANÁLISE DE PONTUAÇÃO. ATIVIDADE JURÍDICA. LIMITES DO CONTROLE JUDICIAL. CADASTRO DE RESERVA. EXPECTATIVA DE DIREITO. AUSÊNCIA DE PERIGO DE DANO. AGRAVO IMPROVIDO.\r\n\r\n\r\n\r\n 1. Agravo de Instrumento, com pedido de antecipação da tutela recursal, interposto por HENRIQUE RAMOS LAGES contra decisão proferida pelo Juízo da 1ª Vara Federal da Seção Judiciária de Alagoas que indeferiu a liminar objetivando a reanálise e o reconhecimento de sua pontuação integral na fase de Prova de Títulos do Concurso Público Nacional Unificado da Justiça Eleitoral (CPNUJE - Edital nº 1/2024), para o cargo de Analista Judiciário - Área Judiciária do Tribunal Regional Eleitoral de Alagoas (TRE/AL).\r\n\r\n\r\n\r\n 2. Embora sustente o Agravante que a questão se resolveria mediante simples conferência documental, não se pode perder de vista que a aferição de atividade jurídica, mesmo quando fundada em documentos, não se resume a operação meramente de subsunção, mas envolve interpretação das normas editalícias, análise da natureza dos atos desempenhados e juízo técnico-administrativo da banca examinadora.\r\n\r\n\r\n\r\n 3. A jurisprudência consolidada dos Tribunais Superiores é firme no sentido de que o controle judicial de concursos públicos deve ser exercido com cautela, limitando-se à verificação de legalidade, sendo vedada a substituição da banca examinadora pelo Judiciário, sobretudo em matéria que demanda avaliação técnica especializada.\r\n\r\n\r\n\r\n 4. O concurso em questão foi homologado exclusivamente para cadastro de reserva, circunstância que, conforme entendimento pacífico, gera mera expectativa de direito, não se convertendo em direito subjetivo à nomeação, salvo situações excepcionalíssimas, não demonstradas neste momento processual.\r\n\r\n\r\n\r\n 5. A ultrapassagem do agravante por candidata beneficiada por decisão judicial liminar em outro processo não configura, por si só, perigo de dano irreparável, tampouco gera direito à ex
