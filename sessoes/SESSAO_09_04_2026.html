firmada em julgamento de casos repetitivos ou em incidente de assunção de competência aplicável ao caso sob julgamento; e incorra em qualquer das condutas descritas no art. 489, § 1º. Este dispositivo, por seu turno, não considera fundamentada qualquer decisão judicial, seja ela interlocutória, sentença ou acórdão, que:\r\n\r\n\r\n\r\nI - se limitar à indicação, à reprodução ou à paráfrase de ato normativo, sem explicar sua relação com a causa ou a questão decidida;\r\n\r\n\r\n\r\nII - empregar conceitos jurídicos indeterminados, sem explicar o motivo concreto de sua incidência no caso;\r\n\r\n\r\n\r\nIII - invocar motivos que se prestariam a justificar qualquer outra decisão;\r\n\r\n\r\n\r\nIV - não enfrentar todos os argumentos deduzidos no processo capazes de, em tese, infirmar a conclusão adotada pelo julgador;\r\n\r\n\r\n\r\nV - se limitar a invocar precedente ou enunciado de súmula, sem identificar seus fundamentos determinantes nem demonstrar que o caso sob julgamento se ajusta àqueles fundamentos;\r\n\r\n\r\n\r\nVI - deixar de seguir enunciado de súmula, jurisprudência ou precedente invocado pela parte, sem demonstrar a existência de distinção no caso em julgamento ou a superação do entendimento.\r\n\r\n\r\n\r\nNo caso, inexistem os vícios apontados pela parte embargante, não se subsumindo o objeto dos presentes embargos a nenhuma das hipóteses previstas no sobredito dispositivo legal\r\n\r\n\r\n\r\nO acórdão embargado encontra-se assim ementado:\r\n\r\n\r\n\r\nPROCESSUAL CIVIL. ADMINISTRATIVO. JUSTIÇA GRATUITA. TUTELA DE URGÊNCIA. INDEFERIMENTO. FIES. ABATIMENTO DE 1% DO SALDO DEVEDOR. REQUERIMENTO ADMINISTRATIVO NÃO APRECIADO NO PRAZO LEGAL. AGRAVO DE INSTRUMENTO PARCIALMENTE PROVIDO.\r\n\r\n\r\n\r\n 1. Agravo de instrumento, com pedido de antecipação da tutela recursal, interposto por Noély Dantas Araújo contra decisão que indeferiu a liminar por ela formulada objetivando a concessão do abatimento mensal de 1% do saldo devedor do seu contrato de financiamento estudantil, por cada mês por ela trabalhado na ESF, além da suspensão das cobranças mensais da amortização da dívida do FIES pelo mesmo período, abstendo-se de realizarem a cobrança dos valores da dívida/financiamento, bem como a sua amortização, encargos, juros e multas.\r\n\r\n\r\n\r\n 2. A decisão agravada indeferiu o provimento de urgência perseguido, sob o principal fundamento de que não restou demonstrada a mora administrativa na conclusão do requerimento formulado pela parte autora/agravante para concessão do abatimento do FIES.\r\n\r\n\r\n\r\n3. Embora o transcurso de pouco mais de 30 (trinta) dias entre o requerimento administrativo e a impetração do writ possa, em tese, ser considerado insuficiente para caracterizar mora administrativa ou justificar a atuação substitutiva do Judiciário, o contexto fático evoluiu desde então. No momento da prolação da decisão ora impugnada, já haviam decorrido aproximadamente 120 (cento e vinte) dias do requerimento formulado pela parte, sem que houvesse resposta conclusiva da Administração, o que configura indício de mora desarrazoada na apreciação do pedido. Essa omissão, ao ultrapassar o prazo legal de 30 dias previsto no art. 49 da Lei nº 9.784/99, sem justificativa formal e motivada, revela resistência tácita da Administração e autoriza o reconhecimento do interesse de agir da parte, inclusive para fins de tutela jurisdicional.\r\n\r\n\r\n\r\n4. A inércia estatal, quando prolongada de forma injustificada, não pode inviabilizar o acesso à jurisdição nem frustrar o exercício de um direito legalmente assegurado.\r\n\r\n\r\n\r\n5. Não cabendo ao Poder Judiciário substituir-se à Administração Pública para decidir diretamente o mérito do requerimento formulado pela parte, sob pena de violação ao princípio da separação dos Poderes e à reserva de competência técnica do ente responsável, e que o processo administrativo deve ser interpretado à luz do princípio do formalismo moderado — que orienta a flexibilização de exigências formais excessivas em favor da efetividade do direito material —, a solução que melhor se harmoniza com o estágio atual da controvérsia e com o princípio da deferência ao mérito administrativo consiste em determinar à autoridade competente que analise o pedido de abatimento formulado pela agravante em prazo razoável. Tal providência assegura a efetividade do controle judicial, sem incorrer em indevida interferência na esfera de discricionariedade administrativa, garantindo à agravante o exercício pleno de seus direitos processuais e materiais.\r\n\r\n\r\n\r\n6. Agravo de instrumento parcialmente provido, para determinar que a autoridade administrativa competente proceda à análise do requerimento de abatimento de 1% no saldo devedor do FIES da agravante, pela via do FIESMED ou outra a ser oportunizada caso aquela se apresente inadequada ao intento, no prazo determinado na decisão que deferiu, em parte, a antecipação da tutela recursal.\r\n\r\n\r\n\r\n Da leitura da ementa acima transcrita, verifica-se que os argumentos e precedentes jurisprudenciais suscitados não se mostram suficientes para infirmar o entendimento firmado, no v. acórdão, no sentido de considerar que, não tendo havido a negativa expressa do requerimento administrativo do benefício perseguido e, não cabendo ao Poder Judiciário substituir-se à Administração Pública para decidir diretamente o mérito do pedido formulado pela parte, sob pena de violação ao princípio da separação dos Poderes e à reserva de competência técnica do ente responsável, a solução que melhor se harmoniza com o estágio atual da controvérsia e com o princípio da deferência ao mérito administrativo consiste em determinar à autoridade competente que analise o pedido de abatimento formulado pela agravante em prazo razoável, providência que assegura a efetividade do controle judicial, sem incorrer em indevida interferência na esfera de discricionariedade administrativa, garantindo à agravante o exercício pleno de seus direitos processuais e materiais.\r\n\r\n\r\n\r\n Para desconstituir os fundamentos utilizados no acórdão cabe à parte manejar o recurso cabível, não se prestando os aclaratórios à modificação do que foi sobejamente decidido, mesmo quando interpostos para fins de prequestionamento.\r\n\r\n\r\n\r\n Diante do exposto, conheço dos embargos de declaração e nego-lhes provimento.\r\n\r\n\r\n\r\nÉ como voto.\r\n\r\n\r\n\r\n PROCESSO Nº 0000610-15.2025.4.05.0000\r\n\r\n CLASSE: AGRAVO DE INSTRUMENTO (202)\r\n\r\n ASSUNTO:OBRIGAÇÃO DE FAZER / NÃO FAZER, FIES, FINANCIAMENTO PRIVADO DO ENSINO SUPERIOR E/OU PESQUISA]\r\n\r\n AGRAVANTE: NOELY DANTAS ARAUJO\r\n\r\n ADVOGADO DO(A) AGRAVANTE: PAULO ANTONIO MAIA E SILVA JUNIOR - PB28412\r\n\r\n AGRAVADO: FUNDO NACIONAL DE DESENVOLVIMENTO DA EDUCACAO, UNIAO FEDERAL, CAIXA ECONOMICA FEDERAL", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\nDecide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO aos embargos de declaração, nos termos do voto do relator e na forma do relatório constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Parcialmente provido", "css": "parcial", "obs_assessor": "﻿", "tem_obs_assessor": false, "assunto": "OBRIGAÇÃO DE FAZER / NÃO FAZER, FIES, FINANCIAMENTO PRIVADO DO ENSINO SUPERIOR E/OU PESQUISA]", "ramo": "Administrativo", "subgrupo": "Agravo de Instrumento", "subclasse": "Embargos de Declaração"}, {"nome": "20260319_125211_Re__VOTO.0000905-18.2026.4.05.0000.VIRTUAL.09.04.2026", "nome_arq": "VOTO.0000905-18.2026.4.05.0000.VIRTUAL.09.04.2026", "cnj": "0000905-18.2026.4.05.0000", "cab": "0000905-18.2026.4.05.0000", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "AGRAVO DE INSTRUMENTO (202)", "polo_ativo": "EDILENE PAULO DA SILVA", "adv_polo_ativo": "BERNARD BARBETO DE OLIVEIRA - ES28997", "polo_passivo": "CAIXA ECONOMICA FEDERAL - CEF", "adv_polo_passivo": "JOSE JACKSON NUNES AGOSTINHO - CE8253", "ementa": "PROCESSUAL CIVIL. AGRAVO DE INSTRUMENTO. BLOQUEIO DE VALORES VIA SISBAJUD. CONTAS BANCÁRIAS. IMPENHORABILIDADE ATÉ O LIMITE DE 40 SALÁRIOS MÍNIMOS. PRECEDENTES. LIBERAÇÃO. PROVIMENTO.\r\n\r\n\r\n\r\n1. Agravo de instrumento, com pedido de antecipação da tutela recursal, interposto por EDILENE PAULO DA SILVA contra decisão proferida pelo Juízo da 7ª Vara Federal da Seção Judiciária de Pernambuco que, em cumprimento de sentença, indeferiu o pedido de desbloqueio de numerário constrito, via SISBAJUD, no importe de R$ 1.014,64 (um mil, quatorze reais e sessenta e quatro centavos).\r\n\r\n\r\n\r\n2. A pretensão recursal encontra fundamento no entendimento segundo o qual \"É impenhorável a quantia de até quarenta salários mínimos poupada, seja ela mantida em papel moeda, conta-corrente ou aplicada em caderneta de poupança propriamente dita, CDB, RDB ou em fundo de investimentos, desde que a única reserva monetária em nome do recorrente, e ressalvado eventual abuso, má-fé ou fraude, a ser verificado caso a caso, de acordo com as circunstâncias do caso concreto (inciso X).\" (REsp 1230060/PR, Rel. Ministra MARIA ISABEL GALLOTTI, SEGUNDA SEÇÃO, julgado em 13/08/2014, DJe 29/08/2014).\" (AgInt no REsp 1912863/SP, Rel. Ministro MARCO BUZZI, QUARTA TURMA, julgado em 09/11/2021, DJe 25/11/2021).\r\n\r\n\r\n\r\n3. O STJ também decidiu que \"A proteção conferida pela regra da impenhorabilidade abrange todos os valores depositados em conta-corrente, poupança ou outras aplicações financeiras.\" (AgInt no AREsp 1765059/PR, Rel. Ministro MARCO AURÉLIO BELLIZZE, TERCEIRA TURMA, julgado em 06/12/2021, DJe 09/12/2021).\r\n\r\n\r\n\r\n4. Esta Terceira Turma tem seguido a orientação jurisprudencial do STJ: PROCESSO: 08077280920254050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL ROGÉRIO DE MENESES FIALHO MOREIRA, 3ª TURMA, JULGAMENTO: 14/08/2025; PROCESSO Nº 0002642-90.2025.4.05.0000 – AGRAVO DE INSTRUMENTO. REL. DESEMBARGADOR FEDERAL CID MARCONI. Julg. 02/10/2025.\r\n\r\n\r\n\r\n5. Agravo de instrumento provido.", "relatorio": "Trata-se de agravo de instrumento, com pedido de antecipação da tutela recursal, interposto por EDILENE PAULO DA SILVA contra decisão proferida pelo Juízo da 7ª Vara Federal da Seção Judiciária de Pernambuco que, em cumprimento de sentença, indeferiu o pedido de desbloqueio de numerário constrito, via SISBAJUD, no importe de R$ 1.014,64 (um mil, quatorze reais e sessenta e quatro centavos).\r\n\r\n\r\n\r\nNas razões recursais, sustenta que a verba ostenta natureza impenhorável, porquanto seria valor não superior a 40 (quarenta) salários mínimos e que seria proveniente de remuneração, com caráter alimentar.\r\n\r\n\r\n\r\nIndeferida a liminar.\r\n\r\n\r\n\r\nContrarrazões apresentadas.\r\n\r\n\r\n\r\nÉ o que havia de relevante para relatar.", "voto": "A decisão recorrida indeferiu o pedido de liberação dos valores bloqueados em suas contas bancárias, no total de 1.014,64 (um mil, quatorze reais e sessenta e quatro centavos), através do sistema SISBAJUD.\r\n\r\n\r\n\r\nO Superior Tribunal de Justiça tem jurisprudência firmada no sentido de que, até o limite de 40 (quarenta) salários mínimos depositados em qualquer tipo de conta bancária, a impenhorabilidade deve ser respeitada, conforme regra do art. 833, X, do CPC\r\n\r\n\r\n\r\nDe fato, a pretensão recursal encontra fundamento no entendimento segundo o qual \"É impenhorável a quantia de até quarenta salários mínimos poupada, seja ela mantida em papel moeda, conta-corrente ou aplicada em caderneta de poupança propriamente dita, CDB, RDB ou em fundo de investimentos, desde que a única reserva monetária em nome do recorrente, e ressalvado eventual abuso, má-fé ou fraude, a ser verificado caso a caso, de acordo com as circunstâncias do caso concreto (inciso X).\" (REsp 1230060/PR, Rel. Ministra MARIA ISABEL GALLOTTI, SEGUNDA SEÇÃO, julgado em 13/08/2014, DJe 29/08/2014).\" (AgInt no REsp 1912863/SP, Rel. Ministro MARCO BUZZI, QUARTA TURMA, julgado em 09/11/2021, DJe 25/11/2021).\r\n\r\n\r\n\r\nNo mesmo sentido, o STJ também decidiu que \"A proteção conferida pela regra da impenhorabilidade abrange todos os valores depositados em conta-corrente, poupança ou outras aplicações financeiras.\" (AgInt no AREsp 1765059/PR, Rel. Ministro MARCO AURÉLIO BELLIZZE, TERCEIRA TURMA, julgado em 06/12/2021, DJe 09/12/2021).\r\n\r\n\r\n\r\nEsta Terceira Turma tem seguido essa orientação jurisprudencial, consoante de depreende dos seguintes precedentes:\r\n\r\n\r\n\r\nEXECUÇÃO FISCAL. AGRAVO DE INSTRUMENTO. EXCEÇÃO DE PRÉ-EXECUTIVIDADE. IMPENHORABILIDADE DE VALORES. ART. 833, X, DO CPC. SALDO INFERIOR A 40 SALÁRIOS-MÍNIMOS. LIBERAÇÃO DOS VALORES BLOQUEADOS. CITAÇÃO POR EDITAL. VALIDADE. PARCIAL PROVIMENTO.\r\n\r\n\r\n\r\n 1. Agravo de instrumento interposto por J E NOGUEIRA GONCALVES - ME, assistido pela Defensoria Pública da União, contra decisão proferida pelo Juízo da 10ª Vara Federal da Subseção de Mossoró/RN que rejeitou a exceção de pré-executividade a fim de indeferir o pedido de liberação de valores bloqueados na conta bancária do executado/agravante, sob o fundamento de que não restou provada a impenhorabilidade, nos termos do artigo 833, IV e X, do CPC.\r\n\r\n\r\n\r\n 2. A decisão agravada afastou a tese de nulidade da citação por edital da executada, após tentativa de citação por meio de oficial de justiça, pois entendeu plenamente atendido o teor da Súmula nº 414 do STJ (a citação por edital na execução fiscal é cabível quando frustradas as demais modalidades).\r\n\r\n\r\n\r\n 3. Nas razões recursais, o agravante aduz: a) a nulidade da citação por edital pelo não esgotamento dos meios de localização do requerido; b) a impenhorabilidade do saldo inferior a 40 salários-mínimos.\r\n\r\n\r\n\r\n 4. A decisão agravada, considerando não haver provas aptas a assegurar que as quantias bloqueadas são de conta poupança ou são fruto de reserva financeira do executado (R$ 3.947,12), admitiu que o referido valor poderia ser objeto da penhora.\r\n\r\n\r\n\r\n 5. Aplica-se à hipótese dos autos o entendimento de que \"É impenhorável a quantia de até quarenta salários mínimos poupada, seja ela mantida em papel moeda, conta-corrente ou aplicada em caderneta de poupança propriamente dita, CDB, RDB ou em fundo de investimentos, desde que a única reserva monetária em nome do recorrente, e ressalvado eventual abuso, má-fé ou fraude, a ser verificado caso a caso, de acordo com as circunstâncias do caso concreto (inciso X).\" (REsp 1230060/PR, Rel. Ministra MARIA ISABEL GALLOTTI, SEGUNDA SEÇÃO, julgado em 13/08/2014, DJe 29/08/2014).\" (AgInt no REsp 1912863/SP, Rel. Ministro MARCO BUZZI, QUARTA TURMA, julgado em 09/11/2021, DJe 25/11/2021).\r\n\r\n\r\n\r\n 6. No mesmo sentido, o STJ também decidiu que \"A proteção conferida pela regra da impenhorabilidade abrange todos os valores depositados em conta-corrente, poupança ou outras aplicações financeiras.\" (AgInt no AREsp 1765059/PR, Rel. Ministro MARCO AURÉLIO BELLIZZE, TERCEIRA TURMA, julgado em 06/12/2021, DJe 09/12/2021).\r\n\r\n\r\n\r\n 7. No que diz respeito à alegação de nulidade da citação por edital, tem-se que não merece prosperar, visto que, no REsp nº 1.103.050/BA, julgado sob a sistemática do art. 543-C do CPC, o Egrégio STJ decidiu que, \"Segundo o art. 8º da Lei 6.830/80, a citação por edital, na execução fiscal, somente é cabível quando não exitosas as outras modalidades de citação ali previstas: a citação por correio e a citação por Oficial de Justiça\".\r\n\r\n\r\n\r\n 8. Estabeleceu-se, então, em ordem sucessiva, a citação pelo correio com AR, por oficial de justiça e, uma vez frustradas uma e outra, só assim, por edital.\r\n\r\n\r\n\r\n 9. No recurso paradigma não se discutiu sobre a necessidade ou não de exaurimento de diligências, a ser empreendidas pelo exequente, tendentes a localizar o novo endereço do executado, a fim de permitir a citação pessoal dele.\r\n\r\n\r\n\r\n 10. A jurisprudência do STJ, como também desta Corte Regional, consolida-se no sentido de ser prescindível essa medida, bastando, como posto no recurso especial representativo da controvérsia, a frustração da citação pessoal do executado no endereço indicado pelo exequente na petição inicial, obtido a partir de informações do próprio devedor através de cadastros oficiais.\r\n\r\n\r\n\r\n 11. In casu, a citação por edital não é nula, pois foi antecedida pela tentativa de citação através de mandado cumprido por oficial de justiça no endereço cadastral.\r\n\r\n\r\n\r\n 12. Agravo de instrumento PARCIALMENTE PROVIDO para deferir o pedido de liberação de valores bloqueados na conta bancária do executado/agravante, e JULGO PREJUDICADO o agravo interno. (PROCESSO: 08077280920254050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL ROGÉRIO DE MENESES FIALHO MOREIRA, 3ª TURMA, JULGAMENTO: 14/08/2025)\r\n\r\n\r\n\r\nPROCESSUAL CIVIL. AGRAVO DE INSTRUMENTO. BLOQUEIO DE VALORES VIA SISBAJUD. CONTAS BANCÁRIAS. IMPENHORABILIDADE ATÉ O LIMITE DE 40 SALÁRIOS MÍNIMOS. LIBERAÇÃO. POSSIBILIDADE. RECURSO PROVIDO.\r\n\r\n\r\n\r\n 1. Agravo de Instrumento manejado pelo Particular e pela Empresa em face de decisão que, em sede de execução fiscal, indeferiu a petição das partes e manteve os bloqueios bancários.\r\n\r\n\r\n\r\n 2. Objetiva-se o desbloqueio da conta bancária da Caixa Econômica Federal no valor de R$ 54.988,40 (cinquenta mil, novecentos e oitenta e oito reais e quarenta centavos).\r\n\r\n\r\n\r\n 3. O uso do sistema de penhora on-line, via SISBAJUD, não pode afetar valores que garantam o sustento do executado, tais como benefícios previdenciários, salários, proventos etc., porquanto impenhoráveis conforme disposto no art. 833, IV.\r\n\r\n\r\n\r\n 4. A documentação carreada aos autos demonstra que, de fato, a conta de uma das executadas THEREZZA CRISTINA RODRIGUES DURANDO foi alvo da penhora via SISBAJUD no valor de R$ 54.988,40 (cinquenta mil, novecentos e oitenta e oito reais e quarenta centavos.\r\n\r\n\r\n\r\n 5. Nesse passo, os valores ali depositados, apenas poderiam ser penhorados na hipótese de pagamento de prestação alimentícia ou se as importâncias ultrapassarem 40 salários-mínimos, posto que estão revestidos pela impenhorabilidade, nos moldes preconizados pelo art. 833, IV, do CPC.\r\n\r\n\r\n\r\n 6. Agravo de instrumento provido, para determinar o desbloqueio dos valores constritos no valor total de R$ 54.988,40 (cinquenta mil, novecentos e oitenta e oito reais e quarenta centavos, referentes ao processo originário. (PROCESSO Nº 0002642-90.2025.4.05.0000 – AGRAVO DE INSTRUMENTO. REL. DESEMBARGADOR FEDERAL CID MARCONI. Julg. 02/10/2025).\r\n\r\n\r\n\r\nA hipótese é, pois, de se reconhecer a impenhorabilidade dos valores objeto da constrição, impondo-se o acolhimento do recurso.\r\n\r\n\r\n\r\nPosto isso, DOU PROVIMENTO ao agravo de instrumento.\r\n\r\n\r\n\r\nÉ como voto.", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\n Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, dar provimento ao agravo de instrumento, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Parcialmente provido", "css": "parcial", "obs_assessor": "﻿\r\n\r\n Poder Judiciário\r\n\r\n Tribunal Regional Federal da 5ª Região\r\n\r\n Gabinete do Desembargador Federal Rogério Fialho Moreira", "tem_obs_assessor": true, "assunto": "", "ramo": "Outros", "subgrupo": "", "subclasse": ""}, {"nome": "20260319_161743_Re__VOTO.0018561-39.2025.4.05.8401.VIRTUAL.09.04.2026", "nome_arq": "VOTO.0018561-39.2025.4.05.8401.VIRTUAL.09.04.2026", "cnj": "0018561-39.2025.4.05.8401", "cab": "0018561-39.2025.4.05.8401", "assessor": "Débora Cesário Regis Fazio", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "APELAÇÃO CÍVEL (198)", "polo_ativo": "MARIA ALCIONE ALMEIDA DA SILVA", "adv_polo_ativo": "FERNANDA FENTANES MOURA DE MELO - RN5164", "polo_passivo": "CAIXA ECONOMICA FEDERAL - CEF, FUNDO DE ARRENDAMENTO RESIDENCIAL", "adv_polo_passivo": "MURILO MARIZ DE FARIA NETO - RN5691-A", "ementa": "PROCESSUAL CIVIL.  DANOS FÍSICOS EM IMÓVEL. VÍCIOS DE CONSTRUÇÃO. EXTINÇÃO DO PROCESSO SEM RESOLUÇÃO DO MÉRITO. NÃO APRESENTAÇÃO DO CONTRATO. APRESENTAÇÃO DE TERMO DE ENTREGA DO IMÓVEL. COMPROVAÇÃO DE FINANCIAMENTO HABITACIONAL COM RECURSOS DO FUNDO DE ARRENDAMENTO RESIDENCIAL – FAR. INDEFERIMENTO DA PETIÇÃO INICIAL AFASTADA. ANULAÇÃO DA SENTENÇA. APELAÇÃO PROVIDA.\r\n\r\n\r\n\r\n 1. Apelação interposta pela parte autora contra sentença que, na presente ação de reparação de danos decorrentes de vícios de construção em imóvel objeto de financiamento habitacional, indeferiu a petição inicial, extinguindo o processo sem resolução do mérito, nos termos dos artigos 485, I, do CPC.\r\n\r\n\r\n\r\n 2. Entendeu o julgador de origem que a petição inicial não veio acompanhada do contrato referente à aquisição do imóvel, considerando-o documento indispensável para a propositura de ação que discute as responsabilidades decorrentes do ajuste.\r\n\r\n\r\n\r\n 3. A jurisprudência deste Tribunal segue no sentido de reconhecer a inexistência de responsabilidade da CEF, e a consequente ilegitimidade passiva  ad causam, por danos decorrentes de vícios de construção, quando se limita a financiar a compra do imóvel, sem a participação em nenhuma etapa da respectiva edificação. Disso resulta que, em regra, a cópia do contrato de financiamento do imóvel mostra-se, de fato, indispensável para se aferir se a Caixa é parte legítima para figurar no polo passivo do feito, por ser o documento apto a demonstrar a natureza do vínculo entre as partes.\r\n\r\n\r\n\r\n 4. Diversamente do considerado na sentença, o Termo de Entrega do Imóvel anexado aos autos pela parte autora se mostra suficiente para suprir a necessidade de apresentação do contrato, por trazer informação no sentido de comprovar  que o imóvel em questão foi financiado no âmbito do Programa \"Minha Casa, Minha Vida\" (PMCMV) - Faixa I, adquirido por meio de recurso do FAR, hipótese em se reconhece a legitimidade passiva da CEF, à teor do entendimento desta Corte (PROCESSO: 08001215620204058103, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL CID MARCONI GURGEL DE SOUZA, 3ª TURMA, JULGAMENTO: 17/07/2025). Indeferimento da petição inicial afastada.\r\n\r\n\r\n\r\n 5. Apelação provida, para anular a sentença, com a determinação de retorno dos autos ao juízo de origem para o regular prosseguimento do feito, por não se encontrar a ação em condições de imediato julgamento (art. 1013, §º3, do CPC).", "relatorio": "Trata-se de apelação interposta pela parte autora contra sentença que, na presente ação de reparação de danos decorrentes de vícios de construção em imóvel objeto de financiamento habitacional, indeferiu a petição inicial, extinguindo o processo sem resolução do mérito, nos termos dos artigos 485, I, do CPC.\r\n\r\n\r\n\r\n Alega-se, em síntese, nas razões de recurso:\r\n\r\n\r\n\r\n(a) Mostra-se indevido o indeferimento da petição inicial em razão da não apresentação do contrato de financiamento habitacional pela parte autora/recorrente.\r\n\r\n\r\n\r\n(b) Afigura-se evidente que a instituição bancária possui mais condições de exibir o contrato de arrendamento residencial. O banco dispõe dos elementos necessários à juntada do instrumento. O contrato firmado encontra-se exclusivamente sob a posse da recorrida, estando, portanto, em seu banco de dados. Qualquer via que eventualmente fosse solicitada administrativamente pelo recorrente seria fornecida mediante o acesso da apelada ao seu repositório. É tanto que ao contestar outras ações idênticas, em outros comarcas, a CEF juntou aos autos o contrato firmado, do que se denota o livre acesso da instituição ao documento, em contraposição à situação dos apelantes.\r\n\r\n\r\n\r\n(c) Deve ser reconhecida a inversão do ônus da prova, diante da inequívoca hipossuficiência da parte recorrente em cumprir o ônus probatório e produzir prova diabólica, somado a maior facilidade de obtenção da prova do fato pela instituição ré.\r\n\r\n\r\n\r\n(d) Além do princípio da isonomia, é possível relacionar à distribuição dinâmica do ônus da prova também o princípio do acesso à jurisdição, pois evita situação em que a parte precisa produzir prova diabólica, o que inutilizaria tal acesso, e até mesmo em consonância com o princípio da cooperação, nos termos do art. 6º do CPC.\r\n\r\n\r\n\r\n Contrarrazões apresentadas.\r\n\r\n\r\n\r\n É o relatório.\r\n\r\n\r\n\r\nPROCESSO Nº 0018561-39.2025.4.05.8401\r\n\r\n CLASSE: APELAÇÃO CÍVEL (198)\r\n\r\n ASSUNTO:[DIREITO DE IMAGEM, DIREITO DE IMAGEM]\r\n\r\n APELANTE: MARIA ALCIONE ALMEIDA DA SILVA\r\n\r\n ADVOGADO DO(A) APELANTE: FERNANDA FENTANES MOURA DE MELO - RN5164\r\n\r\n APELADO: CAIXA ECONOMICA FEDERAL - CEF, FUNDO DE ARRENDAMENTO RESIDENCIAL\r\n\r\n ADVOGADO DO(A) APELADO: MURILO MARIZ DE FARIA NETO - RN5691-A", "voto": "A sentença recorrida extinguiu, sem resolução do mérito, ação ajuizada contra a Caixa Econômica Federal, objetivando a reparação de danos decorrentes de vícios de construção em imóvel objeto de financiamento habitacional.\r\n\r\n\r\n\r\n Entendeu o julgador de origem que a petição inicial não veio acompanhada do contrato referente à aquisição do imóvel, considerando-o documento indispensável para a propositura de ação que discute as responsabilidades decorrentes do ajuste.\r\n\r\n\r\n\r\n A jurisprudência deste Tribunal segue no sentido de reconhecer a inexistência de responsabilidade da CEF, e a consequente ilegitimidade passiva ad causam, por danos decorrentes de vícios de construção, quando se limita a financiar a compra do imóvel, sem a participação em nenhuma etapa da respectiva edificação.\r\n\r\n\r\n\r\n Disso resulta que, em regra, a cópia do contrato de financiamento do imóvel mostra-se, de fato, indispensável para se aferir se a Caixa é parte legítima para figurar no polo passivo do feito, por ser o documento apto a demonstrar a natureza do vínculo entre as partes.\r\n\r\n\r\n\r\n Ocorre que, diversamente do considerado na sentença, o Termo de Entrega do Imóvel anexado aos autos pela parte autora se mostra suficiente para suprir a necessidade de apresentação do contrato, por trazer informação no sentido de comprovar  que o imóvel em questão foi financiado no âmbito do Programa \"Minha Casa, Minha Vida\" (PMCMV) - Faixa I, adquirido por meio de recurso do FAR, hipótese em se reconhece a legitimidade passiva da CEF, à teor do entendimento desta Corte (PROCESSO: 08001215620204058103, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL CID MARCONI GURGEL DE SOUZA, 3ª TURMA, JULGAMENTO: 17/07/2025).\r\n\r\n\r\n\r\n Diante disso, impõe-se afastar o indeferimento da petição inicial, pelo que dou provimento à apelação para anular a sentença, determinando o retorno dos autos ao juízo de origem para o regular prosseguimento do feito, por não se encontrar a ação em condições de imediato julgamento (art. 1013, §º3, do CPC).\r\n\r\n\r\n\r\n É como voto.\r\n\r\n\r\n\r\nPROCESSO Nº 0018561-39.2025.4.05.8401\r\n\r\n CLASSE: APELAÇÃO CÍVEL (198)\r\n\r\n ASSUNTO:[DIREITO DE IMAGEM, DIREITO DE IMAGEM]\r\n\r\n APELANTE: MARIA ALCIONE ALMEIDA DA SILVA\r\n\r\n ADVOGADO DO(A) APELANTE: FERNANDA FENTANES MOURA DE MELO - RN5164\r\n\r\n APELADO: CAIXA ECONOMICA FEDERAL - CEF, FUNDO DE ARRENDAMENTO RESIDENCIAL\r\n\r\n ADVOGADO DO(A) APELADO: MURILO MARIZ DE FARIA NETO - RN5691-A", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\n Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, DAR PROVIMENTO à apelação, nos termos do voto do relator e na forma do relatório constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Provido", "css": "provido", "obs_assessor": "﻿", "tem_obs_assessor": false, "assunto": "[DIREITO DE IMAGEM, DIREITO DE IMAGEM]", "ramo": "Outros", "subgrupo": "", "subclasse": ""}, {"nome": "20260319_161855_Re__VOTO.ED.0809969-24.2021.4.05.8300.VIRTUAL.09.04.2026", "nome_arq": "VOTO.ED.0809969-24.2021.4.05.8300.VIRTUAL.09.04.2026", "cnj": "0809969-24.2021.4.05.8300", "cab": "0809969-24.2021.4.05.8300", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "MARIA JOSIENE LOPES CAVALCANTI e outro", "adv_polo_ativo": "Fabiano Parente De Carvalho", "polo_passivo": "UNIÃO FEDERAL", "adv_polo_passivo": "Não informado", "ementa": "EMBARGOS DE DECLARAÇÃO. EXECUÇÃO DE SENTENÇA. HABILITAÇÃO DE HERDEIROS DE SERVIDOR FALECIDO. PRESCRIÇÃO INTERCORRENTE. AUSÊNCIA DE OMISSÃO. TENTATIVA DE REDISCUSSÃO DO MÉRITO. AGRAVO INTERNO. JULGAMENTO COMO PREJUDICADO. MATÉRIA JÁ APRECIADA. EMBARGOS CONHECIDOS E IMPROVIDOS.\r\n\r\n\r\n\r\n1. Embargos de declaração opostos pela UNIÃO FEDERAL em face do acórdão proferido por esta 3ª Turma em 18 de setembro de 2025, nos autos da Apelação Cível nº 0809969-24.2021.4.05.8300, que conheceu e negou provimento aos embargos de declaração anteriormente opostos pela União e julgou prejudicado o agravo interno.\r\n\r\n\r\n\r\n2. Nos presentes segundos embargos de declaração, a União sustenta, em síntese, que o julgamento do agravo interno como prejudicado configurou omissão sobre matéria de ordem pública — especificamente, a prescrição da pretensão executória — que poderia e deveria ter sido conhecida de ofício. Argumenta que, desde o cumprimento integral da obrigação de fazer (comprovado em março de 2008), decorreu prazo superior a quinze anos antes do ajuizamento do cumprimento de sentença em maio de 2021, de modo que a prescrição da obrigação de pagar estaria consumada, seja pelo prazo quinquenal previsto no Decreto nº 20.910/32, seja a partir do trânsito em julgado da decisão de liquidação no STF (03/09/2015).\r\n\r\n\r\n\r\n3. A alegação de omissão quanto à prescrição da pretensão executória não prospera quando o acórdão embargado, de forma expressa e fundamentada, estabeleceu que a morte da parte suspende imediatamente o processo e que, diante da ausência de prazo legal para a habilitação dos sucessores, não há falar em prescrição intercorrente — o que lógica e necessariamente abrange qualquer modalidade prescricional invocada em sentido contrário.\r\n\r\n\r\n\r\n4. O julgamento do agravo interno como prejudicado, após o conhecimento e improvimento dos embargos de declaração originários, constitui decisão tecnicamente adequada, visto que a matéria nele veiculada havia sido integralmente apreciada por ocasião do julgamento da apelação, sendo o agravo mero instrumento para devolver à Turma a cognição que fora negada monocraticamente — cognição essa já realizada pelo Colegiado.\r\n\r\n\r\n\r\n5. A União pretende, sob o rótulo de omissão sobre matéria de ordem pública, reprocessar tese prescricional que o acórdão de mérito apreciou exaustivamente, o que não se admite na via estreita dos embargos de declaração.\r\n\r\n\r\n\r\n6. Embargos de declaração conhecidos e improvidos.", "relatorio": "Trata-se de embargos de declaração opostos pela UNIÃO FEDERAL em face do acórdão proferido por esta 3ª Turma em 18 de setembro de 2025, nos autos da Apelação Cível nº 0809969-24.2021.4.05.8300, que conheceu e negou provimento aos embargos de declaração anteriormente opostos pela União e julgou prejudicado o agravo interno.\r\n\r\n\r\n\r\nO histórico processual relevante é o seguinte: as apelantes MARIA JOSIENE LOPES CAVALCANTI e MARIA DOROTHEA PEIXOTO MOURY FERNANDES, na qualidade de herdeiras de servidor falecido, promoveram cumprimento de sentença com lastro em título judicial coletivo formado nos autos do Processo nº 0001398-50.1991.4.05.8300, transitado em julgado em 21/11/2001. O juízo de primeiro grau decretou a prescrição intercorrente da pretensão executiva. A apelação foi provida por esta Turma, que assentou a inocorrência de prescrição, dado que a morte da parte suspende imediatamente o processo e inexiste prazo legal para habilitação dos sucessores.\r\n\r\n\r\n\r\nContra esse acórdão de mérito, a União opôs primeiros embargos de declaração, os quais foram inicialmente não conhecidos pelo Relator por decisão monocrática, tendo a embargante interposto agravo interno. Por ocasião do julgamento colegiado, os embargos foram conhecidos e improvidos, e o agravo interno foi julgado prejudicado, por acórdão de 18 de setembro de 2025.\r\n\r\n\r\n\r\nNos presentes segundos embargos de declaração, a União sustenta, em síntese, que o julgamento do agravo interno como prejudicado configurou omissão sobre matéria de ordem pública — especificamente, a prescrição da pretensão executória — que poderia e deveria ter sido conhecida de ofício. Argumenta que, desde o cumprimento integral da obrigação de fazer (comprovado em março de 2008), decorreu prazo superior a quinze anos antes do ajuizamento do cumprimento de sentença em maio de 2021, de modo que a prescrição da obrigação de pagar estaria consumada, seja pelo prazo quinquenal previsto no Decreto nº 20.910/32, seja a partir do trânsito em julgado da decisão de liquidação no STF (03/09/2015).\r\n\r\n\r\n\r\nSem contrarrazões\r\n\r\n\r\n\r\n É o relatório.", "voto": "A União sustenta que, ao julgar o agravo interno como prejudicado, o acórdão embargado teria deixado de apreciar matéria de ordem pública — a prescrição da pretensão executória —, a qual poderia ser examinada de ofício.\r\n\r\n\r\n\r\nO argumento não prospera.\r\n\r\n\r\n\r\nO agravo interno foi interposto pela União exclusivamente para levar ao Colegiado a cognição que havia sido negada pelo Relator em decisão monocrática de não conhecimento dos primeiros embargos de declaração. Com o conhecimento dos embargos pelo próprio Colegiado — o que ocorreu expressamente na sessão de 18/09/2025 —, o agravo interno perdeu seu objeto funcional: o pronunciamento colegiado que ele pretendia provocar foi realizado. Daí o acerto técnico do julgamento como prejudicado.\r\n\r\n\r\n\r\nNão há, nesse ponto, omissão alguma. O que se busca, em realidade, é que o Colegiado examine, agora pela terceira vez, a mesma tese prescricional deduzida no agravo interno — tese que, repita-se, já havia sido enfrentada tanto no acórdão que julgou a apelação quanto no acórdão que apreciou os primeiros embargos de declaração.\r\n\r\n\r\n\r\nA União sustenta que a prescrição, por ser matéria de ordem pública, poderia ser reconhecida a qualquer tempo e que o acórdão embargado deixou de enfrentá-la.\r\n\r\n\r\n\r\nA premissa da cognoscibilidade de ofício da prescrição é juridicamente correta. Contudo, sua invocação não socorre a embargante no presente caso, porque a prescrição foi efetivamente examinada e afastada pelo acórdão que julgou a apelação, cujos fundamentos foram reafirmados pelo acórdão que julgou os primeiros embargos de declaração.\r\n\r\n\r\n\r\nO acórdão de mérito não silenciou sobre a prescrição — dedicou-lhe seis dos oito itens de sua ementa, construindo fundamentação detalhada sobre a suspensão do processo pela morte da parte, a ausência de prazo para habilitação dos sucessores e a impossibilidade de transmissão da prescrição que corria contra o falecido. O acórdão dos primeiros embargos foi igualmente explícito ao consignar que \"não há que se falar em prescrição, portanto, independente do momento em que foram fornecidas as fichas financeiras necessárias ao adimplemento da obrigação de fazer, considerando-se que a hipótese é de suspensão do prazo prescricional.\"\r\n\r\n\r\n\r\nEsse enunciado é suficientemente abrangente para alcançar a tese ora reiterada pela União. Ao afirmar que a suspensão do prazo prescricional decorrente da morte da parte opera independentemente do marco temporal ligado ao cumprimento da obrigação de fazer, o julgado respondeu, ainda que implicitamente, ao argumento da prescrição da obrigação de pagar a partir de março de 2008 ou de setembro de 2015.\r\n\r\n\r\n\r\nNão se identifica, no acórdão embargado, qualquer vício integrativo passível de correção pela via dos embargos de declaração. Não há omissão sobre ponto ou questão que devesse ter sido examinado e não o foi. Não há contradição entre as premissas adotadas e as conclusões alcançadas. Não há obscuridade que impeça a exata compreensão do alcance do julgado. Não há erro material.\r\n\r\n\r\n\r\nPosto isso, CONHEÇO E NEGO PROVIMENTO aos embargos de declaração.\r\n\r\n\r\n\r\n É como voto.", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\nDecide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, CONHECER E NEGAR PROVIMENTO aos embargos de declaração, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido", "obs_assessor": "﻿", "tem_obs_assessor": false, "assunto": "", "ramo": "Outros", "subgrupo": "", "subclasse": "Embargos de Declaração"}, {"nome": "20260319_161931_Re__VOTO.0800534-84.2025.4.05.8300.VIRTUAL.09.04.2026", "nome_arq": "VOTO.0800534-84.2025.4.05.8300.VIRTUAL.09.04.2026", "cnj": "0800534-84.2025.4.05.8300", "cab": "0800534-84.2025.4.05.8300", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "ORDEM DOS ADVOGADOS DO BRASIL SECAO DE PERNAMBUCO - OAB/PE", "adv_polo_ativo": "GUILHERME OSVALDO CRISANTO TAVARES DE MELO - PE16295", "polo_passivo": "JOANA DE OLIVEIRA", "adv_polo_passivo": "Não informado", "ementa": "PROCESSUAL CIVIL. EXECUÇÃO DE TÍTULO EXTRAJUDICIAL. OAB. COBRANÇA DE ANUIDADES. PRESCRIÇÃO. TERMO INICIAL. ART. 8º DA LEI Nº 12.514/2011. VALOR MÍNIMO PARA AJUIZAMENTO. CONDIÇÃO DE EXEQUIBILIDADE. INÍCIO DA CONTAGEM DO PRAZO PRESCRICIONAL. PROVIMENTO DA APELAÇÃO.\r\n\r\n\r\n\r\n1. Apelação interposta pela Ordem dos Advogados do Brasil – Seccional Pernambuco (OAB/PE) contra sentença proferida pelo Juízo da 10ª Vara Federal da Seção Judiciária de Pernambuco, que, nos autos de execução de título extrajudicial ajuizada em face de Joana de Oliveira, extinguiu o processo com resolução de mérito, em razão do reconhecimento da prescrição da pretensão executória.\r\n\r\n\r\n\r\n2. As anuidades devidas à Ordem dos Advogados do Brasil possuem natureza cível, submetendo-se ao prazo prescricional quinquenal previsto no art. 206, §5º, I, do Código Civil.\r\n\r\n\r\n\r\n3. O art. 8º da Lei nº 12.514/2011 estabelece limitação objetiva ao ajuizamento de execuções por conselhos profissionais, vedando a cobrança judicial de valores inferiores ao correspondente a cinco anuidades.\r\n\r\n\r\n\r\n4. Tal limitação configura condição legal de exequibilidade do crédito, impedindo o exercício da pretensão executória enquanto não atingido o valor mínimo, circunstância que afasta a fluência do prazo prescricional nesse período.\r\n\r\n\r\n\r\n5. O termo inicial da prescrição deve ser fixado no momento em que o crédito se torna juridicamente exequível, e não no mero vencimento das anuidades, sob pena de inviabilizar o exercício do direito de ação. Precedente: AgInt no AREsp n. 1.011.326/SC, relator Ministro Sérgio Kukina, Primeira Turma, julgado em 14/5/2019, DJe de 17/5/2019.\r\n\r\n\r\n\r\n6. No caso concreto, tendo o crédito atingido o valor mínimo apenas em 2022 e a execução sido ajuizada em 2025, não se configura a prescrição quinquenal.\r\n\r\n\r\n\r\n7. Apelação provida.", "relatorio": "Trata-se de Apelação interposta pela Ordem dos Advogados do Brasil – Seccional Pernambuco (OAB/PE) contra sentença proferida pelo Juízo da 10ª Vara Federal da Seção Judiciária de Pernambuco, que, nos autos de execução de título extrajudicial ajuizada em face de Joana de Oliveira, extinguiu o processo com resolução de mérito, em razão do reconhecimento da prescrição da pretensão executória.\r\n\r\n\r\n\r\nA sentença reconheceu a incidência do prazo prescricional quinquenal previsto no art. 206, §5º, I, do Código Civil, entendendo que, embora houvesse ação anterior ajuizada em 2018 — posteriormente extinta sem resolução de mérito —, a nova execução somente foi proposta em 2025, quando já transcorrido lapso temporal superior a cinco anos em relação às anuidades cobradas (2014 e 2015).\r\n\r\n\r\n\r\nEm suas razões recursais, a apelante defende a inocorrência de prescrição, ao argumento de que o crédito somente se tornou exequível quando atingido o valor mínimo exigido pelo art. 8º da Lei nº 12.514/2011, correspondente a cinco anuidades. Afirma que, até então, havia impedimento legal ao ajuizamento da execução, razão pela qual o prazo prescricional não poderia fluir. Sustenta que o montante mínimo foi alcançado apenas em 2022, de modo que a execução ajuizada em 2025 estaria dentro do prazo quinquenal. Requer, ao final, o provimento da apelação para reformar a sentença e determinar o prosseguimento da execução.\r\n\r\n\r\n\r\nSem contrarrazões.\r\n\r\n\r\n\r\nÉ o relatório.", "voto": "A controvérsia cinge-se à definição do termo inicial do prazo prescricional para a cobrança judicial das anuidades devidas à OAB, especificamente se tal prazo deve ser contado a partir do vencimento das obrigações ou do momento em que o crédito se torna juridicamente exequível.\r\n\r\n\r\n\r\nA sentença recorrida adotou como marco inicial o vencimento das anuidades (2014 e 2015), aplicando o prazo quinquenal previsto no art. 206, §5º, I, do Código Civil, concluindo pela ocorrência da prescrição.\r\n\r\n\r\n\r\nTodavia, a hipótese dos autos demanda interpretação sistemática do ordenamento jurídico, especialmente à luz do art. 8º da Lei nº 12.514/2011, que estabelece limitação objetiva ao ajuizamento de execuções pelos conselhos profissionais, vedando a cobrança judicial de valores inferiores ao equivalente a cinco anuidades.\r\n\r\n\r\n\r\nTal dispositivo não se limita a mera faculdade administrativa, mas configura verdadeira condição legal para o exercício da pretensão executória, na medida em que impede o acesso ao Judiciário enquanto não atingido o patamar mínimo estabelecido.\r\n\r\n\r\n\r\nNesse contexto, não se mostra juridicamente adequado considerar como termo inicial da prescrição momento em que a própria lei obsta o exercício da pretensão, sob pena de se admitir a fluência de prazo prescricional em período no qual o titular do direito não dispunha de meios legais para exercê-lo.\r\n\r\n\r\n\r\nAssim, a exigibilidade plena do crédito — para fins de cobrança judicial — apenas se configura quando atendido o requisito legal do valor mínimo, circunstância que deve ser considerada como marco inicial da contagem do prazo prescricional.\r\n\r\n\r\n\r\nNesse sentido, dentre outros, confira-se:\r\n\r\n\r\n\r\nTRIBUTÁRIO. PROCESSUAL CIVIL. ANUIDADE DE CONSELHO PROFISSIONAL. LEI 12.514/2011. VALOR MÍNIMO. EXECUÇÃO FISCAL. PRESCRIÇÃO. TERMO INICIAL.\r\n\r\n\r\n\r\n1. Firmou-se no Superior Tribunal de Justiça o entendimento de que, à luz do art. 8º da Lei 12.514/2011, a propositura de executivo fiscal fica limitada à existência do valor mínimo correspondente a 4 (quatro) anuidades, sendo certo que o prazo prescricional para o seu ajuizamento deve ter início somente quando o crédito tornar-se exequível. Precedentes: REsp 1.664.389/SC, Rel. Min. Og Fernandes, Segunda Turma, DJe 16/2/2018; REsp 1.694.153/RS, Rel. Ministro Herman Benjamin, Segunda Turma, DJe 19/12/2017; REsp 1.684.742/RS, Rel. Min. Regina Helena Costa, decisão monocrática, DJe 17/10/2018; REsp 1.467.576/PR, Rel. Min. Napoleão Nunes Maia Filho, decisão monocrática, DJe 20/11/2018.\r\n\r\n\r\n\r\n2. Agravo interno não provido. (AgInt no AREsp n. 1.011.326/SC, relator Ministro Sérgio Kukina, Primeira Turma, julgado em 14/5/2019, DJe de 17/5/2019.)\r\n\r\n\r\n\r\nNo caso dos autos, verifica-se que o crédito apenas atingiu o patamar mínimo exigido pelo art. 8º da Lei nº 12.514/2011 em 2022, conforme alegado pela apelante com base na atualização do débito trazido à colação; e a presente execução foi ajuizada em 03/01/2025.\r\n\r\n\r\n\r\nDiante desse cenário, evidencia-se que, até o momento em que o crédito atingiu o valor mínimo legal, encontrava-se inviabilizado o exercício da pretensão executória, circunstância que impede o reconhecimento da fluência do prazo prescricional em sua plenitude.\r\n\r\n\r\n\r\nAdotando-se, portanto, como marco inicial da prescrição o momento em que o crédito se tornou exequível (2022), conclui-se que o ajuizamento da ação em 2025 ocorreu dentro do prazo quinquenal, não havendo que se falar em prescrição. A sentença recorrida, ao desconsiderar essa limitação legal e fixar o termo inicial no vencimento das anuidades, acabou por antecipar indevidamente o curso da prescrição, o que impõe sua reforma.\r\n\r\n\r\n\r\nPosto isso, DOU PROVIMENTO à apelação.\r\n\r\n\r\n\r\nÉ como voto.", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\nDecide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, DAR PROVIMENTO à apelação, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido", "obs_assessor": "﻿", "tem_obs_assessor": false, "assunto": "", "ramo": "Outros", "subgrupo": "", "subclasse": ""}, {"nome": "20260319_162203_Re__VOTO.0005174-37.2025.4.05.0000.VIRTUAL.09.04.2026", "nome_arq": "VOTO.0005174-37.2025.4.05.0000.VIRTUAL.09.04.2026", "cnj": "0005174-37.2025.4.05.0000", "cab": "0005174-37.2025.4.05.0000", "assessor": "Ariel C. Santana", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "CENTRO BRASILEIRO DE PESQUISA EM AVALIACAO E SELECAO E DE PROMOCAO DE EVENTOS - CEBRASPE", "adv_polo_ativo": "DANIEL BARBOSA SANTOS - DF13147", "polo_passivo": "ANDREA STEPHANIE DE LIMA DINIZ", "adv_polo_passivo": "MARIA HELOISA LEAL CAVALCANTI - PE63060", "ementa": "ADMINISTRATIVO. PROCESSUAL CIVIL. AGRAVO DE INSTRUMENTO. CONCURSO PÚBLICO. AVALIAÇÃO DE TÍTULOS. INDEFERIMENTO DA PONTUAÇÃO. DECLARAÇÃO DO CRO/PE. EXIGÊNCIA EDITALÍCIA CUMPRIDA. TEMA 485 DO STF. VÍCIO DE MOTIVAÇÃO EVIDENCIADO. POSSIBILIDADE DE INTERVENÇÃO DO PODER JUDICIÁRIO. AGRAVO DE INSTRUMENTO IMPROVIDO. AGRAVO INTERNO PREJUDICADO.\r\n\r\n\r\n\r\n 1. Agravo de instrumento, com pedido de atribuição de efeito suspensivo, interposto pelo CENTRO BRASILEIRO DE PESQUISA EM AVALIAÇÃO E SELEÇÃO E DE PROMOÇÃO DE EVENTOS - Cebraspe contra decisão proferida pelo Juízo da 2ª Cara Federal da Seção Judiciária de Sergipe que deferiu o pedido de liminar para determinar à autoridade coatora que proceda à imediata atribuição da pontuação referente à experiência profissional comprovada pela impetrante, nos termos da alínea \"E\" da tabela de títulos do Edital nº 1/2024-CPNUJE.\r\n\r\n\r\n\r\n 2. Nas razões recursais, traz os seguintes argumentos: a) a agravada é candidata ao Cargo 14: Analista Judiciário - Área: Apoio Especializado - Especialidade: Odontologia; b) o edital é \"a lei do concurso\" devendo a ele a observância estrita; c) a agravada não recebeu a pontuação relativa à alínea \"E\" do quadro de títulos pois a declaração enviada não atesta ter sido emitida pelo setor de recursos humanos, em desacordo com a letra b do subitem 11.11.5 do EDITAL Nº 1 - CPNUJE, DE 27 de maio de 2024, conforme espelho de avaliação provisória; d) a agravada não atendeu aos requisitos exigidos, pois, para comprovar sua experiência profissional, apresentou declaração que não foi emitida por órgão de pessoal ou de recursos humanos, o que contraria a letra b do subitem 11.11.5 do EDITAL Nº 1 - CPNUJE, DE 27 de maio de 2024; e) o STF já ficou o entendimento vinculante de que \"não compete ao Poder Judiciário substituir a banca examinadora para reexaminar o conteúdo das questões e os critérios de correção utilizados\" (Tema 485 - RG), não se encontrando o caso concreto entre as exceções ali previstas; f) a violação ao princípio da isonomia; g) a manutenção da decisão agravada com o atendimento do pleito da Agravada, sem o devido lastro probatório, refletirá verdadeira flexibilização das regras editalícias apenas para um candidato, bem como inverterá a prioridade normal da supremacia do interesse público sobre o privado.\r\n\r\n\r\n\r\n 3. A questão apresentada não versa sobre juízo de valor ou critério técnico-subjetivo - o \"mérito administrativo\" ao qual a Doutrina Chenery exige deferência -, mas sim sobre a legalidade de um ato vinculado e a análise de um fato objetivo.\r\n\r\n\r\n\r\n 4. O Edital nº 1 – CPNUJE, de 27 de maio de 2024, exigia que a declaração emitida pelo CRO/PE consignasse expressamente a inexistência de órgão de Recursos Humanos (RH), razão pela qual o indeferimento da pontuação pela banca examinadora fundamentou-se na suposta ausência dessa informação. Ocorre que a declaração apresentada pela agravada contém, de forma expressa, o dado exigido, de modo que, ao indeferir a pontuação com base em premissa fática comprovadamente inverídica, o ato administrativo incorreu em vício de motivo, tornando-se ilegal e nulo.\r\n\r\n\r\n\r\n 5. A atuação judicial, neste contexto, não implica substituição do critério avaliativo da banca, limitando-se a constatar que o documento apresentado cumpriu o requisito formal e literal do Edital (a lei do certame), hipótese que se insere na ressalva contida na parte final do Tema 485 da repercussão geral.\r\n\r\n\r\n\r\n 6. A reversão da decisão impugnada gera risco de dano irreparável à esfera jurídica da impetrante, ao passo que a revaloração documental até o julgamento final concilia a urgência do candidato com o respeito aos princípios acima referidos.\r\n\r\n\r\n\r\n 7. Agravo de instrumento improvido. Agravo interno prejudicado.", "relatorio": "Trata-se de agravo de instrumento, com pedido de atribuição de efeito suspensivo, interposto pelo CENTRO BRASILEIRO DE PESQUISA EM AVALIAÇÃO E SELEÇÃO E DE PROMOÇÃO DE EVENTOS - Cebraspe contra decisão proferida pelo Juízo da 2ª Cara Federal da Seção Judiciária de Sergipe que deferiu o pedido de liminar para determinar à autoridade coatora que proceda à imediata atribuição da pontuação referente à experiência profissional comprovada pela impetrante, nos termos da alínea \"E\" da tabela de títulos do Edital nº 1/2024-CPNUJE.\r\n\r\n\r\n\r\n Nas razões recursais, traz os seguintes argumentos: a) a agravada é candidata ao Cargo 14: Analista Judiciário - Área: Apoio Especializado - Especialidade: Odontologia; b) o edital é \"a lei do concurso\" devendo a ele a observância estrita; c) a agravada não recebeu a pontuação relativa à alínea \"E\" do quadro de títulos pois a declaração enviada não atesta ter sido emitida pelo setor de recursos humanos, em desacordo com a letra b do subitem 11.11.5 do EDITAL Nº 1 - CPNUJE, DE 27 de maio de 2024, conforme espelho de avaliação provisória; d) a agravada não atendeu aos requisitos exigidos, pois, para comprovar sua experiência profissional, apresentou declaração que não foi emitida por órgão de pessoal ou de recursos humanos, o que contraria a letra b do subitem 11.11.5 do EDITAL Nº 1 - CPNUJE, DE 27 de maio de 2024; e) o STF já ficou o entendimento vinculante de que \"não compete ao Poder Judiciário substituir a banca examinadora para reexaminar o conteúdo das questões e os critérios de correção utilizados\" (Tema 485 - RG), não se encontrando o caso concreto entre as exceções ali previstas; f) a violação ao princípio da isonomia; g) a manutenção da decisão agravada com o atendimento do pleito da Agravada, sem o devido lastro probatório, refletirá verdadeira flexibilização das regras editalícias apenas para um candidato, bem como inverterá a prioridade normal da supremacia do interesse público sobre o privado.\r\n\r\n\r\n\r\n Pedido de antecipação de tutela recursal indeferido (Id. 4051841).\r\n\r\n\r\n\r\n Sem contrarrazões.\r\n\r\n\r\n\r\n Agravo interno interposto pelo Centro Brasileiro de Pesquisa em Avaliação e Seleção e de Promoção de Eventos – CEBRASPE (Id. 4911808).\r\n\r\n\r\n\r\n É o relatório.", "voto": "Por ocasião do pedido de atribuição de efeito suspensivo, o indeferi, nos seguintes termos:\r\n\r\n\r\n\r\n “(...) No caso dos autos, entendo, em sede de cognição sumária, própria das decisões liminares, que não estão presentes os requisitos para o deferimento do pedido antecipatório.\r\n\r\n\r\n\r\n Explico.\r\n\r\n\r\n\r\n A questão apresentada não versa sobre juízo de valor ou critério técnico-subjetivo - o \"mérito administrativo\" ao qual a Doutrina Chenery exige deferência -, mas sim sobre a legalidade de um ato vinculado e a análise de um fato objetivo.\r\n\r\n\r\n\r\n Da leitura atenta dos autos, é possível extrair que:\r\n\r\n\r\n\r\n i) o Edital exigia que a declaração do CRO/PE mencionasse a inexistência de órgão de Recursos Humanos (RH);\r\n\r\n\r\n\r\n ii) o motivo do indeferimento da banca foi justamente a alegada ausência dessa declaração;\r\n\r\n\r\n\r\n iii) a declaração da agravada contém expressamente a informação exigida, assim, ao indeferir a pontuação com base em uma premissa fática comprovadamente falsa, o ato da banca incorreu em vício no motivo, tornando-o ilegal e nulo;\r\n\r\n\r\n\r\n iv) a atuação judicial, neste contexto, não substitui o critério da banca, limitando-se a constatar que o documento apresentado cumpriu o requisito formal e literal do Edital (a lei do certame);\r\n\r\n\r\n\r\n v) tal circunstância se insere na ressalva contida na parte final do Tema 485-RG;\r\n\r\n\r\n\r\n vi) a correção de um erro de fato que prejudicou indevidamente a candidata, restabelecendo o cumprimento fiel do Edital, reforça a legalidade e a isonomia, e não o contrário. Nisso reside o interesse público;\r\n\r\n\r\n\r\n vii) a reversão da decisão gera risco de dano irreparável à esfera jurídica da impetrante, ao passo que a revaloração documental até o julgamento final, concilia a urgência do candidato com o respeito aos princípios acima referidos.\r\n\r\n\r\n\r\n Ante o exposto, INDEFIRO a liminar.. (...)”\r\n\r\n\r\n\r\n Na hipótese, tendo como razão de decidir os fundamentos já apresentados na decisão que indeferiu o pedido de antecipação da tutela recursal e, não havendo qualquer modificação na situação fática e jurídica capaz de alterar as razões do convencimento, mantenho-o em todos os seus termos.\r\n\r\n\r\n\r\n Ante o exposto, NEGO PROVIMENTO ao Agravo de Instrumento. Agravo interno prejudicado.\r\n\r\n\r\n\r\n É como voto.", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\n Decide a 3ª Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO ao Agravo de Instrumento e JULGAR PREJUDICADO o Agravo Interno, nos termos do voto do relator e na forma do relatório constante dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido", "obs_assessor": "﻿\r\n\r\n Minuta revisada por Evellyn Barbosa\r\n\r\n Att.,\r\n\r\n Ariel Campos\r\n\r\n Residente Jurídica\r\n\r\nPoder Judiciário\r\n\r\n Tribunal Regional Federal da 5ª Região\r\n\r\n Gabinete do Desembargador Federal Rogério Fialho Moreira", "tem_obs_assessor": true, "assunto": "", "ramo": "Administrativo", "subgrupo": "Apelação/Remessa Necessária", "subclasse": ""}, {"nome": "20260320_100350_RES__VOTO.0002986-71.2025.4.05.0000.VIRTUAL.09.04.2026", "nome_arq": "VOTO.0002986-71.2025.4.05.0000.VIRTUAL.09.04.2026", "cnj": "0002986-71.2025.4.05.0000", "cab": "0002986-71.2025.4.05.0000", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "ok.", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "SOLANGE APARECIDA DOS SANTOS", "adv_polo_ativo": "SERGIO LUDMER - PE21485", "polo_passivo": "UNIAO FEDERAL\r\n\r\nINICIO RELATORIO", "adv_polo_passivo": "Não informado", "ementa": "PROCESSUAL CIVIL E CIVIL. AGRAVO DE INSTRUMENTO. PRECATÓRIO. HABILITAÇÃO DA COMPANHEIRA PENSIONISTA E DOS FILHOS MAIORES. VALORES INSCRITOS EM PRECATÓRIO. LEI Nº 6.858/80 E DECRETO Nº 85.845/81. OBSERVÂNCIA. DIREITO DISPONÍVEL. PROVIMENTO.\r\n\r\n\r\n\r\n1. Agravo de instrumento interposto por SOLANGE APARECIDA DOS SANTOS contra decisão proferida pelo Juízo da 2ª Vara Federal de Alagoas que deferiu a sua habilitação nos autos do cumprimento de sentença, limitado a 50% do crédito a que faria direito o de cujus.\r\n\r\n\r\n\r\n2. Conforme dicção da Lei n.º 6.858/80 e do Decreto 85.845/81, os valores devidos, pela União, a servidor público, em razão de cargo ou emprego, serão pagos a seus dependentes habilitados perante a Previdência Social, ou, na sua falta, aos sucessores previstos na lei civil. Precedentes: PROCESSO: 08108494820184058000, AC - Apelação Civel - , DESEMBARGADOR FEDERAL ROGÉRIO FIALHO MOREIRA, 3ª Turma, JULGAMENTO: 24/09/2019; PROCESSO: 08042661620154058400, AC - Apelação Civel - , DESEMBARGADOR FEDERAL ROBERTO MACHADO, 1º Turma, JULGAMENTO: 05/05/2020; PROCESSO: 08090308320194050000, AG - Agravo de Instrumento - , DESEMBARGADOR FEDERAL PAULO ROBERTO DE OLIVEIRA LIMA, 2ª Turma, JULGAMENTO: 04/05/2020; PROCESSO: 08036966820194050000, AG - Agravo de Instrumento - , DESEMBARGADOR FEDERAL MANOEL ERHARDT, 4ª Turma, JULGAMENTO: 25/03/2020; PROCESSO: 08044951420194050000, AG - Agravo de Instrumento - , DESEMBARGADOR FEDERAL CARLOS VINICIUS CALHEIROS NOBRE (CONVOCADO), 4ª Turma, JULGAMENTO: 17/07/2020; PROCESSO: 08061836920234050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL CID MARCONI GURGEL DE SOUZA, 3ª TURMA, JULGAMENTO: 24/08/2023.\r\n\r\n\r\n\r\n3. Reforça tal entendimento a regra segundo a qual “Independerá de inventário ou de arrolamento o pagamento dos valores previstos na Lei nº 6.858, de 24 de novembro de 1980.” (CPC, art. 666).\r\n\r\n\r\n\r\n4. Na hipótese, a agravante é pensionista única do falecido autor, condição que a habilitaria à percepção de todo o valor objeto do precatório. Sem embargo, ela própria limita o seu pedido ao percentual de 75% do valor. Tratando-se de direito disponível, nada impede que os 25% restantes sejam destinados aos filhos do autor falecido, exatamente como pretendido pela recorrente.\r\n\r\n\r\n\r\n5. Agravo de instrumento provido.", "relatorio": "Trata-se de agravo de instrumento interposto por SOLANGE APARECIDA DOS SANTOS contra decisão proferida pelo Juízo da 2ª Vara Federal de Alagoas que deferiu a sua habilitação nos autos do cumprimento de sentença, limitado a 50% do crédito a que faria direito o de cujus.\r\n\r\n\r\n\r\nNas razões recursais, traz os seguintes argumentos: a) o exequente, José Pinto Órfão, deixou créditos a serem executados; b) a agravante, além de meeira (pela união estável reconhecida judicialmente) é herdeira testamentária (quanto à parte disponível); c) a decisão agravada reconheceu apenas 50% de participação (meação), afastando o direito sobre a parte disponível prevista no testamento; d) deve ser reconhecido o direito a 75% do crédito (50% da meação + 25% do testamento); e) a decisão confunde a meação com a sucessão hereditária, tratando a meeira como herdeira concorrente com os filhos; f) o testamento realizado pelo exequente falecido é plenamente válido e eficaz, não havendo que se falar em nulidade ou redução.\r\n\r\n\r\n\r\nDeterminada a intimação dos filhos do falecido autor para o exercício do direito seu direito de defesa neste feito, foram por eles apresentadas contrarrazões ao agravo de instrumento. Eles defendem o improvimento do recurso, afirmando que a agravante não faria jus à herança.\r\n\r\n\r\n\r\nContrarrazões apresentadas também pela UNIÃO FEDERAL.\r\n\r\n\r\n\r\nÉ o relatório.\r\n\r\n\r\n\r\nFIM RELATÓRIO", "voto": "Em situações como a dos autos, esta egrégia Terceira Turma tem entendido que o direito do(a) pensionista, encontra fundamento no seu artigo 1º da Lei nº 6.858/80, segundo a qual \"Os valores devidos pelos empregadores aos empregados e os montantes das contas individuais do Fundo de Garantia do Tempo de Serviço e do Fundo de Participação PIS-PASEP, não recebidos em vida pelos respectivos titulares, serão pagos, em quotas iguais, aos dependentes habilitados perante a Previdência Social ou na forma da legislação específica dos servidores civis e militares, e, na sua falta, aos sucessores previstos na lei civil, indicados em alvará judicial, independentemente de inventário ou arrolamento.\"\r\n\r\n\r\n\r\nRegistro que este Tribunal paga precatórios e faz pagamentos administrativos de valores referentes a remuneração de servidores falecidos a pensionsitas, com base exatamente nessa mesma lei, independente do valor.\r\n\r\n\r\n\r\nExigir a habilitação do espólio é medida que se encontra em desarmonia com precedentes deste Tribunal Regional Federal sobre a questão:\r\n\r\n\r\n\r\nAGRAVO DE INSTRUMENTO. CUMPRIMENTO DE SENTENÇA. HABILITAÇÃO DA VIÚVA. ÚNICA BENEFICIÁRIA DA PENSÃO. POSSIBILIDADE. PROVIMENTO.\r\n\r\n\r\n\r\n1. CLAUDIA CRISTINA DE OLIVEIRA LIMA interpõe apelação contra sentença que, em incidente de habilitação por ela proposto, indeferiu o seu pedido para substituir OSWALDO DA SILVA CAMPOS no polo ativo da execução, sob o fundamento de que a rquerente/apelante, viúva do autor, fora casada em regime de separação obrigatória de bens, o que a afastaria da linha sucessória do falecido (CC, art. 1.829).\r\n\r\n\r\n\r\n2. \"Conforme dicção da Lei n.º 6.858/80 e do Decreto 85.845/81, os valores devidos, pela União, a servidor público, em razão de cargo ou emprego, serão pagos a seus dependentes habilitados perante a Previdência Social, ou, na sua falta, aos sucessores previstos na lei civil.\" PROCESSO: 0008810942014405000001, AGA140067/01/PE, DESEMBARGADOR FEDERAL JOSÉ MARIA LUCENA, Primeira Turma, JULGAMENTO: 27/11/2014, PUBLICAÇÃO: DJE 11/12/2014 - Página 92. No mesmo sentido: PROCESSO: 08038181420134058400, AC/RN, DESEMBARGADOR FEDERAL VLADIMIR CARVALHO, Segunda Turma, JULGAMENTO: 17/03/2015; PROCESSO: 00005603820154050000, AG141430/AL, DESEMBARGADOR FEDERAL ROGÉRIO FIALHO MOREIRA, Quarta Turma, JULGAMENTO: 14/04/2015, PUBLICAÇÃO: DJE 16/04/2015 - Página 431.\r\n\r\n\r\n\r\n3. A apelante é a única beneficiária da pensão do falecido servidor OSWALDO DA SILVA CAMPOS - que, segundo a certidão de óbito acostada aos autos, deixou 2 (filhos adultos)-, o que a habilita a receber as diferenças remuneratórias em questão.\r\n\r\n\r\n\r\n4. Apelação provida.(PROCESSO: 08108494820184058000, AC - Apelação Civel - , DESEMBARGADOR FEDERAL ROGÉRIO FIALHO MOREIRA, 3ª Turma, JULGAMENTO: 24/09/2019)\r\n\r\n\r\n\r\nADMINISTRATIVO E CONSTITUCIONAL. APELAÇÃO. CUMPRIMENTO DE SENTENÇA. GRATIFICAÇÃO GACEN. PENSIONISTA. FALECIMENTO POSTERIOR À EC/03. DIREITO À PARIDADE. RE 603.580/RJ. POSSIBILIDADE.  APELAÇÃO IMROVIDA.\r\n\r\n\r\n\r\n1. Apelação interposta pela FUNDACAO NACIONAL DE SAUDE - FUNASAcontra sentença proferida pelo Juízo da 4ª Vara Federal da Seção Judiciária do Rio Grande do Norte que julgou parcialmente procedente o pedido, reconhecendo o excesso de execução para fixar o valor da execução em 50% do valor embargado, por conta da dedução da cota-parte da outra pensionista (50%); condenado a parte embargante  no pagamento de honorários sucumbenciais fixados em  10% (dez por cento) sobre o valor apurado como devido ao embargado. Considerando que a parte embargada é beneficiária da gratuidade de justiça, afasta-se a condenação na verba honorária.\r\n\r\n\r\n\r\n(...).\r\n\r\n\r\n\r\n7. (...). Tem direito a embargada ao valor correspondente ao período especificado no título executivo judicial pelo fato de que deve ser aplicada a Lei n.º 6.858/80, que dispõe sobre o pagamento aos dependentes e sucessores de valores não recebidos em vida pelos respectivos titulares, na forma do regulamento, que se deu pelo Decreto n.º 85.845/81, e segundo o  qual os valores devidos em razão de cargo ou emprego pela Administração Pública, e não recebidos pelos seus servidores em vida, pertencerão, prioritariamente, aos dependentes habilitados à pensão por morte do sucedido, e na falta desses, aos demais sucessores na forma da lei civil, independentemente de inventário ou arrolamento (art. 1.º, parágrafo único, inciso II), considerando no caso concreto a quota-parte de 50% do valor da pensão por morte de que é  titular a embargada, na forma destacada pelo Contador Judicial\".\r\n\r\n\r\n\r\n9. Apelação improvida.Honorários advocatícios, fixados na sentença, majorados em 20%, ex vido disposto no parágrafo 11 do art. 85 do CPC (honorários recursais). (PROCESSO: 08042661620154058400, AC - Apelação Civel - , DESEMBARGADOR FEDERAL ROBERTO MACHADO, 1º Turma, JULGAMENTO: 05/05/2020)\r\n\r\n\r\n\r\nPROCESSUAL CIVIL. AGRAVO DE INSTRUMENTO. EXECUÇÃO CONTRA A FAZENDA PÚBLICA. LEGITIMADOS. SINDICATO. PRECLUSÃO.\r\n\r\n\r\n\r\n1. Trata-se de agravo de instrumento da UNIVERSIDADE FEDERAL DA PARAÍBA - UFPB em contrariedade à decisão do Juízo da 3ª Vara Federal da Paraíba, que, nos autos da execução contra a Fazenda Pública (sentença de ação coletiva) nº 0804640-50.2015.4.05.8200, deferiu a habilitação de JOSELITA BEZERRIL CARDOSO, GIANINA BEZERRIL CARDOSO e ANA CRISTINA BEZERRIL CARDOSOS, sucessoras de PEDRO CARDOSO FILHO.\r\n\r\n\r\n\r\n2. Defende a UFPB agravante a necessidade de habilitação do espólio do falecido, já que a execução fora proposta em novembro de 2015, quando o exequente Pedro Cardoso Filho já havia falecido.\r\n\r\n\r\n\r\n3. É verdade que o sindicato exequente não possui legitimidade para postular a execução em nome do substituído que já havia falecido, isso porque, com a morte da parte, cessam os efeitos do mandato, de modo que o advogado não tinha poderes para promover a execução.\r\n\r\n\r\n\r\n4. No caso em análise, contudo, essa matéria está preclusa, dado que já há valores depositados.\r\n\r\n\r\n\r\n5. De igual modo, não colhe a alegação da necessidade de habilitação do espólio do falecido, porque, no caso dos autos, as senhoras JOSELITA BEZERRIL CARDOOS, GIANINA BEZERRIL CARDOSO e ANA CRISTINA BEZERRIL CARDOSO comprovaram (Id. 4058200.2536219 - Pág. 1-7) sua condição de viúva (a primeira) e  filhas (as duas últimas), sendo suficiente, portanto, a habilitação das sucessoras.\r\n\r\n\r\n\r\n6. Tal ilação decorre da previsão legal, Lei nº 6.858/80, que, em seu art.  1º,  disciplina o pagamento de valores que deixaram de ser recebidos em vida por seus titulares, definindo quais os legitimados ao recebimento de tais créditos em lugar do (a) falecido (a) credor (a), nestes termos: \"Art. 1º - Os valores devidos pelos empregadores aos empregados e os montantes das contas individuais do Fundo de Garantia do Tempo de Serviço e do Fundo de Participação PIS-PASEP, não recebidos em vida pelos respectivos titulares, serão pagos, em quotas iguais, aos dependentes habilitados perante a Previdência Social ou na forma da legislação específica dos servidores civis e militares, e, na sua falta, aos sucessores previstos na lei civil, indicados em alvará judicial, independentemente de inventário ou arrolamento.\".\r\n\r\n\r\n\r\n7. Dessa forma, no caso de servidor público, eventuais verbas oriundas de títulos judiciais anteriores ao seu óbito, serão rateados em partes iguais entre todos os sucessores.\r\n\r\n\r\n\r\n8. Basta, portanto, a presença do pensionista habilitado, ou na falta deste, dos sucessores.\r\n\r\n\r\n\r\n9. Agravo de instrumento desprovido. (PROCESSO: 08090308320194050000, AG - Agravo de Instrumento - , DESEMBARGADOR FEDERAL PAULO ROBERTO DE OLIVEIRA LIMA, 2ª Turma, JULGAMENTO: 04/05/2020)\r\n\r\n\r\n\r\nPROCESSUAL CIVIL. CUMPRIMENTO DE SENTENÇA. PRESCRIÇÃO. SUSPENSÃO DO PROCESSO. ÓBITO DO AUTOR. HABILITAÇÃO DOS SUCESSORES. CONVALIDAÇÃO DE ATOS PROCESSUAIS. PRINCÍPIOS DA INSTRUMENTALIDADE DAS FORMAS, DA CELERIDADE E DA ECONOMIA PROCESSUAL. AUSÊNCIA DE PREJUÍZO À PARTE EXECUTADA.\r\n\r\n\r\n\r\n1. Agravo de instrumento interposto pela União, contra decisão que, nos autos de origem - Cumprimento de Sentença, considerou não haver razões para indeferir o pedido de habilitação apresentado pelos sucessores do falecido exequente, afastando a alegação de nulidade da execução apresentada pela executada, ora agravante.\r\n\r\n\r\n\r\n2. O instituto da prescrição tem como objetivo principal punir o titular da ação que permanece inerte por um determinado lapso temporal, resguardando a segurança jurídica e a ordem social. Ao disciplinar a matéria, o legislador pátrio estipulou, como regra, o prazo de 5 (cinco) anos para a ocorrência da prescrição, deduzindo-se que a inércia tem que ser prolongada, caracterizando desleixo por parte do titular do direito.\r\n\r\n\r\n\r\n3. O entendimento jurisprudencial do Superior Tribunal de Justiça é de que não corre prazo prescricional entre a data do óbito do autor da ação e a data de habilitação dos seus herdeiros, entendimento também pacífico nas 1ª, 3ª e 4ª turmas deste Tribunal. Precedentes: AgInt no AREsp 1334188/RJ, Rel. Ministro BENEDITO GONÇALVES, PRIMEIRA TURMA, julgado em 21/02/2019, DJe 28/02/2019; AgInt no REsp 1508584/PE, Rel. Ministro NAPOLEÃO NUNES MAIA FILHO, PRIMEIRA TURMA, julgado em 27/11/2018, DJe 06/12/2018;REsp 1657326/MG, Rel. Ministro HERMAN BENJAMIN, SEGUNDA TURMA, julgado em 04/04/2017, DJe 25/04/2017;e AgInt no AREsp 929.097/PE, Rel. Ministro FRANCISCO FALCÃO, SEGUNDA TURMA, julgado em 12/12/2017, DJe 18/12/2017.\r\n\r\n\r\n\r\n4. O óbito da parte suspende o processo e também o prazo prescricional até que seja providenciada a habilitação dos sucessores, sendo que a interpretação das normas que versam sobre prescrição deve dar-se de forma restritiva, inexistindo dispositivo legal que fixe prazo para habilitação dos sucessores.\r\n\r\n\r\n\r\n(...).\r\n\r\n\r\n\r\n10. Desnecessário o ajuizamento de procedimento junto à justiça estadual a fim de habilitar a pensionista ao recebimento da Requisição de Pequeno Valor, pois a disciplina da matéria em análise, qual seja, pagamento de valores que deixaram de ser recebidos em vida pelos seus titulares, definindo quais os legitimados ao recebimento desses créditos, está prevista no art. 1º da Lei nº 6.858/80 e nos artigos 1º e 2º do Decreto nº 85.845/81.\r\n\r\n\r\n\r\n11. Os referidos artigos estabelecem que os valores devidos em razão de cargo ou emprego pela Administração Pública aos seus servidores e não recebidos em vida serão pagos aos beneficiários da pensão por morte decorrente do óbito do empregado ou servidor e, na falta desses, aos sucessores do titular, previstos na lei civil, indicados em alvará judicial, expedido a requerimento do interessado, independentemente de inventário ou arrolamento. A finalidade é destes dispositivos é garantir que a destinação seja a mesma dos proventos do servidor em vida, qual seja, a subsistência de quem dependia dele diretamente. Ressalte-se que esse regramento é mais específico do que aquele previsto na lei civil.\r\n\r\n\r\n\r\n12. O art. 1037 do CPC/73 (666 do NCPC) reforça a prevalência da Lei nº 6.858/80, regulada pelo Decreto nº 85.845/81. Assim, quem faz jus a receber os valores devidos em razão de cargo ou emprego pela Administração Pública aos seus servidores, e não recebidos em vida, são os beneficiários da pensão por morte decorrente do óbito do empregado ou servidor e, na falta desses, os sucessores do titular, previstos na lei civil, indicados em alvará judicial, expedido a requerimento do interessado, sem que se faça necessário o ajuizamento de procedimento junto à justiça estadual.\r\n\r\n\r\n\r\n13. Agravo de instrumento não provido. (PROCESSO: 08036966820194050000, AG - Agravo de Instrumento - , DESEMBARGADOR FEDERAL MANOEL ERHARDT, 4ª Turma, JULGAMENTO: 25/03/2020)\r\n\r\n\r\n\r\nAGRAVO DE INSTRUMENTO. CUMPRIMENTO DE SENTENÇA. ÓBITO DOS EXEQUENTES DURANTE O PROCESSO DE CONHECIMENTO OU ENTRE O TRÂNSITO EM JULGADO DO PROCESSO DE CONHECIMENTO E O AJUIZAMENTO DA EXECUÇÃO. EXECUÇÃO INSTAURADA PELO SINDICATO TEMPESTIVAMENTE. POSSIBILIDADE. LEGITIMAÇÃO EXTRAORDINÁRIA. HABILITAÇÃO DE PENSIONISTA. LEI 6858/80 E DECRETO 85.845/81. RECURSO IMPROVIDO.\r\n\r\n\r\n\r\n1. Agravo de instrumento interposto pela União em face de decisão que, nos autos de Cumprimento de Sentença contra a Fazenda Pública, afastou a prescrição quinquenal da pretensão executória, além de promover as habilitações dos sucessores dos substituídos falecidos, inclusive de pensionista.\r\n\r\n\r\n\r\n2. Controverte-se acerca da prescrição da pretensão executória, da inviabilidade de habilitação dos herdeiros de falecidos antes do ajuizamento da execução, além da impossibilidade de recebimento de valores unicamente por pensionista.\r\n\r\n\r\n\r\n3. A execução foi ajuizada tempestivamente em 14.10.2017, dentro dos cinco anos contados a partir do trânsito em julgado da ação de conhecimento, conforme a súmula 150 do STF. A última intimação ocorrida no processo de conhecimento data 17.09.2012 (intimação da AGU para ciência do julgamento de embargos de declaração à apelação). Conforme arts. 508 e 188 do CPC/1973, a União poderia interpor recursos especial e extraordinário, cujo prazo é de 30 dias (contagem em dobro para a Fazenda Pública). Logo, o trânsito em julgado só poderia ser atestado com o decurso do referido prazo e o foi, em 16.10.2012.\r\n\r\n\r\n\r\n4. O Supremo Tribunal Federal, em julgado submetido ao Rito da Repercussão Geral, reafirmou a jurisprudência da Corte no sentido da ampla legitimidade extraordinária dos sindicatos para defender em juízo os direitos e interesses coletivos ou individuais dos integrantes da categoria que representam, inclusive nas liquidações e execuções de sentença, independentemente de autorização dos substituídos. (RE 883.642/AL).\r\n\r\n\r\n\r\n5. A Quarta Turma desta Corte Recursal firmou o entendimento de que \"à luz do art. 8º, III, da CF/88, o Sindicato é legitimado extraordinário ad causam para defender os interesses individuais e coletivos dos indivíduos que compõem sua categoria profissional, não necessitando de autorização dos membros da categoria para agir, bem como seu vínculo não se extingue com a morte do substituído nas ações movidas pela entidade\". Precedentes: Processo n.º 0809151-82.2017.4.05.0000, DESEMBARGADOR FEDERAL RUBENS DE MENDONÇA CANUTO, 4ª Turma, JULGAMENTO: 30/04/2018; Processo n.º 0000285-84.2018.4.05.0000, DESEMBARGADOR FEDERAL EDÍLSON NOBRE, Quarta Turma, JULGAMENTO: 11/12/2018. Processo n.º 0803040-77.2018.4.05.8300, DESEMBARGADOR FEDERAL CONVOCADO CARLOS VINÍCIUS CALHEIROS NOBRE, Quarta Turma, JULGAMENTO: 23/01/2020.\r\n\r\n\r\n\r\n6. Conquanto o falecimento dos exequentes tenha ocorrido durante o processo de conhecimento ou após o trânsito em julgado do processo de conhecimento mas antes do ajuizamento da execução respectiva, o ente sindical propôs a execução tempestivamente no ano de2017, não havendo que se falar em prescrição da pretensão executória ou para habilitação dos herdeiros, sendo válidos os atos praticados pelo Sindicato, em atenção aos postulados da boa-fé, da celeridade e economia processual.\r\n\r\n\r\n\r\n7. Os arts. 1º da Lei nº 6.858/80 e 1º e 2º do Decreto nº 85.845/81 estabelecem que os valores devidos em razão de cargo ou emprego pela Administração Pública aos seus servidores e não recebidos em vida serão pagos aos beneficiários da pensão por morte decorrente do óbito do empregado ou servidor e, na falta desses, aos sucessores do titular previstos na lei civil. A finalidade destes dispositivos é garantir que a destinação seja a mesma dos proventos do servidor em vida, qual seja, a subsistência de quem dependia dele diretamente. Tal regramento é mais específico do que aquele previsto na lei civil. O art. 1037 do CPC/73 (666 do NCPC) reforça a prevalência da Lei nº 6.858/80, regulada pelo Decreto nº 85.845/81.\r\n\r\n\r\n\r\n8. Possibilidade de pensionista de falecido servidor público do Ministério dos Transportes receber valores que lhe eram devidos em vida pela Administração. Os documentos dos autos demonstram sua condição de única pensionista. Precedente desta Turma: Agravo de Instrumento 08036966820194050000, Relator DESEMB. FEDERAL MANOEL ERHARDT, 4ª Turma, DJ: 25/03/2020.\r\n\r\n\r\n\r\n9. Agravo de instrumento improvido. (PROCESSO: 08044951420194050000, AG - Agravo de Instrumento - , DESEMBARGADOR FEDERAL CARLOS VINICIUS CALHEIROS NOBRE (CONVOCADO), 4ª Turma, JULGAMENTO: 17/07/2020)\r\n\r\n\r\n\r\nAGRAVO DE INSTRUMENTO. HABILITAÇÃO DA VIÚVA PENSIONISTA. LEI Nº 6.858/80 E DECRETO Nº 85.845/81. INCIDÊNCIA. DESNECESSIDADE DE INVENTÁRIO OU HABILITAÇÃO DE TODOS OS HERDEIROS. ART. 666 DO CPC.\r\n\r\n\r\n\r\n 1. Agravo de Instrumento manejado por FRANCISCA DE FÁTIMA SOUSA ARAÚJO em face de decisão que determinou a intimação da ora Recorrente para, acaso deseje ser a única sucessora do beneficiário do título exequendo habilitada nos autos, acoste declaração de renúncia dos demais herdeiros.\r\n\r\n\r\n\r\n 2. Alega ser viúva, e que recebe pensão por morte, decorrente do vínculo de seu falecido esposo com o DNOCS. Invoca o art. 666 do CPC, e a Lei nº 6858/80, que assegura aos pensionistas o direito ao recebimento das parcelas não percebidos em vida por seus respectivos titulares, como é o caso em tela. Colaciona arestos e menciona que, em hipótese referente a outro precatório devido a seu cônjuge, obteve sentença favorável à habilitação pretendida, sem qualquer determinação para juntada de anuência dos demais herdeiros.\r\n\r\n\r\n\r\n 3. Em se tratando de servidor público, existem regramentos específicos, previstos nos arts. 1º da Lei nº 6.858/80 e nos artigos 1º e 2º do Decreto nº 85.845/81, que estabelecem que os valores devidos em razão de cargo ou emprego pela Administração Pública aos seus servidores e não recebidos em vida serão pagos aos beneficiários da pensão por morte decorrente do óbito do empregado ou servidor. A finalidade destes dispositivos é garantir que a destinação seja a mesma dos proventos do servidor em vida, qual seja, a subsistência de quem dependia dele diretamente. Ressalte-se que esse regramento é mais específico do que aquele previsto na lei civil e, apenas na falta de pessoa habilitada é que essa última seria observada.\r\n\r\n\r\n\r\n 4. \"(...) Conforme dicção da Lei n.º 6.858/80 e do Decreto 85.845/81, os valores devidos, pela União, a servidor público, em razão de cargo ou emprego, serão pagos a seus dependentes habilitados perante a Previdência Social, ou, na sua falta, aos sucessores previstos na lei civil. Precedentes: PROCESSO: 08108494820184058000, AC - Apelação Civel - , DESEMBARGADOR FEDERAL ROGÉRIO FIALHO MOREIRA, 3ª Turma, JULGAMENTO: 24/09/2019; PROCESSO: 08042661620154058400, AC - Apelação Civel - , DESEMBARGADOR FEDERAL ROBERTO MACHADO, 1º Turma, JULGAMENTO: 05/05/2020; PROCESSO: 08090308320194050000, AG - Agravo de Instrumento - , DESEMBARGADOR FEDERAL PAULO ROBERTO DE OLIVEIRA LIMA, 2ª Turma, JULGAMENTO: 04/05/2020; PROCESSO: 08036966820194050000, AG - Agravo de Instrumento - , DESEMBARGADOR FEDERAL MANOEL ERHARDT, 4ª Turma, JULGAMENTO: 25/03/2020; PROCESSO: 08044951420194050000, AG - Agravo de Instrumento - , DESEMBARGADOR FEDERAL CARLOS VINICIUS CALHEIROS NOBRE (CONVOCADO), 4ª Turma, JULGAMENTO: 17/07/2020. (...).\". Precedente: Processo: 08062416520224058000, Apelação Cível, Desembargador Federal Rafael Chalegre do Rego Barros (Convocado), 3ª Turma, Julgamento: 13/04/2023.\r\n\r\n\r\n\r\n 5. A Agravante comprovou a qualidade de pensionista do beneficiário do título judicial exequendo, não havendo qualquer óbice à sua habilitação nos autos.\r\n\r\n\r\n\r\n 6. \"Independerá de inventário ou de arrolamento o pagamento dos valores previstos na Lei nº 6.858, de 24 de novembro de 1980.\" (CPC, art. 666).\r\n\r\n\r\n\r\n7. Agravo de instrumento provido, para reformar a decisão e deferir a habilitação requerida pela Agravante. (PROCESSO: 08061836920234050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL CID MARCONI GURGEL DE SOUZA, 3ª TURMA,
