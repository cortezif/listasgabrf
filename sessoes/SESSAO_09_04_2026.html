encial do STF sobre a questão, posto que, de acordo com o Tema 1.170 da repercussão geral, \"É aplicável às condenações da Fazenda Pública envolvendo relações jurídicas não tributárias o índice de juros moratórios estabelecido no art. 1º-F da Lei n. 9.494/1997, na redação dada pela Lei n. 11.960/2009, a partir da vigência da referida legislação, mesmo havendo previsão diversa em título executivo judicial transitado em julgado.\"\r\n\r\n\r\n\r\n 5. As omissões apontadas pela embargante não têm fundamento. O acórdão foi claro ao considerar que a hipótese comporta a aplicação dos temas 1.170 e 1.361 da repercussão geral, impondo-se o provimento do agravo de instrumento, para modificar os juros de mora fixados na coisa julgada.\r\n\r\n\r\n\r\n 6. Embargos de declaração conhecidos e improvidos.", "relatorio": "Trata-se de EMBARGOS DE DECLARAÇÃO opostos por MAURICIO PINTO LUCAS GOMES e outros contra o acórdão proferido por esta 3ª Turma em 02 de outubro de 2025, que, em juízo de retratação determinado por despacho da Vice-Presidência do TRF5, deu provimento ao agravo de instrumento interposto pela UNIÃO FEDERAL, para adequar o julgamento às teses firmadas pelo Supremo Tribunal Federal nos Temas 1.170 e 1.361 de repercussão geral.\r\n\r\n\r\n\r\n O acórdão embargado consignou que o julgamento anterior desta Turma — que negara provimento ao agravo de instrumento da União, preservando a aplicação dos juros de mora de 0,5% ao mês fixados no título executivo judicial — encontrava-se em desarmonia com as teses vinculantes do STF, razão pela qual promoveu a adequação e deu provimento ao recurso, sem estabelecer ressalvas ou delimitar o alcance temporal da retratação.\r\n\r\n\r\n\r\n Os embargantes alegam, em síntese, a existência de duas omissões no julgado:\r\n\r\n\r\n\r\n Primeira omissão: o acórdão embargado deixou de considerar que o título executivo que fixou os juros de mora de 0,5% ao mês não é a sentença da ação de conhecimento, transitada em julgado em 1999, mas a sentença proferida nos Embargos à Execução n.º 0006211-30.2003.4.05.8000, cujo trânsito em julgado ocorreu em 2015 — fato que já havia sido expressamente reconhecido por esta Turma em acórdão anterior nos presentes autos. Sustentam que, como a Lei n.º 11.960/2009 já vigorava quando da formação do título executivo, não há legislação superveniente a autorizar a revisão da coisa julgada pela via da retratação, o que afastaria a aplicabilidade dos Temas 1.170 e 1.361 ao caso concreto.\r\n\r\n\r\n\r\n Segunda omissão: o acórdão deixou de delimitar o período de incidência da Taxa SELIC, introduzida pela EC n.º 113/2021, a qual somente pode alcançar o período posterior a 09/12/2021, data de sua vigência. Aduzem que os cálculos exequendos possuem data-base fixada em dezembro de 2019, razão pela qual a aplicação retroativa da SELIC violaria o princípio da irretroatividade das normas.\r\n\r\n\r\n\r\n A UNIÃO FEDERAL apresentou contrarrazões pugnando pelo não conhecimento dos embargos ou, subsidiariamente, pelo seu desprovimento, sustentando que o acórdão não padece de qualquer vício e que os embargantes pretendem, em verdade, a rediscussão do mérito já decidido.\r\n\r\n\r\n\r\n É o relatório.\r\n\r\n\r\n\r\n FIM RELATÓRIO", "voto": "O feito tem origem em cumprimento de sentença que, por ocasião de impugnação da União Federal, gerou debate sobre os critérios de atualização monetária e de juros de mora aplicáveis à execução. A ação de conhecimento, movida pelo SINDIFISCO em favor dos servidores substituídos para reconhecimento do direito ao reajuste de 28,86%, transitou em julgado em 1999. Contudo, tal sentença não fixou os índices de atualização e de juros.\r\n\r\n\r\n\r\n Esses critérios foram estabelecidos somente em 05/06/2006, por decisão saneadora proferida nos Embargos à Execução n.º 0006211-30.2003.4.05.8000, que, afastando-se da regra do art. 1º-F da Lei n. 9.494/1997, na redação dada pela Lei n. 11.960/2009, fixou os juros de mora em 0,5% ao mês. A sentença proferida nesses embargos à execução transitou em julgado em 2015, como expressamente reconhecido pelo acórdão anterior desta Turma que julgou os embargos de declaração opostos pelas partes.\r\n\r\n\r\n\r\n Naquela oportunidade, esta Turma, de fato, corrigiu premissa equivocada que havia considerado 1999 como marco temporal do título executivo, assentando que os critérios de atualização foram incorporados ao título somente com o trânsito em julgado em 2015, quando já vigorava integralmente a legislação então aplicável.\r\n\r\n\r\n\r\n No entanto, o fato é que a sentença transitada em julgado em 2015 (sentença dos embargos à execução, que deve ser considerada sentença de mérito) afastou-se da regra do art. 1º-F da Lei n. 9.494/1997, na redação dada pela Lei n. 11.960/2009, fixando os juros de mora em 0,5% ao mês.\r\n\r\n\r\n\r\n A fixação dos juros de mora em 0,5% ao mês, assim, afastou-se do entendimento jurisprudencial do STF sobre a questão, posto que, de acordo com o Tema 1.170 da repercussão geral, \"É aplicável às condenações da Fazenda Pública envolvendo relações jurídicas não tributárias o índice de juros moratórios estabelecido no art. 1º-F da Lei n. 9.494/1997, na redação dada pela Lei n. 11.960/2009, a partir da vigência da referida legislação, mesmo havendo previsão diversa em título executivo judicial transitado em julgado.\"\r\n\r\n\r\n\r\n As omissões apontadas pela embargante não têm fundamento. O acórdão foi claro ao considerar que a hipótese comporta a aplicação dos temas 1.170 e 1.361 da repercussão geral, impondo-se o provimento do agravo de instrumento, para modificar os juros de mora fixados na coisa julgada.\r\n\r\n\r\n\r\n Em face do exposto, CONHEÇO E NEGO PROVIMENTO aos embargos de declaração.\r\n\r\n\r\n\r\n É como voto.\r\n\r\n\r\n\r\n FIM VOTO", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\n Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, CONHECER E NEGAR PROVIMENTO aos embargos de declaração, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido", "obs_assessor": "﻿", "tem_obs_assessor": false, "assunto": "", "ramo": "Outros", "subgrupo": "", "subclasse": "Embargos de Declaração"}, {"nome": "20260317_141555_Re__VOTO.0802183-75.2025.4.05.8400.VIRTUAL.09.04.2026", "nome_arq": "VOTO.0802183-75.2025.4.05.8400.VIRTUAL.09.04.2026", "cnj": "0802183-75.2025.4.05.8400", "cab": "0802183-75.2025.4.05.8400", "assessor": "Gabriel Santos Aquino De Oliveira", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "INSTITUTO FEDERAL DE EDUCACAO, CIENCIA E TECNOLOGIA DO RIO GRANDE DO NORTE", "adv_polo_ativo": "Não informado", "polo_passivo": "FREUD ARAUJO MEDEIROS", "adv_polo_passivo": "GIULLIANA NIEDERAUER FLORES SEVERO DE MORAIS - RN13922\r\nADVOGADO do(a) APELADO: TIAGO NEVES DE MORAIS - RN9568", "ementa": "ADMINISTRATIVO.  APELAÇÃO CÍVEL.  SERVIDOR PÚBLICO. PROFESSOR DO ENSINO BÁSICO, TÉCNICO E TECNOLÓGICO. LEI 12.772/2012. ACELERAÇÃO DE PROMOÇÃO. APRESENTAÇÃO DE TÍTULO APÓS ESTÁGIO PROBATÓRIO. INTERRUPÇÃO DO INTERSTÍCIO EM CURSO. APELAÇÃO PROVIDA.\r\n\r\n\r\n\r\n 1. Apelação interposta pelo INSTITUTO FEDERAL DE EDUCAÇÃO, CIÊNCIA E TECNOLOGIA DO RIO GRANDE DO NORTE - IFRN em face de sentença proferida pelo Juízo da 4ª Vara Federal da Seção Judiciária do Rio Grande do Norte que julgou procedente o pleito autoral, para declarar a nulidade da Portaria nº. 159/2021 - DG/JC/RE/IFRN e determinar que seja considerado o período de 24 (vinte e quatro) meses a contar da última progressão por mérito (março de 2918), passando o autor para a classe D-302 em março de 2021, a partir de quando devem incidir os efeitos financeiros, procedendo-se ao pagamento das diferenças devidas.\r\n\r\n\r\n\r\n 2. Ao tempo da controvérsia, a Lei nº 12.772/2012, que dispõe sobre a estruturação do Plano de Carreiras e Cargos de Magistério Federal, previa, em seu art. 14, que o desenvolvimento na Carreira de Magistério do Ensino Básico, Técnico e Tecnológico ocorrerá mediante progressão, pelo cumprimento do interstício de 24 (vinte e quatro) meses de efetivo exercício em cada nível e aprovação em avaliação de desempenho; ou promoção, mediante o interstício mínimo de 24 (vinte e quatro) meses no último nível de cada Classe antecedente àquela para a qual se dará a promoção e as condições especificadas no § 3º para cada Classe.\r\n\r\n\r\n\r\n 3. O art. 15 do supramencionado diploma legal previa a possibilidade de aceleração da promoção por ocasião da apresentação de título de especialista ou de mestre ou doutor, desde que o professor não estivesse em estágio probatório no cargo.\r\n\r\n\r\n\r\n 4. No caso vertente, em sede recursal, o IFRN se insurge contra provimento jurisdicional que reconheceu que a aceleração da promoção, que resulta na mudança de classe e não de nível dentro de uma mesma classe, não tem o condão de zerar a contagem para a progressão por mérito seguinte, e declarou a nulidade da Portaria nº. 159/2021 - DG/LAJ/RE/IFRN para determinar que fosse respeitado o interstício de 24 meses em relação à última progressão por mérito, ocorrida em março de 2019.\r\n\r\n\r\n\r\n 5. Conforme entendimento do TRF-5, \"Assim, uma vez implementada a aceleração da promoção, passa a ser este o novo marco temporal para a contagem dos interstícios seguintes. É de se ver que, ao aproveitar os efeitos da aceleração da promoção e nela querer incluir o cômputo do interstício cumprido na classe anterior à promoção, a embargante objetiva obter o melhor dos dois mundos, providência que não se mostra possível ante a sistemática de implementação das promoções e progressões funcionais, in casu.\" (PROCESSO: 08101577120224058400, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL FREDERICO WILDSON DA SILVA DANTAS, 7ª TURMA, JULGAMENTO: 20/08/2024)\r\n\r\n\r\n\r\n 6. Precedentes desta eg. Terceira Turma: PROCESSO: 0801327-45.2024.4.05.8401, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL ROGÉRIO FIALHO MOREIRA, 3ª TURMA, JULGAMENTO: 18/09/2025; PROCESSO: 0013720-19.2025.4.05.8201, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL ROGÉRIO FIALHO MOREIRA, 3ª TURMA, JULGAMENTO: 05/03/2026.\r\n\r\n\r\n\r\n 7. Apelação provida para, reformando a sentença, julgar improcedente o pleito. Inversão do ônus da sucumbência.", "relatorio": "Trata-se de Apelação interposta pelo INSTITUTO FEDERAL DE EDUCAÇÃO, CIÊNCIA E TECNOLOGIA DO RIO GRANDE DO NORTE - IFRN em face de sentença proferida pelo Juízo da 4ª Vara Federal da Seção Judiciária do Rio Grande do Norte que julgou procedente o pleito autoral, para declarar a nulidade da Portaria nº. 159/2021 - DG/JC/RE/IFRN e determinar que seja considerado o período de 24 (vinte e quatro) meses a contar da última progressão por mérito (março de 2918), passando o autor para a classe D-302 em março de 2021, a partir de quando devem incidir os efeitos financeiros, procedendo-se ao pagamento das diferenças devidas.\r\n\r\n\r\n\r\n A parte recorrente, em suas razões de apelação, alega, em síntese, que: a) a progressão funcional na carreira de Magistério Federal que engloba as carreiras de Magistério Superior e Magistério do Ensino Básico, Técnico e Tecnológico ocorre mediante cumprimento do interstício de 24 (vinte e quatro) meses de efetivo exercício em cada nível e a aprovação em avaliação de desempenho; b) não basta o adimplemento de parte do período de tempo em um nível e a outra parte do período em outro nível para concessão da progressão por mérito; c) uma vez implementada a aceleração da promoção, passa a ser este o novo marco temporal para a contagem dos interstícios seguintes.\r\n\r\n\r\n\r\n Contrarrazões apresentadas.\r\n\r\n\r\n\r\n É o relatório.", "voto": "De início, recebo a apelação, considerando presentes os pressupostos recursais intrínsecos (cabimento, legitimação, interesse e inexistência de fato impeditivo ou extintivo do direito de recorrer) e extrínsecos (preparo, tempestividade e regularidade formal) para a admissibilidade do recurso.\r\n\r\n\r\n\r\n Ao tempo da controvérsia, a Lei nº 12.772/2012, que dispõe sobre a estruturação do Plano de Carreiras e Cargos de Magistério Federal, previa, em seu art. 14, que o desenvolvimento na Carreira de Magistério do Ensino Básico, Técnico e Tecnológico ocorrerá mediante progressão, pelo cumprimento do interstício de 24 (vinte e quatro) meses de efetivo exercício em cada nível e aprovação em avaliação de desempenho; ou promoção, mediante o interstício mínimo de 24 (vinte e quatro) meses no último nível de cada Classe antecedente àquela para a qual se dará a promoção e as condições especificadas no § 3º para cada Classe.\r\n\r\n\r\n\r\n Ademais, o art. 15 possuía a seguinte redação:\r\n\r\n\r\n\r\n \"Art. 15. Os docentes aprovados no estágio probatório do respectivo cargo que atenderem os seguintes requisitos de titulação farão jus a processo de aceleração da promoção:\r\n\r\n\r\n\r\n I - de qualquer nível da Classe D I para o nível 1 da classe D II, pela apresentação de título de especialista; e\r\n\r\n\r\n\r\n II - de qualquer nível das Classes D I e D II para o nível 1 da classe D III, pela apresentação de título de mestre ou doutor.\r\n\r\n\r\n\r\n Parágrafo único. Aos servidores ocupantes de cargos da Carreira de Magistério do Ensino Básico, Técnico e Tecnológico em 1º de março de 2013 ou na data de publicação desta Lei, se posterior, é permitida a aceleração da promoção de que trata este artigo ainda que se encontrem em estágio probatório no cargo\".\r\n\r\n\r\n\r\n No caso vertente, em sede recursal, o IFRN se insurge contra provimento jurisdicional que reconheceu que a aceleração da promoção, que resulta na mudança de classe e não de nível dentro de uma mesma classe, não tem o condão de zerar a contagem para a progressão por mérito seguinte, e declarou a nulidade da Portaria nº. 159/2021 - DG/LAJ/RE/IFRN para determinar que fosse respeitado o interstício de 24 meses em relação à última progressão por mérito, ocorrida em março de 2019.\r\n\r\n\r\n\r\n Conforme entendimento desta Corte Regional, \"Assim, uma vez implementada a aceleração da promoção, passa a ser este o novo marco temporal para a contagem dos interstícios seguintes. É de se ver que, ao aproveitar os efeitos da aceleração da promoção e nela querer incluir o cômputo do interstício cumprido na classe anterior à promoção, a embargante objetiva obter o melhor dos dois mundos, providência que não se mostra possível ante a sistemática de implementação das promoções e progressões funcionais, in casu.\" (PROCESSO: 08101577120224058400, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL FREDERICO WILDSON DA SILVA DANTAS, 7ª TURMA, JULGAMENTO: 20/08/2024)\r\n\r\n\r\n\r\n Dessa forma, a aceleração de promoção em setembro de 2019 se tornou o novo marco inicial para progressão por mérito.\r\n\r\n\r\n\r\n Em igual sentido, precedente recente da Terceira Turma: PROCESSO: 0801327-45.2024.4.05.8401, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL ROGÉRIO FIALHO MOREIRA, 3ª TURMA, JULGAMENTO: 18/09/2025; PROCESSO: 0013720-19.2025.4.05.8201, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL ROGÉRIO FIALHO MOREIRA, 3ª TURMA, JULGAMENTO: 05/03/2026.\r\n\r\n\r\n\r\n Ante o exposto, DOU PROVIMENTO à Apelação, para, reformando a sentença, julgar improcedente o pleito. Inverto o ônus da sucumbência.\r\n\r\n\r\n\r\n É como voto.", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\n Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, DAR PROVIMENTO à Apelação, nos termos do voto do relator e na forma do relatório constante dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Provido", "css": "provido", "obs_assessor": "﻿\r\n\r\n Dr. Rogério, estou enviando sem revisão. Trata-se de matéria que já minutei algumas vezes.\r\n\r\nPoder Judiciário\r\n\r\n Tribunal Regional Federal da 5ª Região\r\n\r\n Gabinete do Desembargador Federal Rogério Fialho Moreira", "tem_obs_assessor": true, "assunto": "", "ramo": "Administrativo", "subgrupo": "Apelação/Remessa Necessária", "subclasse": ""}, {"nome": "20260318_115426_Re__VOTO.0035370-37.2025.4.05.8100.VIRTUAL.09.04.2026", "nome_arq": "VOTO.0035370-37.2025.4.05.8100.VIRTUAL.09.04.2026", "cnj": "0035370-37.2025.4.05.8100", "cab": "0035370-37.2025.4.05.8100", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "DEPARTAMENTO NACIONAL DE OBRAS CONTRA AS SECAS – DNOCS", "adv_polo_ativo": "Não informado", "polo_passivo": "RITA MOISES SILVA\r\n\r\nINICIO RELATORIO", "adv_polo_passivo": "FERNANDO FELIPE BARBOSA DE MORAES - PE49542", "ementa": "PROCESSUAL CIVIL E CIVIL. EXECUÇÃO DE SENTENÇA. HABILITAÇÃO DE SUCESSORES. PRESCRIÇÃO. INOCORRÊNCIA. PRECEDENTES. IMPROVIMENTO DA APELAÇÃO. AGRAVO INTERNO PREJUDICADO.\r\n\r\n\r\n\r\n 1. Apelação interposta pelo DEPARTAMENTO NACIONAL DE OBRAS CONTRA AS SECAS – DNOCS contra sentença proferida pelo Juízo da 3ª Vara Federal da Seção Judiciária do Ceará que rejeitou a alegação de prescrição da pretensão executória e deferiu a habilitação dos herdeiros.\r\n\r\n\r\n\r\n 2. “Nos termos da jurisprudência do STJ e desta Corte, ressalvado entendimento diverso da 2ª Turma, a morte de uma das partes suspende imediatamente o processo (art. 313, I, do CPC) e, ante a ausência de prazo para habilitação dos sucessores, não há que se falar em prescrição da pretensão executória até o momento do pedido de habilitação dos herdeiros.” (PROCESSO: 08121388620204050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL FERNANDO BRAGA DAMASCENO, 3ª TURMA, JULGAMENTO: 29/04/2021).\r\n\r\n\r\n\r\n 3. A suspensão do processo, nos termos dos arts. 265, I, do CPC/1973 e 313, I, do CPC/2015, tem por objetivo proteger os interesses do falecido, de modo que poderão ser anulados os atos que causem prejuízo aos sucessores. (REsp n. 1.844.121/AL, relator Ministro Og Fernandes, Segunda Turma, julgado em 22/9/2020, DJe de 9/10/2020).\r\n\r\n\r\n\r\n 4. Não é hipótese de sobrestamento do feito, tendo em vista que o STJ, ao decidir pela afetação da questão referente à prescrição ou não da habilitação de herdeiros ou sucessores da parte falecida no curso da ação (Tema 1.254), foi claro ao determinar a suspensão do processamento apenas dos processos, individuais ou coletivos que versem sobre a mesma matéria, e nos quais tenha havido a interposição de recurso especial ou de agravo em recurso especial, na Segunda Instância, ou que estejam em tramitação no STJ, o que não é a situação dos autos.\r\n\r\n\r\n\r\n 5. Apelação improvida. Agravo interno julgado prejudicado.", "relatorio": "Apelação interposta pelo DEPARTAMENTO NACIONAL DE OBRAS CONTRA AS SECAS – DNOCS contra sentença proferida pelo Juízo da 3ª Vara Federal da Seção Judiciária do Ceará que rejeitou a alegação de prescrição da pretensão executória e deferiu a habilitação dos herdeiros.\r\n\r\n\r\n\r\n Nas razões recursais, a recorrente traz os seguintes argumentos: a) a habilitação não pode ser admitida, haja vista que o exequente faleceu mais de 05 (cinco) anos antes do pedido de habilitação; b) a suspensão do processo por morte não suspende a prescrição quinquenal, pelo que, a habilitação tardia não se mostra possível na medida em que a inércia dos herdeiros não encontra respaldo legal para suspender ou impedir a fluência da prescrição; c) a necessidade de sobrestamento do feito até a apreciação pelo STJ - RESP. 2034211/CE (Tema 1254).\r\n\r\n\r\n\r\n Contrarrazões apresentadas.\r\n\r\n\r\n\r\n Proferida decisão de improvimento do recurso, o agravante interpôs agravo interno.\r\n\r\n\r\n\r\n É o relatório.\r\n\r\n\r\n\r\n FIM RELATÓRIO", "voto": "No que toca à prescrição da pretensão de habilitação dos sucessores, observo que a decisão agravada se encontra em harmonia com o entendimento do eg. Superior Tribunal de Justiça, conforme se verifica a partir dos seguintes julgados:\r\n\r\n\r\n\r\n PROCESSUAL CIVIL. RECURSO ESPECIAL. EXECUÇÃO DE SENTENÇA. PRESCRIÇÃO. NÃO OCORRÊNCIA.\r\n\r\n\r\n\r\n 1. Segundo a jurisprudência do STJ, a morte de uma das partes, inclusive no curso da execução, implica a suspensão do processo, razão pela qual, na ausência de previsão legal que imponha prazo para a habilitação dos respectivos sucessores, não há que falar em prescrição. Ocorrendo o óbito do participante da relação processual, impõe-se a suspensão do feito, nos termos do art. 265, I, do Código Processual Civil/1973 (art. 313, I, do CPC/2015), até que se promova a habilitação.\r\n\r\n\r\n\r\n 2. Agravo interno desprovido. (AgInt no REsp n. 2.102.691/RJ, relator Ministro Gurgel de Faria, Primeira Turma, julgado em 26/2/2024, DJe de 6/3/2024.)\r\n\r\n\r\n\r\n PROCESSUAL CIVIL. AGRAVO INTERNO NO RECURSO ESPECIAL. CÓDIGO DE PROCESSO CIVIL DE 2015. APLICABILIDADE. VIOLAÇÃO AOS ARTS. 489 E 1.022 DO CPC. INOCORRÊNCIA. SERVIDOR FALECIDO ANTES DO AJUIZAMENTO DA EXECUÇÃO COLETIVA. SINDICATO. SUBSTITUTO PROCESSUAL. ILEGITIMIDADE. ARGUMENTOS INSUFICIENTES PARA DESCONSTITUIR A DECISÃO ATACADA. APLICAÇÃO DE MULTA. ART. 1.021, § 4º, DO CÓDIGO DE PROCESSO CIVIL DE 2015. DESCABIMENTO.\r\n\r\n\r\n\r\n I - Consoante o decidido pelo Plenário desta Corte na sessão realizada em 09.03.2016, o regime recursal será determinado pela data da publicação do provimento jurisdicional impugnado. In casu, aplica-se o Código de Processo Civil de 2015.\r\n\r\n\r\n\r\n II - A Corte de origem apreciou todas as questões relevantes apresentadas com fundamentos suficientes, mediante apreciação da disciplina normativa e cotejo ao posicionamento jurisprudencial aplicável à hipótese. Inexistência de omissão, contradição ou obscuridade.\r\n\r\n\r\n\r\n III - Pacífica a orientação desta Corte segundo a qual o falecimento do servidor público, apenas quando ocorrido após o início do processo de conhecimento, autoriza a habilitação de seus sucessores, sendo válidos os atos processuais praticados, salvo comprovada má-fé, não ocorrendo, ademais, a prescrição da pretensão executória, por ausência de previsão legal.\r\n\r\n\r\n\r\n IV - Não apresentação de argumentos suficientes para desconstituir a decisão recorrida.\r\n\r\n\r\n\r\n V - Em regra, descabe a imposição da multa, prevista no art. 1.021, § 4º, do Código de Processo Civil de 2015, em razão do mero improvimento do Agravo Interno em votação unânime, sendo necessária a configuração da manifesta inadmissibilidade ou improcedência do recurso a autorizar sua aplicação, o que não ocorreu no caso.\r\n\r\n\r\n\r\n VI - Agravo Interno improvido.(AgInt no REsp n. 2.104.535/PR, relatora Ministra Regina Helena Costa, Primeira Turma, julgado em 17/6/2024, DJe de 20/6/2024.)\r\n\r\n\r\n\r\n PROCESSUAL CIVIL. OFENSA AO ART. 1.022 DO CPC/2015 NÃO CARACTERIZADA. SERVIDOR PÚBLICO. AÇÃO COLETIVA. EXECUÇÃO INDIVIDUAL. SINDICATO. LEGITIMIDADE.\r\n\r\n\r\n\r\n 1. Constata-se que não se configura a ofensa ao art. 1.022 do Código de Processo Civil/2015, uma vez que o Tribunal de origem julgou integralmente a lide e solucionou a controvérsia, tal como lhe foi apresentada.\r\n\r\n\r\n\r\n 2. O acórdão recorrido está em consonância com a orientação desta Corte segundo a qual o falecimento do servidor público, em momento anterior ao processo de execução, autoriza a habilitação de seus sucessores, sendo válidos os atos processuais praticados, salvo comprovada má-fé, não ocorrendo, ademais, a prescrição da pretensão executória, por ausência de previsão legal.\r\n\r\n\r\n\r\n 3. Agravo Interno não provido. (AgInt no REsp n. 2.006.863/AL, relator Ministro Herman Benjamin, Segunda Turma, julgado em 15/12/2022, DJe de 19/12/2022.)\r\n\r\n\r\n\r\n De fato, \"nos termos da jurisprudência do STJ e desta Corte, ressalvado entendimento diverso da 2ª Turma, a morte de uma das partes suspende imediatamente o processo (art. 313, I, do CPC) e, ante a ausência de prazo para habilitação dos sucessores, não há que se falar em prescrição da pretensão executória até o momento do pedido de habilitação dos herdeiros.\" (PROCESSO: 08121388620204050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL FERNANDO BRAGA DAMASCENO, 3ª TURMA, JULGAMENTO: 29/04/2021).\r\n\r\n\r\n\r\n A suspensão do processo, de acordo com os arts. 265, I, do CPC/1973 e 313, I, do CPC/2015, tem por objetivo proteger os interesses do falecido, de modo que poderão ser anulados os atos que causem prejuízo aos sucessores. (REsp n. 1.844.121/AL, relator Ministro Og Fernandes, Segunda Turma, julgado em 22/9/2020, DJe de 9/10/2020.).\r\n\r\n\r\n\r\n Não é hipótese de sobrestamento do feito, tendo em vista que o STJ, ao decidir pela afetação da questão referente à prescrição ou não da habilitação de herdeiros ou sucessores da parte falecida no curso da ação (Tema 1.254), foi claro ao determinar a suspensão do processamento apenas dos processos, individuais ou coletivos que versem sobre a mesma matéria, e nos quais tenha havido a interposição de recurso especial ou de agravo em recurso especial, na Segunda Instância, ou que estejam em tramitação no STJ, o que não é a situação dos autos.\r\n\r\n\r\n\r\n Posto isso, NEGO PROVIMENTO à apelação e JULGO PREJUDICADO o agravo interno.\r\n\r\n\r\n\r\n É como voto.\r\n\r\n\r\n\r\n FIM VOTO", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\n Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO à apelação e JULGAR PREJUDICA o agravo interno, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido", "obs_assessor": "﻿", "tem_obs_assessor": false, "assunto": "", "ramo": "Outros", "subgrupo": "", "subclasse": ""}, {"nome": "20260318_115448_Re__VOTO.0019175-80.2025.4.05.8001.VIRTUAL.09.04.2026", "nome_arq": "VOTO.0019175-80.2025.4.05.8001.VIRTUAL.09.04.2026", "cnj": "0019175-80.2025.4.05.8001", "cab": "0019175-80.2025.4.05.8001", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "FRANCISCA GERLANDIA VERIATO DE SOUSA", "adv_polo_ativo": "Não informado", "polo_passivo": "UNIAO FEDERAL", "adv_polo_passivo": "Não informado", "ementa": "PROCESSUAL CIVIL. EMBARGOS À EXECUÇÃO. PENHORA DE VEÍCULO. APELAÇÃO CÍVEL. AUSÊNCIA DE INTIMAÇÃO DO CÔNJUGE. BEM MÓVEL. DESNECESSIDADE. INEXISTÊNCIA DE NULIDADE. IMPENHORABILIDADE. ART. 833, V, DO CPC. NÃO CONFIGURAÇÃO. VEÍCULO UTILIZADO COMO MEIO DE LOCOMOÇÃO. BEM DE FAMÍLIA. LEI Nº 8.009/90. INAPLICABILIDADE. HONORÁRIOS ADVOCATÍCIOS. MANUTENÇÃO. MAJORAÇÃO RECURSAL.\r\n\r\n\r\n\r\n 1. Apelação interposta por Francisca Gerlândia Veriato de Sousa contra sentença proferida pelo Juízo da 8ª Vara Federal da Seção Judiciária de Alagoas que, nos autos dos Embargos à Execução, julgou improcedentes os pedidos formulados, mantendo a penhora incidente sobre o veículo VW/POLO MF 2018, placa OXN2843. A sentença também condenou a parte embargante ao pagamento de honorários advocatícios fixados em 10% sobre o valor da causa, com suspensão da exigibilidade em razão da concessão da gratuidade da justiça.\r\n\r\n\r\n\r\n 2. A intimação do cônjuge do executado, prevista na legislação processual civil, é exigida nas hipóteses de penhora sobre bens imóveis ou direitos reais sobre imóveis, não se estendendo, por ausência de previsão legal, à constrição de bens móveis.\r\n\r\n\r\n\r\n 3. A impenhorabilidade prevista no art. 833, V, do CPC exige a comprovação de que o bem é indispensável ao exercício da atividade profissional, não se caracterizando como tal o veículo utilizado apenas como meio de deslocamento até o local de trabalho.\r\n\r\n\r\n\r\n 4. A utilização de veículo próprio para locomoção, ainda que em razão de jornadas atípicas ou deficiência de transporte público, não o qualifica como instrumento de trabalho para fins de impenhorabilidade. Precedente: PROCESSO: 08061050720254050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL RODRIGO ANTONIO TENORIO CORREIA DA SILVA, 6ª TURMA, JULGAMENTO: 27/05/2025.\r\n\r\n\r\n\r\n 5. A proteção conferida pela Lei nº 8.009/90, em regra, restringe-se ao imóvel residencial da entidade familiar, não abrangendo veículo automotor, salvo situações excepcionais não demonstradas nos autos.\r\n\r\n\r\n\r\n 6. Apelação improvida. Honorários advocatícios mantidos, com majoração em grau recursal, nos termos do art. 85, §11, do CPC.", "relatorio": "Trata-se de Apelação interposta por Francisca Gerlândia Veriato de Sousa contra sentença proferida pelo Juízo da 8ª Vara Federal da Seção Judiciária de Alagoas que, nos autos dos Embargos à Execução, julgou improcedentes os pedidos formulados, mantendo a penhora incidente sobre o veículo VW/POLO MF 2018, placa OXN2843. A sentença também condenou a parte embargante ao pagamento de honorários advocatícios fixados em 10% sobre o valor da causa, com suspensão da exigibilidade em razão da concessão da gratuidade da justiça.\r\n\r\n\r\n\r\n Em suas razões recursais, a apelante sustenta, preliminarmente, a nulidade da penhora por ausência de intimação formal de seu cônjuge, alegando violação aos princípios do contraditório e da ampla defesa, uma vez que o bem foi adquirido na constância do casamento sob regime de comunhão parcial. No mérito, defende a impenhorabilidade do veículo, afirmando tratar-se de instrumento essencial ao exercício de sua profissão de enfermeira do SAMU, especialmente em razão de labor em regime de plantões noturnos e da precariedade do transporte público local. Subsidiariamente, alega que o bem deve ser protegido como integrante do mínimo patrimonial familiar. Requer, ainda, a reforma da condenação em honorários advocatícios, com inversão da sucumbência ou, alternativamente, a alteração da base de cálculo para o valor do bem penhorado.\r\n\r\n\r\n\r\n Contrarrazões apresentadas.\r\n\r\n\r\n\r\n É o relatório.\r\n\r\n\r\n\r\n FIM RELATÓRIO", "voto": "A Apelação preenche os requisitos de admissibilidade, de modo que passo à análise do seu mérito.\r\n\r\n\r\n\r\n Trata-se de recurso interposto por Francisca Gerlandia Veriato de Sousa contra sentença que julgou improcedentes os Embargos à Execução, mantendo a penhora incidente sobre veículo de sua propriedade. Sustenta a apelante, em síntese, a nulidade da constrição por ausência de intimação de seu cônjuge, bem como a impenhorabilidade do bem, seja por se tratar de instrumento de trabalho, seja por integrar o mínimo patrimonial familiar. A União, por sua vez, pugna pela manutenção integral da sentença, ao argumento de inexistência de nulidade e inaplicabilidade das hipóteses legais de impenhorabilidade.\r\n\r\n\r\n\r\n Nos termos da legislação processual civil, a exigência de intimação do cônjuge do executado encontra-se expressamente prevista para as hipóteses em que a constrição incide sobre bens imóveis ou direitos reais sobre imóveis, conforme interpretação sistemática dos dispositivos aplicáveis.\r\n\r\n\r\n\r\n No caso concreto, a penhora recaiu sobre veículo automotor, bem móvel, não havendo previsão legal que imponha a intimação do cônjuge para validade do ato constritivo. Trata-se de hipótese em que a norma deve ser interpretada restritivamente, por estabelecer formalidade excepcional no curso da execução.\r\n\r\n\r\n\r\n Ademais, ainda que assim não fosse, verifica-se que o cônjuge da apelante teve ciência inequívoca da constrição, tendo sido, inclusive, nomeado fiel depositário do bem, o que afasta qualquer alegação de prejuízo. Nesse contexto, incide o princípio da instrumentalidade das formas, segundo o qual não se declara nulidade sem demonstração de efetivo prejuízo.\r\n\r\n\r\n\r\n Ressalte-se, por oportuno, que eventual direito à meação se encontra resguardado, podendo o cônjuge exercer as medidas cabíveis sobre o produto da alienação judicial, não havendo violação ao contraditório ou à ampla defesa.\r\n\r\n\r\n\r\n A apelante sustenta que o veículo penhorado seria indispensável ao exercício de sua profissão de enfermeira do SAMU, especialmente em razão do regime de plantões noturnos.\r\n\r\n\r\n\r\n O art. 833, inciso V, do Código de Processo Civil, estabelece a impenhorabilidade dos bens necessários ou úteis ao exercício da profissão, com o objetivo de preservar a capacidade laborativa do devedor. Todavia, tal norma deve ser interpretada de forma restritiva, sob pena de esvaziar a regra geral da responsabilidade patrimonial.\r\n\r\n\r\n\r\n Tem-se, também, que “a jurisprudência desta Corte tem entendimento consolidado no sentido de que veículos utilizados apenas como meio de transporte não se enquadram na hipótese de impenhorabilidade legal, exigindo-se interpretação restritiva para evitar o esvaziamento da efetividade da execução fiscal. Precedente: AGTR 08159394420194050000, Rel. Des. Federal Isabelle Marne Cavalcanti De Oliveira Lima (Convocada), 4ª Turma, j. 19/05/2020, AGTR 08088933820184050000, Rel. Des. Federal Cid Marconi, 3ª Turma, j. 14/08/2019”. (PROCESSO: 08061050720254050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL RODRIGO ANTONIO TENORIO CORREIA DA SILVA, 6ª TURMA, JULGAMENTO: 27/05/2025).\r\n\r\n\r\n\r\n No caso dos autos, verifica-se que o veículo é utilizado pela apelante como meio de deslocamento até o local de trabalho, não se configurando como instrumento diretamente empregado na atividade profissional. Com efeito, a atividade de enfermeira junto ao SAMU é desempenhada com a utilização de estrutura própria do serviço, que dispõe de veículos e equipamentos específicos para a prestação do atendimento.\r\n\r\n\r\n\r\n A alegação de que o exercício da atividade em horários noturnos e a deficiência do transporte público tornariam o veículo indispensável, embora revele situação de dificuldade, não é suficiente para caracterizar a hipótese legal de impenhorabilidade. A indispensabilidade exigida pela norma deve ser compreendida como impossibilidade de exercício da profissão sem o bem, o que não restou demonstrado.\r\n\r\n\r\n\r\n Assim, a utilização do veículo como meio de locomoção, ainda que relevante sob o aspecto prático, não o qualifica como instrumento de trabalho protegido pelo ordenamento jurídico.\r\n\r\n\r\n\r\n A apelante também sustenta que o veículo deve ser considerado bem de família, por constituir o único bem de valor significativo da entidade familiar.\r\n\r\n\r\n\r\n A Lei nº 8.009/90 confere proteção ao imóvel residencial da entidade familiar, admitindo, de forma excepcional, a extensão a determinados bens móveis que guarnecem a residência ou que sejam indispensáveis à subsistência.\r\n\r\n\r\n\r\n A circunstância de o bem ser o único de valor relevante ou de a residência ser financiada não autoriza, por si só, a ampliação do alcance da norma para abranger veículo utilizado para locomoção.\r\n\r\n\r\n\r\n Mantida a sentença de improcedência dos embargos, impõe-se a preservação da condenação da apelante ao pagamento de honorários advocatícios, nos termos fixados na origem.\r\n\r\n\r\n\r\n Nos termos do art. 85, §11, do Código de Processo Civil, é cabível a majoração dos honorários em grau recursal, razão pela qual majoro a verba honorária em 1 (um) ponto percentual, mantendo-se a mesma base de cálculo definida na sentença.\r\n\r\n\r\n\r\n Ante o exposto, NEGO PROVIMENTO à apelação, mantendo integralmente a sentença recorrida, inclusive quanto aos honorários advocatícios, os quais majoro em 1 (um) ponto percentual, nos termos do art. 85, §11, do CPC.\r\n\r\n\r\n\r\n É como voto.\r\n\r\n\r\n\r\n FIM VOTO", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\n Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO à apelação, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido", "obs_assessor": "﻿\r\n\r\n Poder Judiciário\r\n\r\n Tribunal Regional Federal da 5ª Região\r\n\r\n Gabinete do Desembargador Federal Rogério Fialho Moreira", "tem_obs_assessor": true, "assunto": "", "ramo": "Outros", "subgrupo": "", "subclasse": ""}, {"nome": "20260318_153445_Re__VOTO.0800707-22.2022.4.05.8201.VIRTUAL.09.04.2026", "nome_arq": "VOTO.0800707-22.2022.4.05.8201.VIRTUAL.09.04.2026", "cnj": "0800707-22.2022.4.05.8201", "cab": "0800707-22.2022.4.05.8201", "assessor": "Ariel C. Santana", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "DEFENSORIA PUBLICA DA UNIAO, LUCIA MARIA GERALDO", "adv_polo_ativo": "Não informado", "polo_passivo": "", "adv_polo_passivo": "Não informado", "ementa": "ADMINISTRATIVO. CONSTITUCIONAL. AGRAVO INTERNO. DIREITO À SAÚDE. FORNECIMENTO DE MEDICAMENTO. TEMAS 1234 E 06/STF. HIPERTENSÃO PULMONAR SECUNDÁRIA A TROMBOEMBOLISMO PULMONAR CRÔNICO (CID I27). RIOCIGUAT (ADEMPAS). REGISTRO NA ANVISA. MEDICAMENTO NÃO INCORPORADO AO SUS. AGRAVO INTERNO IMPROVIDO.\r\n\r\n\r\n\r\n 1. Agravo interno interposto por LÚCIA MARIA GERALDO em face de decisão que, julgando de acordo com o entendimento firmado pelo STF nos Temas 06 e 1234, negou provimento ao recurso de apelação por ela interposto, mantendo incólume a sentença que julgou improcedente o pedido, objetivando o fornecimento do medicamento Riociguat (Adempas®) para o tratamento de Hipertensão Pulmonar Secundária a Tromboembolismo Pulmonar Crônico (CID I27).\r\n\r\n\r\n\r\n 2. A decisão agravada, aplicando o entendimento firmado pelo STF no julgamento dos Temas 06 e 1234, reconheceu que, havendo decisão expressa da CONITEC pela não incorporação da tecnologia pleiteada (Portarias SCTIE/MS nº 75/2018 e nº 24/2022), não cabe ao Poder Judiciário adentrar o mérito administrativo, salvo em casos de flagrante ilegalidade, o que não restou verificado.\r\n\r\n\r\n\r\n 3. Não se verifica, no caso concreto, qualquer distinção relevante que permita afastar a aplicação do precedente vinculante firmado pelo STF. Conforme assentado na decisão agravada, a CONITEC avaliou e rejeitou a incorporação do Riociguat (Adempas®) para o quadro clínico da autora (Hipertensão Pulmonar Secundária a Tromboembolismo Pulmonar Crônico), fundamentando sua decisão em estudos de custo-efetividade, na avaliação do impacto orçamentário para o sistema público de saúde e nas incertezas quanto à eficácia do medicamento a longo prazo.\r\n\r\n\r\n\r\n 4. Não se desconhece a gravidade do quadro clínico da autora, todavia, à luz das teses firmadas pelo Supremo Tribunal Federal, tais deliberações administrativas não podem ser afastadas pelo Poder Judiciário, sob pena de indevida incursão no mérito administrativo. A atuação judicial, nesse contexto, deve observar os limites impostos pela separação de poderes, admitindo-se a intervenção apenas em situações excepcionais, o que não se verifica na hipótese em exame.\r\n\r\n\r\n\r\n 5. A aprovação de medicamento pela ANVISA traduz o reconhecimento de sua eficácia e segurança para as indicações constantes em bula, mas não implica, por si só, sua incorporação ao SUS. Isso porque a decisão de incorporação demanda uma análise mais ampla, que abrange, além da eficácia clínica, a relação custo-efetividade e o impacto orçamentário, elementos que integram o âmbito do mérito administrativo e não podem ser desconsiderados pelo Judiciário.\r\n\r\n\r\n\r\n 6. Não obstante a parte autora sustente a necessidade de reabertura da instrução processual para produção de provas, verifica-se que o medicamento pleiteado não foi incorporado pela CONITEC para o quadro clínico específico dos autos, circunstância que, conforme o exposto, inviabiliza o acolhimento da pretensão autoral.\r\n\r\n\r\n\r\n 7. Tratando-se de decisão fundada em precedente vinculante, a impugnação deve se limitar à demonstração da distinção entre o paradigma e o caso concreto, o que não ocorreu. A agravante limitou-se a reiterar fundamentos já apreciados, sem indicar situação excepcional apta a afastar a tese firmada pelo Supremo Tribunal Federal.\r\n\r\n\r\n\r\n 8. Agravo interno improvido.", "relatorio": "Trata-se de agravo interno interposto por LÚCIA MARIA GERALDO em face de decisão que, julgando de acordo com o entendimento firmado pelo STF nos Temas 06 e 1234, negou provimento ao recurso de apelação por ela interposto, mantendo incólume a sentença que julgou improcedente o pedido, objetivando o fornecimento do medicamento Riociguat (Adempas) para o tratamento de Hipertensão Pulmonar Secundária a Tromboembolismo Pulmonar Crônico (CID I27).\r\n\r\n\r\n\r\n A agravante requer a reforma da decisão agravada sob os seguintes argumentos: a) a autora sofre de Hipertensão Pulmonar Secundária a Tromboembolismo Pulmonar Crônico (CID I27) e, diante da gravidade do quadro clínico, necessita do medicamento Riociguat (Adempas), que tem registro na ANVISA e foi prescrito com a mesma finalidade terapêutica indicada em bula; b) a autora já se submeteu às alternativas terapêuticas disponíveis no SUS, mas evoluiu com piora clínica, sendo necessário destacar que a ausência do medicamento pode “elevar ainda mais a pressão na artéria pulmonar, com piora cardiopulmonar e em último caso a morte”; c) o laudo pericial comprova a imprescindibilidade clínica do tratamento, bem como a existência de “ensaio clínico randomizado, estudo multicêntrico, duplo cego. 1B”; d) resta evidenciada a ilegalidade da não incorporação do medicamente à luz das circunstâncias do caso concreto (esgotamento das alternativas terapêuticas do SUS, risco de agravamento da doença e até de morte, eficácia do medicamento à luz da medicina baseada em evidências); e) subsidiariamente, tendo em vista que toda a instrução processual e as decisões favoráveis que lhe sucederam ocorreram dentro dos limites da tese firmada pelo STJ em sede de recurso repetitivo, requer que haja a reabertura da fase probatória, para que a parte autora tenha a oportunidade de comprovar a satisfação dos novos requisitos exigidos para a concessão judicial do fornecimento gratuito de medicamentos; f) enfatiza-se que o tratamento de saúde já foi iniciado, de modo que sua interrupção abrupta tem forte potencial de gerar dano irreparável à saúde e dignidade da parte autora, sendo necessária a adoção de um regime de transição.\r\n\r\n\r\n\r\n Sem contrarrazões.\r\n\r\n\r\n\r\n É o relatório.", "voto": "A decisão agravada findou por negar provimento ao recurso de apelação interposto pela parte autora para, aplicando o entendimento firmado pelo STF no julgamento dos Temas 06 e 1234, reconhecer que, havendo decisão expressa da CONITEC pela não incorporação da tecnologia pleiteada (Portarias SCTIE/MS nº 75/2018 e nº 24/2022), não cabe ao Poder Judiciário adentrar o mérito administrativo, salvo em casos de flagrante ilegalidade, o que não restou verificado.\r\n\r\n\r\n\r\n Em que pese o esforço argumentativo da recorrente, não se verifica, no caso concreto, qualquer distinção relevante que permita afastar a aplicação do precedente vinculante firmado pelo STF. Conforme assentado na decisão agravada, a CONITEC avaliou e rejeitou a incorporação do Riociguat (Adempas®) para o quadro clínico da autora (Hipertensão Pulmonar Secundária a Tromboembolismo Pulmonar Crônico), fundamentando sua decisão em estudos de custo-efetividade, na avaliação do impacto orçamentário para o sistema público de saúde e nas incertezas quanto à eficácia do medicamento a longo prazo.\r\n\r\n\r\n\r\n Não se desconhece a gravidade do quadro clínico da autora, todavia, à luz das teses firmadas pelo Supremo Tribunal Federal, tais deliberações administrativas não podem ser afastadas pelo Poder Judiciário, sob pena de indevida incursão no mérito administrativo. A atuação judicial, nesse contexto, deve observar os limites impostos pela separação de poderes, admitindo-se a intervenção apenas em situações excepcionais, o que não se verifica na hipótese em exame.\r\n\r\n\r\n\r\n Ressalte-se, ademais, que a aprovação de medicamento pela ANVISA traduz o reconhecimento de sua eficácia e segurança para as indicações constantes em bula, mas não implica, por si só, sua incorporação ao SUS. Isso porque a decisão de incorporação demanda uma análise mais ampla, que abrange, além da eficácia clínica, a relação custo-efetividade e o impacto orçamentário, elementos que integram o âmbito do mérito administrativo e não podem ser desconsiderados pelo Judiciário.\r\n\r\n\r\n\r\n Outrossim, ainda que a parte autora sustente a necessidade de reabertura da instrução processual para produção de provas, verifica-se que o medicamento pleiteado não foi incorporado pela CONITEC para o quadro clínico específico dos autos, circunstância que, conforme o exposto, inviabiliza o acolhimento da pretensão autoral.\r\n\r\n\r\n\r\n Por fim, cumpre destacar que, tratando-se de decisão fundada em precedente vinculante, a impugnação deve se limitar à demonstração da distinção entre o paradigma e o caso concreto, o que não ocorreu. A agravante limitou-se a reiterar fundamentos já apreciados, sem indicar situação excepcional apta a afastar a tese firmada pelo Supremo Tribunal Federal.\r\n\r\n\r\n\r\n É possível observar, portanto, que a decisão agravada encontra-se em conformidade com o entendimento firmado no julgamento do repetitivo, devendo ser mantida em sua integralidade.\r\n\r\n\r\n\r\n Ante o exposto, NEGO PROVIMENTO ao agravo interno.\r\n\r\n\r\n\r\n É como voto.", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\n Decide a 3ª Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO ao Agravo Interno, nos termos do voto do relator e na forma do relatório constante dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido", "obs_assessor": "﻿\r\n\r\n Minuta revisada por Evellyn Barbosa\r\n\r\n Att.,\r\n\r\n Ariel Campos\r\n\r\n Residente Jurídica\r\n\r\n Poder Judiciário\r\n\r\n Tribunal Regional Federal da 5ª Região\r\n\r\n Gabinete do Desembargador Federal Rogério Fialho Moreira", "tem_obs_assessor": true, "assunto": "", "ramo": "Administrativo", "subgrupo": "Apelação/Remessa Necessária", "subclasse": "Agravo Interno"}, {"nome": "20260318_193527_Re__VOTO.ED.0800212-82.2025.4.05.8100.VIRTUAL.09.04.2026", "nome_arq": "VOTO.ED.0800212-82.2025.4.05.8100.VIRTUAL.09.04.2026", "cnj": "0800212-82.2025.4.05.8100", "cab": "0800212-82.2025.4.05.8100", "assessor": "Débora Cesário Regis Fazio", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "APELAÇÃO CÍVEL (198)", "polo_ativo": "UNIAO FEDERAL, FUNDO NACIONAL DE DESENVOLVIMENTO DA EDUCACAO", "adv_polo_ativo": "Não informado", "polo_passivo": "JOSE ISMAEL GUIMARAES DE ALENCAR", "adv_polo_passivo": "MARCOS ANTONIO INACIO DA SILVA - PE573-A", "ementa": "PROCESSUAL CIVIL.  ADMINISTRATIVO. EMBARGOS DE DECLARAÇÃO. FIES. EXTENSÃO DO PRAZO DE CARÊNCIA. RESIDÊNCIA MÉDICA. CONTRATO FIRMADO EM 2018. REDAÇÃO DADA PELA LEI Nº 13.530/2017. INEXISTÊNCIA DE CARÊNCIA. FASE DE AMORTIZAÇÃO. PRORROGAÇÃO. DESCABIMENTO. ERRO MATERIAL INEXISTENTE. EMBARGOS IMPROVIDOS.\r\n\r\n\r\n\r\n1. Embargos de declaração opostos pela parte autora em face de acórdão que, na presente ação em que se persegue a extensão do período de carência de contrato de Fies durante o período de residência médica,  deu provimento às apelações, para julgar improcedente a ação.\r\n\r\n\r\n\r\n2. Alega-se, em síntese, nas razões de recurso, a existência de erro material, no v. acórdão, visto que a tese utilizada para embasar o posicionamento adotado não condiz com o pleito inicial da parte autora/embargante, sendo nítido o equívoco decorrente de confusão entre as teses, pois ambas envolvem o pagamento do FIES, mas os argumentos que envolvem cada uma são diferentes.  Afirma-se que a Lei 10.260/2001 não faz qualquer distinção de datas, enquanto a Lei 13.530/2017, que se refere ao “Novo FIES”, restringe o benefício da redução dos juros aos contratos celebrados antes de 2018. Desse modo, considerando que consistem em teses distintas e que o autor/embargante não busca o benefício da Lei 13.530/2017, com a redução dos juros acrescidos do valor devido, é imprescindível que tal vício seja sanado.\r\n\r\n\r\n\r\n3. Diversamente do que afirma a parte embargante, o acórdão embargado enfrentou a questão suscitada, de forma acertada e clara, ao sustentar, com arrimo na jurisprudência desta Corte Regional, que, após as alterações procedidas na Lei n.º 10.260/2001  pela Lei nº. 13.530/2017 (“Novo FIES”), o instituto da carência passou a ser previsto apenas para os contratos firmados até o segundo semestre de 2017, sendo o que se depreende do disposto nos artigos 5º, IV e 5º-C, IV, nos termos dos quais, para os financiamentos concedidos com recursos do Fies até o segundo semestre de 2017 deve ser observada carência de 18 (dezoito) meses contados a partir do mês imediatamente subsequente ao da conclusão do curso, enquanto que, para os financiamentos concedidos a partir do primeiro semestre de 2018, o início do pagamento do financiamento se dará no mês imediatamente subsequente ao da conclusão do curso. Diante disso, o § 3º do art. 6º-B da Lei n.º 10.260/2001, que trata da extensão do período de carência durante a realização da residência médica em áreas prioritárias, somente se aplica aos contratos firmados até o segundo semestre de 2017, uma vez que não se pode estender uma fase que sequer se encontra prevista para os contratos assinados a partir do primeiro semestre de 2018.\r\n\r\n\r\n\r\n 4. Para desconstituir os fundamentos utilizados no acórdão, cabe à parte manejar o recurso cabível, não se prestando os aclaratórios à modificação do que foi sobejamente decidido.\r\n\r\n\r\n\r\n 5. Embargos de declaração improvidos.", "relatorio": "Trata-se de embargos de declaração opostos pela parte autora em face de acórdão que, na presente ação em que se persegue a extensão do período de carência de contrato de Fies durante o período de residência médica,  deu provimento às apelações, para julgar improcedente a ação.\r\n\r\n\r\n\r\nAlega-se, em síntese, nas razões de recurso, a existência de erro material no v. acórdão, visto que a tese utilizada para embasar o posicionamento adotado não condiz com o pleito inicial da parte autora/embargante, sendo nítido o equívoco decorrente de confusão entre as teses, pois ambas envolvem o pagamento do FIES, mas os argumentos que envolvem cada uma são diferentes.\r\n\r\n\r\n\r\nAfirma-se que a Lei 10.260/2001 não faz qualquer distinção de datas, enquanto a Lei 13.530/2017, que se refere ao “Novo FIES”, restringe o benefício da redução dos juros aos contratos celebrados antes de 2018. Desse modo, considerando que consistem em teses distintas e que o embargante não busca o benefício da Lei 13.530/2017, com a redução dos juros acrescidos do valor devido, é imprescindível que tal vício seja sanado para que o embargante não seja prejudicado.\r\n\r\n\r\n\r\nContrarrazões apresentadas.\r\n\r\n\r\n\r\nÉ o relatório.\r\n\r\n\r\n\r\nPROCESSO Nº 0800212-82.2025.4.05.8100\r\n\r\n CLASSE: APELAÇÃO CÍVEL (198)\r\n\r\n ASSUNTO:[FIES]\r\n\r\n APELANTE: UNIAO FEDERAL, FUNDO NACIONAL DE DESENVOLVIMENTO DA EDUCACAO\r\n\r\n APELADO: JOSE ISMAEL GUIMARAES DE ALENCAR\r\n\r\n ADVOGADO DO(A) APELADO: MARCOS ANTONIO INACIO DA SILVA - PE573-A", "voto": "A teor do que dispõe o art. 1.022 do Código de Processo Civil, cabem embargos de declaração “contra qualquer decisão judicial para esclarecer obscuridade ou eliminar contradição; suprir omissão de ponto ou questão sobre o qual devia se pronunciar o juiz de ofício ou a requerimento; e/ou corrigir erro material”.\r\n\r\n\r\n\r\n No caso, não há que falar em erro material nos termos alegados.\r\n\r\n\r\n\r\n Diversamente do que afirma a parte embargante, o acórdão embargado enfrentou a questão suscitada, de forma acertada e clara, ao sustentar, com arrimo na jurisprudência desta Corte Regional, que (a) após as alterações procedidas na Lei n.º 10.260/2001  pela Lei nº. 13.530/2017 (“Novo FIES”), o instituto da carência passou a ser previsto apenas para os contratos firmados até o segundo semestre de 2017, sendo o que se depreende do disposto nos artigos 5º, IV e 5º-C, IV, nos termos dos quais, para os financiamentos concedidos com recursos do Fies até o segundo semestre de 2017 deve ser observada carência de 18 (dezoito) meses contados a partir do mês imediatamente subsequente ao da conclusão do curso, enquanto que, para os financiamentos concedidos a partir do primeiro semestre de 2018, o início do pagamento do financiamento se dará no mês imediatamente subsequente ao da conclusão do curso. Diante disso, o § 3º do art. 6º-B da Lei n.º 10.260/2001, que trata da extensão do período de carência durante a realização da residência médica em áreas prioritárias, somente se aplica aos contratos firmados até o segundo semestre de 2017, uma vez que não se pode estender uma fase que sequer se encontra prevista para os contratos assinados a partir do primeiro semestre de 2018.\r\n\r\n\r\n\r\n Para desconstituir os fundamentos utilizados no acórdão, cabe à parte manejar o recurso cabível, não se prestando os aclaratórios à modificação do que foi sobejamente decidido.\r\n\r\n\r\n\r\n Em face do exposto, conheço dos embargos de declaração e nego-lhes provimento.\r\n\r\n\r\n\r\n É como voto.\r\n\r\n\r\n\r\nPROCESSO Nº 0800212-82.2025.4.05.8100\r\n\r\n CLASSE: APELAÇÃO CÍVEL (198)\r\n\r\n ASSUNTO:[FIES]\r\n\r\n APELANTE: UNIAO FEDERAL, FUNDO NACIONAL DE DESENVOLVIMENTO DA EDUCACAO\r\n\r\n APELADO: JOSE ISMAEL GUIMARAES DE ALENCAR\r\n\r\n ADVOGADO DO(A) APELADO: MARCOS ANTONIO INACIO DA SILVA - PE573-A", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\n Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO aos embargos de declaração, nos termos do voto do relator e na forma do relatório constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido", "obs_assessor": "﻿", "tem_obs_assessor": false, "assunto": "[FIES]", "ramo": "Administrativo", "subgrupo": "Apelação", "subclasse": "Embargos de Declaração"}, {"nome": "20260319_102403_Re__VOTO.0005314-71.2025.4.05.0000.VIRTUAL.09.04.2026", "nome_arq": "VOTO.0005314-71.2025.4.05.0000.VIRTUAL.09.04.2026", "cnj": "0005314-71.2025.4.05.0000", "cab": "0005314-71.2025.4.05.0000", "assessor": "Débora Cesário Regis Fazio", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "AGRAVO DE INSTRUMENTO (202)", "polo_ativo": "EDPO JORDY FERNANDES DA SILVA", "adv_polo_ativo": "PAULO ANTONIO MAIA E SILVA JUNIOR - PB28412", "polo_passivo": "FUNDO NACIONAL DE DESENVOLVIMENTO DA EDUCACAO, UNIAO FEDERAL, CAIXA ECONOMICA FEDERAL", "adv_polo_passivo": "Não informado", "ementa": "PROCESSUAL CIVIL. AGRAVO DE INSTRUMENTO. CONTRATO DE FIES. ABATIMENTO MENSAL DE 1% DO SALDO DEVEDOR. PROVIMENTO DE URGÊNCIA INDEFERIDO. REQUISITOS NÃO CONFIGURADOS. JUSTIÇA GRATUITA DEFERIDA. AGRAVO PARCIALMENTE PROVIDO.\r\n\r\n\r\n\r\n 1. Agravo de instrumento interposto por Edpo Jordy Fernandes da Silva contra decisão que indeferiu a liminar objetivando provimento jurisdicional que lhe assegure o abatimento mensal de 1% do saldo devedor do contrato de FIES, bem como a gratuidade da justiça.\r\n\r\n\r\n\r\n2. Deferido o benefício da justiça gratuita requerido pela parte autora/agravante, diante da presunção de veracidade de que goza a declaração de hipossuficiência apresentada (art. 99, § 3º, do CPC), bem como por não haver, nos autos, elementos que evidenciem a falta dos pressupostos legais para a concessão de gratuidade (art. 99, § 2º, do CPC).\r\n\r\n\r\n\r\n 3. Nos termos do art. 300, caput e parágrafo 3º do CPC, a tutela de urgência será concedida quando houver elementos que evidenciem a probabilidade do direito, o perigo de dano ou o risco ao resultado útil do processo e, por fim, a reversibilidade do provimento antecipado.\r\n\r\n\r\n\r\n 4. O agravante busca o abatimento de 1% mensal no saldo devedor do FIES em razão de sua atuação na Estratégia de Saúde da Família (ESF) desde janeiro de 2022, mas, somente em julho de 2025, protocolou o requerimento administrativo para obtenção do benefício legal. Essa inércia prolongada - de mais de três anos - fragiliza a alegação de urgência, pois o próprio interessado permaneceu inerte durante período considerável, não podendo agora invocar o tempo como fator de risco iminente.\r\n\r\n\r\n\r\n 5. Ainda que se alegue urgência diante da necessidade de cessar lesão atual, consubstanciada em prejuízo decorrente do pagamento de alto valor das prestações do financiamento, é certo que não restou demonstrado de forma inequívoca, nos autos, o risco concreto de negativação, execução ou comprometimento da subsistência do agravante, pelo que não se encontra preenchido o requisito do perigo de dano.\r\n\r\n\r\n\r\n 6. Agravo de instrumento parcialmente provido,  apenas para deferir o benefício da justiça gratuita à parte agravante. Agravo interno prejudicado.", "relatorio": "Trata-se de agravo de instrumento, com pedido de antecipação da tutela recursal (efeito suspensivo ativo), interposto por Edpo Jordy Fernandes da Silva contra decisão que indeferiu a liminar objetivando provimento jurisdicional que lhe assegure o abatimento de mensal de 1% do saldo devedor do contrato de FIES, bem como a gratuidade da justiça.\r\n\r\n\r\n\r\n Nas razões recursais, traz os seguintes argumentos:\r\n\r\n\r\n\r\n a) é médico, com atuação na Estratégia Saúde da Família (ESF) desde janeiro/2022 com jornada de 40h semanais em área prioritária do Ministério da Saúde;\r\n\r\n\r\n\r\n b) visando a redução/abatimento de 1% ao mês do saldo devedor do contrato FIES, protocolou pedido administrativo em 22/07/2025, sem decisão administrativa até a propositura da ação;\r\n\r\n\r\n\r\n c) a ilegalidade no indeferimento sumário da justiça gratuita sem intimá-lo para comprovação (violação do art. 99, §2º e §3º do CPC);\r\n\r\n\r\n\r\n d) a documentação acostada é apta a demonstrar comprometimento de renda e as despesas que justificam a assistência judiciária;\r\n\r\n\r\n\r\n e) o perigo de dano também é manifesto, na medida em que a manutenção das cobranças mensais do FIES, em valores substanciais, coloca em risco a subsistência do Agravante e compromete o desempenho de suas funções médicas em localidade carente, ao mesmo tempo em que inviabiliza a eficácia do provimento final.\r\n\r\n\r\n\r\n Em decisão fundamentada proferida nos autos, foi deferido, em parte, o pedido de antecipação da tutela recursal.\r\n\r\n\r\n\r\n Contra a decisão, foi interposto agravo interno.\r\n\r\n\r\n\r\n Contrarrazões apresentadas.\r\n\r\n\r\n\r\n É o relatório.\r\n\r\n\r\n\r\nPROCESSO Nº 0005314-71.2025.4.05.0000\r\n\r\n CLASSE: AGRAVO DE INSTRUMENTO (202)\r\n\r\n ASSUNTO:[FIES]\r\n\r\n AGRAVANTE: EDPO JORDY FERNANDES DA SILVA\r\n\r\n ADVOGADO DO(A) AGRAVANTE: PAULO ANTONIO MAIA E SILVA JUNIOR - PB28412\r\n\r\n AGRAVADO: FUNDO NACIONAL DE DESENVOLVIMENTO DA EDUCACAO, UNIAO FEDERAL, CAIXA ECONOMICA FEDERAL", "voto": "Defiro, de início, o benefício da justiça gratuita requerido pela parte autora/agravante, diante da presunção de veracidade de que goza a declaração de hipossuficiência apresentada (art. 99, § 3º, do CPC), bem como por não haver, nos autos, elementos que evidenciem a falta dos pressupostos legais para a concessão de gratuidade (art. 99, § 2º, do CPC).\r\n\r\n\r\n\r\n Nos termos do art. 300, caput e parágrafo 3º do CPC, a tutela de urgência será concedida quando houver elementos que evidenciem a probabilidade do direito, o perigo de dano ou o risco ao resultado útil do processo e, por fim, a reversibilidade do provimento antecipado.\r\n\r\n\r\n\r\n No caso dos autos, não estão presentes os requisitos para o deferimento do pedido antecipatório.\r\n\r\n\r\n\r\n O agravante busca o abatimento de 1% mensal no saldo devedor do FIES em razão de sua atuação na Estratégia de Saúde da Família (ESF) desde janeiro de 2022, mas, somente em julho de 2025, protocolou o requerimento administrativo para obtenção do benefício legal. Essa inércia prolongada -- de mais de três anos -- fragiliza a alegação de urgência, pois o próprio interessado permaneceu inerte durante período considerável, não podendo agora invocar o tempo como fator de risco iminente.\r\n\r\n\r\n\r\n Ainda que se alegue urgência diante da necessidade de cessar lesão atual, consubstanciada em prejuízo decorrente do pagamento de alto valor das prestações do financiamento, é certo que não restou demonstrado de forma inequívoca, nos autos, o risco concreto de negativação, execução ou comprometimento da subsistência do agravante, pelo que não se encontra preenchido o requisito do perigo de dano.\r\n\r\n\r\n\r\n Com essas considerações, dou parcial provimento ao agravo de instrumento, apenas para deferir o benefício da justiça gratuita à parte agravante.\r\n\r\n\r\n\r\n É como voto.\r\n\r\n\r\n\r\nPROCESSO Nº 0005314-71.2025.4.05.0000\r\n\r\n CLASSE: AGRAVO DE INSTRUMENTO (202)\r\n\r\n ASSUNTO:[FIES]\r\n\r\n AGRAVANTE: EDPO JORDY FERNANDES DA SILVA\r\n\r\n ADVOGADO DO(A) AGRAVANTE: PAULO ANTONIO MAIA E SILVA JUNIOR - PB28412\r\n\r\n AGRAVADO: FUNDO NACIONAL DE DESENVOLVIMENTO DA EDUCACAO, UNIAO FEDERAL, CAIXA ECONOMICA FEDERAL", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\nDecide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, DAR PARCIAL PROVIMENTO ao agravo de instrumento, julgando prejudicado o agravo interno, nos termos do voto do relator e na forma do relatório constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Resultado não identificado", "css": "outro", "obs_assessor": "﻿", "tem_obs_assessor": false, "assunto": "[FIES]", "ramo": "Outros", "subgrupo": "", "subclasse": ""}, {"nome": "20260319_105422_Re__VOTO.ED.0005582-28.2025.4.05.0000.VIRTUAL.09.04.2026", "nome_arq": "VOTO.ED.0005582-28.2025.4.05.0000.VIRTUAL.09.04.2026", "cnj": "0005582-28.2025.4.05.0000", "cab": "0005582-28.2025.4.05.0000", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "AGRAVO DE INSTRUMENTO (202)", "polo_ativo": "UNIAO FEDERAL", "adv_polo_ativo": "Não informado", "polo_passivo": "IVETTE MIRANDA DOS GUARANYS\r\n\r\nINICIO RELATORIO", "adv_polo_passivo": "SERGIO LUDMER - PE21485", "ementa": "EMBARGOS DE DECLARAÇÃO. AGRAVO DE INSTRUMENTO. CUMPRIMENTO DE SENTENÇA. ADMINISTRATIVO. REAJUSTE DE APOSENTADORIAS E PENSÕES PELOS ÍNDICES DO RGPS. BÔNUS DE EFICIÊNCIA. PRETENSA OMISSÃO. INEXISTÊNCIA. REDISCUSSÃO DE MÉRITO. IMPROVIMENTO.\r\n\r\n\r\n\r\n1. Embargos de declaração opostos pela União Federal contra o acórdão proferido por esta 3ª Turma, que, à unanimidade, negou provimento ao agravo de instrumento interposto pelo mesmo ente público, mantendo a decisão do Juízo da 21ª Vara Federal da Seção Judiciária de Pernambuco que, na fase de cumprimento de sentença, afastou a pretensão de compensação do valor do Bônus de Eficiência e Produtividade na Atividade Tributária e Aduaneira — instituído pelo art. 7º da Lei nº 13.464/2017 — dos cálculos referentes ao reajuste das aposentadorias e pensões pelos índices do RGPS, deferido em sentença transitada em julgado.\r\n\r\n\r\n\r\n2. A embargante alega, em síntese, a existência de omissão no acórdão, sob o argumento de que o julgado teria desconsiderado os valores recebidos pelos beneficiários posteriormente ao trânsito em julgado do processo de conhecimento. Sustenta que a sentença exequenda, ao facultar à União a compensação de \"índices outros\" aplicados às aposentadorias e pensões, teria autorizado, em leitura ampla, o abatimento de quaisquer verbas supervenientes que tenham incrementado os benefícios, inclusive o Bônus de Eficiência, que, segundo a embargante, integra a folha de inativos e pensionistas desde janeiro de 2017 e teria sido instituído com finalidade de reestruturação de carreira. Invoca, por analogia, precedente do STJ sobre limitação temporal do reajuste de 28,86% à reestruturação de carreira. Requer, ao final, o acolhimento dos embargos com efeitos modificativos e, subsidiariamente, que se tenha por satisfeito o prequestionamento das matérias suscitadas.\r\n\r\n\r\n\r\n3. Não há omissão quando o acórdão embargado enfrentou, de forma expressa e suficientemente fundamentada, a questão central controvertida — a impossibilidade de compensação do Bônus de Eficiência com os valores devidos a título de reajuste das aposentadorias e pensões pelos índices do RGPS —, concluindo pela distinção de natureza jurídica entre as rubricas.\r\n\r\n\r\n\r\n4. A alegação de que o julgado teria ignorado vantagem superveniente ao trânsito em julgado do processo cognitivo não configura omissão integrável pela via dos embargos de declaração, mas pretensão de revisão do mérito já decidido, incompatível com a natureza e os limites deste recurso.\r\n\r\n\r\n\r\n5. Embargos de declaração conhecidos e improvidos.", "relatorio": "Trata-se de embargos de declaração opostos pela União Federal contra o acórdão proferido por esta 3ª Turma, que, à unanimidade, negou provimento ao agravo de instrumento interposto pelo mesmo ente público, mantendo a decisão do Juízo da 21ª Vara Federal da Seção Judiciária de Pernambuco que, na fase de cumprimento de sentença, afastou a pretensão de compensação do valor do Bônus de Eficiência e Produtividade na Atividade Tributária e Aduaneira — instituído pelo art. 7º da Lei nº 13.464/2017 — dos cálculos referentes ao reajuste das aposentadorias e pensões pelos índices do RGPS, deferido em sentença transitada em julgado.\r\n\r\n\r\n\r\nA embargante alega, em síntese, a existência de omissão no acórdão, sob o argumento de que o julgado teria desconsiderado os valores recebidos pelos beneficiários posteriormente ao trânsito em julgado do processo de conhecimento. Sustenta que a sentença exequenda, ao facultar à União a compensação de \"índices outros\" aplicados às aposentadorias e pensões, teria autorizado, em leitura ampla, o abatimento de quaisquer verbas supervenientes que tenham incrementado os benefícios, inclusive o Bônus de Eficiência, que, segundo a embargante, integra a folha de inativos e pensionistas desde janeiro de 2017 e teria sido instituído com finalidade de reestruturação de carreira. Invoca, por analogia, precedente do STJ sobre limitação temporal do reajuste de 28,86% à reestruturação de carreira. Requer, ao final, o acolhimento dos embargos com efeitos modificativos e, subsidiariamente, que se tenha por satisfeito o prequestionamento das matérias suscitadas.\r\n\r\n\r\n\r\nContrarrazões apresentadas.\r\n\r\n\r\n\r\n É o relatório.\r\n\r\n\r\n\r\nFIM RELATÓRIO\r\n\r\n\r\n\r\n PROCESSO Nº 0005582-28.2025.4.05.0000\r\n\r\n CLASSE: AGRAVO DE INSTRUMENTO (202)\r\n\r\n AGRAVANTE: UNIAO FEDERAL\r\n\r\n AGRAVADO: IVETTE MIRANDA DOS GUARANYS\r\n\r\n ADVOGADO DO(A) AGRAVADO: SERGIO LUDMER - PE21485\r\n\r\n\r\n\r\n RELATOR: DESEMBARGADOR FEDERAL ROGÉRIO FIALHO\r\n\r\n\r\n\r\nINICIO VOTO", "voto": "A teor do que dispõe o art. 1.022 do Código de Processo Civil, cabem embargos de declaração \"contra qualquer decisão judicial para esclarecer obscuridade ou eliminar contradição; suprir omissão de ponto ou questão sobre o qual devia se pronunciar o juiz de ofício ou a requerimento; e/ou corrigir erro material\".\r\n\r\n\r\n\r\n  O acórdão embargado encontra-se assim ementado:\r\n\r\n\r\n\r\nAGRAVO DE INSTRUMENTO. CUMPRIMENTO DE SENTENÇA. ADMINISTRATIVO. REAJUSTE DE BENEFÍCIO DE SERVIDOR PELOS ÍNDICES DO RGPS. BÔNUS DE EFICIÊNCIA. COMPENSAÇÃO INDEVIDA. IMPROVIMENTO.\r\n\r\n\r\n\r\n1. Agravo de instrumento interposto pelo UNIÃO FEDERAL contra decisão proferida pelo Juízo da 21ª Vara Federal da Seção Judiciária de Pernambuco que, em cumprimento de sentença, entendeu que o valor do \"Bônus de Eficiência\" não deve entrar no cômputo do reajuste deferido pela sentença exequenda, considerando que são grandezas remuneratórias distintas.\r\n\r\n\r\n\r\n2. A sentença exequenda determinou o reajuste as aposentadorias e pensões dos servidores substituídos, desde que concedidas com base no art. 40, da CF/88 e no art. 2º, da EC 41/03, tendo por índices os mesmos aplicados aos benefícios do RGPS, desde 2004. Além disso, sustenta, a sentença teria assegurado que, quando da execução, desde que comprovada a aplicação de índices outros às aposentadorias e pensões, ficaria facultado à ré apresentar planilhas e documentos com vistas à compensação do que já fora concedido.\r\n\r\n\r\n\r\n3. A possibilidade, fixada na sentença exequenda, de compensação de reajustes das aposentadorias e pensões por \"índices outros\" não permite que também seja compensada vantagem concedida a todos os servidores ativos e inativos, a título de bonificação por desempenho. Em realidade, não se tratou de reajuste, mas de uma nova vantagem de natureza distinta.\r\n\r\n\r\n\r\n4. O presente cumprimento de sentença diz respeito aos reajustes deferidos para garantir a preservação do valor real dos benefícios daqueles que não têm paridade, enquanto o bônus concedido aos aposentados e pensionistas, previsto na Lei n. 13.464/2017, se refere à incorporação de uma gratificação de desempenho a aposentadorias e pensões. Por tal razão, o valor do Bônus de Eficiência não deve ser abatido dos cálculos dos reajustes.\r\n\r\n\r\n\r\n5. Agravo de instrumento improvido.\r\n\r\n\r\n\r\nA embargante sustenta que o acórdão teria sido omisso ao não enfrentar a questão relativa aos valores do Bônus de Eficiência recebidos pelos beneficiários após o trânsito em julgado do processo cognitivo, os quais, segundo a União, deveriam ser objeto de compensação nos cálculos do cumprimento de sentença.\r\n\r\n\r\n\r\nO argumento não prospera.\r\n\r\n\r\n\r\nA leitura do acórdão embargado revela que esta Turma examinou, de forma direta e fundamentada, precisamente a questão que a embargante alega ter sido ignorada: a possibilidade ou não de o Bônus de Eficiência ser abatido dos cálculos referentes ao reajuste pelo RGPS. O julgado foi explícito ao distinguir, do ponto de vista jurídico, as duas rubricas: o reajuste visa à preservação do valor real dos benefícios de servidores sem paridade; o Bônus de Eficiência, por outro lado, corresponde à incorporação de uma gratificação de desempenho, prevista na Lei nº 13.464/2017, estendida a inativos e pensionistas. A partir dessa distinção, o acórdão concluiu que a cláusula da sentença exequenda que facultou a compensação de \"índices outros\" não alcança verbas de natureza remuneratória diversa do reajuste.\r\n\r\n\r\n\r\nIsso significa que o acórdão não deixou de apreciar a questão — ele a apreciou e a resolveu contrariamente à pretensão da União. A embargante, ao afirmar que o julgado foi omisso, está, na realidade, manifestando seu inconformismo com a conclusão adotada. Essa situação não configura omissão integrável por embargos de declaração.\r\n\r\n\r\n\r\nO argumento adicional da embargante, fundado na analogia com a jurisprudência do STJ sobre o limite temporal do reajuste de 28,86% à reestruturação de carreira, também não autoriza a conclusão de omissão. O precedente invocado diz respeito a hipótese distinta, em que a reestruturação da própria carreira objeto do reajuste é que limita temporalmente a incidência da condenação. No caso dos autos, o que se discute não é a extinção da obrigação de reajuste pelo RGPS em razão de reestruturação de carreira, mas a pretensão de compensar, no cômputo desse reajuste, vantagem remuneratória de natureza autônoma. As premissas são diversas, e o acórdão não estava obrigado a rebater argumento analógico que não foi central à controvérsia.\r\n\r\n\r\n\r\nNão há, portanto, omissão a ser sanada. O julgado apreciou a questão determinante para o resultado, com fundamentação suficiente e coerente. O que se verifica é tentativa de rediscutir, pela via dos embargos de declaração, o mérito de questão já definitivamente resolvida pelo acórdão — utilização que não encontra amparo na função integrativa deste recurso.\r\n\r\n\r\n\r\nPosto isso, CONHEÇO E NEGO PROVIMENTO aos embargos de declaração.\r\n\r\n\r\n\r\n É como voto.\r\n\r\n\r\n\r\nFIM VOTO\r\n\r\n\r\n\r\n PROCESSO Nº 0005582-28.2025.4.05.0000\r\n\r\n CLASSE: AGRAVO DE INSTRUMENTO (202)\r\n\r\n AGRAVANTE: UNIAO FEDERAL\r\n\r\n AGRAVADO: IVETTE MIRANDA DOS GUARANYS\r\n\r\n ADVOGADO DO(A) AGRAVADO: SERGIO LUDMER - PE21485\r\n\r\n\r\n\r\n RELATOR: DESEMBARGADOR FEDERAL ROGÉRIO FIALHO", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\nDecide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, CONHECER E NEGAR PROVIMENTO aos embargos de declaração, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido", "obs_assessor": "﻿", "tem_obs_assessor": false, "assunto": "", "ramo": "Administrativo", "subgrupo": "Agravo de Instrumento", "subclasse": "Embargos de Declaração"}, {"nome": "20260319_125140_Re__VOTO.ED.0000610-15.2025.4.05.0000.VIRTUAL.09.04.2026", "nome_arq": "VOTO.ED.0000610-15.2025.4.05.0000.VIRTUAL.09.04.2026", "cnj": "0000610-15.2025.4.05.0000", "cab": "0000610-15.2025.4.05.0000", "assessor": "Débora Cesário Regis Fazio", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "AGRAVO DE INSTRUMENTO (202)", "polo_ativo": "NOELY DANTAS ARAUJO", "adv_polo_ativo": "PAULO ANTONIO MAIA E SILVA JUNIOR - PB28412", "polo_passivo": "FUNDO NACIONAL DE DESENVOLVIMENTO DA EDUCACAO, UNIAO FEDERAL, CAIXA ECONOMICA FEDERAL", "adv_polo_passivo": "Não informado", "ementa": "PROCESSUAL CIVIL. EMBARGOS DE DECLARAÇÃO. FIES. ABATIMENTO DE 1% DO SALDO DEVEDOR. REQUERIMENTO ADMINISTRATIVO NÃO APRECIADO NO PRAZO LEGAL. TUTELA DE URGÊNCIA. INDEFERIMENTO. OMISSÃO E CONTRATIÇÃO INEXISTENTES. EMBARGOS IMPROVIDOS.\r\n\r\n\r\n\r\n1. Embargos de declaração opostos por  Noély Dantas Araújo em face de acórdão que deu parcial provimento ao agravo de instrumento, para determinar que a autoridade administrativa competente proceda à análise do requerimento de abatimento de 1% no saldo devedor do FIES da agravante/embargante, pela via do FIESMED ou outra a ser oportunizada caso aquela se apresente inadequada ao intento, no prazo determinado na decisão que deferiu, em parte, a antecipação da tutela recursal.\r\n\r\n\r\n\r\n 2. Alega-se, em síntese, nas razões recursais: (a) O v. acórdão foi omisso por não se manifestar acerca do pedido de aplicação imediata do abatimento de 1% do financiamento estudantil da parte agravante, não refutando, sequer implicitamente, a tese de que a Administração atua apenas de forma declaratória nesse contexto; (b) Embora o acórdão embargado tenha reconhecido a mora administrativa e a resistência tácita, não houve qualquer análise do periculum in mora, amplamente demonstrado nos autos; (c) Existência de contradição interna não resolvida, pois o acórdão reconhece a ilegalidade da omissão administrativa e a resistência tácita, mas, paradoxalmente, nega a tutela jurisdicional efetiva, remetendo a autora ao mesmo ente omisso; (d) O v. acórdão incorreu em omissão ao determinar apenas a análise do requerimento administrativo, divergindo do entendimento já consolidado em outras Turmas deste Egrégio Tribunal Regional Federal da 5ª Região, que, em casos idênticos, têm garantido a imediata concessão do abatimento de 1% (um por cento) do saldo devedor do FIES, bem como a suspensão das parcelas de amortização.\r\n\r\n\r\n\r\n 3. Os argumentos e precedentes jurisprudenciais suscitados não se mostram suficientes para infirmar o entendimento firmado, no v. acórdão, no sentido de considerar que, não tendo havido a negativa expressa do requerimento administrativo do benefício perseguido e, não cabendo ao Poder Judiciário substituir-se à Administração Pública para decidir diretamente o mérito do pedido formulado pela parte, sob pena de violação ao princípio da separação dos Poderes e à reserva de competência técnica do ente responsável, a solução que melhor se harmoniza com o estágio atual da controvérsia e com o princípio da deferência ao mérito administrativo consiste em determinar à autoridade competente que analise o pedido de abatimento formulado pela agravante em prazo razoável, providência que assegura a efetividade do controle judicial, sem incorrer em indevida interferência na esfera de discricionariedade administrativa, garantindo à agravante o exercício pleno de seus direitos processuais e materiais.\r\n\r\n\r\n\r\n 4. Para desconstituir os fundamentos utilizados no acórdão cabe à parte manejar o recurso cabível, não se prestando os aclaratórios à modificação do que foi sobejamente decidido, mesmo quando interpostos para fins de prequestionamento.\r\n\r\n\r\n\r\n5. Embargos improvidos.", "relatorio": "Trata-se de embargos de declaração opostos por Noély Dantas Araújo em face de acórdão que deu parcial provimento ao agravo de instrumento, para determinar que a autoridade administrativa competente proceda à análise do requerimento de abatimento de 1% no saldo devedor do FIES da agravante/embargante, pela via do FIESMED ou outra a ser oportunizada caso aquela se apresente inadequada ao intento, no prazo determinado na decisão que deferiu, em parte, a antecipação da tutela recursal.\r\n\r\n\r\n\r\n Alega-se, em síntese, nas razões recursais:\r\n\r\n\r\n\r\n a) O v. acórdão foi omisso por não se manifestar acerca do pedido de aplicação imediata do abatimento de 1% do financiamento estudantil da parte agravante, não refutando, sequer implicitamente, a tese de que a Administração atua apenas de forma declaratória nesse contexto.\r\n\r\n\r\n\r\nb) Embora o acórdão embargado tenha reconhecido a mora administrativa e a resistência tácita, não houve qualquer análise do periculum in mora, amplamente demonstrado nos autos.\r\n\r\n\r\n\r\nc) Existência de contradição interna não resolvida, pois o acórdão reconhece a ilegalidade da omissão administrativa e a resistência tácita, mas, paradoxalmente, nega a tutela jurisdicional efetiva, remetendo a autora ao mesmo ente omisso.\r\n\r\n\r\n\r\nd) O v. acórdão incorreu em omissão ao determinar apenas a análise do requerimento administrativo, divergindo do entendimento já consolidado em outras Turmas deste Egrégio Tribunal Regional Federal da 5ª Região, que, em casos idênticos, têm garantido a imediata concessão do abatimento de 1% (um por cento) do saldo devedor do FIES, bem como a suspensão das parcelas de amortização.\r\n\r\n\r\n\r\nContrarrazões apresentadas.\r\n\r\n\r\n\r\n É o que havia de relevante para relatar.\r\n\r\n\r\n\r\n PROCESSO Nº 0000610-15.2025.4.05.0000\r\n\r\n CLASSE: AGRAVO DE INSTRUMENTO (202)\r\n\r\n ASSUNTO:OBRIGAÇÃO DE FAZER / NÃO FAZER, FIES, FINANCIAMENTO PRIVADO DO ENSINO SUPERIOR E/OU PESQUISA]\r\n\r\n AGRAVANTE: NOELY DANTAS ARAUJO\r\n\r\n ADVOGADO DO(A) AGRAVANTE: PAULO ANTONIO MAIA E SILVA JUNIOR - PB28412\r\n\r\n AGRAVADO: FUNDO NACIONAL DE DESENVOLVIMENTO DA EDUCACAO, UNIAO FEDERAL, CAIXA ECONOMICA FEDERAL", "voto": "A teor do que dispõe o art. 1.022 do Código de Processo Civil, cabem embargos de declaração “contra qualquer decisão judicial para esclarecer obscuridade ou eliminar contradição; suprir omissão de ponto ou questão sobre o qual devia se pronunciar o juiz de ofício ou a requerimento; e/ou corrigir erro material”.\r\n\r\n\r\n\r\nDe acordo com o seu parágrafo único, considera-se omissa a decisão que “deixe de se manifestar sobre tese
