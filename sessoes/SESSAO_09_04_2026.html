tensão automática de tutela jurisdicional e a mera tramitação de projeto de lei para criação de novos cargos não sustenta juridicamente o seu pedido antecipatório, sobretudo porque o projeto legislativo não possui eficácia normativa, podendo ser alterado, rejeitado ou sequer apreciado, não sendo apto a caracterizar iminência de provimento de vagas.\r\n\r\n\r\n\r\n 6. Agravo de Instrumento improvido.", "relatorio": "Trata-se de Agravo de Instrumento, com pedido de antecipação da tutela recursal, interposto por HENRIQUE RAMOS LAGES contra decisão proferida pelo Juízo da 1ª Vara Federal da Seção Judiciária de Alagoas que indeferiu a liminar objetivando a reanálise e o reconhecimento de sua pontuação integral na fase de Prova de Títulos do Concurso Público Nacional Unificado da Justiça Eleitoral (CPNUJE - Edital nº 1/2024), para o cargo de Analista Judiciário - Área Judiciária do Tribunal Regional Eleitoral de Alagoas (TRE/AL).\r\n\r\n\r\n\r\n Nas razões recursais, traz os seguintes argumentos:\r\n\r\n\r\n\r\n a) foi aprovado no Concurso Público Nacional Unificado da Justiça Eleitoral (CPNUJE - Edital nº 1/2024) para o cargo de Analista Judiciário - Área Judiciária do TRE/AL, classificando-se na 10ª posição na lista geral de ampla concorrência;\r\n\r\n\r\n\r\n b) na fase de avaliação de títulos, comprovou 8 anos de atividades jurídicas (3 anos de advocacia privada em 2017, 2018 e 2019, mediante certidões de 5 atos processuais em cada ano, e 5 anos como Analista Judiciário do TJAL desde março/2020), que corresponderiam à pontuação máxima de 4,8 pontos;\r\n\r\n\r\n\r\n c) a banca examinadora atribuiu apenas 4,2 pontos (7 anos), indeferindo sumariamente o recurso administrativo com a lacônica fundamentação: \"reavaliamos e permanece não aceito\";\r\n\r\n\r\n\r\n d) após a homologação do concurso, em 02/07/2025 (Edital nº 38/2025), o Agravante constatou que uma candidata \"sub judice\" o ultrapassou por reclassificação judicial, em cumprimento à liminar deferida pela 2ª Vara Federal no processo nº 0804767-54.2025.4.05.8000.;\r\n\r\n\r\n\r\n e) com a diferença de 0,6 pontos indevidamente suprimida, o Agravante passou da 10ª para a 11ª posição, comprometendo diretamente sua expectativa legítima de nomeação;\r\n\r\n\r\n\r\n f) os fundamentos da decisão não se sustentam, seja porque os documentos comprobatórios estão todos acostados aos autos, pelo que, a mera conferência documental é suficiente para demonstrar o direito, seja porque a manutenção da situação atual consolida injustiça manifesta.\r\n\r\n\r\n\r\n Pedido de antecipação da tutela recursal indeferido por decisão desta Relatoria.\r\n\r\n\r\n\r\n Contrarrazões apresentadas pela União e pelo CEBRASPE.\r\n\r\n\r\n\r\n Manifestação do Agravante de ID nº. 6834980 ratifica seus argumentos.\r\n\r\n\r\n\r\n É o relatório.", "voto": "Por ocasião do pedido de antecipação da tutela recursal, o indeferi, nos seguintes termos:\r\n\r\n\r\n\r\n “(...)\r\n\r\n\r\n\r\n Nos termos do art. 1.019, inciso I, do CPC, poderá o relator atribuir efeito suspensivo ao agravo de instrumento ou deferir, em antecipação de tutela, total ou parcialmente a pretensão recursal, comunicando ao juiz sua decisão.\r\n\r\n\r\n\r\n No caso dos autos, entendo, em sede de cognição sumária, própria das decisões liminares, que não estão presentes os requisitos para o deferimento do pedido liminar.\r\n\r\n\r\n\r\n Embora sustente que a questão se resolveria mediante simples conferência documental, não se pode perder de vista que a aferição de atividade jurídica, mesmo quando fundada em documentos, não se resume a operação meramente de subsunção, mas envolve interpretação das normas editalícias, análise da natureza dos atos desempenhados e juízo técnico-administrativo da banca examinadora.\r\n\r\n\r\n\r\n A jurisprudência consolidada dos Tribunais Superiores é firme no sentido de que o controle judicial de concursos públicos deve ser exercido com cautela, limitando-se à verificação de legalidade, sendo vedada a substituição da banca examinadora pelo Judiciário, sobretudo em matéria que demanda avaliação técnica especializada.\r\n\r\n\r\n\r\n No caso concreto, ainda que se reconheça que a motivação apresentada pela banca examinadora no indeferimento do recurso administrativo foi sucinta, tal circunstância, por si só, não é suficiente para evidenciar, em sede de cognição sumária, a probabilidade qualificada do direito alegado, sobretudo quando a Administração ainda não foi regularmente chamada ao contraditório judicial para esclarecer os critérios adotados.\r\n\r\n\r\n\r\n Assim, correta a decisão agravada ao consignar que a matéria demanda instauração do contraditório e instrução adequada, incompatíveis com o juízo perfunctório próprio da tutela de urgência.\r\n\r\n\r\n\r\n Também não se verifica, no caso, o requisito do perigo de dano concreto e atual.\r\n\r\n\r\n\r\n O concurso em questão foi homologado exclusivamente para cadastro de reserva, circunstância que, conforme entendimento pacífico, gera mera expectativa de direito, não se convertendo em direito subjetivo à nomeação, salvo situações excepcionalíssimas, não demonstradas neste momento processual.\r\n\r\n\r\n\r\n A ultrapassagem do agravante por candidata beneficiada por decisão judicial liminar em outro processo não configura, por si só, perigo de dano irreparável, tampouco gera direito à extensão automática de tutela jurisdicional.\r\n\r\n\r\n\r\n As decisões em tutela provisória possuem natureza precária, personalíssima e dependente das circunstâncias específicas de cada caso, não sendo possível invocar isonomia para replicação de medidas judiciais concedidas a terceiros.\r\n\r\n\r\n\r\n Ademais, a mera tramitação de projeto de lei para criação de novos cargos não sustenta juridicamente o seu pedido antecipatório, sobretudo porque o projeto legislativo não possui eficácia normativa, podendo ser alterado, rejeitado ou sequer apreciado, não sendo apto a caracterizar iminência de provimento de vagas.\r\n\r\n\r\n\r\n Em verdade, não há notícia de nomeações em curso, tampouco ato administrativo concreto prestes a ser praticado que possa acarretar preterição irreversível do agravante.\r\n\r\n\r\n\r\n Ante o exposto, INDEFIRO a liminar.\r\n\r\n\r\n\r\n  (...)”\r\n\r\n\r\n\r\n Tendo como razão de decidir os fundamentos já apresentados na decisão que indeferiu o pedido de antecipação da tutela recursal e, não havendo qualquer modificação na situação fática e jurídica capaz de alterar as razões do convencimento, o mantenho em todos os seus termos.\r\n\r\n\r\n\r\n Pelo exposto, NEGO PROVIMENTO ao agravo de instrumento.\r\n\r\n\r\n\r\n É como voto.", "acordao": "Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO ao agravo de instrumento, nos termos do voto do relator e na forma do relatório constante dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido", "obs_assessor": "﻿\r\n\r\n Dr. Rogério, minuta revisada por Évellyn.\r\n\r\n Poder Judiciário\r\n\r\n Tribunal Regional Federal da 5ª Região\r\n\r\n Gabinete do Desembargador Federal Rogério Fialho Moreira", "tem_obs_assessor": true, "assunto": "", "ramo": "Administrativo", "subgrupo": "Apelação/Remessa Necessária", "subclasse": ""}, {"nome": "20260320_170518_Re__VOTO.ED.0003039-52.2025.4.05.0000.VIRTUAL.09.04.2026", "nome_arq": "VOTO.ED.0003039-52.2025.4.05.0000.VIRTUAL.09.04.2026", "cnj": "0003039-52.2025.4.05.0000", "cab": "0003039-52.2025.4.05.0000", "assessor": "Gabriel Santos Aquino De Oliveira", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "BRENO SERAFIM PEREIRA, DEFENSORIA PUBLICA DA UNIAO", "adv_polo_ativo": "Não informado", "polo_passivo": "UNIAO FEDERAL, INSTITUTO AVALIA DE INOVACAO EM AVALIACAO E SELECAO", "adv_polo_passivo": "Não informado", "ementa": "ADMINISTRATIVO E PROCESSUAL CIVIL. EMBARGOS DE DECLARAÇÃO. PROGRAMA MAIS MÉDICOS. COTAS RACIAIS. AUTODECLARAÇÃO. EXAME DE HETEROIDENTIFICAÇÃO. IMPOSSIBILIDADE DE INTERVENÇÃO DO PODER JUDICIÁRIO NO MÉRITO ADMINISTRATIVO. ALEGAÇÃO DE OMISSÃO NO JULGADO. REDISCUSSÃO DE QUESTÃO JÁ APRECIADA. EMBARGOS IMPROVIDOS.\r\n\r\n\r\n\r\n 1. Embargos de Declaração opostos por particular em face de acórdão desta Turma que, à unanimidade, negou provimento ao agravo de instrumento por ele interposto para reformar decisão do juízo a quo que indeferiu liminar objetivando a sua manutenção nas vagas reservadas à cota racial do Programa Mais Médicos.\r\n\r\n\r\n\r\n 2. A teor do que dispõe o art. 1.022 do Código de Processo Civil, cabem embargos de declaração \"contra qualquer decisão judicial para esclarecer obscuridade ou eliminar contradição; suprir omissão de ponto ou questão sobre o qual devia se pronunciar o juiz de ofício ou a requerimento; e/ou corrigir erro material\".\r\n\r\n\r\n\r\n 3. Existência de pronunciamento expresso, no v. acórdão, no sentido de reconhecer que a autodeclaração não é critério absoluto de definição da pertença étnico-racial, devendo ser complementada por mecanismos heterônomos de verificação — entendimento que reflete, com fidelidade, o quanto decidido pelo col. Supremo Tribunal Federal no julgamento da ADC 41, oportunidade em que se assentou a legitimidade da utilização de critérios subsidiários de heteroidentificação, desde que respeitada a dignidade da pessoa humana e assegurados o contraditório e a ampla defesa.\r\n\r\n\r\n\r\n 4. As demais matérias arguidas nos presentes embargos não foram objeto de desenvolvimento nas razões do agravo de instrumento, sendo suscitadas, a rigor, pela primeira vez nesta via, o que configura inovação recursal inadmissível em sede de embargos de declaração.\r\n\r\n\r\n\r\n 5. Conclui-se que o embargante deseja rediscutir questões efetivamente apreciadas por ocasião do julgamento que originou o acórdão ora questionado. Frise-se, entretanto, que embargos de declaração, ainda que opostos para fins de prequestionamento, não se prestam a este fim.\r\n\r\n\r\n\r\n 6. Embargos de declaração conhecidos e improvidos.", "relatorio": "Trata-se de Embargos de Declaração opostos por BRENO SERAFIM PEREIRA em face de acórdão desta Turma que, à unanimidade, negou provimento ao agravo de instrumento por ele interposto para reformar decisão do juízo a quo que indeferiu liminar objetivando a sua manutenção nas vagas reservadas à cota racial do Programa Mais Médicos.\r\n\r\n\r\n\r\n Alega-se, nas razões de recurso, que o v. acórdão foi omisso quanto à análise das seguintes questões: a) aplicação do princípio da vedação de comportamento contraditório e da boa-fé objetiva; b) ausência de fundamentação adequada do ato administrativo; c) violação ao devido processo legal administrativo, contraditório e ampla defesa; d) impossibilidade de concorrer concomitantemente às cotas raciais e de pessoa com deficiência; e) pertencimento do embargante ao quilombo “Nação Xambá” e à sua identidade étnico-racial.\r\n\r\n\r\n\r\n Sem contrarrazões.\r\n\r\n\r\n\r\n É o relatório.", "voto": "A teor do que dispõe o art. 1.022 do Código de Processo Civil, cabem embargos de declaração \"contra qualquer decisão judicial para esclarecer obscuridade ou eliminar contradição; suprir omissão de ponto ou questão sobre o qual devia se pronunciar o juiz de ofício ou a requerimento; e/ou corrigir erro material\".\r\n\r\n\r\n\r\n De acordo com o seu parágrafo único, considera-se omissa a decisão que \"deixe de se manifestar sobre tese firmada em julgamento de casos repetitivos ou em incidente de assunção de competência aplicável ao caso sob julgamento; e incorra em qualquer das condutas descritas no art. 489, § 1º. Este dispositivo, por seu turno, não considera fundamentada qualquer decisão judicial, seja ela interlocutória, sentença ou acórdão, que:\r\n\r\n\r\n\r\n I - se limitar à indicação, à reprodução ou à paráfrase de ato normativo, sem explicar sua relação com a causa ou a questão decidida;\r\n\r\n\r\n\r\n II - empregar conceitos jurídicos indeterminados, sem explicar o motivo concreto de sua incidência no caso;\r\n\r\n\r\n\r\n III - invocar motivos que se prestariam a justificar qualquer outra decisão;\r\n\r\n\r\n\r\n IV - não enfrentar todos os argumentos deduzidos no processo capazes de, em tese, infirmar a conclusão adotada pelo julgador;\r\n\r\n\r\n\r\n V - se limitar a invocar precedente ou enunciado de súmula, sem identificar seus fundamentos determinantes nem demonstrar que o caso sob julgamento se ajusta àqueles fundamentos;\r\n\r\n\r\n\r\n VI - deixar de seguir enunciado de súmula, jurisprudência ou precedente invocado pela parte, sem demonstrar a existência de distinção no caso em julgamento ou a superação do entendimento.\r\n\r\n\r\n\r\n No caso, inexistem os vícios apontados pela parte embargante, não se subsumindo o objeto dos presentes embargos a nenhuma das hipóteses previstas no sobredito dispositivo legal.\r\n\r\n\r\n\r\n O acórdão embargado encontra-se assim ementado:\r\n\r\n\r\n\r\n ADMINISTRATIVO E PROCESSUAL CIVIL. AGRAVO DE INSTRUMENTO. PROGRAMA MAIS MÉDICOS. SELEÇÃO. COTAS RACIAIS. AUTODECLARAÇÃO. EXAME DE HETEROIDENTIFICAÇÃO. IMPOSSIBILIDADE DE INTERVENÇÃO DO PODER JUDICIÁRIO NO MÉRITO ADMINISTRATIVO. MANUTENÇÃO DA DECISÃO QUE INDEFERIU PEDIDO DE ANTECIPAÇÃO DA TUTELA RECURSAL. AGRAVO NÃO PROVIDO.\r\n\r\n\r\n\r\n 1. Agravo de Instrumento, com pedido de antecipação a tutela, interposto por BRENO SERAFIM PEREIRA contra decisão proferida pelo Juízo da 9ª Vara Federal da Seção Judiciária de Pernambuco que indeferiu a liminar objetivando a sua manutenção nas vagas reservadas à cota racial do Programa Mais Médicos.\r\n\r\n\r\n\r\n 2. A autodeclaração não é critério absoluto de definição da pertença étnico-racial de um indivíduo, devendo, no caso da política de cotas, ser complementado por mecanismos heterônomos de verificação de autenticidade das informações declaradas e no julgamento da ADC n° 41, o col. STF reconheceu ser legítima a utilização de critérios subsidiários de heteroidentificação, desde que respeitada a dignidade da pessoa humana e garantidos o contraditório e a ampla defesa.\r\n\r\n\r\n\r\n 3. Não há que se falar em direito adquirido à homologação de autodeclaração racial em certames distintos, sendo cada banca de heteroidentificação autônoma para realizar seu juízo a respeito do fenótipo do candidato.\r\n\r\n\r\n\r\n 4. Via de regra, não compete ao Poder Judiciário rever os critérios adotados pela banca examinadora, estando sua atuação limitada à apreciação de aspectos de legalidade e da observância das normas do edital.\r\n\r\n\r\n\r\n 5. Agravo de Instrumento não provido.\r\n\r\n\r\n\r\n Da simples leitura da ementa acima transcrita, verifica-se a existência de pronunciamento expresso, no v. acórdão, no sentido de reconhecer que a autodeclaração não é critério absoluto de definição da pertença étnico-racial, devendo ser complementada por mecanismos heterônomos de verificação — entendimento que reflete, com fidelidade, o quanto decidido pelo col. Supremo Tribunal Federal no julgamento da ADC 41, oportunidade em que se assentou a legitimidade da utilização de critérios subsidiários de heteroidentificação, desde que respeitada a dignidade da pessoa humana e assegurados o contraditório e a ampla defesa.\r\n\r\n\r\n\r\n Registre-se que as demais matérias arguidas nos presentes embargos não foram objeto de desenvolvimento nas razões do agravo de instrumento, sendo suscitadas, a rigor, pela primeira vez nesta via, o que configura inovação recursal inadmissível em sede de embargos de declaração.\r\n\r\n\r\n\r\n Conclui-se que o embargante deseja rediscutir questões efetivamente apreciadas por ocasião do julgamento que originou o acórdão ora questionado. Frise-se, entretanto, que embargos de declaração, ainda que opostos para fins de prequestionamento, não se prestam a este fim.\r\n\r\n\r\n\r\n Outrossim, é importante destacar que “O órgão julgador não é obrigado a rebater, um a um, todos os argumentos trazidos pelas partes. Deve apenas enfrentar a demanda, observando as questões relevantes e imprescindíveis à sua resolução”. Nesse sentido: REsp 927.216/RS, Segunda Turma, Relatora Ministra Eliana Calmon, DJ de 13/8/2007; e REsp 855.073/SC, Primeira Turma, Relator Ministro Teori Albino Zavascki, DJ de 28/6/2007”[1]\r\n\r\n\r\n\r\n Em face do exposto, conheço dos embargos de declaração do particular e nego-lhes provimento.\r\n\r\n\r\n\r\n É como voto.", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\n Decide a 3ª Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, CONHECER dos embargos de declaração do particular e NEGAR-LHES PROVIMENTO, nos termos do voto do relator e na forma do relatório constante dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido", "obs_assessor": "﻿\r\n\r\n Poder Judiciário\r\n\r\n Tribunal Regional Federal da 5ª Região\r\n\r\n Gabinete do Desembargador Federal Rogério Fialho Moreira", "tem_obs_assessor": true, "assunto": "", "ramo": "Administrativo", "subgrupo": "Apelação/Remessa Necessária", "subclasse": "Embargos de Declaração"}, {"nome": "20260320_170538_Re__VOTO.0800248-82.2025.4.05.8308.VIRTUAL.09.04.2026", "nome_arq": "VOTO.0800248-82.2025.4.05.8308.VIRTUAL.09.04.2026", "cnj": "0800248-82.2025.4.05.8308", "cab": "0800248-82.2025.4.05.8308", "assessor": "Gabriel Santos Aquino De Oliveira", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "MARCIO RENNAN SANTOS TAVARES", "adv_polo_ativo": "GIULLIANA NIEDERAUER FLORES SEVERO DE MORAIS - RN13922\r\nTIAGO NEVES DE MORAIS - RN9568", "polo_passivo": "INSTITUTO FEDERAL DE EDUCACAO, CIENCIA E TECNOLOGIA DE PERNAMBUCO", "adv_polo_passivo": "Não informado", "ementa": "ADMINISTRATIVO. PROCESSUAL CIVIL. APELAÇÃO CÍVEL. SERVIDOR PÚBLICO. PROFESSOR. MAGISTÉRIO DO ENSINO BÁSICO, TÉCNICO E TECNOLÓGICO. PROGRESSÃO/PROMOÇÃO FUNCIONAL DE MÉRITO. EFEITOS FUNCIONAIS E FINANCEIROS. NÃO CUMPRIMENTO DOS REQUISITOS LEGAIS. INTERSTÍCIO DE 24 MESES. APELAÇÃO NÃO PROVIDA.\r\n\r\n\r\n\r\n 1. Apelação interposta por MARCIO RENNAN SANTOS TAVARES em face de sentença proferida pelo Juízo da 17ª Vara Federal da Seção Judiciária de Pernambuco que julgou improcedente o pleito, visando o reconhecimento de que o instituto jurídico da aceleração da promoção não possui o efeito de zerar o interstício já em cumprimento para a progressão por mérito seguinte, de modo que deveria ser anulada a Portaria N°670/DGP/IFSERTAO-PE, de 04 de novembro de 2019, que progrediu o apelante para a classe D302, publicando-se nova portaria que corrija a data da progressão para a classe D302 para outubro de 2018 e os ajustes subsequentes.\r\n\r\n\r\n\r\n 2. Ao tempo da controvérsia, a Lei nº 12.772/2012, que dispõe sobre a estruturação do Plano de Carreiras e Cargos de Magistério Federal, previa, em seu art. 14, que o desenvolvimento na Carreira de Magistério do Ensino Básico, Técnico e Tecnológico ocorrerá mediante progressão, pelo cumprimento do interstício de 24 (vinte e quatro) meses de efetivo exercício em cada nível e aprovação em avaliação de desempenho; ou promoção, mediante o interstício mínimo de 24 (vinte e quatro) meses no último nível de cada Classe antecedente àquela para a qual se dará a promoção e as condições especificadas no § 3º para cada Classe.\r\n\r\n\r\n\r\n 3. Em sede recursal, o particular se insurge contra provimento jurisdicional que reconheceu que a aceleração da promoção, que resulta na mudança de classe e não de nível dentro de uma mesma classe, tem o condão de zerar a contagem para a progressão por mérito seguinte, e julgou improcedente o pedido autoral para retificar a data da progressão do Apelante do nível D301 para D302, uma vez que observado o interstício de 24 meses após a aceleração da promoção em janeiro de 2023.\r\n\r\n\r\n\r\n 4. Conforme entendimento desta Corte Regional, \"Assim, uma vez implementada a aceleração da promoção, passa a ser este o novo marco temporal para a contagem dos interstícios seguintes. É de se ver que, ao aproveitar os efeitos da aceleração da promoção e nela querer incluir o cômputo do interstício cumprido na classe anterior à promoção, a embargante objetiva obter o melhor dos dois mundos, providência que não se mostra possível ante a sistemática de implementação das promoções e progressões funcionais, in casu.\" (PROCESSO: 08101577120224058400, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL FREDERICO WILDSON DA SILVA DANTAS, 7ª TURMA, JULGAMENTO: 20/08/2024)\r\n\r\n\r\n\r\n 5. Dessa forma, a aceleração de promoção em outubro de 2017 se tornou o novo marco inicial para progressão por mérito.\r\n\r\n\r\n\r\n 6. Precedente desta Terceira Turma: PROCESSO: 0013720-19.2025.4.05.8201, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL ROGÉRIO FIALHO MOREIRA, 3ª TURMA, JULGAMENTO: 05/03/2026.\r\n\r\n\r\n\r\n 7. Apelação não provida. Honorários sucumbenciais majorados em 1%, com fundamento no art. 85, §11, do CPC. Exigibilidade suspensa com fundamento no art. 98, §3º, CPC.", "relatorio": "Trata-se de Apelação interposta por MARCIO RENNAN SANTOS TAVARES em face de sentença proferida pelo Juízo da 17ª Vara Federal da Seção Judiciária de Pernambuco que julgou improcedente o pleito, visando o reconhecimento de que o instituto jurídico da aceleração da promoção não possui o efeito de zerar o interstício já em cumprimento para a progressão por mérito seguinte, de modo que deveria ser anulada a Portaria N°670/DGP/IFSERTAO-PE, de 04 de novembro de 2019, que progrediu o apelante para a classe D302, publicando-se nova portaria que corrija a data da progressão para a classe D302 para outubro de 2018 e os ajustes subsequentes.\r\n\r\n\r\n\r\n A parte recorrente, em suas razões de apelação, alega, em síntese, que: a) a progressão funcional na carreira de Magistério Federal que engloba as carreiras de Magistério Superior e Magistério do Ensino Básico, Técnico e Tecnológico ocorre mediante cumprimento do interstício de 24 (vinte e quatro) meses de efetivo exercício em cada nível e a aprovação em avaliação de desempenho; b) não basta o adimplemento de parte do período de tempo em um nível e a outra parte do período em outro nível para concessão da progressão por mérito; c) uma vez implementada a aceleração da promoção, passa a ser este o novo marco temporal para a contagem dos interstícios seguintes.\r\n\r\n\r\n\r\n Contrarrazões apresentadas.\r\n\r\n\r\n\r\n É o relatório.", "voto": "De início, recebo a apelação, considerando presentes os pressupostos recursais intrínsecos (cabimento, legitimação, interesse e inexistência de fato impeditivo ou extintivo do direito de recorrer) e extrínsecos (preparo, tempestividade e regularidade formal) para a admissibilidade do recurso.\r\n\r\n\r\n\r\n Ao tempo da controvérsia, a Lei nº 12.772/2012, que dispõe sobre a estruturação do Plano de Carreiras e Cargos de Magistério Federal, previa, em seu art. 14, que o desenvolvimento na Carreira de Magistério do Ensino Básico, Técnico e Tecnológico ocorrerá mediante progressão, pelo cumprimento do interstício de 24 (vinte e quatro) meses de efetivo exercício em cada nível e aprovação em avaliação de desempenho; ou promoção, mediante o interstício mínimo de 24 (vinte e quatro) meses no último nível de cada Classe antecedente àquela para a qual se dará a promoção e as condições especificadas no § 3º para cada Classe.\r\n\r\n\r\n\r\n Ademais, o art. 15 possuía a seguinte redação:\r\n\r\n\r\n\r\n \"Art. 15. Os docentes aprovados no estágio probatório do respectivo cargo que atenderem os seguintes requisitos de titulação farão jus a processo de aceleração da promoção:\r\n\r\n\r\n\r\n I - de qualquer nível da Classe D I para o nível 1 da classe D II, pela apresentação de título de especialista; e\r\n\r\n\r\n\r\n II - de qualquer nível das Classes D I e D II para o nível 1 da classe D III, pela apresentação de título de mestre ou doutor.\r\n\r\n\r\n\r\n Parágrafo único. Aos servidores ocupantes de cargos da Carreira de Magistério do Ensino Básico, Técnico e Tecnológico em 1º de março de 2013 ou na data de publicação desta Lei, se posterior, é permitida a aceleração da promoção de que trata este artigo ainda que se encontrem em estágio probatório no cargo\".\r\n\r\n\r\n\r\n No caso vertente, em sede recursal, o particular se insurge contra provimento jurisdicional que reconheceu que a aceleração da promoção, que resulta na mudança de classe e não de nível dentro de uma mesma classe, tem o condão de zerar a contagem para a progressão por mérito seguinte, e julgou improcedente o pedido autoral para retificar a data da progressão do Apelante do nível D301 para D302, uma vez que observado o interstício de 24 meses após a aceleração da promoção em outubro de 2017.\r\n\r\n\r\n\r\n Conforme entendimento desta Corte Regional, \"Assim, uma vez implementada a aceleração da promoção, passa a ser este o novo marco temporal para a contagem dos interstícios seguintes. É de se ver que, ao aproveitar os efeitos da aceleração da promoção e nela querer incluir o cômputo do interstício cumprido na classe anterior à promoção, a embargante objetiva obter o melhor dos dois mundos, providência que não se mostra possível ante a sistemática de implementação das promoções e progressões funcionais, in casu.\" (PROCESSO: 08101577120224058400, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL FREDERICO WILDSON DA SILVA DANTAS, 7ª TURMA, JULGAMENTO: 20/08/2024)\r\n\r\n\r\n\r\n Dessa forma, a aceleração de promoção em outubro de 2017 se tornou o novo marco inicial para progressão por mérito.\r\n\r\n\r\n\r\n Em igual sentido, precedente recente desta eg. Terceira Turma:\r\n\r\n\r\n\r\n ADMINISTRATIVO. PROCESSUAL CIVIL. APELAÇÃO CÍVEL. SERVIDOR PÚBLICO. PROFESSOR. MAGISTÉRIO DO ENSINO BÁSICO, TÉCNICO E TECNOLÓGICO. PROGRESSÃO/PROMOÇÃO FUNCIONAL DE MÉRITO. EFEITOS FUNCIONAIS E FINANCEIROS. NÃO CUMPRIMENTO DOS REQUISITOS LEGAIS. INTERSTÍCIO DE 24 MESES. APELAÇÃO NÃO PROVIDA.\r\n\r\n\r\n\r\n 1. Apelação interposta por JESUALDO GOMES DAS CHAGAS em face de sentença proferida pelo Juízo da 4ª Vara Federal da Seção Judiciária da Paraíba que julgou improcedente o pleito, visando o reconhecimento da retroatividade dos efeitos funcionais e financeiros das progressões/promoção do Apelante à data de preenchimento dos requisitos legais e o reconhecimento de que a aceleração da promoção não possui o efeito de zerar o interstício já em cumprimento para que a progressão por mérito seguinte, determinando à Autarquia apelada que anule a portaria que progrediu o Apelante para a classe D302, publicando-se nova portaria, e que proceda com a retificação das datas de vigência financeira e funcional nas portarias subsequentes, incluindo aquelas publicadas durante o andamento do presente feito.\r\n\r\n\r\n\r\n 2. Ao tempo da controvérsia, a Lei nº 12.772/2012, que dispõe sobre a estruturação do Plano de Carreiras e Cargos de Magistério Federal, previa, em seu art. 14, que o desenvolvimento na Carreira de Magistério do Ensino Básico, Técnico e Tecnológico ocorrerá mediante progressão, pelo cumprimento do interstício de 24 (vinte e quatro) meses de efetivo exercício em cada nível e aprovação em avaliação de desempenho; ou promoção, mediante o interstício mínimo de 24 (vinte e quatro) meses no último nível de cada Classe antecedente àquela para a qual se dará a promoção e as condições especificadas no § 3º para cada Classe.\r\n\r\n\r\n\r\n 3. Em sede recursal, o particular se insurge contra provimento jurisdicional que reconheceu que a aceleração da promoção, que resulta na mudança de classe e não de nível dentro de uma mesma classe, tem o condão de zerar a contagem para a progressão por mérito seguinte, e julgou improcedente o pedido autoral para retificar a data da progressão do Apelante do nível D301 para D302, uma vez que observado o interstício de 24 meses após a aceleração da promoção em janeiro de 2023.\r\n\r\n\r\n\r\n 4. Conforme entendimento desta Corte Regional, \"Assim, uma vez implementada a aceleração da promoção, passa a ser este o novo marco temporal para a contagem dos interstícios seguintes. É de se ver que, ao aproveitar os efeitos da aceleração da promoção e nela querer incluir o cômputo do interstício cumprido na classe anterior à promoção, a embargante objetiva obter o melhor dos dois mundos, providência que não se mostra possível ante a sistemática de implementação das promoções e progressões funcionais, in casu.\" (PROCESSO: 08101577120224058400, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL FREDERICO WILDSON DA SILVA DANTAS, 7ª TURMA, JULGAMENTO: 20/08/2024)\r\n\r\n\r\n\r\n 5. Dessa forma, a aceleração de promoção em janeiro de 2023 se tornou o novo marco inicial para progressão por mérito.\r\n\r\n\r\n\r\n 6. Precedente da Terceira Turma: PROCESSO: 0801327-45.2024.4.05.8401, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL ROGÉRIO FIALHO MOREIRA, 3ª TURMA, JULGAMENTO: 18/09/2025.\r\n\r\n\r\n\r\n 7. Apelação não provida. Honorários sucumbenciais majorados em 1%, com fundamento no art. 85, §11, do CPC. Exigibilidade suspensa, com fundamento no art. 98, §3º, CPC.\r\n\r\n\r\n\r\n PROCESSO: 0013720-19.2025.4.05.8201, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL ROGÉRIO FIALHO MOREIRA, 3ª TURMA, JULGAMENTO: 05/03/2026.\r\n\r\n\r\n\r\n Ante o exposto, NEGO PROVIMENTO à Apelação. Condeno o apelante ao pagamento de honorários recursais, nos termos do art. 85, §11, CPC/2015, ficando os honorários sucumbenciais majorados em 01% (um ponto percentual). Exigibilidade suspensa com fundamento no art. 98, §3º, do CPC.\r\n\r\n\r\n\r\n É como voto.", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\n Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO à Apelação, nos termos do voto do relator e na forma do relatório constante dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido", "obs_assessor": "﻿\r\n\r\n Poder Judiciário\r\n\r\n Tribunal Regional Federal da 5ª Região\r\n\r\n Gabinete do Desembargador Federal Rogério Fialho Moreira", "tem_obs_assessor": true, "assunto": "", "ramo": "Administrativo", "subgrupo": "Apelação/Remessa Necessária", "subclasse": ""}, {"nome": "20260320_183423_Re__VOTO.0002900-66.2026.4.05.0000.VIRTUAL.09.04.2026", "nome_arq": "VOTO.0002900-66.2026.4.05.0000.VIRTUAL.09.04.2026", "cnj": "0002900-66.2026.4.05.0000", "cab": "0002900-66.2026.4.05.0000", "assessor": "Evellyn Barbosa Rego", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "HELTON GONZAGA DA SILVA", "adv_polo_ativo": "Não informado", "polo_passivo": "UNIAO FEDERAL, FUNDACAO GETULIO VARGAS", "adv_polo_passivo": "Não informado", "ementa": "ADMINISTRATIVO. PROCESSUAL CIVIL. AGRAVO DE INSTRUMENTO. CONCURSO PÚBLICO. ENQUADRAMENTO DO CANDIDATO COMO PCD. NECESSÁRIA DILAÇÃO PROBATÓRIA. TEMA 485/STF. AUSÊNCIA DOS REQUISITOS AUTORIZADORES DA TUTELA DE URGÊNCIA. MANUTENÇÃO DA DECISÃO QUE INDEFERIU O PEDIDO LIMINAR. AGRAVO IMPROVIDO.\r\n\r\n\r\n\r\n 1. Agravo de instrumento, com pedido de antecipação da tutela, interposto contra decisão proferida pelo Juízo da 4ª Vara Federal da Seção Judiciária da Paraíba que indeferiu a liminar objetivando o seu imediato enquadramento provisório como pessoa com deficiência no Concurso Público Nacional Unificado 2, Bloco 9 - Intermediário - Regulação, assegurando-lhe a permanência na lista de candidatos PCD.\r\n\r\n\r\n\r\n 2. O agravante apresentou laudo médico particular indicando patologias ortopédicas de caráter crônico. Entretanto, a perícia administrativa concluiu pela inexistência de deficiência funcional apta a justificar o enquadramento nas vagas reservadas.\r\n\r\n\r\n\r\n 3. A decisão agravada consignou que a aferição do enquadramento demandaria dilação probatória, notadamente perícia judicial. Em sede de cognição sumária, não se vislumbra ilegalidade manifesta no ato administrativo, tampouco na cautela adotada pelo magistrado a quo.\r\n\r\n\r\n\r\n 4. A motivação apresentada -- ainda que sintética -- explicita a conclusão técnica da banca, indicando inexistência de deficiência funcional e mencionando a possibilidade terapêutica das patologias descritas. Não se identifica erro grosseiro, desvio de finalidade ou adoção de critério frontalmente incompatível com a legislação. A divergência entre laudo particular e perícia administrativa configura controvérsia eminentemente técnica, cuja solução exige instrução probatória.\r\n\r\n\r\n\r\n 5. Nos termos da orientação consolidada do Supremo Tribunal Federal no Tema 485 da repercussão geral, o Poder Judiciário não substitui a banca examinadora na apreciação de critérios técnicos, salvo flagrante ilegalidade. Não se evidencia probabilidade qualificada do direito apta a justificar a medida excepcional pretendida.\r\n\r\n\r\n\r\n 6. Os atos administrativos gozam de presunção relativa de legitimidade e veracidade. Para sua suspensão em sede liminar, exige-se demonstração robusta de ilegalidade, o que não se verifica nesta fase processual.\r\n\r\n\r\n\r\n 7. O reconhecimento anterior da condição de pessoa com deficiência em outros certames não vincula automaticamente a Administração em concurso distinto, porquanto cada processo seletivo possui disciplina própria e avaliação individualizada. Por outro lado, não há notícia de nomeação iminente, tampouco demonstração concreta de que eventual provimento final favorável tornar-se-á inócuo.\r\n\r\n\r\n\r\n 8. A jurisprudência tem admitido a recomposição da situação jurídica ao final da demanda, inclusive com reclassificação ou reserva de vaga, quando reconhecido o direito. Não se configura, portanto, perigo de dano irreparável ou de difícil reparação neste momento.\r\n\r\n\r\n\r\n 9. Agravo de instrumento improvido.", "relatorio": "Trata-se de agravo de instrumento, com pedido de antecipação da tutela, interposto por HELTON GONZAGA DA SILVA contra decisão proferida pelo Juízo da 4ª Vara Federal da Seção Judiciária da Paraíba que indeferiu a liminar objetivando o seu imediato enquadramento provisório como pessoa com deficiência no Concurso Público Nacional Unificado 2, Bloco 9 - Intermediário - Regulação, assegurando-lhe a permanência na lista de candidatos PCD.\r\n\r\n\r\n\r\n Nas razões recursais, traz os seguintes argumentos:\r\n\r\n\r\n\r\n a) participa do Concurso Público Nacional Unificado 2, destinado ao provimento de cargos integrantes do Bloco 9 - Intermediário - Regulação, concorrendo às vagas reservadas aos candidatos PCD (Anexo 05), nos termos do Edital ENAP nº 114/2025;\r\n\r\n\r\n\r\n (b) foi reprovado na perícia médica, pois o examinador não o considerou como portador de deficiência física;\r\n\r\n\r\n\r\n c) a banca exigiu \"irreversibilidade absoluta\", critério não previsto na Constituição ou na Lei nº 13.146/2015;\r\n\r\n\r\n\r\n d) o indeferimento foi genérico e lacônico, não houve análise individualizada, em nítida violação ao art. 50 da Lei 9.784/99.\r\n\r\n\r\n\r\n e) cumpre integralmente o edital e apresentou laudo idôneo;\r\n\r\n\r\n\r\n f) já foi reconhecido como PCD em outros concursos, já teve reconhecimento administrativo anterior e a mudança de conclusão viola a segurança jurídica e a proteção da confiança;\r\n\r\n\r\n\r\n g) eventual melhora clínica futura não descaracteriza impedimento de longo prazo.\r\n\r\n\r\n\r\n Contrarrazões apresentadas.\r\n\r\n\r\n\r\n É o relatório.", "voto": "Por ocasião da apreciação do pedido de antecipação da tutela recursal, o indeferi, nos seguintes termos:\r\n\r\n\r\n\r\n “(...)\r\n\r\n\r\n\r\n No caso dos autos, entendo, em sede de cognição sumária, própria das decisões liminares, que não estão presentes os requisitos para o deferimento do pedido liminar.\r\n\r\n\r\n\r\n O agravante apresentou laudo médico particular indicando patologias ortopédicas de caráter crônico. Entretanto, a perícia administrativa concluiu pela inexistência de deficiência funcional apta a justificar o enquadramento nas vagas reservadas.\r\n\r\n\r\n\r\n A decisão agravada consignou que a aferição do enquadramento demandaria dilação probatória, notadamente perícia judicial.\r\n\r\n\r\n\r\n Em sede de cognição sumária, não se vislumbra ilegalidade manifesta no ato administrativo, tampouco na cautela adotada pelo magistrado a quo.\r\n\r\n\r\n\r\n Quanto ao primeiro, a motivação apresentada -- ainda que sintética -- explicita a conclusão técnica da banca, indicando inexistência de deficiência funcional e mencionando a possibilidade terapêutica das patologias descritas.\r\n\r\n\r\n\r\n Não se identifica, neste momento processual, erro grosseiro, desvio de finalidade ou adoção de critério frontalmente incompatível com a legislação.\r\n\r\n\r\n\r\n Por sua vez, a divergência entre laudo particular e perícia administrativa configura controvérsia eminentemente técnica, cuja solução exige instrução probatória.\r\n\r\n\r\n\r\n Nos termos da orientação consolidada do Supremo Tribunal Federal no Tema 485 da repercussão geral, o Poder Judiciário não substitui a banca examinadora na apreciação de critérios técnicos, salvo flagrante ilegalidade.\r\n\r\n\r\n\r\n Assim, neste momento, não se evidencia probabilidade qualificada do direito apta a justificar a medida excepcional pretendida.\r\n\r\n\r\n\r\n Os atos administrativos gozam de presunção relativa de legitimidade e veracidade.\r\n\r\n\r\n\r\n Para sua suspensão em sede liminar, exige-se demonstração robusta de ilegalidade, o que não se verifica nesta fase processual.\r\n\r\n\r\n\r\n O reconhecimento anterior da condição de pessoa com deficiência em outros certames não vincula automaticamente a Administração em concurso distinto, porquanto cada processo seletivo possui disciplina própria e avaliação individualizada.\r\n\r\n\r\n\r\n Por outro lado, não há notícia de nomeação iminente, tampouco demonstração concreta de que eventual provimento final favorável tornar-se-á inócuo.\r\n\r\n\r\n\r\n A jurisprudência tem admitido a recomposição da situação jurídica ao final da demanda, inclusive com reclassificação ou reserva de vaga, quando reconhecido o direito.\r\n\r\n\r\n\r\n Não se configura, portanto, perigo de dano irreparável ou de difícil reparação neste momento.\r\n\r\n\r\n\r\n Ante o exposto, INDEFIRO a liminar.\r\n\r\n\r\n\r\n (...)”\r\n\r\n\r\n\r\n Na hipótese, tendo como razão de decidir os fundamentos já apresentados na decisão que indeferiu o pedido de antecipação da tutela recursal, não havendo qualquer modificação na situação fática e jurídica capaz de alterar as razões do convencimento, o mantenho em todos os seus termos.\r\n\r\n\r\n\r\n À vista dessas considerações, NEGO PROVIMENTO ao agravo de instrumento.\r\n\r\n\r\n\r\n É como voto.", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\n Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO ao agravo de instrumento, nos termos do voto do relator e na forma do relatório constante dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido", "obs_assessor": "﻿", "tem_obs_assessor": false, "assunto": "", "ramo": "Administrativo", "subgrupo": "Apelação/Remessa Necessária", "subclasse": ""}, {"nome": "20260321_113459_Re__VOTO.0008436-92.2025.4.05.0000.VIRTUAL.09.04.2026", "nome_arq": "VOTO.0008436-92.2025.4.05.0000.VIRTUAL.09.04.2026", "cnj": "0008436-92.2025.4.05.0000", "cab": "0008436-92.2025.4.05.0000", "assessor": "Rita de Cássia R. S. de Macêdo", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "CONSELHO REGIONAL DOS S COMERCIAIS NO ESTADO DE SERGIPE - CORE-SE", "adv_polo_ativo": "JULIO CESAR DO NASCIMENTO RABELO - SE3350\r\nNEWTON HUMBERTO DE SOUZA JUNIOR - SE6479", "polo_passivo": "GUSTAVO LEITE LUCENA DE ABREU", "adv_polo_passivo": "Não informado", "ementa": "EXECUÇÃO FISCAL. AGRAVO DE INSTRUMENTO. CONSELHO PROFISSIONAL. EXTINÇÃO PARCIAL SEM RESOLUÇÃO DO MÉRITO. AUSÊNCIA DE COMPROVAÇÃO DE PROTESTO OU JUSTIFICATIVA PARA SUA DISPENSA. TEMA 1.184 DO STF. RESOLUÇÃO CNJ Nº 547/2024. APLICABILIDADE. FALTA DE INTERESSE DE AGIR. CONFIGURAÇÃO. ARQUIVAMENTO SEM BAIXA. ART. 8º, § 2º, DA LEI Nº 12.514/2011. VALOR INFERIOR AO LIMITE LEGAL. MANUTENÇÃO DA DECISÃO. IMPROVIMENTO.\r\n\r\n\r\n\r\n 1. Agravo de instrumento interposto pelo CONSELHO REGIONAL DOS REPRESENTANTES COMERCIAIS NO ESTADO DE SERGIPE – CORE/SE em face de decisão proferida nos autos de execução fiscal que, ao apreciar a petição inicial, promoveu extinção parcial do feito, sem resolução do mérito, com fundamento no art. 485, I, do CPC, bem como determinou o arquivamento sem baixa quanto ao remanescente.\r\n\r\n\r\n\r\n 2. Na origem, o magistrado entendeu que a parte exequente não comprovou o prévio protesto dos créditos relativos às anuidades dos exercícios de 2019 a 2023, consubstanciadas no Termo de Inscrição em Dívida Ativa nº 4068, razão pela qual indeferiu a petição inicial nesse ponto.\r\n\r\n\r\n\r\n 3. Quanto às anuidades dos exercícios de 2017 e 2018, determinou o arquivamento sem baixa, nos termos do art. 8º, § 2º, da Lei nº 12.514/2011, em razão do reduzido valor do crédito.\r\n\r\n\r\n\r\n 4. O agravante sustenta, em síntese, que: (i) o protesto não constitui requisito obrigatório para o ajuizamento da execução fiscal; (ii) a Resolução CNJ nº 547/2024 admite a dispensa do protesto por razões de eficiência administrativa; (iii) foram adotadas medidas administrativas prévias de cobrança; (iv) a Resolução CNJ nº 547/2024 não se aplica às execuções fiscais promovidas por Conselhos Profissionais, devendo prevalecer a disciplina específica da Lei nº 12.514/2011; (v) a extinção parcial do feito se mostra indevida.\r\n\r\n\r\n\r\n 5. O Supremo Tribunal Federal, no julgamento do Tema 1.184 da repercussão geral, firmou entendimento no sentido de que o ajuizamento da execução fiscal deve ser precedido da adoção de medidas administrativas, dentre elas o protesto do título, admitida sua dispensa mediante justificativa fundada na eficiência administrativa.\r\n\r\n\r\n\r\n 6. A Resolução CNJ nº 547/2024 estabelece diretrizes para a racionalização das execuções fiscais de baixo valor, sendo aplicável também às demandas promovidas por Conselhos Profissionais.\r\n\r\n\r\n\r\n 7. No caso concreto, verifica-se que a parte exequente não comprovou a adoção do protesto do título em relação às anuidades dos exercícios de 2019 a 2023, tampouco apresentou justificativa idônea para a sua dispensa, limitando-se a alegações genéricas acerca da adoção de medidas administrativas.\r\n\r\n\r\n\r\n 8. A ausência de comprovação do protesto ou de justificativa concreta para sua dispensa evidencia o não atendimento das providências prévias exigidas, caracterizando a falta de interesse de agir e legitimando a extinção parcial do feito, nos termos do art. 485, I, do CPC.\r\n\r\n\r\n\r\n 9. Não se verifica, ademais, ilegalidade ou prematuridade na decisão agravada, uma vez que incumbia à exequente instruir adequadamente a petição inicial com os elementos necessários à comprovação da regular constituição e exigibilidade do crédito, bem como das providências administrativas prévias.\r\n\r\n\r\n\r\n 10. Quanto às anuidades remanescentes, referentes aos exercícios de 2017 e 2018, correta a determinação de arquivamento sem baixa, nos termos do art. 8º, § 2º, da Lei nº 12.514/2011.\r\n\r\n\r\n\r\n 11. O art. 8º da Lei nº 12.514/2011, norma especial aplicável aos Conselhos Profissionais, autoriza o arquivamento sem baixa das execuções fiscais cujo valor não atinja o limite mínimo legal, em atenção aos princípios da eficiência e da economicidade.\r\n\r\n\r\n\r\n 12. Agravo de instrumento improvido.", "relatorio": "Trata-se de agravo de instrumento interposto pelo CONSELHO REGIONAL DOS REPRESENTANTES COMERCIAIS NO ESTADO DE SERGIPE – CORE/SE em face de decisão proferida nos autos de execução fiscal que, ao apreciar a petição inicial, promoveu extinção parcial do feito, sem resolução do mérito, com fundamento no art. 485, I, do CPC, bem como determinou o arquivamento sem baixa quanto ao remanescente.\r\n\r\n\r\n\r\n Na origem, o magistrado entendeu que a parte exequente não comprovou o prévio protesto dos créditos relativos às anuidades dos exercícios de 2019 a 2023, consubstanciadas no Termo de Inscrição em Dívida Ativa nº 4068, razão pela qual indeferiu a petição inicial nesse ponto.\r\n\r\n\r\n\r\n Quanto às anuidades dos exercícios de 2017 e 2018, determinou o arquivamento sem baixa, nos termos do art. 8º, § 2º, da Lei nº 12.514/2011, em razão do reduzido valor do crédito.\r\n\r\n\r\n\r\n O agravante sustenta, em síntese, que: (i) o protesto não constitui requisito obrigatório para o ajuizamento da execução fiscal; (ii) a Resolução CNJ nº 547/2024 admite a dispensa do protesto por razões de eficiência administrativa; (iii) foram adotadas medidas administrativas prévias de cobrança; (iv) a Resolução CNJ nº 547/2024 não se aplica às execuções fiscais promovidas por Conselhos Profissionais, devendo prevalecer a disciplina específica da Lei nº 12.514/2011; (v) a extinção parcial do feito se mostra indevida.\r\n\r\n\r\n\r\n Contrarrazões apresentadas.\r\n\r\n\r\n\r\n É o relatório.", "voto": "A controvérsia envolve dois pontos distintos: (a) a extinção parcial da execução fiscal, por ausência de comprovação de protesto; (b) o arquivamento sem baixa das anuidades remanescentes, à luz do art. 8º da Lei nº 12.514/2011.\r\n\r\n\r\n\r\n No julgamento do Tema 1.184 sob a sistemática da repercussão geral (RE 1.355.208/SC), o Supremo Tribunal Federal firmou a tese de que é legítima a extinção de execução fiscal de baixo valor por ausência de interesse de agir, à luz do princípio da eficiência administrativa, estabelecendo, ainda, a necessidade de prévia adoção de medidas administrativas, dentre elas o protesto do título, ressalvada a hipótese de sua dispensa por motivo de eficiência, devidamente justificada.\r\n\r\n\r\n\r\n Em regulamentação, a Resolução CNJ nº 547/2024 estabeleceu diretrizes para a racionalização do trâmite das execuções fiscais, especialmente aquelas de reduzido valor, fixando parâmetros para aferição da utilidade da demanda judicial.\r\n\r\n\r\n\r\n Conforme entendimento consolidado nesta Corte, inclusive em julgamento de turma ampliada, a aplicação do Tema 1.184 do STF alcança também as execuções fiscais promovidas por Conselhos Profissionais, não constituindo o art. 8º da Lei nº 12.514/2011 óbice à incidência da referida tese, por tratar de momento distinto (o do ajuizamento da ação).\r\n\r\n\r\n\r\n No caso concreto, verifica-se que a parte exequente não comprovou a adoção do protesto do título em relação às anuidades dos exercícios de 2019 a 2023, tampouco apresentou justificativa idônea para a sua dispensa, limitando-se a alegações genéricas acerca da adoção de medidas administrativas.\r\n\r\n\r\n\r\n Nesse contexto, a ausência de demonstração concreta do cumprimento das providências prévias exigidas pelo Tema 1.184 do STF autoriza o reconhecimento da falta de interesse de agir, legitimando a extinção parcial do feito, nos termos do art. 485, I, do CPC.\r\n\r\n\r\n\r\n Não se verifica, ademais, ilegalidade ou prematuridade na decisão agravada, uma vez que incumbia à exequente instruir adequadamente a petição inicial com os elementos necessários à comprovação da regular constituição e exigibilidade do crédito, bem como das providências administrativas prévias.\r\n\r\n\r\n\r\n Quanto às anuidades remanescentes, referentes aos exercícios de 2017 e 2018, correta a determinação de arquivamento sem baixa, nos termos do art. 8º, § 2º, da Lei nº 12.514/2011.\r\n\r\n\r\n\r\n O referido dispositivo estabelece critério mínimo para o ajuizamento de execuções fiscais por Conselhos Profissionais, bem como autoriza o arquivamento dos feitos cujo valor não atinja o patamar legal, em prestígio aos princípios da eficiência e da economicidade.\r\n\r\n\r\n\r\n No caso, o montante remanescente não alcança o limite legal, justificando a medida adotada pelo Juízo de origem, a qual não implica extinção do crédito, mas apenas a suspensão prática de sua cobrança judicial.\r\n\r\n\r\n\r\n Ante o exposto, NEGO PROVIMENTO ao agravo de instrumento, mantendo integralmente a decisão agravada.\r\n\r\n\r\n\r\n É como voto.", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\n Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO ao agravo de instrumento, nos termos do voto do relator, na forma do relatório constante dos autos, que fica fazendo parte integrante do presente julgado.", "resultado": "Não provido", "css": "nao-provido", "obs_assessor": "﻿", "tem_obs_assessor": false, "assunto": "", "ramo": "Execução Fiscal", "subgrupo": "Apelação/Remessa Necessária", "subclasse": ""}];

const MATERIAS_SUBGRUPOS = {"Administrativo": ["Mandado de Segurança", "Agravo de Instrumento", "Apelação", "Remessa Necessária", "Apelação/Remessa Necessária"], "Improbidade": ["Mandado de Segurança", "Agravo de Instrumento", "Apelação", "Remessa Necessária", "Apelação/Remessa Necessária"], "Ambiental": ["Mandado de Segurança", "Agravo de Instrumento", "Apelação", "Remessa Necessária", "Apelação/Remessa Necessária"], "Previdenciário": ["Mandado de Segurança", "Agravo de Instrumento", "Apelação", "Remessa Necessária", "Apelação/Remessa Necessária"], "Tributário": ["Mandado de Segurança", "Agravo de Instrumento", "Apelação", "Remessa Necessária", "Apelação/Remessa Necessária"], "Execução Fiscal": ["Mandado de Segurança", "Agravo de Instrumento", "Apelação", "Remessa Necessária", "Apelação/Remessa Necessária"], "Execuções Diversas (CPC)": ["Mandado de Segurança", "Agravo de Instrumento", "Apelação", "Remessa Necessária", "Apelação/Remessa Necessária"], "Cumprimento de Sentença": ["Mandado de Segurança", "Agravo de Instrumento", "Apelação", "Remessa Necessária", "Apelação/Remessa Necessária"], "Civil e Empresarial": ["Mandado de Segurança", "Agravo de Instrumento", "Apelação", "Remessa Necessária", "Apelação/Remessa Necessária"], "Internacional": ["Mandado de Segurança", "Agravo de Instrumento", "Apelação", "Remessa Necessária", "Apelação/Remessa Necessária"], "Processual Civil": ["Mandado de Segurança", "Agravo de Instrumento", "Apelação", "Remessa Necessária", "Apelação/Remessa Necessária"], "Consumidor": ["Mandado de Segurança", "Agravo de Instrumento", "Apelação", "Remessa Necessária", "Apelação/Remessa Necessária"], "Contratos Bancários": ["Mandado de Segurança", "Agravo de Instrumento", "Apelação", "Remessa Necessária", "Apelação/Remessa Necessária"], "Penal": ["Habeas Corpus", "Mandado de Segurança Criminal", "Recurso em Sentido Estrito", "Apelação", "Remessa Necessária", "Apelação/Remessa Necessária"]};
const SUBCLASSES_COMUNS = ["Questão de Ordem", "Embargos de Declaração", "Agravo Interno", "Voto-vista"];
let IDX_ATIVO = -1;

// ── Declarações globais dos painéis (antes de getFiltrados) ───
var _FORA_CONFIRMADOS = new Set();
var _FORA_EXCLUIDOS   = new Set();
var _PEND_SITUACOES   = {};

// ── Filtro por tipo de sessão ─────────────────────────────────
let FILTRO_TIPO = 'todas';
let FILTRO_RAMO      = '';  // matéria
let FILTRO_SUBGRUPO  = '';  // classe
let FILTRO_SUBCLASSE = '';  // subclasse
let FILTRO_RESULTADO = '';  // css class: provido, nao-provido, parcial, etc.
let FILTRO_COM_OBS_DESEMB  = false; // só com obs. desembargador
let FILTRO_COM_OBS_ASSESSOR = false; // só com obs. assessor
let MODO_MATERIA = false; // false = ordem original; true = agrupado por matéria
// Ordem da hierarquia ao agrupar por matéria (padrão: Matéria → Classe → Subclasse)
let NIVEL_1 = 'ramo';
let NIVEL_2 = 'subgrupo';
let NIVEL_3 = 'subclasse';

function getValorNivel(d, campo) {
  if (campo === 'ramo')      return d.ramo      || 'Outros';
  if (campo === 'subgrupo')  return d.subgrupo  || '';
  if (campo === 'subclasse') return d.subclasse || '';
  return '';
}
function getCorNivel1(campo, valor) {
  if (campo === 'ramo') return MATERIAS_CONFIG[valor] || '#3949ab';
  return '#546e7a';
}
function getOrdemFixaNivel(campo, contextoV1) {
  // Retorna lista ordenada de valores para o campo dado (pode ser vazia = alfabético)
  if (campo === 'ramo')      return MATERIAS_ORDEM || [];
  if (campo === 'subclasse') return ['', ...SUBCLASSES_COMUNS];
  if (campo === 'subgrupo') {
    // Se o nível acima (contextoV1) é o ramo, usamos a ordem de subgrupos desse ramo
    if (NIVEL_1 === 'ramo' && contextoV1 && MATERIAS_SUBGRUPOS) {
      return MATERIAS_SUBGRUPOS[contextoV1] || [];
    }
    return [];
  }
  return [];
}

function getFiltrados() {
  // Retorna [{d, idxGlobal, num, numOriginal}]
  const base = DECISOES
    .map((d, i) => ({ d, idxGlobal: i, numOriginal: i + 1 }))
    .filter(item => {
      const d = item.d;
      // Processos excluídos pelo botão Excluir do painel Fora de Pauta
      if (d.cnj && _FORA_EXCLUIDOS.has(d.cnj)) return false;
      // Tipo de sessão
      if (FILTRO_TIPO !== 'todas') {
        const t = (d.tipo || '').toLowerCase();
        if (FILTRO_TIPO === 'virtual'          && t !== 'virtual')           return false;
        if (FILTRO_TIPO === 'ordinária'        && !t.startsWith('ordin'))    return false;
        if (FILTRO_TIPO === 'não classificada' && t !== '' && t !== 'não classificada') return false;
      }
      // Matéria / Classe / Subclasse
      if (FILTRO_RAMO      && (d.ramo      || 'Outros') !== FILTRO_RAMO)      return false;
      if (FILTRO_SUBGRUPO  && (d.subgrupo  || '')        !== FILTRO_SUBGRUPO)  return false;
      if (FILTRO_SUBCLASSE && (d.subclasse || '')        !== FILTRO_SUBCLASSE) return false;
      // Resultado
      if (FILTRO_RESULTADO && (d.css || '') !== FILTRO_RESULTADO)             return false;
      // Obs. Desembargador / Assessor
      if (FILTRO_COM_OBS_DESEMB   && !d.tem_comentario)   return false;
      if (FILTRO_COM_OBS_ASSESSOR && !d.tem_obs_assessor) return false;
      return true;
    });

  if (!MODO_MATERIA) {
    return base.map((item, seq) => ({ ...item, num: seq + 1 }));
  }

  // Modo matéria: agrupar em 3 níveis dinâmicos (NIVEL_1 → NIVEL_2 → NIVEL_3)
  const g1 = {}, ord1 = [];
  base.forEach(item => {
    const v1 = getValorNivel(item.d, NIVEL_1);
    if (!g1[v1]) { g1[v1] = {}; ord1.push(v1); }
    const v2 = getValorNivel(item.d, NIVEL_2);
    if (!g1[v1][v2]) g1[v1][v2] = {};
    const v3 = getValorNivel(item.d, NIVEL_3);
    if (!g1[v1][v2][v3]) g1[v1][v2][v3] = [];
    g1[v1][v2][v3].push(item);
  });

  // Ordenar 1º nível
  const defOrd1 = getOrdemFixaNivel(NIVEL_1, null);
  const sorted1 = defOrd1.filter(v => g1[v]).concat(ord1.filter(v => !defOrd1.includes(v)));

  const resultado = [];
  let seq = 0;
  sorted1.forEach(v1 => {
    const g2 = g1[v1];
    const ord2 = Object.keys(g2);
    const defOrd2 = getOrdemFixaNivel(NIVEL_2, v1);
    const sorted2 = defOrd2.filter(v => g2[v]).concat(ord2.filter(v => !defOrd2.includes(v)));
    sorted2.forEach(v2 => {
      const g3 = g2[v2];
      const ord3 = Object.keys(g3);
      const defOrd3 = getOrdemFixaNivel(NIVEL_3, v1);
      const sorted3 = defOrd3.filter(v => g3[v]).concat(ord3.filter(v => !defOrd3.includes(v)));
      sorted3.forEach(v3 => {
        g3[v3].forEach(item => {
          seq++;
          resultado.push({ ...item, num: seq, _v1: v1, _v2: v2, _v3: v3 });
        });
      });
    });
  });
  return resultado;
}



function toggleModoMateria() {
  MODO_MATERIA = !MODO_MATERIA;
  const btn    = document.getElementById('btn-modo-materia');
  const painel = document.getElementById('painel-hierarquia');
  if (btn) {
    btn.textContent = MODO_MATERIA ? '🔢 Ordem original' : '📚 Agrupar por matéria';
    btn.style.background  = MODO_MATERIA ? '#e8eaf6' : '#fff';
    btn.style.color       = MODO_MATERIA ? '#1a237e' : '#333';
    btn.style.fontWeight  = MODO_MATERIA ? '700'     : '400';

  if (painel) painel.style.display = MODO_MATERIA ? '' : 'none';
  IDX_ATIVO = -1;
  document.getElementById('estado-vazio').style.display = '';

  getFiltrados().forEach(item => SELECIONADAS.add(item.idxGlobal));

}

function alterarHierarquia() {
  const s1 = document.getElementById('sel-nivel-1').value;
  const s2 = document.getElementById('sel-nivel-2').value;
  const s3 = document.getElementById('sel-nivel-3').value;
  // Evita duplicatas — se houver conflito, não aplica
  if (s1 === s2 || s1 === s3 || s2 === s3) {
    const aviso = document.getElementById('aviso-hierarquia');
    if (aviso) { aviso.style.display = ''; setTimeout(() => aviso.style.display = 'none', 2500); }

  document.getElementById('conteudo-decisao').style.display = 'none';

  getFiltrados().forEach(item => SELECIONADAS.add(item.idxGlobal));
  renderLista(document.getElementById('busca').value || '');
}

  document.getElementById('estado-vazio').style.display = '';
  document.getElementById('conteudo-decisao').style.display = 'none';
  SELECIONADAS.clear();

function aplicarFiltroTipo() {

function aplicarFiltros() {
  FILTRO_RAMO       = document.getElementById('filtro-ramo')      ?.value || '';
  FILTRO_SUBGRUPO   = document.getElementById('filtro-subgrupo')  ?.value || '';
  FILTRO_SUBCLASSE  = document.getElementById('filtro-subclasse') ?.value || '';
  FILTRO_RESULTADO  = document.getElementById('filtro-resultado') ?.value || '';
  FILTRO_COM_OBS_DESEMB   = document.getElementById('filtro-obs-desemb')   ?.checked || false;
  FILTRO_COM_OBS_ASSESSOR = document.getElementById('filtro-obs-assessor') ?.checked || false;
  // Cascading: reset subgrupo/subclasse selects when ramo changes
  _resetListaEstado();
}

function _preencherFiltros() {
  // Build unique sorted values from DECISOES
  const ramos = [...new Set(DECISOES.map(d => d.ramo || 'Outros'))].sort();
  const subgrupos = [...new Set(DECISOES.map(d => d.subgrupo || '').filter(Boolean))].sort();
  const subclasses = [...new Set(DECISOES.map(d => d.subclasse || '').filter(Boolean))].sort();
  const resultados = [...new Set(DECISOES.map(d => d.css || '').filter(Boolean))].sort();
  const labels = {'provido':'Provido','nao-provido':'Não provido','parcial':'Parcialmente provido',
                   'prejudicado':'Prejudicado','extinto':'Extinto sem mérito','outros':'Outros'};

  function _preencher(id, vals, labelFn) {
    const sel = document.getElementById(id);
    if (!sel) return;
    vals.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v;
      opt.textContent = labelFn ? labelFn(v) : v;
      sel.appendChild(opt);
    });
  }
  _preencher('filtro-ramo',      ramos,      null);
  _preencher('filtro-subgrupo',  subgrupos,  null);
  _preencher('filtro-subclasse', subclasses, null);
  _preencher('filtro-resultado', resultados, v => labels[v] || v);
}

// ── Utilitários ───────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function normalizar(texto) {
  return texto.replace(/\r\n/g,'\n').replace(/\r/g,'\n')
              .replace(/\n{3,}/g,'\n\n').trim();
}
function parasHtml(texto, classe) {
  const cls = classe ? ` class="${classe}"` : '';
  return normalizar(texto).split(/\n\n+/)
    .map(b => b.replace(/\s+/g,' ').trim()).filter(Boolean)
    .map(b => `<p${cls}>${esc(b)}</p>`).join('\n');
}
function formatarEmenta(texto) {
  texto = normalizar(texto);
  const m = texto.match(/^\s*1\s*\./m);
  const verb     = m ? texto.slice(0, m.index).trim() : texto.trim();
  const itensRaw = m ? texto.slice(m.index).trim() : '';
  let html = '';
  if (verb) html += `<p class="verb">${esc(verb.replace(/\s+/g,' '))}</p>\n`;
  for (const bloco of itensRaw.split(/\n\n+/)) {
    const b = bloco.replace(/\s+/g,' ').trim();
    if (b) html += `<p class="item">${esc(b)}</p>\n`;
  }
  return html;
}
function extrairMioloAcordao(texto) {
  if (!texto) return '';
  texto = normalizar(texto);
  // Localiza parágrafo que começa com "Decide" (case-insensitive)
  const m = texto.match(/(?:^|\n)[ \t]*(decide\b)/i);
  if (!m) return `<p class="ac">${esc(texto.replace(/\s+/g,' ').trim())}</p>`;
  const pos = m.index + m[0].length - m[1].length;
  const bloco = texto.slice(pos).split(/\n\n/)[0].replace(/\s+/g,' ').trim();
  return `<p class="ac">${esc(bloco)}</p>`;
}
function metaRow(rot, val) {
  if (!val || !val.trim()) return '';
  return `<tr><td class="r">${esc(rot)}</td><td class="v">${esc(val)}</td></tr>`;
}

// ── Renderização da decisão ───────────────────────────────────
function renderDecisao(d, opts, numero) {
  const { incComent, incObsAssessor, incAssessor, incRel, incVoto, incTipo, incData,
           exportando, incResultado, incExpandir } = opts;
  // incResultado: mostra badge de resultado (padrão: true na visualização, false na exportação)
  // incExpandir:  mostra <details> de rel./voto quando não expandido (padrão: true na viz, false na export)
  const mostrarResultado = incResultado !== undefined ? incResultado : !exportando;
  const mostrarExpandir  = incExpandir  !== undefined ? incExpandir  : !exportando;
  let h = '<div class="exp-decisao decisao"'
    + ' data-ramo="' + esc(d.ramo || '') + '"'
    + ' data-sg="'   + esc(d.subgrupo  || '') + '"'
    + ' data-sc="'   + esc(d.subclasse || '') + '"'
    + ' data-css="'  + esc(d.css || '') + '">';

  // Chamada XX — formato: CHAMADA 01 - MATÉRIA - SUBGRUPO[ - SUBCLASSE]
  if (numero) {
    let _lbl = 'Chamada ' + String(numero).padStart(2,'0');
    if (d.ramo) {
      _lbl += ' – ' + d.ramo.toUpperCase();
      if (d.subgrupo)   _lbl += ' – ' + d.subgrupo.toUpperCase();
      if (d.subclasse)  _lbl += ' – ' + d.subclasse.toUpperCase();
    }
    h += '<div class="chamada">' + esc(_lbl) + '</div>';
  }
  // Anotação Obs. Lista — mesmas cores do apêndice, em tom sobre tom
  if (opts.incObsLista !== false) {
    var _obsLista = _obsListaParaDecisao(d);
    if (_obsLista) {
      // Cores base (texto) e fundo (tom claro) — mesma lógica de _corObs
      var _obsColor = '#333', _obsBg = '#fffde7', _obsBorder = '#f9a825';
      if (_obsLista.includes('não está em pauta'))         { _obsColor='#1565c0'; _obsBg='#e3f2fd'; _obsBorder='#90caf9'; }
      else if (_obsLista.includes('Minuta inclu'))              { _obsColor='#6a1b9a'; _obsBg='#f3e5f5'; _obsBorder='#ce93d8'; }
      else if (_obsLista.includes('não consta das rela'))    { _obsColor='#2e7d32'; _obsBg='#e8f5e9'; _obsBorder='#a5d6a7'; }
      else if (_obsLista.includes('remanescente'))              { _obsColor='#2e7d32'; _obsBg='#e8f5e9'; _obsBorder='#a5d6a7'; }
      else if (_obsLista.includes('adiado'))                    { _obsColor='#ad1457'; _obsBg='#fce4ec'; _obsBorder='#f48fb1'; }
      else if (_obsLista.includes('antecipado'))                { _obsColor='#6a1b9a'; _obsBg='#f3e5f5'; _obsBorder='#ce93d8'; }
      h += '<div style="font-family:Arial,sans-serif;font-size:.78em;font-weight:700;'
        + 'background:' + _obsBg + ';color:' + _obsColor + ';border-left:3px solid ' + _obsBorder + ';'
        + 'padding:3px 10px;margin-bottom:6px;border-radius:0 4px 4px 0;">'
        + esc(_obsLista) + '</div>';
    }
  }
  // Badge de status (se registrado)
  const _stBadge = '';
  if (_stBadge) h += '<div style="margin-bottom:8px;">' + _stBadge + '</div>';
  if (d.assunto) h += '<div style="font-size:.8em;color:#5c6bc0;margin-bottom:6px;font-family:&quot;Segoe UI&quot;,Arial,sans-serif;">' + esc(d.assunto) + '</div>';

  // Tabela meta
  let meta = metaRow('Processo', d.cnj);
  meta += metaRow('Classe', d.classe || '');
  meta += metaRow('Polo ativo', d.polo_ativo || '');
  meta += metaRow('Adv. polo ativo', d.adv_polo_ativo || '');
  meta += metaRow('Polo passivo', d.polo_passivo || '');
  meta += metaRow('Adv. polo passivo', d.adv_polo_passivo || '');
  if (incAssessor) meta += metaRow('Assessor', d.assessor);
  if (incTipo !== false) meta += metaRow('Tipo de sessão', d.tipo ? d.tipo.toUpperCase() : '');
  if (incData !== false) meta += metaRow('Data da sessão', d.data);
  if (meta) h += `<table class="meta">${meta}</table>`;

  // Comentário do Desembargador
  if (incComent && d.comentario) {
    const c = esc(d.comentario).replace(/\r\n/g,'\n').replace(/\r/g,'\n').replace(/\n{2,}/g,'\n').replace(/\n/g,'<br>');
    h += `<div class="coment"><strong>Observações do Desembargador</strong>${c}</div>`;
  }

  // Obs. Assessor
  if (incObsAssessor && d.obs_assessor) {
    const oa = esc(d.obs_assessor).replace(/\r\n/g,'\n').replace(/\r/g,'\n').replace(/\n{2,}/g,'\n').replace(/\n/g,'<br>');
    h += `<div class="obs-assessor"><strong>Observações do Assessor</strong>${oa}</div>`;
  }

  // Ementa
  if (d.ementa) {
    h += '<div class="sec">Ementa</div>';
    h += formatarEmenta(d.ementa);
  }

  // Relatório
  if (d.relatorio) {
    if (incRel) {
      h += '<div class="sec">Relatório</div>' + parasHtml(d.relatorio);
    } else if (mostrarExpandir) {
      h += `<details><summary>📄 Ver Relatório</summary>` +
           `<div class="sec-conteudo">${parasHtml(d.relatorio)}</div></details>`;
    }
  }

  // Voto
  if (d.voto) {
    if (incVoto) {
      h += '<div class="sec">Voto</div>' + parasHtml(d.voto);
    } else if (mostrarExpandir) {
      h += `<details><summary>⚖️ Ver Voto</summary>` +
           `<div class="sec-conteudo">${parasHtml(d.voto)}</div></details>`;
    }
  }

  // Acórdão — apenas o miolo (parágrafo "Decide…")
  if (d.acordao) {
    h += '<div class="sec">Acórdão</div>';
    h += extrairMioloAcordao(d.acordao);
  }

  // Resultado
  if (mostrarResultado) {
    h += '<div class="sec">Resultado</div>';
    h += `<span class="badge-resultado ${d.css}">${esc(d.resultado)}</span>`;
  }
  h += '</div>';
  return h;
}

// ── Seleção de chamadas para exportação ──────────────────────
const SELECIONADAS = new Set(DECISOES.map((_, i) => i)); // todas marcadas por padrão

function toggleSel(idx, ev) {
  ev.stopPropagation();
  if (SELECIONADAS.has(idx)) SELECIONADAS.delete(idx);
  else SELECIONADAS.add(idx);
  atualizarContSel();
}
function toggleAll(marcar) {
  getFiltrados().forEach(item => {
    if (marcar) SELECIONADAS.add(item.idxGlobal);
    else SELECIONADAS.delete(item.idxGlobal);
  });
  renderLista(document.getElementById('busca').value);
}
function atualizarContSel() {
  const el = document.getElementById('sel-count');
  if (!el) return;
  const filtrados  = getFiltrados();
  const selCount   = filtrados.filter(item => SELECIONADAS.has(item.idxGlobal)).length;
  el.textContent   = selCount + '/' + filtrados.length;
}
function getExportList() {
  const filtrados = getFiltrados();
  const sel = filtrados.filter(item => SELECIONADAS.has(item.idxGlobal));
  if (sel.length) return sel.map(item => ({ d: item.d, num: item.num, ramo: item.ramo, subgrupo: item.subgrupo }));
  // fallback: se nada marcado, exporta a decisão ativa
  if (IDX_ATIVO >= 0) {
    const item = filtrados.find(x => x.idxGlobal === IDX_ATIVO);
    if (item) return [{ d: item.d, num: item.num, ramo: item.ramo, subgrupo: item.subgrupo }];
  }
  return [];
}

// ── Lista ─────────────────────────────────────────────────────
function renderLista(filtro) {
  const lista    = document.getElementById('lista');
  const contador = document.getElementById('contador');
  const q        = (filtro || '').toLowerCase().trim();
  const base     = getFiltrados();
  const visiveis = base.filter(item =>
    !q || (item.d.cnj + ' ' + item.d.assessor + ' ' + item.d.ementa + ' ' + item.d.cab)
          .toLowerCase().includes(q)
  );
  contador.textContent = visiveis.length + ' de ' + base.length + ' decisão(ões)';

  if (!MODO_MATERIA) {
    lista.innerHTML = visiveis.map(item => _itemListaHtml(item)).join('');
  } else {
    // Inserir cabeçalhos de grupo com 3 níveis dinâmicos
    let html = '';
    let v1Atual = null, v2Atual = null, v3Atual = null;
    const LABELS = { ramo: 'Matéria', subgrupo: 'Classe', subclasse: 'Subclasse' };
    visiveis.forEach(item => {
      const v1 = item._v1 !== undefined ? item._v1 : (getValorNivel(item.d, NIVEL_1));
      const v2 = item._v2 !== undefined ? item._v2 : (getValorNivel(item.d, NIVEL_2));
      const v3 = item._v3 !== undefined ? item._v3 : (getValorNivel(item.d, NIVEL_3));
      if (v1 !== v1Atual) {
        v1Atual = v1; v2Atual = null; v3Atual = null;
        const cor = getCorNivel1(NIVEL_1, v1);
        html += `<div class="grupo-materia" style="background:${cor}">${esc(v1)}</div>`;
      }
      if (v2 && v2 !== v2Atual) {
        v2Atual = v2; v3Atual = null;
        html += `<div class="grupo-submateria">${esc(v2)}</div>`;
      }
      if (v3 && v3 !== v3Atual) {
        v3Atual = v3;
        html += `<div class="grupo-subsubmateria">${esc(v3)}</div>`;
      }
      html += _itemListaHtml(item);
    });
    lista.innerHTML = html;
  }
  atualizarContSel();
}

function _itemListaHtml(item) {
  const { d, idxGlobal, num, numOriginal } = item;
  const numStr  = String(num).padStart(2, '0');
  const origStr = String(numOriginal).padStart(2, '0');
  const chk     = SELECIONADAS.has(idxGlobal) ? 'checked' : '';
  const label   = MODO_MATERIA
    ? `Chamada ${numStr} <span style="color:#999;font-size:.85em">(orig. ${origStr})</span>`
    : `Chamada ${numStr}`;
  const statusBadgeItem = '';
  return `<div class="item-lista${idxGlobal === IDX_ATIVO ? ' ativo' : ''}"
              onclick="abrirDecisao(${idxGlobal})">
    <div class="item-cnj">
      <input type="checkbox" class="item-chk" ${chk} onclick="toggleSel(${idxGlobal},event)">
      ${label} · ${esc(d.cnj || d.nome)}${statusBadgeItem}
    </div>
    <div class="item-cab">${esc(d.cab)}</div>
    <div class="item-meta">
      ${d.assessor ? `<span>${esc(d.assessor)}</span>` : ''}
      ${d.data     ? `<span>${esc(d.data)}</span>`     : ''}
      ${MODO_MATERIA && d.assunto ? `<span style="color:#5c6bc0;font-size:.78em">${esc(d.assunto)}</span>` : ''}
      <span class="bdg ${d.css}">${esc(d.resultado)}</span>
    </div>
  </div>`;
}

// ── Abrir decisão (toggle fix) ────────────────────────────────
function abrirDecisao(idxGlobal) {
  IDX_ATIVO = idxGlobal;
  const d    = DECISOES[idxGlobal];
  // Descobre o número sequencial deste item no filtro atual
  const item = getFiltrados().find(x => x.idxGlobal === idxGlobal);
  const num  = item ? item.num : idxGlobal + 1;

  document.getElementById('estado-vazio').style.display = 'none';
  const cont = document.getElementById('conteudo-decisao');
  cont.style.display = 'block';

  // Preserva estado atual dos controles antes de reescrever innerHTML
  const opts = {
    incComent:      document.getElementById('chk-coment')      ?.checked ?? true,
    incObsAssessor: document.getElementById('chk-obs-assessor')?.checked ?? true,
    incAssessor:    document.getElementById('chk-assessor')    ?.checked ?? true,
    incTipo:        document.getElementById('chk-tipo')        ?.checked ?? true,
    incData:        document.getElementById('chk-data')        ?.checked ?? true,
    incRel:         document.getElementById('chk-rel')         ?.checked ?? false,
    incVoto:        document.getElementById('chk-voto')        ?.checked ?? false,
    incResultado:   document.getElementById('chk-resultado')   ?.checked ?? true,
    incExpandir:    document.getElementById('chk-expandir')    ?.checked ?? true,
    incObsLista:    document.getElementById('chk-obs-lista')   ?.checked ?? true,
  };
  cont.innerHTML = barraExport(opts) + renderDecisao(d, opts, num);
  renderLista(document.getElementById('busca').value);
  cont.scrollTop = 0;
}

  const chkV  = (opts && opts.incVoto     === true)  ? 'checked' : '';

  const chkExp = (opts && opts.incExpandir  === false) ? '' : 'checked';

    <span class="barra-div"></span>
    <label><input type="checkbox" id="chk-rel"         ${chkR}  onchange="rerender()"> Relatório</label>
    <label><input type="checkbox" id="chk-voto"        ${chkV}  onchange="rerender()"> Voto</label>
    <label><input type="checkbox" id="chk-resultado"   ${chkRes} onchange="rerender()"> Resultado</label>
    <span class="barra-div"></span>
    <label><input type="checkbox" id="chk-expandir"    ${chkExp} onchange="rerender()"> Rel./Voto expansível</label>
