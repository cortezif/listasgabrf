<script>
// ── Dados embutidos ───────────────────────────────────────────
const DECISOES = [{"nome": "20260312_101155_Re__VOTO.0803016-28.2022.4.05.8100.VIRTUAL.09.04.2026", "nome_arq": "VOTO.0803016-28.2022.4.05.8100.VIRTUAL.09.04.2026", "cnj": "0803016-28.2022.4.05.8100", "cab": "0803016-28.2022.4.05.8100", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "DEPARTAMENTO NACIONAL DE OBRAS CONTRA AS SECAS", "adv_polo_ativo": "Não informado", "polo_passivo": "VALDIR JOSE CORDEIRO\r\n\r\nINICIO RELATORIO", "adv_polo_passivo": "Não informado", "ementa": "CUMPRIMENTO DE SENTENÇA. HABILITAÇÃO DE SUCESSORES DE AUTOR FALECIDO. CABIMENTO PRESCRIÇÃO. INOCORRÊNCIA. IMPROVIMENTO DA APELAÇÃO. AGRAVO INTERNO PREJUDICADO.\r\n\r\n\r\n\r\n1. Apelação interposta pela UNIÃO FEDERAL contra sentença que, afastando a prescrição, julgou procedente o pedido de habilitação da sucessora do autor falecido.\r\n\r\n\r\n\r\n2. Segundo a jurisprudência do STJ, a morte de uma das partes, inclusive no curso da execução, implica a suspensão do processo, razão pela qual, na ausência de previsão legal que imponha prazo para a habilitação dos respectivos sucessores, não há que falar em prescrição. Ocorrendo o óbito do participante da relação processual, impõe-se a suspensão do feito, nos termos do art. 265, I, do Código Processual Civil/1973 (art. 313, I, do CPC/2015), até que se promova a habilitação. Precedentes: AgInt no AgInt no AREsp n. 1.318.017/SP, relator Ministro Francisco Falcão, Segunda Turma, julgado em 4/12/2024, DJEN de 9/12/2024; AgInt no REsp n. 2.102.691/RJ, relator Ministro Gurgel de Faria, Primeira Turma, julgado em 26/2/2024, DJe de 6/3/2024.\r\n\r\n\r\n\r\n3. \"A morte de uma das partes tem, como consequência, a suspensão do processo, razão pela qual, na ausência de previsão legal impondo prazo para a habilitação dos sucessores da parte, não corre a prescrição, inclusive para a execução\". Nesse sentido: STJ, REsp 1.830.518/PE, Rel. Ministro OG FERNANDES, SEGUNDA TURMA, DJe de 27/04/2021; REsp 1.869.009/CE, Rel. Ministra ASSUSETE MAGALHÃES, SEGUNDA TURMA, DJe de 27/05/2020.\r\n\r\n\r\n\r\n4. Sobre a discussão da questão no Superior Tribunal de Justiça, no Tema 1254, a ordem de suspensão é apenas para os Recursos Especiais e Agravos em Recurso Especial na segunda instância e/ou que tramitem no STJ, que versem acerca da questão delimitada.\r\n\r\n\r\n\r\n5. Apelação improvida. Agravo interno julgado prejudicado.", "relatorio": "Trata-se de Apelação Cível interposta pelo DEPARTAMENTO NACIONAL DE OBRAS CONTRA AS SECAS - DNOCS contra a sentença proferida em procedimento autônomo que homologou a habilitação de sucessores nos autos originários, com o objetivo de reformar a decisão para reconhecer a prescrição e, por conseguinte, obstar a habilitação.\r\n\r\n\r\n\r\nAlega o recorrente que a decisão impugnada tem natureza de sentença, sendo cabível o manejo de apelação (arts. 203, §1º, 692 e 1.009 do CPC), consoante doutrina e precedentes do STJ e do TRF5 acerca do caráter sentencial do procedimento incidental autônomo de habilitação.\r\n\r\n\r\n\r\nSustenta, no mérito, que a habilitação está sujeita a prazo prescricional quinquenal, aplicando-se o art. 1º do Decreto n. 20.910/1932 e a Súmula 150 do STF (\"prescreve a execução no mesmo prazo da ação\"), pois transcorreram mais de cinco anos entre o óbito e o requerimento de habilitação.\r\n\r\n\r\n\r\nAponta que o falecimento da pensionista ocorreu em 21/04/2016, ao passo que o pedido de habilitação somente foi formulado em 09/03/2022, configurando a prescrição da pretensão executória.\r\n\r\n\r\n\r\nDefende que a suspensão do processo por morte (art. 313, I, CPC) não implica imprescritibilidade, devendo prevalecer a segurança jurídica; assim, não cabe ao julgador criar hipótese de imprescritibilidade não prevista em lei.\r\n\r\n\r\n\r\nReforça a tese com excertos jurisprudenciais sobre o cabimento de apelação em habilitação e a necessidade de limites temporais para sucessores, distinguindo suspensão processual de prazos de direito material.\r\n\r\n\r\n\r\nPor fim, aduz a necessidade de sobrestamento do feito até a apreciação pelo STJ - REsp (2022/0334043-9)2034211/CE - matéria afetada - tema 1254.\r\n\r\n\r\n\r\nContrarrazões apresentadas.\r\n\r\n\r\n\r\nProferida decisão negando provimento à apelação, o apelante interpôs agravo interno.\r\n\r\n\r\n\r\nÉ o relatório.\r\n\r\n\r\n\r\nFIM RELATÓRIO", "voto": "Recebo a apelação interposta, considerando presentes os requisitos intrínsecos e extrínsecos à admissibilidade dos recursos.\r\n\r\n\r\n\r\nSegundo a jurisprudência do STJ, a morte de uma das partes, inclusive no curso da execução, implica a suspensão do processo, razão pela qual, na ausência de previsão legal que imponha prazo para a habilitação dos respectivos sucessores, não há que falar em prescrição. Ocorrendo o óbito do participante da relação processual, impõe-se a suspensão do feito, nos termos do art. 265, I, do Código Processual Civil/1973 (art. 313, I, do CPC/2015), até que se promova a habilitação.\r\n\r\n\r\n\r\nA propósito, confiram-se os seguintes precedentes:\r\n\r\n\r\n\r\nPROCESSUAL CIVIL. DIREITO ADMINISTRATIVO. AÇÃO DE DESAPROPRIAÇÃO. EXPROPRIAÇÃO DE ÁREA. ART. 1.022 DO CPC 2015. OPOSIÇÃO DOS EMBARGOS DECLARATÓRIOS CARACTERIZOU, TÃO SOMENTE, A IRRESIGNAÇÃO DO EMBARGANTE DIANTE DE DECISÃO CONTRÁRIA A SEUS INTERESSES. AFASTAMENTO DA SUPOSTA VIOLAÇÃO. SUPERVENIÊNCIA DO ÓBITO DE UMA DAS PARTES DO PROCESSO ENSEJA, COMO CONSEQUÊNCIA, A IMEDIATA SUSPENSÃO DO PROCESSO, DESDE O EVENTO MORTE. ART. 1º DO DECRETO N. 20.910/1932. DEMORA NA CITAÇÃO DA UNIÃO ATRIBUÍDA EXCLUSIVAMENTE AO PODER JUDICIÁRIO. DESPROVIMENTO DO AGRAVO INTERNO. MANUTENÇÃO DA DECISÃO RECORRIDA.\r\n\r\n\r\n\r\n[...]\r\n\r\n\r\n\r\nIII - No que trata da alegada violação dos arts. 180 e 265, I, do CPC/1973 (atuais arts. 221 e 313, I do CPC/2015), do art. 12 do Decreto-Lei n. 20.910/1932, bem como do teor da Súmula n. 150 do STF, relacionados à ocorrência (ou não) da prescrição executiva, a Corte Regional, na fundamentação do aresto recorrido, assim firmou seu entendimento (fls. 603).\r\n\r\n\r\n\r\nIV - Consoante se depreende dos excertos reproduzidos, o trânsito em julgado da ação originária ocorreu em 16/4/1985 e o falecimento do exequente em 13/7/1989, embora a notícia do seu falecimento só tenha sido comunicada, no processo, em 25/10/1991. Conforme jurisprudência desta Corte Superior, a superveniência do óbito de uma das partes do processo enseja, como consequência, a imediata suspensão do processo, desde o evento morte, a fim de viabilizar a substituição processual da parte pelo seu espólio ou herdeiro.\r\n\r\n\r\n\r\nAssim, pelo fato de não existir previsão legal impondo prazo para a habilitação dos sucessores da parte falecida, impõe-se a suspensão do feito até a regularização da representação processual, ou seja, não corre a prescrição, inclusive para as ações executivas. Nesse sentido: STJ, REsp n. 1.830.518/PE, relator Ministro Og Fernandes, Segunda Turma, DJe de 27/04/2021; REsp n. 1.869.009/CE, relatora Ministra Assusete Magalhães, Segunda Turma, DJe de 27/5/2020; AREsp n. 1.542.143/CE, relator Ministro Herman Benjamin, Segunda Turma, DJe de 11/10/2019; AgInt no AREsp n. 1.059.362/RS, relator Ministro Sérgio Kukina, Primeira Turma, DJe de 9/3/2018.\r\n\r\n\r\n\r\nV - À luz desse entendimento, para o caso dos autos, pode-se afirmar que entre o trânsito em julgado da ação originária - 16/4/1985 - e o falecimento do exequente - 13/7/1989 - não transcorreu o prazo de 5 (cinco) anos previsto no art. 1º do Decreto 20.910/1932.\r\n\r\n\r\n\r\nVI - Tem-se, ainda, que a suspensão do processo somente voltou a correr com a habilitação do espólio ou dos herdeiros do falecido que, conforme consignado à fl. 635, ocorreu em 25/10/1991, com o desarquivamento do processo a pedido do inventariante do expropriado/exequente, oportunidade em que se promoveu a regularização da representação processual (informação do acórdão recorrido, à fl. 603). Desse modo, se entre a habilitação do inventariante, em 25/10/1991, e a citação da União, em 24/08/1995, transcorreram 3 (três) anos e dez (meses), tempo esse superior aos 9 (nove) meses restante do prazo da prescrição, sendo a demora na citação da União atribuída exclusivamente ao Poder Judiciário, que deixou de praticar ato de sua atribuição para a efetivação da citação, não se pode pretender/deduzir pela prescrição da pretensão executiva, sob pena de impor prejuízo injustificado ao exequente.\r\n\r\n\r\n\r\nVII - Agravo interno improvido. (AgInt no AgInt no AREsp n. 1.318.017/SP, relator Ministro Francisco Falcão, Segunda Turma, julgado em 4/12/2024, DJEN de 9/12/2024.)\r\n\r\n\r\n\r\nPROCESSUAL CIVIL. RECURSO ESPECIAL. EXECUÇÃO DE SENTENÇA. PRESCRIÇÃO. NÃO OCORRÊNCIA.\r\n\r\n\r\n\r\n1. Segundo a jurisprudência do STJ, a morte de uma das partes, inclusive no curso da execução, implica a suspensão do processo, razão pela qual, na ausência de previsão legal que imponha prazo para a habilitação dos respectivos sucessores, não há que falar em prescrição. Ocorrendo o óbito do participante da relação processual, impõe-se a suspensão do feito, nos termos do art. 265, I, do Código Processual Civil/1973 (art. 313, I, do CPC/2015), até que se promova a habilitação.\r\n\r\n\r\n\r\n2. Agravo interno desprovido. (AgInt no REsp n. 2.102.691/RJ, relator Ministro Gurgel de Faria, Primeira Turma, julgado em 26/2/2024, DJe de 6/3/2024.)\r\n\r\n\r\n\r\nNesse contexto, impõem-se reconhecer a não ocorrência de prescrição para habilitação dos herdeiros, conforme corretamente aduzido na decisão agravada.\r\n\r\n\r\n\r\nLado outro, a prescrição da pretensão executória ocorre no mesmo prazo da prescrição da ação, ou seja, em 5 (cinco) anos, nos termos do art. 1º do Decreto n. 20.910/32 e Súmula 150 do STF. Contudo, deve-se registrar que a morte da parte suspende o processo, bem como o curso do prazo prescricional, nos termos dos arts. 313, I, e 921, I, do CPC, o qual somente recomeça a correr a partir da habilitação dos herdeiros. Nesse sentido:\r\n\r\n\r\n\r\n\"PROCESSUAL CIVIL. EXECUÇÃO DE SENTENÇA. LEGITIMIDADE DOS SUCESSORES. FALECIDO QUE CONSTAVA NA LISTA QUE INSTRUIU A INICIAL DA AÇÃO COLETIVA PROPOSTA PELA ASSOCIAÇÃO. HABILITAÇÃO. POSSIBILIDADE. PRESCRIÇÃO. INOCORRÊNCIA. PRECEDENTES. PROVIMENTO DA APELAÇÃO.\r\n\r\n\r\n\r\n1. Apelação interposta por WHOSOEVER DE MORAIS FERREIRA e outros contra sentença do Juízo da 4ª Vara Federal do Rio Grande do Norte, que acolheu a alegação de prescrição suscitada pelo ente público agravado e extinguiu o cumprimento de sentença com resolução do mérito.\r\n\r\n\r\n\r\n2. A ação foi proposta pela associação de servidores (ASDNER), à qual o pai dos exequentes, ora apelados, se encontrava inscrito, no mínimo, desde 2000, quando da propositura da ação coletiva. A associação ajuizou a ação após ser devidamente autorizada em assembleia, segundo consta na sentença exequenda.\r\n\r\n\r\n\r\n3. A presença do nome do falecido servidor na lista de substituídos do processo 2000.51.01.001586-1, que tramitou junto à 28ª Vara Federal/RJ também está comprovada nos autos, com a juntada de cópia da listagem que instruiu o feito original\r\n\r\n\r\n\r\n4. \"São válidos os atos processuais praticados pelo advogado no curso da execução, ainda que ocorrida a morte do representado antes do seu início, salvo comprovada má-fé.\" (REsp 1844121/AL, Rel. Ministro OG FERNANDES, SEGUNDA TURMA, julgado em 22/09/2020, DJe 09/10/2020). No mesmo sentido: AG 00096223920144050000, Desembargador Federal Ivan Lira de Carvalho, TRF5 - Quarta Turma, DJE - Data::05/03/2015 - Página::302.\r\n\r\n\r\n\r\n5. \"Nos termos da jurisprudência do STJ e desta Corte, ressalvado entendimento diverso da 2ª Turma, a morte de uma das partes suspende imediatamente o processo (art. 313, I, do CPC) e, ante a ausência de prazo para habilitação dos sucessores, não há que se falar em prescrição da pretensão executória até o momento do pedido de habilitação dos herdeiros.\" (PROCESSO: 08121388620204050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL FERNANDO BRAGA DAMASCENO, 3ª TURMA, JULGAMENTO: 29/04/2021).\r\n\r\n\r\n\r\n6. Apelação provida.\" (TRF5 - Processo 08080554720204058400, APELAÇÃO CÍVEL, REL. DESEMBARGADOR FEDERAL ROGÉRIO DE MENESES FIALHO MOREIRA, 3ª TURMA, JULGAMENTO: 28/04/2022).\r\n\r\n\r\n\r\nNa espécie, conforme anteriormente relatado, o entendimento da Corte Especial do Superior Tribunal de Justiça, é o de que \"a morte de uma das partes tem, como consequência, a suspensão do processo, razão pela qual, na ausência de previsão legal impondo prazo para a habilitação dos sucessores da parte, não corre a prescrição, inclusive para a execução\". Nesse sentido: STJ, REsp 1.830.518/PE, Rel. Ministro OG FERNANDES, SEGUNDA TURMA, DJe de 27/04/2021; REsp 1.869.009/CE, Rel. Ministra ASSUSETE MAGALHÃES, SEGUNDA TURMA, DJe de 27/05/2020.\r\n\r\n\r\n\r\nSobre a discussão da questão no Superior Tribunal de Justiça, no Tema 1254, a ordem de suspensão é apenas para os Recursos Especiais e Agravos em Recurso Especial na segunda instância e/ou que tramitem no STJ, que versem acerca da questão delimitada.\r\n\r\n\r\n\r\nPosto isso, NEGO PROVIMENTO à apelação e JULGO PREJUDICADA a apelação.\r\n\r\n\r\n\r\nÉ como voto.\r\n\r\n\r\n\r\nFIM VOTO", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\nDecide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO à apelação e JULGO PREJUDICADO o agravo interno, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido", "obs_assessor": "﻿", "tem_obs_assessor": false, "assunto": "", "ramo": "Outros", "subgrupo": "", "subclasse": ""}, {"nome": "20260312_115848_Re__VOTO.0006854-57.2025.4.05.0000.VIRTUAL.09.04.2026", "nome_arq": "VOTO.0006854-57.2025.4.05.0000.VIRTUAL.09.04.2026", "cnj": "0006854-57.2025.4.05.0000", "cab": "0006854-57.2025.4.05.0000", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "UNIVERSIDADE FEDERAL RURAL DE PERNAMBUCO", "adv_polo_ativo": "Não informado", "polo_passivo": "SUELY BATISTA GONCALVES e outros (5)\r\n\r\nINICIO RELATORIO", "adv_polo_passivo": "Não informado", "ementa": "CUMPRIMENTO DE SENTENÇA. HABILITAÇÃO DE SUCESSORES DE AUTOR FALECIDO. CABIMENTO PRESCRIÇÃO. INOCORRÊNCIA. IMPROVIMENTO DA APELAÇÃO.\r\n\r\n\r\n\r\n1. Apelação interposta pela UNIÃO FEDERAL contra sentença que, afastando a prescrição, julgou procedente o pedido de habilitação da sucessora do autor falecido.\r\n\r\n\r\n\r\n2. Segundo a jurisprudência do STJ, a morte de uma das partes, inclusive no curso da execução, implica a suspensão do processo, razão pela qual, na ausência de previsão legal que imponha prazo para a habilitação dos respectivos sucessores, não há que falar em prescrição. Ocorrendo o óbito do participante da relação processual, impõe-se a suspensão do feito, nos termos do art. 265, I, do Código Processual Civil/1973 (art. 313, I, do CPC/2015), até que se promova a habilitação. Precedentes: AgInt no AgInt no AREsp n. 1.318.017/SP, relator Ministro Francisco Falcão, Segunda Turma, julgado em 4/12/2024, DJEN de 9/12/2024; AgInt no REsp n. 2.102.691/RJ, relator Ministro Gurgel de Faria, Primeira Turma, julgado em 26/2/2024, DJe de 6/3/2024.\r\n\r\n\r\n\r\n3. \"A morte de uma das partes tem, como consequência, a suspensão do processo, razão pela qual, na ausência de previsão legal impondo prazo para a habilitação dos sucessores da parte, não corre a prescrição, inclusive para a execução\". Nesse sentido: STJ, REsp 1.830.518/PE, Rel. Ministro OG FERNANDES, SEGUNDA TURMA, DJe de 27/04/2021; REsp 1.869.009/CE, Rel. Ministra ASSUSETE MAGALHÃES, SEGUNDA TURMA, DJe de 27/05/2020.\r\n\r\n\r\n\r\n4. Sobre a discussão da questão no Superior Tribunal de Justiça, no Tema 1254, a ordem de suspensão é apenas para os Recursos Especiais e Agravos em Recurso Especial na segunda instância e/ou que tramitem no STJ, que versem acerca da questão delimitada.\r\n\r\n\r\n\r\n5. Apelação improvida.", "relatorio": "Trata-se de agravo de instrumento, com pedido de atribuição de efeito suspensivo, interposto pela UNIVERSIDADE FEDERAL RURAL DE PERNAMBUCO - UFRPE contra decisão proferida pelo Juízo da 6ª Vara Federal da Seção Judiciária de Pernambuco que deferiu a habilitação de herdeiros de servidor falecido há mais de cinco anos do requerimento.\r\n\r\n\r\n\r\nNas razões recursais, traz os seguintes argumentos: a) em que pese a legislação não fixar prazo para suspensão do processo ou mesmo habilitação dos herdeiros, não se pode concluir que o processo ficará indefinidamente à espera da iniciativa dos herdeiros; b) a matéria de direito discutida - prescritibilidade da habilitação de herdeiros ou sucessores da parte falecida no curso da ação, foi objeto de afetação, pelo STJ, ao rito dos recursos repetitivos (Tema 1.254) - pelo que, o presente processo deve ser sobrestado até a apreciação da questão jurídica; c) em se tratando de RPV e/ou precatório, dificilmente conseguirá o ente público reaver o pagamento, razão pela qual não se pode aguardar o julgamento final do presente agravo.\r\n\r\n\r\n\r\nLiminar indeferida.\r\n\r\n\r\n\r\nContrarrazões apresentadas.\r\n\r\n\r\n\r\nÉ o relatório.\r\n\r\n\r\n\r\nFIM RELATÓRIO", "voto": "Recebo a apelação interposta, considerando presentes os requisitos intrínsecos e extrínsecos à admissibilidade dos recursos.\r\n\r\n\r\n\r\nSegundo a jurisprudência do STJ, a morte de uma das partes, inclusive no curso da execução, implica a suspensão do processo, razão pela qual, na ausência de previsão legal que imponha prazo para a habilitação dos respectivos sucessores, não há que falar em prescrição. Ocorrendo o óbito do participante da relação processual, impõe-se a suspensão do feito, nos termos do art. 265, I, do Código Processual Civil/1973 (art. 313, I, do CPC/2015), até que se promova a habilitação.\r\n\r\n\r\n\r\nA propósito, confiram-se os seguintes precedentes:\r\n\r\n\r\n\r\nPROCESSUAL CIVIL. DIREITO ADMINISTRATIVO. AÇÃO DE DESAPROPRIAÇÃO. EXPROPRIAÇÃO DE ÁREA. ART. 1.022 DO CPC 2015. OPOSIÇÃO DOS EMBARGOS DECLARATÓRIOS CARACTERIZOU, TÃO SOMENTE, A IRRESIGNAÇÃO DO EMBARGANTE DIANTE DE DECISÃO CONTRÁRIA A SEUS INTERESSES. AFASTAMENTO DA SUPOSTA VIOLAÇÃO. SUPERVENIÊNCIA DO ÓBITO DE UMA DAS PARTES DO PROCESSO ENSEJA, COMO CONSEQUÊNCIA, A IMEDIATA SUSPENSÃO DO PROCESSO, DESDE O EVENTO MORTE. ART. 1º DO DECRETO N. 20.910/1932. DEMORA NA CITAÇÃO DA UNIÃO ATRIBUÍDA EXCLUSIVAMENTE AO PODER JUDICIÁRIO. DESPROVIMENTO DO AGRAVO INTERNO. MANUTENÇÃO DA DECISÃO RECORRIDA.\r\n\r\n\r\n\r\n[...]\r\n\r\n\r\n\r\nIII - No que trata da alegada violação dos arts. 180 e 265, I, do CPC/1973 (atuais arts. 221 e 313, I do CPC/2015), do art. 12 do Decreto-Lei n. 20.910/1932, bem como do teor da Súmula n. 150 do STF, relacionados à ocorrência (ou não) da prescrição executiva, a Corte Regional, na fundamentação do aresto recorrido, assim firmou seu entendimento (fls. 603).\r\n\r\n\r\n\r\nIV - Consoante se depreende dos excertos reproduzidos, o trânsito em julgado da ação originária ocorreu em 16/4/1985 e o falecimento do exequente em 13/7/1989, embora a notícia do seu falecimento só tenha sido comunicada, no processo, em 25/10/1991. Conforme jurisprudência desta Corte Superior, a superveniência do óbito de uma das partes do processo enseja, como consequência, a imediata suspensão do processo, desde o evento morte, a fim de viabilizar a substituição processual da parte pelo seu espólio ou herdeiro.\r\n\r\n\r\n\r\nAssim, pelo fato de não existir previsão legal impondo prazo para a habilitação dos sucessores da parte falecida, impõe-se a suspensão do feito até a regularização da representação processual, ou seja, não corre a prescrição, inclusive para as ações executivas. Nesse sentido: STJ, REsp n. 1.830.518/PE, relator Ministro Og Fernandes, Segunda Turma, DJe de 27/04/2021; REsp n. 1.869.009/CE, relatora Ministra Assusete Magalhães, Segunda Turma, DJe de 27/5/2020; AREsp n. 1.542.143/CE, relator Ministro Herman Benjamin, Segunda Turma, DJe de 11/10/2019; AgInt no AREsp n. 1.059.362/RS, relator Ministro Sérgio Kukina, Primeira Turma, DJe de 9/3/2018.\r\n\r\n\r\n\r\nV - À luz desse entendimento, para o caso dos autos, pode-se afirmar que entre o trânsito em julgado da ação originária - 16/4/1985 - e o falecimento do exequente - 13/7/1989 - não transcorreu o prazo de 5 (cinco) anos previsto no art. 1º do Decreto 20.910/1932.\r\n\r\n\r\n\r\nVI - Tem-se, ainda, que a suspensão do processo somente voltou a correr com a habilitação do espólio ou dos herdeiros do falecido que, conforme consignado à fl. 635, ocorreu em 25/10/1991, com o desarquivamento do processo a pedido do inventariante do expropriado/exequente, oportunidade em que se promoveu a regularização da representação processual (informação do acórdão recorrido, à fl. 603). Desse modo, se entre a habilitação do inventariante, em 25/10/1991, e a citação da União, em 24/08/1995, transcorreram 3 (três) anos e dez (meses), tempo esse superior aos 9 (nove) meses restante do prazo da prescrição, sendo a demora na citação da União atribuída exclusivamente ao Poder Judiciário, que deixou de praticar ato de sua atribuição para a efetivação da citação, não se pode pretender/deduzir pela prescrição da pretensão executiva, sob pena de impor prejuízo injustificado ao exequente.\r\n\r\n\r\n\r\nVII - Agravo interno improvido. (AgInt no AgInt no AREsp n. 1.318.017/SP, relator Ministro Francisco Falcão, Segunda Turma, julgado em 4/12/2024, DJEN de 9/12/2024.)\r\n\r\n\r\n\r\nPROCESSUAL CIVIL. RECURSO ESPECIAL. EXECUÇÃO DE SENTENÇA. PRESCRIÇÃO. NÃO OCORRÊNCIA.\r\n\r\n\r\n\r\n1. Segundo a jurisprudência do STJ, a morte de uma das partes, inclusive no curso da execução, implica a suspensão do processo, razão pela qual, na ausência de previsão legal que imponha prazo para a habilitação dos respectivos sucessores, não há que falar em prescrição. Ocorrendo o óbito do participante da relação processual, impõe-se a suspensão do feito, nos termos do art. 265, I, do Código Processual Civil/1973 (art. 313, I, do CPC/2015), até que se promova a habilitação.\r\n\r\n\r\n\r\n2. Agravo interno desprovido. (AgInt no REsp n. 2.102.691/RJ, relator Ministro Gurgel de Faria, Primeira Turma, julgado em 26/2/2024, DJe de 6/3/2024.)\r\n\r\n\r\n\r\nNesse contexto, impõem-se reconhecer a não ocorrência de prescrição para habilitação dos herdeiros, conforme corretamente aduzido na decisão agravada.\r\n\r\n\r\n\r\nLado outro, a prescrição da pretensão executória ocorre no mesmo prazo da prescrição da ação, ou seja, em 5 (cinco) anos, nos termos do art. 1º do Decreto n. 20.910/32 e Súmula 150 do STF. Contudo, deve-se registrar que a morte da parte suspende o processo, bem como o curso do prazo prescricional, nos termos dos arts. 313, I, e 921, I, do CPC, o qual somente recomeça a correr a partir da habilitação dos herdeiros. Nesse sentido:\r\n\r\n\r\n\r\n\"PROCESSUAL CIVIL. EXECUÇÃO DE SENTENÇA. LEGITIMIDADE DOS SUCESSORES. FALECIDO QUE CONSTAVA NA LISTA QUE INSTRUIU A INICIAL DA AÇÃO COLETIVA PROPOSTA PELA ASSOCIAÇÃO. HABILITAÇÃO. POSSIBILIDADE. PRESCRIÇÃO. INOCORRÊNCIA. PRECEDENTES. PROVIMENTO DA APELAÇÃO.\r\n\r\n\r\n\r\n1. Apelação interposta por WHOSOEVER DE MORAIS FERREIRA e outros contra sentença do Juízo da 4ª Vara Federal do Rio Grande do Norte, que acolheu a alegação de prescrição suscitada pelo ente público agravado e extinguiu o cumprimento de sentença com resolução do mérito.\r\n\r\n\r\n\r\n2. A ação foi proposta pela associação de servidores (ASDNER), à qual o pai dos exequentes, ora apelados, se encontrava inscrito, no mínimo, desde 2000, quando da propositura da ação coletiva. A associação ajuizou a ação após ser devidamente autorizada em assembleia, segundo consta na sentença exequenda.\r\n\r\n\r\n\r\n3. A presença do nome do falecido servidor na lista de substituídos do processo 2000.51.01.001586-1, que tramitou junto à 28ª Vara Federal/RJ também está comprovada nos autos, com a juntada de cópia da listagem que instruiu o feito original\r\n\r\n\r\n\r\n4. \"São válidos os atos processuais praticados pelo advogado no curso da execução, ainda que ocorrida a morte do representado antes do seu início, salvo comprovada má-fé.\" (REsp 1844121/AL, Rel. Ministro OG FERNANDES, SEGUNDA TURMA, julgado em 22/09/2020, DJe 09/10/2020). No mesmo sentido: AG 00096223920144050000, Desembargador Federal Ivan Lira de Carvalho, TRF5 - Quarta Turma, DJE - Data::05/03/2015 - Página::302.\r\n\r\n\r\n\r\n5. \"Nos termos da jurisprudência do STJ e desta Corte, ressalvado entendimento diverso da 2ª Turma, a morte de uma das partes suspende imediatamente o processo (art. 313, I, do CPC) e, ante a ausência de prazo para habilitação dos sucessores, não há que se falar em prescrição da pretensão executória até o momento do pedido de habilitação dos herdeiros.\" (PROCESSO: 08121388620204050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL FERNANDO BRAGA DAMASCENO, 3ª TURMA, JULGAMENTO: 29/04/2021).\r\n\r\n\r\n\r\n6. Apelação provida.\" (TRF5 - Processo 08080554720204058400, APELAÇÃO CÍVEL, REL. DESEMBARGADOR FEDERAL ROGÉRIO DE MENESES FIALHO MOREIRA, 3ª TURMA, JULGAMENTO: 28/04/2022).\r\n\r\n\r\n\r\nNa espécie, conforme anteriormente relatado, o entendimento da Corte Especial do Superior Tribunal de Justiça, é o de que \"a morte de uma das partes tem, como consequência, a suspensão do processo, razão pela qual, na ausência de previsão legal impondo prazo para a habilitação dos sucessores da parte, não corre a prescrição, inclusive para a execução\". Nesse sentido: STJ, REsp 1.830.518/PE, Rel. Ministro OG FERNANDES, SEGUNDA TURMA, DJe de 27/04/2021; REsp 1.869.009/CE, Rel. Ministra ASSUSETE MAGALHÃES, SEGUNDA TURMA, DJe de 27/05/2020.\r\n\r\n\r\n\r\nSobre a discussão da questão no Superior Tribunal de Justiça, no Tema 1254, a ordem de suspensão é apenas para os Recursos Especiais e Agravos em Recurso Especial na segunda instância e/ou que tramitem no STJ, que versem acerca da questão delimitada.\r\n\r\n\r\n\r\nPosto isso, NEGO PROVIMENTO à apelação.\r\n\r\n\r\n\r\nÉ como voto.\r\n\r\n\r\n\r\nFIM VOTO", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\nDecide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO à apelação, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido", "obs_assessor": "﻿", "tem_obs_assessor": false, "assunto": "", "ramo": "Outros", "subgrupo": "", "subclasse": ""}, {"nome": "20260313_135937_Re__VOTO.0008794-57.2025.4.05.0000.VIRTUAL.09.04.2026", "nome_arq": "VOTO.0008794-57.2025.4.05.0000.VIRTUAL.09.04.2026", "cnj": "0008794-57.2025.4.05.0000", "cab": "0008794-57.2025.4.05.0000", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "UNIAO FEDERAL", "adv_polo_ativo": "Não informado", "polo_passivo": "SINDICATO DOS TRAB PUBLICOS FED DA SAUDE E PREV EST PE e outros (3)\r\n\r\nINICIO RELATORIO", "adv_polo_passivo": "Não informado", "ementa": "AGRAVO DE INSTRUMENTO. HONORÁRIOS ADVOCATÍCIOS. FIXAÇÃO PELO CUMPRIMENTO INDIVIDUAL DE SENTENÇA COLETIVA. CABIMENTO. BIS IN IDEM INEXISTENTE. HONORÁRIOS ADVOCATÍCIOS SUCUMBENCIAIS. EQUIDADE AFASTADA. IMPROVIMENTO.\r\n\r\n\r\n\r\n1. Agravo de instrumento, com pedido de antecipação da tutela, interposto pela UNIÃO FEDERAL contra decisão proferida pelo Juízo da 12ª Vara Federal da Seção Judiciária de Pernambuco que homologou os cálculos elaborados pela Contadoria Judicial, reconheceu o excesso de execução e fixou honorários advocatícios tanto contra a exequente, sobre o excesso apurado, quanto contra a União, no percentual de 10% sobre o valor homologado, com fundamento na Súmula 345 do Superior Tribunal de Justiça e no Tema 973 dos recursos repetitivos.\r\n\r\n\r\n\r\n2. O Superior Tribunal de Justiça - STJ, ao apreciar o Tema 1190 dos recursos repetitivos, fixou a seguinte tese: \"Na ausência de impugnação à pretensão executória, não são devidos honorários advocatícios sucumbenciais em cumprimento de sentença contra a Fazenda Pública, ainda que o crédito esteja submetido a pagamento por meio de Requisição de Pequeno Valor - RPV\".\r\n\r\n\r\n\r\n3. Na sessão de 20/06/2018, a Corte Especial do STJ, no julgamento de Recurso Especial repetitivo 1.648.238/RS, firmou a tese de que \"o art. 85, § 7º, do CPC/2015 não afasta a aplicação do entendimento consolidado na Súmula 345 do STJ, de modo que são devidos honorários advocatícios nos procedimentos individuais de cumprimento de sentença decorrente de ação coletiva, ainda que não impugnados e promovidos em litisconsórcio\". (AgInt no AREsp 1181936/SP, Rel. Ministra ASSUSETE MAGALHÃES, SEGUNDA TURMA, julgado em 16/08/2018, DJe 27/08/2018).\r\n\r\n\r\n\r\n4. A Súmula 345 do STJ e o Tema 1190 possuem abordagens distintas quanto à condenação da Fazenda Pública ao pagamento de honorários advocatícios na fase de cumprimento de sentença. Enquanto esta tese afasta os honorários na ausência de impugnação, aquele enunciado mantém a obrigação em execuções individuais de ações coletivas.\r\n\r\n\r\n\r\n5. No caso, constata-se que o título executivo judicial é constituído nos autos de ação de rito ordinário (0004380-70.2010.4.05.8300) movida pelo Sindicato dos Trabalhadores Públicos Federais da Saúde e Previdência do Estado de Pernambuco – SIDSPREV/PE em desfavor da UNIÃO FEDERAL, visando obter o pagamento das diferenças do PCCS, relativas ao período de janeiro de 1991 a novembro de 1996, com juros e correção monetária. A hipótese, assim, não comporta a aplicação da tese fixada pelo STJ quando do julgamento o Tema 1.190, mostrando-se cabível a condenação da executada, ora agravada, ao pagamento de honorários advocatícios pelo cumprimento de sentença.\r\n\r\n\r\n\r\n6. A condenação em honorários advocatícios fixada nos embargos à execução ou na impugnação ao cumprimento de sentença não se confunde com a verba honorária arbitrada no cumprimento individual de sentença coletiva. Trata-se de fatos geradores distintos, com fundamentos jurídicos autônomos - enquanto os honorários fixados nos embargos remuneram a atuação do patrono diante da resistência processual da Fazenda Pública, os honorários decorrentes do cumprimento individual de sentença coletiva decorrem da necessidade de iniciativa executiva autônoma, que envolve a identificação do beneficiário, a liquidação do crédito e a promoção do cumprimento do título judicial de forma individualizada. Não há, portanto, dupla remuneração pelo mesmo ato processual, afastando-se a alegação de bis in idem.\r\n\r\n\r\n\r\n7. O Tema 1255 do Supremo Tribunal Federal não autorizou a aplicação automática do art. 85, § 8º, do CPC em todas as demandas envolvendo a Fazenda Pública, tampouco afastou os critérios objetivos previstos nos §§ 2º e 3º do referido artigo. No caso concreto, o proveito econômico é mensurável, o valor não é irrisório e a atuação advocatícia demandou efetivo trabalho técnico, inexistindo pressupostos legais que justifiquem o arbitramento por equidade.\r\n\r\n\r\n\r\n8. Agravo de instrumento improvido.", "relatorio": "Trata-se de agravo de instrumento, com pedido de antecipação da tutela, interposto pela UNIÃO FEDERAL contra decisão proferida pelo Juízo da 12ª Vara Federal da Seção Judiciária de Pernambuco que homologou os cálculos elaborados pela Contadoria Judicial, reconheceu o excesso de execução e fixou honorários advocatícios tanto contra a exequente, sobre o excesso apurado, quanto contra a União, no percentual de 10% sobre o valor homologado, com fundamento na Súmula 345 do Superior Tribunal de Justiça e no Tema 973 dos recursos repetitivos.\r\n\r\n\r\n\r\nNas razões recursais, sustente, em apertada síntese: a) a ocorrência de bis in idem, ante o fato de que já houve condenação em honorários nos embargos à execução; b) a inaplicabilidade da Súmula 345/STJ ao caso concreto, em virtude de se tratar de ação plúrima com beneficiários previamente identificados, o que afastaria a natureza de sentença coletiva genérica; c) a violação ao art. 85, § 7º, do Código de Processo Civil, requerendo, subsidiariamente, a fixação de honorários por equidade à luz do Tema 1255 do Supremo Tribunal Federal.\r\n\r\n\r\n\r\nIndeferido o pedido de atribuição de efeito suspensivo ao recuso.\r\n\r\n\r\n\r\nContrarrazões apresentadas.\r\n\r\n\r\n\r\nÉ o relatório.\r\n\r\n\r\n\r\nFIM RELATÓRIO", "voto": "O Superior Tribunal de Justiça - STJ, ao apreciar o Tema 1190 dos recursos repetitivos, fixou a seguinte tese: \"Na ausência de impugnação à pretensão executória, não são devidos honorários advocatícios sucumbenciais em cumprimento de sentença contra a Fazenda Pública, ainda que o crédito esteja submetido a pagamento por meio de Requisição de Pequeno Valor - RPV\".\r\n\r\n\r\n\r\nPor outro lado, na sessão de 20/06/2018, a Corte Especial do STJ, no julgamento de Recurso Especial repetitivo 1.648.238/RS, firmou a tese de que \"o art. 85, § 7º, do CPC/2015 não afasta a aplicação do entendimento consolidado na Súmula 345 do STJ, de modo que são devidos honorários advocatícios nos procedimentos individuais de cumprimento de sentença decorrente de ação coletiva, ainda que não impugnados e promovidos em litisconsórcio\". (AgInt no AREsp 1181936/SP, Rel. Ministra ASSUSETE MAGALHÃES, SEGUNDA TURMA, julgado em 16/08/2018, DJe 27/08/2018)\r\n\r\n\r\n\r\nA Súmula 345 do STJ e o Tema 1190 possuem abordagens distintas quanto à condenação da Fazenda Pública ao pagamento de honorários advocatícios na fase de cumprimento de sentença. Enquanto esta tese afasta os honorários na ausência de impugnação, aquele enunciado mantém a obrigação em execuções individuais de ações coletivas.\r\n\r\n\r\n\r\nNo caso, constata-se que o título executivo judicial é constituído nos autos de ação de rito ordinário (0004380-70.2010.4.05.8300) movida pelo Sindicato dos Trabalhadores Públicos Federais da Saúde e Previdência do Estado de Pernambuco – SIDSPREV/PE em desfavor da UNIÃO FEDERAL, visando obter o pagamento das diferenças do PCCS, relativas ao período de janeiro de 1991 a novembro de 1996, com juros e correção monetária.\r\n\r\n\r\n\r\nA hipótese, assim, não comporta a aplicação da tese fixada pelo STJ quando do julgamento o Tema 1.190, mostrando-se cabível a condenação da executada, ora agravada, ao pagamento de honorários advocatícios pelo cumprimento de sentença.\r\n\r\n\r\n\r\nA condenação em honorários advocatícios fixada nos embargos à execução ou na impugnação ao cumprimento de sentença não se confunde com a verba honorária arbitrada no cumprimento individual de sentença coletiva.\r\n\r\n\r\n\r\nTrata-se de fatos geradores distintos, com fundamentos jurídicos autônomos - enquanto os honorários fixados nos embargos remuneram a atuação do patrono diante da resistência processual da Fazenda Pública, os honorários decorrentes do cumprimento individual de sentença coletiva decorrem da necessidade de iniciativa executiva autônoma, que envolve a identificação do beneficiário, a liquidação do crédito e a promoção do cumprimento do título judicial de forma individualizada.\r\n\r\n\r\n\r\nNão há, portanto, dupla remuneração pelo mesmo ato processual, afastando-se a alegação de bis in idem.\r\n\r\n\r\n\r\nInviável, ainda, o pedido subsidiário de fixação dos honorários por equidade.\r\n\r\n\r\n\r\nO Tema 1255 do Supremo Tribunal Federal não autorizou a aplicação automática do art. 85, § 8º, do CPC em todas as demandas envolvendo a Fazenda Pública, tampouco afastou os critérios objetivos previstos nos §§ 2º e 3º do referido artigo. No caso concreto, o proveito econômico é mensurável, o valor não é irrisório e a atuação advocatícia demandou efetivo trabalho técnico, inexistindo pressupostos legais que justifiquem o arbitramento por equidade.\r\n\r\n\r\n\r\nPosto isso, NEGO PROVIMENTO ao agravo de instrumento.\r\n\r\n\r\n\r\nÉ como voto.\r\n\r\n\r\n\r\nFIM VOTO", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\nDecide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO ao agravo de instrumento, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido", "obs_assessor": "﻿\r\n\r\nPoder Judiciário\r\n\r\n Tribunal Regional Federal da 5ª Região\r\n\r\n Gabinete do Desembargador Federal Rogério Fialho Moreira", "tem_obs_assessor": true, "assunto": "", "ramo": "Outros", "subgrupo": "", "subclasse": ""}, {"nome": "20260316_114302_Re__PROCESSO.0800255-80.2025.4.05.8500.VIRTUAL.ED.09.04.2026", "nome_arq": "PROCESSO.0800255-80.2025.4.05.8500.VIRTUAL.ED.09.04.2026", "cnj": "0800255-80.2025.4.05.8500", "cab": "0800255-80.2025.4.05.8500", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "JOSE SILVEIRINHA DOS SANTOS", "adv_polo_ativo": "Não informado", "polo_passivo": "INSTITUTO NACIONAL DO SEGURO SOCIAL - INSS", "adv_polo_passivo": "Não informado", "ementa": "EMBARGOS DE DECLARAÇÃO. PREVIDENCIÁRIO E PROCESSUAL CIVIL. CUMPRIMENTO INDIVIDUAL DE SENTENÇA PROVENIENTE DE ACORDO HOMOLOGADO EM AÇÃO CIVIL PÚBLICA. ACP Nº 0004911-28.2011.4.03.6183/SP. REVISÃO DE BENEFÍCIO PELO TETO PREVIDENCIÁRIO. ALEGAÇÃO DE OMISSÃO. AUSÊNCIA DE INTIMAÇÃO DO INSS. AUSÊNCIA DE TRÂNSITO EM JULGADO. PRESCRIÇÃO EXECUTÓRIA. MATÉRIAS NÃO DECIDIDAS NO ACÓRDÃO EMBARGADO. EMBARGOS CONHECIDOS E PARCIALMENTE PROVIDOS, SEM EFEITOS MODIFICATIVOS LIMITADOS AO RECONHECIMENTO DA NECESSIDADE DE REGULAR INSTAURAÇÃO DO CONTRADITÓRIO NA ORIGEM.\r\n\r\n\r\n\r\n1. Embargos de declaração opostos pelo INSS contra acórdão que, acolhendo embargos anteriormente opostos pelo beneficiário, reconheceu a legitimidade ativa do exequente e deu provimento à apelação para determinar o prosseguimento do cumprimento individual de sentença coletiva.\r\n\r\n\r\n\r\n2. A embargante aponta três omissões: (i) ausência de intimação do INSS para impugnar o cumprimento de sentença, com violação ao art. 535 do CPC; (ii) impossibilidade de execução definitiva, ante a ausência de trânsito em julgado do capítulo da sentença da ACP relativo a benefícios com revisões anteriores, com recursos especial e extraordinário pendentes; (iii) prescrição da pretensão executória.\r\n\r\n\r\n\r\n3. Quanto à primeira alegação, assiste parcial razão ao embargante: o acórdão, ao dar provimento à apelação para determinar o prosseguimento da execução, não se pronunciou sobre a etapa processual subsequente, deixando sem definição expressa se os autos retornariam à origem para observância do rito previsto no art. 535 do CPC. A omissão, todavia, não tem caráter infringente, pois o provimento da apelação naturalmente implica o retorno dos autos à instância de origem, onde o rito legal deverá ser integralmente observado, inclusive com a intimação da Fazenda Pública. Integração necessária para explicitar esse comando.\r\n\r\n\r\n\r\n4. Quanto à segunda e à terceira alegações — ausência de trânsito em julgado e prescrição executória —, trata-se de matérias que não foram objeto de análise no acórdão embargado, o qual se limitou a reconhecer a legitimidade ativa do exequente a partir da Carta de Concessão. Constituem, portanto, questões novas, cuja apreciação na via estreita dos embargos de declaração configuraria supressão de instância e extrapolação da função integrativa do recurso. Tais teses devem ser deduzidas perante o juízo da execução, no momento processual adequado.\r\n\r\n\r\n\r\n5. Embargos conhecidos e parcialmente providos, sem efeitos modificativos, para integrar o acórdão com a explicitação de que o prosseguimento do cumprimento de sentença determinado implica o retorno dos autos à vara de origem, onde deverá ser observado o rito do art. 535 do CPC, com intimação do INSS para, querendo, apresentar impugnação no prazo legal.", "relatorio": "Trata-se de embargos de declaração opostos pelo INSTITUTO NACIONAL DO SEGURO SOCIAL – INSS contra o acórdão que dera provimento aos embargos de declaração do particular, reconhecendo que o acórdão anterior, que negara provimento à apelação, incorrera em omissão ao ignorar a Carta de Concessão do benefício do exequente (Id. 1703020), documento acostado à inicial do cumprimento de sentença, o qual demonstrava que a aposentadoria por tempo de contribuição fora concedida em 06/07/1998 — período compreendido entre 05/04/1991 e 31/12/2003, exatamente o lapso coberto pelo acordo homologado na Ação Civil Pública nº 0004911-28.2011.4.03.6183, perante a 1ª Vara Previdenciária Federal de São Paulo. Reconhecida a legitimidade ativa do exequente, o acórdão embargado deu provimento à apelação para determinar o prosseguimento do cumprimento individual de sentença.\r\n\r\n\r\n\r\nA sentença apelada havia extinguido o cumprimento de sentença sem resolução do mérito, com fundamento no art. 924, inciso I, do CPC, por entender inviável o prosseguimento tanto da obrigação de fazer quanto da obrigação de pagar. Contra o acórdão de 27/11/2025, o INSS opõe os presentes embargos de declaração, apontando a existência de omissões em três ordens de questões: a) ausência de intimação da autarquia no cumprimento de sentença para apresentação de impugnação, nos termos do art. 535 do CPC, o que tornaria prematuro qualquer juízo sobre o mérito do direito à execução definitiva; b) impossibilidade de execução definitiva, em razão de o capítulo da sentença da ACP que estendeu os efeitos do acordo a benefícios com revisões judiciais e administrativas anteriores ainda não ter transitado em julgado, havendo recursos especial e extraordinário interpostos pelo INSS pendentes de julgamento — circunstância que tornaria o título provisório e vedaria a expedição de requisitório de pagamento, nos termos do art. 100 da Constituição Federal; c) prescrição da pretensão executória, ao argumento de que, tendo a sentença homologatória do acordo sido proferida em 29/08/2011, o prazo quinquenal previsto no art. 103, parágrafo único, da Lei nº 8.213/1991, no art. 1º do Decreto nº 20.910/1932 e no art. 3º do Decreto-Lei nº 4.597/1942 teria se consumado em 29/08/2016, antes do ajuizamento do cumprimento individual de sentença.\r\n\r\n\r\n\r\nAo final, requer o INSS, com efeitos infringentes: (a) a anulação da sentença de origem para observância do rito do art. 535 do CPC; ou, alternativamente, (b) o reconhecimento da impossibilidade de execução definitiva; ou, ainda, (c) o reconhecimento da prescrição executória. Formula, ademais, pedido de prequestionamento dos dispositivos legais e constitucionais invocados.\r\n\r\n\r\n\r\nContrarrazões apresentadas.\r\n\r\n\r\n\r\nÉ o relatório.", "voto": "O presente cumprimento individual de sentença tem por título o acordo homologado na Ação Civil Pública nº 0004911-28.2011.4.03.6183, ajuizada perante a 1ª Vara Previdenciária Federal da Seção Judiciária de São Paulo. Por meio desse acordo, o INSS comprometeu-se a revisar a renda mensal dos benefícios concedidos entre 05/04/1991 e 31/12/2003, cujos salários-de-benefício tenham sido limitados ao teto previdenciário na data da concessão, de modo a adequá-los aos novos tetos fixados pelas Emendas Constitucionais nºs 20/1998 e 41/2003, em cumprimento ao entendimento firmado pelo Supremo Tribunal Federal no RE nº 564.354. Em âmbito administrativo, esse compromisso foi internalizado pelo INSS por meio da Resolução INSS/PRES nº 151/2011.\r\n\r\n\r\n\r\nO acórdão embargado — que julgou os embargos opostos pelo beneficiário contra decisão anterior desta Turma — centrou sua análise em ponto específico e delimitado: verificar se o exequente havia demonstrado sua legitimidade ativa para o cumprimento individual, ou seja, se seu benefício fora concedido dentro do período coberto pelo título executivo. A conclusão foi afirmativa, com base na Carta de Concessão acostada à inicial, que registra a data de concessão da aposentadoria como 06/07/1998.\r\n\r\n\r\n\r\nO acórdão não avançou sobre outras questões — como a extensão do acordo a benefícios com revisões anteriores, a existência de recursos pendentes na ACP ou a eventual prescrição da pretensão executória —, por não serem essas as matérias que lhe haviam sido submetidas na apelação.\r\n\r\n\r\n\r\nO acórdão embargado determinou o prosseguimento do cumprimento de sentença, dando provimento à apelação que impugnava a extinção prematura do feito. Ao fazê-lo, não explicitou, em seu dispositivo, que o retorno dos autos à vara de origem deveria observar o rito legal, com a prévia intimação da Fazenda Pública para apresentar eventual impugnação.\r\n\r\n\r\n\r\nNesse ponto, identifico omissão integrável. O provimento da apelação contra sentença que extinguiu o cumprimento de sentença sem resolução do mérito implica, necessária e automaticamente, o retorno dos autos à instância de origem para o regular prosseguimento do feito, o que abrange, por imperativo legal, a observância das etapas procedimentais próprias do cumprimento de sentença em face da Fazenda Pública, incluída a intimação prevista no art. 535 do CPC. Esse comando, contudo, decorria da própria lógica do provimento recursal e não alteraria, por si só, o resultado do julgamento.\r\n\r\n\r\n\r\nA omissão é, portanto, de natureza declaratória — não infringente —, cabendo integrá-la para explicitar o que já estava implícito na determinação de prosseguimento. O argumento do embargado, aliás, confirma esse entendimento ao reconhecer expressamente que, com a reforma da sentença, os autos retornarão à origem, onde o INSS terá oportunidade de apresentar impugnação.\r\n\r\n\r\n\r\nNessa extensão, os embargos são providos, sem que se altere o resultado do julgamento.\r\n\r\n\r\n\r\nO INSS sustenta que o acórdão embargado teria se omitido ao não examinar se o capítulo da sentença da ACP que fundamenta a presente execução transitou em julgado. Argumenta que pende, naquela ação coletiva, recurso especial e recurso extraordinário de sua autoria, nos quais impugna especificamente o trecho da sentença que estendeu os efeitos do acordo a benefícios que tenham sofrido revisões judiciais ou administrativas anteriores.\r\n\r\n\r\n\r\nA questão, porém, não foi submetida à apreciação desta Turma na apelação que deu origem ao acórdão embargado. O objeto recursal, naquela sede, restringia-se à legitimidade ativa do exequente — matéria suficiente para determinar o prosseguimento ou não do cumprimento de sentença na fase em que se encontrava. A questão relativa ao trânsito em julgado do título executivo e à natureza definitiva ou provisória da execução constitui matéria a ser arguida pelo INSS, como fundamento de impugnação, no momento processual que ora se lhe franqueia com o retorno dos autos à vara de origem.\r\n\r\n\r\n\r\nNão se trata, aqui, de omissão do acórdão embargado sobre ponto que lhe havia sido submetido. O acórdão não era chamado a decidir sobre trânsito em julgado da ACP de origem, e não o fez — o que não configura vício integrável por embargos de declaração, mas sim ausência de objeto recursal sobre a matéria. Acolher os embargos nesse ponto para que esta Turma se pronuncie, pela primeira vez, sobre a natureza provisória ou definitiva do título, a partir de documentos da ACP de origem não integrantes dos presentes autos, constituiria supressão de instância e extrapolação manifesta da função integrativa do recurso.\r\n\r\n\r\n\r\nNessa parte, os embargos são rejeitados.\r\n\r\n\r\n\r\nDe igual modo, a prescrição da pretensão executória não integrou o objeto da apelação nem foi examinada pelo acórdão embargado. Trata-se de matéria que o INSS não deduziu oportunamente no recurso então interposto pelo exequente — o qual tinha por objeto exclusivo a legitimidade ativa —, nem era de apreciação ex officio naquele contexto decisório.\r\n\r\n\r\n\r\nA arguição de prescrição, nas circunstâncias dos autos, constitui tese nova que se pretende introduzir no julgamento pela via dos embargos de declaração, o que é inadmissível. Os embargos de declaração destinam-se a integrar o julgado, suprindo omissões sobre pontos efetivamente submetidos ao órgão julgador — não a ampliar o objeto do julgamento com matérias que não foram ventiladas no recurso de origem.\r\n\r\n\r\n\r\nA tese poderá ser deduzida pelo INSS em sua impugnação ao cumprimento de sentença, perante o juízo de origem, na oportunidade que lhe será conferida com o retorno dos autos.\r\n\r\n\r\n\r\nNessa parte, os embargos também são rejeitados.\r\n\r\n\r\n\r\nQuanto ao pedido de prequestionamento formulado pelo INSS, registro que as matérias ventiladas — arts. 535, 502, 503, 520 e 783 do CPC; art. 103, parágrafo único, da Lei nº 8.213/1991; art. 1º do Decreto nº 20.910/1932; art. 3º do Decreto-Lei nº 4.597/1942; e art. 100 da Constituição Federal — não foram decididas pelo acórdão embargado, por não comporem o objeto do recurso então julgado. A simples menção de dispositivos legais, desacompanhada de vício integrável do julgado, não autoriza que esta Turma, em sede de embargos de declaração, pronuncie-se originariamente sobre questões alheias ao objeto do julgamento. O prequestionamento ficto, na forma do art. 1.025 do CPC, tem por pressuposto que a matéria tenha sido submetida ao tribunal, ainda que sem apreciação expressa — o que não é o caso das questões aqui invocadas.\r\n\r\n\r\n\r\nIdentifico omissão parcialmente procedente apenas quanto à necessidade de explicitação de que o prosseguimento do cumprimento de sentença, determinado pelo acórdão embargado, implica o retorno dos autos à vara de origem para regular instauração do procedimento previsto no art. 535 do CPC. As demais alegações não configuram omissões do acórdão embargado, mas matérias novas a serem deduzidas no momento processual adequado, perante o juízo de origem.\r\n\r\n\r\n\r\nAnte o exposto, CONHEÇO DOS EMBARGOS DE DECLARAÇÃO E DOU-LHES PARCIAL PROVIMENTO, sem efeitos infringentes, para integrar o acórdão embargado com a explicitação de que o prosseguimento do cumprimento individual de sentença determinado implica o retorno dos autos à vara de origem, onde deverá ser observado o rito do art. 535 do Código de Processo Civil, com a prévia intimação do INSS para, querendo, apresentar impugnação no prazo legal, oportunidade em que poderá deduzir toda e qualquer matéria de defesa pertinente.\r\n\r\n\r\n\r\nÉ como voto.\r\n\r\n\r\n\r\nRecife, 22 de março de 2018.", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\nDecide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, CONHECER E DAR PARCIAL PROVIMENTO aos embargos de declaração, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Provido", "css": "provido", "obs_assessor": "﻿\r\n\r\nPoder Judiciário\r\n\r\n Tribunal Regional Federal da 5ª Região\r\n\r\n Gabinete do Desembargador Federal Rogério Fialho Moreira", "tem_obs_assessor": true, "assunto": "", "ramo": "Previdenciário", "subgrupo": "Apelação/Remessa Necessária", "subclasse": "Embargos de Declaração"}, {"nome": "20260317_035218_Re__VOTO.0000820-32.2026.4.05.0000.VIRTUAL.09.04.2026", "nome_arq": "VOTO.0000820-32.2026.4.05.0000.VIRTUAL.09.04.2026", "cnj": "0000820-32.2026.4.05.0000", "cab": "0000820-32.2026.4.05.0000", "assessor": "Débora Cesário Regis Fazio", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "WELLINGTON HORACIO DOS SANTOS", "adv_polo_ativo": "Não informado", "polo_passivo": "CAIXA ECONOMICA FEDERAL - CEF", "adv_polo_passivo": "Não informado", "ementa": "PROCESSUAL CIVIL. AGRAVO DE INSTRUMENTO. FINANCIAMENTO HABITACIONAL. EXECUÇÃO EXTRAJUDICIAL. CONSOLIDAÇÃO DA PROPRIEDADE. SUSPENSÃO DO LEILÃO. PROVIMENTO DE URGÊNCIA INDEFERIDO. REQUISITOS NÃO CONFIGURADOS.  AGRAVO IMPROVIDO.\r\n\r\n\r\n\r\n 1. Agravo de instrumento interposto por Wellington Horacio dos Santos contra decisão que indeferiu liminar objetivando a suspensão imediata do leilão de imóvel objeto de financiamento habitacional, garantido por alienação fiduciária, ou de seus efeitos (caso já realizado), impedindo a lavratura de auto de arrematação ou o registro da venda em favor de terceiros.\r\n\r\n\r\n\r\n 2. Não configurados os requisitos para o deferimento do pedido de antecipação da tutela.\r\n\r\n\r\n\r\n 3. Apesar da interposição do recurso ser posterior às datas referidas como de realização dos leilões, a parte agravante não apresenta qualquer elemento relacionado à perfectibilização da suposta arrematação.\r\n\r\n\r\n\r\n 4. Na narrativa da petição inicial, afirma-se que o imóvel teria sido \"supostamente arrematado pelo valor de R$ 54.000,00 (cinquenta e quatro mil reais), montante que representaria menos de 50% do valor da dívida e da avaliação, configurando, em tese, arrematação por preço vil\". Em momento posterior, menciona-se que \"foi sugerido ao autor que tentasse recomprar o imóvel, participando da licitação aberta em andamento, marcada para o dia 19/01/2026, nas mesmas condições dos demais participantes\". Diante desse contexto, impõe-se maior aprofundamento fático, a fim de verificar se efetivamente houve apresentação de propostas, se estas observaram o valor mínimo estabelecido, se foi oportunizada a oferta de lances e o exercício do direito de preferência, em igualdade de condições com terceiros interessados, bem como se houve a assinatura do auto de arrematação ou a expedição da respectiva carta. Igualmente, mostra-se relevante apurar se o agravante participou da licitação realizada em 19/01/2026.\r\n\r\n\r\n\r\n 5. Até para o reconhecimento da nulidade sobre eventual arrematação fazem-se necessários elementos mínimos quanto à efetiva ocorrência desta, posto que se insere no âmbito de conhecimento da parte agravante, não sendo possível o acolhimento da pretensão pela simples alegação genérica de nulidade, sobretudo quando os elementos acostados apontam para a regular consolidação do bem pela Caixa Econômica e pela ausência de irregularidade no procedimento alienatório.\r\n\r\n\r\n\r\n 6. Agravo de instrumento improvido.", "relatorio": "Trata-se de agravo de instrumento interposto por Wellington Horacio dos Santos contra decisão que indeferiu liminar objetivando a suspensão imediata do leilão de imóvel objeto de financiamento habitacional ou de seus efeitos (caso já realizado), impedindo a lavratura de auto de arrematação ou o registro da venda em favor de terceiros.\r\n\r\n\r\n\r\n Nas razões recursais, traz os seguintes argumentos:\r\n\r\n\r\n\r\n (a) celebrou contrato de financiamento habitacional no âmbito do Programa Minha Casa, Minha Vida, garantido por alienação fiduciária de bem imóvel, regido pela Lei nº 9.514/97;\r\n\r\n\r\n\r\n b) diante de dificuldades financeiras supervenientes, entrou em inadimplência a partir de 2022;\r\n\r\n\r\n\r\n c) em razão da inadimplência, a CEF promoveu a consolidação da propriedade em seu nome e a subsequente designação de leilão extrajudicial do imóvel, sem que lhe tenha havido a devida notificação para purgação da mora e/ou exercício do direito de preferência;\r\n\r\n\r\n\r\n d) a notificação pessoal para a purgação da mora é um pressuposto de validade e regularidade de todo o procedimento de execução extrajudicial. Sem a prova inequívoca de sua realização, todos os atos subsequentes, incluindo a consolidação da propriedade e o leilão, são nulos de pleno direito;\r\n\r\n\r\n\r\n e) a aplicação dos princípios da função social da propriedade e do direito à moradia.\r\n\r\n\r\n\r\n Em decisão fundamentada proferida nos autos, foi indeferido o pedido de antecipação da tutela recursal.\r\n\r\n\r\n\r\n Contrarrazões apresentadas.\r\n\r\n\r\n\r\n É o relatório.", "voto": "O pedido de antecipação da tutela recursal foi indeferido por esta relatoria, nos seguintes termos:\r\n\r\n\r\n\r\n \"(...)\r\n\r\n\r\n\r\n Nos termos do art. 1.019, inciso I, do Código de Processo Civil, poderá o relator atribuir efeito suspensivo ao agravo de instrumento ou deferir, total ou parcialmente, em antecipação de tutela, a pretensão recursal, comunicando sua decisão ao juízo de origem.\r\n\r\n\r\n\r\n No caso dos autos, entendo, em sede de cognição sumária, própria das decisões liminares, que não se encontram presentes os requisitos necessários ao deferimento do pedido liminar.\r\n\r\n\r\n\r\n Da análise da peça recursal, depreende-se que o pedido antecipatório principal consiste, entre outros pontos, na suspensão dos leilões. Ocorre que, conforme narrado pelo próprio recorrente, a interposição do recurso ocorreu após a realização dos leilões.\r\n\r\n\r\n\r\n Não obstante, a parte agravante não apresenta quaisquer elementos que demonstrem a efetiva perfectibilização da suposta arrematação.\r\n\r\n\r\n\r\n Com efeito, na narrativa da petição inicial, afirma-se que o imóvel teria sido \"supostamente arrematado pelo valor de R$ 54.000,00 (cinquenta e quatro mil reais), montante que representaria menos de 50% do valor da dívida e da avaliação, configurando, em tese, arrematação por preço vil\".\r\n\r\n\r\n\r\n Em momento posterior, menciona-se que \"foi sugerido ao autor que tentasse recomprar o imóvel, participando da licitação aberta em andamento, marcada para o dia 19/01/2026, nas mesmas condições dos demais participantes\".\r\n\r\n\r\n\r\n Diante desse contexto, impõe-se maior aprofundamento fático, a fim de verificar se efetivamente houve apresentação de propostas, se estas observaram o valor mínimo estabelecido, se foi oportunizada a oferta de lances e o exercício do direito de preferência, em igualdade de condições com terceiros interessados, bem como se houve a assinatura do auto de arrematação ou a expedição da respectiva carta. Igualmente, mostra-se relevante apurar se o agravante participou da licitação realizada em 19/01/2026.\r\n\r\n\r\n\r\n Ademais, mesmo para o reconhecimento de eventual nulidade da arrematação, fazem-se necessários elementos mínimos que comprovem sua efetiva ocorrência, sobretudo por se tratar de fato inserido na esfera de conhecimento do próprio agravante.\r\n\r\n\r\n\r\n Não é possível, portanto, o acolhimento da pretensão com base em alegações genéricas de nulidade, especialmente quando os elementos acostados aos autos indicam a regular consolidação do bem pela Caixa Econômica Federal e a inexistência de irregularidades no procedimento de alienação\r\n\r\n\r\n\r\n Ante o exposto, INDEFIRO o pedido de antecipação da tutela.\r\n\r\n\r\n\r\n (...)\".\r\n\r\n\r\n\r\n Da análise dos autos, verifico que não houve qualquer modificação na situação fática e jurídica capaz de alterar o entendimento sustentado na decisão reportada, pelo que o mantenho em todos os seus termos, adotando como razão de decidir os fundamentos acima transcritos.\r\n\r\n\r\n\r\n Com essas considerações, nego provimento ao agravo de instrumento.\r\n\r\n\r\n\r\n É como voto.", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\nDecide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO ao agravo de instrumento, nos termos do voto do relator e na forma do relatório constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido", "obs_assessor": "﻿", "tem_obs_assessor": false, "assunto": "", "ramo": "Outros", "subgrupo": "", "subclasse": ""}, {"nome": "20260317_035229_Re__VOTO.0002577-61.2026.4.05.0000.VIRTUAL.09.04.2026", "nome_arq": "VOTO.0002577-61.2026.4.05.0000.VIRTUAL.09.04.2026", "cnj": "0002577-61.2026.4.05.0000", "cab": "0002577-61.2026.4.05.0000", "assessor": "Débora Cesário Regis Fazio", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "JENNEFFER EMANUELE JOSE DA SILVA", "adv_polo_ativo": "Não informado", "polo_passivo": "CAIXA ECONOMICA FEDERAL - CEF", "adv_polo_passivo": "Não informado", "ementa": "PROCESSUAL CIVIL. AGRAVO DE INSTRUMENTO. FINANCIAMENTO HABITACIONAL. EXECUÇÃO EXTRAJUDICIAL. CONSOLIDAÇÃO DA PROPRIEDADE. SUSPENSÃO DO LEILÃO. PROVIMENTO DE URGÊNCIA INDEFERIDO. REQUISITOS NÃO CONFIGURADOS.  AGRAVO IMPROVIDO.\r\n\r\n\r\n\r\n 1. Agravo de instrumento interposto por Jenneffer Emanuele Jose da Silva contra decisão que indeferiu a liminar objetivando a imediata suspensão do(a) ato(s) de consolidação da propriedade e/ou a realização do(s) leilão(ões) extrajudicial(is) do imóvel, bem como qualquer ato de expropriação ou imissão na posse em favor do(a) Réu/Credor Fiduciário, até o julgamento final da ação.\r\n\r\n\r\n\r\n 2. Não configurados os requisitos para o deferimento do pedido de antecipação da tutela.\r\n\r\n\r\n\r\n 3. Embora a autora/agravante alegue ausência de notificação para purgar a mora e quanto à realização dos leilões subsequentes à consolidação da propriedade, não há indicação das datas dos leilões, tampouco esclarecimento acerca de sua efetiva ocorrência. A documentação acostada limita-se à certidão de inteiro teor do imóvel, a qual comprova a constituição da propriedade fiduciária em 09/2013 e a consolidação da propriedade em favor da Caixa Econômica Federal em 03/2025, mas não fornece qualquer dado sobre o termo inicial da inadimplência, o montante do débito à época da consolidação ou a evolução da dívida. Tal omissão compromete a aferição da plausibilidade jurídica da tese autoral, especialmente porque a pretensão envolve a desconstituição de atos praticados no âmbito da alienação fiduciária de bem imóvel, procedimento regulado pela Lei nº 9.514/1997, que estabelece rito próprio para constituição em mora, consolidação da propriedade e realização de leilões.\r\n\r\n\r\n\r\n 4. Apesar de afirmar pretender purgar a mora mediante depósito das parcelas em atraso, a autora/recorrente não trouxe aos autos qualquer elemento que demonstre capacidade financeira atual para tanto, cabendo ponderar que a interrupção do pagamento das prestações sugere incapacidade econômica superveniente, não havendo demonstração concreta de alteração desse quadro.\r\n\r\n\r\n\r\n 5. Ainda que se admita a incidência do Código de Defesa do Consumidor à relação contratual e a eventual inversão do ônus da prova, tal circunstância não exonera a parte autora do dever de instruir a inicial com os documentos indispensáveis à propositura da demanda, nos termos do art. 320 do CPC. A inversão do ônus probatório opera no plano da instrução, não afastando o ônus mínimo de demonstrar a plausibilidade do direito invocado para fins de tutela de urgência.\r\n\r\n\r\n\r\n 6. Somente após a instauração do contraditório, oportunizando-se à Caixa Econômica Federal demonstrar a regularidade das notificações e dos atos subsequentes, poderá haver juízo mais seguro acerca da validade do procedimento e da existência de eventual nulidade a ser reconhecida.\r\n\r\n\r\n\r\n 7. Agravo de instrumento improvido.", "relatorio": "Trata-se de agravo de instrumento interposto por Jenneffer Emanuele Jose da Silva contra decisão que indeferiu a liminar objetivando a imediata suspensão do(a) ato(s) de consolidação da propriedade e/ou a realização do(s) leilão(ões) extrajudicial(is) do imóvel, bem como qualquer ato de expropriação ou imissão na posse em favor do(a) Réu/Credor Fiduciário, até o julgamento final da ação.\r\n\r\n\r\n\r\n Nas razões recursais, traz os seguintes argumentos:\r\n\r\n\r\n\r\n a) a aplicação ao caso do CDC;\r\n\r\n\r\n\r\n b) a inversão do ônus probatório, com a consequente determinação, pelo juízo a quo, da juntada do contrato de financiamento, da comprovação da notificação para purgação da mora e da notificação dos leilões pela Caixa Econômica Federal;\r\n\r\n\r\n\r\n c) nunca foi pessoalmente notificada, sempre residiu no imóvel e possuía endereço certo e conhecido;\r\n\r\n\r\n\r\n d) não há qualquer comprovação, nos autos, de envio de notificação com AR, comunicação formal da data dos leilões e/ou da ciência da Agravante quanto aos atos expropriatórios;\r\n\r\n\r\n\r\n e) caso o leilão se concretize, haverá perda do único imóvel e a ação principal se tornará inócua.\r\n\r\n\r\n\r\n Em decisão fundamentada proferida nos autos, foi indeferido o pedido de antecipação da tutela recursal.\r\n\r\n\r\n\r\n Contrarrazões apresentadas.\r\n\r\n\r\n\r\n É o relatório.", "voto": "O pedido de antecipação da tutela recursal foi indeferido por esta relatoria, nos seguintes termos:\r\n\r\n\r\n\r\n \"(...)\r\n\r\n\r\n\r\n Nos termos do art. 1.019, inciso I, do CPC, poderá o relator atribuir efeito suspensivo ao agravo de instrumento ou deferir, em antecipação de tutela, total ou parcialmente a pretensão recursal, comunicando ao juiz sua decisão.\r\n\r\n\r\n\r\n No caso dos autos, entendo, em sede de cognição sumária, própria das decisões liminares, que não estão presentes os requisitos para o deferimento do pedido antecipatório.\r\n\r\n\r\n\r\n Explico.\r\n\r\n\r\n\r\n O Juízo a quo indeferiu a tutela cautelar sob o fundamento central de ausência de elementos mínimos de verossimilhança aptos a amparar a concessão de medida liminar, especialmente na modalidade inaudita altera parte.\r\n\r\n\r\n\r\n A decisão ressalta, inicialmente, a lacuna fática e probatória da petição inicial.\r\n\r\n\r\n\r\n Embora a autora alegue ausência de notificação para purgar a mora e quanto à realização dos leilões subsequentes à consolidação da propriedade, não há indicação das datas dos leilões, tampouco esclarecimento acerca de sua efetiva ocorrência.\r\n\r\n\r\n\r\n A documentação acostada limita-se à certidão de inteiro teor do imóvel, a qual comprova a constituição da propriedade fiduciária em 09/2013 e a consolidação da propriedade em favor da Caixa Econômica Federal em 03/2025, mas não fornece qualquer dado sobre o termo inicial da inadimplência, o montante do débito à época da consolidação ou a evolução da dívida.\r\n\r\n\r\n\r\n Tal omissão compromete a aferição da plausibilidade jurídica da tese autoral, especialmente porque a pretensão envolve a desconstituição de atos praticados no âmbito da alienação fiduciária de bem imóvel, procedimento regulado pela Lei nº 9.514/1997, que estabelece rito próprio para constituição em mora, consolidação da propriedade e realização de leilões.\r\n\r\n\r\n\r\n Ademais, embora a autora afirme pretender purgar a mora mediante depósito das parcelas em atraso, não trouxe aos autos qualquer elemento que demonstre capacidade financeira atual para tanto.\r\n\r\n\r\n\r\n O Juízo, com base em juízo de probabilidade, ponderou que a interrupção do pagamento das prestações sugere incapacidade econômica superveniente, não havendo demonstração concreta de alteração desse quadro.\r\n\r\n\r\n\r\n Ausente prova mínima da viabilidade do adimplemento, resta fragilizada a alegação de intenção séria e imediata de purgação da mora.\r\n\r\n\r\n\r\n Cumpre salientar que, ainda que se admita a incidência do Código de Defesa do Consumidor à relação contratual e a eventual inversão do ônus da prova, tal circunstância não exonera a parte autora do dever de instruir a inicial com os documentos indispensáveis à propositura da demanda, nos termos do art. 320 do CPC.\r\n\r\n\r\n\r\n A inversão do ônus probatório opera no plano da instrução, não afastando o ônus mínimo de demonstrar a plausibilidade do direito invocado para fins de tutela de urgência.\r\n\r\n\r\n\r\n É dizer, a aplicação do regime consumerista não autoriza a concessão automática de medida liminar com base em alegações genéricas, desacompanhadas de substrato fático específico e suporte documental mínimo.\r\n\r\n\r\n\r\n A ausência de documentos essenciais -- como notificações, comprovantes de pagamento, planilha de débito ou qualquer prova do alegado vício procedimental -- inviabiliza o reconhecimento, de plano, da probabilidade do direito.\r\n\r\n\r\n\r\n Nessa perspectiva, mostra-se juridicamente adequada a conclusão do Juízo no sentido de que, sem elementos concretos que evidenciem irregularidade no procedimento de consolidação e eventual leilão, não é possível deferir tutela cautelar sem a prévia oitiva da instituição financeira.\r\n\r\n\r\n\r\n Somente após a instauração do contraditório, oportunizando-se à Caixa Econômica Federal demonstrar a regularidade das notificações e dos atos subsequentes, poderá haver juízo mais seguro acerca da validade do procedimento e da existência de eventual nulidade a ser reconhecida.\r\n\r\n\r\n\r\n Ante o exposto, INDEFIRO a liminar.\r\n\r\n\r\n\r\n (...)\".\r\n\r\n\r\n\r\n Da análise dos autos, verifico que não houve qualquer modificação na situação fática e jurídica capaz de alterar o entendimento sustentado na decisão reportada, pelo que o mantenho em todos os seus termos, adotando como razão de decidir os fundamentos acima transcritos.\r\n\r\n\r\n\r\n Com essas considerações, nego provimento ao agravo de instrumento.\r\n\r\n\r\n\r\n É como voto.", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\nDecide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO ao agravo de instrumento, nos termos do voto do relator e na forma do relatório constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido", "obs_assessor": "﻿", "tem_obs_assessor": false, "assunto": "", "ramo": "Outros", "subgrupo": "", "subclasse": ""}, {"nome": "20260317_035752_Re__VOTO.0000304-12.2026.4.05.0000.VIRTUAL.09.04.2026", "nome_arq": "VOTO.0000304-12.2026.4.05.0000.VIRTUAL.09.04.2026", "cnj": "0000304-12.2026.4.05.0000", "cab": "0000304-12.2026.4.05.0000", "assessor": "Gabriel Santos Aquino De Oliveira", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "VALDENIO LOPES DE MELO", "adv_polo_ativo": "ELIASI VIEIRA DA SILVA NETO - PE30286-D", "polo_passivo": "UNIAO FEDERAL", "adv_polo_passivo": "Não informado", "ementa": "ADMINISTRATIVO. AGRAVO DE INSTRUMENTO. PENSÃO POR MORTE. SERVIDOR PÚBLICO FALECIDO. DEPENDENTE. RECONHECIMENTO DE UNIÃO ESTÁVEL. CONDIÇÃO QUE REQUER INSTRUÇÃO PROBATÓRIA. AGRAVO IMPROVIDO.\r\n\r\n\r\n\r\n 1. Agravo de Instrumento, com pedido de antecipação da tutela, interposto por VALDENIO LOPES DE MELO contra decisão proferida pelo Juízo da 12ª Vara Federal da Seção Judiciária de Pernambuco que indeferiu a liminar por ele formulada objetivando a imediata implementação do benefício de pensão por morte.\r\n\r\n\r\n\r\n 2. A decisão agravada pondera, de forma clara e fundamentada, que os elementos probatórios apresentados, embora relevantes, não conferem, neste momento processual, segurança suficiente para o deferimento da tutela antecipada, sobretudo diante da necessidade de distinguir a existência de união estável -- que exige animus de constituição de família -- de outras formas de relacionamento afetivo juridicamente irrelevantes para fins previdenciários.\r\n\r\n\r\n\r\n 3. As escrituras públicas declaratórias e os atos notariais produzidos após o óbito, embora dotados de fé pública quanto à forma, não possuem, por si sós, força probatória absoluta quanto à realidade fática pretérita, sobretudo quando inexistente a participação do falecido e ausente contraditório. Por outro lado, fotografias, mensagens e documentos, de convivência, ainda que indicativos de relacionamento afetivo, não são suficientes, isolada ou conjuntamente, para demonstrar, de plano, o animus familiae.\r\n\r\n\r\n\r\n 4. Revela-se razoável a conclusão do magistrado de primeiro grau no sentido de que a controvérsia demanda instrução probatória mais aprofundada.\r\n\r\n\r\n\r\n 5. Ainda que sejam levadas em consideração a avaliação das partes quanto as provas carreadas/produzidas nos autos, é o juiz o seu destinatário final, não havendo mácula no julgamento quando, após o exame da controvérsia, valora os documentos juntados e as alegações apresentadas pelas partes segundo o seu convencimento, desde que fundamente a sua conclusão. No caso dos autos, não se verifica qualquer deficiência de fundamentação ou desvio na atividade de apreciação da prova. O juízo a quo examinou os elementos apresentados, explicitou as razões pelas quais os considerou insuficientes para a tutela antecipada e indicou, de forma coerente, a necessidade de aprofundamento da instrução.\r\n\r\n\r\n\r\n 6. Agravo de Instrumento improvido.", "relatorio": "Trata-se de Agravo de Instrumento, com pedido de antecipação da tutela, interposto por VALDENIO LOPES DE MELO contra decisão proferida pelo Juízo da 12ª Vara Federal da Seção Judiciária de Pernambuco que indeferiu a liminar por ele formulada objetivando a imediata implementação do benefício de pensão por morte.\r\n\r\n\r\n\r\n Nas razões recursais, traz os seguintes argumentos:\r\n\r\n\r\n\r\n a) trata-se, na origem, de ação visando o reconhecimento judicial de união estável entre o autor e servidor público federal falecido (Otávio Calixto do Nascimento Neto;\r\n\r\n\r\n\r\n b) há convivência pública, contínua e duradoura desde janeiro de 2021 até o óbito (22/02/2023);\r\n\r\n\r\n\r\n c) o acerva probatório acostado aos autos - escritura pública de declaração de união estável (lavrada após o óbito), escrituras notariais de inventário e adjudicação, com reconhecimento do agravante como herdeiro, por anuência dos irmãos do falecido, declarações testemunhais extrajudiciais, fotografias, mensagens, fatura telefônica, extrato bancário, etc - é suficiente para o reconhecimento da plausibilidade jurídica;\r\n\r\n\r\n\r\n d) o indeferimento administrativo não pode servir como reforço negativo;\r\n\r\n\r\n\r\n e) a decisão, além de contraditória, se mostra formalista e excessivamente cautelosa.\r\n\r\n\r\n\r\n Pedido de antecipação da tutela recursal indeferido.\r\n\r\n\r\n\r\n Contrarrazões apresentadas.\r\n\r\n\r\n\r\n É o relatório.", "voto": "Por ocasião do pedido de antecipação da tutela recursal, o indeferi, nos seguintes termos:\r\n\r\n\r\n\r\n “(...)\r\n\r\n\r\n\r\n Nos termos do art. 1.019, inciso I, do CPC, poderá o relator atribuir efeito suspensivo ao agravo de instrumento ou deferir, em antecipação de tutela, total ou parcialmente a pretensão recursal, comunicando ao juiz sua decisão.\r\n\r\n\r\n\r\n No caso dos autos, entendo, em sede de cognição sumária, própria das decisões liminares, que não estão presentes os requisitos para o deferimento do pedido liminar.\r\n\r\n\r\n\r\n A decisão agravada pondera, de forma clara e fundamentada, que os elementos probatórios apresentados, embora relevantes, não conferem, neste momento processual, segurança suficiente para o deferimento da tutela antecipada, sobretudo diante da necessidade de distinguir a existência de união estável -- que exige animus de constituição de família -- de outras formas de relacionamento afetivo juridicamente irrelevantes para fins previdenciários.\r\n\r\n\r\n\r\n Tal conclusão não revela formalismo excessivo, tampouco negativa genérica de vigência ao direito invocado, mas decorre de aplicação criteriosa da jurisprudência consolidada e da própria lógica da tutela provisória, que não se presta a antecipar efeitos definitivos em cenários de incerteza relevante quanto ao fato constitutivo do direito.\r\n\r\n\r\n\r\n As escrituras públicas declaratórias e os atos notariais produzidos após o óbito, embora dotados de fé pública quanto à forma, não possuem, por si sós, força probatória absoluta quanto à realidade fática pretérita, sobretudo quando inexistente a participação do falecido e ausente contraditório.\r\n\r\n\r\n\r\n Por outro lado, fotografias, mensagens e documentos, de convivência, ainda que indicativos de relacionamento afetivo, não são suficientes, isolada ou conjuntamente, para demonstrar, de plano, o animus familiae.\r\n\r\n\r\n\r\n Nesse contexto, revela-se razoável a conclusão do magistrado de primeiro grau no sentido de que a controvérsia demanda instrução probatória mais aprofundada.\r\n\r\n\r\n\r\n Ainda que sejam levadas em consideração a avaliação das partes quanto as provas carreadas/produzidas nos autos, é o juiz o seu destinatário final, não havendo mácula no julgamento quando, após o exame da controvérsia, valora os documentos juntados e as alegações apresentadas pelas partes segundo o seu convencimento, desde que fundamente a sua conclusão.\r\n\r\n\r\n\r\n É o Estado, na pessoa do juiz, o seu destinatário direto. Às partes e aos interessados será destinada deforma indireta, como fruto da necessidade de legitimação do pronunciamento jurisdicional.\r\n\r\n\r\n\r\n Em outras palavras, \"produzidas provas suficientes ao convencimento do juiz, mesmo que ele decida contra os interesses do destinatário indireto, haverá (ou, pelo menos, poderá haver) conformação, no sentido de que compreenderá que a decisão alcançou o resultado respectivo mediante efetivo conhecimento, pelo juiz, das circunstâncias relacionadas aos fatos apresentados\" (Mouzalas, 2017).\r\n\r\n\r\n\r\n No caso dos autos, não se verifica qualquer deficiência de fundamentação ou desvio na atividade de apreciação da prova.\r\n\r\n\r\n\r\n O juízo a quo examinou os elementos apresentados, explicitou as razões pelas quais os considerou insuficientes para a tutela antecipada e indicou, de forma coerente, a necessidade de aprofundamento da instrução.\r\n\r\n\r\n\r\n Ante o exposto, INDEFIRO a liminar.\r\n\r\n\r\n\r\n  (...)”\r\n\r\n\r\n\r\n Tendo como razão de decidir os
