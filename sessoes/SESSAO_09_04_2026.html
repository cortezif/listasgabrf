      <span class="barra-sep-btns"></span>
      <button class="${PENDENTES.length ? 'btn-pend' : 'btn-pend zero'}"
              onclick="${PENDENTES.length ? 'abrirPendentes()' : ''}">
        ${PENDENTES.length ? '⚠ Pendentes (' + PENDENTES.length + ')' : '✓ Sem pendentes'}</button>
      <button class="${FORA_PAUTA.length ? 'btn-fora' : 'btn-fora zero'}"
              onclick="${FORA_PAUTA.length ? 'abrirFora()' : ''}">
        ${FORA_PAUTA.length ? '📂 Fora de lista (' + FORA_PAUTA.length + ')' : '📂 —'}</button>
    </div>
  </div>`;
}

function rerender() {
  if (IDX_ATIVO >= 0) abrirDecisao(IDX_ATIVO);
}

// ── Anotação por decisão para Obs. Lista ─────────────────────
function _obsListaParaDecisao(d) {
  if (!d || !d.cnj) return '';
  if (d.inclusao_manual && d._origem_fora)
    return 'Este processo não está em pauta/mesa, mas está sendo trazido a julgamento por motivo justificado';
  if (d.inclusao_manual)
    return 'Minuta incluída manualmente';
  if (_FORA_CONFIRMADOS.has(d.cnj))
    return 'Este processo não consta das relações de julgamento para esta data, mas está em pauta/mesa';
  var sit = _PEND_SITUACOES[d.cnj];
  if (sit === 'remanescente') return 'Este processo consta da relação de julgamento para esta data, mas ficará remanescente para a(s) próxima(s) sessão(ões)';
  if (sit === 'adiado')       return 'Este processo consta da relação de julgamento para esta data, mas o julgamento foi/está sendo adiado';
  if (sit === 'antecipado')   return 'Este processo consta da relação de julgamento para esta data, mas seu julgamento foi antecipado (já ocorreu)';
  return '';
}

// ── Apêndice para o HTML exportado ───────────────────────────
function _buildApendice() {
  var linhas = [];

  // Helper: get chamada number for a CNJ (0 if not in main list)
  function _chamada(cnj) {
    var filtrados = getFiltrados();
    var item = filtrados.find(function(x){ return x.d.cnj === cnj; });
    return item ? item.num : 0;
  }

  // Cat 1: Processo novo — Fora de Lista
  DECISOES.filter(function(d){ return d.inclusao_manual && d._origem_fora; })
    .forEach(function(d){ linhas.push({cnj:d.cnj, chamada:_chamada(d.cnj), ativo:d.polo_ativo,
      guia:'Fora de lista',
      obs:'Este processo não está em pauta/mesa, mas está sendo trazido a julgamento por motivo justificado'}); });

  // Cat 2: Minuta incluída manualmente — Pendentes
  DECISOES.filter(function(d){ return d.inclusao_manual && !d._origem_fora; })
    .forEach(function(d){ linhas.push({cnj:d.cnj, chamada:_chamada(d.cnj), ativo:d.polo_ativo,
      guia:'Pendentes',
      obs:'Minuta incluída manualmente'}); });

  // Cat 3: Não constava do PJE — confirmados do Fora de Lista
  FORA_PAUTA.forEach(function(p){
    if (_FORA_CONFIRMADOS.has(p.cnj))
      linhas.push({cnj:p.cnj, chamada:_chamada(p.cnj), ativo:p.ativo,
        guia:'Fora de lista',
        obs:'Este processo não consta das relações de julgamento para esta data, mas está em pauta/mesa'});
  });

  // Cat 4: Excluídos da lista — Fora de Lista
  FORA_PAUTA.forEach(function(p){
    if (_FORA_EXCLUIDOS.has(p.cnj))
      linhas.push({cnj:p.cnj, chamada:_chamada(p.cnj), ativo:p.ativo,
        guia:'Fora de lista',
        obs:'Este processo consta da relação de julgamento para esta data, mas não será julgado nesta sessão por motivo justificado'});
  });

  // Cat 5: Pendentes marcados com situação
  var _lbls = {
    'remanescente': 'Este processo consta da relação de julgamento para esta data, mas ficará remanescente para a(s) próxima(s) sessão(ões)',
    'adiado':       'Este processo consta da relação de julgamento para esta data, mas o julgamento foi/está sendo adiado',
    'antecipado':   'Este processo consta da relação de julgamento para esta data, mas seu julgamento foi antecipado (já ocorreu)',
    'retirado':     'Este processo consta da relação de julgamento para esta data, mas não será julgado nesta sessão por motivo justificado',
  };
  Object.keys(_PEND_SITUACOES).forEach(function(cnj){
    var sit = _PEND_SITUACOES[cnj];
    var p = PENDENTES.find(function(x){ return x.cnj===cnj; });
    linhas.push({cnj:cnj, chamada:_chamada(cnj), ativo:p?p.ativo:'',
      guia:'Pendentes', obs:_lbls[sit]||sit});
  });

  if (!linhas.length) return '';

  // ── Extract num (first 7 digits) and ano from CNJ ─────────────
  // Format: NNNNNNN-DD.AAAA.J.TT.OOOO
  function _cnj2key(cnj) {
    var m = (cnj||'').match(/^(\d{7})-\d{2}\.(\d{4})/);
    return m ? {num: parseInt(m[1]), ano: parseInt(m[2])} : {num: 9999999, ano: 9999};
  }

  // Default sort: num asc, then ano asc
  linhas.sort(function(a,b){
    var ka = _cnj2key(a.cnj), kb = _cnj2key(b.cnj);
    if (ka.num !== kb.num) return ka.num - kb.num;
    return ka.ano - kb.ano;
  });

  function _corObs(obs) {
    if (obs.includes('não está em pauta')) return '#1565c0';
    if (obs.includes('Minuta')) return '#6a1b9a';
    if (obs.includes('não consta')) return '#2e7d32';
    if (obs.includes('não será julgado')) return '#b71c1c';
    if (obs.includes('remanescente')) return '#2e7d32';
    if (obs.includes('adiado')) return '#ad1457';
    if (obs.includes('antecipado')) return '#6a1b9a';
    return '#333';
  }

  var uid = 'ap' + Date.now();
  var idInput = uid+'i', idSel = uid+'s', idTbl = uid+'t', idCount = uid+'c';
  var total = linhas.length;

  // Collect unique obs categories for the select
  var obsLabels = {
    'Este processo não está em pauta/mesa, mas está sendo trazido a julgamento por motivo justificado': 'Processo novo (fora de pauta)',
    'Minuta incluída manualmente': 'Minuta incluída manualmente',
    'Este processo não consta das relações de julgamento para esta data, mas está em pauta/mesa': 'Não constava do PJE',
    'Este processo consta da relação de julgamento para esta data, mas não será julgado nesta sessão por motivo justificado': 'Não será julgado',
    'Este processo consta da relação de julgamento para esta data, mas ficará remanescente para a(s) próxima(s) sessão(ões)': 'Ficará remanescente',
    'Este processo consta da relação de julgamento para esta data, mas o julgamento foi/está sendo adiado': 'Adiado',
    'Este processo consta da relação de julgamento para esta data, mas seu julgamento foi antecipado (já ocorreu)': 'Antecipado',
  };
  var obsPresentes = [];
  linhas.forEach(function(r){ if (obsPresentes.indexOf(r.obs)<0) obsPresentes.push(r.obs); });
  var selectOpts = '<option value="">Todas as situações</option>'
    + obsPresentes.map(function(o){
        return '<option value="'+esc(o)+'">'+(obsLabels[o]||esc(o))+'</option>';
      }).join('');

  var rowsHtml = linhas.map(function(r,i){
    var cor = _corObs(r.obs);
    var bgObs = cor === '#1565c0' ? '#e3f2fd' : cor === '#6a1b9a' ? '#f3e5f5' : cor === '#2e7d32' ? '#e8f5e9' : cor === '#b71c1c' ? '#fce4ec' : cor === '#ad1457' ? '#fce4ec' : '#f5f5f5';
    var badge = '<span style="font-weight:700;color:'+cor+';background:'+bgObs+';padding:1px 5px;border-radius:4px;white-space:normal;line-height:1.4;display:inline-block;">'+esc(r.obs)+'</span>';
    var guiaBadge = r.guia === 'Fora de lista'
      ? '<span style="background:#e3f2fd;color:#1565c0;padding:1px 5px;border-radius:6px;white-space:nowrap;font-weight:600;">Fora de lista</span>'
      : '<span style="background:#fff3e0;color:#e65100;padding:1px 5px;border-radius:6px;white-space:nowrap;font-weight:600;">Pendentes</span>';
    var chamadaStr = r.chamada ? String(r.chamada).padStart(3,'0') : '—';
    var cnjMatch = (r.cnj||'').match(/^(\d7)-\d2\.(\d4)/);
    var numKey = cnjMatch ? cnjMatch[1] : '9999999';
    var anoKey = cnjMatch ? cnjMatch[2] : '9999';
    return '<tr data-obs="'+esc(r.obs)+'" data-guia="'+esc(r.guia)+'" data-cnj="'+esc(r.cnj)+'" data-at="'+esc(r.ativo||'')+'"'
      + ' data-chamada="'+(r.chamada||9999)+'"'
      + ' data-num="'+numKey+'" data-ano="'+anoKey+'">'
      + '<td style="text-align:center;font-weight:700;">'+chamadaStr+'</td>'
      + '<td>'+guiaBadge+'</td>'
      + '<td>'+esc(r.cnj)+'</td>'
      + '<td>'+esc(r.ativo||'—')+'</td>'
      + '<td>'+badge+'</td>'
      + '</tr>';
  }).join('');

  var css = '#'+idTbl+'{font-family:Arial,sans-serif;font-size:8pt;border-collapse:collapse;width:100%}'
    + '#'+idTbl+' th{background:#1a237e;color:#fff;padding:3px 7px;text-align:left;font-size:7.5pt;font-weight:600;cursor:pointer;user-select:none;white-space:nowrap;}'
    + '#'+idTbl+' th:hover{background:#283593;}'
    + '#'+idTbl+' th .sort-arrow{margin-left:4px;opacity:.7;}'
    + '#'+idTbl+' td{padding:3px 7px;border-bottom:1px solid #e8eaf6;vertical-align:top;line-height:1.35}'
    + '#'+idTbl+' tr:nth-child(even) td{background:#f5f7ff}'
    + '#'+idTbl+' tr.hidden{display:none}';

  var script = '(function(){'
    + 'var tbl=document.getElementById('+JSON.stringify(idTbl)+');'
    + 'var cnt=document.getElementById('+JSON.stringify(idCount)+');'
    + 'var sortCol="num", sortAsc=true;'
    + 'function filt(){'
    + '  var q=document.getElementById('+JSON.stringify(idInput)+').value.toLowerCase();'
    + '  var s=document.getElementById('+JSON.stringify(idSel)+').value;'
    + '  var rows=tbl.querySelectorAll("tbody tr");'
    + '  var n=0;'
    + '  rows.forEach(function(r){'
    + '    var show=(!s||r.dataset.obs===s)&&(!q||(r.dataset.cnj+r.dataset.at).toLowerCase().includes(q));'
    + '    r.classList.toggle("hidden",!show);'
    + '    if(show)n++;'
    + '  });'
    + '  cnt.textContent=n+" de '+total+'";'
    + '}'
    + 'function sortBy(col){'
    + '  if(sortCol===col) sortAsc=!sortAsc; else { sortCol=col; sortAsc=true; }'
    + '  var tbody=tbl.querySelector("tbody");'
    + '  var rows=Array.from(tbody.querySelectorAll("tr"));'
    + '  rows.sort(function(a,b){'
    + '    var av=a.dataset[col]||"", bv=b.dataset[col]||"";'
    + '    if(col==="chamada"){ var an=parseInt(a.dataset.chamada)||9999,bn=parseInt(b.dataset.chamada)||9999; return sortAsc?an-bn:bn-an; }'
    + '    if(col==="num"){ var an=parseInt(a.dataset.num)||9999999,bn=parseInt(b.dataset.num)||9999999; if(an!==bn) return sortAsc?an-bn:bn-an; var ay=parseInt(a.dataset.ano)||9999,by_=parseInt(b.dataset.ano)||9999; return sortAsc?ay-by_:by_-ay; }'
    + '    return sortAsc?av.localeCompare(bv,undefined,{sensitivity:"base"}):bv.localeCompare(av,undefined,{sensitivity:"base"});'
    + '  });'
    + '  rows.forEach(function(r){ tbody.appendChild(r); });'
    + '  tbl.querySelectorAll("th").forEach(function(th){'
    + '    var arr=th.querySelector(".sort-arrow");'
    + '    if(arr) arr.textContent=th.dataset.col===col?(sortAsc?" ▲":" ▼"):" ▲";'
    + '    th.style.opacity=th.dataset.col===col?"1":"0.85";'
    + '  });'
    + '  filt();'
    + '}'
    + 'tbl.querySelectorAll("th[data-col]").forEach(function(th){'
    + '  th.addEventListener("click",function(){ sortBy(th.dataset.col); });'
    + '});'
    + 'document.getElementById('+JSON.stringify(idInput)+').addEventListener("input",filt);'
    + 'document.getElementById('+JSON.stringify(idSel)+').addEventListener("change",filt);'
    + 'sortBy("num");'  // initial sort: by process number then year
    + '})();';

  return '<div style="margin-top:28px;border-top:2px solid #1a237e;padding-top:12px;">'
    + '<style>'+css+'</style>'
    + '<h2 style="font-family:Arial,sans-serif;font-size:.9em;color:#1a237e;margin:0 0 8px 0;">Observações de Lista</h2>'
    + '<table id="'+idTbl+'"><thead><tr>'
    + '<th data-col="chamada" style="width:8%">Cham. <span class="sort-arrow">▲</span></th>'
    + '<th data-col="guia" style="width:10%">Guia <span class="sort-arrow">▲</span></th>'
    + '<th data-col="cnj" style="width:24%">CNJ <span class="sort-arrow">▲</span></th>'
    + '<th data-col="at" style="width:20%">Polo ativo <span class="sort-arrow">▲</span></th>'
    + '<th style="width:38%">Observação</th>'
    + '</tr></thead><tbody>'+rowsHtml+'</tbody></table>'
    + '<script>'+script+'<'+ '/script>'
    + '</div>';
}

// ── Filtros pré-estabelecidos para o HTML exportado ──────────
function _buildFiltrosExport(list) {
  var ramos = [], subgrupos = [], subclasses = [], resultados = [];
  var resLabels = {'provido':'Provido','nao-provido':'Não provido','parcial':'Parcialmente provido',
                    'prejudicado':'Prejudicado','extinto':'Extinto','outros':'Outros'};
  list.forEach(function(item) {
    var d = item.d;
    if (d.ramo      && ramos.indexOf(d.ramo)           < 0) ramos.push(d.ramo);
    if (d.subgrupo  && subgrupos.indexOf(d.subgrupo)   < 0) subgrupos.push(d.subgrupo);
    if (d.subclasse && subclasses.indexOf(d.subclasse) < 0) subclasses.push(d.subclasse);
    if (d.css       && resultados.indexOf(d.css)       < 0) resultados.push(d.css);
  });
  ramos.sort(); subgrupos.sort(); subclasses.sort(); resultados.sort();
  if (!ramos.length && !subgrupos.length && !subclasses.length && !resultados.length) return '';

  function makeOpts(vals, labelFn, placeholder) {
    return '<option value="">'+esc(placeholder)+'</option>'
      + vals.map(function(v){
          return '<option value="'+esc(v)+'">'+(labelFn ? labelFn(v) : esc(v))+'</option>';
        }).join('');
  }

  var uid = 'ef' + Date.now();
  var selSt = 'padding:4px 8px;border:1px solid #c5cae9;border-radius:5px;font-size:8.5pt;background:#fff;color:#333;font-family:Arial,sans-serif;';
  var sels = '';
  var idMap = {};
  if (ramos.length)      { idMap.r  = uid+'r';  sels += '<select id="'+uid+'r"  style="'+selSt+'">'+makeOpts(ramos,    null,                  'Matéria — todas')+'</select>'; }
  if (subgrupos.length)  { idMap.sg = uid+'sg'; sels += '<select id="'+uid+'sg" style="'+selSt+'">'+makeOpts(subgrupos, null,                  'Classe — todas')+'</select>'; }
  if (subclasses.length) { idMap.sc = uid+'sc'; sels += '<select id="'+uid+'sc" style="'+selSt+'">'+makeOpts(subclasses,null,                  'Subclasse — todas')+'</select>'; }
  if (resultados.length) { idMap.rs = uid+'rs'; sels += '<select id="'+uid+'rs" style="'+selSt+'">'+makeOpts(resultados,function(v){return resLabels[v]||v;},'Resultado — todos')+'</select>'; }

  var idCnt = uid+'c';
  var total = list.length;

  var script = '(function(){'
    + 'var gR=function(id){return id?document.getElementById(id):null;};'
    + 'var sR=gR('+JSON.stringify(idMap.r||'')+'),sSg=gR('+JSON.stringify(idMap.sg||'')+'),sSc=gR('+JSON.stringify(idMap.sc||'')+'),sRs=gR('+JSON.stringify(idMap.rs||'')+');'
    + 'var cntEl=document.getElementById('+JSON.stringify(idCnt)+');'
    + 'var divs=null;'
    + 'function filt(){'
    + '  if(!divs) divs=document.querySelectorAll(".exp-decisao");'
    + '  var vR=sR?sR.value:"",vSg=sSg?sSg.value:"",vSc=sSc?sSc.value:"",vRs=sRs?sRs.value:"";'
    + '  var n=0;'
    + '  divs.forEach(function(div){'
    + '    var ok=(!vR||div.dataset.ramo===vR)&&(!vSg||div.dataset.sg===vSg)&&(!vSc||div.dataset.sc===vSc)&&(!vRs||div.dataset.css===vRs);'
    + '    div.style.display=ok?"":"none"; if(ok) n++;'
    + '  });'
    + '  var corpo=divs.length?divs[0].parentNode:null;'
    + '  if(corpo){'
    + '    var lastVisible=false;'
    + '    Array.from(corpo.childNodes).forEach(function(node){'
    + '      if(node.nodeType===1&&node.tagName==="HR"){'
    + '        node.style.display=lastVisible?"":"none";'
    + '        lastVisible=false;'
    + '      }else if(node.nodeType===1&&node.classList.contains("exp-decisao")){'
    + '        lastVisible=node.style.display!==""||node.style.display===""&&node.offsetParent!==null;'
    + '        lastVisible=node.style.display!=="none";'
    + '      }'
    + '    });'
    + '  }'
    + '  if(cntEl) cntEl.textContent=n+" de '+total+'";'
    + '}'
    + '[sR,sSg,sSc,sRs].forEach(function(s){if(s)s.addEventListener("change",filt);});'
    + '})();';

  return '<div style="margin-bottom:16px;padding:8px 12px;background:#f5f7ff;border:1px solid #c5cae9;border-radius:6px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-family:Arial,sans-serif;">'
    + '<span style="font-size:8pt;font-weight:700;color:#1a237e;white-space:nowrap;">Filtrar:</span>'
    + sels
    + '<span id="'+idCnt+'" style="font-size:8pt;color:#78909c;margin-left:auto;white-space:nowrap;">'+total+' de '+total+'</span>'
    + '<script>'+script+'<'+'/script>'
    + '</div>';
}

// ── Helpers de exportação ─────────────────────────────────────
function getExportFilename(ext) {
  const list = getExportList();
  if (list.length === 1) return `ementa_${list[0].d.cnj || 'decisao'}.${ext}`;
  return `ementas_${list.length}_chamadas.${ext}`;
}

function buildCorpo(list, opts) {
  if (!MODO_MATERIA) {
    return list.map(item => renderDecisao(item.d, opts, item.num)).join('\n<hr>\n');
  }
  // Modo matéria: cabeçalho de 1º nível colorido; 2º nível como separador menor
  let html = '', v1Atual = null;
  list.forEach((item, idx) => {
    const v1 = item._v1 !== undefined ? item._v1 : getValorNivel(item.d, NIVEL_1);
    if (v1 !== v1Atual) {
      v1Atual = v1;
      const cor = getCorNivel1(NIVEL_1, v1);
      const mt  = idx === 0 ? 'margin-top:0' : '';
      html += '<div class="exp-mat-hdr" style="background:' + cor + ';color:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact;' + mt + '">' + esc(v1.toUpperCase()) + '</div>';
    } else {
      html += '<hr>';
    }
    html += renderDecisao(item.d, opts, item.num);
  });
  return html;
}

function getExportOpts() {
  return {
    incComent:       document.getElementById('chk-coment').checked,
    incObsAssessor:  document.getElementById('chk-obs-assessor')?.checked ?? true,
    incAssessor:     document.getElementById('chk-assessor').checked,
    incTipo:         document.getElementById('chk-tipo').checked,
    incData:         document.getElementById('chk-data').checked,
    incRel:          document.getElementById('chk-rel').checked,
    incVoto:         document.getElementById('chk-voto').checked,
    incResultado:    document.getElementById('chk-resultado')?.checked ?? true,
    incExpandir:     document.getElementById('chk-expandir') ?.checked ?? true,
    incObsLista:     document.getElementById('chk-obs-lista')?.checked ?? true,
    exportando:      true,
  };
}

// ── Exportação unificada ─────────────────────────────────────
async function exportar(tipo) {
  const list = getExportList();
  if (!list.length) { alert('Nenhuma chamada selecionada.'); return; }
  const optsBase = getExportOpts();
  const titulo   = document.title;

  if (tipo === 'html') {
    const capa     = buildCapa(list);
    const corpo    = buildCorpo(list, optsBase);
    const filtros  = _buildFiltrosExport(list);
    const apendice = optsBase.incObsLista ? _buildApendice() : '';
    const html = `<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>${esc(titulo)}</title>
<style>${CSS_EXPORT}</style></head><body>
${capa}
<h1>${esc(titulo)}</h1>
${filtros}
${corpo}
${apendice}
</body></html>`;
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = getExportFilename('html');
    a.click();

  } else if (tipo === 'pdf') {
    const capa  = buildCapa(list);
    const corpo = buildCorpo(list, optsBase);
    const printHtml = `<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>${esc(titulo)}</title>
<style>
@page { margin: 2cm; }
${CSS_EXPORT}
</style></head><body>
${capa}
${corpo}
</body></html>`;
    const win = window.open('', '_blank');
    if (!win) { alert('Permita pop-ups para exportar PDF.'); return; }
    win.document.write(printHtml);
    win.document.close();
    setTimeout(() => { win.focus(); win.print(); }, 400);

  } else if (tipo === 'docx') {
    const opts  = { ...optsBase, incRel: false, incVoto: false };
    const capa  = buildCapa(list);
    const corpo = buildCorpo(list, opts);
    const docHtml = `<html xmlns:o="urn:schemas-microsoft-com:office:office"
xmlns:w="urn:schemas-microsoft-com:office:word"
xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="UTF-8">
<meta name="ProgId" content="Word.Document">
<!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View>
<w:Zoom>100</w:Zoom><w:DoNotOptimizeForBrowser/></w:WordDocument></xml><![endif]-->
<style>${CSS_EXPORT}</style></head><body>
${capa}
<h1>${esc(titulo)}</h1>
${corpo}
</body></html>`;
    const blob = new Blob(['﻿' + docHtml], { type: 'application/msword' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = getExportFilename('doc');
    a.click();
  }
}

var _STATUS_CFG = {
  'remanescente': { label:'🔁 Remanescente', bg:'#e8f5e9', color:'#2e7d32', border:'#a5d6a7' },
  'adiado':       { label:'⏩ Adiado',              bg:'#fff8e1', color:'#f57f17', border:'#ffe082' },
  'antecipado':   { label:'⏪ Antecipado',          bg:'#f3e5f5', color:'#6a1b9a', border:'#ce93d8' },
  'retirado':     { label:'🚫 Retirado',      bg:'#fce4ec', color:'#b71c1c', border:'#ef9a9a' },
  'pendente':     { label:'⏳ Pendente',             bg:'#fff3e0', color:'#e65100', border:'#ffcc80' },
  'normal':       { label:'✅ Normal',               bg:'#e8f5e9', color:'#1b5e20', border:'#a5d6a7' },
  'nao_consta':   { label:'📭 Não consta desta pauta', bg:'#eceff1', color:'#546e7a', border:'#b0bec5' },
};

function _buildPendCards(q) {
  var filtro = (q || '').toLowerCase().trim();
  var lista = PENDENTES.filter(function(p) {
    if (!filtro) return true;
    return (p.cnj + ' ' + (p.assessor||'') + ' ' + (p.ativo||'') + ' ' + (p.passivo||'') + ' ' + (p.classe||''))
           .toLowerCase().includes(filtro);
  });
  if (!lista.length) return '<p class="pc-vazio">Nenhum resultado encontrado.</p>';

  // ── Agrupamento para o painel PENDENTES (processo no PDF, sem minuta na sessão) ──
  //
  // Grupos possíveis:
  //   naoElaborada   : sem status ou status=pendente → razão desconhecida
  //   remanSemMinuta : status=remanescente → veio de sessão anterior sem minuta ainda
  //   foraComMinuta  : outros status (adiado, antecipado, retirado) com minuta já escrita
  //                    que foram excluídos da pauta original APÓS a elaboração da minuta
  //
  // Nota: nao_consta NÃO faz sentido para pendentes (o processo está no PDF).
  //       Se registrado assim por engano, cai em foraComMinuta para não se perder.

  var naoElaborada = [], remanSemMinuta = [], foraComMinuta = [];
  lista.forEach(function(p) {
    var s = (STATUS[p.cnj]||{});
    var sit = s ? s.situacao : '';
    if (!sit || sit === 'pendente')       naoElaborada.push(p);
    else if (sit === 'remanescente')      remanSemMinuta.push(p);
    else                                  foraComMinuta.push(p);
  });

  function renderCard(p) {
    var sessaoBadge = p.sessao ? ' <span style="font-family:Arial,sans-serif;font-weight:600;font-size:.72em;padding:1px 7px;border-radius:8px;'
      + (p.sessao==='Virtual' ? 'background:#e8f5e9;color:#2e7d32' : 'background:#e3f2fd;color:#1565c0')
      + '">' + esc(p.sessao) + '</span>' : '';
    var nomeAbrev = _abreviarNome(p.assessor || '');
    var assessorBadge = nomeAbrev ? ' <span style="font-family:Arial,sans-serif;font-size:.72em;background:#fff8e1;color:#5d4037;padding:1px 7px;border-radius:8px;font-weight:600;letter-spacing:.02em;border:1px solid #ffe082;">' + esc(nomeAbrev) + '</span>' : '';
    var statusBadge = '';
    var s = (STATUS[p.cnj]||{});
    var obsHtml = (s && s.obs) ? '<div class="pc-row" style="color:#555;font-style:italic;">' + esc(s.obs) + '</div>' : '';
    return '<div class="pc">'
      + '<div class="pc-cnj">' + esc(p.cnj) + sessaoBadge + assessorBadge + statusBadge + '</div>'
      + '<div class="pc-row"><span class="pc-lbl">Classe:</span> ' + esc(p.classe || '—') + '</div>'
      + '<div class="pc-row"><span class="pc-lbl">Polo ativo:</span> ' + esc(p.ativo || '—') + '</div>'
      + '<div class="pc-row"><span class="pc-lbl">Polo passivo:</span> ' + esc(p.passivo || '—') + '</div>'
      + obsHtml
      + '<div class="pc-btns">'
      + '<button class="pc-btn pc-btn-incluir"      data-cnj="' + esc(p.cnj) + '" onclick="_pendIncluir(this.dataset.cnj,this)"    title="Incluir minuta manualmente">✚ Incluir</button>'
      + '<button class="pc-btn pc-btn-remanescente" data-cnj="' + esc(p.cnj) + '" data-sit="remanescente" onclick="_pendSituacao(this.dataset.cnj,this.dataset.sit)" title="Registrar como remanescente">🔁 Remanescente</button>'
      + '<button class="pc-btn pc-btn-antecipado"   data-cnj="' + esc(p.cnj) + '" data-sit="antecipado"   onclick="_pendSituacao(this.dataset.cnj,this.dataset.sit)" title="Registrar como antecipado">⏪ Antecipado</button>'
      + '<button class="pc-btn pc-btn-adiado"       data-cnj="' + esc(p.cnj) + '" data-sit="adiado"       onclick="_pendSituacao(this.dataset.cnj,this.dataset.sit)" title="Registrar como adiado">⏩ Adiado</button>'
      + '<button class="pc-btn pc-btn-retirado"     data-cnj="' + esc(p.cnj) + '" data-sit="retirado"     onclick="_pendSituacao(this.dataset.cnj,this.dataset.sit)" title="Registrar como retirado">🚫 Retirado</button>'
      + '</div>'
      + '</div>';
  }

  var html = '';
  if (naoElaborada.length) {
    html += '<div style="margin:10px 0 6px;font-size:.78em;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#bf360c;border-left:3px solid #bf360c;padding-left:8px;">'
      + '⏳ Minuta não elaborada — motivo não registrado (' + naoElaborada.length + ')</div>';
    html += naoElaborada.map(renderCard).join('');
  }
  if (remanSemMinuta.length) {
    html += '<div style="margin:14px 0 6px;font-size:.78em;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#2e7d32;border-left:3px solid #2e7d32;padding-left:8px;">'
      + '🔁 Remanescente — minuta ainda não elaborada (' + remanSemMinuta.length + ')</div>'
      + '<div style="margin-bottom:8px;padding:7px 10px;background:#e8f5e9;border-radius:4px;font-family:Arial,sans-serif;font-size:.80em;color:#1b5e20;">'
      + 'Processo pautado em sessão anterior sem minuta elaborada. Veio como remanescente para esta sessão, sem necessidade de nova intimação.'
      + '</div>';
    html += remanSemMinuta.map(renderCard).join('');
  }
  if (foraComMinuta.length) {
    html += '<div style="margin:14px 0 6px;font-size:.78em;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#6a1b9a;border-left:3px solid #6a1b9a;padding-left:8px;">'
      + '📋 Minuta elaborada — processo saiu da pauta após a elaboração (' + foraComMinuta.length + ')</div>';
    html += foraComMinuta.map(renderCard).join('');
  }
  return html || '<p class="pc-vazio">Nenhum resultado encontrado.</p>';
}

  if (!nome) return '';
  var p = nome.trim().split(/\s+/);
  return p.length <= 2 ? nome : p[0] + ' ' + p[p.length - 1];
}

    } else if (!s || !s.situacao || s.situacao === 'normal') {

        + '❌ <strong>SEM STATUS:</strong> processo não encontrado em nenhuma lista de pauta. Registre o status na aba de Gestão.'
        + '</div>';
      borderStyle = '';
    } else {
      // Has explicit status
      var statusLabels = {'remanescente':'Remanescente — sem nova intimação necessária','adiado':'Adiado para outra data','antecipado':'Antecipado para data anterior','retirado':'Retirado de pauta'};
      var cor = _STATUS_CFG[s.situacao] ? _STATUS_CFG[s.situacao].color : '#333';
      var bg  = _STATUS_CFG[s.situacao] ? _STATUS_CFG[s.situacao].bg    : '#f5f5f5';
      var destInfo = '';
      if ((s.situacao==='adiado'||s.situacao==='antecipado'||s.situacao==='remanescente') && s.pauta_destino_data) {
        destInfo = ' → ' + (s.pauta_destino_tipo ? esc(s.pauta_destino_tipo) + ' ' : '') + esc(s.pauta_destino_data);
      }
      avisoHtml = '<div style="margin-top:7px;padding:7px 10px;background:' + bg + ';border-left:3px solid ' + cor + ';border-radius:0 4px 4px 0;font-family:Arial,sans-serif;font-size:.80em;color:' + cor + ';">'
        + '<strong>' + esc(statusLabels[s.situacao] || s.situacao) + esc(destInfo) + '</strong>'
        + '</div>';
      borderStyle = 'border-color:' + cor + ';';
    }
    return '<div class="fc" style="' + borderStyle + '">'
      + '<div class="fc-cnj">' + esc(p.cnj) + sessaoBadge + dataBadge + assessorBadge + statusBadge + '</div>'
      + avisoHtml
      + '<div class="fc-row"><span class="fc-lbl">Classe:</span> ' + esc(p.classe || '—') + '</div>'
      + '<div class="fc-row"><span class="fc-lbl">Polo ativo:</span> ' + esc(p.ativo || '—') + '</div>'
      + '<div class="fc-row"><span class="fc-lbl">Polo passivo:</span> ' + esc(p.passivo || '—') + '</div>'
      + obsHtml
      + '<div class="fc-btns">'
      + '<button class="fc-btn fc-btn-confirmar" data-cnj="' + esc(p.cnj) + '" onclick="_foraConfirmar(this.dataset.cnj)" title="Manter processo na lista do HTML gerado">✔ Confirmar</button>'
      + '<button class="fc-btn fc-btn-excluir"   data-cnj="' + esc(p.cnj) + '" onclick="_foraExcluir(this.dataset.cnj)"   title="Excluir processo da lista do HTML gerado">✕ Excluir</button>'
      + '</div>'
      + '</div>';
  }

  var html = '';
  gruposCfg.forEach(function(g) {
    var items = grupos[g.key];
    if (!items.length) return;
    html += '<div style="margin:10px 0 6px;font-size:.78em;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:' + g.corTxt + ';border-left:3px solid ' + g.corBorda + ';padding-left:8px;">'
      + g.titulo + ' (' + items.length + ')</div>';
    html += items.map(renderCard).join('');
  });
  return html || '<p class="fc-vazio">Nenhum resultado encontrado.</p>';
}

function _filtrarFora(q) {
  var el = document.getElementById('fora-cards');
  if (el) el.innerHTML = _buildForaCards(q);
}

function corrigirSessaoFora(cnj, sessaoCorreta) {
  for (var i = 0; i < DECISOES.length; i++) {
    if (DECISOES[i].cnj === cnj) { DECISOES[i].tipo = sessaoCorreta; break; }
  }
  FORA_PAUTA = FORA_PAUTA.filter(function(p) { return p.cnj !== cnj; });
  var ov = document.getElementById('fora-ov');
  if (ov) ov.remove();
  _buildForaDw();
  document.getElementById('fora-ov').classList.add('on');
  var btnFora = document.querySelector('.btn-fora');
  if (btnFora) {
    if (FORA_PAUTA.length) {
      btnFora.textContent = '📂 Fora de lista (' + FORA_PAUTA.length + ')';
      btnFora.className = btnFora.className.replace(/zero/,'').trim();
      btnFora.onclick = function(){ abrirFora(); };
    } else {
      btnFora.textContent = '📂 —';
      if (!btnFora.className.includes('zero')) btnFora.className += ' zero';
      btnFora.onclick = null;
    }
  }
  renderLista(document.getElementById('busca').value || '');
}

  ov.id = 'fora-ov';
  ov.innerHTML =
    '<div id="fora-dw">'
      + '<div id="fora-hd">'
        + '<h2>📂 Fora de lista — ' + FORA_PAUTA.length + ' processo(s)</h2>'
        + '<button onclick="fecharFora()">✕</button>'
      + '</div>'
      + '<div id="fora-srch" style="padding:10px 14px 0;background:#f5f7fa;border-bottom:1px solid #e0e4ef;">'
        + '<input id="fora-busca" type="search" placeholder="Buscar por CNJ, assessor, parte…" autocomplete="off"'
        + ' style="width:100%;padding:7px 10px;border:1px solid #c5cae9;border-radius:6px;font-size:.85em;outline:none;background:#fff;">'
      + '</div>'
      + '<div id="fora-bd">'
        + '<div id="fora-info">Processos fora de lista ou com erro na indicação do tipo de sessão.</div>'

      + '</div>'

// ── Sets de CNJs confirmados / excluídos (Fora de Pauta) ──────

// ── localStorage: chave baseada no título do documento ────────
var _LS_KEY = 'acoes_paineis__' + (document.title || 'gabrf').replace(/\s+/g,'_');

// ── Persistência: salva estado atual no localStorage ──────────
function _lsSalvar() {
  try {
    // Never persist empty-string CNJ keys — they match all elements on restore
    delete _PEND_SITUACOES[''];
    var payload = {
      situacoes_pendentes: _PEND_SITUACOES,
      fora_confirmados:    Array.from(_FORA_CONFIRMADOS),
      fora_excluidos:      Array.from(_FORA_EXCLUIDOS),
      salvo_em:            new Date().toISOString(),
    };
    localStorage.setItem(_LS_KEY, JSON.stringify(payload));
  } catch(e) { /* silencioso — localStorage pode estar bloqueado */ }
}

// ── Persistência: restaura estado do localStorage ao abrir ────
function _lsRestaurar() {
  try {
    var raw = localStorage.getItem(_LS_KEY);
    if (!raw) return;
    var saved = JSON.parse(raw);
    // Situações pendentes
    if (saved.situacoes_pendentes) {
      Object.keys(saved.situacoes_pendentes).forEach(function(cnj) {
        if (!cnj) return; // skip empty-string keys
        _PEND_SITUACOES[cnj] = saved.situacoes_pendentes[cnj];
        _marcarPendCard(cnj, saved.situacoes_pendentes[cnj]);
      });
    }
    // Fora de pauta
    if (saved.fora_excluidos) {
      saved.fora_excluidos.forEach(function(cnj) {
        _FORA_EXCLUIDOS.add(cnj);
        _marcarForaCard(cnj, 'excluido');
      });
    }
    if (saved.fora_confirmados) {
      saved.fora_confirmados.forEach(function(cnj) {
        _FORA_CONFIRMADOS.add(cnj);
        _marcarForaCard(cnj, 'confirmado');
      });
    }
    // Atualiza lista principal (excluídos somem)
    renderLista(document.getElementById('busca') ? document.getElementById('busca').value : '');
    // Indicador de que havia estado salvo
    var ind = document.getElementById('ls-restaurado');
    if (ind) {
      ind.textContent = '↺ Estado restaurado de ' + (saved.salvo_em ? saved.salvo_em.slice(0,16).replace('T',' ') : '?');
      ind.style.display = 'inline';
    }
  } catch(e) { /* silencioso */ }
}

// ── Limpar localStorage ───────────────────────────────────────
function _lsLimpar() {
  try { localStorage.removeItem(_LS_KEY); } catch(e) {}
}

function _foraConfirmar(cnj) {
  _FORA_EXCLUIDOS.delete(cnj);
  _FORA_CONFIRMADOS.add(cnj);
  _marcarForaCard(cnj, 'confirmado');
  renderLista(document.getElementById('busca') ? document.getElementById('busca').value : '');
  _lsSalvar();
}

function _foraExcluir(cnj) {
  _FORA_CONFIRMADOS.delete(cnj);
  _FORA_EXCLUIDOS.add(cnj);
  _marcarForaCard(cnj, 'excluido');
  renderLista(document.getElementById('busca') ? document.getElementById('busca').value : '');
  _lsSalvar();
}

function _marcarForaCard(cnj, estado) {
  var cards = document.querySelectorAll('#fora-cards .fc');
  cards.forEach(function(card) {
    var cnjtxt = card.querySelector('.fc-cnj');
    if (cnjtxt && cnjtxt.textContent.trim().startsWith(cnj)) {
      card.style.opacity = '1';
      card.style.borderColor = estado === 'confirmado' ? '#2e7d32' : '#b71c1c';
      card.style.background  = estado === 'confirmado' ? '#f1f8f1' : '#fff5f5';
      var btns = card.querySelector('.fc-btns');
      if (btns) {
        var badge = estado === 'confirmado'
          ? '<span style="font-size:.75em;color:#2e7d32;font-weight:700;">✔ Confirmado</span>'
          : '<span style="font-size:.75em;color:#b71c1c;font-weight:700;">✕ Excluído</span>';
        btns.innerHTML = badge
          + ' <button class="fc-btn" data-cnj="' + esc(cnj) + '"'
          + ' style="background:#f5f5f5;color:#666;border:1px solid #ccc;font-size:.72em;padding:3px 8px;"'
          + ' onclick="_foraDesfazer(this.dataset.cnj)">Desfazer</button>';
      }
    }
  });
}

function _foraDesfazer(cnj) {
  _FORA_CONFIRMADOS.delete(cnj);
  _FORA_EXCLUIDOS.delete(cnj);
  _lsSalvar();
  // Re-render the specific card to restore original buttons
  var cards = document.querySelectorAll('#fora-cards .fc');
  cards.forEach(function(card) {
    var cnjtxt = card.querySelector('.fc-cnj');
    if (cnjtxt && cnjtxt.textContent.trim().startsWith(cnj)) {
      card.style.opacity = '1';
      card.style.borderColor = '';
      card.style.background  = '';
      var btns = card.querySelector('.fc-btns');
      if (btns) {
        btns.innerHTML = '<button class="fc-btn fc-btn-confirmar" data-cnj="' + esc(cnj) + '"'
          + ' onclick="_foraConfirmar(this.dataset.cnj)" title="Manter processo na lista do HTML gerado">✔ Confirmar</button>'
          + '<button class="fc-btn fc-btn-excluir" data-cnj="' + esc(cnj) + '"'
          + ' onclick="_foraExcluir(this.dataset.cnj)" title="Excluir processo da lista do HTML gerado">✕ Excluir</button>';
      }
    }
  });
  renderLista(document.getElementById('busca') ? document.getElementById('busca').value : '');
}

// ── Sets de CNJs com situação registrada (Pendentes) ──────────

var _PEND_LABELS = {
  'remanescente': 'ficará remanescente',
  'antecipado':   'foi antecipado',
  'adiado':       'foi adiado',
  'retirado':     'foi retirado de pauta',
};

function _pendSituacao(cnj, situacao) {
  if (!cnj) return; // never act on empty CNJ
  _PEND_SITUACOES[cnj] = situacao;
  _marcarPendCard(cnj, situacao);
  _lsSalvar();
}

function _marcarPendCard(cnj, situacao) {
  if (!cnj) return; // never act on empty CNJ — startsWith('') matches all elements
  var cores = {'remanescente':'#2e7d32','antecipado':'#6a1b9a','adiado':'#f57f17','retirado':'#b71c1c'};
  var cor = cores[situacao] || '#333';
  var label = _PEND_LABELS[situacao] || situacao;

  // Search in both #pend-cards and #fora-cards (for novo cards)
  var allCards = Array.from(document.querySelectorAll('#pend-cards .pc, #fora-cards .fc, .fc[id^="fora-novo-"]'));
  allCards.forEach(function(card) {
    var cnjtxt = card.querySelector('.pc-cnj, .fc-cnj');
    if (!cnjtxt || !cnjtxt.textContent.trim().startsWith(cnj)) return;
    card.style.borderLeft = '3px solid ' + cor;

    // Find or create indicator
    var btns = card.querySelector('.pc-btns');
    if (!btns) return;

    // Remove old indicator
    var oldInd = btns.querySelector('.pc-sit-ind');
    if (oldInd) oldInd.remove();

    // Reset all button highlights
    btns.querySelectorAll('[data-sit]').forEach(function(b) {
      b.style.outline = '';
      b.style.fontWeight = '';
    });

    // Insert new indicator above buttons
    var ind = document.createElement('div');
    ind.className = 'pc-sit-ind';
    ind.style.cssText = 'font-size:.72em;font-weight:700;color:' + cor + ';margin-bottom:4px;width:100%;';
    ind.innerHTML = '✔ ' + esc(label)
      + ' <button data-cnj="' + esc(cnj) + '" onclick="_pendDesfazer(this.dataset.cnj)"'
      + ' style="margin-left:6px;padding:2px 7px;background:#f5f5f5;color:#666;'
      + 'border:1px solid #ccc;border-radius:4px;cursor:pointer;font-size:.9em;">Desfazer</button>';
    btns.insertBefore(ind, btns.firstChild);

    // Highlight selected button
    btns.querySelectorAll('[data-sit]').forEach(function(b) {
      if (b.dataset.sit === situacao) {
        b.style.outline = '2px solid ' + cor;
        b.style.fontWeight = '900';
      }
    });
  });
}

function _pendDesfazer(cnj) {
  delete _PEND_SITUACOES[cnj];
  _lsSalvar();

  // Remove indicator and reset highlights in both panels
  var allCards = Array.from(document.querySelectorAll('#pend-cards .pc, #fora-cards .fc, .fc[id^="fora-novo-"]'));
  allCards.forEach(function(card) {
    var cnjtxt = card.querySelector('.pc-cnj, .fc-cnj');
    if (!cnjtxt || !cnjtxt.textContent.trim().startsWith(cnj)) return;
    card.style.borderLeft = '';
    var btns = card.querySelector('.pc-btns');
    if (!btns) return;
    var ind = btns.querySelector('.pc-sit-ind');
    if (ind) ind.remove();
    btns.querySelectorAll('[data-sit]').forEach(function(b) {
      b.style.outline = '';
      b.style.fontWeight = '';
    });
  });
}

    '#incl-body .incl-err{color:#b71c1c;font-size:.78em;margin-top:3px;display:none}',
    '#incl-footer{padding:12px 20px;border-top:1px solid #e0e0e0;display:flex;gap:8px;flex-shrink:0}',
    '#incl-footer button{padding:8px 20px;border:none;border-radius:6px;cursor:pointer;font-weight:700;font-size:.85em}',
    '#incl-btn-salvar{background:#1565c0;color:#fff}.#incl-btn-salvar:hover{background:#1976d2}',
    '#incl-btn-cancel{background:#f5f5f5;color:#555;border:1px solid #ccc}',
    '#incl-dup-aviso{display:none;padding:8px 12px;background:#fff3e0;border:1px solid #ffcc80;border-radius:5px;color:#e65100;font-size:.80em;margin-bottom:10px}',
  ].join('');
  document.head.appendChild(s);
})();

var _INCL_CNJ_ATUAL = '';
var _INCL_ORIGEM_FORA = false; // true when opened from Fora de Lista panel

var _INCL_CAMPOS = [
  {id:'incl-cnj',      label:'Número CNJ',            type:'text',     ph:'0000000-00.0000.4.05.0000', required:true},
  {id:'incl-classe',   label:'Classe judicial',        type:'text',     ph:'Apelação Cível',             required:true},
  {id:'incl-assunto',  label:'Assunto principal',      type:'text',     ph:'Benefício previdenciário',   required:true},
  {id:'incl-ativo',    label:'Polo ativo',             type:'text',     ph:'Nome do autor',              required:true},
  {id:'incl-adv-at',   label:'Advogado(s) polo ativo', type:'text',     ph:'OAB/UF 00000',               required:true},
  {id:'incl-passivo',  label:'Polo passivo',           type:'text',     ph:'Nome do réu',                required:true},
  {id:'incl-adv-pas',  label:'Advogado(s) polo passivo',type:'text',    ph:'OAB/UF 00000',               required:true},
  {id:'incl-assessor', label:'Assessor',               type:'text',     ph:'Nome do assessor',           required:true},
  {id:'incl-tipo',     label:'Tipo de sessão',         type:'select',   opts:['Virtual','Ordinária'],required:true},
  {id:'incl-data',     label:'Data da sessão (DD.MM.AAAA)', type:'text', ph:'25.03.2025',                required:true},
  {id:'incl-ementa',   label:'Ementa',                 type:'textarea', ph:'',                           required:true},
  {id:'incl-relatorio',label:'Relatório',              type:'textarea', ph:'',                           required:true},
  {id:'incl-voto',     label:'Voto',                   type:'textarea', ph:'',                           required:true},
  {id:'incl-acordao',  label:'Acórdão',                type:'textarea', ph:'',                           required:true},
  {id:'incl-resultado',label:'Resultado',              type:'text',     ph:'Não provido',                required:true},
];

function fecharIncluir() {
  var o = document.getElementById('incl-ov');
  if (o) o.classList.remove('on');
}

function _pendIncluir(cnj, btnEl) {
  _INCL_CNJ_ATUAL = cnj;
  _INCL_ORIGEM_FORA = !cnj; // empty CNJ = opened from Fora de Lista
  var ov = document.getElementById('incl-ov');
  if (!ov) {
    ov = document.createElement('div');
    ov.id = 'incl-ov';
    var campos = _INCL_CAMPOS.map(function(f) {
      var input;
      if (f.type === 'select') {
        input = '<select id="' + f.id + '">' + f.opts.map(function(o){return '<option>'+o+'</option>';}).join('') + '</select>';
      } else if (f.type === 'textarea') {
        input = '<textarea id="' + f.id + '" placeholder="' + esc(f.ph) + '"></textarea>';
      } else {
        input = '<input type="text" id="' + f.id + '" placeholder="' + esc(f.ph) + '">';
      }
      return '<div class="incl-row"><label>' + f.label + (f.required?' <span style="color:#c62828">*</span>':'') + '</label>'
        + input + '<div class="incl-err" id="' + f.id + '-err">Campo obrigatório</div></div>';
    }).join('');

    ov.innerHTML = '<div id="incl-box">'
      + '<div id="incl-hd"><h2>✚ Inclusão Manual de Minuta</h2><button onclick="fecharIncluir()">×</button></div>'
      + '<div id="incl-body">'
      + '<div id="incl-dup-aviso">⚠ Já existe um registro com este CNJ em DECISOES. Corrija o número antes de salvar.</div>'
      + campos
      + '</div>'
      + '<div id="incl-footer">'
      + '<button id="incl-btn-salvar" onclick="_inclSalvar()">💾 Salvar e incluir na sessão</button>'
      + '<button id="incl-btn-cancel" onclick="fecharIncluir()">Cancelar</button>'
      + '</div></div>';
    ov.addEventListener('click', function(e){ if(e.target===ov) ov.classList.remove('on'); });
    document.body.appendChild(ov);
  }
  // Pre-fill CNJ
  var cnjEl = document.getElementById('incl-cnj');
  if (cnjEl) cnjEl.value = cnj;
  ov.classList.add('on');
  // Clear previous errors
  _INCL_CAMPOS.forEach(function(f) {
    var err = document.getElementById(f.id + '-err');
    if (err) err.style.display = 'none';
    var el = document.getElementById(f.id);
    if (el && f.type !== 'select') {
      if (f.id !== 'incl-cnj') el.value = '';
    }
  });
  document.getElementById('incl-dup-aviso').style.display = 'none';
}

function _inclSalvar() {
  // Validate
  var valido = true;
  _INCL_CAMPOS.forEach(function(f) {
    if (!f.required) return;
    var el = document.getElementById(f.id);
    var err = document.getElementById(f.id + '-err');
    if (!el) return;
    if (!el.value.trim()) {
      valido = false;
      if (err) err.style.display = 'block';
    } else {
      if (err) err.style.display = 'none';
    }
  });
  if (!valido) return;

  // Check duplicate
  var novoCnj = document.getElementById('incl-cnj').value.trim();
  var dup = DECISOES.some(function(d){ return d.cnj === novoCnj; });
  if (dup) {
    document.getElementById('incl-dup-aviso').style.display = 'block';
    return;
  }
  document.getElementById('incl-dup-aviso').style.display = 'none';

  // Build payload
  var resultado = document.getElementById('incl-resultado').value.trim();
  var css = 'outros';
  var r = resultado.toLowerCase();
  if (r.includes('não provido') || r.includes('nao provido') || r.includes('improv')) css = 'nao-provido';
  else if (r.includes('provido') && !r.includes('não') && !r.includes('nao'))       css = 'provido';
  else if (r.includes('parcial'))     css = 'parcial';
  else if (r.includes('prejudicad'))  css = 'prejudicado';
  else if (r.includes('extinto'))     css = 'extinto';

  var payload = {
    cnj:              novoCnj,
    nome:             novoCnj,
    nome_arq:         'inclusao_manual',
    cab:              document.getElementById('incl-classe').value.trim() + ' — ' + document.getElementById('incl-ativo').value.trim().slice(0,40),
    assessor:         document.getElementById('incl-assessor').value.trim(),
    comentario:       '',
    obs_assessor:     '',
    tipo:             document.getElementById('incl-tipo').value,
    data:             document.getElementById('incl-data').value.trim(),
    classe:           document.getElementById('incl-classe').value.trim(),
    polo_ativo:       document.getElementById('incl-ativo').value.trim(),
    adv_polo_ativo:   document.getElementById('incl-adv-at').value.trim(),
    polo_passivo:     document.getElementById('incl-passivo').value.trim(),
    adv_polo_passivo: document.getElementById('incl-adv-pas').value.trim(),
    terceiros:        '',
    assunto:          document.getElementById('incl-assunto').value.trim(),
    ramo:             '',
    subgrupo:         '',
    subclasse:        '',
    ementa:           document.getElementById('incl-ementa').value.trim(),
    relatorio:        document.getElementById('incl-relatorio').value.trim(),
    voto:             document.getElementById('incl-voto').value.trim(),
    acordao:          document.getElementById('incl-acordao').value.trim(),
    resultado:        resultado,
    css:              css,
    inclusao_manual:  true,
    _origem_fora:     _INCL_ORIGEM_FORA,
  };

  // ── Opção A: gerar JSON para importar no Streamlit ─────────
  var json = JSON.stringify([payload], null, 2);
  var blob = new Blob([json], {type:'application/json;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'inclusao_manual_' + novoCnj.replace(/[^0-9]/g,'-') + '.json';
  a.click();

  // ── Inserir em DECISOES para aparecer imediatamente ────────
  DECISOES.push(payload);
  _lsSalvar();

  // Fechar modal e atualizar painéis
  fecharIncluir();

  if (_INCL_ORIGEM_FORA) {
    // Processo novo da guia Fora de Lista: exibir no painel com botões de situação e exclusão
    _foraAdicionarNovoCard(payload);
  } else {
    // Minuta incluída manualmente da guia Pendentes
    delete _PEND_SITUACOES[_INCL_CNJ_ATUAL];
    _marcarPendCardIncluido(_INCL_CNJ_ATUAL, novoCnj);
  }

  // Abrir o novo processo na área de detalhe (torna-o ativo e exportável)
  var novoIdx = DECISOES.length - 1;
  SELECIONADAS.add(novoIdx);
  renderLista(document.getElementById('busca') ? document.getElementById('busca').value : '');
  abrirDecisao(novoIdx);
}

// Track manually included CNJs for revert
var _INCL_REVERTIDOS = {};

// ── Novo processo incluído da guia Fora de Lista ──────────────
function _foraAdicionarNovoCard(payload) {
  var cnj = payload.cnj;
  var container = document.getElementById('fora-cards');
  if (!container) return;

  var card = document.createElement('div');
  card.className = 'fc';
  card.id = 'fora-novo-' + cnj.replace(/[^0-9]/g, '-');
  card.style.borderColor = '#1565c0';

  var sit = _PEND_SITUACOES[cnj] || '';
  var btnsHtml = '<div class="fc-btns" style="flex-wrap:wrap;gap:4px;">'
    + '<span style="font-size:.72em;font-weight:700;color:#1565c0;">✔ Novo processo</span>'
    + '</div>'
    + '<div class="pc-btns" style="margin-top:6px;">'
    + '<button class="pc-btn pc-btn-remanescente" data-cnj="' + esc(cnj) + '" data-sit="remanescente" onclick="_pendSituacao(this.dataset.cnj,this.dataset.sit)">🔁 Remanescente</button>'
    + '<button class="pc-btn pc-btn-antecipado"   data-cnj="' + esc(cnj) + '" data-sit="antecipado"   onclick="_pendSituacao(this.dataset.cnj,this.dataset.sit)">⏪ Antecipado</button>'
    + '<button class="pc-btn pc-btn-adiado"       data-cnj="' + esc(cnj) + '" data-sit="adiado"       onclick="_pendSituacao(this.dataset.cnj,this.dataset.sit)">⏩ Adiado</button>'
    + '<button class="pc-btn pc-btn-retirado"     data-cnj="' + esc(cnj) + '" data-sit="retirado"     onclick="_pendSituacao(this.dataset.cnj,this.dataset.sit)">🚫 Retirado</button>'
    + '<button class="pc-btn" style="background:#fce4ec;color:#b71c1c;border:1px solid #ef9a9a;"'
    + ' data-cnj="' + esc(cnj) + '" onclick="_foraNovoExcluir(this.dataset.cnj)" title="Excluir este processo da lista">✕ Excluir</button>'
    + '</div>';

  card.innerHTML = '<div class="fc-cnj">' + esc(cnj)
    + ' <span style="font-size:.7em;background:#e3f2fd;color:#1565c0;padding:1px 6px;border-radius:8px;border:1px solid #90caf9;">Novo</span>'
    + '</div>'
    + '<div class="fc-row"><span class="fc-lbl">Classe:</span> ' + esc(payload.classe||'—') + '</div>'
    + '<div class="fc-row"><span class="fc-lbl">Polo ativo:</span> ' + esc(payload.polo_ativo||'—') + '</div>'
    + btnsHtml;

  container.insertBefore(card, container.firstChild);
}

function _foraNovoExcluir(cnj) {
  if (!confirm('Excluir o processo ' + cnj + ' da lista?\n\nEle será removido da lista principal.')) return;
  // Remove from DECISOES
  var idx = DECISOES.findIndex(function(d){ return d.cnj===cnj && d.inclusao_manual && d._origem_fora; });
  if (idx >= 0) DECISOES.splice(idx, 1);
  // Remove card from panel
  var card = document.getElementById('fora-novo-' + cnj.replace(/[^0-9]/g,'-'));
  if (card) card.remove();
  delete _PEND_SITUACOES[cnj];
  _lsSalvar();
  renderLista(document.getElementById('busca') ? document.getElementById('busca').value : '');
}

function _inclReverter(cnj) {
  var idx = DECISOES.findIndex(function(d){ return d.cnj === cnj && d.inclusao_manual && !d._origem_fora; });
  if (idx >= 0) DECISOES.splice(idx, 1);
  delete _INCL_REVERTIDOS[cnj];
  _lsSalvar();
  renderLista(document.getElementById('busca') ? document.getElementById('busca').value : '');
  _filtrarPend(document.getElementById('pend-busca') ? document.getElementById('pend-busca').value : '');
}

function _marcarPendCardIncluido(cnj, novoCnj) {
  _INCL_REVERTIDOS[cnj] = novoCnj;
  var cards = document.querySelectorAll('#pend-cards .pc');
  cards.forEach(function(card) {
    var cnjtxt = card.querySelector('.pc-cnj');
    if (cnjtxt && cnjtxt.textContent.trim().startsWith(cnj)) {
      card.style.borderLeft = '3px solid #1565c0';
      var btnIncluir = card.querySelector('.pc-btn-incluir');
      if (btnIncluir) {
        btnIncluir.disabled = true;
        btnIncluir.style.opacity = '0.4';
        btnIncluir.style.cursor = 'default';
        btnIncluir.title = 'Já incluído nesta sessão';
        btnIncluir.innerHTML = '✔ Incluído';
      }
      var btns = card.querySelector('.pc-btns');
      if (btns && !btns.querySelector('.pc-incl-ind')) {
        var ind = document.createElement('div');
        ind.className = 'pc-incl-ind';
        ind.style.cssText = 'font-size:.72em;font-weight:700;color:#1565c0;margin-bottom:4px;width:100%;';
        ind.innerHTML = '✔ Minuta incluída manualmente'
          + ' <button data-cnj="' + esc(cnj) + '" onclick="_inclReverter(this.dataset.cnj)"'
          + ' style="margin-left:6px;padding:2px 7px;background:#fce4ec;color:#b71c1c;'
          + 'border:1px solid #ef9a9a;border-radius:4px;cursor:pointer;font-size:.9em;">'
          + 'Excluir inclusão</button>';
        btns.insertBefore(ind, btns.firstChild);
      }
    }
  });
}

// ── Download de ações (Opção A) ───────────────────────────────
function _baixarAcoesPaineis() {
  var acoes = {
    situacoes_pendentes: _PEND_SITUACOES,
    fora_confirmados:    Array.from(_FORA_CONFIRMADOS),
    fora_excluidos:      Array.from(_FORA_EXCLUIDOS),
    gerado_em:           new Date().toISOString(),
  };
  var blob = new Blob([JSON.stringify(acoes, null, 2)], {type:'application/json;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'acoes_paineis.json';
  a.click();
  // Após exportar, limpar localStorage para evitar restauração de dados já processados
  _lsLimpar();
  var ind = document.getElementById('ls-restaurado');
  if (ind) ind.style.display = 'none';
}

// ── Restaurar estado do localStorage ao carregar a página ─────
document.addEventListener('DOMContentLoaded', function() {
  _lsRestaurar();
});

</script>
