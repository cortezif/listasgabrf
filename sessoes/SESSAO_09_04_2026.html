fundamentos já apresentados na decisão que indeferiu o pedido de antecipação da tutela recursal e, não havendo qualquer modificação na situação fática e jurídica capaz de alterar as razões do convencimento, o mantenho em todos os seus termos.\r\n\r\n\r\n\r\n Pelo exposto, NEGO PROVIMENTO ao agravo de instrumento.\r\n\r\n\r\n\r\n É como voto.", "acordao": "Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO ao agravo de instrumento, nos termos do voto do relator e na forma do relatório constante dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido", "obs_assessor": "﻿\r\n\r\n Dr. Rogério, minuta revisada por Évellyn.\r\n\r\n Poder Judiciário\r\n\r\n Tribunal Regional Federal da 5ª Região\r\n\r\n Gabinete do Desembargador Federal Rogério Fialho Moreira", "tem_obs_assessor": true, "assunto": "", "ramo": "Administrativo", "subgrupo": "Apelação/Remessa Necessária", "subclasse": ""}, {"nome": "20260317_035809_Re__VOTO.0006071-65.2025.4.05.0000.VIRTUAL.ED.09.04.2026", "nome_arq": "VOTO.0006071-65.2025.4.05.0000.VIRTUAL.ED.09.04.2026", "cnj": "0006071-65.2025.4.05.0000", "cab": "0006071-65.2025.4.05.0000", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "RAIMUNDA NONATA CAVALCANTE", "adv_polo_ativo": "Não informado", "polo_passivo": "UNIVERSIDADE FEDERAL DO CEARA\r\n\r\nINICIO RELATORIO", "adv_polo_passivo": "Não informado", "ementa": "PROCESSUAL CIVIL. EMBARGOS DE DECLARAÇÃO. AGRAVO DE INSTRUMENTO. HABILITAÇÃO DE PENSIONISTA. LEI Nº 6.858/80. ALEGAÇÃO DE OMISSÃO. INOCORRÊNCIA. PRETENSÃO DE REDISCUSSÃO DO MÉRITO. REJEIÇÃO.\r\n\r\n\r\n\r\n1. Embargos de declaração opostos pela UNIVERSIDADE FEDERAL DO CEARÁ — UFC contra o acórdão proferido por esta Terceira Turma em 11 de dezembro de 2025, que deu provimento ao agravo de instrumento interposto por RAIMUNDA NONATA CAVALCANTE, determinando sua habilitação como pensionista nos autos do cumprimento de sentença oriundo da ação coletiva nº 0012648-88.1997.4.05.8100, com a divisão do crédito do servidor falecido entre a companheira e os filhos deste.\r\n\r\n\r\n\r\n2. A embargante alega, em síntese, a existência de omissão no acórdão embargado, sustentando que o julgado deixou de examinar: (a) a distinção entre legitimidade processual para habilitação e direito material ao quinhão hereditário; (b) a incidência dos arts. 110, 687 e 688 do CPC, que determinariam a habilitação de todos os herdeiros legítimos; (c) o regime da separação obrigatória de bens aplicável à união estável da agravante, que a excluiria da condição de herdeira em concorrência com os descendentes; e (d) o art. 1.784 do Código Civil, segundo o qual o crédito integra a herança dos herdeiros a partir da morte do credor.\r\n\r\n\r\n\r\n3. Não há omissão quando o acórdão embargado adota fundamento jurídico suficiente e determinante para a solução da controvérsia, ainda que não enfrente individualmente cada argumento suscitado pela parte.\r\n\r\n\r\n\r\n4. A alegação de que o julgado deveria ter examinado as regras gerais de sucessão civil para fins de habilitação processual não configura vício de integração, mas sim pretensão de rediscussão do mérito, inadmissível na via dos embargos de declaração.\r\n\r\n\r\n\r\n5. Embargos de declaração conhecidos e improvidos.", "relatorio": "Trata-se de embargos de declaração opostos pela UNIVERSIDADE FEDERAL DO CEARÁ — UFC contra o acórdão proferido por esta Terceira Turma em 11 de dezembro de 2025, que deu provimento ao agravo de instrumento interposto por RAIMUNDA NONATA CAVALCANTE, determinando sua habilitação como pensionista nos autos do cumprimento de sentença oriundo da ação coletiva nº 0012648-88.1997.4.05.8100, com a divisão do crédito do servidor falecido entre a companheira e os filhos deste.\r\n\r\n\r\n\r\nA embargante alega, em síntese, a existência de omissão no acórdão embargado, sustentando que o julgado deixou de examinar: (a) a distinção entre legitimidade processual para habilitação e direito material ao quinhão hereditário; (b) a incidência dos arts. 110, 687 e 688 do CPC, que determinariam a habilitação de todos os herdeiros legítimos; (c) o regime da separação obrigatória de bens aplicável à união estável da agravante, que a excluiria da condição de herdeira em concorrência com os descendentes; e (d) o art. 1.784 do Código Civil, segundo o qual o crédito integra a herança dos herdeiros a partir da morte do credor.\r\n\r\n\r\n\r\nRequer, ao final, o acolhimento dos embargos com efeitos infringentes, para reformar o acórdão e negar a habilitação da pensionista.\r\n\r\n\r\n\r\nNão foram apresentadas contrarrazões.\r\n\r\n\r\n\r\n É o relatório.\r\n\r\n\r\n\r\nFIM RELATÓRIO", "voto": "A teor do que dispõe o art. 1.022 do Código de Processo Civil, cabem embargos de declaração \"contra qualquer decisão judicial para esclarecer obscuridade ou eliminar contradição; suprir omissão de ponto ou questão sobre o qual devia se pronunciar o juiz de ofício ou a requerimento; e/ou corrigir erro material\".\r\n\r\n\r\n\r\n  O acórdão embargado encontra-se assim ementado:\r\n\r\n\r\n\r\nPROCESSUAL CIVIL. AGRAVO DE INSTRUMENTO. PRECATÓRIO. HABILITAÇÃO DA COMPANHEIRA PENSIONISTA E DOS FILHOS MAIORES. VALORES INSCRITOS EM PRECATÓRIO. LEI Nº 6.858/80 E DECRETO Nº 85.845/81. OBSERVÂNCIA. DIREITO DISPONÍVEL. PROVIMENTO.\r\n\r\n\r\n\r\n1. Agravo de instrumento interposto por RAIMUNDA NONATA CAVALCANTE contra decisão proferida pelo Juízo da 4ª Vara Federal a Seção Judiciária do Ceará que indeferiu o pedido de habilitação como sucessora processual..\r\n\r\n\r\n\r\n2. Conforme dicção da Lei n.º 6.858/80 e do Decreto 85.845/81, os valores devidos, pela União, a servidor público, em razão de cargo ou emprego, serão pagos a seus dependentes habilitados perante a Previdência Social, ou, na sua falta, aos sucessores previstos na lei civil. Precedentes: PROCESSO: 08108494820184058000, AC - Apelação Civel - , DESEMBARGADOR FEDERAL ROGÉRIO FIALHO MOREIRA, 3ª Turma, JULGAMENTO: 24/09/2019; PROCESSO: 08042661620154058400, AC - Apelação Civel - , DESEMBARGADOR FEDERAL ROBERTO MACHADO, 1º Turma, JULGAMENTO: 05/05/2020; PROCESSO: 08090308320194050000, AG - Agravo de Instrumento - , DESEMBARGADOR FEDERAL PAULO ROBERTO DE OLIVEIRA LIMA, 2ª Turma, JULGAMENTO: 04/05/2020; PROCESSO: 08036966820194050000, AG - Agravo de Instrumento - , DESEMBARGADOR FEDERAL MANOEL ERHARDT, 4ª Turma, JULGAMENTO: 25/03/2020; PROCESSO: 08044951420194050000, AG - Agravo de Instrumento - , DESEMBARGADOR FEDERAL CARLOS VINICIUS CALHEIROS NOBRE (CONVOCADO), 4ª Turma, JULGAMENTO: 17/07/2020.\r\n\r\n\r\n\r\n3. Reforça tal entendimento a regra segundo a qual \"Independerá de inventário ou de arrolamento o pagamento dos valores previstos na Lei nº 6.858, de 24 de novembro de 1980.\" (CPC, art. 666).\r\n\r\n\r\n\r\n4. A decisão recorrida encontra-se em desarmonia com o entendimento adotado pela Turma em situações idênticas, razão pela qual deve ser reformada, para se assegurar a habilitação da agravante, única pensionista do autor falecido. Registre-se que, em se tratando de direito disponível, a hipótese é de se deferir o pedido da própria agravante e garantir a divisão do crédito do falecido entre a mesma e os filhos dele.\r\n\r\n\r\n\r\n5. Agravo de instrumento provido.\r\n\r\n\r\n\r\nO acórdão embargado elegeu como fundamento determinante o regime especial e prioritário estabelecido pela Lei nº 6.858/80 para o pagamento de valores devidos pela Administração Pública a servidores falecidos. Esse fundamento, por sua própria natureza, afasta a incidência das normas gerais de direito sucessório civil, tornando impertinente, para fins de solução da controvérsia, o exame das regras do Código Civil sobre ordem de vocação hereditária e regime de bens, bem como das normas processuais que disciplinam a habilitação de herdeiros em sentido estrito.\r\n\r\n\r\n\r\nA Lei nº 6.858/80 não define quem recebe o crédito com base na condição de herdeiro civil, mas sim com base na condição de dependente habilitado perante a Previdência Social. Daí que a análise sobre se a companheira é ou não herdeira nos termos do art. 1.829, I, do Código Civil, ou sobre se o crédito integra ou não a herança nos termos do art. 1.784 do mesmo diploma, é uma discussão que opera em plano normativo diverso daquele eleito pelo acórdão como fundamento da decisão.\r\n\r\n\r\n\r\nNão há, portanto, omissão. Há, sim, divergência da embargante quanto à escolha do regime normativo aplicável ao caso — o que não constitui vício integrativo, mas discordância de mérito.\r\n\r\n\r\n\r\nPosto isso, CONHEÇO E NEGO PROVIMENTO aos embargos de declaração.\r\n\r\n\r\n\r\n É como voto.\r\n\r\n\r\n\r\nFIM VOTO", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\nDecide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, CONHECER E NEGAR PROVIMENTO aos embargos de declaração, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido", "obs_assessor": "﻿", "tem_obs_assessor": false, "assunto": "", "ramo": "Outros", "subgrupo": "", "subclasse": "Embargos de Declaração"}, {"nome": "20260317_035854_Re__VOTO.0008786-80.2025.4.05.0000.VIRTUAL.09.04.2026", "nome_arq": "VOTO.0008786-80.2025.4.05.0000.VIRTUAL.09.04.2026", "cnj": "0008786-80.2025.4.05.0000", "cab": "0008786-80.2025.4.05.0000", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "ANTONIO PALMERY MELO NETO", "adv_polo_ativo": "Não informado", "polo_passivo": "UNIAO FEDERAL\r\n\r\nINICIO RELATORIO", "adv_polo_passivo": "Não informado", "ementa": "ADMINISTRATIVO. AGRAVO DE INSTRUMENTO. EXCEÇÃO DE PRÉ-EXECUTIVIDADE. ACÓRDÃO CONDENATÓRIO DO TCU. PRESCRIÇÃO INTERCORRENTE ADMINISTRATIVA. NECESSIDADE DE DILAÇÃO PROBATÓRIA. IMPROVIMENTO.\r\n\r\n\r\n\r\n1. Agravo de instrumento interposto por ANTÔNIO PALMERY MELO NETO contra decisão proferida pelo Juízo da 13ª Vara Federal da Seção Judiciária de Alagoas que, execução de título extrajudicial movida pela União Federal, rejeitou a exceção de pré-executividade por ela ofertada.\r\n\r\n\r\n\r\n2. O apelante defende que pretensão executória fundamentada no Acórdão n.º 5459/2018-2C -TCU - 2ª Câmara (TC 009.819/2015-0), relativo a Tomada de Contas Especial, não merece prosperar, porquanto teve-se por operada a prescrição da pretensão punitiva estatal, ainda em âmbito administrativo, razão pela qual deve ser acolhida a Exceção de Pré-Executividade. Segundo afirma, transcorreram aproximadamente 06 anos e 05 meses entre a data do fato e a instauração da Tomada de Contas TC 009.819/2015-0 e 07 anos e 11 meses até a citação, enquanto a execução teve início somente após 10 anos e 06 meses, da data do fato, o que claramente evidenciaria a ocorrência da preclusão.\r\n\r\n\r\n\r\n3. Antes da remessa da tomada de contas ao TCU, há uma \"fase interna\" de controle, na qual o órgão repassador dos recursos apura a existência do dano, o valor e a responsabilidade do agente público, tratando-se tal apuração de causa interruptiva do lustro prescricional. Somente depois de concluída essa etapa é que a tomada de contas será enviada ao TCU, a fim de que se dê início a respectiva \"fase externa\", iniciando na data do envio do relatório conclusivo elaborado pelo órgão de controle interno a contagem do prazo prescricional. Precedentes: PROCESSO: 0801086-30.2022.4.05.8308, DESEMBARGADOR FEDERAL ROGÉRIO FIALHO MOREIRA, JULGAMENTO: 08.05.2025; PROCESSO: 0802633-23.2022.4.05.8400, APELAÇÃO CÍVEL; DESEMBARGADOR FEDERAL CONVOCADO RAFAEL CHALEGRE DO RÊGO BARROS, JULGAMENTO: 24,04.2025; PROCESSO: 08011477820234058202, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL CID MARCONI GURGEL DE SOUZA, 3ª TURMA, JULGAMENTO: 31/10/2024.\r\n\r\n\r\n\r\n4. Conforme consignado na decisão agravada, a UNIÃO logrou êxito em demonstrar a existência de uma fase interna de apuração, iniciada ainda em 2009, que sofreu sucessivas interrupções por atos inequívocos de investigação e relatórios de auditoria. Tal circunstância retira da questão a clareza necessária para o manejo da exceção de pré-executividade, a qual exige que a prova seja pré-constituída e irrefutável de plano.\r\n\r\n\r\n\r\n5. Enquanto o recorrente aponta hiatos temporais que supostamente caracterizariam a prescrição ordinária ou intercorrente, a Administração Pública apresenta marcos interruptivos robustos, como o relatório final da fase interna proferido em 28/10/2014.\r\n\r\n\r\n\r\n6. A prescrição não se resume a um cálculo aritmético de datas extremas, ela exige a análise da inércia culposa do Estado, o que não transparece quando há movimentações administrativas sucessivas e devidamente documentadas, ainda que em processos renumerados ou apensados. Assim, quando há controvérsia fática mínima sobre quais atos administrativos teriam o condão de interromper o prazo prescricional, o juízo não pode decidir de forma precária em sede de exceção.\r\n\r\n\r\n\r\n7. A via eleita pelo recorrente, nos moldes como ofertado, se apresenta como um atalho processual que não comporta a profundidade necessária para desconstituir um título executivo que goza de presunção de legitimidade e veracidade, como é o caso das decisões do Tribunal de Contas da União.\r\n\r\n\r\n\r\n8. Agravo de instrumento improvido.", "relatorio": "Trata-se de agravo de instrumento interposto por ANTÔNIO PALMERY MELO NETO contra decisão proferida pelo Juízo da 13ª Vara Federal da Seção Judiciária de Alagoas que, execução de título extrajudicial movida pela União Federal, rejeitou a exceção de pré-executividade por ela ofertada.\r\n\r\n\r\n\r\nNas razões recursais, traz os seguintes argumentos: a) trata-se de Execução de Título Extrajudicial movida pela União em face do agravante, decorrente do Acórdão n.º 5459/2018-2C -TCU - 2ª Câmara (TC 009.819/2015-0) relativo à Tomada de Contas Especial; b) tal pretensão executória não merece prosperar, porquanto, teve-se por operada a prescrição da pretensão punitiva estatal, ainda em âmbito administrativo, razão pela qual este agravante apresentou Exceção de Pré-Executividade ao dia 22/10/2025; c) a simples necessidade de análise de documentos e datas não enseja a inadmissibilidade da Exceção, hipótese cabível quando se demanda dilação probatória, que não é o caso; d) é crucial a concessão da referida tutela com a finalidade de suspender o prosseguimento da presente execução, posto que o agravante, corre o risco de sofrer grave dano de difícil ou incerta reparação, tendo em vista que já foram determinadas medidas de constrição e penhora de seus bens por meios dos sistemas SISBAJUD, RENAJUD E INFOJUD (vide decisão de id. 4058000.13219323), bem como fora efetuada a penhora de bem imóvel rural (Fazenda Sueca, vide Carta Precatória Id. 4058000.15125721).\r\n\r\n\r\n\r\nÉ o relatório.\r\n\r\n\r\n\r\nFIM RELATÓRIO", "voto": "O apelante defende que pretensão executória fundamentada no Acórdão n.º 5459/2018-2C -TCU - 2ª Câmara (TC 009.819/2015-0), relativo a Tomada de Contas Especial, não merece prosperar, porquanto teve-se por operada a prescrição da pretensão punitiva estatal, ainda em âmbito administrativo, razão pela qual deve ser acolhida a Exceção de Pré-Executividade.\r\n\r\n\r\n\r\nSegundo afirma, transcorreram aproximadamente 06 anos e 05 meses entre a data do fato e a instauração da Tomada de Contas TC 009.819/2015-0 e 07 anos e 11 meses até a citação, enquanto a execução teve início somente após 10 anos e 06 meses, da data do fato, o que claramente evidenciaria a ocorrência da preclusão.\r\n\r\n\r\n\r\nA respeito da questão, entretanto, entende-se que, antes da remessa da tomada de contas ao TCU, há uma \"fase interna\" de controle, na qual o órgão repassador dos recursos apura a existência do dano, o valor e a responsabilidade do agente público, tratando-se tal apuração de causa interruptiva do lustro prescricional. Somente depois de concluída essa etapa é que a tomada de contas será enviada ao TCU, a fim de que se dê início a respectiva \"fase externa\", iniciando na data do envio do relatório conclusivo elaborado pelo órgão de controle interno a contagem do prazo prescricional. Precedentes: PROCESSO: 0801086-30.2022.4.05.8308, DESEMBARGADOR FEDERAL ROGÉRIO FIALHO MOREIRA, JULGAMENTO: 08.05.2025; PROCESSO: 0802633-23.2022.4.05.8400, APELAÇÃO CÍVEL; DESEMBARGADOR FEDERAL CONVOCADO RAFAEL CHALEGRE DO RÊGO BARROS, JULGAMENTO: 24,04.2025; PROCESSO: 08011477820234058202, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL CID MARCONI GURGEL DE SOUZA, 3ª TURMA, JULGAMENTO: 31/10/2024.\r\n\r\n\r\n\r\nConforme consignado na decisão agravada, a UNIÃO logrou êxito em demonstrar a existência de uma fase interna de apuração, iniciada ainda em 2009, que sofreu sucessivas interrupções por atos inequívocos de investigação e relatórios de auditoria. Tal circunstância retira da questão a clareza necessária para o manejo da exceção de pré-executividade, a qual exige que a prova seja pré-constituída e irrefutável de plano.\r\n\r\n\r\n\r\nEnquanto o recorrente aponta hiatos temporais que supostamente caracterizariam a prescrição ordinária ou intercorrente, a Administração Pública apresenta marcos interruptivos robustos, como o relatório final da fase interna proferido em 28/10/2014.\r\n\r\n\r\n\r\nA prescrição não se resume a um cálculo aritmético de datas extremas, ela exige a análise da inércia culposa do Estado, o que não transparece quando há movimentações administrativas sucessivas e devidamente documentadas, ainda que em processos renumerados ou apensados.\r\n\r\n\r\n\r\nAssim, quando há controvérsia fática mínima sobre quais atos administrativos teriam o condão de interromper o prazo prescricional, o juízo não pode decidir de forma precária em sede de exceção.\r\n\r\n\r\n\r\nA via eleita pelo recorrente, nos moldes como ofertado, se apresenta como um atalho processual que não comporta a profundidade necessária para desconstituir um título executivo que goza de presunção de legitimidade e veracidade, como é o caso das decisões do Tribunal de Contas da União.\r\n\r\n\r\n\r\nAssim, tenho que o debate sobre a validade e a eficácia de cada ato instrutório mencionado pela exequente deve ser reservado aos embargos à execução, onde o contraditório e a instrução probatória permitem uma cognição exauriente.\r\n\r\n\r\n\r\nPosto isso, NEGO PROVIMENTO ao agravo de instrumento.\r\n\r\n\r\n\r\nÉ como voto.\r\n\r\n\r\n\r\nFIM VOTO", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\nDecide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO ao agravo de instrumento, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido", "obs_assessor": "﻿", "tem_obs_assessor": false, "assunto": "", "ramo": "Administrativo", "subgrupo": "Apelação/Remessa Necessária", "subclasse": ""}, {"nome": "20260317_035909_Re__VOTO.0800176-22.2025.4.05.8106.VIRTUAL.09.04.2026", "nome_arq": "VOTO.0800176-22.2025.4.05.8106.VIRTUAL.09.04.2026", "cnj": "0800176-22.2025.4.05.8106", "cab": "0800176-22.2025.4.05.8106", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "RAIMUNDO ANTONIO DE CARVALHO", "adv_polo_ativo": "Não informado", "polo_passivo": "UNIAO FEDERAL", "adv_polo_passivo": "Não informado", "ementa": "PROCESSUAL CIVIL E ADMINISTRATIVO. CUMPRIMENTO INDIVIDUAL DE SENTENÇA COLETIVA. REAJUSTE DE 28,86%. ABRANGÊNCIA SUBJETIVA DA COISA JULGADA. LIMITAÇÃO AO ESTADO DO MATO GROSSO DO SUL INDEVIDA. LEGITIMIDADE. PRECEDENTES. COMPENSAÇÃO DOS VALORES PAGOS NA VIA ADMINISTRATIVA ASSEGURADA. PROVIMENTO DA APELAÇÃO.\r\n\r\n\r\n\r\n 1. Apelação interposta contra sentença que julgou extinto cumprimento de sentença movido em face da UNIÃO FEDERAL, cujo título judicial é a decisão proferida na Ação Civil Pública n. 0005019-15.1997.4.03.6000, que tramitou na 1ª Vara Federal de Campo Grande/MS e transitou em julgado no dia 02/08/2019, objetivando a exigibilidade atrasados referentes ao reajuste de 28,86%.\r\n\r\n\r\n\r\n2. A hipótese trata de Cumprimento de Sentença individual contra a Fazenda Pública que objetiva o recebimento de valores decorrentes da condenação fixada no título judicial formado na ação civil pública n.º 0005019-15.1997.4.03.6000, que se refere ao índice de 28,86%. A inicial e as demais manifestações apresentadas na Ação Civil Pública executada não evidenciam a sua limitação aos servidores do Mato Grosso do Sul, sendo certo que o MPF autor não restringiu o pedido aos servidores lotados naquela unidade da Federação.\r\n\r\n\r\n\r\n3. A ação civil pública originária não limitou a sua eficácia territorial ao Estado do Mato Grosso do Sul. Pelo contrário, o MPF foi claro ao delinear o objeto da mencionada ACP, abrangendo todos os servidores públicos civis federais, ativos e inativos, bem como pensionistas do quadro de pessoal da União Federal. Nesse sentido: PROCESSO: 08067307520244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL SEBASTIÃO JOSÉ VASQUES DE MORAES, 6ª TURMA, JULGAMENTO: 25/7/2024; PROCESSO: 08075249620244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL FREDERICO WILDSON DA SILVA DANTAS, 7ª TURMA, JULGAMENTO: 13/08/2024; PROCESSO: 08082272720244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL ALEXANDRE LUNA FREIRE, 3ª TURMA, JULGAMENTO: 12/09/2024; PROCESSO: 08176062120244058300, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL CID MARCONI GURGEL DE SOUZA, 3ª TURMA, JULGAMENTO: 30/01/2025.\r\n\r\n\r\n\r\n4. Não pode haver pagamento em duplicidade. Como bem estabelecido na sentença exequenda, no cálculo do valor devido deve ocorrer a compensação  com o reenquadramento concedido pelas Leis 8.622/93 e 8.627/93, bem como a compensação dos valores adimplidos administrativamente, conforme a tese firmada pelo Superior Tribunal de Justiça no enunciado do Tema 1.102.\r\n\r\n\r\n\r\n5. Apelação provida.", "relatorio": "Apelação interposta contra sentença que julgou extinto cumprimento de sentença movido em face da UNIÃO FEDERAL, cujo título judicial é a decisão proferida na Ação Civil Pública n. 0005019-15.1997.4.03.6000, que tramitou na 1ª Vara Federal de Campo Grande/MS e transitou em julgado no dia 02/08/2019, objetivando a exigibilidade atrasados referentes ao reajuste de 28,86%.\r\n\r\n\r\n\r\nEm suas razões recursais, a apelante alega, em síntese, que: a) trata-se de Cumprimento de Sentença individual contra a Fazenda Pública que objetiva o recebimento de valores decorrentes da condenação fixada no título judicial formado na ação civil pública n.º 0005019-15.1997.4.03.6000, que se refere ao índice de 28,86%; b) a sentença recorrida acolheu a alegação de ilegitimidade ativa dos substituídos exequentes que não eram servidores lotados no Mato Grosso do Sul, acolhendo a alegação de que o pedido formulado na lide limitou-se aos servidores dos órgãos do estado do mato grosso do sul; c) seria aplicável à hipótese o que foi decidido pelo STF no julgamento do Tema 1075/STF (inconstitucionalidade do artigo 16 da Lei 7.347/1985); d) não há excesso de execução pois, apesar da falta de documentos comprobatórios dos acordos firmado em juízo suficientes que justifiquem referidos descontos o autor providenciou os cálculos com tal compensação e com os aumentos conferidos pelas leis nos 8.622/93 e 8.627/93, que garantiram revisão geral de remuneração aos servidores públicos federais.\r\n\r\n\r\n\r\nContrarrazões apresentadas.\r\n\r\n\r\n\r\nÉ o relatório.\r\n\r\n\r\n\r\nFIM RELATÓRIO", "voto": "A hipótese trata de Cumprimento de Sentença individual contra a Fazenda Pública que objetiva o recebimento de valores decorrentes da condenação fixada no título judicial formado na ação civil pública n.º 0005019-15.1997.4.03.6000, que se refere ao índice de 28,86%, cujo dispositivo recebeu a seguinte redação:\r\n\r\n\r\n\r\n[...].\r\n\r\n\r\n\r\nDiante do exposto e por mais que dos autos consta, julgo procedente a presente ação para o fim de condenar os réus a incorporar o percentual de 28,86% às remunerações de seus servidores, ativos, inativos e pensionistas, não litigantes em outras ações ou cujas ações estejam suspensas e não firmatários de acordo, a partir de janeiro de 1993, com reflexos, respeitadas as datas de admissões, descontadas as reposições já feitas por força das leis n° 8622/93 e 8627/93. Sem custas e sem honorários. Sentença sujeita ao duplo grau de jurisdição.\r\n\r\n\r\n\r\n[...].\r\n\r\n\r\n\r\nDa leitura do dispositivo da sentença transcrito depreende-se que, de fato, não houve limitação dos efeitos subjetivos da coisa julgada territorialmente.\r\n\r\n\r\n\r\n O TRF da 3ª Região confirmou a sentença, como se observa da parte do voto proferido no respectivo acórdão:\r\n\r\n\r\n\r\n [...]\r\n\r\n\r\n\r\n Feitas tais ponderações, constata-se que o interesse defendido pelo Parquet na presente - direito dos servidores, ativos e inativos, e pensionistas à revisão geral de 28,86% - consiste num direito individual homogêneo disponivel de expressão social, tendo em vista a extraordinária dispersão dos lesados. No particular, cumpre observar que a pretensão deduzida in casu beneficia a todos os servidores públicos civis da esfera federal (ativos, inativos e seus pensionistas), os quais são representados por diversos sindicatos. Não existe uma entidade de classe que represente a todos eles, exatamente em função da extraordinária dispersão dos lesados, o que legitima o Ministério Público Federal a propor esta ação coletiva. A par disso, o enfrentamento da questão aqui debatida em sede de ação coletiva é de todo recomendável, haja vista que, diante da grande quantidade de lesados, a via coletiva evita um sem-número de processos e, consequentemente, a sobrecarga do Poder Judiciário, o que é do interesse de toda a coletividade.\r\n\r\n\r\n\r\n [...]\r\n\r\n\r\n\r\nAs posteriores decisões do STJ e do STF também não impuseram limitação aos efeitos subjetivos da coisa julgada.\r\n\r\n\r\n\r\nAo contrário do que fixado na decisão recorrida, a inicial e as demais manifestações apresentadas na Ação Civil Pública executada não evidenciam a sua limitação aos servidores do Mato Grosso do Sul, sendo certo que o MPF autor não restringiu o pedido aos servidores lotados naquela unidade da Federação.\r\n\r\n\r\n\r\nEm situação em tudo similar à dos autos, este Tribunal Regional Federal da 5ª Região tem entendido que servidores não lotados no Mato Grosso do Sul também têm legitimidade para executar o mesmo título executivo judicial, conforme se observa nos seguintes precedentes:\r\n\r\n\r\n\r\nAGRAVO DE INSTRUMENTO NO NOVO CPC. Os Recursos são definidos pela natureza do ato judicial: Sentença, Decisão Interlocutória ou Despacho. O Agravo de Instrumento, no Código de Processo Civil de 2015, consiste no Recurso que tem por Objeto a Relação Jurídica sobre Decisão Interlocutória, envolvendo tutelas distintas sobre duas situações jurídicas processuais: a Evidência e a Urgência. Não estão dissociadas na Finalidade ou Função do Recurso estritamente definido.\r\n\r\n\r\n\r\n EVIDÊNCIA. Consiste na Situação Jurídica derivada da Relação Jurídica projetando a Pretensão à obtenção do dever jurídico, buscado pela Parte diante de Ato Jurídico Processual, e exposto no conjunto ou variedade de atos confluentes da Lide, da Causa, da Demanda ou dos Pressupostos Processuais. A Interlocução própria da Jurisdição é o princípio a estabelecer diretriz do Processo ou do Recurso, porquanto a Ação é proposta e o Recurso interposto, na dicção precisa de Pontes de Miranda. Os pressupostos Processuais e as Condições da Ação são elementos considerados, em cada etapa ou fase, com Atos Processuais, quando não incorrem, em cada caso, no exame dos Atos meramente ordinatórios, nos simples Despachos. Ou, nas hipóteses terminativas encerrando literalmente a Prestação Jurisdicional de Mérito com a Sentença, e/ou com a Execução.\r\n\r\n\r\n\r\n URGÊNCIA. Como poder-dever cautelar busca no exame da situação, de ato ou fato jurídico, realçar a utilidade da Jurisdição de modo Imediato, a realização do Direito Objetivo e, de modo Mediato, o Direto Subjetivo buscado no Pedido intercorrente para obtenção do Dever Jurídico; a Obrigação de quem de Direito. A Urgência está atinada sempre à Evidência.\r\n\r\n\r\n\r\n Agravo de Instrumento interposto em face de Decisão que desacolheu, em parte, a Impugnação ofertada pela Executada (FUNASA) e determinou a remessa dos autos à Contadoria Judicial para aferição de eventuais valores devidos, a título de diferenças do índice de 28,86%.\r\n\r\n\r\n\r\n No caso, destaca-se da Decisão agravada os seguintes fundamentos, com os quais se compartilha:\r\n\r\n\r\n\r\n \"A executada, FUNDAÇÃO NACIONAL DE SAÚDE - FUNASA, apresentou impugnação ao cumprimento de sentença, alegando ilegitimidade ativa da exequente.\r\n\r\n\r\n\r\n Para tanto, afirma que a autora não comprovou estar lotada no Mato Grosso do Sul entre 1993 e 2001, o que impede a obtenção dos benefícios da ação civil pública.\r\n\r\n\r\n\r\n No entanto, não assiste razão à EXECUTADA.\r\n\r\n\r\n\r\n O dispositivo da ação coletiva n. 0005019-15.1997.4.03.6000 julgou procedente o pedido do Ministério Público Federal nos seguintes termos (id. 30920614):\r\n\r\n\r\n\r\n Diante do exposto e por mais que dos autos consta, julgo procedente a presente ação para o fim de condenar os réus a incorporar o percentual de 28,86% às remunerações de seus servidores, ativos, inativos e pensionistas, não litigantes em outras ações ou cujas ações estejam suspensas e não firmatários de acordo, a partir de janeiro de 1993, com reflexos, respeitadas as datas de admissões, descontadas as reposições já feitas por força das leis n° 8622/93 e 8627/93. Sem custas e sem honorários. Sentença sujeita ao duplo grau de jurisdição.\r\n\r\n\r\n\r\n Como se percebe, o juízo prolator da sentença de primeiro grau não limitou os efeitos subjetivos da coisa julgada territorialmente.\r\n\r\n\r\n\r\n O TRF da 3ª Região confirmou a sentença. Destaco, inclusive, parte do voto proferido no referido acórdão (id. 30920617):\r\n\r\n\r\n\r\n [...]\r\n\r\n\r\n\r\n Feitas tais ponderações, constata-se que o interesse defendido pelo Parquet na presente - direito dos servidores, ativos e inativos, e pensionistas à revisão geral de 28,86% - consiste num direito individual homogêneo disponivel de expressão social, tendo em vista a extraordinária dispersão dos lesados. No particular, cumpre observar que a pretensão deduzida in casu beneficia a todos os servidores públicos civis da esfera federal (ativos, inativos e seus pensionistas), os quais são representados por diversos sindicatos. Não existe uma entidade de classe que represente a todos eles, exatamente em função da extraordinária dispersão dos lesados, o que legitima o Ministério Público Federal a propor esta ação coletiva. A par disso, o enfrentamento da questão aqui debatida em sede de ação coletiva é de todo recomendável, haja vista que, diante da grande quantidade de lesados, a via coletiva evita um sem-número de processos e, consequentemente, a sobrecarga do Poder Judiciário, o que é do interesse de toda a coletividade.\r\n\r\n\r\n\r\n [...]\r\n\r\n\r\n\r\n As decisões do STJ e do STF corroboram o entendimento de que não houve limitação aos efeitos subjetivos da coisa julgada.\r\n\r\n\r\n\r\n Nesse contexto, destaca-se a tese jurídica firmada pelo Supremo Tribunal Federal ao analisar o art. 16 da Lei 7.347/1985 (tema n.º 1.075):\r\n\r\n\r\n\r\nCONSTITUCIONAL E PROCESSO CIVIL. INCONSTITUCIONALIDADE DO ART. 16 DA LEI 7.347/1985, COM A REDAÇÃO DADA PELA LEI 9.494/1997. AÇÃO CIVIL PÚBLICA. IMPOSSIBILIDADE DE RESTRIÇÃO DOS EFEITOS DA SENTENÇA AOS LIMITES DA COMPETÊNCIA TERRITORIAL DO ÓRGÃO PROLATOR. REPERCUSSÃO GERAL. RECURSOS EXTRAORDINÁRIOS DESPROVIDOS. 1. A Constituição Federal de 1988 ampliou a proteção aos interesses difusos e coletivos, não somente constitucionalizando-os, mas também prevendo importantes instrumentos para garantir sua pela efetividade. 2. O sistema processual coletivo brasileiro, direcionado à pacificação social no tocante a litígios meta individuais, atingiu status constitucional em 1988, quando houve importante fortalecimento na defesa dos interesses difusos e coletivos, decorrente de uma natural necessidade de efetiva proteção a uma nova gama de direitos resultante do reconhecimento dos denominados direitos humanos de terceira geração ou dimensão, também conhecidos como direitos de solidariedade ou fraternidade. 3. Necessidade de absoluto respeito e observância aos princípios da igualdade, da eficiência, da segurança jurídica e da efetiva tutela jurisdicional. 4. Inconstitucionalidade do artigo 16 da LACP, com a redação da Lei 9.494/1997, cuja finalidade foi ostensivamente restringir os efeitos condenatórios de demandas coletivas, limitando o rol dos beneficiários da decisão por meio de um critério territorial de competência, acarretando grave prejuízo ao necessário tratamento isonômico de todos perante a Justiça, bem como à total incidência do Princípio da Eficiência na prestação da atividade jurisdicional. 5. RECURSOS EXTRAORDINÁRIOS DESPROVIDOS, com a fixação da seguinte tese de repercussão geral: \"I - É inconstitucional a redação do art. 16 da Lei 7.347/1985, alterada pela Lei 9.494/1997, sendo repristinada sua redação original. II - Em se tratando de ação civil pública de efeitos nacionais ou regionais, a competência deve observar o art. 93, II, da Lei 8.078/1990 (Código de Defesa do Consumidor). III - Ajuizadas múltiplas ações civis públicas de âmbito nacional ou regional e fixada a competência nos termos do item II, firma-se a prevenção do juízo que primeiro conheceu de uma delas, para o julgamento de todas as demandas conexas\". (STF, RE 1.101.937, Relator(a): ALEXANDRE DE MORAES, Tribunal Pleno, julgado em 08/04/2021, PROCESSO ELETRÔNICO REPERCUSSÃO GERAL - MÉRITO DJe-113 DIVULG 11/06/2021 PUBLIC 14/06/2021)\r\n\r\n\r\n\r\n Portanto, é incontestável reconhecer que os efeitos da sentença alcançam a todos os servidores na situação fático-jurídica abordada pela Ação Civil Pública n. 0005019-15.1997.4.03.6000, independentemente, da sua lotação territorial.\r\n\r\n\r\n\r\n Diante disso, rejeito a preliminar de ilegitimidade ativa.\"\r\n\r\n\r\n\r\n Assim, a Agravada possui Legitimidade Ativa, devendo ser afastada a alegação da FUNASA.\r\n\r\n\r\n\r\n Com efeito, a Decisão agravada pontuou \"que me parece razoável, tendo em vista a possibilidade de ocorrência de bis in idem, a continuidade da execução, com a realização dos cálculos relativos à obrigação decorrente do título exequendo e a compensação dos valores adimplidos administrativamente, conforme rubrica específica nas fichas financeiras, verificando-se a existência ou não de saldo a pagar\", ou seja, somente após as Informações da Contadoria Judicial é que se poderá aferir com mais exatidão se existe, ou não, crédito em favor da Exequente (e respectivo montante).\r\n\r\n\r\n\r\n Nesse sentido: Processo nº 08044936820244050000, Agravo de Instrumento, Desembargador Federal Sebastião José Vasques de Moraes, 6ª Turma, Julgamento: 21/05/2024.\r\n\r\n\r\n\r\n Desprovimento do Agravo de Instrumento. (PROCESSO: 08082272720244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL ALEXANDRE LUNA FREIRE, 3ª TURMA, JULGAMENTO: 12/09/2024)\r\n\r\n\r\n\r\nADMINISTRATIVO E PROCESSUAL CIVIL. CUMPRIMENTO DE SENTENÇA CONTRA A FAZENDA PÚBLICA. 28,86%. EFEITOS DA COISA JULGADA. LIMITAÇÃO AO SERVIDORES LOTADOS NA UNIDADE DA FEDERAÇÃO DO ÓRGÃO PROLATOR DA SENTENÇA. AUSÊNCIA DE PREVISÃO NO TÍTULO. LEGITIMIDADE ATIVA DA EXEQUENTE. PROSSEGUIMENTO DA EXECUÇÃO.\r\n\r\n\r\n\r\n1. Apelação interposta pelo Particular em face da sentença que, em sede de cumprimento de sentença contra a Fazenda Pública, acolheu a preliminar de ilegitimidade ativa do exequente e, de consequência, extinguiu o feito, sem resolução do mérito, com fulcro no art. 485, VI, §3º, do CPC.\r\n\r\n\r\n\r\n2. Alega a Apelante, nas razões de apelo, que: a) o título judicial formado nos autos da Ação Coletiva n° 0005019-15.1997.4.03.6000 não limitou os efeitos da coisa julgada aos servidores com domicílio funcional no Mato Grosso do Sul, sendo totalmente possível qualquer servidor ou ex-servidor ser atingido pelo título judicial; b) o STJ e STF já se posicionaram no sentido de que os efeitos de uma sentença proferida em ação civil pública têm abrangência nacional; c) não subsiste a alegação quanto à violação do art. 16, da lei 9494/97, porque o Supremo Tribunal Federal, ao declará-lo inconstitucional, o fez sob a justificativa de se resguardar os direitos individuais homogêneos, prezando pela efetividade da prestação jurisdicional e pela segurança jurídica.\r\n\r\n\r\n\r\n3. O pedido de cumprimento de sentença está fundamentado em título judicial obtido na ação civil pública nº 0005019-15.1997.4.03.6000, que tramitou na 3ª Vara Cível da Seção Judiciária de Campo Grande, em que foi reconhecido o direito à incorporação do percentual de 28,86% dos servidores públicos civis, ativos, inativos e pensionistas.\r\n\r\n\r\n\r\n4. Ao contrário do que alega a agravante, a inicial e as demais manifestações apresentadas na Ação Civil Pública executada não evidenciam a sua limitação aos servidores do Mato Grosso do Sul, sendo certo que o MPF autor não restringiu o pedido aos servidores lotados naquela unidade da Federação.\r\n\r\n\r\n\r\n5. Ao tratar do tema, esta Terceira Turma tem compreendido que a Ação Civil Pública n.º 0005019-15.1997.4.03.6000 não limitou a sua eficácia territorial ao Estado do Mato Grosso do Sul. Pelo contrário, o MPF foi claro ao delinear o objeto da mencionada ACP, abrangendo todos os servidores públicos civis federais, ativos e inativos, bem como pensionistas do quadro de pessoal da União Federal. Confiram-se: Processo nº 08128122520244050000, Agravo de Instrumento, Desembargador Federal Luiz Bispo da Silva Neto (Convocado), 3ª Turma, Julgamento: 05/12/2024; Processo nº 08082272720244050000, Agravo de Instrumento, Desembargador Federal Alexandre Luna Freire, 3ª Turma, Julgamento: 12/09/2024.\r\n\r\n\r\n\r\n6. Outros precedentes deste Tribunal corroborando o entendimento: Processo nº 08108722520244050000, Agravo De Instrumento, Desembargadora Federal Cibele Benevides Guedes Da Fonseca, 5ª Turma, Julgamento: 03/12/2024; Processo nº 08095280920244050000, Agravo De Instrumento, Desembargador Federal Leonardo Augusto Nunes Coutinho, 7ª Turma, Julgamento: 19/11/2024.\r\n\r\n\r\n\r\n7. Sentença reformada para afastar a preliminar de ilegitimidade ativa da exequente. Apelação provida. (PROCESSO: 08176062120244058300, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL CID MARCONI GURGEL DE SOUZA, 3ª TURMA, JULGAMENTO: 30/01/2025)\r\n\r\n\r\n\r\nPROCESSUAL CIVIL E ADMINISTRATIVO. AGRAVO DE INSTRUMENTO. CUMPRIMENTO INDIVIDUAL DE SENTENÇA COLETIVA. ACORDO ADMINISTRATIVO PARA IMPLANTAÇÃO DO REAJUSTE DE 28,86% REMUNERAÇÕES E PROVENTOS DOS SERVIDORES ATIVOS, INATIVOS E PENSIONISTAS DO QUADRO DE PESSOAL DA UNIÃO. LEIS FEDERAIS 8.622/93 E 8.627/93. LIMITAÇÃO NO TÍTULO JUDICIAL. AUSÊNCIA. COMPENSAÇÃO. TEMA 1.102 STJ. AGRAVO DE INSTRUMENTO DESPROVIDO.\r\n\r\n\r\n\r\n1. Trata-se de agravo de instrumento interposto pela Fundação Nacional de Saúde - FUNASA, com pedido de tutela provisória recursal, visando a suspensão de decisão que reconheceu o direito à incorporação do percentual de 28,86% às remunerações e proventos dos servidores ativos, inativos e pensionistas do quadro de pessoal da União, descontadas as reposições salariais já realizadas pelas Leis Federais 8.622/93 e 8.627/93, rejeitando a preliminar de ilegitimidade ativa do agravado e determinando a remessa dos autos à Contadoria.\r\n\r\n\r\n\r\n2. A agravante alega em síntese: a) que o agravado não comprovou estar lotado no Mato Grosso do Sul entre 1993 e 2001, o que impede terminantemente que se beneficie da ação civil pública; b) ilegitimidade ativa do recorrido para a causa, uma vez que a sentença transitada em julgada não beneficia servidores lotados em Estados da Federação que não o Mato Grosso do Sul, obstando, assim, que se dê seguimento ao feito, dada a lotação da parte no Ceará; c) entender de modo diverso implica desrespeitar a coisa julgada, uma vez que a sentença foi prolatada e confirmada sob a égide do art. 16 da LACP, com a redação que lhe deu a Lei nº 9.494/97, sendo defeso aos autores impugnarem essa norma apenas agora, anos depois do trânsito em julgado, na fase de execução; d) possibilidade de dedução dos pagamentos administrativos decorrentes do acordo firmado, comprovados mediante fichas financeiras e extratos SIAPE acostados aos autos, de acordo com a alínea 'b' do tema 1102 do STJ.\r\n\r\n\r\n\r\n3. O cerne do presente recurso consiste em analisar a legitimidade ativa do agravado na ação original, bem como a possibilidade de dedução dos pagamentos administrativos decorrentes do acordo firmado entre as partes.\r\n\r\n\r\n\r\n4. Em relação à ilegitimidade ativa do recorrido, na ação coletiva nº 0005019-15.1997.4.03.6000, em que julgado procedente o pedido do Ministério Público Federal, não foram limitados os efeitos subjetivos da coisa julgada territorialmente.\r\n\r\n\r\n\r\n5. A agravante não demonstrou a probabilidade do direito pleiteado, já que, diversamente do que alega, a ação civil pública originária não limitou a sua eficácia territorial ao Estado do Mato Grosso do Sul. Pelo contrário, o MPF foi claro ao delinear o objeto da mencionada ACP, abrangendo todos os servidores públicos civis federais, ativos e inativos, bem como pensionistas do quadro de pessoal da União Federal. Nesse sentido: PROCESSO: 08067307520244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL SEBASTIÃO JOSÉ VASQUES DE MORAES, 6ª TURMA, JULGAMENTO: 25/7/2024.\r\n\r\n\r\n\r\n6. O juízo de origem determinou o cálculo pela Contadoria Judicial do valor devido ao agravado com o reenquadramento concedido pelas Leis 8.622/93 e 8.627/93, bem como a compensação dos valores adimplidos administrativamente, de modo que impertinente o pedido da parte agravante de dedução dos pagamentos administrativos decorrentes do acordo firmado, que está de acordo com a tese jurídica consagrada pelo Superior Tribunal de Justiça no enunciado do Tema 1.102.\r\n\r\n\r\n\r\n7. Agravo de instrumento desprovido. (PROCESSO: 08075249620244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL FREDERICO WILDSON DA SILVA DANTAS, 7ª TURMA, JULGAMENTO: 13/08/2024)\r\n\r\n\r\n\r\nPROCESSUAL CIVIL E ADMINISTRATIVO. CUMPRIMENTO INDIVIDUAL DE SENTENÇA COLETIVA. ACORDO ADMINISTRATIVO PARA IMPLANTAÇÃO DO REAJUSTE DE 28,86% REMUNERAÇÕES E PROVENTOS DOS SERVIDORES ATIVOS, INATIVOS E PENSIONISTAS DO QUADRO DE PESSOAL DA UNIÃO. LEIS FEDERAIS 8.622/93 E 8.627/93. ABRANGÊNCIA. POSSIBILIDADE. RECURSO DESPROVIDO.\r\n\r\n\r\n\r\n1. Agravo de instrumento com pedido de tutela provisória recursal visando a suspensão de decisão que - em sede de impugnação ao cumprimento de sentença (que reconheceu ao ora recorrido o direito a incorporação do percentual de 28,86% (vinte e oito virgula oitenta e seis por cento) às remunerações e proventos dos servidores ativos, inativos e pensionistas do quadro de pessoal da União, descontadas as reposições salariais já realizadas pelas Leis Federais 8.622/93 e 8.627/93) - rejeitou a preliminar de ilegitimidade ativa de Jose Edilberto Leite Esmeraldo e homologou os cálculos apresentados por este, fixando como devido o valor de R$ 109.206,09 (Planilha de cálculos no id. 4058102.30327346).\r\n\r\n\r\n\r\n2. A FUNASA alegou, em suas razões de recurso: a) que o autor não comprovou estar lotado no Mato Grosso do Sul entre 1993 e 2001, o que impede terminantemente que se beneficie da ação civil pública; b) a ilegitimidade ativa do recorrido para a causa, uma vez que a sentença transitada em julgada não beneficia servidores lotados em outros Estados da Federação que não o Mato Grosso do Sul, obstando, assim, que se dê seguimento ao feito dada a lotação dos autores no Rio Grande do Norte; e c) que entender de modo diverso implica desrespeitar a coisa julgada, uma vez que a r. sentença foi prolatada e confirmada sob a égide do art. 16 da LACP com a redação que lhe deu a Lei nº 9.494/97, sendo defeso aos autores querer impugnar tal norma apenas agora, anos depois do trânsito em julgado e na fase de execução. A matéria se encontra obviamente preclusa.\r\n\r\n\r\n\r\n3. O dispositivo da ação coletiva n. 0005019-15.1997.4.03.6000 julgou procedente o pedido do Ministério Público Federal nos seguintes termos (fl. 09 do id. 4058102.30327338): \"[...] Diante do exposto e por mais que dos autos consta, julgo procedente a presente ação para o fim de condenar os réus a incorporar o percentual de 28,86% às remunerações de seus servidores, ativos, inativos e pensionistas, não litigantes em outras ações ou cujas ações estejam suspensas e não firmatários de acordo, a partir de janeiro de 1993, com reflexos, respeitadas as datas de admissões, descontadas as reposições já feitas por força das leis n° 8622/93 e 8627/93. Sem custas e sem honorários. Sentença sujeita ao duplo grau de jurisdição.\"\r\n\r\n\r\n\r\n4. O juízo prolator da sentença de primeiro grau não limitou os efeitos subjetivos da coisa julgada territorialmente.\r\n\r\n\r\n\r\n5. O TRF da 3ª Região confirmou a sentença, conforme demonstra o acórdão de id. 4058102.30327341.Destaco, inclusive, parte do voto proferido no referido acórdão (Fl. 16 do id. 4058102.30327341): \"[...] Feitas tais ponderações, constata-se que o interesse defendido pelo Parquet na presente - direito dos servidores, ativos e inativos, e pensionistas à revisão geral de 28,86% - consiste num direito individual homogêneo disponivel de expressão social, tendo em vista a extraordinária dispersão dos lesados. No particular, cumpre observar que a pretensão deduzida in casu beneficia a todos os servidores públicos civis da esfera federal (ativos, inativos e seus pensionistas), os quais são representados por diversos sindicatos. Não existe uma entidade de classe que represente a todos eles, exatamente em função da extraordinária dispersão dos lesados, o que legitima o Ministério Público Federal a propor esta ação coletiva. A par disso, o enfrentamento da questão aqui debatida em sede de ação coletiva é de todo recomendável, haja vista que, diante da grande quantidade de lesados, a via coletiva evita um sem-número de processos e, consequentemente, a sobrecarga do Poder Judiciário, o que é do interesse de toda a coletividade [...].\"\r\n\r\n\r\n\r\n6. As decisões dos Tribunais Superiores, STJ e STF, registradas nos acórdãos das páginas 33/36 e 37/40 do id. 4058102.30327341, corroboram o entendimento de que não houve limitação aos efeitos subjetivos da coisa julgada. Nesse contexto, destaca-se a tese jurídica firmada pelo Supremo Tribunal Federal ao analisar o art. 16 da Lei 7.347/1985 (tema n.º 1.075): STF, RE 1.101.937, Relator(a): ALEXANDRE DE MORAES, Tribunal Pleno, julgado em 08/04/2021, PROCESSO ELETRÔNICO REPERCUSSÃO GERAL - MÉRITO DJe-113 DIVULG 11/06/2021 PUBLIC 14/06/2021).\r\n\r\n\r\n\r\n7. É incontestável reconhecer que os efeitos da sentença alcançam a todos os servidores na situação fático-jurídica abordada pela Ação Civil Pública n. 0005019-15.1997.4.03.6000, independentemente, da sua lotação territorial.\r\n\r\n\r\n\r\n8. Ademais, os efeitos da sentença proferida em ação coletiva, em regra, se estendem a todos os titulares do direito oriundo da mesma relação jurídica (erga omnes). Podem, ainda, limitar-se a determinado grupo, categoria ou classe. Em qualquer dos casos, a decisão não fica adstrita aos limites da competência territorial do órgão julgador e é válida para todo o território nacional.\r\n\r\n\r\n\r\n9. No caso, o douto juiz sentenciante de forma bastante acertada fez ver que tanto no decisum proferido na Ação de Cumprimento de Sentença quanto no Acórdão do TRF da 3ª Região, não restaram limitados os efeitos subjetivos da coisa julgada territorialmente. O Tribunal confirmou a sentença que trouxe o seguinte dispositivo: \"[...] Diante do exposto e por mais que dos autos consta, julgo procedente a presente ação para o fim de condenar os réus a incorporar o percentual de 28,86% às remunerações de seus servidores, ativos, inativos e pensionistas, não litigantes em outras ações ou cujas ações estejam suspensas e não firmatários de acordo, a partir de janeiro de 1993, com reflexos, respeitadas as datas de admissões, descontadas as reposições já feitas por força das leis n° 8622/93 e 8627/93. Sem custas e sem honorários. Sentença sujeita ao duplo grau de jurisdição\"\r\n\r\n\r\n\r\n10. Destaca-se, por oportuno, trecho do voto que ensejou o referido acórdão: \"[...] Feitas tais ponderações, constata-se que o interesse defendido pelo Parquet na presente - direito dos servidores, ativos e inativos, e pensionistas à revisão geral de 28,86% - consiste num direito individual homogêneo disponivel de expressão social, tendo em vista a extraordinária dispersão dos lesados. No particular, cumpre observar que a pretensão deduzida in casu beneficia a todos os servidores públicos civis da esfera federal (ativos, inativos e seus pensionistas), os quais são representados por diversos sindicatos. Não existe uma entidade de classe que represente a todos eles, exatamente em função da extraordinária dispersão dos lesados, o que legitima o Ministério Público Federal a propor esta ação coletiva. A par disso, o enfrentamento da questão aqui debatida em sede de ação coletiva é de todo recomendável, haja vista que, diante da grande quantidade de lesados, a via coletiva evita um sem-número de processos e, consequentemente, a sobrecarga do Poder Judiciário, o que é do interesse de toda a coletividade [...].\"\r\n\r\n\r\n\r\n11. Evidente que o agravante não demonstrou a probabilidade do direito pleiteado, já que, diversamente do que alega a ação civil pública originária não limitou a sua eficácia territorial ao Estado do Mato Grosso do Sul. Muito pelo contrário, o MPF foi claro ao delinear o objeto da mencionada ACP, abrangendo todos os servidores públicos civis federais, ativos e inativos, bem como pensionistas do quadro de pessoal da União Federal.\r\n\r\n\r\n\r\n12. Agravo de instrumento desprovido. (PROCESSO: 08044936820244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL SEBASTIÃO JOSÉ VASQUES DE MORAES, 6ª TURMA, JULGAMENTO: 21/05/2024)\r\n\r\n\r\n\r\nDestaque-se, por fim, que não pode haver pagamento em duplicidade. Como bem estabelecido na sentença exequenda, no cálculo do valor devido deve ocorrer a compensação com o reenquadramento concedido pelas Leis 8.622/93 e 8.627/93, bem como a compensação dos valores adimplidos administrativamente, conforme a tese firmada pelo Superior Tribunal de Justiça no enunciado do Tema 1.102, verbis:\r\n\r\n\r\n\r\n“I) É possível a comprovação de transação administrativa, relativa ao pagamento da vantagem de 28,86%, por meio de fichas financeiras ou documento expedido pelo Sistema Integrado de Administração de Recursos Humanos - SIAPE, conforme art. 7º, § 2º, da MP 1.962-33/2000, reproduzida na vigente MP 2.169-43/2001, apenas em relação a acordos firmados posteriormente à sua vigência.\r\n\r\n\r\n\r\nII) Quando não for localizado o instrumento de transação devidamente homologado, e buscando impedir o enriquecimento ilícito, os valores recebidos administrativamente, a título de 28,86%, demonstrados por meio dos documentos expedidos pelo SIAPE, devem ser deduzidos da quantia apurada, com as atualizações pertinentes.”\r\n\r\n\r\n\r\nA sentença recorrida, assim, merece ser anulada, garantindo-se o prosseguimento do cumprimento individual de sentença.\r\n\r\n\r\n\r\nCom tais considerações, DOU PROVIMENTO à apelação.\r\n\r\n\r\n\r\n É como voto.\r\n\r\n\r\n\r\nFIM VOTO", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\nDecide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, DAR PROVIMENTO à apelação, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido", "obs_assessor": "﻿", "tem_obs_assessor": false, "assunto": "", "ramo": "Administrativo", "subgrupo": "Apelação/Remessa Necessária", "subclasse": ""}, {"nome": "20260317_035942_Re__VOTO.0081792-70.2025.4.05.8100.VIRTUAL.ED.09.04.2026", "nome_arq": "VOTO.0081792-70.2025.4.05.8100.VIRTUAL.ED.09.04.2026", "cnj": "0081792-70.2025.4.05.8100", "cab": "0081792-70.2025.4.05.8100", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "MARIA MARGARIDA DA SILVA", "adv_polo_ativo": "Não informado", "polo_passivo": "UNIAO FEDERAL", "adv_polo_passivo": "Não informado", "ementa": "EMBARGOS DE DECLARAÇÃO. CUMPRIMENTO INDIVIDUAL DE SENTENÇA COLETIVA. REAJUSTE DE 28,86%. ABRANGÊNCIA SUBJETIVA DA COISA JULGADA. LIMITAÇÃO AO ESTADO DO MATO GROSSO DO SUL INDEVIDA. LEGITIMIDADE. OMISSÃO INEXISTENTE. REDISCUSSÃO INCABÍVEL. IMPROVIMENTO.\r\n\r\n\r\n\r\n1. Embargos de declaração opostos pela UNIÃO FEDERAL em face de acórdão que deu provimento à apelação do particular, assegurando o prosseguimento do cumprimento de sentença, cujo título judicial é a decisão proferida na Ação Civil Pública n. 0005019-15.1997.4.03.6000, que tramitou na 1ª Vara Federal de Campo Grande/MS e transitou em julgado no dia 02/08/2019, objetivando a exigibilidade atrasados referentes ao reajuste de 28,86%.\r\n\r\n\r\n\r\n2. A embargante afirma que o acórdão foi omisso quanto à alegação de que seria irrelevante, para a lide, o que foi decidido no Tema 1075/STF (inconstitucionalidade do artigo 16 da Lei 7.347/1985), porque, além de a própria inicial proposta pelo Ministério Público Federal e demais manifestações apresentadas na Ação Civil Pública executada evidenciarem a limitação do pedido de reajuste de 28,86% apenas aos servidores do Mato Grosso do Sul (princípio da congruência), a decisão do Tema 1075/STF foi muito superveniente ao ajuizamento da ACP n. 0005019-15.1997.4.03.6000 (de 1997), e posterior ainda ao trânsito em julgado do título formado na ACP (ocorrido em 02/08/2019).\r\n\r\n\r\n\r\n3. A recorrente argumenta, ainda, que o acórdão ora embargado, ao julgar o recurso, foi omisso quanto a questões essenciais ao deslinde da controvérsia, positivadas nas normas a seguir referidas: a) art. 16 da Lei nº 7.347/1985, alterada pela Lei nº 9.494/1997; art. 24 do Decreto-Lei nº 4.657/1942; arts. 2º, 5º, 322, §2º, 489, § 3º, 492, 485, VI, § 3º, 502, 503 e 507, 535, II, todos do CPC/2015 (ilegitimidade, pela limitação territorial incidente e pela realização do acordo administrativo); art. 1º do Decreto n° 20.910/32; art. 204 do Código Civil; e arts. 487, II, 535, VI, ambos do CPC; b) arts. 5º, XXXVI, LIII, LIV e LV; 22, I, 37, \"caput\", X; e 93, IX, todos da CF/88 (ilegitimidade pela limitação territorial incidente).\r\n\r\n\r\n\r\n4. A embargante também alega que a questão da ilegitimidade da parte adversa atrai a controvérsia objeto do Tema 1302/STJ, que busca \"definir, caso não limitado expressamente na sentença, se todos os servidores da categoria são legitimados para propor o cumprimento individual de sentença decorrente de ação coletiva proposta por sindicato, independentemente de filiação ou de constar em lista\".\r\n\r\n\r\n\r\n5 O acórdão foi claro ao fixar que, ao contrário do que alega a agravante, a inicial e as demais manifestações apresentadas na Ação Civil Pública executada não evidenciam a sua limitação aos servidores do Mato Grosso do Sul, sendo certo que o MPF autor não restringiu o pedido aos servidores lotados naquela unidade da Federação. O acórdão também foi exato ao fixar ser incabível a pretensão de aplicar a regra do artigo 16 da Lei nº 7.347/85, com a redação dada pela Lei 9.494/1997, cuja inconstitucionalidade foi declarara pelo STF.\r\n\r\n\r\n\r\n6. Inexistindo determinação de sobrestamento, não há que se alterar o julgado em razão da alegação de que a questão da ilegitimidade da parte adversa atrai a controvérsia objeto do Tema 1302/STJ.\r\n\r\n\r\n\r\n7. Embargos de declaração conhecidos e improvidos.", "relatorio": "Embargos de declaração opostos pela UNIÃO FEDERAL em face de acórdão que deu provimento à apelação do particular, assegurando o prosseguimento do cumprimento de sentença, cujo título judicial é a decisão proferida na Ação Civil Pública n. 0005019-15.1997.4.03.6000, que tramitou na 1ª Vara Federal de Campo Grande/MS e transitou em julgado no dia 02/08/2019, objetivando a exigibilidade atrasados referentes ao reajuste de 28,86%.\r\n\r\n\r\n\r\nA embargante afirma que o acórdão foi omisso quanto à alegação de que seria irrelevante, para a lide, o que foi decidido no Tema 1075/STF (inconstitucionalidade do artigo 16 da Lei 7.347/1985), porque, além de a própria inicial proposta pelo Ministério Público Federal e demais manifestações apresentadas na Ação Civil Pública executada evidenciarem a limitação do pedido de reajuste de 28,86% apenas aos servidores do Mato Grosso do Sul (princípio da congruência), a decisão do Tema 1075/STF foi muito superveniente ao ajuizamento da ACP n. 0005019-15.1997.4.03.6000 (de 1997), e posterior ainda ao trânsito em julgado do título formado na ACP (ocorrido em 02/08/2019).\r\n\r\n\r\n\r\nA recorrente argumenta, ainda, que o acórdão ora embargado, ao julgar o recurso, foi omisso quanto a questões essenciais ao deslinde da controvérsia, positivadas nas normas a seguir referidas: a) art. 16 da Lei nº 7.347/1985, alterada pela Lei nº 9.494/1997; art. 24 do Decreto-Lei nº 4.657/1942; arts. 2º, 5º, 322, §2º, 489, § 3º, 492, 485, VI, § 3º, 502, 503 e 507, 535, II, todos do CPC/2015 (ilegitimidade, pela limitação territorial incidente e pela realização do acordo administrativo); art. 1º do Decreto n° 20.910/32; art. 204 do Código Civil; e arts. 487, II, 535, VI, ambos do CPC; b) arts. 5º, XXXVI, LIII, LIV e LV; 22, I, 37, \"caput\", X; e 93, IX, todos da CF/88 (ilegitimidade pela limitação territorial incidente).\r\n\r\n\r\n\r\nA embargante também alega que a questão da ilegitimidade da parte adversa atrai a controvérsia objeto do Tema 1302/STJ, que busca \"definir, caso não limitado expressamente na sentença, se todos os servidores da categoria são legitimados para propor o cumprimento individual de sentença decorrente de ação coletiva proposta por sindicato, independentemente de filiação ou de constar em lista\".\r\n\r\n\r\n\r\nContrarrazões apresentadas.\r\n\r\n\r\n\r\nÉ o relatório.", "voto": "A teor do que dispõe o art. 1.022 do Código de Processo Civil, cabem embargos de declaração \"contra qualquer decisão judicial para esclarecer obscuridade ou eliminar contradição; suprir omissão de ponto ou questão sobre o qual devia se pronunciar o juiz de ofício ou a requerimento; e/ou corrigir erro material\".\r\n\r\n\r\n\r\nDe acordo com o parágrafo único do mesmo dispositivo legal, considera-se omissa a decisão que \"deixe de se manifestar sobre tese firmada em julgamento de casos repetitivos ou em incidente de assunção de competência aplicável ao caso sob julgamento; e incorra em qualquer das condutas descritas no art. 489, § 1º. Este dispositivo, por seu turno, não considera fundamentada qualquer decisão judicial, seja ela interlocutória, sentença ou acórdão, que:\r\n\r\n\r\n\r\nI - se limitar à indicação, à reprodução ou à paráfrase de ato normativo, sem explicar sua relação com a causa ou a questão decidida;\r\n\r\n\r\n\r\nII - empregar conceitos jurídicos indeterminados, sem explicar o motivo concreto de sua incidência no caso;\r\n\r\n\r\n\r\nIII - invocar motivos que se prestariam a justificar qualquer outra decisão;\r\n\r\n\r\n\r\nIV - não enfrentar todos os argumentos deduzidos no processo capazes de, em tese, infirmar a conclusão adotada pelo julgador;\r\n\r\n\r\n\r\nV - se limitar a invocar precedente ou enunciado de súmula, sem identificar seus fundamentos determinantes nem demonstrar que o caso sob julgamento se ajusta àqueles fundamentos;\r\n\r\n\r\n\r\nVI - deixar de seguir enunciado de súmula, jurisprudência ou precedente invocado pela parte, sem demonstrar a existência de distinção no caso em julgamento ou a superação do entendimento.\r\n\r\n\r\n\r\nO acórdão embargado encontra-se assim ementado:\r\n\r\n\r\n\r\n PROCESSUAL CIVIL E ADMINISTRATIVO. CUMPRIMENTO INDIVIDUAL DE SENTENÇA COLETIVA. REAJUSTE DE 28,86%. ABRANGÊNCIA SUBJETIVA DA COISA JULGADA. LIMITAÇÃO AO ESTADO DO MATO GROSSO DO SUL INDEVIDA. LEGITIMIDADE. PRECEDENTES. COMPENSAÇÃO DOS VALORES PAGOS NA VIA ADMINISTRATIVA ASSEGURADA. PROVIMENTO DA APELAÇÃO.\r\n\r\n\r\n\r\n 1. Apelação interposta contra sentença que julgou extinto cumprimento de sentença movido em face da União Federal, cujo título judicial é a decisão proferida na Ação Civil Pública n. 0005019-15.1997.4.03.6000, que tramitou na 1ª Vara Federal de Campo Grande/MS e transitou em julgado no dia 02/08/2019, objetivando a exigibilidade atrasados referentes ao reajuste de 28,86%.\r\n\r\n\r\n\r\n 2. A hipótese trata de Cumprimento de Sentença individual contra a Fazenda Pública que objetiva o recebimento de valores decorrentes da condenação fixada no título judicial formado na ação civil pública n.º 0005019-15.1997.4.03.6000, que se refere ao índice de 28,86%. A inicial e as demais manifestações apresentadas na Ação Civil Pública executada não evidenciam a sua limitação aos servidores do Mato Grosso do Sul, sendo certo que o MPF autor não restringiu o pedido aos servidores lotados naquela unidade da Federação.\r\n\r\n\r\n\r\n 3. A ação civil pública originária não limitou a sua eficácia territorial ao Estado do Mato Grosso do Sul. Pelo contrário, o MPF foi claro ao delinear o objeto da mencionada ACP, abrangendo todos os servidores públicos civis federais, ativos e inativos, bem como pensionistas do quadro de pessoal da União Federal. Nesse sentido: PROCESSO: 08067307520244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL SEBASTIÃO JOSÉ VASQUES DE MORAES, 6ª TURMA, JULGAMENTO: 25/7/2024; PROCESSO: 08075249620244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL FREDERICO WILDSON DA SILVA DANTAS, 7ª TURMA, JULGAMENTO: 13/08/2024; PROCESSO: 08082272720244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL ALEXANDRE LUNA FREIRE, 3ª TURMA, JULGAMENTO: 12/09/2024; PROCESSO: 08176062120244058300, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL CID MARCONI GURGEL DE SOUZA, 3ª TURMA, JULGAMENTO: 30/01/2025.\r\n\r\n\r\n\r\n 4. Não pode haver pagamento em duplicidade. Como bem estabelecido na sentença exequenda, no cálculo do valor devido deve ocorrer a compensação com o reenquadramento concedido pelas Leis 8.622/93 e 8.627/93, bem como a compensação dos valores adimplidos administrativamente, conforme a tese firmada pelo Superior Tribunal de Justiça no enunciado do Tema 1.102.\r\n\r\n\r\n\r\n 5. Apelação provida.\r\n\r\n\r\n\r\nDa leitura da ementa transcrita, depreende-se não haver omissão a ser sanada.\r\n\r\n\r\n\r\nO acórdão foi claro ao fixar que, ao contrário do que alega a agravante, a inicial e as demais manifestações apresentadas na Ação Civil Pública executada não evidenciam a sua limitação aos servidores do Mato Grosso do Sul, sendo certo que o MPF autor não restringiu o pedido aos servidores lotados naquela unidade da Federação. Além disso, o acórdão também deixou evidente que não pode haver pagamento em duplicidade, pois no cálculo do valor devido deve ocorrer a compensação com o reenquadramento concedido pelas Leis 8.622/93 e 8.627/93, bem como a compensação dos valores adimplidos administrativamente, conforme a tese firmada pelo Superior Tribunal de Justiça no enunciado do Tema 1.102.\r\n\r\n\r\n\r\nConclui-se que a parte embargante deseja rediscutir questões efetivamente apreciadas por ocasião do julgamento que originou o acórdão ora questionado. Frise-se, entretanto, que embargos de declaração, ainda que opostos para fins de prequestionamento, não se prestam a este fim.\r\n\r\n\r\n\r\nEm face do exposto, CONHEÇO E NEGO PROVIMENTO aos embargos de declaração.\r\n\r\n\r\n\r\nÉ como voto.", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\n Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, CONHECER E NEGAR PROVIMENTO aos embargos de declaração do particular, sem atribuição de efeitos modificativos, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido", "obs_assessor": "﻿\r\n\r\n Poder Judiciário\r\n\r\n Tribunal Regional Federal da 5ª Região\r\n\r\n Gabinete do Desembargador Federal Rogério Fialho Moreira", "tem_obs_assessor": true, "assunto": "", "ramo": "Outros", "subgrupo": "", "subclasse": "Embargos de Declaração"}, {"nome": "20260317_141407_Re__VOTO.0809492-62.2020.4.05.8000.VIRTUAL.09.04.2026", "nome_arq": "VOTO.0809492-62.2020.4.05.8000.VIRTUAL.09.04.2026", "cnj": "0809492-62.2020.4.05.8000", "cab": "0809492-62.2020.4.05.8000", "assessor": "Ariel C. Santana", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "ESTADO DE ALAGOAS", "adv_polo_ativo": "Não informado", "polo_passivo": "MARIA ROSA DE ARAUJO SANTOS", "adv_polo_passivo": "JOAO FELIPE LITRENTA - AL11031", "ementa": "ADMINISTRATIVO. CONSTITUCIONAL. AGRAVO INTERNO. DIREITO À SAÚDE. HONORÁRIOS SUCUMBENCIAIS. APRECIAÇÃO EQUITATIVA. TEMA 1313/STJ. AGRAVO INTERNO IMPROVIDO.\r\n\r\n\r\n\r\n 1. Agravo interno interposto por MARIA ROSA DE ARAUJO SANTOS em face de decisão que deu parcial provimento ao Recurso de Apelação do Estado de Alagoas para, aplicando o entendimento firmado pelo STJ no julgamento do Tema 1.313, fixar os honorários advocatícios de sucumbência em R$ 3.000,00 (três mil reais), pro rata, nos termos do art. 85, §8º, do CPC/2015.\r\n\r\n\r\n\r\n 2. A agravante requer a reforma da decisão agravada sob o argumento de que houve redução da verba honorária de R$ 5.000,00 (cinco mil reais) para R$ 3.000,00 (três mil reais) sem que houvesse pedido do recorrente nesse sentido e sobre matéria já preclusa, configurando um julgamento extra petita e uma clara violação aos limites do efeito devolutivo do recurso. Sustenta, ademais, que ainda que se argumente que os honorários advocatícios constituem matéria de ordem pública, tal tese não autoriza a atuação ex officio do órgão julgador em qualquer cenário, especialmente para se sobrepor à preclusão e ao efeito devolutivo.\r\n\r\n\r\n\r\n 3. Não se verifica, no caso concreto, qualquer distinção relevante que permita afastar a aplicação do precedente vinculante firmado pelo STJ. Conforme consignado na decisão agravada, a Primeira Seção do Superior Tribunal de Justiça, em 11/06/2025, publicou o acórdão de julgamento do mérito relativo ao Tema 1.313 (REsp 2.169.102/AL e REsp 2.166.690/RN), firmando a tese de que “Nas demandas em que se pleiteia do Poder Público a satisfação do direito à saúde, os honorários advocatícios devem ser fixados por apreciação equitativa, sem aplicação do art. 85, § 8º-A, do CPC”. Nesse cenário, considerando que a presente demanda versa sobre pretensão voltada à concretização do direito fundamental à saúde em face do Poder Público, aplicou-se a orientação jurisprudencial firmada pelo Superior Tribunal de Justiça no precedente repetitivo a fim de reduzir a verba honorária anteriormente fixada na sentença, no valor de R$ 5.000,00 (cinco mil reais), para R$ 3.000,00 (três mil reais),  pro rata, em conformidade com o critério equitativo previsto no art. 85, § 8º, do CPC.\r\n\r\n\r\n\r\n 4. Não prospera, igualmente, a alegação de que teria havido julgamento extra petita em razão de suposta preclusão da matéria relativa aos honorários advocatícios. Na sentença inicialmente proferida, o juízo de primeiro grau julgou procedentes os pedidos da parte autora, ora agravante, e fixou os honorários advocatícios em 10% (dez por cento) sobre o valor da causa. Inconformado, o Estado de Alagoas interpôs recurso de apelação, no qual impugnou expressamente a verba honorária, requerendo a aplicação do critério de apreciação equitativa e a redução dos valores impostos. Posteriormente, ainda em primeiro grau de jurisdição, a União Federal opôs embargos de declaração em face da sentença recorrida. Ao apreciar os aclaratórios, o magistrado alterou a forma de fixação da verba honorária, afastando o critério percentual anteriormente adotado e estabelecendo-a por apreciação equitativa, no montante de R$ 5.000,00 (cinco mil reais).\r\n\r\n\r\n\r\n 5. Tal circunstância não implica a preclusão da matéria devolvida ao Tribunal por meio da apelação, pois a decisão que julga os embargos de declaração não constitui pronunciamento judicial autônomo, mas possui o efeito de integrar ou complementar o julgado anterior, formando com este um único ato jurisdicional. Desse modo, o recurso anteriormente interposto passa a se dirigir automaticamente à decisão tal como integrada pelos embargos de declaração, permanecendo hígido o pedido recursal de revisão da verba honorária. Ao apreciar a apelação, o TRF5 limitou-se a examinar o pedido de redução da verba honorária expressamente formulado pelo Estado de Alagoas, inexistindo qualquer extrapolação dos limites da devolução recursal. Não há que se falar, portanto, em julgamento extra petita, uma vez que a decisão proferida permaneceu adstrita ao objeto devolvido ao Tribunal pelo recurso, consistente na revisão da verba honorária fixada na origem.\r\n\r\n\r\n\r\n 6. Tratando-se de decisão fundada em precedente vinculante, eventual impugnação somente poderia prosperar mediante a demonstração concreta da existência de distinção relevante entre o caso paradigma e a situação fática em exame, circunstância que não se verificou. A agravante limitou-se a reiterar argumentos já enfrentados, sem apontar qualquer situação excepcional apta a afastar a incidência da tese firmada pelo Superior Tribunal de Justiça.\r\n\r\n\r\n\r\n 7. Agravo interno improvido.", "relatorio": "Trata-se de agravo interno interposto por MARIA ROSA DE ARAUJO SANTOS em face de decisão que deu parcial provimento ao Recurso de Apelação do Estado de Alagoas para, aplicando o entendimento firmado pelo STJ no julgamento do Tema 1.313, fixar os honorários advocatícios de sucumbência em R$ 3.000,00 (três mil reais), pro rata, nos termos do art. 85, §8º, do CPC/2015.\r\n\r\n\r\n\r\n A agravante requer a reforma da decisão agravada sob o argumento de que houve redução da verba honorária de R$ 5.000,00 (cinco mil reais) para R$ 3.000,00 (três mil reais) sem que houvesse pedido do recorrente nesse sentido e sobre matéria já preclusa, configurando um julgamento extra petita e uma clara violação aos limites do efeito devolutivo do recurso. Sustenta, ademais, que ainda que se argumente que os honorários advocatícios constituem matéria de ordem pública, tal tese não autoriza a atuação ex officio do órgão julgador em qualquer cenário, especialmente para se sobrepor à preclusão e ao efeito devolutivo.\r\n\r\n\r\n\r\n Sem contrarrazões.\r\n\r\n\r\n\r\n É o relatório.", "voto": "A decisão agravada findou por dar parcial provimento ao Recurso de Apelação do Estado de Alagoas para, aplicando o entendimento firmado pelo STJ no julgamento do Tema 1.313, fixar os honorários advocatícios de sucumbência em R$ 3.000,00 (três mil reais), pro rata, nos termos do art. 85, §8º, do CPC/2015.\r\n\r\n\r\n\r\n Em que pese o esforço argumentativo do recorrente, não se verifica, no caso concreto, qualquer distinção relevante que permita afastar a aplicação do precedente vinculante firmado pelo STJ. Conforme consignado na decisão agravada, a Primeira Seção do Superior Tribunal de Justiça, em 11/06/2025, publicou o acórdão de julgamento do mérito relativo ao Tema 1.313 (REsp 2.169.102/AL e REsp 2.166.690/RN), firmando a tese de que “Nas demandas em que se pleiteia do Poder Público a satisfação do direito à saúde, os honorários advocatícios devem ser fixados por apreciação equitativa, sem aplicação do art. 85, § 8º-A, do CPC”.\r\n\r\n\r\n\r\n Nesse cenário, considerando que a presente demanda versa sobre pretensão voltada à concretização do direito fundamental à saúde em face do Poder Público, aplicou-se a orientação jurisprudencial firmada pelo Superior Tribunal de Justiça no precedente repetitivo a fim de reduzir a verba honorária anteriormente fixada na sentença, no valor de R$ 5.000,00 (cinco mil reais), para R$ 3.000,00 (três mil reais), pro rata, em conformidade com o critério equitativo previsto no art. 85, § 8º, do CPC.\r\n\r\n\r\n\r\n Não prospera, igualmente, a alegação de que teria havido julgamento extra petita em razão de suposta preclusão da matéria relativa aos honorários advocatícios.\r\n\r\n\r\n\r\n Na sentença inicialmente proferida (Id. 4835215), o juízo de primeiro grau julgou procedentes os pedidos da parte autora, ora agravante, e fixou os honorários advocatícios em 10% (dez por cento) sobre o valor da causa. Inconformado, o Estado de Alagoas interpôs recurso de apelação, no qual impugnou expressamente a verba honorária, requerendo a aplicação do critério de apreciação equitativa e a redução dos valores impostos.\r\n\r\n\r\n\r\n Posteriormente, ainda em primeiro grau de jurisdição, a União Federal opôs embargos de declaração em face da sentença recorrida. Ao apreciar os aclaratórios, o magistrado alterou a forma de fixação da verba honorária, afastando o critério percentual anteriormente adotado e estabelecendo-a por apreciação equitativa, no montante de R$ 5.000,00 (cinco mil reais).\r\n\r\n\r\n\r\n Todavia, tal circunstância não implica a preclusão da matéria devolvida ao Tribunal por meio da apelação, pois a decisão que julga os embargos de declaração não constitui pronunciamento judicial autônomo, mas possui o efeito de integrar ou complementar o julgado anterior, formando com este um único ato jurisdicional. Desse modo, o recurso anteriormente interposto passa a se dirigir automaticamente à decisão tal como integrada pelos embargos de declaração, permanecendo hígido o pedido recursal de revisão da verba honorária.\r\n\r\n\r\n\r\n Assim, ao apreciar a apelação, esta Corte limitou-se a examinar o pedido de redução da verba honorária expressamente formulado pelo Estado de Alagoas, inexistindo qualquer extrapolação dos limites da devolução recursal. Não há que se falar, portanto, em julgamento extra petita, uma vez que a decisão proferida permaneceu adstrita ao objeto devolvido ao Tribunal pelo recurso, consistente na revisão da verba honorária fixada na origem.\r\n\r\n\r\n\r\n Ressalte-se, por fim, que, tratando-se de decisão fundada em precedente vinculante, eventual impugnação somente poderia prosperar mediante a demonstração concreta da existência de distinção relevante entre o caso paradigma e a situação fática em exame, circunstância que não se verificou. A agravante limitou-se a reiterar argumentos já enfrentados, sem apontar qualquer situação excepcional apta a afastar a incidência da tese firmada pelo Superior Tribunal de Justiça.\r\n\r\n\r\n\r\n É possível observar, portanto, que a decisão agravada encontra-se em conformidade com o entendimento firmado no julgamento do repetitivo, devendo ser mantida em sua integralidade.\r\n\r\n\r\n\r\n Ante o exposto, NEGO PROVIMENTO ao agravo interno.\r\n\r\n\r\n\r\n É como voto.", "acordao": "Vistos, etc.\r\n\r\n\r\n\r\n Decide a 3ª Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO ao Agravo Interno, nos termos do voto do relator e na forma do relatório constante dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido", "obs_assessor": "﻿\r\n\r\n Minuta revisada por Evellyn Barbosa\r\n\r\n Att.,\r\n\r\n Ariel Campos\r\n\r\n Residente Jurídica\r\n\r\n Poder Judiciário\r\n\r\n Tribunal Regional Federal da 5ª Região\r\n\r\n Gabinete do Desembargador Federal Rogério Fialho Moreira", "tem_obs_assessor": true, "assunto": "", "ramo": "Administrativo", "subgrupo": "Apelação/Remessa Necessária", "subclasse": "Agravo Interno"}, {"nome": "20260317_141538_Re__VOTO.ED.0813148-97.2022.4.05.0000.VIRTUAL.09.04.2026", "nome_arq": "VOTO.ED.0813148-97.2022.4.05.0000.VIRTUAL.09.04.2026", "cnj": "0813148-97.2022.4.05.0000", "cab": "0813148-97.2022.4.05.0000", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "Ok", "tem_comentario": false, "tipo": "Virtual", "data": "09.04.2026", "classe": "", "polo_ativo": "UNIAO FEDERAL", "adv_polo_ativo": "Não informado", "polo_passivo": "MAURICIO PINTO LUCAS GOMES e outros (9)", "adv_polo_passivo": "Não informado", "ementa": "PROCESSUAL CIVIL. EMBARGOS DE DECLARAÇÃO. AGRAVO DE INSTRUMENTO. JUROS DE MORA. COISA JULGADA. JUÍZO DE RETRATAÇÃO. TEMAS 1.170 E 1.361 DO STF. OMISSÃO NÃO CONFIGURADA. TÍTULO EXECUTIVO FORMADO EM 2015 EM DESACORDO COM O ENTENDIMENTO DO STF SOBRE A QUESTÃO. IMPROVIMENTO.\r\n\r\n\r\n\r\n 1. Embargos de declaração opostos por MAURICIO PINTO LUCAS GOMES e outros contra o acórdão proferido por esta 3ª Turma em 02 de outubro de 2025, que, em juízo de retratação determinado por despacho da Vice-Presidência do TRF5, deu provimento ao agravo de instrumento interposto pela UNIÃO FEDERAL, para adequar o julgamento às teses firmadas pelo Supremo Tribunal Federal nos Temas 1.170 e 1.361 de repercussão geral.\r\n\r\n\r\n\r\n 2. O acórdão embargado consignou que o julgamento anterior desta Turma — que negara provimento ao agravo de instrumento da União, preservando a aplicação dos juros de mora de 0,5% ao mês fixados no título executivo judicial — encontrava-se em desarmonia com as teses vinculantes do STF, razão pela qual promoveu a adequação e deu provimento ao recurso, sem estabelecer ressalvas ou delimitar o alcance temporal da retratação.\r\n\r\n\r\n\r\n 3. Os embargantes alegam, em síntese, a existência de duas omissões no julgado: a) o acórdão embargado deixou de considerar que o título executivo que fixou os juros de mora de 0,5% ao mês não é a sentença da ação de conhecimento, transitada em julgado em 1999, mas a sentença proferida nos Embargos à Execução n.º 0006211-30.2003.4.05.8000, cujo trânsito em julgado ocorreu em 2015 — fato que já havia sido expressamente reconhecido por esta Turma em acórdão anterior nos presentes autos. Sustentam que, como a Lei n.º 11.960/2009 já vigorava quando da formação do título executivo, não há legislação superveniente a autorizar a revisão da coisa julgada pela via da retratação, o que afastaria a aplicabilidade dos Temas 1.170 e 1.361 ao caso concreto; b) o acórdão deixou de delimitar o período de incidência da Taxa SELIC, introduzida pela EC n.º 113/2021, a qual somente pode alcançar o período posterior a 09/12/2021, data de sua vigência. Aduzem que os cálculos exequendos possuem data-base fixada em dezembro de 2019, razão pela qual a aplicação retroativa da SELIC violaria o princípio da irretroatividade das normas.\r\n\r\n\r\n\r\n 3. A sentença transitada em julgado em 2015 (sentença dos embargos à execução, que deve ser considerada sentença de mérito) afastou-se da regra do art. 1º-F da Lei n. 9.494/1997, na redação dada pela Lei n. 11.960/2009, fixando os juros de mora em 0,5% ao mês.\r\n\r\n\r\n\r\n 4. A fixação dos juros de mora em 0,5% ao mês, assim, afastou-se do entendimento jurisprud
