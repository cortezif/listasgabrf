mos do art. 917, §3º e §4º, II, do CPC, a matéria não deve ser conhecida.\r\r\n\r\r\n Por fim, no tocante aos honorários advocatícios, não se verifica qualquer ilegalidade. Não houve cobrança de honorários por “via administrativa ou pré-processual”. A verba foi fixada judicialmente, em percentual de 10% sobre o valor da causa, em conformidade com os parâmetros legais, não havendo motivo para sua redução.\r\r\n\r\r\n Ante o exposto, NEGO PROVIMENTO ao agravo de instrumento, mantendo a decisão recorrida.\r\r\n\r\r\n É como voto.", "acordao": "Vistos, etc.\r\r\n\r\r\n  Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO ao agravo de instrumento, nos termos do voto do relator, na forma do relatório constante dos autos, que fica fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido"}, {"nome": "20260317_193923_Re__VOTO.ED.0800315-32.2024.4.05.8001.VIRTUAL.26.03.2026", "cnj": "0800315-32.2024.4.05.8001", "cab": "APELAÇÃO CÍVEL (198) Nº 0800315-32.2024.4.05.8001", "assessor": "Wellington dos Santos Santana", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "PROCESSUAL CIVIL. EMBARGOS DE DECLARAÇÃO. ART. 1.022 DO CPC. OMISSÃO RECONHECIDA PELO SUPERIOR TRIBUNAL DE JUSTIÇA. REJULGAMENTO DOS ACLARATÓRIOS. RESPONSABILIDADE CIVIL. BLOQUEIO DE VALORES EM EXECUÇÃO FISCAL. DEMORA NA TRANSFERÊNCIA PARA CONTA JUDICIAL. ART. 854, § 5º, DO CPC. DEVER DO JUÍZO E ÔNUS DE DILIGÊNCIA DO EXEQUENTE. INEXISTÊNCIA DE EXCLUSÃO DA RESPONSABILIDADE. INTEGRAÇÃO DA FUNDAMENTAÇÃO SEM ALTERAÇÃO DO RESULTADO. EMBARGOS ACOLHIDOS SEM EFEITOS INFRINGENTES.\r\r\n\r\r\n 1. Rejulgamento de embargos de declaração opostos pela ANS com fundamento no art. 1.022 do CPC, em cumprimento à determinação do Superior Tribunal de Justiça que reconheceu omissão quanto ao exame da tese fundada no art. 854, § 5º, do CPC.\r\r\n\r\r\n 2. No caso, os autos revelam que houve bloqueio de valores em 06/08/2019 no curso de execução fiscal em desfavor da executada Unimed Metropolitana do Agreste Cooperativa de Trabalho Médico, sendo que a transferência para conta judicial vinculada ao processo somente ocorreu em 30/03/2023, mantendo-se o montante, durante esse período, sem a devida atualização monetária, o que resultou em prejuízo material à parte executada. A controvérsia judicial reside em definir a quem deve ser atribuída a responsabilidade pela demora na transferência dos valores bloqueados em execução fiscal para conta judicial vinculada ao processo, discutindo-se se tal encargo recai exclusivamente sobre o juízo da execução, à luz do art. 854, § 5º, do CPC, como sustenta a ANS, ou se também incumbe ao exequente o dever de agir de forma diligente para requerer e acompanhar a efetivação da transferência, respondendo pelos prejuízos decorrentes da inércia no impulso do feito.\r\r\n\r\r\n 3. A sentença julgou procedente o pedido para condenar a Agência Nacional de Saúde Suplementar ao pagamento de indenização por danos materiais, correspondente à atualização monetária dos valores bloqueados no período compreendido entre a constrição e a efetiva transferência para conta judicial, em razão do prejuízo suportado pela parte autora.\r\r\n\r\r\n 4. Na apelação e nos embargos de declaração, a ANS sustentou que a demora na transferência dos valores bloqueados não lhe poderia ser imputada, pois, nos termos do art. 854, § 5º, do CPC, caberia ao juízo da execução determinar a transferência do montante para conta vinculada, defendendo a inexistência de responsabilidade por eventual mora. O acórdão da apelação, contudo, concluiu que incumbia ao exequente requerer a transferência e acompanhar o andamento da execução, reconhecendo a responsabilidade civil pela ausência de atuação diligente, entendimento mantido no julgamento dos primeiros embargos de declaração, sem que, todavia, houvesse enfrentamento expresso e específico da tese vinculada ao art. 854, § 5º, do CPC, conforme suscitada pela Agência.\r\r\n\r\r\n 5. Contra os acórdãos que julgaram a apelação e os embargos de declaração, a ANS interpôs recurso especial, ao qual foi dado provimento, em decisão monocrática posteriormente confirmada em agravo interno, para reconhecer a violação ao art. 1.022 do CPC, em razão da ausência de enfrentamento de questão relevante suscitada pela parte, determinando o retorno dos autos para novo julgamento dos embargos de declaração, com apreciação expressa da tese fundada no art. 854, § 5º, do Código de Processo Civil.\r\r\n\r\r\n 6. Omissão configurada, uma vez que não houve enfrentamento expresso da tese fundada no art. 854, § 5º e da alegação de que a transferência do montante bloqueado para conta judicial seria atribuição exclusiva do juízo da execução, o que afastaria a responsabilidade da exequente.\r\r\n\r\r\n 7. O art. 854, § 5º, do CPC atribui ao magistrado a determinação da transferência do valor bloqueado para conta judicial, mas não afasta o dever do exequente de impulsionar a execução, requerer a providência e acompanhar sua efetivação, não sendo possível imputar exclusivamente ao juízo a demora na conversão do bloqueio em depósito judicial nem afastar a responsabilidade pelos prejuízos decorrentes da inércia da parte interessada.\r\r\n\r\r\n 8. Assim, a demora na transferência do numerário, bloqueado em 06/08/2019 e apenas convertido em depósito judicial em 30/03/2023, período em que permaneceu sem a devida atualização, não pode ser imputada exclusivamente ao juízo, pois, embora a formalização da transferência dependa de determinação judicial, incumbia ao exequente requerer a providência e acompanhar de forma efetiva o andamento da execução, adotando as medidas necessárias para evitar a inércia do procedimento, razão pela qual subsiste sua responsabilidade pela ausência de atuação útil e diligente, que contribuiu diretamente para o prejuízo suportado pela parte executada.\r\r\n\r\r\n 9. Integração da fundamentação para enfrentar expressamente a tese suscitada, sem modificação das conclusões do acórdão que negou provimento à apelação e do acórdão que rejeitou os embargos de declaração.\r\r\n\r\r\n 10. Embargos de declaração acolhidos, sem efeitos infringentes.", "relatorio": "Trata-se de embargos de declaração opostos pela Agência Nacional de Saúde Suplementar contra acórdão desta 3ª Turma que negou provimento à apelação e manteve a sentença que julgou procedente o pedido de indenização por danos materiais formulado por Unimed Metropolitana do Agreste Cooperativa de Trabalho Médico, em razão da perda monetária incidente sobre valores bloqueados em execução fiscal e apenas posteriormente transferidos para conta judicial. Consta do acórdão embargado que o bloqueio ocorreu em 06/08/2019 e que a transferência para conta judicial somente foi efetivada em 30/03/2023, permanecendo o montante sem a atualização esperada nesse intervalo.\r\r\n\r\r\n Nos embargos de declaração, a ANS sustentou a existência de omissão no julgamento. Afirmou, em síntese, que a demora na transferência dos valores indisponibilizados não poderia ser imputada à autarquia, porque o art. 854, § 5º, do Código de Processo Civil atribui ao juízo da execução o dever de determinar a transferência do montante bloqueado para conta vinculada ao processo. Defendeu, por isso, que a responsabilidade pela mora seria exclusiva do juízo da execução fiscal. Esse foi o fundamento central deduzido nos aclaratórios.\r\r\n\r\r\n Os embargos foram anteriormente rejeitados por esta Eg. 3ª Turma ao fundamento de que o acórdão já havia adotado entendimento segundo o qual caberia ao exequente requerer a transferência do valor bloqueado e acompanhar o curso da execução, não se mostrando suficiente, portanto, a alegação da embargante para modificar a conclusão adotada.\r\r\n\r\r\n Contra esse julgamento foi interposto recurso especial.\r\r\n\r\r\n No exame do recurso especial, o Superior Tribunal de Justiça, em decisão monocrática, reconheceu a violação do art. 1.022 do Código de Processo Civil, ao fundamento de que o Tribunal de origem deixou de enfrentar, de forma expressa, questão relevante suscitada pela parte, consistente na alegação de que, nos termos do art. 854, § 5º, do CPC, caberia ao juízo da execução determinar a transferência do montante bloqueado para conta vinculada ao processo.\r\r\n\r\r\n Essa conclusão foi posteriormente confirmada pelo próprio Tribunal no julgamento do agravo interno interposto pela Unimed Metropolitana do Agreste Cooperativa de Trabalho Médico, ocasião em que se manteve a determinação de retorno dos autos para novo julgamento dos embargos de declaração, com o devido enfrentamento da matéria apontada como omitida, sem prejuízo da manutenção ou não do resultado anteriormente adotado.\r\r\n\r\r\n É o relatório.\r\r\n\r\r\n APELAÇÃO CÍVEL (198) Nº 0800315-32.2024.4.05.8001\r\r\n\r\r\n APELANTE: AGENCIA NACIONAL DE SAUDE SUPLEMENTAR\r\r\n\r\r\n APELADO: UNIMED METROPOLITANA DO AGRESTE COOPERATIVA DE TRABALHO MEDICO\r\r\n\r\r\n ADVOGADO do(a) APELADO: MANOEL ROBERTO CALHEIROS CORREIA - AL3234-A", "voto": "Conheço dos embargos de declaração.\r\r\n\r\r\n O Superior Tribunal de Justiça, em decisão monocrática depois confirmada no julgamento do agravo interno interposto pela Unimed Metropolitana do Agreste Cooperativa de Trabalho Médico, reconheceu que houve violação ao art. 1.022 do Código de Processo Civil, porque este Tribunal não havia enfrentado de modo expresso uma questão considerada relevante para o deslinde da controvérsia. Segundo a compreensão firmada naquela instância, a tese deduzida pela ANS na apelação e renovada nos embargos de declaração dizia respeito à interpretação do art. 854, § 5º, do CPC, no ponto em que atribui ao juiz da execução a determinação de transferência do montante bloqueado para conta vinculada ao juízo. A partir dessa premissa, determinou-se o retorno dos autos para novo julgamento dos aclaratórios, com exame explícito da alegação omitida. Veja-se a conclusão firmada pelo Superior Tribunal de Justiça:\r\r\n\r\r\n [...]\r\r\n\r\r\n Portanto, o Tribunal de origem não analisou a alegação da ANS, constante da apelação e dos embargos de declaração, no sentido de que \"conforme o art. 854, §5º, do Código de Processo Civil, cabe ao juiz da execução determinar a transferência do montante tornado indisponível para conta vinculada ao juízo da execução\".\r\r\n\r\r\n À vista desse cenário, vislumbro tratar-se de questão relevante, oportunamente suscitadas e que, se acolhidas, poderiam levar o julgamento a um resultado diverso do proclamado. Ademais, a não apreciação das teses, à luz dos dispositivos constitucional e infraconstitucional indicados a tempo e modo, impede o acesso à instância extraordinária.\r\r\n\r\r\n Assim, em que pesem as alegações trazidas, os argumentos apresentados são insuficientes para desconstituir a decisão impugnada.\r\r\n\r\r\n [...]\r\r\n\r\r\n Cumpre, portanto, suprir essa omissão.\r\r\n\r\r\n A ANS sustenta, em essência, que não lhe pode ser imputada responsabilidade pela demora na transferência dos valores bloqueados, porque o art. 854, § 5º, do CPC estabelece que cabe ao juiz da execução determinar a transferência do montante tornado indisponível para conta vinculada ao processo. Afirma, por isso, que a mora seria exclusiva do juízo da execução fiscal, o que afastaria tanto a sua responsabilidade subjetiva quanto a objetiva. Essa foi, de fato, a tese apresentada na apelação. No recurso de apelação, a autarquia alegou expressamente que a transferência dependia de ordem judicial e que, por esse motivo, não poderia responder por indenização decorrente de ato praticado no cumprimento da lei. Também sustentou que o bloqueio judicial foi pressuposto para os embargos à execução e que não haveria falta de diligência de sua parte.\r\r\n\r\r\n No acórdão que julgou a apelação, esta Turma assentou alguns pontos que continuam íntegros e que precisam ser lidos em conjunto.\r\r\n\r\r\n O primeiro é que houve um dado objetivo e incontroverso nos autos. O bloqueio foi realizado em 06/08/2019 e os valores somente foram transferidos para conta judicial em 30/03/2023. O segundo é que o valor transferido em 2023 foi exatamente o mesmo valor bloqueado em 2019, sem a remuneração que seria devida no período. O terceiro é que, à luz da orientação então adotada, cabia ao exequente requerer a transferência do montante bloqueado para conta vinculada à execução e acompanhar o processo, porque a execução tramita no interesse do credor. Com base nisso, concluiu-se que o executado não poderia suportar o prejuízo decorrente da falta de atuação útil do exequente e que estavam presentes os requisitos da responsabilidade civil da Administração, nos termos do art. 37, § 6º, da Constituição.\r\r\n\r\r\n Já o acórdão que julgou os primeiros embargos de declaração registrou corretamente qual era a tese da ANS. Nele ficou consignado que a autarquia alegava omissão quanto ao argumento de que a culpa pela mora seria exclusiva do juízo da execução fiscal, justamente porque o art. 854, § 5º, do CPC atribui ao juiz o dever de determinar a transferência do valor bloqueado para conta vinculada ao juízo. Também constou, naquele julgamento, que o entendimento adotado no acórdão da apelação era o de que cabia ao exequente, de forma diligente, requerer a transferência e acompanhar o processo, não sendo possível transferir ao executado os efeitos negativos da omissão do credor. O que faltou, porém, foi o enfrentamento direto e mais desenvolvido da relação entre essa regra do art. 854, § 5º, do CPC e a responsabilidade civil reconhecida no caso concreto.\r\r\n\r\r\n É precisamente essa lacuna que agora se supre.\r\r\n\r\r\n Entendo que a omissão realmente existiu, porque a tese da ANS merecia resposta expressa e individualizada.\r\r\n\r\r\n Isso, contudo, não leva à modificação do resultado.\r\r\n\r\r\n O art. 854, § 5º, do CPC dispõe que compete ao juiz da execução determinar a transferência do montante tornado indisponível para conta vinculada ao juízo. Essa norma define quem pratica o ato judicial formal de conversão da indisponibilidade em depósito judicial. Ela disciplina a mecânica processual da transferência. O dispositivo, porém, não autoriza concluir que toda demora ocorrida entre o bloqueio e a efetiva transferência deva ser automaticamente imputada, de forma exclusiva, ao órgão jurisdicional, nem afasta o dever processual da parte exequente de impulsionar a execução, requerer as providências cabíveis e acompanhar a efetivação da medida constritiva que atua em seu próprio benefício.\r\r\n\r\r\n Essa distinção é decisiva. Uma coisa é a competência formal do juiz para ordenar a transferência. Outra, bem diferente, é o ônus da parte interessada de provocar a prática desse ato, fiscalizar o andamento da execução e impedir que a constrição fique inerte por anos sem a conversão em depósito judicial. O processo executivo não se move em abstrato. Ele é conduzido em proveito do credor e depende, em larga medida, de iniciativa útil de quem tem interesse direto na satisfação do crédito. Foi exatamente isso que o acórdão da apelação afirmou ao registrar que cabe ao exequente requerer a transferência do montante bloqueado e acompanhar o processo, não podendo o executado arcar com o prejuízo gerado pela inércia do credor.\r\r\n\r\r\n Por isso, a leitura proposta pela ANS para o art. 854, § 5º, do CPC é incompleta. O dispositivo não elimina o dever de diligência do exequente. Tampouco transforma a atuação judicial em fato exclusivo de terceiro apto, por si só, a romper o nexo causal. O que a norma diz é que a transferência será determinada pelo juiz. Ela não diz que o credor está dispensado de requerer a providência, de acompanhar sua concretização ou de responder pelos efeitos da ausência de impulso processual quando a execução segue em seu interesse.\r\r\n\r\r\n Essa conclusão também afasta a alegação de que não se poderia imputar à ANS, nem subjetiva nem objetivamente, indenização decorrente de ato praticado no cumprimento da lei.\r\r\n\r\r\n  O fundamento da condenação não foi a simples formulação do pedido de bloqueio, que em si mesmo é legítimo. O fundamento foi a omissão posterior na condução útil da execução, omissão essa que permitiu que o valor permanecesse indisponível por longo período sem ser convertido em depósito judicial apto a receber a atualização legalmente prevista. Em outras palavras, o dano não decorreu do bloqueio regular. Decorreu do prolongamento injustificado da situação, sem a providência necessária para que o montante fosse transferido e remunerado adequadamente. Essa foi a razão pela qual o acórdão da apelação reconheceu a existência de dano material e nexo causal, aplicando o art. 37, § 6º, da Constituição.\r\r\n\r\r\n Também não procede a afirmação de que o bloqueio foi apenas um pressuposto processual para os embargos à execução e que, por isso, não haveria falta de diligência da ANS. Ainda que o bloqueio tivesse função de garantia do juízo, o dado relevante para esta causa é outro. O valor permaneceu por extenso lapso temporal sem a conversão em depósito judicial e sem a remuneração correspondente. Essa realidade objetiva foi reconhecida no acórdão da apelação e não foi infirmada pela parte embargante. O ponto central, portanto, não está em saber se o bloqueio podia ou não ocorrer, mas em verificar quem deveria atuar para evitar que a constrição, já efetivada, permanecesse inerte e economicamente prejudicial ao executado. A resposta continua sendo a mesma. Competia ao exequente, beneficiário direto da execução, agir de forma diligente para requerer e acompanhar a transferência.\r\r\n\r\r\n É verdade que o primeiro acórdão dos embargos de declaração afirmou, de forma sintética, que o argumento da embargante não era suficiente para infirmar o entendimento adotado, e que eventual desconstituição dos fundamentos do julgado exigiria o recurso cabível. Essa conclusão, no mérito, estava correta. O que faltou foi a explicitação do porquê.\r\r\n\r\r\n  Agora o ponto fica claro. A tese baseada no art. 854, § 5º, do CPC foi examinada e rejeitada porque o dispositivo trata da atribuição formal do juiz para ordenar a transferência, mas não elimina o dever processual de diligência do exequente nem afasta o nexo causal reconhecido entre a omissão da ANS e a perda material suportada pela parte autora. Nesse aspecto, portanto, o acórdão dos embargos deve ser mantido em sua conclusão, embora com fundamentação agora integrada e expressamente desenvolvida.\r\r\n\r\r\n Também permanece íntegra a fundamentação do acórdão da apelação no ponto em que reconheceu a responsabilidade civil da ANS. Aquele julgado assentou que estavam presentes a conduta omissiva, o dano indenizável e o nexo entre ambos. Não houve ali responsabilização automática da Administração por qualquer atraso processual. Houve responsabilização pela falta de atuação útil em execução proposta e conduzida em seu próprio interesse, o que permitiu que o valor bloqueado permanecesse sem a devida transferência e sem a remuneração correspondente por período expressivo. A referência ao art. 37, § 6º, da Constituição, portanto, não se mostra incompatível com o art. 854, § 5º, do CPC. Um dispositivo disciplina a forma de prática do ato judicial. O outro rege as consequências patrimoniais da atuação ou omissão administrativa quando presente dano e nexo causal.\r\r\n\r\r\n Assim, a correspondência entre os pronunciamentos fica estabelecida de modo claro. O STJ entendeu que houve omissão porque a tese fundada no art. 854, § 5º, do CPC, embora suscitada na apelação e reiterada nos embargos, não foi enfrentada de modo explícito. Os acórdãos desta Turma, por sua vez, já continham a premissa central de que competia ao exequente requerer a transferência do valor e acompanhar a execução. O que se faz agora é apenas completar a fundamentação, esclarecendo que a atribuição judicial prevista no art. 854, § 5º, do CPC não exclui esse dever de diligência do credor nem afasta a responsabilidade pelos danos gerados pela sua inércia processual. Por isso, a omissão é suprida sem alteração do resultado.\r\r\n\r\r\n Diante disso, acolho os embargos de declaração apenas para suprir a omissão apontada, com integração da fundamentação, sem efeitos modificativos, mantendo integralmente as conclusões do acórdão que negou provimento à apelação e do acórdão que rejeitou os embargos de declaração.\r\r\n\r\r\n É como voto.", "acordao": "Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, DAR PROVIMENTO AOS EMBARGOS DE DECLARAÇÃO, nos termos do voto do relator e na forma do relatório constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\r\n\r\r\n Des. Federal ROGÉRIO FIALHO MOREIRA\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Provido", "css": "provido"}, {"nome": "20260317_193926_Re__VOTO.0801663-54.2025.4.05.8000.VIRTUAL.26.03.2026", "cnj": "0801663-54.2025.4.05.8000", "cab": "APELAÇÃO CÍVEL (198) Nº 0801663-54.2025.4.05.8000", "assessor": "Wellington dos Santos Santana", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "DIREITO ADMINISTRATIVO E EDUCACIONAL. AÇÃO ANULATÓRIA DE ATO ADMINISTRATIVO. APELAÇÃO CÍVEL. RECONHECIMENTO DE DIPLOMA ESTRANGEIRO. AUTOTUTELA ADMINISTRATIVA. DECADÊNCIA ADMINISTRATIVA (ART. 54 DA LEI Nº 9.784/1999). INSTAURAÇÃO TEMPESTIVA DE PROCEDIMENTO REVISIONAL. IMPUGNAÇÃO FORMAL DO ATO. AUTONOMIA UNIVERSITÁRIA (ART. 207 DA CF). REAVALIAÇÃO DE COMPATIBILIDADE DE CURSO. EXIGÊNCIA DE EQUIVALÊNCIA SUBSTANCIAL. PRESENCIALIDADE, CONTINUIDADE E NÃO CONDENSAÇÃO DO CURSO. AUSÊNCIA DE COMPROVAÇÃO. INEXISTÊNCIA DE RETROATIVIDADE NORMATIVA ILÍCITA. PRINCÍPIOS DA LEGALIDADE, SEGURANÇA JURÍDICA E PROTEÇÃO DA CONFIANÇA. SÚMULA 473 DO STF. MANUTENÇÃO DA SENTENÇA. DESPROVIMENTO DO RECURSO.\r\r\n\r\r\n 1. Apelação cível interposta por Marcia Kelly da Silva Rodrigues contra a sentença proferida pelo Juízo da 1ª Vara Federal de Alagoas que julgou improcedente o pedido formulado na ação, objetivando a reforma do decisum para (i) reconhecer a decadência administrativa do direito da UFRJ de anular o ato de reconhecimento de seu diploma estrangeiro e (ii) afastar a reanálise de compatibilidade de curso fundada em nova interpretação normativa superveniente, com a consequente preservação/restabelecimento da validade do reconhecimento do título.\r\r\n\r\r\n 2. Na origem, trata-se de ação anulatória proposta em face de universidade federal, visando ao reconhecimento da decadência administrativa e à invalidação do ato que desconstituiu o reconhecimento do diploma anteriormente concedido. A recorrente sustenta que teve seu diploma de Mestrado em Educação reconhecido pela UFRJ em 29/01/2019, após cumprir integralmente as exigências do procedimento administrativo. Afirma que, somente em 27/03/2024 - portanto, após o transcurso de mais de cinco anos - ocorreu o cancelamento do reconhecimento no âmbito do SEI, o que caracterizaria a decadência administrativa, nos termos do art. 54 da Lei nº 9.784/1999. Argumenta, ainda, que a Carta nº 001/2020 (PR2/UFRJ) possui natureza meramente informativa e genérica, não se qualificando como ato de impugnação apto a interromper o prazo decadencial.\r\r\n\r\r\n 3. Nesse sentido, colhe-se dos autos a narrativa de que o diploma foi reconhecido em 29/01/2019, tendo sido instaurado procedimento revisional em 22/01/2020 e formalizada a anulação em 27/03/2024, após reavaliação da compatibilidade do curso estrangeiro com os critérios exigidos pela instituição.\r\r\n\r\r\n 4. A sentença concluiu pela inexistência de decadência administrativa e pela legalidade do ato de anulação, reconhecendo a atuação legítima da Administração no exercício da autotutela.\r\r\n\r\r\n 5. A recorrente, então, sustenta a ocorrência de decadência administrativa, sob o argumento de que a Administração teria ultrapassado o prazo quinquenal para anular o ato, bem como a ilegalidade da reavaliação do diploma com base em interpretação normativa superveniente, em afronta à segurança jurídica e ao ato jurídico perfeito.\r\r\n\r\r\n 6. A controvérsia consiste em verificar: (i) se houve decadência administrativa no exercício do poder de autotutela; e (ii) se a revisão do reconhecimento do diploma configurou aplicação retroativa indevida de nova interpretação normativa ou legítima reavaliação de compatibilidade do curso.\r\r\n\r\r\n 7. No tocante à decadência, o art. 54 da Lei nº 9.784/1999 estabelece prazo quinquenal para anulação de atos favoráveis, considerando-se exercido o direito com a adoção de medida administrativa inequívoca de impugnação (§ 2º). Demonstrado que a revisão foi instaurada dentro do prazo, mediante ato formal de impugnação, não se exige a conclusão do processo no quinquênio, afastando-se a decadência.\r\r\n\r\r\n 8. Quanto ao mérito, a autonomia universitária assegura às instituições competência para avaliar a equivalência de diplomas estrangeiros, nos termos do art. 207 da Constituição e da legislação educacional aplicável. A reavaliação realizada baseou-se em elementos técnico-fáticos que evidenciaram a ausência de comprovação de que o curso foi realizado em regime presencial, contínuo e não condensado, requisitos indispensáveis à equivalência com cursos stricto sensu nacionais.\r\r\n\r\r\n 9. A revisão administrativa não configura retroatividade normativa ilícita, mas exercício legítimo de controle de legalidade, diante da constatação de incompatibilidade substancial do curso com os padrões exigidos, inexistindo direito adquirido a ato administrativo eivado de ilegalidade.\r\r\n\r\r\n 10. Exercido o poder de autotutela dentro do prazo legal, mediante instauração tempestiva de procedimento revisional, e constatada a ausência de equivalência substancial do curso estrangeiro, impõe-se a manutenção da anulação do reconhecimento do diploma.\r\r\n\r\r\n 11. Apelação desprovida. Majoração dos honorários recursais para R$ 1.200,00, mantida a suspensão de exigibilidade em razão da gratuidade da justiça.", "relatorio": "Trata-se de apelação cível interposta por Marcia Kelly da Silva Rodrigues contra a sentença proferida pelo Juízo da 1ª Vara Federal de Alagoas que julgou improcedente o pedido formulado na ação, objetivando a reforma do decisum para (i) reconhecer a decadência administrativa do direito da UFRJ de anular o ato de reconhecimento de seu diploma estrangeiro e (ii) afastar a reanálise de compatibilidade de curso fundada em nova interpretação normativa superveniente, com a consequente preservação/restabelecimento da validade do reconhecimento do título.\r\r\n\r\r\n Alega a recorrente que obteve o reconhecimento, pela UFRJ, de seu diploma de Mestrado em Educação em 29/01/2019, após aprovação em todas as etapas do procedimento administrativo; que, apenas em 27/03/2024, mais de cinco anos depois, sobreveio o cancelamento do reconhecimento no SEI, o que configuraria decadência administrativa à luz do art. 54 da Lei nº 9.784/1999. Aduz que a Carta nº 001/2020 (PR2/UFRJ) teria caráter meramente genérico e informativo, não constituindo impugnação válida apta a interromper o prazo decadencial.\r\r\n\r\r\n No mérito, afirma que a universidade, a pretexto de \"revisão\", operou verdadeira nova análise de compatibilidade de curso, lastreada em mudança interpretativa superveniente -- exigindo comprovação de curso 100% presencial, contínuo e não-condensado -- inexistente nas normas aplicáveis ao tempo do reconhecimento (Resolução CNE/CES nº 3/2016 e Portaria Normativa MEC nº 22/2016), as quais orientam a equivalência por \"valor formativo\" e dispensam cotejo estrito de currículos e cargas horárias. Sustenta que a retroatividade dessa nova interpretação viola a segurança jurídica, o ato jurídico perfeito (CF, art. 5º, XXXVI) e o art. 2º, XIII, da Lei nº 9.784/1999 e que a autonomia universitária encontra limites nos princípios da legalidade e da proteção da confiança.\r\r\n\r\r\n Invoca, ainda, julgados em casos análogos e sustenta que a Administração tem cinco anos para concluir e anular o ato, e não apenas para instaurar procedimento, inexistindo má-fé da interessada.\r\r\n\r\r\n Em suas contrarrazões, a Universidade Federal do Rio de Janeiro sustenta, em síntese, o desprovimento do apelo, aduzindo que a prestação jurisdicional de origem conferiu a solução adequada ao litígio, com análise detida dos fatos e das normas aplicáveis, devendo a sentença ser mantida por seus próprios fundamentos.\r\r\n\r\r\n A apelante noticia, como prova superveniente, decisão do CNE/CES em outro processo (Parecer nº 951/2023) -- aprovada por unanimidade -- que, em situação substancialmente semelhante, deu provimento a recurso para considerar válidos os atos de reconhecimento de diploma expedidos em janeiro de 2019, assentando a impossibilidade de aplicação retroativa da Resolução CEPG/UFRJ nº 5/2019 a processos deferidos sob a Resolução anterior, reafirmando que a modalidade do curso (presencial, semipresencial ou a distância) não constitui, por si, ilegalidade impeditiva do reconhecimento e enfatizando os limites da autotutela administrativa à luz do direito adquirido, do ato jurídico perfeito e da LINDB.\r\r\n\r\r\n É o relatório.\r\r\n\r\r\n APELAÇÃO CÍVEL (198) Nº 0801663-54.2025.4.05.8000\r\r\n\r\r\n APELANTE: MARCIA KELLY DA SILVA RODRIGUES\r\r\n\r\r\n ADVOGADO do(a) APELANTE: MAICON DA SILVA ALVES ROCHA - RJ214826\r\r\n APELADO: UNIVERSIDADE FEDERAL DO RIO DE JANEIRO", "voto": "Recebo a apelação interposta, considerando presentes os requisitos intrínsecos e extrínsecos para a admissibilidade do recurso.\r\r\n\r\r\n Conforme relatado, a demanda versa sobre ação anulatória de ato administrativo proposta por Márcia Kelly da Silva Rodrigues contra a Universidade Federal do Rio de Janeiro - UFRJ, que objetiva desconstituir a decisão administrativa que anulou o reconhecimento de seu diploma de Mestrado em Ciências da Educação obtido no exterior. Consta na sentença que o reconhecimento pela UFRJ se deu em 29/01/2019, após regular processamento; a autora afirma ter cumprido o edital vigente à época e que não havia exigência normativa de residência no exterior durante o curso. O juízo consignou o objeto da lide e a origem do título (Universidad Autónoma del Sur - Paraguai).\r\r\n\r\r\n Cinge-se a controvérsia em verificar se o ato da UFRJ que anulou o reconhecimento do diploma da autora, em 2024, encontra respaldo legal ou se esbarra na decadência administrativa prevista no art. 54 da Lei nº 9.784/1999.\r\r\n\r\r\n Delimito, de início, que este voto acompanha integralmente a sentença no capítulo em que rejeitou a alegação de decadência administrativa quanto à anulação do reconhecimento do diploma da autora, por reputar corretos os fundamentos adotados e a subsunção normativa realizada.\r\r\n\r\r\n É incontroverso nos autos que: (i) o reconhecimento administrativo do diploma ocorreu em 29/01/2019; (ii) a revisão administrativa foi instaurada em 22/01/2020, com a expedição da Carta nº 001/2020/UFRJ, providência formal de abertura e impulso do procedimento revisional; e (iii) a anulação do reconhecimento foi formalizada em 27/03/2024. Tais marcos foram expressamente fixados na sentença.\r\r\n\r\r\n O art. 54, caput, da Lei n. 9.784/1999 estabelece o prazo quinquenal para o exercício, pela Administração, do poder-dever de autotutela para anular atos favoráveis ao administrado, salvo comprovada má-fé. O § 2º do mesmo dispositivo confere a chave interpretativa para a contagem e o modo de exercício: \"considera-se exercício do direito de anular qualquer medida de autoridade administrativa que importe impugnação do ato\". A ratio é clara: tutelar a confiança legítima sem paralisar a autotutela, bastando que, dentro do quinquênio, a Administração adote medida inequívoca de impugnação e instaure a revisão, independentemente de a decisão final ser prolatada ainda dentro desse lapso. Essa é, precisamente, a leitura feita na origem.\r\r\n\r\r\n Projetando-se a moldura normativa sobre o itinerário fático assentado, verifica-se que entre 29/01/2019 e 22/01/2020 transcorreu menos de um ano; logo, a Carta nº 001/2020/UFRJ consubstanciou medida administrativa idônea de impugnação do ato de reconhecimento, aperfeiçoando, dentro do prazo legal, o exercício do direito de anular (art. 54, § 2º, da Lei nº 9.784/1999). Assim, ainda que o ato final de anulação tenha sido formalizado em 27/03/2024, a Administração já havia exercido validamente sua pretensão anulatória no quinquênio, o que obsta o reconhecimento de decadência. Foi exatamente nessa linha que decidiu a sentença, com apoio nos documentos dos autos.\r\r\n\r\r\n Os precedentes invocados pela autora não infirmam a solução, porque, como corretamente ponderado na origem, referem-se a hipóteses de inércia administrativa por prazo superior a cinco anos sem qualquer iniciativa formal de impugnação; não é o caso dos autos, em que houve instauração tempestiva do procedimento revisional. A sentença, com acerto, rechaçou a tese de que o prazo de cinco anos seja destinado à conclusão do processo, e não ao exercício do direito, pois o legislador, ao qualificar qualquer medida impugnativa como exercício suficiente, optou por um modelo que preserva a confiança legítima sem tolher a autotutela em procedimentos que, por sua natureza, exigem instrução.\r\r\n\r\r\n À luz do art. 54, § 2º, da Lei nº 9.784/1999 e dos marcos temporais fixados, não se reconhece a decadência administrativa. Mantenho integralmente a sentença nesse ponto, por seus próprios fundamentos, que adoto como razões de decidir deste voto.\r\r\n\r\r\n No mérito, a Constituição (art. 207) assegura às universidades autonomia didático-científica, administrativa e de gestão financeira e patrimonial, abrangendo a normatização e a execução dos processos de revalidação/reconhecimento de diplomas estrangeiros. Nesse contexto, a LDB (art. 48, § 3º) e a Resolução CNE/CES nº 3/2016 estabelecem critérios rigorosos para o reconhecimento de mestrados e doutorados obtidos no exterior, dentre os quais avultam: (i) a existência, na universidade reconhecedora, de curso equivalente ou superior; e (ii) a exigência de presencialidade efetiva e residência no exterior no período de integralização, de modo a assegurar a equivalência substancial da formação.\r\r\n\r\r\n A sentença assenta que, nesse quadro, a UFRJ atuou dentro dos limites de sua autonomia acadêmica e administrativa ao revisar, com base em elementos concretos e parecer técnico, o reconhecimento anteriormente deferido.\r\r\n\r\r\n Confira-se trechos do Parecer Técnico 190/2022-PR2/CEPG/CLN, em sede do processo administrativo 23079.010512/2018-11:\r\r\n\r\r\n [...]\r\r\n\r\r\n Conforme a legislação brasileira, o currículo de disciplinas deve ser ministrado em atividades presenciais. Outro dado importante sobre as regras gerais do MEC é que no Brasil, para ser considerado curso semipresencial, os cursos devem possuir 80% dos conteúdos de forma presencial. Novas resoluções, posteriores à abertura deste processo de reconhecimento de diploma, abrem possibilidades para que o percentual de conteúdos presenciais seja menor somente em cursos estritamente no formato EAD (vide https://www.in.gov.br/en/web/dou/-/portaria-n-2.117-de-6-de-dezembro-de-2019-232670913 e https://www.in.gov.br/en/web/dou/-/portaria-n-343-de-17-de-marco-de-2020-248564376). Conste, então, que os cursos da UFRJ Stricto Sensu são todos presenciais, contínuos e não condensados, e assim permanecem.\r\r\n\r\r\n O § 3º, Art. 48, da Lei nº 9.394/1996, legislação que define as Diretrizes e Bases da Educação Nacional (LDB) estabelece que o reconhecimento de diploma emitido por universidade estrangeira requer a existência de curso de pós-graduação na mesma área de conhecimento e em nível equivalente (ou superior) ao da universidade emissora do reconhecimento. Desta forma, para que um diploma seja equivalente ao da UFRJ é exigido que o curso seja presencial, contínuo e não condensado. Com efeito, a Faculdade de Educação da UFRJ tem sua periodicidade semestral, cursos contínuos e não condensados.\r\r\n\r\r\n A CLN ressalta que mesmo não tendo recebido nenhum documento do(a) interessado(a), procedeu a análise da documentação verificando a presencialidade no exterior. Para tal, foi utilizada a Certidão de Movimentos Migratórios (CMM), documento emitido pela Polícia Federal do Brasil e encaminhado à UFRJ pela Procuradoria da República no Estado do Rio de Janeiro.\r\r\n\r\r\n Datas do fluxo migratório do interessado(a) pela CMM:\r\r\n\r\r\n Saída 08/10/2015 - Entrada 18/10/2015\r\r\n\r\r\n Saída 16/06/2016 - Entrada 27/06/2016\r\r\n\r\r\n Saída 01/08/2018 - Entrada 17/08/2018 (EUA)\r\r\n\r\r\n Períodos do curso indicados no histórico escolar e da ata de defesa:\r\r\n\r\r\n INICIO DO CURSO 2014\r\r\n\r\r\n FIM DO CURSO 2016\r\r\n\r\r\n Ata de defesa não foi localizada no processo. No Histórico Escolar (Certificado de Estudios) consta defesa em 26 de junho de 2016.\r\r\n\r\r\n Deste modo, fica caracterizada a incompatibilidade do regime presencial contínuo do curso, não podendo ser considerado o curso de Mestrado em Ciências da Educação da UNIVERSIDAD AUTÓNOMA DEL SUR (UNASUR), Paraguai, um curso correlato ao stricto sensu da UFRJ, que é totalmente presencial, contínuo e não-condensado, estando, portanto, impossibilitada a sua equivalência para o reconhecimento. Este fato, per se, impõe a anulação do reconhecimento do diploma já expedido.\r\r\n\r\r\n Apesar do parecer favorável ao Reconhecimento do Diploma emitido pela Comissão Especial de Revalidação - CER, que acenou positivamente à aprovação pela CLN e permitiu a realização dos protocolos necessários para a recepção do diploma internacional da interessada e seu reconhecimento, a CLN entende agora, inequivocamente, e amparada pelas Resoluções supracitadas, que a documentação encaminhada pelo (a) interessado (a) não comprova a realização de um curso presencial, contínuo e não-condensado.\r\r\n\r\r\n [...]\r\r\n\r\r\n No plano do controle de legalidade, rege a espécie a Súmula 473 do STF, segundo a qual a Administração pode - e deve - anular os atos eivados de ilegalidade, por deles não se originarem direitos, respeitados o devido processo, os direitos adquiridos e a apreciação judicial. A disciplina específica da decadência administrativa (Lei nº 9.784/1999, art. 54) fixa prazo quinquenal para o exercício do poder de anular atos favoráveis ao administrado, e o § 2º do mesmo artigo explicita que se considera \"exercício do direito de anular qualquer medida de autoridade administrativa que importe impugnação do ato\". Em outras palavras: não se exige a conclusão do procedimento anulatório no quinquênio, bastando a adoção, dentro desse lapso, de medida inequívoca de impugnação, assegurados contraditório e ampla defesa.\r\r\n\r\r\n Assim, nos termos do art. 54, §2º, da Lei n. 9.784/1999, é direito da UFRJ revisar o ato administrativo de validação de diploma, assegurando à parte apelada o direito ao contraditório e ampla defesa.\r\r\n\r\r\n Conforme a sentença, não se tratou de mera reinterpretação normativa, mas de reavaliação de compatibilidade do curso com exigências mínimas de qualidade e equivalência previstas no regime regulatório aplicável. Essa conclusão apoia-se, ademais, na ausência de comprovação de realização do curso nos moldes exigidos (presencial, contínuo e não-condensado).\r\r\n\r\r\n Diante desse conjunto - competência universitária para avaliação técnica, atuação dentro dos contornos da autonomia, reavaliação de compatibilidade fundada em substrato fático-técnico e ausência de comprovação de atendimento aos requisitos mínimos - a sentença concluiu pela inexistência de ilegalidade no ato impugnado e, por consequência, pela improcedência da demanda. Acompanho tais fundamentos.\r\r\n\r\r\n Nesse mesmo sentido, confira-se: (PROCESSO: 08004092920244058405, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL ROBERTO WANDERLEY NOGUEIRA, 1ª TURMA, JULGAMENTO: 12/06/2025); (PROCESSO: 08022831020254050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL RODRIGO ANTONIO TENORIO CORREIA DA SILVA, 6ª TURMA, JULGAMENTO: 15/04/2025).\r\r\n\r\r\n Ante o exposto, NEGO PROVIMENTO À APELAÇÃO.\r\r\n\r\r\n Condeno a recorrente ao pagamento de honorários recursais, nos termos do art. 85, § 11, CPC/2015, ficando os honorários sucumbenciais que lhe cabem majorados para R$ 1.200,00 (mil e duzentos reais). Mantenho a exigibilidade da verba honorária suspensa, nos termos do artigo 98, § 3º, do Código de Processo Civil, tendo em vista que a parte autora é beneficiária da justiça gratuita.\r\r\n\r\r\n É como voto.", "acordao": "Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO à apelação, nos termos do voto do relator, na forma do relatório constante dos autos, que fica fazendo parte integrante do presente julgado.\r\r\n\r\r\n Des. Federal ROGÉRIO FIALHO MOREIRA", "resultado": "Não provido", "css": "nao-provido"}];
let IDX_ATIVO = -1;

// ── Filtro por tipo de sessão ─────────────────────────────────
let FILTRO_TIPO = 'todas';

function getFiltrados() {
  // Retorna [{d, idxGlobal, num}] com numeração reiniciada por tipo
  return DECISOES
    .map((d, i) => ({ d, idxGlobal: i }))
    .filter(item => {
      if (FILTRO_TIPO === 'todas') return true;
      const t = (item.d.tipo || '').toLowerCase();
      if (FILTRO_TIPO === 'virtual')   return t === 'virtual';
      if (FILTRO_TIPO === 'ordinária') return t.startsWith('ordin');
      return true;
    })
    .map((item, seq) => ({ ...item, num: seq + 1 }));
}

function aplicarFiltroTipo() {
  FILTRO_TIPO = document.getElementById('filtro-tipo').value;
  IDX_ATIVO = -1;
  document.getElementById('estado-vazio').style.display = '';
  document.getElementById('conteudo-decisao').style.display = 'none';
  SELECIONADAS.clear();
  getFiltrados().forEach(item => SELECIONADAS.add(item.idxGlobal));
  renderLista(document.getElementById('busca').value);
}

// ── Utilitários ───────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function normalizar(texto) {
  return texto.replace(/\r\n/g,'\n').replace(/\r/g,'\n')
              .replace(/\n{3,}/g,'\n\n').trim();
}
function parasHtml(texto, classe) {
  const cls = classe ? ` class="${classe}"` : '';
  return normalizar(texto).split(/\n\n+/)
    .map(b => b.replace(/\s+/g,' ').trim()).filter(Boolean)
    .map(b => `<p${cls}>${esc(b)}</p>`).join('\n');
}
function formatarEmenta(texto) {
  texto = normalizar(texto);
  const m = texto.match(/^\s*1\s*\./m);
  const verb     = m ? texto.slice(0, m.index).trim() : texto.trim();
  const itensRaw = m ? texto.slice(m.index).trim() : '';
  let html = '';
  if (verb) html += `<p class="verb">${esc(verb.replace(/\s+/g,' '))}</p>\n`;
  for (const bloco of itensRaw.split(/\n\n+/)) {
    const b = bloco.replace(/\s+/g,' ').trim();
    if (b) html += `<p class="item">${esc(b)}</p>\n`;
  }
  return html;
}
function extrairMioloAcordao(texto) {
  if (!texto) return '';
  texto = normalizar(texto);
  // Localiza parágrafo que começa com "Decide" (case-insensitive)
  const m = texto.match(/(?:^|\n)[ \t]*(decide\b)/i);
  if (!m) return `<p class="ac">${esc(texto.replace(/\s+/g,' ').trim())}</p>`;
  const pos = m.index + m[0].length - m[1].length;
  const bloco = texto.slice(pos).split(/\n\n/)[0].replace(/\s+/g,' ').trim();
  return `<p class="ac">${esc(bloco)}</p>`;
}
function metaRow(rot, val) {
  if (!val || !val.trim()) return '';
  return `<tr><td class="r">${esc(rot)}</td><td class="v">${esc(val)}</td></tr>`;
}

// ── Renderização da decisão ───────────────────────────────────
function renderDecisao(d, opts, numero) {
  const { incComent, incAssessor, incRel, incVoto } = opts;
  let h = '<div class="decisao">';

  // Chamada XX
  if (numero) h += `<div class="chamada">Chamada ${String(numero).padStart(2,'0')}</div>`;

  h += `<p class="cab-decisao">${esc(d.cab)}</p>`;

  // Tabela meta
  let meta = metaRow('Processo', d.cnj);
  if (incAssessor) meta += metaRow('Assessor', d.assessor);
  meta += metaRow('Tipo de sessão', d.tipo ? d.tipo.toUpperCase() : '');
  meta += metaRow('Data da sessão', d.data);
  if (meta) h += `<table class="meta">${meta}</table>`;

  // Comentário
  if (incComent && d.comentario) {
    const c = esc(d.comentario).replace(/\n/g,'<br>');
    h += `<div class="coment"><strong>Observação do Desembargador</strong>${c}</div>`;
  }

  // Ementa
  if (d.ementa) {
    h += '<div class="sec">Ementa</div>';
    h += formatarEmenta(d.ementa);
  }

  // Relatório
  if (d.relatorio) {
    if (incRel) {
      h += '<div class="sec">Relatório</div>' + parasHtml(d.relatorio);
    } else {
      h += `<details><summary>📄 Ver Relatório</summary>` +
           `<div class="sec-conteudo">${parasHtml(d.relatorio)}</div></details>`;
    }
  }

  // Voto
  if (d.voto) {
    if (incVoto) {
      h += '<div class="sec">Voto</div>' + parasHtml(d.voto);
    } else {
      h += `<details><summary>⚖️ Ver Voto</summary>` +
           `<div class="sec-conteudo">${parasHtml(d.voto)}</div></details>`;
    }
  }

  // Acórdão — apenas o miolo (parágrafo "Decide…")
  if (d.acordao) {
    h += '<div class="sec">Acórdão</div>';
    h += extrairMioloAcordao(d.acordao);
  }

  // Resultado
  h += '<div class="sec">Resultado</div>';
  h += `<span class="badge-resultado ${d.css}">${esc(d.resultado)}</span>`;
  h += '</div>';
  return h;
}

// ── Seleção de chamadas para exportação ──────────────────────
const SELECIONADAS = new Set(DECISOES.map((_, i) => i)); // todas marcadas por padrão

function toggleSel(idx, ev) {
  ev.stopPropagation();
  if (SELECIONADAS.has(idx)) SELECIONADAS.delete(idx);
  else SELECIONADAS.add(idx);
  atualizarContSel();
}
function toggleAll(marcar) {
  getFiltrados().forEach(item => {
    if (marcar) SELECIONADAS.add(item.idxGlobal);
    else SELECIONADAS.delete(item.idxGlobal);
  });
  renderLista(document.getElementById('busca').value);
}
function atualizarContSel() {
  const el = document.getElementById('sel-count');
  if (!el) return;
  const filtrados  = getFiltrados();
  const selCount   = filtrados.filter(item => SELECIONADAS.has(item.idxGlobal)).length;
  el.textContent   = selCount + '/' + filtrados.length;
}
function getExportList() {
  const filtrados = getFiltrados();
  const sel = filtrados.filter(item => SELECIONADAS.has(item.idxGlobal));
  if (sel.length) return sel.map(item => ({ d: item.d, num: item.num }));
  // fallback: se nada marcado, exporta a decisão ativa
  if (IDX_ATIVO >= 0) {
    const item = filtrados.find(x => x.idxGlobal === IDX_ATIVO);
    if (item) return [{ d: item.d, num: item.num }];
  }
  return [];
}

// ── Lista ─────────────────────────────────────────────────────
function renderLista(filtro) {
  const lista    = document.getElementById('lista');
  const contador = document.getElementById('contador');
  const q        = (filtro || '').toLowerCase().trim();
  const base     = getFiltrados();
  const visiveis = base.filter(item =>
    !q || (item.d.cnj + ' ' + item.d.assessor + ' ' + item.d.ementa + ' ' + item.d.cab)
          .toLowerCase().includes(q)
  );
  contador.textContent = visiveis.length + ' de ' + base.length + ' decisão(ões)';
  lista.innerHTML = visiveis.map(item => {
    const { d, idxGlobal, num } = item;
    const numStr = String(num).padStart(2, '0');
    const chk    = SELECIONADAS.has(idxGlobal) ? 'checked' : '';
    return `<div class="item-lista${idxGlobal === IDX_ATIVO ? ' ativo' : ''}"
                onclick="abrirDecisao(${idxGlobal})">
      <div class="item-cnj">
        <input type="checkbox" class="item-chk" ${chk} onclick="toggleSel(${idxGlobal},event)">
        Chamada ${numStr} · ${esc(d.cnj || d.nome)}
      </div>
      <div class="item-cab">${esc(d.cab)}</div>
      <div class="item-meta">
        ${d.assessor ? `<span>${esc(d.assessor)}</span>` : ''}
        ${d.data     ? `<span>${esc(d.data)}</span>`     : ''}
        <span class="bdg ${d.css}">${esc(d.resultado)}</span>
      </div>
    </div>`;
  }).join('');
  atualizarContSel();
}

// ── Abrir decisão (toggle fix) ────────────────────────────────
function abrirDecisao(idxGlobal) {
  IDX_ATIVO = idxGlobal;
  const d    = DECISOES[idxGlobal];
  // Descobre o número sequencial deste item no filtro atual
  const item = getFiltrados().find(x => x.idxGlobal === idxGlobal);
  const num  = item ? item.num : idxGlobal + 1;

  document.getElementById('estado-vazio').style.display = 'none';
  const cont = document.getElementById('conteudo-decisao');
  cont.style.display = 'block';

  // Preserva estado atual dos controles antes de reescrever innerHTML
  const opts = {
    incComent:   document.getElementById('chk-coment')  ?.checked ?? true,
    incAssessor: document.getElementById('chk-assessor')?.checked ?? true,
    incRel:      document.getElementById('chk-rel')     ?.checked ?? false,
    incVoto:     document.getElementById('chk-voto')    ?.checked ?? false,
  };
  cont.innerHTML = barraExport(opts) + renderDecisao(d, opts, num);
  renderLista(document.getElementById('busca').value);
  cont.scrollTop = 0;
}

// ── Barra de exportação (toggle fix) ─────────────────────────
function barraExport(opts) {
  const chkC  = (opts && opts.incComent   !== false) ? 'checked' : '';
  const chkA  = (opts && opts.incAssessor !== false) ? 'checked' : '';
  const chkR  = (opts && opts.incRel      === true)  ? 'checked' : '';
  const chkV  = (opts && opts.incVoto     === true)  ? 'checked' : '';
  return `<div id="barra-export">
    <label><input type="checkbox" id="chk-coment"   ${chkC} onchange="rerender()"> Obs. Desembargador</label>
    <label><input type="checkbox" id="chk-assessor" ${chkA} onchange="rerender()"> Assessor</label>
    <label><input type="checkbox" id="chk-rel"      ${chkR} onchange="rerender()"> Relatório</label>
    <label><input type="checkbox" id="chk-voto"     ${chkV} onchange="rerender()"> Voto</label>
    <button class="btn-html" onclick="exportar('html')">⬇ HTML</button>
    <button class="btn-pdf"  onclick="exportar('pdf')">⬇ PDF</button>
    <button class="btn-docx" onclick="exportar('docx')">⬇ DOCX</button>
  </div>`;
}

function rerender() {
  if (IDX_ATIVO >= 0) abrirDecisao(IDX_ATIVO);
}

// ── Helpers de exportação ─────────────────────────────────────
function getExportFilename(ext) {
  const list = getExportList();
  if (list.length === 1) return `ementa_${list[0].d.cnj || 'decisao'}.${ext}`;
  return `ementas_${list.length}_chamadas.${ext}`;
}

function buildCorpo(list, opts) {
  return list.map(item => renderDecisao(item.d, opts, item.num)).join('\n<hr>\n');
}

function getExportOpts() {
  return {
    incComent:   document.getElementById('chk-coment').checked,
    incAssessor: document.getElementById('chk-assessor').checked,
    incRel:      document.getElementById('chk-rel').checked,
    incVoto:     document.getElementById('chk-voto').checked,
  };
}

// ── Exportação unificada ─────────────────────────────────────
function exportar(tipo) {
  const list = getExportList();
  if (!list.length) { alert('Nenhuma chamada selecionada.'); return; }
  const optsBase = getExportOpts();
  const titulo   = document.title;

  if (tipo === 'html') {
    const corpo = buildCorpo(list, optsBase);
    const html = `<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>${esc(titulo)}</title>
<style>${CSS_EXPORT}</style></head><body>
<h1>${esc(titulo)}</h1>
${corpo}
</body></html>`;
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = getExportFilename('html');
    a.click();

  } else if (tipo === 'pdf') {
    const corpo = buildCorpo(list, optsBase);
    const printHtml = `<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>${esc(titulo)}</title>
<style>
@page { margin: 2cm; }
${CSS_EXPORT}
</style></head><body>
${corpo}
</body></html>`;
    const win = window.open('', '_blank');
    if (!win) { alert('Permita pop-ups para exportar PDF.'); return; }
    win.document.write(printHtml);
    win.document.close();
    setTimeout(() => { win.print(); }, 400);

  } else if (tipo === 'docx') {
    // DOCX: apenas ementa e acórdão (sem relatório e voto)
    const opts = { ...optsBase, incRel: false, incVoto: false };
    const corpo = buildCorpo(list, opts);
    const docCss = `body{font-family:"Times New Roman",Times,serif;font-size:12pt;color:#111;line-height:1.7;margin:2cm}
