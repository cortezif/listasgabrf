<script>
// ── Dados embutidos ───────────────────────────────────────────
const DECISOES = [{"nome": "20260224_174323_Re__VOTO.ED.0800474-20.2025.4.05.8201.VIRTUAL.26.03.2026", "cnj": "0800474-20.2025.4.05.8201", "cab": "APELAÇÃO / REMESSA NECESSÁRIA (1728) Nº 0800474-20.2025.4.05.8201", "assessor": "Wellington dos Santos Santana", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "DIREITO ADMINISTRATIVO. REGISTRO DE ARMAS DE FOGO. MANDADO DE SEGURANÇA. EMBARGOS DE DECLARAÇÃO EM APELAÇÃO CÍVEL. CERTIFICADO DE REGISTRO (CR). CERTIFICADO DE REGISTRO DE ARMA DE FOGO (CRAF). REDUÇÃO DE PRAZO DE VALIDADE. DECRETO Nº 11.615/2023. PORTARIA COLOG Nº 166/2023. ATO ADMINISTRATIVO AUTORIZATÓRIO. PRECARIEDADE. INEXISTÊNCIA DE DIREITO ADQUIRIDO A REGIME JURÍDICO. ADC 85/STF. PRINCÍPIO DA LEGALIDADE. PROVIMENTO PARCIAL AOS EMBARGOS DE DECLARAÇÃO.\r\r\n\r\r\n 1. Embargos de declaração opostos pela União Federal contra acórdão que, em apelação, negara provimento ao recurso e mantivera sentença que assegurara ao particular o prazo original de 10 (dez) anos de validade do Certificado de Registro (CR) e do Certificado de Registro de Arma de Fogo (CRAF), afastando a aplicação do Decreto nº 11.615/2023 e da Portaria COLOG nº 166/2023.\r\r\n\r\r\n 2. Na origem, trata-se de mandado de segurança por meio do qual a parte impetrante pretendeu ver reconhecido o direito de manter o prazo de validade de 10 (dez) anos do CR e do CRAF, concedidos sob a égide do Decreto nº 9.846/2019, afastando a redução para 3 (três) anos promovida por normas supervenientes.\r\r\n\r\r\n 3. Os certificados foram emitidos quando vigente norma que estabelecia validade decenal, sobrevindo o Decreto nº 11.615/2023 e a Portaria COLOG nº 166/2023, que reduziram o prazo para três anos, dando ensejo à controvérsia quanto à incidência da nova disciplina sobre autorizações já expedidas.\r\r\n\r\r\n 4. A sentença reconheceu a existência de ato jurídico perfeito e de direito à manutenção do prazo originariamente concedido, afastando a aplicação retroativa das normas supervenientes.\r\r\n\r\r\n 5. A União sustenta que o CR e o CRAF são atos administrativos autorizatórios, discricionários e precários, não gerando direito adquirido a regime jurídico, sendo legítima a aplicação imediata do novo prazo, declarado constitucional pelo STF na ADC 85, além de pleitear o prequestionamento de dispositivos legais.\r\r\n\r\r\n 6. Quanto ao CRAF, reconhece-se que a redução do prazo de validade decorre diretamente do Decreto nº 11.615/2023, cuja constitucionalidade foi afirmada pelo Supremo Tribunal Federal na ADC 85, assentando-se a inexistência de direito adquirido a regime jurídico, o que afasta a alegação de violação ao ato jurídico perfeito e à segurança jurídica. Quanto ao CR, verifica-se que a redução do prazo foi introduzida exclusivamente por meio da Portaria COLOG nº 166/2023, sem previsão no decreto regulamentador, o que afronta o princípio da legalidade.\r\r\n\r\r\n 7. O entendimento firmado pelo STF na ADC 85 confirma a constitucionalidade material e formal do Decreto nº 11.615/2023, inclusive quanto à redução do prazo do CRAF, mas não autoriza ampliação, por ato infralegal, de restrição não prevista no regulamento, impondo observância estrita à hierarquia normativa.\r\r\n\r\r\n 8. Inexiste direito adquirido a regime jurídico quanto ao prazo de validade do CRAF, cuja redução para três anos decorre de ato normativo constitucionalmente válido; por outro lado, a diminuição do prazo do CR, quando introduzida apenas por portaria, viola o princípio da legalidade, devendo prevalecer o prazo originalmente concedido.\r\r\n\r\r\n 9. Embargos de declaração acolhidos, com efeitos infringentes, sendo dado parcial provimento à apelação, para manter a validade do CR pelo prazo de 10 (dez) anos e reconhecer a redução do prazo do CRAF para 3 (três) anos.", "relatorio": "Trata-se de Embargos de Declaração interpostos por UNIÃO FEDERAL contra acórdão proferido por esta 3ª Turma, com o objetivo de suprir alegadas omissões, contradições e obscuridades, bem como conferir efeitos infringentes ao julgado ou, subsidiariamente, prequestionar dispositivos legais e constitucionais para fins de interposição de recursos excepcionais.\r\r\n\r\r\n Alega a recorrente que o acórdão embargado, ao negar provimento à apelação da União e manter a sentença que assegurou ao particular o prazo original de validade de 10 anos do Certificado de Registro (CR) e do Certificado de Registro de Arma de Fogo (CRAF), incorreu em omissão, contradição e obscuridade quanto à natureza jurídica desses atos e à aplicabilidade imediata do Decreto nº 11.615/2023.\r\r\n\r\r\n Sustenta que o CR e o CRAF constituem atos administrativos discricionários e precários, não havendo direito adquirido a regime jurídico, podendo a Administração revogá-los por motivo de conveniência e oportunidade, nos termos do art. 53 da Lei nº 9.784/1999.\r\r\n\r\r\n Argumenta que a redução do prazo de validade das autorizações decorre de novo regime jurídico voltado à proteção da segurança pública, sendo inaplicável o reconhecimento de direito adquirido ou de ato jurídico perfeito, conforme entendimento firmado pelo Supremo Tribunal Federal na ADC nº 85, que declarou constitucionais os Decretos nº 11.366/2023 e nº 11.615/2023, inclusive quanto à redução do prazo de validade dos certificados e à inexistência de direito adquirido a regime jurídico.\r\r\n\r\r\n Aduz, ainda, que o acórdão não apreciou a regra de transição prevista no art. 80 do Decreto nº 11.615/2023, nem observou o disposto nos arts. 492 e 927, inciso I, do Código de Processo Civil, defendendo a necessidade de manifestação expressa sobre tais dispositivos, inclusive para fins de prequestionamento.\r\r\n\r\r\n Sem contrarrazões.\r\r\n\r\r\n É o relatório.\r\r\n\r\r\n APELAÇÃO / REMESSA NECESSÁRIA (1728) Nº 0800474-20.2025.4.05.8201\r\r\n\r\r\n APELANTE: UNIAO FEDERAL\r\r\n\r\r\n APELADO: FERNANDO PROTASIO DE OLIVEIRA NETO\r\r\n\r\r\n ADVOGADO do(a) APELADO: ANA EMILIA CORDEIRO PIRES - PB27661-B", "voto": "A teor do que dispõe o art. 1.022 do Código de Processo Civil, cabem embargos de declaração \"contra qualquer decisão judicial para esclarecer obscuridade ou eliminar contradição; suprir omissão de ponto ou questão sobre o qual devia se pronunciar o juiz de ofício ou a requerimento; e/ou corrigir erro material\".\r\r\n\r\r\n De acordo com o seu parágrafo único, considera-se omissa a decisão que \"deixe de se manifestar sobre tese firmada em julgamento de casos repetitivos ou em incidente de assunção de competência aplicável ao caso sob julgamento; e incorra em qualquer das condutas descritas no art. 489, § 1º. Este dispositivo, por seu turno, não considera fundamentada qualquer decisão judicial, seja ela interlocutória, sentença ou acórdão, que:\r\r\n\r\r\n I - se limitar à indicação, à reprodução ou à paráfrase de ato normativo, sem explicar sua relação com a causa ou a questão decidida;\r\r\n\r\r\n II - empregar conceitos jurídicos indeterminados, sem explicar o motivo concreto de sua incidência no caso;\r\r\n\r\r\n III - invocar motivos que se prestariam a justificar qualquer outra decisão;\r\r\n\r\r\n IV - não enfrentar todos os argumentos deduzidos no processo capazes de, em tese, infirmar a conclusão adotada pelo julgador;\r\r\n\r\r\n V - se limitar a invocar precedente ou enunciado de súmula, sem identificar seus fundamentos determinantes nem demonstrar que o caso sob julgamento se ajusta àqueles fundamentos;\r\r\n\r\r\n VI - deixar de seguir enunciado de súmula, jurisprudência ou precedente invocado pela parte, sem demonstrar a existência de distinção no caso em julgamento ou a superação do entendimento.\r\r\n\r\r\n O acórdão embargado encontra-se assim ementado:\r\r\n\r\r\n DIREITO ADMINISTRATIVO. REGISTRO DE ARMAS. APELAÇÃO CÍVEL. REDUÇÃO DO PRAZO DE VALIDADE DO CERTIFICADO DE REGISTRO (CR) E DO CERTIFICADO DE REGISTRO DE ARMA DE FOGO (CRAF). ATO ADMINISTRATIVO AUTORIZATÓRIO. SEGURANÇA JURÍDICA. ATO JURÍDICO PERFEITO. IMPOSSIBILIDADE DE RETROATIVIDADE. RECURSO DESPROVIDO.\r\r\n\r\r\n 1. Apelação interposta pela União Federal contra sentença que reconhece o direito do particular à manutenção do prazo original de 10 (dez) anos de validade do Certificado de Registro (CR) e do Certificado de Registro de Arma de Fogo (CRAF), afastando a aplicação retroativa do Decreto n.º 11.615/2023 e da Portaria n.º 166/2023 - COLOG/Exército, que reduziram tal prazo para 3 (três) anos.\r\r\n\r\r\n 2. Sustenta a União que os certificados possuem natureza de ato administrativo autorizatório, discricionário e precário, sem configurar direito adquirido, podendo ser alterados a qualquer tempo em razão do interesse público e da necessidade de maior controle sobre a posse e o uso de armas. Aduz a inadequação da via eleita, ante a impossibilidade de mandado de segurança contra lei em tese.\r\r\n\r\r\n 3. Rejeita-se a alegação de impossibilidade de ajuizamento do mandado de segurança contra lei em tese, haja vista que a norma aqui atacada se consubstanciou em ato administrativo de efeitos concretos. Desta forma, não se afigura a inadequação da via eleita porque a aludida alteração legislativa foi dirigida à restrita faixa de interessados que tenham obtido os CRAFs anteriormente à vigência da norma, não possuindo, portanto, caráter abstrato, genérico e impessoal.\r\r\n\r\r\n 4. O CR e o CRAF foram concedidos com base na legislação vigente à época, que previa validade de 10 anos, constituindo ato jurídico perfeito. A retroatividade mitigada prevista no art. 80 do Decreto n.º 11.615/2023 não pode alcançar situações jurídicas já consolidadas, sob pena de violação aos princípios constitucionais da segurança jurídica e do respeito ao ato jurídico perfeito, sem prejuízo de que futuras renovações se submetam ao novo regime jurídico.\r\r\n\r\r\n 5. A redução do prazo de validade dos registros de armas, embora legítima para os atos futuros em razão da proteção da segurança pública, não pode retroagir para atingir autorizações já deferidas por prazo certo. Aplica-se, na espécie, o princípio do tempus regit actum, garantindo-se a manutenção da validade dos certificados emitidos sob a norma anterior.\r\r\n\r\r\n 6. Apelação da União a que se nega provimento. Mantida a sentença que assegura ao particular o prazo original de validade de seus certificados.\r\r\n\r\r\n A tese central dos embargos de declaração opostos pela União consiste em afirmar que o acórdão incorreu em omissão, contradição e obscuridade ao deixar de reconhecer que o CR e o CRAF são atos administrativos autorizatórios, discricionários e precários, razão pela qual não geram direito adquirido ao prazo de validade originalmente concedido; assim, a redução do prazo para 3 anos prevista no Decreto nº 11.615/2023 e na Portaria nº 166/2023 - declarada constitucional pelo STF na ADC 85 - deve ter aplicação imediata, inclusive para autorizações já expedidas, devendo o acórdão ser integrado para afastar a interpretação que posterga os efeitos do novo regime jurídico e para viabilizar o necessário prequestionamento dos dispositivos legais pertinentes\r\r\n\r\r\n Reconheço o acerto parcial das alegações da embargante.\r\r\n\r\r\n Trata-se, na origem, de mandado de segurança em que pretende a parte autora a declaração do seu direito de gozar do prazo de validade do Certificado de Regisro - CR e do Certificado de Registro de Arma de Fogo - CRAF, pelo período de 10 (dez) anos, afastando-se os efeitos retroativos da Portaria COLOG n. 166 e do Decreto n. 11.615/2023, que reduziram tal prazo para 3 (três) anos.\r\r\n\r\r\n Alegou, em síntese, a existência de direito adquirido, invocando a ocorrência de ato jurídico perfeito e o respeito ao princípio da segurança jurídica.\r\r\n\r\r\n A controvérsia, conforme se vê, reside na possibilidade de aplicação retroativa do prazo de validade de 3 (três) anos, estabelecido pelo Decreto n. 11.615/2023 e regulamentado pela Portaria 166/COLOG/2023, aos Certificados de Registro (CR) e Certificados de Registro de Arma de Fogo (CRAF) emitidos sob a égide do Decreto 9.846/2019, com prazo de 10 (dez) anos.\r\r\n\r\r\n O acórdão embargado, mantendo a sentença recorrida, foi proferido nos seguintes termos:\r\r\n\r\r\n [...]\r\r\n\r\r\n Com efeito, uma vez concedida a autorização por prazo certo, tem o titular o direito de mantê-la pelo tempo previsto no documento, salvo se descumpridas as condições legalmente exigidas para tanto, tais como: idoneidade, inexistência de inquérito policial ou processo criminal, ocupação lícita, residência certa, capacidade técnica e aptidão psicológica.\r\r\n\r\r\n Tanto o CR quanto o CRAF são atos administrativos do tipo autorização, que têm caráter unilateral, discricionário e precário e, portanto, podem ser revogados a qualquer tempo pela Administração, considerando o interesse público que deve prevalecer sobre o privado. No entanto, essa precariedade não permite que haja uma alteração unilateral dos termos da autorização quando já expedida e com prazo certo de validade, em respeito à garantia constitucional do ato jurídico perfeito (art. 5º, XXXVI, da Constituição Federal).\r\r\n\r\r\n O art. 80 do Decreto n. 11.615/2023 previu uma hipótese de retroatividade mitigada, na medida em que pretende afetar atos administrativos já perfectibilizados, que são essas autorizações já deferidas por prazo certo, o que é vedado pela Constituição e pela Lei de Introdução às Normas de Direito Brasileiro. Nesse sentido já decidiu o e. STF na ADI 493/DF.\r\r\n\r\r\n Portanto, a lei nova não pode retroagir para atingir situações consolidadas, que é o caso das autorizações já deferidas ao Autor pelo prazo de 10 anos. E aí se tem o direito adquirido do Requerente, mas apenas ao prazo de validade original dos registros já concedidos. Não há direito adquirido às renovações vindouras - nem ao prazo de 10 anos nem à automática renovação -, posto que estarão sujeitas ao regime jurídico vigente ao tempo da renovação.\r\r\n\r\r\n Não se está interpretando como ilegítima a redução do prazo de validade dos registros de arma de fogo estabelecida pelo Decreto 11615/2023, posto que a intenção da Administração Pública é por demais justa e razoável, na medida em que visa a atender à segurança e ao interesse públicos, permitindo que seja aferida, com mais frequência, a presença dos requisitos legalmente exigidos para a posse e o porte de arma de fogo.\r\r\n\r\r\n Assim, tendo o administrado obtido a emissão do Certificado de Registro (CR) e do Certificado de Registro de Arma de Fogo (CRAF) em período em que a norma vigente estabelecia prazo de validade de 10 anos, é assegurado seu direito à manutenção desse prazo, em conformidade com o princípio do tempus regit actum.\r\r\n\r\r\n No mesmo sentido, confira-se: (PROCESSO: 08002508220254058201, APELAÇÃO / REMESSA NECESSÁRIA, DESEMBARGADOR FEDERAL ALEXANDRE LUNA FREIRE, 3ª TURMA, JULGAMENTO: 26/06/2025); (PROCESSO: 08000463820254058201, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL CID MARCONI GURGEL DE SOUZA, 3ª TURMA, JULGAMENTO: 05/06/2025).\r\r\n\r\r\n [...]\r\r\n\r\r\n O julgado concluiu que, embora o CR e o CRAF sejam atos administrativos autorizatórios e precários, não é possível aplicar retroativamente a redução de seus prazos de validade promovida pelo Decreto nº 11.615/2023 e pela Portaria nº 166/2023, pois tais certificados foram concedidos sob norma anterior que fixava validade de dez anos, configurando ato jurídico perfeito e situação jurídica consolidada; assim, por força da segurança jurídica, da proteção à confiança e do princípio do tempus regit actum, deve ser preservado o prazo originalmente concedido, sem prejuízo de que futuras renovações se submetam ao novo regime jurídico, motivo pelo qual a apelação da União foi desprovida.\r\r\n\r\r\n No entanto, o Supremo Tribunal Federal reconheceu recentemente a constitucionalidade do Decreto n. 11.615/2023, no julgamento da ADC 85, ementada nos seguintes termos:\r\r\n\r\r\n Direito Constitucional e Administrativo. Ação declaratória de constitucionalidade. Decretos 11.366/2023 e 11.615/2023. Atos normativos que promoveram a regulamentação do Estatuto do Desarmamento (Lei 10.823/2003). Perda de objeto em virtude da sucessão do Decreto 11.366/2023 pelo Decreto 11.615/2023. Inocorrência em face da continuidade normativa e aditamento pela Presidência da República. Decretos que se propõem a propiciar a proteção das políticas públicas de controle da circulação de armas de fogo no Brasil. Atos normativos que não desbordam o poder regulamentar privativo do Presidente da República (CF, art. 84, IV) e que densificam os direitos à vida e à segurança pública (CF, arts. 5º e 144). Constitucionalidade. Ação julgada procedente.\r\r\n\r\r\n I. Caso em exame 1. Ação declaratória de constitucionalidade em que o Presidente da República postula pelo reconhecimento da constitucionalidade dos Decretos 11.366/2023 e 11.615/2023, que promoveram a regulamentação do Estatuto do Desarmamento (Lei 10.826/2003)\r\r\n\r\r\n II. Questão em discussão 2. A questão em discussão consiste em saber se os ditames dos Decretos 11.366/2023 e 11.615/2023 indicados pela Presidência da República encontram-se em conformidade com a Constituição.\r\r\n\r\r\n III. Razões de decidir 3. O fato de que o Decreto 11.615/2023 segue a regulamentação transitória instituída pelo Decreto 11.366/2023, originalmente objeto da presente ação declaratória, não obsta o conhecimento da demanda uma vez que (i) há continuidade normativa entre os atos normativos e (ii) a Presidência da República manifesta-se pelo aditamento de seu requerimento inicial, porém a persistência de controvérsia judicial (Lei 9.868/1999, art. 14, III) e os termos da declaração de constitucionalidade que almeja. 4. A política de controle da circulação de armas de fogo no Brasil retira seu fundamento legal do Estatuto do Desarmamento (Lei 10.826/2003), que foi editado com o escopo de aprimorar os mecanismos de controle da circulação de armas de fogo no país a fim de combater a violência social. Na linha da investigação desta Corte, \"[o] Estatuto do Desarmamento é o diploma legislativo que consubstancia os valores constitucionais concernentes à proteção da vida humana (CF, art. 5º, caput) e à promoção da segurança pública (CF, art. 144, caput) contra o terror e a mortalidade provocada pelo uso indevido das armas de fogo\" (ADI 6680 MC/DF, Rel. Min. Rosa Weber, Tribunal Pleno, DJe) 4.9.2023). 5. No período compreendido entre 2019 e 2022, o Governo Federal, promoveu, por meio da edição de sucessivos decretos, a flexibilização do sistema de controle da circulação das armas de fogo no Brasil, estimulando a regulamentação da aquisição e posse de armas no país, valendo-se de prática que já foi considerada inconstitucional por esta Corte em mais de uma oportunidade (vg ADIs 6119/DF, 6139/DF e 6.466/DF, Rel. Edson Fachin, Tribunal Pleno, DJe 16.12.2022;134/DF e ADPFs 581/DF e 586/DF, Rel. Min. Rosa Weber, Tribunal Pleno, DJe 4.9.2023). 6. Os Decretos 11.366/2023 e 11.615/2023 visam reverter a vertiginosa tendência de controle de armas de fogo em circulação no Brasil e promover a supervisão das políticas públicas de controle efetivo dessa circulação. Os atos normativos são inseridos no poder regulamentar privativo do Presidente da República (CF, art. 84, IV) e não extrapolam a margem de conformação regulamentar exigida pelo Estatuto do Desarmamento (10.826/2003). As determinações regulamentares indicadas pelo requerente também não incorrem em inconstitucionalidade material por violação à segurança jurídica ou ao direito adquirido (CF, art. 5º, XXXVI). Ao invés, densificaram os direitos fundamentais à vida (CF, art. 5º) e à segurança pública (CF, art. 144), concretizando o próprio escopo finalístico da Lei 10.826/2003, referente à promoção do desarmamento e do controle das armas de fogo no Brasil.\r\r\n\r\r\n IV. Dispositivo e tese 7. Ação declaratória de constitucionalidade conhecida e julgada procedente. _________ Dispositivos relevantes citados: CF/1988, arts. 5º, caput e XXXVI, 84, IV e 144; Lei 10.826/2003, arts. 1º, 2º, 3º, 4º, 8º, 9º e 10; Lei 9.868/1999, art. 14; Decreto 11.366/2023, arts. 1º a 33; Decreto 11.615/2023, arts. 1º, 3º, 11, 15, 24, 36, 38, 39, 42, 43, 65. Jurisprudência relevante: ADC 9/DF; ADI 2.595/DF; ADI 2.418/DF; ADI 3112/DF; ADI 6680/DF; ADI 6119/DF; ADI6139/DF; ADI 6466/DF; ADI 6.134/DF; ADPF 581/DF; ADPF 586/DF; RE 563.965/RN.418/DF; ADI 3112/DF; ADI 6680/DF; ADIs 6119/DF; ADI6139/DF; ADI 6466/DF; ADI 6.134/DF; ADPF 581/DF; ADPF 586/DF; RE 563.965/RN.418/DF; ADI 3112/DF; ADI 6680/DF; ADIs 6119/DF; ADI6139/DF; ADI 6466/DF; ADI 6.134/DF; ADPF 581/DF; ADPF 586/DF; RE 563.965/RN.\r\r\n\r\r\n Nessa mesma ação, retomando entendimento anterior da própria Corte Constitucional, o STF estabeleceu que o ordenamento jurídico brasileiro não reconhece direito adquirido a regime jurídico. Assim, a alteração nas condições normativas para continuidade das autorizações não suprimiu o conteúdo essencial do direito anteriormente concedido - que permanece garantido, desde que observadas as exigências legais em vigor. Nesse sentido:\r\r\n\r\r\n (...) Apesar de tais normas, em tese, incidirem sobre situações jurídicas anteriormente constituídas com base nas normas regulamentares anteriores, deve ser ressaltado, na linha da jurisprudência iterativa desta Suprema Corte, que não há direito adquirido a regime jurídico (RE 563.965/RN, Rel. Min. Cármen Lúcia, Tribunal Pleno, DJe 19.3.2009).\r\r\n\r\r\n Assim, em recente decisão na ADC nº 85, o Egrégio STF declarou a constitucionalidade dos Decretos 11.366/2023 e 11.615/2023, reconhecendo-a sob o ponto de vista formal e material, ou seja, em relação à competência para a edição, bem como em relação às matérias, que se encontram dentro da esfera de regulamentação do Estatuto do Desarmamento (Lei 10.826/2003).\r\r\n\r\r\n Nos termos do voto do Relator, Ministro Gilmar Mendes, não há que se cogitar eventual inconstitucionalidade por violação à segurança jurídica ou ao direito adquirido (Constituição, art. 5º, XXXVI) dos dispositivos que promoveram a redução do prazo de validade do Certificado de Registro de Arma de Fogo concedido a CACs (Decreto 11.615/2023, art. 24).\r\r\n\r\r\n Portanto, a diminuição do prazo de validade do CRAF não importa violação ao ato jurídico perfeito, tampouco ao princípio da segurança jurídica que justifique a manutenção do acórdão.\r\r\n\r\r\n Contudo, o aludido Decreto não dispôs acerca da alteração do prazo de validade do Certificado de Registro - CR, o que somente foi introduzido via Portaria COLOG nº 166, ao que parece não abrangida na ADC 85:\r\r\n\r\r\n COLOG 166 Art. 16. O prazo de validade do registro para colecionador, atirador desportivo e caçador excepcional é de três anos, contados a partir da data de sua concessão ou de sua última revalidação.\r\r\n\r\r\n COLOG 166 Art. 92. O CRAF das armas dos acervos de coleção, tiro desportivo e caça excepcional terá validade de três anos (inciso I do art. 24 do Decreto nº 11.615/2023).\r\r\n\r\r\n Portanto, a supracitada redução da validade foi introduzida apenas por portaria, o que viola o princípio da legalidade, não sendo possível à administração aplicar, por analogia, ao Certificado de Registro - CR a mesma diminuição do prazo de validade atribuída ao Certificado de Registro de Arma de Fogo - CRAF.\r\r\n\r\r\n Frente ao panorama, entendo que deve ser acolhida a pretensão autoral quanto ao Certificado de Registro - CR, razão pela qual é de ser parcialmente provido o recurso de apelação.\r\r\n\r\r\n Ante o exposto, acolho os embargos de declaração, com efeitos infringentes, para dar parcial provimento ao recurso de apelação, mantendo a validade do CR em 10 anos, mas reconhecendo a redução do prazo de validade do CRAF para 3 anos.\r\r\n\r\r\n É como voto.", "acordao": "Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, CONHECER E DAR PARCIAL PROVIMENTO AOS EMBARGOS DE DECLARAÇÃO, nos termos do voto do relator e na forma do relatório constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\r\n\r\r\n Des. Federal ROGÉRIO FIALHO MOREIRA\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Parcialmente provido", "css": "parcial"}, {"nome": "20260226_175031_Re__VOTO.0011692-63.2025.4.05.8109_VIRTUAL.26.03.2026", "cnj": "0011692-63.2025.4.05.8109", "cab": "PROCESSO Nº: 0011692-63.2025.4.05.8109 - APELAÇÃO CÍVEL (198)", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "PROCESSUAL CIVIL. CUMPRIMENTO INDIVIDUAL DE SENTENÇA COLETIVA. REAJUSTE DE 28,86%. PRESCRIÇÃO. INOCORRÊNCIA. LEGITIMIDADE ATIVA DO EXEQUENTE/APELADO. PRECEDENTES. PROVIMENTO DA APELAÇÃO.\r\r\n\r\r\n1. Apelação interposta por  ANTONIO SERGIO GOMES BEVILAQUA ante a sentença que reconheceu a prescrição integral da pretensão e julgou extinto o processo com resolução de mérito, na forma do art. 487, II, e do art. 535, VI, todos do CPC.\r\r\n\r\r\n2. A hipótese comporta a aplicação do entendimento segundo o qual \"o prazo prescricional é interrompido pelo ajuizamento do Protesto em questão, ante a clara aplicação dos arts. 202, parágrafo único, e 204, inciso primeiro, ambos do Código Civil e precedentes desta Corte Regional. (TRF5 - Processo 0808412-27.2020.4.05.8400, Apelação Cível, Rel. Desembargador Federal Paulo Machado Cordeiro, 2ª Turma, Julgamento: 27/04/2021). No mesmo sentido de considerar os efeitos suspensivos do prazo prescricional em razão da propositura de cautelar de protesto pelo autor da ação coletiva, confira-se precedente desta Turma: PROCESSO: 08035704220244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL CID MARCONI GURGEL DE SOUZA, 3ª TURMA, JULGAMENTO: 20/06/2024.\r\r\n\r\r\n3. A ação civil pública originária não limitou a sua eficácia territorial ao Estado do Mato Grosso do Sul. Pelo contrário, o MPF foi claro ao delinear o objeto da mencionada ACP, abrangendo todos os servidores públicos civis federais, ativos e inativos, bem como pensionistas do quadro de pessoal da União Federal. Nesse sentido: PROCESSO: 08067307520244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL SEBASTIÃO JOSÉ VASQUES DE MORAES, 6ª TURMA, JULGAMENTO: 25/7/2024; PROCESSO: 08075249620244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL FREDERICO WILDSON DA SILVA DANTAS, 7ª TURMA, JULGAMENTO: 13/08/2024; PROCESSO: 08082272720244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL ALEXANDRE LUNA FREIRE, 3ª TURMA, JULGAMENTO: 12/09/2024; PROCESSO: 08176062120244058300, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL CID MARCONI GURGEL DE SOUZA, 3ª TURMA, JULGAMENTO: 30/01/2025.\r\r\n\r\r\n4. Apelação provida.", "relatorio": "Apelação interposta por ANTONIO SERGIO GOMES BEVILAQUA ante a sentença que reconheceu a prescrição integral da pretensão e julgou extinto o processo com resolução de mérito, na forma do art. 487, II, e do art. 535, VI, todos do CPC.\r\r\n\r\r\nEm suas razões recursais, o particular alega, em síntese, que: a) trata-se de Cumprimento de Sentença individual contra a Fazenda Pública que objetiva o recebimento de valores decorrentes da condenação fixada no título judicial formado na ação civil pública n.º 0005019-15.1997.4.03.6000, que se refere ao índice de 28,86%; b) a sentença recorrida acolheu a alegação de ilegitimidade ativa dos substituídos exequentes que não eram servidores lotados no Mato Grosso do Sul, acolhendo a alegação de que o pedido formulado na lide limitou-se aos servidores dos órgãos do estado do mato grosso do sul; c) seria aplicável à hipótese o que foi decidido pelo STF no julgamento do Tema 1075/STF (inconstitucionalidade do artigo 16 da Lei 7.347/1985).\r\r\n\r\r\nContrarrazões apresentadas.\r\r\n\r\r\nÉ o relatório.\r\r\n\r\r\nFIM RELATÓRIO\r\r\n\r\r\n PROCESSO Nº: 0011692-63.2025.4.05.8109 - APELAÇÃO CÍVEL (198)\r\r\n\r\r\n APELANTE: ANTONIO SERGIO GOMES BEVILAQUA\r\r\n\r\r\n APELADO: UNIAO FEDERAL\r\r\n\r\r\n RELATOR(A): Desembargador(a) Federal ROGERIO DE MENESES FIALHO MOREIRA\r\r\n\r\r\nINICIO VOTO", "voto": "Conquanto tenha ocorrido o trânsito em julgado do processo originário em 02/08/2019, o Ministério Público Federal – MPF, autor da ação coletiva, propôs medida cautelar de protesto em 11/06/2024, distribuída sob o nº 5004409-14.2024.4.03.6000, para a 1ª Vara Federal da Seção Judiciária do Mato Grosso do Sul, objetivando a interrupção do prazo prescricional.\r\r\n\r\r\nAssim, sendo a referida cautelar ajuizada antes do término do prazo prescricional, este restou interrompido, recomeçando a correr pela metade.\r\r\n\r\r\nA hipótese comporta a aplicação do entendimento segundo o qual \"o prazo prescricional é interrompido pelo ajuizamento do Protesto em questão, ante a clara aplicação dos arts. 202, parágrafo único, e 204, inciso primeiro, ambos do Código Civil e precedentes desta Corte Regional. (TRF5 - Processo 0808412-27.2020.4.05.8400, Apelação Cível, Rel. Desembargador Federal Paulo Machado Cordeiro, 2ª Turma, Julgamento: 27/04/2021).\r\r\n\r\r\nNo mesmo sentido de considerar os efeitos suspensivos do prazo prescricional em razão da propositura, pelo autor da ação coletiva, de cautelar de protesto, confira-se precedente desta Turma:\r\r\n\r\r\nPROCESSUAL CIVIL. AGRAVO DE INSTRUMENTO. CUMPRIMENTO DE SENTENÇA CONTRA A FAZENDA PÚBLICA. REAJUSTE DE 28,86%. HONORÁRIOS ADVOCATÍCIOS. CABIMENTO. LEGITIMIDADE DO SINDICATO PARA SUBSTITUIR OS DOCENTES. PRESCRIÇÃO DA EXECUÇÃO. INOCORRÊNCIA.\r\r\n\r\r\n1. Agravo de Instrumento interposto pela UFPB, em face da decisão que, nos autos do cumprimento de sentença contra a Fazenda Pública, rejeitou as preliminares e prejudicial de méritos suscitadas pela Universidade.\r\r\n\r\r\n2. Requer a Agravante que seja: a) extinta a execução quanto aos honorários advocatícios em favor do advogado Cleto Arlindo da Costa, ante a ilegitimidade ativa do Sindicato para representa-lo/substituí-lo processualmente; b) reconhecida a ilegitimidade ativa do SINTUFEPE para substituir processualmente os docentes da UFPE; c) reconhecida a prescrição da execução a partir da interrupção da mesma em 16/01/2009.\r\r\n\r\r\n3. Segundo a jurisprudência pacífica do STJ, a despeito de os honorários advocatícios sucumbenciais serem um direito autônomo do advogado, a parte, no caso o sindicato (atuando como substituto processual), tem legitimidade concorrente para discuti-los e executá-los, mormente à luz do contrato acostado aos autos, o qual atesta que o advogado CLETO ARLINDO DA COSTA autorizou a execução de seus honorários sucumbenciais juntamente com o crédito principal dos substituídos, sendo o crédito requisitado em seu nome, pedido esse, inclusive, já constante da inicial.\r\r\n\r\r\n4. Conforme reconhecido pela própria autarquia, a questão da ilegitimidade do Sindicato para substituir processualmente seus docentes, foi conhecida e decidida nos autos principais, assim, embora não esteja coberta pela coisa julgada material (por se tratar de questão preliminar, e não de mérito), a questão encontra-se preclusa, o que atrai, portanto, a incidência do art. 507 do CPC.\r\r\n\r\r\n5. Destarte, ante o efeito interruptivo do protesto, o sindicato teve mais 2,5 anos, contados a partir do ajuizamento da cautelar (06/12/2013), conforme o disposto no art. 219, § 1º, do CPC/73 (atual art. 240, § 1º, do CPC/15), de modo que o termo final do prazo prescricional ficou postergado para 06/06/2016. Como o cumprimento de sentença impugnado fora promovido em 31/05/2016, não há que se falar em prescrição. Agravo de Instrumento improvido. (PROCESSO: 08035704220244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL CID MARCONI GURGEL DE SOUZA, 3ª TURMA, JULGAMENTO: 20/06/2024).\r\r\n\r\r\nA decisão que afetou o Tema 1.033 (\"Interrupção do prazo prescricional para pleitear o cumprimento de sentença coletiva, em virtude do ajuizamento de ação de protesto ou de execução coletiva por legitimado para propor demandas coletivas\".) limitou a suspensão apenas dos recursos especiais e agravos em recurso especial na segunda instância e/ou que tramitem no STJ.\r\r\n\r\r\nPasso a apreciar o argumento de que o exequente não teria legitimidade para propor a execução individual da sentença coletiva, porquanto somente os servidores residentes no Mato Grosso do Sul é que teriam sido beneficiados pela coisa julgada formada na Ação Civil Pública.\r\r\n\r\r\nA hipótese trata de Cumprimento de Sentença individual contra a Fazenda Pública que objetiva o recebimento de valores decorrentes da condenação fixada no título judicial formado na ação civil pública n.º 0005019-15.1997.4.03.6000, que se refere ao índice de 28,86%, cujo dispositivo recebeu a seguinte redação:\r\r\n\r\r\n[...].\r\r\n\r\r\nDiante do exposto e por mais que dos autos consta, julgo procedente a presente ação para o fim de condenar os réus a incorporar o percentual de 28,86% às remunerações de seus servidores, ativos, inativos e pensionistas, não litigantes em outras ações ou cujas ações estejam suspensas e não firmatários de acordo, a partir de janeiro de 1993, com reflexos, respeitadas as datas de admissões, descontadas as reposições já feitas por força das leis n° 8622/93 e 8627/93. Sem custas e sem honorários. Sentença sujeita ao duplo grau de jurisdição.\r\r\n\r\r\n[...].\r\r\n\r\r\nDa leitura do dispositivo da sentença transcrito depreende-se que, de fato, não houve limitação dos efeitos subjetivos da coisa julgada territorialmente.\r\r\n\r\r\nO TRF da 3ª Região confirmou a sentença, como se observa da parte do voto proferido no respectivo acórdão:\r\r\n\r\r\n[...]\r\r\n\r\r\nFeitas tais ponderações, constata-se que o interesse defendido pelo Parquet na presente - direito dos servidores, ativos e inativos, e pensionistas à revisão geral de 28,86% - consiste num direito individual homogêneo disponivel de expressão social, tendo em vista a extraordinária dispersão dos lesados. No particular, cumpre observar que a pretensão deduzida in casu beneficia a todos os servidores públicos civis da esfera federal (ativos, inativos e seus pensionistas), os quais são representados por diversos sindicatos. Não existe uma entidade de classe que represente a todos eles, exatamente em função da extraordinária dispersão dos lesados, o que legitima o Ministério Público Federal a propor esta ação coletiva. A par disso, o enfrentamento da questão aqui debatida em sede de ação coletiva é de todo recomendável, haja vista que, diante da grande quantidade de lesados, a via coletiva evita um sem-número de processos e, consequentemente, a sobrecarga do Poder Judiciário, o que é do interesse de toda a coletividade.\r\r\n\r\r\n[...]\r\r\n\r\r\nAs posteriores decisões do STJ e do STF também não impuseram limitação aos efeitos subjetivos da coisa julgada.\r\r\n\r\r\nA inicial e as demais manifestações apresentadas na Ação Civil Pública executada não evidenciam a sua limitação aos servidores do Mato Grosso do Sul, sendo certo que o MPF autor não restringiu o pedido aos servidores lotados naquela unidade da Federação.\r\r\n\r\r\nEm situação em tudo similar à dos autos, este Tribunal Regional Federal da 5ª Região tem entendido que servidores não lotados no Mato Grosso do Sul também têm legitimidade para executar o mesmo título executivo judicial, conforme se observa nos seguintes precedentes:\r\r\n\r\r\nAGRAVO DE INSTRUMENTO NO NOVO CPC. Os Recursos são definidos pela natureza do ato judicial: Sentença, Decisão Interlocutória ou Despacho. O Agravo de Instrumento, no Código de Processo Civil de 2015, consiste no Recurso que tem por Objeto a Relação Jurídica sobre Decisão Interlocutória, envolvendo tutelas distintas sobre duas situações jurídicas processuais: a Evidência e a Urgência. Não estão dissociadas na Finalidade ou Função do Recurso estritamente definido.\r\r\n\r\r\nEVIDÊNCIA. Consiste na Situação Jurídica derivada da Relação Jurídica projetando a Pretensão à obtenção do dever jurídico, buscado pela Parte diante de Ato Jurídico Processual, e exposto no conjunto ou variedade de atos confluentes da Lide, da Causa, da Demanda ou dos Pressupostos Processuais. A Interlocução própria da Jurisdição é o princípio a estabelecer diretriz do Processo ou do Recurso, porquanto a Ação é proposta e o Recurso interposto, na dicção precisa de Pontes de Miranda. Os pressupostos Processuais e as Condições da Ação são elementos considerados, em cada etapa ou fase, com Atos Processuais, quando não incorrem, em cada caso, no exame dos Atos meramente ordinatórios, nos simples Despachos. Ou, nas hipóteses terminativas encerrando literalmente a Prestação Jurisdicional de Mérito com a Sentença, e/ou com a Execução.\r\r\n\r\r\nURGÊNCIA. Como poder-dever cautelar busca no exame da situação, de ato ou fato jurídico, realçar a utilidade da Jurisdição de modo Imediato, a realização do Direito Objetivo e, de modo Mediato, o Direto Subjetivo buscado no Pedido intercorrente para obtenção do Dever Jurídico; a Obrigação de quem de Direito. A Urgência está atinada sempre à Evidência.\r\r\n\r\r\nAgravo de Instrumento interposto em face de Decisão que desacolheu, em parte, a Impugnação ofertada pela Executada (FUNASA) e determinou a remessa dos autos à Contadoria Judicial para aferição de eventuais valores devidos, a título de diferenças do índice de 28,86%.\r\r\n\r\r\nNo caso, destaca-se da Decisão agravada os seguintes fundamentos, com os quais se compartilha:\r\r\n\r\r\n\"A executada, FUNDAÇÃO NACIONAL DE SAÚDE - FUNASA, apresentou impugnação ao cumprimento de sentença, alegando ilegitimidade ativa da exequente.\r\r\n\r\r\nPara tanto, afirma que a autora não comprovou estar lotada no Mato Grosso do Sul entre 1993 e 2001, o que impede a obtenção dos benefícios da ação civil pública.\r\r\n\r\r\nNo entanto, não assiste razão à EXECUTADA.\r\r\n\r\r\nO dispositivo da ação coletiva n. 0005019-15.1997.4.03.6000 julgou procedente o pedido do Ministério Público Federal nos seguintes termos (id. 30920614):\r\r\n\r\r\nDiante do exposto e por mais que dos autos consta, julgo procedente a presente ação para o fim de condenar os réus a incorporar o percentual de 28,86% às remunerações de seus servidores, ativos, inativos e pensionistas, não litigantes em outras ações ou cujas ações estejam suspensas e não firmatários de acordo, a partir de janeiro de 1993, com reflexos, respeitadas as datas de admissões, descontadas as reposições já feitas por força das leis n° 8622/93 e 8627/93. Sem custas e sem honorários. Sentença sujeita ao duplo grau de jurisdição.\r\r\n\r\r\nComo se percebe, o juízo prolator da sentença de primeiro grau não limitou os efeitos subjetivos da coisa julgada territorialmente.\r\r\n\r\r\nO TRF da 3ª Região confirmou a sentença. Destaco, inclusive, parte do voto proferido no referido acórdão (id. 30920617):\r\r\n\r\r\n[...]\r\r\n\r\r\nFeitas tais ponderações, constata-se que o interesse defendido pelo Parquet na presente - direito dos servidores, ativos e inativos, e pensionistas à revisão geral de 28,86% - consiste num direito individual homogêneo disponivel de expressão social, tendo em vista a extraordinária dispersão dos lesados. No particular, cumpre observar que a pretensão deduzida in casu beneficia a todos os servidores públicos civis da esfera federal (ativos, inativos e seus pensionistas), os quais são representados por diversos sindicatos. Não existe uma entidade de classe que represente a todos eles, exatamente em função da extraordinária dispersão dos lesados, o que legitima o Ministério Público Federal a propor esta ação coletiva. A par disso, o enfrentamento da questão aqui debatida em sede de ação coletiva é de todo recomendável, haja vista que, diante da grande quantidade de lesados, a via coletiva evita um sem-número de processos e, consequentemente, a sobrecarga do Poder Judiciário, o que é do interesse de toda a coletividade.\r\r\n\r\r\n[...]\r\r\n\r\r\nAs decisões do STJ e do STF corroboram o entendimento de que não houve limitação aos efeitos subjetivos da coisa julgada.\r\r\n\r\r\nNesse contexto, destaca-se a tese jurídica firmada pelo Supremo Tribunal Federal ao analisar o art. 16 da Lei 7.347/1985 (tema n.º 1.075):\r\r\n\r\r\nCONSTITUCIONAL E PROCESSO CIVIL. INCONSTITUCIONALIDADE DO ART. 16 DA LEI 7.347/1985, COM A REDAÇÃO DADA PELA LEI 9.494/1997. AÇÃO CIVIL PÚBLICA. IMPOSSIBILIDADE DE RESTRIÇÃO DOS EFEITOS DA SENTENÇA AOS LIMITES DA COMPETÊNCIA TERRITORIAL DO ÓRGÃO PROLATOR. REPERCUSSÃO GERAL. RECURSOS EXTRAORDINÁRIOS DESPROVIDOS. 1. A Constituição Federal de 1988 ampliou a proteção aos interesses difusos e coletivos, não somente constitucionalizando-os, mas também prevendo importantes instrumentos para garantir sua pela efetividade. 2. O sistema processual coletivo brasileiro, direcionado à pacificação social no tocante a litígios meta individuais, atingiu status constitucional em 1988, quando houve importante fortalecimento na defesa dos interesses difusos e coletivos, decorrente de uma natural necessidade de efetiva proteção a uma nova gama de direitos resultante do reconhecimento dos denominados direitos humanos de terceira geração ou dimensão, também conhecidos como direitos de solidariedade ou fraternidade. 3. Necessidade de absoluto respeito e observância aos princípios da igualdade, da eficiência, da segurança jurídica e da efetiva tutela jurisdicional. 4. Inconstitucionalidade do artigo 16 da LACP, com a redação da Lei 9.494/1997, cuja finalidade foi ostensivamente restringir os efeitos condenatórios de demandas coletivas, limitando o rol dos beneficiários da decisão por meio de um critério territorial de competência, acarretando grave prejuízo ao necessário tratamento isonômico de todos perante a Justiça, bem como à total incidência do Princípio da Eficiência na prestação da atividade jurisdicional. 5. RECURSOS EXTRAORDINÁRIOS DESPROVIDOS, com a fixação da seguinte tese de repercussão geral: \"I - É inconstitucional a redação do art. 16 da Lei 7.347/1985, alterada pela Lei 9.494/1997, sendo repristinada sua redação original. II - Em se tratando de ação civil pública de efeitos nacionais ou regionais, a competência deve observar o art. 93, II, da Lei 8.078/1990 (Código de Defesa do Consumidor). III - Ajuizadas múltiplas ações civis públicas de âmbito nacional ou regional e fixada a competência nos termos do item II, firma-se a prevenção do juízo que primeiro conheceu de uma delas, para o julgamento de todas as demandas conexas\". (STF, RE 1.101.937, Relator(a): ALEXANDRE DE MORAES, Tribunal Pleno, julgado em 08/04/2021, PROCESSO ELETRÔNICO REPERCUSSÃO GERAL - MÉRITO DJe-113 DIVULG 11/06/2021 PUBLIC 14/06/2021)\r\r\n\r\r\nPortanto, é incontestável reconhecer que os efeitos da sentença alcançam a todos os servidores na situação fático-jurídica abordada pela Ação Civil Pública n. 0005019-15.1997.4.03.6000, independentemente, da sua lotação territorial.\r\r\n\r\r\nDiante disso, rejeito a preliminar de ilegitimidade ativa.\"\r\r\n\r\r\nAssim, a Agravada possui Legitimidade Ativa, devendo ser afastada a alegação da FUNASA.\r\r\n\r\r\nCom efeito, a Decisão agravada pontuou \"que me parece razoável, tendo em vista a possibilidade de ocorrência de bis in idem, a continuidade da execução, com a realização dos cálculos relativos à obrigação decorrente do título exequendo e a compensação dos valores adimplidos administrativamente, conforme rubrica específica nas fichas financeiras, verificando-se a existência ou não de saldo a pagar\", ou seja, somente após as Informações da Contadoria Judicial é que se poderá aferir com mais exatidão se existe, ou não, crédito em favor da Exequente (e respectivo montante).\r\r\n\r\r\nNesse sentido: Processo nº 08044936820244050000, Agravo de Instrumento, Desembargador Federal Sebastião José Vasques de Moraes, 6ª Turma, Julgamento: 21/05/2024.\r\r\n\r\r\nDesprovimento do Agravo de Instrumento. (PROCESSO: 08082272720244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL ALEXANDRE LUNA FREIRE, 3ª TURMA, JULGAMENTO: 12/09/2024)\r\r\n\r\r\nADMINISTRATIVO E PROCESSUAL CIVIL. CUMPRIMENTO DE SENTENÇA CONTRA A FAZENDA PÚBLICA. 28,86%. EFEITOS DA COISA JULGADA. LIMITAÇÃO AO SERVIDORES LOTADOS NA UNIDADE DA FEDERAÇÃO DO ÓRGÃO PROLATOR DA SENTENÇA. AUSÊNCIA DE PREVISÃO NO TÍTULO. LEGITIMIDADE ATIVA DA EXEQUENTE. PROSSEGUIMENTO DA EXECUÇÃO.\r\r\n\r\r\n1. Apelação interposta pelo Particular em face da sentença que, em sede de cumprimento de sentença contra a Fazenda Pública, acolheu a preliminar de ilegitimidade ativa do exequente e, de consequência, extinguiu o feito, sem resolução do mérito, com fulcro no art. 485, VI, §3º, do CPC.\r\r\n\r\r\n2. Alega a Apelante, nas razões de apelo, que: a) o título judicial formado nos autos da Ação Coletiva n° 0005019-15.1997.4.03.6000 não limitou os efeitos da coisa julgada aos servidores com domicílio funcional no Mato Grosso do Sul, sendo totalmente possível qualquer servidor ou ex-servidor ser atingido pelo título judicial; b) o STJ e STF já se posicionaram no sentido de que os efeitos de uma sentença proferida em ação civil pública têm abrangência nacional; c) não subsiste a alegação quanto à violação do art. 16, da lei 9494/97, porque o Supremo Tribunal Federal, ao declará-lo inconstitucional, o fez sob a justificativa de se resguardar os direitos individuais homogêneos, prezando pela efetividade da prestação jurisdicional e pela segurança jurídica.\r\r\n\r\r\n3. O pedido de cumprimento de sentença está fundamentado em título judicial obtido na ação civil pública nº 0005019-15.1997.4.03.6000, que tramitou na 3ª Vara Cível da Seção Judiciária de Campo Grande, em que foi reconhecido o direito à incorporação do percentual de 28,86% dos servidores públicos civis, ativos, inativos e pensionistas.\r\r\n\r\r\n4. Ao contrário do que alega a agravante, a inicial e as demais manifestações apresentadas na Ação Civil Pública executada não evidenciam a sua limitação aos servidores do Mato Grosso do Sul, sendo certo que o MPF autor não restringiu o pedido aos servidores lotados naquela unidade da Federação.\r\r\n\r\r\n5. Ao tratar do tema, esta Terceira Turma tem compreendido que a Ação Civil Pública n.º 0005019-15.1997.4.03.6000 não limitou a sua eficácia territorial ao Estado do Mato Grosso do Sul. Pelo contrário, o MPF foi claro ao delinear o objeto da mencionada ACP, abrangendo todos os servidores públicos civis federais, ativos e inativos, bem como pensionistas do quadro de pessoal da União Federal. Confiram-se: Processo nº 08128122520244050000, Agravo de Instrumento, Desembargador Federal Luiz Bispo da Silva Neto (Convocado), 3ª Turma, Julgamento: 05/12/2024; Processo nº 08082272720244050000, Agravo de Instrumento, Desembargador Federal Alexandre Luna Freire, 3ª Turma, Julgamento: 12/09/2024.\r\r\n\r\r\n6. Outros precedentes deste Tribunal corroborando o entendimento: Processo nº 08108722520244050000, Agravo De Instrumento, Desembargadora Federal Cibele Benevides Guedes Da Fonseca, 5ª Turma, Julgamento: 03/12/2024; Processo nº 08095280920244050000, Agravo De Instrumento, Desembargador Federal Leonardo Augusto Nunes Coutinho, 7ª Turma, Julgamento: 19/11/2024.\r\r\n\r\r\n7. Sentença reformada para afastar a preliminar de ilegitimidade ativa da exequente. Apelação provida. (PROCESSO: 08176062120244058300, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL CID MARCONI GURGEL DE SOUZA, 3ª TURMA, JULGAMENTO: 30/01/2025)\r\r\n\r\r\nPROCESSUAL CIVIL E ADMINISTRATIVO. AGRAVO DE INSTRUMENTO. CUMPRIMENTO INDIVIDUAL DE SENTENÇA COLETIVA. ACORDO ADMINISTRATIVO PARA IMPLANTAÇÃO DO REAJUSTE DE 28,86% REMUNERAÇÕES E PROVENTOS DOS SERVIDORES ATIVOS, INATIVOS E PENSIONISTAS DO QUADRO DE PESSOAL DA UNIÃO. LEIS FEDERAIS 8.622/93 E 8.627/93. LIMITAÇÃO NO TÍTULO JUDICIAL. AUSÊNCIA. COMPENSAÇÃO. TEMA 1.102 STJ. AGRAVO DE INSTRUMENTO DESPROVIDO.\r\r\n\r\r\n1. Trata-se de agravo de instrumento interposto pela Fundação Nacional de Saúde - FUNASA, com pedido de tutela provisória recursal, visando a suspensão de decisão que reconheceu o direito à incorporação do percentual de 28,86% às remunerações e proventos dos servidores ativos, inativos e pensionistas do quadro de pessoal da União, descontadas as reposições salariais já realizadas pelas Leis Federais 8.622/93 e 8.627/93, rejeitando a preliminar de ilegitimidade ativa do agravado e determinando a remessa dos autos à Contadoria.\r\r\n\r\r\n2. A agravante alega em síntese: a) que o agravado não comprovou estar lotado no Mato Grosso do Sul entre 1993 e 2001, o que impede terminantemente que se beneficie da ação civil pública; b) ilegitimidade ativa do recorrido para a causa, uma vez que a sentença transitada em julgada não beneficia servidores lotados em Estados da Federação que não o Mato Grosso do Sul, obstando, assim, que se dê seguimento ao feito, dada a lotação da parte no Ceará; c) entender de modo diverso implica desrespeitar a coisa julgada, uma vez que a sentença foi prolatada e confirmada sob a égide do art. 16 da LACP, com a redação que lhe deu a Lei nº 9.494/97, sendo defeso aos autores impugnarem essa norma apenas agora, anos depois do trânsito em julgado, na fase de execução; d) possibilidade de dedução dos pagamentos administrativos decorrentes do acordo firmado, comprovados mediante fichas financeiras e extratos SIAPE acostados aos autos, de acordo com a alínea 'b' do tema 1102 do STJ.\r\r\n\r\r\n3. O cerne do presente recurso consiste em analisar a legitimidade ativa do agravado na ação original, bem como a possibilidade de dedução dos pagamentos administrativos decorrentes do acordo firmado entre as partes.\r\r\n\r\r\n4. Em relação à ilegitimidade ativa do recorrido, na ação coletiva nº 0005019-15.1997.4.03.6000, em que julgado procedente o pedido do Ministério Público Federal, não foram limitados os efeitos subjetivos da coisa julgada territorialmente.\r\r\n\r\r\n5. A agravante não demonstrou a probabilidade do direito pleiteado, já que, diversamente do que alega, a ação civil pública originária não limitou a sua eficácia territorial ao Estado do Mato Grosso do Sul. Pelo contrário, o MPF foi claro ao delinear o objeto da mencionada ACP, abrangendo todos os servidores públicos civis federais, ativos e inativos, bem como pensionistas do quadro de pessoal da União Federal. Nesse sentido: PROCESSO: 08067307520244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL SEBASTIÃO JOSÉ VASQUES DE MORAES, 6ª TURMA, JULGAMENTO: 25/7/2024.\r\r\n\r\r\n6. O juízo de origem determinou o cálculo pela Contadoria Judicial do valor devido ao agravado com o reenquadramento concedido pelas Leis 8.622/93 e 8.627/93, bem como a compensação dos valores adimplidos administrativamente, de modo que impertinente o pedido da parte agravante de dedução dos pagamentos administrativos decorrentes do acordo firmado, que está de acordo com a tese jurídica consagrada pelo Superior Tribunal de Justiça no enunciado do Tema 1.102.\r\r\n\r\r\n7. Agravo de instrumento desprovido. (PROCESSO: 08075249620244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL FREDERICO WILDSON DA SILVA DANTAS, 7ª TURMA, JULGAMENTO: 13/08/2024)\r\r\n\r\r\nPROCESSUAL CIVIL E ADMINISTRATIVO. CUMPRIMENTO INDIVIDUAL DE SENTENÇA COLETIVA. ACORDO ADMINISTRATIVO PARA IMPLANTAÇÃO DO REAJUSTE DE 28,86% REMUNERAÇÕES E PROVENTOS DOS SERVIDORES ATIVOS, INATIVOS E PENSIONISTAS DO QUADRO DE PESSOAL DA UNIÃO. LEIS FEDERAIS 8.622/93 E 8.627/93. ABRANGÊNCIA. POSSIBILIDADE. RECURSO DESPROVIDO.\r\r\n\r\r\n1. Agravo de instrumento com pedido de tutela provisória recursal visando a suspensão de decisão que - em sede de impugnação ao cumprimento de sentença (que reconheceu ao ora recorrido o direito a incorporação do percentual de 28,86% (vinte e oito virgula oitenta e seis por cento) às remunerações e proventos dos servidores ativos, inativos e pensionistas do quadro de pessoal da União, descontadas as reposições salariais já realizadas pelas Leis Federais 8.622/93 e 8.627/93) - rejeitou a preliminar de ilegitimidade ativa de Jose Edilberto Leite Esmeraldo e homologou os cálculos apresentados por este, fixando como devido o valor de R$ 109.206,09 (Planilha de cálculos no id. 4058102.30327346).\r\r\n\r\r\n2. A FUNASA alegou, em suas razões de recurso: a) que o autor não comprovou estar lotado no Mato Grosso do Sul entre 1993 e 2001, o que impede terminantemente que se beneficie da ação civil pública; b) a ilegitimidade ativa do recorrido para a causa, uma vez que a sentença transitada em julgada não beneficia servidores lotados em outros Estados da Federação que não o Mato Grosso do Sul, obstando, assim, que se dê seguimento ao feito dada a lotação dos autores no Rio Grande do Norte; e c) que entender de modo diverso implica desrespeitar a coisa julgada, uma vez que a r. sentença foi prolatada e confirmada sob a égide do art. 16 da LACP com a redação que lhe deu a Lei nº 9.494/97, sendo defeso aos autores querer impugnar tal norma apenas agora, anos depois do trânsito em julgado e na fase de execução. A matéria se encontra obviamente preclusa.\r\r\n\r\r\n3. O dispositivo da ação coletiva n. 0005019-15.1997.4.03.6000 julgou procedente o pedido do Ministério Público Federal nos seguintes termos (fl. 09 do id. 4058102.30327338): \"[...] Diante do exposto e por mais que dos autos consta, julgo procedente a presente ação para o fim de condenar os réus a incorporar o percentual de 28,86% às remunerações de seus servidores, ativos, inativos e pensionistas, não litigantes em outras ações ou cujas ações estejam suspensas e não firmatários de acordo, a partir de janeiro de 1993, com reflexos, respeitadas as datas de admissões, descontadas as reposições já feitas por força das leis n° 8622/93 e 8627/93. Sem custas e sem honorários. Sentença sujeita ao duplo grau de jurisdição.\"\r\r\n\r\r\n4. O juízo prolator da sentença de primeiro grau não limitou os efeitos subjetivos da coisa julgada territorialmente.\r\r\n\r\r\n5. O TRF da 3ª Região confirmou a sentença, conforme demonstra o acórdão de id. 4058102.30327341.Destaco, inclusive, parte do voto proferido no referido acórdão (Fl. 16 do id. 4058102.30327341): \"[...] Feitas tais ponderações, constata-se que o interesse defendido pelo Parquet na presente - direito dos servidores, ativos e inativos, e pensionistas à revisão geral de 28,86% - consiste num direito individual homogêneo disponivel de expressão social, tendo em vista a extraordinária dispersão dos lesados. No particular, cumpre observar que a pretensão deduzida in casu beneficia a todos os servidores públicos civis da esfera federal (ativos, inativos e seus pensionistas), os quais são representados por diversos sindicatos. Não existe uma entidade de classe que represente a todos eles, exatamente em função da extraordinária dispersão dos lesados, o que legitima o Ministério Público Federal a propor esta ação coletiva. A par disso, o enfrentamento da questão aqui debatida em sede de ação coletiva é de todo recomendável, haja vista que, diante da grande quantidade de lesados, a via coletiva evita um sem-número de processos e, consequentemente, a sobrecarga do Poder Judiciário, o que é do interesse de toda a coletividade [...].\"\r\r\n\r\r\n6. As decisões dos Tribunais Superiores, STJ e STF, registradas nos acórdãos das páginas 33/36 e 37/40 do id. 4058102.30327341, corroboram o entendimento de que não houve limitação aos efeitos subjetivos da coisa julgada. Nesse contexto, destaca-se a tese jurídica firmada pelo Supremo Tribunal Federal ao analisar o art. 16 da Lei 7.347/1985 (tema n.º 1.075): STF, RE 1.101.937, Relator(a): ALEXANDRE DE MORAES, Tribunal Pleno, julgado em 08/04/2021, PROCESSO ELETRÔNICO REPERCUSSÃO GERAL - MÉRITO DJe-113 DIVULG 11/06/2021 PUBLIC 14/06/2021).\r\r\n\r\r\n7. É incontestável reconhecer que os efeitos da sentença alcançam a todos os servidores na situação fático-jurídica abordada pela Ação Civil Pública n. 0005019-15.1997.4.03.6000, independentemente, da sua lotação territorial.\r\r\n\r\r\n8. Ademais, os efeitos da sentença proferida em ação coletiva, em regra, se estendem a todos os titulares do direito oriundo da mesma relação jurídica (erga omnes). Podem, ainda, limitar-se a determinado grupo, categoria ou classe. Em qualquer dos casos, a decisão não fica adstrita aos limites da competência territorial do órgão julgador e é válida para todo o território nacional.\r\r\n\r\r\n9. No caso, o douto juiz sentenciante de forma bastante acertada fez ver que tanto no decisum proferido na Ação de Cumprimento de Sentença quanto no Acórdão do TRF da 3ª Região, não restaram limitados os efeitos subjetivos da coisa julgada territorialmente. O Tribunal confirmou a sentença que trouxe o seguinte dispositivo: \"[...] Diante do exposto e por mais que dos autos consta, julgo procedente a presente ação para o fim de condenar os réus a incorporar o percentual de 28,86% às remunerações de seus servidores, ativos, inativos e pensionistas, não litigantes em outras ações ou cujas ações estejam suspensas e não firmatários de acordo, a partir de janeiro de 1993, com reflexos, respeitadas as datas de admissões, descontadas as reposições já feitas por força das leis n° 8622/93 e 8627/93. Sem custas e sem honorários. Sentença sujeita ao duplo grau de jurisdição\"\r\r\n\r\r\n10. Destaca-se, por oportuno, trecho do voto que ensejou o referido acórdão: \"[...] Feitas tais ponderações, constata-se que o interesse defendido pelo Parquet na presente - direito dos servidores, ativos e inativos, e pensionistas à revisão geral de 28,86% - consiste num direito individual homogêneo disponivel de expressão social, tendo em vista a extraordinária dispersão dos lesados. No particular, cumpre observar que a pretensão deduzida in casu beneficia a todos os servidores públicos civis da esfera federal (ativos, inativos e seus pensionistas), os quais são representados por diversos sindicatos. Não existe uma entidade de classe que represente a todos eles, exatamente em função da extraordinária dispersão dos lesados, o que legitima o Ministério Público Federal a propor esta ação coletiva. A par disso, o enfrentamento da questão aqui debatida em sede de ação coletiva é de todo recomendável, haja vista que, diante da grande quantidade de lesados, a via coletiva evita um sem-número de processos e, consequentemente, a sobrecarga do Poder Judiciário, o que é do interesse de toda a coletividade [...].\"\r\r\n\r\r\n11. Evidente que o agravante não demonstrou a probabilidade do direito pleiteado, já que, diversamente do que alega a ação civil pública originária não limitou a sua eficácia territorial ao Estado do Mato Grosso do Sul. Muito pelo contrário, o MPF foi claro ao delinear o objeto da mencionada ACP, abrangendo todos os servidores públicos civis federais, ativos e inativos, bem como pensionistas do quadro de pessoal da União Federal.\r\r\n\r\r\n12. Agravo de instrumento desprovido. (PROCESSO: 08044936820244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL SEBASTIÃO JOSÉ VASQUES DE MORAES, 6ª TURMA, JULGAMENTO: 21/05/2024)\r\r\n\r\r\nDestaque-se, ainda, que não pode haver pagamento em duplicidade. Como bem estabelecido na sentença exequenda, no cálculo do valor devido deve ocorrer a compensação com o reenquadramento concedido pelas Leis 8.622/93 e 8.627/93, bem como a compensação dos valores adimplidos administrativamente, conforme a tese firmada pelo Superior Tribunal de Justiça no enunciado do Tema 1.102, verbis:\r\r\n\r\r\n\"I) É possível a comprovação de transação administrativa, relativa ao pagamento da vantagem de 28,86%, por meio de fichas financeiras ou documento expedido pelo Sistema Integrado de Administração de Recursos Humanos - SIAPE, conforme art. 7º, § 2º, da MP 1.962-33/2000, reproduzida na vigente MP 2.169-43/2001, apenas em relação a acordos firmados posteriormente à sua vigência.\r\r\n\r\r\nII) Quando não for localizado o instrumento de transação devidamente homologado, e buscando impedir o enriquecimento ilícito, os valores recebidos administrativamente, a título de 28,86%, demonstrados por meio dos documentos expedidos pelo SIAPE, devem ser deduzidos da quantia apurada, com as atualizações pertinentes.\"\r\r\n\r\r\nA hipótese é, pois, de se garantir o prosseguimento do cumprimento de sentença.\r\r\n\r\r\nPosto isso, DOU PROVIMENTO à apelação.\r\r\n\r\r\nÉ como voto.\r\r\n\r\r\nFIM VOTO\r\r\n\r\r\n PROCESSO Nº: 0011692-63.2025.4.05.8109 - APELAÇÃO CÍVEL (198)\r\r\n\r\r\n APELANTE: ANTONIO SERGIO GOMES BEVILAQUA\r\r\n\r\r\n APELADO: UNIAO FEDERAL\r\r\n\r\r\n RELATOR(A): Desembargador(a) Federal ROGERIO DE MENESES FIALHO MOREIRA", "acordao": "Vistos, etc.\r\r\n\r\r\nDecide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, DAR PROVIMENTO à apelação, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido"}, {"nome": "20260305_123341_Re__VOTO.0802407-39.2022.4.05.8102.VIRTUAL.26.03.2026", "cnj": "0802407-39.2022.4.05.8102", "cab": "PROCESSO Nº: 0802407-39.2022.4.05.8102 - APELAÇÃO CÍVEL (198)", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "PROCESSUAL CIVIL E ADMINISTRATIVO. APELAÇÃO CÍVEL. EXECUÇÃO DE TÍTULO EXTRAJUDICIAL. ORDEM DOS ADVOGADOS DO BRASIL. COBRANÇA DE ANUIDADES. NATUREZA JURÍDICA PRIVADA. DESNECESSIDADE DE PRÉVIA COBRANÇA ADMINISTRATIVA. APELAÇÃO PROVIDA.\r\r\n\r\r\n1. Apelação interposta pela ORDEM DOS ADVOGADOS DO BRASIL - SECAO DO CEARA (OAB/CE) contra sentença que, considerando que a exequente, ora apelante, não comprovou a tentativa de conciliação ou adoção de solução administrativa para pagamento do débito, julgou extinta sem resolução do mérito a execução de título extrajudicial, “por não concorrer, no presente caso, pressuposto de constituição e desenvolvimento regular do processo, nos termos do art. 485, IV, do CPC”.\r\r\n\r\r\n2. O Supremo Tribunal Federal, no julgamento do RE 1.182.189 (Tema 1.054), consolidou o entendimento de que as anuidades devidas à OAB possuem natureza privada, não se configurando como tributos ou contribuições parafiscais, de modo que as receitas obtidas com sua cobrança são classificadas como recursos privados, não sujeitos ao regime jurídico aplicável aos conselhos profissionais de natureza tributária.\r\r\n\r\r\n3. A Lei nº 8.906/94 - Estatuto da OAB, estabelece, em seu artigo 46, parágrafo único, que a Certidão de Débito constitui Título Executivo Extrajudicial, não estando a execução objeto deste feito, portanto, condicionada à prévia cobrança administrativa do débito, à imposição anterior de sanção por parte da autarquia, ou a qualquer outra exigência desprovida de previsão normativa.\r\r\n\r\r\n4. Precedentes desta Corte Regional: PROCESSO: 08022316520194058102, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL FERNANDO BRAGA DAMASCENO, 3ª TURMA, JULGAMENTO: 21/07/2022; PROCESSO: 0800722-89.2025.4.05.8102, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL RODRIGO ANTÔNIO TENÓRIO CORREIA DA SILVA, 6ª TURMA, JULGAMENTO: 26/02/2026; PROCESSO: 08010544920224058300, APELAÇÃO / REMESSA NECESSÁRIA, DESEMBARGADOR FEDERAL LEONARDO AUGUSTO NUNES COUTINHO, 7ª TURMA, JULGAMENTO: 13/08/2024.\r\r\n\r\r\n5. Apelação provida.", "relatorio": "Apelação interposta pela ORDEM DOS ADVOGADOS DO BRASIL - SECAO DO CEARA (OAB/CE) contra sentença que, considerando que a exequente, ora apelante, não comprovou a tentativa de conciliação ou adoção de solução administrativa para pagamento do débito, julgou extinta sem resolução do mérito a execução de título extrajudicial, “por não concorrer, no presente caso, pressuposto de constituição e desenvolvimento regular do processo, nos termos do art. 485, IV, do CPC”.\r\r\n\r\r\nNas razões recursais, a apelante alega que as execuções propostas pela OAB seguem o rito previsto no Código de Processo Civil, referente às execuções fundadas em título extrajudicial, por imposição legal, inserta no Estatuto da Advocacia e no Regimento Interno da OAB/CE, mostrando-se indevida a exigência de instauração de processo administrativo prévio ou a assinatura do devedor para a constituição do título executivo.\r\r\n\r\r\nSem contrarrazões.\r\r\n\r\r\nÉ o relatório.\r\r\n\r\r\nFIM RELATÓRIO\r\r\n\r\r\n PROCESSO Nº: 0802407-39.2022.4.05.8102 - APELAÇÃO CÍVEL (198)\r\r\n\r\r\n APELANTE: ORDEM DOS ADVOGADOS DO BRASIL SECAO DO CEARA\r\r\n\r\r\n APELADO: WALLACE ARAUJO DA SILVA\r\r\n\r\r\n RELATOR(A): Desembargador(a) Federal ROGERIO DE MENESES FIALHO MOREIRA\r\r\n\r\r\nINICIO VOTO", "voto": "A sentença recorrida, considerando que a OAB, ora apelante, não comprovou a tentativa de conciliação ou adoção de solução administrativa para pagamento do débito, julgou extinta sem resolução do mérito a execução de título extrajudicial, “por não concorrer, no presente caso, pressuposto de constituição e desenvolvimento regular do processo, nos termos do art. 485, IV, do CPC”.\r\r\n\r\r\nA apelante alega que as execuções propostas pela OAB seguem o rito previsto no Código de Processo Civil, referente às execuções fundadas em título extrajudicial, por imposição legal, inserta no Estatuto da Advocacia e no Regimento Interno da OAB/CE, mostrando-se indevida a exigência de instauração de processo administrativo prévio ou a assinatura do devedor para a constituição do título executivo.\r\r\n\r\r\nSabe-se que o Supremo Tribunal Federal, no julgamento do RE 1.182.189 (Tema 1.054), consolidou o entendimento de que as anuidades devidas à OAB possuem natureza privada, não se configurando como tributos ou contribuições parafiscais, de modo que as receitas obtidas com sua cobrança são classificadas como recursos privados, não sujeitos ao regime jurídico aplicável aos conselhos profissionais de natureza tributária.\r\r\n\r\r\nDe fato, a Lei nº 8.906/94 - Estatuto da OAB, estabelece, em seu artigo 46, parágrafo único, que a Certidão de Débito constitui Título Executivo Extrajudicial, não estando a execução objeto deste feito, portanto, condicionada à prévia cobrança administrativa do débito, à imposição anterior de sanção por parte da autarquia, ou a qualquer outra exigência desprovida de previsão normativa. Nesse sentido, confiram-se, dentre outros, os seguintes precedentes desta Corte Regional: PROCESSO: 08022316520194058102, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL FERNANDO BRAGA DAMASCENO, 3ª TURMA, JULGAMENTO: 21/07/2022; PROCESSO: 0800722-89.2025.4.05.8102, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL RODRIGO ANTÔNIO TENÓRIO CORREIA DA SILVA, 6ª TURMA, JULGAMENTO: 26/02/2026; PROCESSO: 08010544920224058300, APELAÇÃO / REMESSA NECESSÁRIA, DESEMBARGADOR FEDERAL LEONARDO AUGUSTO NUNES COUTINHO, 7ª TURMA, JULGAMENTO: 13/08/2024.\r\r\n\r\r\nAs razões dos precedentes transcritos se aplicam ao caso dos autos.\r\r\n\r\r\nCom tais considerações, DOU PROVIMENTO à apelação.\r\r\n\r\r\n É como voto.\r\r\n\r\r\nFIM VOTO\r\r\n\r\r\n PROCESSO Nº: 0802407-39.2022.4.05.8102 - APELAÇÃO CÍVEL (198)\r\r\n\r\r\n APELANTE: ORDEM DOS ADVOGADOS DO BRASIL SECAO DO CEARA\r\r\n\r\r\n APELADO: WALLACE ARAUJO DA SILVA\r\r\n\r\r\n RELATOR(A): Desembargador(a) Federal ROGERIO DE MENESES FIALHO MOREIRA", "acordao": "Vistos, etc.\r\r\n\r\r\nDecide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, DAR PROVIMENTO à apelação, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Provido", "css": "provido"}, {"nome": "20260305_123501_Re__VOTO.0036810-77.2025.4.05.8000.VIRTUAL.26.03.2026", "cnj": "0036810-77.2025.4.05.8000", "cab": "PROCESSO Nº: 0036810-77.2025.4.05.8000 - APELAÇÃO CÍVEL (198)", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "CUMPRIMENTO DE SENTENÇA. HABILITAÇÃO. HABILITAÇÃO DE SUCESSORES DE AUTOR FALECIDO. CABIMENTO PRESCRIÇÃO. INOCORRÊNCIA. IMPROVIMENTO DA APELAÇÃO.\r\r\n\r\r\n1. Apelação interposta pela UNIÃO FEDERAL contra sentença que, afastando a prescrição, julgou procedente o pedido de habilitação da sucessora do autor falecido.\r\r\n\r\r\n2. Segundo a jurisprudência do STJ, a morte de uma das partes, inclusive no curso da execução, implica a suspensão do processo, razão pela qual, na ausência de previsão legal que imponha prazo para a habilitação dos respectivos sucessores, não há que falar em prescrição. Ocorrendo o óbito do participante da relação processual, impõe-se a suspensão do feito, nos termos do art. 265, I, do Código Processual Civil/1973 (art. 313, I, do CPC/2015), até que se promova a habilitação. Precedentes: AgInt no AgInt no AREsp n. 1.318.017/SP, relator Ministro Francisco Falcão, Segunda Turma, julgado em 4/12/2024, DJEN de 9/12/2024; AgInt no REsp n. 2.102.691/RJ, relator Ministro Gurgel de Faria, Primeira Turma, julgado em 26/2/2024, DJe de 6/3/2024.\r\r\n\r\r\n3. \"A morte de uma das partes tem, como consequência, a suspensão do processo, razão pela qual, na ausência de previsão legal impondo prazo para a habilitação dos sucessores da parte, não corre a prescrição, inclusive para a execução\". Nesse sentido: STJ, REsp 1.830.518/PE, Rel. Ministro OG FERNANDES, SEGUNDA TURMA, DJe de 27/04/2021; REsp 1.869.009/CE, Rel. Ministra ASSUSETE MAGALHÃES, SEGUNDA TURMA, DJe de 27/05/2020.\r\r\n\r\r\n4. Sobre a discussão da questão no Superior Tribunal de Justiça, no Tema 1254, a ordem de suspensão é apenas para os Recursos Especiais e Agravos em Recurso Especial na segunda instância e/ou que tramitem no STJ, que versem acerca da questão delimitada.\r\r\n\r\r\n5. Apelação improvida.", "relatorio": "Apelação interposta pela UNIÃO FEDERAL contra sentença que, afastando a prescrição, julgou procedente o pedido de habilitação da sucessora do autor falecido.\r\r\n\r\r\nNas razões recursais, a apelante sustenta que a habilitação não pode ser admitida, considerando que da data do óbito até o pedido de habilitação já se observou o transcurso de mais que 5 (cinco) anos, estando evidente a ocorrência da prescrição pretensão executória, de acordo com o art. 1º, do Decreto n. 20.910/32, c/c arts. 196 a 199 do Código Civil e a Súmula 150 do STF. Defende, ainda, ser necessário se aguardar a definição da questão da prescrição da pretensão, objeto do Tema 1.254 dos julgamentos repetitivos do STJ.\r\r\n\r\r\nContrarrazões apresentadas.\r\r\n\r\r\nÉ o relatório.\r\r\n\r\r\nFIM RELATÓRIO\r\r\n\r\r\n PROCESSO Nº: 0036810-77.2025.4.05.8000 - APELAÇÃO CÍVEL (198)\r\r\n\r\r\n APELANTE: UNIAO FEDERAL\r\r\n\r\r\n APELADO: CARLOS ALBERTO MARTINS SEQUEIRA\r\r\n\r\r\n RELATOR(A): Desembargador(a) Federal ROGERIO DE MENESES FIALHO MOREIRA\r\r\n\r\r\nINICIO VOTO", "voto": "Recebo a apelação interposta, considerando presentes os requisitos intrínsecos e extrínsecos à admissibilidade dos recursos.\r\r\n\r\r\nSegundo a jurisprudência do STJ, a morte de uma das partes, inclusive no curso da execução, implica a suspensão do processo, razão pela qual, na ausência de previsão legal que imponha prazo para a habilitação dos respectivos sucessores, não há que falar em prescrição. Ocorrendo o óbito do participante da relação processual, impõe-se a suspensão do feito, nos termos do art. 265, I, do Código Processual Civil/1973 (art. 313, I, do CPC/2015), até que se promova a habilitação.\r\r\n\r\r\nA propósito, confiram-se os seguintes precedentes:\r\r\n\r\r\nPROCESSUAL CIVIL. DIREITO ADMINISTRATIVO. AÇÃO DE DESAPROPRIAÇÃO. EXPROPRIAÇÃO DE ÁREA. ART. 1.022 DO CPC 2015. OPOSIÇÃO DOS EMBARGOS DECLARATÓRIOS CARACTERIZOU, TÃO SOMENTE, A IRRESIGNAÇÃO DO EMBARGANTE DIANTE DE DECISÃO CONTRÁRIA A SEUS INTERESSES. AFASTAMENTO DA SUPOSTA VIOLAÇÃO. SUPERVENIÊNCIA DO ÓBITO DE UMA DAS PARTES DO PROCESSO ENSEJA, COMO CONSEQUÊNCIA, A IMEDIATA SUSPENSÃO DO PROCESSO, DESDE O EVENTO MORTE. ART. 1º DO DECRETO N. 20.910/1932. DEMORA NA CITAÇÃO DA UNIÃO ATRIBUÍDA EXCLUSIVAMENTE AO PODER JUDICIÁRIO. DESPROVIMENTO DO AGRAVO INTERNO. MANUTENÇÃO DA DECISÃO RECORRIDA.\r\r\n\r\r\n[...]\r\r\n\r\r\nIII - No que trata da alegada violação dos arts. 180 e 265, I, do CPC/1973 (atuais arts. 221 e 313, I do CPC/2015), do art. 12 do Decreto-Lei n. 20.910/1932, bem como do teor da Súmula n. 150 do STF, relacionados à ocorrência (ou não) da prescrição executiva, a Corte Regional, na fundamentação do aresto recorrido, assim firmou seu entendimento (fls. 603).\r\r\n\r\r\nIV - Consoante se depreende dos excertos reproduzidos, o trânsito em julgado da ação originária ocorreu em 16/4/1985 e o falecimento do exequente em 13/7/1989, embora a notícia do seu falecimento só tenha sido comunicada, no processo, em 25/10/1991. Conforme jurisprudência desta Corte Superior, a superveniência do óbito de uma das partes do processo enseja, como consequência, a imediata suspensão do processo, desde o evento morte, a fim de viabilizar a substituição processual da parte pelo seu espólio ou herdeiro.\r\r\n\r\r\nAssim, pelo fato de não existir previsão legal impondo prazo para a habilitação dos sucessores da parte falecida, impõe-se a suspensão do feito até a regularização da representação processual, ou seja, não corre a prescrição, inclusive para as ações executivas. Nesse sentido: STJ, REsp n. 1.830.518/PE, relator Ministro Og Fernandes, Segunda Turma, DJe de 27/04/2021; REsp n. 1.869.009/CE, relatora Ministra Assusete Magalhães, Segunda Turma, DJe de 27/5/2020; AREsp n. 1.542.143/CE, relator Ministro Herman Benjamin, Segunda Turma, DJe de 11/10/2019; AgInt no AREsp n. 1.059.362/RS, relator Ministro Sérgio Kukina, Primeira Turma, DJe de 9/3/2018.\r\r\n\r\r\nV - À luz desse entendimento, para o caso dos autos, pode-se afirmar que entre o trânsito em julgado da ação originária - 16/4/1985 - e o falecimento do exequente - 13/7/1989 - não transcorreu o prazo de 5 (cinco) anos previsto no art. 1º do Decreto 20.910/1932.\r\r\n\r\r\nVI - Tem-se, ainda, que a suspensão do processo somente voltou a correr com a habilitação do espólio ou dos herdeiros do falecido que, conforme consignado à fl. 635, ocorreu em 25/10/1991, com o desarquivamento do processo a pedido do inventariante do expropriado/exequente, oportunidade em que se promoveu a regularização da representação processual (informação do acórdão recorrido, à fl. 603). Desse modo, se entre a habilitação do inventariante, em 25/10/1991, e a citação da União, em 24/08/1995, transcorreram 3 (três) anos e dez (meses), tempo esse superior aos 9 (nove) meses restante do prazo da prescrição, sendo a demora na citação da União atribuída exclusivamente ao Poder Judiciário, que deixou de praticar ato de sua atribuição para a efetivação da citação, não se pode pretender/deduzir pela prescrição da pretensão executiva, sob pena de impor prejuízo injustificado ao exequente.\r\r\n\r\r\nVII - Agravo interno improvido. (AgInt no AgInt no AREsp n. 1.318.017/SP, relator Ministro Francisco Falcão, Segunda Turma, julgado em 4/12/2024, DJEN de 9/12/2024.)\r\r\n\r\r\nPROCESSUAL CIVIL. RECURSO ESPECIAL. EXECUÇÃO DE SENTENÇA. PRESCRIÇÃO. NÃO OCORRÊNCIA.\r\r\n\r\r\n1. Segundo a jurisprudência do STJ, a morte de uma das partes, inclusive no curso da execução, implica a suspensão do processo, razão pela qual, na ausência de previsão legal que imponha prazo para a habilitação dos respectivos sucessores, não há que falar em prescrição. Ocorrendo o óbito do participante da relação processual, impõe-se a suspensão do feito, nos termos do art. 265, I, do Código Processual Civil/1973 (art. 313, I, do CPC/2015), até que se promova a habilitação.\r\r\n\r\r\n2. Agravo interno desprovido. (AgInt no REsp n. 2.102.691/RJ, relator Ministro Gurgel de Faria, Primeira Turma, julgado em 26/2/2024, DJe de 6/3/2024.)\r\r\n\r\r\nNesse contexto, impõem-se reconhecer a não ocorrência de prescrição para habilitação dos herdeiros, conforme corretamente aduzido na decisão agravada.\r\r\n\r\r\nLado outro, a prescrição da pretensão executória ocorre no mesmo prazo da prescrição da ação, ou seja, em 5 (cinco) anos, nos termos do art. 1º do Decreto n. 20.910/32 e Súmula 150 do STF. Contudo, deve-se registrar que a morte da parte suspende o processo, bem como o curso do prazo prescricional, nos termos dos arts. 313, I, e 921, I, do CPC, o qual somente recomeça a correr a partir da habilitação dos herdeiros. Nesse sentido:\r\r\n\r\r\n\"PROCESSUAL CIVIL. EXECUÇÃO DE SENTENÇA. LEGITIMIDADE DOS SUCESSORES. FALECIDO QUE CONSTAVA NA LISTA QUE INSTRUIU A INICIAL DA AÇÃO COLETIVA PROPOSTA PELA ASSOCIAÇÃO. HABILITAÇÃO. POSSIBILIDADE. PRESCRIÇÃO. INOCORRÊNCIA. PRECEDENTES. PROVIMENTO DA APELAÇÃO.\r\r\n\r\r\n1. Apelação interposta por WHOSOEVER DE MORAIS FERREIRA e outros contra sentença do Juízo da 4ª Vara Federal do Rio Grande do Norte, que acolheu a alegação de prescrição suscitada pelo ente público agravado e extinguiu o cumprimento de sentença com resolução do mérito.\r\r\n\r\r\n2. A ação foi proposta pela associação de servidores (ASDNER), à qual o pai dos exequentes, ora apelados, se encontrava inscrito, no mínimo, desde 2000, quando da propositura da ação coletiva. A associação ajuizou a ação após ser devidamente autorizada em assembleia, segundo consta na sentença exequenda.\r\r\n\r\r\n3. A presença do nome do falecido servidor na lista de substituídos do processo 2000.51.01.001586-1, que tramitou junto à 28ª Vara Federal/RJ também está comprovada nos autos, com a juntada de cópia da listagem que instruiu o feito original\r\r\n\r\r\n4. \"São válidos os atos processuais praticados pelo advogado no curso da execução, ainda que ocorrida a morte do representado antes do seu início, salvo comprovada má-fé.\" (REsp 1844121/AL, Rel. Ministro OG FERNANDES, SEGUNDA TURMA, julgado em 22/09/2020, DJe 09/10/2020). No mesmo sentido: AG 00096223920144050000, Desembargador Federal Ivan Lira de Carvalho, TRF5 - Quarta Turma, DJE - Data::05/03/2015 - Página::302.\r\r\n\r\r\n5. \"Nos termos da jurisprudência do STJ e desta Corte, ressalvado entendimento diverso da 2ª Turma, a morte de uma das partes suspende imediatamente o processo (art. 313, I, do CPC) e, ante a ausência de prazo pa
