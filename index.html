\n 11. Apelação improvida.", "relatorio": "Trata-se de Apelação interposta por SUPERMERCADO BRASIL CJZ LTDA contra sentença que denegou a segurança que objetivava a autorização para não se sujeitar à incidência de PIS/COFINS sobre os valores apurados a título de descontos financeiros, comerciais e bonificações concedidos por força de acordos comerciais firmados.\r\r\n\r\r\n Nas razões recursais, a Apelante alega em síntese que:\r\r\n\r\r\n a) os descontos comerciais e bonificações decorrentes de acordos comerciais possuem natureza de redução de custos do estoque, não se enquadrando no conceito de receita para fins de incidência das contribuições ao PIS/COFINS;\r\r\n\r\r\n b) tais valores configuram redutores do preço da operação, razão pela qual devem ser excluídos da base de cálculo das contribuições, nos termos do art. 1º, §3º, inciso V, “a”, das Leis nº 10.637/2002 e nº 10.833/2003. Na prática comercial, as bonificações e descontos comerciais representam apenas diminuição do custo de aquisição das mercadorias, não havendo ingresso de recursos no caixa da pessoa jurídica;\r\r\n\r\r\n c) a contabilização dessas bonificações como redução de custos do estoque apenas posterga a tributação, pois eventual vantagem econômica será naturalmente capturada no momento da venda da mercadoria, quando ocorrerá a incidência das contribuições sobre o valor agregado.\r\r\n\r\r\n d) é necessária a consignação dos descontos e bonificações em nota fiscal para o reconhecimento de sua natureza jurídica, devendo prevalecer a análise da essência do negócio jurídico e da verdade real, e não mera formalidade relativa ao cumprimento de obrigação acessória.\r\r\n\r\r\n e) a exigência de destaque prévio em documento fiscal não pode alterar a natureza econômica das operações, sobretudo quando demonstrado que os valores representam parcelas redutoras do preço efetivamente pago pelo adquirente;\r\r\n\r\r\n f) a inclusão desses valores na base de cálculo das contribuições viola os princípios da capacidade contributiva e da vedação ao confisco, pois implica tributação sobre valores que não representam ingresso de riqueza no patrimônio do contribuinte, inexistindo manifestação de capacidade econômica apta a justificar a incidência tributária;\r\r\n\r\r\n g) subsidiariamente, caso não acolhida a tese principal, requer que seja reconhecido o direito de exclusão ao menos quando os descontos e bonificações estiverem destacados nas notas fiscais.\r\r\n\r\r\n Contrarrazões apresentadas.\r\r\n\r\r\n É o relatório.\r\r\n\r\r\n A Apelante é sociedade empresária dedicada ao setor do comércio varejista de mercadorias em geral, com predominância de produtos alimentícios (supermercado), padaria e confeitaria com predominância em revenda, comércio varejista de laticínios e frios, comércio varejista de carnes (açougue), comércio varejista de hortifrutigranjeiros, bem como o transporte rodoviário de cargas, exceto produtos perigosos e mudanças, nas modalidades municipal, intermunicipal, interestadual e internacional. Aduzem que, no contexto de suas operações mercantis de compra e venda, com certa frequência experimentam descontos e bonificações, concedidos por seus fornecedores, ora mediante abatimentos ou valores em dinheiro.\r\r\n\r\r\n O cerne da presente controvérsia consiste na análise acerca da possibilidade de declarar o direito à exclusão dos descontos e bonificações incondicionais das bases de cálculo da contribuição para o PIS e a COFINS.\r\r\n\r\r\n Sobre a presente matéria, cumpre destacar que, em matéria tributária, a desoneração do contribuinte perante determinado tributo deve obedecer ao comando de legislação específica, conforme preceituado no art. 150, § 6º da Constituição Federal, in verbis:\r\r\n\r\r\n Art. 150. Sem prejuízo de outras garantias asseguradas ao contribuinte, é vedado à União, aos Estados, ao Distrito Federal e aos Municípios:\r\r\n\r\r\n (...)\r\r\n\r\r\n § 6º Qualquer subsídio ou isenção, redução de base de cálculo, concessão de crédito presumido, anistia ou remissão, relativos a impostos, taxas ou contribuições, só poderá ser concedido mediante lei específica, federal, estadual ou municipal, que regule exclusivamente as matérias acima enumeradas ou o correspondente tributo ou contribuição, sem prejuízo do disposto no art. 155, § 2.º, XII, g. (Redação dada pela Emenda Constitucional nº 3, de 1993)\r\r\n\r\r\n Dessa forma, insta perquirir se os valores referentes a descontos concedidos à recorrente pelos fornecedores estão entre as hipóteses legais de exclusão da base de cálculo das contribuições para o PIS e COFINS.\r\r\n\r\r\n As Leis nº 10.637/2002 e 10.833/2003 dispõem que, vejamos:\r\r\n\r\r\n Lei nº 10.637/2002 (PIS)\r\r\n\r\r\n Art. 1º A Contribuição para o PIS/Pasep, com a incidência não cumulativa, incide sobre o total das receitas auferidas no mês pela pessoa jurídica, independentemente de sua denominação ou classificação contábil.\r\r\n\r\r\n (...) § 3º Não integram a base de cálculo a que se refere este artigo, as receitas:\r\r\n\r\r\n (...) V - referentes a:\r\r\n\r\r\n a) vendas canceladas e aos descontos incondicionais concedidos;\r\r\n\r\r\n Lei nº 10.833/2003 (COFINS)\r\r\n\r\r\n Art. 1º A Contribuição para o Financiamento da Seguridade Social - Cofins, com a incidência não cumulativa, incide sobre o total das receitas auferidas no mês pela pessoa jurídica, independentemente de sua denominação ou classificação contábil.\r\r\n\r\r\n (...) § 3º Não integram a base de cálculo a que se refere este artigo as receitas:\r\r\n\r\r\n (...) V - referentes a:\r\r\n\r\r\n a) vendas canceladas e aos descontos incondicionais concedidos; Grifos nossos.\r\r\n\r\r\n Os “descontos incondicionais”, previstos nos arts. 1º, § 3º, V, alínea a, das Leis nº 10.637/2002 e 10.833/2003, estão definidos na Instrução Normativa SRF Nº 51, de 03/11/1978, como \"parcelas redutoras do preço de venda, quando constarem da nota fiscal de venda dos bens ou da fatura de serviços e não dependerem de evento posterior à emissão desses documentos\".\r\r\n\r\r\n O STJ, no julgamento do REsp nº 1.836.082/SE, firmou o seguinte entendimento sobre a exclusão dos descontos da base de cálculo do PIS e da COFINS, vejamos:\r\r\n\r\r\n PROCESSUAL CIVIL. TRIBUTÁRIO. RECURSO ESPECIAL. VIOLAÇÃO AO ART. 1.022 DO CPC/2015. INOCORRÊNCIA. ARTS. 1º, CAPUT, § 3º, V, A, DAS LEIS NS. 10.637/2002 E 10.883/2003. BASE DE CÁLCULO DA CONTRIBUIÇÃO AO PIS E DA COFINS. INGRESSO PATRIMONIAL NOVO. AQUISIÇÃO DE PRODUTOS POR VAREJISTA COM DESCONTO CONCEDIDO POR FORNECEDORES. PARCELA REDUTORA DO CUSTO QUE NÃO CARACTERIZA RECEITA DO COMPRADOR. CONTRAPARTIDA DO ADQUIRENTE PARA OBTENÇÃO DO ABATIMENTO NÃO CONSTITUI PRESTAÇÃO DE SERVIÇO. RECURSO ESPECIAL PARCIALMENTE CONHECIDO E PROVIDO.\r\r\n\r\r\n I - Consoante o decidido pelo Plenário desta Corte na sessão realizada em 09.03.2016, o regime recursal será determinado pela data da publicação do provimento jurisdicional impugnado. In casu, aplica-se o Código de Processo Civil de 2015.\r\r\n\r\r\n II - O tribunal de origem apreciou todas as questões relevantes apresentadas com fundamentos suficientes, mediante apreciação da disciplina normativa e cotejo ao posicionamento jurisprudencial aplicável à hipótese. Não existência de omissão, contradição ou obscuridade.\r\r\n\r\r\n III - Consoante previsto nos arts. 1º, § 3º, V, a, das Leis ns.10.637/2002 e 10.883/2003, a base de cálculo da contribuição ao PIS e da COFINS, no regime não cumulativo, consiste no total de receitas auferidas no mês pela pessoa jurídica, independentemente de sua denominação ou classificação contábil, razão pela qual o conceito jurídico de receita não se vincula àquele veiculado pela ciência das finanças. Precedente do STF.\r\r\n\r\r\n IV - Nas relações comerciais entre agentes econômicos, o adquirente de mercadorias para revenda despende valores com a compra de produtos para desempenho de sua atividade empresarial, sendo desinfluente a natureza jurídica dos descontos obtidos do fornecedor para a incidência das contribuições em exame quanto ao varejista, porquanto rubrica modificadora da receita de quem vende e redutora dos custos do comprador.\r\r\n\r\r\n V - A pactuação de contrapartida a cargo do revendedor para a redução da quantia paga ao fornecedor constitui forma de composição do preço acordado na transação mercantil, motivo pelo qual não pode ser dissociada desse contexto para figurar, autonomamente, como a contraprestação por um serviço.\r\r\n\r\r\n VI - Os descontos concedidos pelo fornecedor ao varejista, mesmo quando condicionados a contraprestações vinculadas à operação de compra e venda, não constituem parcelas aptas a possibilitar a incidência da contribuição ao PIS e da COFINS a cargo do adquirente.\r\r\n\r\r\n VII - Recurso Especial parcialmente conhecido e, nessa extensão, provido.\r\r\n\r\r\n (REsp nº 1.836.082/SE, Ministra Relatora: Regina Helena Costa, 1ª Turma, julgado em 11/4/2023, DJe de 12/5/2023).\r\r\n\r\r\n Importante trazer à baila ainda trecho do voto proferido no REsp n. 1.836.082/SE, que traz as balizas necessárias à compreensão do termo objeto de divergência entre as partes (descontos incondicionais e bonificação). Confira-se excerto:\r\r\n\r\r\n No entanto, sob a perspectiva da aquisição dos produtos pelo revendedor, a bonificação percebida atenua o montante a ser desembolsado a título de custo da operação. Trata-se, portanto, de redução do valor da compra dos bens a serem posteriormente comercializados, cuja análise não guarda correlação com o conceito de receita como ingresso financeiro positivo ao patrimônio do varejista. Nesse caso, a obtenção de receita somente ocorrerá quando da revenda ao consumidor, ocasião na qual terão relevância apenas eventuais abatimentos outorgados ao cliente final e não aqueles usufruídos em operações anteriores.\r\r\n\r\r\n Dessa forma, a distinção entre a natureza dos descontos concedidos deve ser averiguada pelo Fisco na relação jurídica tributária entre a União e o contratante que aufere receita, sendo desinfluente a análise da incidência das mencionadas contribuições sob o prisma do contribuinte, o qual, na consecução do negócio jurídico, incorre em despesas.\r\r\n\r\r\n [...]\r\r\n\r\r\n Desse modo, a legislação estabelece o ângulo do vendedor como elemento estrutural da noção de descontos e somente nesse sentido é possível avaliar os impactos tributários decorrentes da redução do valor pactuado na compra e venda, perspectiva amparada pela supracitada jurisprudência desta Corte e do Supremo Tribunal Federal.\r\r\n\r\r\n [...]\r\r\n\r\r\n Por oportuno, vale frisar que a tese ora estampada não inviabiliza a apreciação do alcance dos descontos pela contribuição ao PIS e pela COFINS. Ao Fisco permite-se efetuar investigação dessa natureza, desde que direcione a fiscalização ao sujeito passivo encarregado da concessão dos abatimentos. No entanto, não há como alterar a lógica aplicável à relação jurídica discutida para transformar as despesas incorridas pelo varejista em receitas.\r\r\n\r\r\n Assim, a análise da relação tributária pela Corte de origem, em meu sentir, partiu do equivocado pressuposto segundo o qual a Recorrente, ao desembolsar valores para aquisição de mercadorias com descontos, obteve receita, destoando do regramento relativo à contribuição ao PIS e à COFINS previsto nos arts. 1º, caput, § 3º, V, a, das Leis n. 10.637/2002 e 10.833/2003, os quais foram indevidamente aplicados na espécie.\r\r\n\r\r\n Na mesma linha, também não é viável considerar correta a exegese lançada no acórdão recorrido no sentido de que as condições fixadas pelo fornecedor para o gozo dos descontos configuram prestação de serviços e, por isso, a diminuição da quantia a pagar pelo varejista na operação de compra e venda equivale à remuneração pelos encargos previstos no contrato.\r\r\n\r\r\n Com efeito, a composição do preço praticado em contratos de compra e venda celebrados entre sociedades empresárias leva em consideração uma gama elevada de arranjos comerciais - tais como prazos de entrega, condições de pagamento, vantagens publicitárias ou mesmo a relação pretérita entre as partes -, de modo que a diminuição do valor a ser despendido pela Recorrente na aquisição de mercadorias, embora atrelada a uma contraprestação em favor do fornecedor, não pode ser dissociada desse contexto para figurar, autonomamente, como a contraprestação por um serviço, sob pena de modificar a essência do negócio jurídico pactuado.\r\r\n\r\r\n Ajustes dessa natureza são ancorados no princípio da liberdade de contratar, o qual confere aos agentes econômicos margem de apreciação acerca dos elementos relevantes para a fixação do preço avençado. Desse modo, a despeito das variadas formas pelas quais são negociados os descontos sujeitos a contrapartidas por parte adquirente, as tratativas são intrinsecamente ligadas ao contrato de compra e venda com o escopo de reduzir a quantia paga pelo varejista e de permitir ao vendedor a obtenção de proveitos comerciais. Grifos nossos.\r\r\n\r\r\n In casu, observo que, a Apelante não logrou êxito em comprovar o caráter incondicional dos descontos recebidos, uma vez que não cuidou em juntar a exordial os contratos de parceria comercial para promoção de marca firmados com alguns dos seus fornecedores. Também não apresentou notas fiscais demonstrando os descontos.\r\r\n\r\r\n Assim, ausente comprovação do caráter incondicional dos descontos e das bonificações objeto dos autos, inexistindo prova pré-constituída apta a demonstrar que tais valores não integram a base de cálculo das contribuições discutidas.\r\r\n\r\r\n Por fim, trago à baila recente julgado deste Egrégio Tribunal Federal que corrobora com o entendimento aqui perfilhado, vejamos:\r\r\n\r\r\n DIREITO TRIBUTÁRIO. RECURSO DE APELAÇÃO. BASE DE CÁLCULO DA CONTRIBUIÇÃO AO PIS E DA COFINS. ARTS. 1º, CAPUT, § 3º, V, A, DAS LEIS NS. 10.637/2002 E 10.883/2003. DESCONTO CONCEDIDO POR FORNECEDORES NA AQUISIÇÃO DE PRODUTOS POR VAREJISTA. DEDUZIDO SE A PARCELA REDUTORA DO CUSTO NÃO CARACTERIZA RECEITA DO COMPRADOR E SE A CONTRAPARTIDA DO ADQUIRENTE PARA OBTENÇÃO DO ABATIMENTO NÃO CONFIGURA PRESTAÇÃO DE SERVIÇO. NECESSIDADE DE DESTAQUE DOS DESCONTOS INCONDICIONAIS NAS NOTAS FISCAIS. ENTENDIMENTO DO STJ.\r\r\n\r\r\n 1. Recurso de apelação interposto pela parte impetrante, contra sentença que, denegando a segurança pleiteada, não reconheceu o direito da impetrante de proceder ao recolhimento do PIS e da COFINS sem a inclusão dos valores referentes a descontos comerciais e bonificações concedidos por fornecedores.\r\r\n\r\r\n 2. A questão central nos autos diz respeito à possibilidade de declarar o direito à exclusão dos descontos pactuados e bonificações das bases de cálculo da contribuição para o PIS e da COFINS. (...) 11. 'In casu', quando da impetração do presente mandamus, foram juntados aos autos cópias de notas fiscais nas quais constam remessas/saídas na forma de bonificações, doações ou brindes. No entanto, a parte impetrante não acostou cópia dos contratos que ensejaram tais bonificações e descontos, o que impossibilita seja analisado se, de fato, as avenças ostentam o caráter incondicional necessário à concessão da segurança. 12. Após instado pelo magistrado \"a quo\" a fazê-lo, o impetrante coligiu ao feito cópias tela de sistema interno relativo a pactuação firmada com a Nestlé (ID. 4058300.29906745), as quais não descrevem satisfatoriamente os termos da ação promocional respectiva. O mesmo ocorre nas cópias de \"acordo verba comercial\" anexadas sob os IDs. 4058300.29906747 e 4058300.29906744. Nestas, inclusive, há expressa a observação de que \"as ações serão pagas mediante comprovação das contrapartidas. As ações deverão ser comprovadas em até no máximo 7 dias corridos após o encerramento da execução. Para ações atreladas a volume Sell-out, serão pagos acordos com atingimento entre 80% e 100% do volume negociado. A não comprovação acarretará no não pagamento do acordo\" - o que sugere se tratar de descontos condicionados. 13. Não é possível, pelo que dos autos consta, verificar se as contrapartidas supracitadas estão intrinsecamente relacionadas, ou não, ao objeto central da avença. Apenas se assim estivessem, não poderiam ser confundidas com autônoma prestação de serviços, pois se configurariam como ações levadas em conta pelos contratantes para avaliar a composição do preço das transações empresariais por si entabuladas. 14. Vale ressaltar que, para a exclusão dos descontos incondicionais da base de cálculo dos tributos incidentes sobre as operações mercantis, a jurisprudência do STJ exige que tais bonificações estejam destacadas nas notas fiscais. 15. No caso em descortino, embora a impetrante tenha anexado aos autos notas fiscais que mencionam operações que detêm natureza de bonificações, doações ou brindes, as notas fiscais em epígrafe são insuficientes para demonstrar que os descontos e bonificações avençados são de fato incondicionais. A própria impetrante menciona receber tanto descontos e bonificações condicionais quanto incondicionais, sem distinguir, na presente hipótese, a qual modalidade - condicionada ou incondicionada - se referem as deduções objeto dos comprovantes coligidos. 16. A mera afirmação de que os descontos e as bonificações entabulados são incondicionais, portanto, é insuficiente. Tal informação deveria ser comprovada pelo manancial probatório do presente writ, a partir da descrição das contrapartidas a serem prestadas, para que se pudesse verificar se estas estão intrinsecamente relacionadas ao objeto central das avenças ou se transbordam a referida finalidade. Para tanto, a impetrante poderia ter juntado aos autos os termos dos contratos firmados entre ela e os fornecedores, o que não fez. 17. Ainda que não seja possível afirmar que a mera pactuação de contrapartida (in casu, repise-se que algumas das avenças mencionam contrapartidas a cargo do revendedor) para a redução da quantia paga ao fornecedor constitui-se, por si só, em fato gerador de receita - e, portanto, passível de incidência da exação sobre os descontos questionados -, não há nos autos substrato suficiente para que se entenda qual a natureza das contrapartidas em comento e de que forma elas devem ser prestadas. 18. Esclareça-se que os negócios jurídicos celebrados mediante condição são definidos no Código Civil como aqueles que têm seus efeitos subordinados a evento futuro e incerto (cf. art. 121). De fato, não há nos autos demonstração de que as ações de contrapartida assumidas pela apelante se revestiriam dessa qualidade. Porém, de mesmo modo, tampouco a apelante logrou demonstrar se as referidas contrapartidas caracterizariam condição autônoma de prestação de serviço e, estando vinculadas aos objetos contratuais - nenhum contrato foi coligido, frise-se -, estariam vinculadas a evento futuro e certo (o que faria com que deixassem de ser condicionais), consubstanciado em eventuais ações a serem desenvolvidas pela apelante. 19. Ausente comprovação do caráter incondicional dos descontos e das bonificações objeto dos autos, estes não devem ser excluídos das bases de cálculo do PIS e da COFINS, motivo pelo qual deve ser mantida a denegação da segurança. 20. Sem honorários (art. 25 da Lei n. 12.016/2009). (TRF5, 0802299-27.2024.4.05.8300, Apelação Cível, Desembargadora Relatora: Amanda Torres de Lucena Diniz Araújo (Convocada), Julgamento: 05/07/2024, DJe: 08/07/2024).\r\r\n\r\r\n Diante do exposto, nego provimento à apelação.\r\r\n\r\r\n Sem honorários advocatícios, nos termos do art. 25 da Lei nº 12.016/09.\r\r\n\r\r\n É como voto.", "voto": "(pendente)", "acordao": "Decide a 3ª Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO à apelação, nos termos do voto do relator, na forma do relatório constante dos autos, que fica fazendo parte integrante do presente julgado.\r\r\n\r\r\n Des. Federal ROGÉRIO FIALHO MOREIRA\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido"}, {"nome": "20260316_161603_Re__VOTO.ED.0800884-90.2025.4.05.8100.VIRTUAL.26.03.2026", "cnj": "0800884-90.2025.4.05.8100", "cab": "APELAÇÃO CÍVEL (198) Nº 0800884-90.2025.4.05.8100", "assessor": "Joana Barbosa Lima De Oliveira", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "TRIBUTÁRIO. EMBARGOS DE DECLARAÇÃO. PROGRAMA EMERGENCIAL DE RETOMADA DO SETOR DE EVENTOS (PERSE). BENEFÍCIO FISCAL. TEMA 1.283/STJ. LEI Nº 14.859/2024.  INSCRIÇÃO NO CADASTUR. EXIGÊNCIA. AUSÊNCIA OMISSÃO. REDISCUSSÃO. EMBARGOS NÃO PROVIDOS.\r\r\n\r\r\n 1. Embargos de declaração opostos por PIATO PIZZARIA LTDA em face de acórdão desta Turma que, à unanimidade de votos, negou provimento à apelação da autora para manter a sentença que julgou improcedente a pretensão autoral que buscava assegurar o direito da autora de fazer jus ao benefício da desoneração fiscal estabelecido pelo Programa de Retomada do Setor de Eventos (PERSE), ou melhor, a redução para zero das alíquotas/ do PIS, COFINS, CSLL e IRPJ.\r\r\n\r\r\n 2. Os embargos de declaração, consoante disciplina o art.1.022 do CPC, objetivam corrigir erro material ou sanar eventuais omissões, contradições ou obscuridades da decisão judicial, não se prestando como instrumento processual apto a promover a reapreciação do julgado.\r\r\n\r\r\n 3. A embargante, nas razões recursais, apesar de mencionar suposta omissões, não traz qualquer elemento que demonstre o alegado, limitando-se a rediscutir o mérito da questão.\r\r\n\r\r\n 4. O acórdão embargado, ao apreciar a controvérsia em conformidade com a legislação aplicável e a jurisprudência pertinente, aplicou o entendimento firmado pelo Superior Tribunal de Justiça no julgamento do Tema nº 1.283, segundo o qual é necessária a prévia inscrição do prestador de serviços turísticos no CADASTUR, nos termos da Lei nº 11.771/2008, como condição para a fruição da alíquota zero aplicável ao PIS/COFINS, ao IRPJ e à CSLL, instituída pelo art. 4º da Lei nº 14.148/2021, no âmbito do Programa Emergencial de Retomada do Setor de Eventos (PERSE).\r\r\n\r\r\n 5. O decisum foi expresso ao consignar que, a Lei nº 14.592/2023, por meio de seu art. 1º, acrescentou o § 5º ao art. 4º da Lei nº 14.148/2021, conferindo respaldo legal à exigência de regularidade no referido cadastro para fins de fruição dos benefícios fiscais do PERSE. Posteriormente, a Lei nº 14.859/2024 conferiu nova redação ao dispositivo, permitindo que a regularidade no CADASTUR fosse comprovada em 18 de março de 2022 ou adquirida entre essa data e 30 de maio de 2023, ampliando o marco temporal para que as empresas pudessem adequar-se ao requisito legal.\r\r\n\r\r\n 6. No caso concreto, embora a empresa embargante tenha comprovado sua inscrição no CADASTUR (Id 4050701), o referido registro somente ocorreu em 25/07/2024, portanto não atende ao requisito temporal fixado em lei (18/03/2022, ou aquisição entre 18/03/2022 e 30/05/2023).\r\r\n\r\r\n 7. O acórdão embargado traz, de forma clara e suficiente, os pontos de fato e de direito apresentados pelas partes ao longo do processo e, tendo enfrentado todos os argumentos levantados, esclarece os motivos que levaram a Turma a decidir daquela forma, tendo sido apreciados todos os pedidos e causas de pedir apresentadas pelas partes, o que afasta a omissão.\r\r\n\r\r\n 8. O julgador não está obrigado a rebater todos os argumentos suscitados pelas partes, mas a fundamentar o julgado com as razões suficientes ao seu convencimento, conforme assentado pelo STF.\r\r\n\r\r\n 9. A embargante deseja rediscutir questões efetivamente apreciadas por ocasião do julgamento que originou o acórdão ora questionado, entretanto, os embargos de declaração, ainda que opostos para fins de prequestionamento, não se prestam a este fim.\r\r\n\r\r\n 10. Embargos de declaração conhecidos e não providos.", "relatorio": "Trata-se de embargos de declaração opostos por PIATO PIZZARIA LTDA em face de acórdão desta Turma que, à unanimidade de votos, negou provimento à apelação da autora para manter a sentença que julgou improcedente a pretensão autoral que buscava assegurar o direito da autora de fazer jus ao benefício da desoneração fiscal estabelecido pelo Programa de Retomada do Setor de Eventos (PERSE), ou melhor, a redução para zero das alíquotas/ do PIS, COFINS, CSLL e IRPJ.\r\r\n\r\r\n Nas razões recursais, a embargante aponta que o acórdão embargado teria sido omisso na análise dos seguintes pontos: a) a inscrição no CADASTUR deve ser interpretada como um requisito de formalidade administrativa ou mesmo de acesso facilitado, e não como condição excludente ou impeditiva para usufruto dos incentivos fiscais previstos no PERSE; b) a prévia inscrição no CADASTUR não constitui requisito essencial para o acesso ao benefício, mas sim uma formalidade acessória, cuja ausência não pode, por si só, excluir o direito à política pública instituída pela Lei nº 14.148/2021; c) a empresa embargante caracteriza um bem jurídico tutelado pela Lei nº 14.859/2024.\r\r\n\r\r\n Apresentada contrarrazões pela Fazenda Nacional.\r\r\n\r\r\n É o relatório.", "voto": "Os embargos de declaração, consoante disciplina o art.1.022 do CPC, objetivam corrigir erro material ou sanar eventuais omissões, contradições ou obscuridades da decisão judicial, não se prestando como instrumento processual apto a promover a reapreciação do julgado.\r\r\n\r\r\n A embargante, nas razões recursais, apesar de mencionar suposta omissões, não traz qualquer elemento que demonstre o alegado, limitando-se a rediscutir o mérito da questão.\r\r\n\r\r\n O acórdão embargado, ao apreciar a controvérsia em conformidade com a legislação aplicável e a jurisprudência pertinente, aplicou o entendimento firmado pelo Superior Tribunal de Justiça no julgamento do Tema nº 1.283, segundo o qual é necessária a prévia inscrição do prestador de serviços turísticos no CADASTUR, nos termos da Lei nº 11.771/2008, como condição para a fruição da alíquota zero aplicável ao PIS/COFINS, ao IRPJ e à CSLL, instituída pelo art. 4º da Lei nº 14.148/2021, no âmbito do Programa Emergencial de Retomada do Setor de Eventos (PERSE).\r\r\n\r\r\n Ademais, o decisum foi expresso ao consignar que, a Lei nº 14.592/2023, por meio de seu art. 1º, acrescentou o § 5º ao art. 4º da Lei nº 14.148/2021, conferindo respaldo legal à exigência de regularidade no referido cadastro para fins de fruição dos benefícios fiscais do PERSE. Posteriormente, a Lei nº 14.859/2024 conferiu nova redação ao dispositivo, permitindo que a regularidade no CADASTUR fosse comprovada em 18 de março de 2022 ou adquirida entre essa data e 30 de maio de 2023, ampliando o marco temporal para que as empresas pudessem adequar-se ao requisito legal.\r\r\n\r\r\n Como exposto no acórdão embargado, no caso concreto, embora a empresa embargante tenha comprovado sua inscrição no CADASTUR (Id 4050701), o referido registro somente ocorreu em 25/07/2024, portanto não atende ao requisito temporal fixado em lei (18/03/2022, ou aquisição entre 18/03/2022 e 30/05/2023).\r\r\n\r\r\n O acórdão embargado traz, de forma clara e suficiente, os pontos de fato e de direito apresentados pelas partes ao longo do processo e, tendo enfrentado todos os argumentos levantados, esclarece os motivos que levaram a Turma a decidir daquela forma, tendo sido apreciados todos os pedidos e causas de pedir apresentadas pelas partes, o que afasta a omissão.\r\r\n\r\r\n Ademais, conforme assentado pelo STF, o julgador não está obrigado a rebater todos os argumentos suscitados pelas partes, mas a fundamentar o julgado com as razões suficientes ao seu convencimento.\r\r\n\r\r\n Dito isso, acaso pretenda desconstituir os fundamentos utilizados no acórdão, cabe a parte manejar o recurso cabível, não se prestando os aclaratórios a revisar e reformar o julgado, modificando a sua conclusão por mero inconformismo.\r\r\n\r\r\n Conclui-se, assim, que, em relação ao tema, a embargante deseja rediscutir questões efetivamente apreciadas por ocasião do julgamento que originou o acórdão ora questionado. Frise-se, entretanto, que embargos de declaração, ainda que opostos para fins de prequestionamento, não se prestam a este fim.\r\r\n\r\r\n Em face do exposto, CONHEÇO dos embargos de declaração e NEGO-LHES PROVIMENTO.\r\r\n\r\r\n É como voto.", "acordao": "Vistos, etc.\r\r\n\r\r\n Decide a 3ª Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, CONHECER dos embargos de declaração e NEGAR-LHES PROVIMENTO, nos termos do voto do relator e na forma do relatório constante dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Resultado não identificado", "css": "outro"}, {"nome": "20260317_035724_Re__VOTO.0050450-23.2025.4.05.8300.VIRTUAL.26.03.2026", "cnj": "0050450-23.2025.4.05.8300", "cab": "APELAÇÃO / REMESSA NECESSÁRIA (1728) Nº 0050450-23.2025.4.05.8300", "assessor": "Gabriel Santos Aquino De Oliveira", "comentario": "E, no mérito, acho que ele tem razão. A remoção pode (e deve) priorizar quem é da própria instituição (mas isso fica para depois)\r\r\n\r\r\nOk", "tipo": "Virtual", "data": "26.03.2026", "ementa": "ADMINISTRATIVO E PROCESSUAL CIVIL. APELAÇÃO. MANDADO DE SEGURANÇA. REMOÇÃO INTERNA DE SERVIDOR PÚBLICO FEDERAL. PROFESSOR EBTT. EDITAL REI/IFPE Nº 50/2025-GR. CRITÉRIO DE CLASSIFICAÇÃO. TEMPO DE SERVIÇO NO CARGO EFETIVO ATUAL. AUSÊNCIA DE CITAÇÃO DE LITISCONSORTE PASSIVO NECESSÁRIO. SERVIDOR CLASSIFICADO EM 1º LUGAR NO PROCESSO SELETIVO. NULIDADE ABSOLUTA DO PROCESSO DESDE A ORIGEM. REMESSA NECESSÁRIA E APELAÇÃO DO PARTICULAR PROVIDAS. APELAÇÃO DO IFPE PREJUDICADA.\r\r\n\r\r\n 1. Remessa Necessária e Recursos de Apelação interpostos pelo INSTITUTO FEDERAL DE EDUCAÇÃO, CIÊNCIA E TECNOLOGIA DE PERNAMBUCO – IFPE e por MARCIO LIMA BARROS DA SILVA, em face da sentença proferida pelo Juízo da 3ª Vara Federal da Seção Judiciária da Paraíba que, confirmando a liminar, concedeu a segurança para anular o item 5.3 do Edital REI/IFPE N° 50/2025-GR, ratificando o direito da impetrante à contagem integral do tempo de serviço (11 anos e 29 dias) com a respectiva reclassificação.\r\r\n\r\r\n 2. Na origem, trata-se de Mandado de Segurança impetrado por KARLUCY FARIAS DE SOUSA em face de ato atribuído ao Reitor do IFPE, objetivando a anulação do item 5.3 do Edital REI/IFPE N° 50/2025-GR, disciplinando o processo de fluxo contínuo de classificação para remoção interna de servidores ocupantes do cargo de Professor do Ensino Básico, Técnico e Tecnológico – EBTT. O referido dispositivo editalício previu que a classificação observará, como primeiro critério, o maior tempo de serviço no IFPE.\r\r\n\r\r\n 3. O juízo a quo concedeu a segurança sob o fundamento de que “para o fito de remoção, o cargo de professor de Universidade Federal ou de Instituto Federal deve ser interpretado como pertencente a um quadro único, vinculado ao Ministério da Educação”.\r\r\n\r\r\n 4. MARCIO LIMA BARROS DA SILVA participou regularmente do processo seletivo de remoção interna regido pelo edital objeto da lide, tendo sido classificado em 1º lugar para a vaga em disputa. A sentença concessiva da segurança repercutiu diretamente sobre essa classificação, afastando-o da primeira colocação sem que lhe fosse oportunizado o contraditório ou a ampla defesa.\r\r\n\r\r\n 5. O Superior Tribunal de Justiça firmou o entendimento de que \"a impetração de ação de mandado de segurança contra atos administrativos que beneficiam terceiros há implicar que a estes seja franqueado o direito de integrar o polo passivo, na condição de litisconsortes necessários, pena de nulidade absoluta\" (STJ, RMS 62.831/MT, Rel. Ministro Mauro Campbell Marques, Segunda Turma, DJe 18/12/2020).\r\r\n\r\r\n 6. A mesma orientação foi reafirmada pelo STJ ao assentar que \"sempre que os efeitos da sentença atingem os candidatos já aprovados, alterando-lhes notas e ordem de classificação, devem todos eles integrar a lide na condição de litisconsortes necessários, em aplicação ao comando do art. 47 do CPC, sob pena de nulidade do processo a partir de sua origem\" (STJ, RMS 50.635/DF, Rel. Ministro Herman Benjamin, Segunda Turma, DJe 27/4/2017).\r\r\n\r\r\n 7. A hipótese não se confunde com a de concurso público para provimento de cargo, em que os candidatos detêm mera expectativa de direito à nomeação. No processo seletivo de remoção interna com vagas definidas e critérios objetivos de classificação, o servidor que obteve a primeira colocação titulariza posição jurídica já consolidada. O Superior Tribunal de Justiça, em caso análogo envolvendo promoção de servidores, reconheceu que “\"a eventual concessão da segurança importaria, inexoravelmente, na remoção dos militares que atualmente ocupam o cargo no nível da carreira pleiteado pelos impetrantes. Claramente, aqueles seriam juridicamente afetados pelo ato impugnado, o que implicaria a necessidade de integrarem a relação processual instaurada pelo mandamus, a título de litisconsortes necessários\", sob pena de nulidade. (STJ, RMS 44.122/TO, Rel. Ministro MAURO CAMPBELL MARQUES, SEGUNDA TURMA, DJe de 19/08/2015)\r\r\n\r\r\n 8. Remessa Necessária e Apelação de MARCIO LIMA BARROS DA SILVA providas para anular o processo desde a origem e determinar o retorno dos autos ao juízo a quo, a fim de que se promova a sua citação na condição de litisconsorte passivo necessário, prosseguindo-se, em seguida, com o regular processamento do mandamus. Apelação do IFPE prejudicada.", "relatorio": "Trata-se de Remessa Necessária e Recursos de Apelação interpostos pelo INSTITUTO FEDERAL DE EDUCAÇÃO, CIÊNCIA E TECNOLOGIA DE PERNAMBUCO – IFPE e por MARCIO LIMA BARROS DA SILVA, em face da sentença proferida pelo Juízo da 3ª Vara Federal da Seção Judiciária da Paraíba que, confirmando a liminar, concedeu a segurança para anular o item 5.3 do Edital REI/IFPE N° 50/2025-GR ratificando o direito da impetrante à contagem integral do tempo de serviço (11 anos e 29 dias) com a respectiva reclassificação.\r\r\n\r\r\n Em suma, o IFPE alega que: a) é lícito o critério eleito para fins de remoção interna, decisão administrativa fincada na discricionariedade que se lhe confere o ordenamento jurídico de organizar administrativamente os seus serviços, como também em sua razoabilidade e isonomia, dado o fato de, ao diferenciar situações díspares, outorgar maior peso classificatório àqueles servidores com mais tempo de casa; b) a vinculação dos IFs, como autarquias federais, ao órgão da União responsável pela formulação da política nacional de educação não altera a diferença de personalidade jurídica de cada um dos diversos institutos existentes, não havendo impedimento para que, cada unidade, na organização decorrente de seus serviços, eleja os critérios que considere mais prestantes às finalidades que lhe são outorgadas.\r\r\n\r\r\n Por sua vez, MARCIO LIMA BARROS DA SILVA alega, em síntese, que: a) intervém no presente feito na qualidade de terceiro prejudicado, amparado pelo art. 996 do CPC, uma vez que, ao desconstituir sua classificação em 1º lugar no processo de remoção interna redigido pelo Edital REI/IFPE N° 50/2025-GR, a decisão judicial atingiu diretamente o direito subjetivo já integrado à realidade funcional do recorrente; b) a prestação jurisdicional foi proferida sem a integração à lide do ora Apelante, primeiro colocado no certamente, em hipótese que era imperativa a formação de litisconsórcio passivo necessário, nos termos do art. 114 do CPC; c) a sentença recorrida padece de vício processual insanável, pois o Juízo de origem incorreu em error in procedendo ao deixar de promover a citação deste recorrente para integrar a lide na condição de litisconsorte passivo necessário no caso que o provimento jurisdicional desconstituiu direito subjetivo à vaga por ele ocupada, sem a observância do contraditório e da ampla defesa; d) o vício apontado compromete a formação válida da relação processual, configurando nulidade absoluta, matéria de ordem pública, cognoscível de ofício a qualquer tempo e grau de jurisdição e, nos termos do art. 114 do CPC, o litisconsórcio é necessário quando, pela natureza da relação jurídica controvertida, a eficácia da sentença depender da citação de todos que devem ser parte; e) é pacífico o entendimento do STJ de que, em mandados de segurança cujos efeitos prejudicam ou beneficiam terceiros determinados, a formação do litisconsórcio passivo necessário é condição de validade do processo, sob pena de nulidade absoluta (RMS nº. 62.831/MT); f) a sentença fundamentou-se em premissa jurídica inaplicável ao caso concreto: a tese de que o cargo de professor federal integra um suposto “quadro único”, circunstância que afastaria a possibilidade de restrição do tempo de serviço ao âmbito da instituição de lotação, valendo-se de precedentes que tratam de realidades jurídicas distintas da discutida nos autos; g) a própria legislação federal confere ao IFPE a competência para estabelecer critérios de classificação que atendam ao interesse público institucional, sendo legítimo o critério de antiguidade no efetivo exercício na instituição; h) o conceito de “quadro único” permite o intercâmbio entre instituições federais de ensino, mas não suprime a individualidade administrativa de cada autarquia, nem sua competência para disciplinar seus processos internos.\r\r\n\r\r\n Contrarrazões apresentadas.\r\r\n\r\r\n É o relatório.", "voto": "De início, recebo as apelações, considerando presentes os pressupostos recursais intrínsecos (cabimento, legitimação, interesse e inexistência de fato impeditivo ou extintivo do direito de recorrer) e extrínsecos (preparo, tempestividade e regularidade formal) para a admissibilidade dos recursos.\r\r\n\r\r\n Na origem, trata-se de Mandado de Segurança impetrado por KARLUCY FARIAS DE SOUSA em face de ato atribuído ao Reitor do IFPE, objetivando a anulação do item 5.3 do Edital REI/IFPE N° 50/2025-GR, disciplinando o processo de fluxo contínuo de classificação para remoção interna de servidores ocupantes do cargo de Professor do Ensino Básico, Técnico e Tecnológico – EBTT.\r\r\n\r\r\n O referido dispositivo editalício previu que a classificação observará, como primeiro critério, o maior tempo de serviço no IFPE no cargo efetivo atual, contado em dias, incluindo-se o tempo prestado no CEFET/PE, na ETFPE e nas antigas Escolas Agrotécnicas de Barreiros, Belo Jardim e Vitória de Santo Antão. Para esse fim, considerar-se-ão como de efetivo exercício os afastamentos e as licenças previstos no art. 102 da Lei nº 8.112, de 11 de novembro de 1990.\r\r\n\r\r\n O juízo a quo concedeu a segurança sob o fundamento de que “para o fito de remoção, o cargo de professor de Universidade Federal ou de Instituto Federal deve ser interpretado como pertencente a um quadro único, vinculado ao Ministério da Educação”.\r\r\n\r\r\n Contudo, MARCIO LIMA BARROS DA SILVA informou nos autos que participou regularmente do Processo Seletivo de Remoção Interna regido pelo edital objeto da lide, tendo sido classificado em 1º lugar para a vaga objeto da controvérsia.\r\r\n\r\r\n Como fundamento principal do recurso, MARCIO LIMA BARROS DA SILVA aponta a nulidade do processo desde a origem, pela ausência de sua citação na condição de litisconsorte passivo necessário, nos termos dos arts. 114 e 115, I, do CPC/2015.\r\r\n\r\r\n Da análise dos autos, verifica-se que o apelante, MARCIO LIMA BARROS DA SILVA, foi direta e adversamente afetado pelo provimento jurisdicional que o removeu da primeira colocação no processo de remoção, sem que lhe fosse oportunizado o contraditório ou a ampla defesa.\r\r\n\r\r\n Nesse sentido, o Superior Tribunal de Justiça entende que, quando o julgamento do mandamus potencialmente repercuta na esfera jurídica de terceiro, faz-se necessário oportunizar o exercício do contraditório, sob pena de nulidade absoluta. Vejamos:\r\r\n\r\r\n PROCESSUAL CIVIL. RECURSO ORDINÁRIO EM MANDADO DE SEGURANÇA. ENUNCIADO ADMINISTRATIVO 3/STJ. ATO COATOR QUE BENEFICIA TERCEIROS. FALTA DE INTEGRAÇÃO NO POLO PASSIVO. LITISCONSÓRCIO PASSIVO NECESSÁRIO. NULIDADE ABSOLUTA.\r\r\n\r\r\n 1. A impetração de ação de mandado de segurança contra atos administrativos que beneficiam terceiros há implicar que a estes seja franqueado o direito de integrar o polo passivo, na condição de litisconsortes necessários, pena de nulidade absoluta.\r\r\n\r\r\n 2. Recurso ordinário em mandado de segurança julgado prejudicado.\r\r\n\r\r\n (RMS 62.831/MT, Rel. Ministro MAURO CAMPBELL MARQUES, SEGUNDA TURMA, julgado em 15/12/2020, DJe 18/12/2020)\r\r\n\r\r\n No caso dos autos, a concessão da segurança pelo juízo a quo repercutiu diretamente sobre a classificação de MARCIO LIMA BARROS DA SILVA, que ocupava a primeira colocação no processo seletivo de remoção interna regido pelo Edital REI/IFPE nº 50/2025-GR, sem que lhe fosse oportunizado o exercício do contraditório ou da ampla defesa.\r\r\n\r\r\n A hipótese, portanto, amolda-se ao entendimento consolidado pelo Superior Tribunal de Justiça segundo o qual, sempre que os efeitos da decisão proferida em mandado de segurança atingem a esfera jurídica de terceiros beneficiários do ato impugnado, é indispensável a sua integração ao polo passivo na condição de litisconsortes passivos necessários, sob pena de nulidade absoluta do processo. Nesse sentido, colaciono os seguintes precedentes (grifos acrescidos):\r\r\n\r\r\n ADMINISTRATIVO E PROCESSUAL CIVIL. MANDADO DE SEGURANÇA. PROMOÇÃO, POR MERECIMENTO, NA CARREIRA DA ADVOCACIA-GERAL DA UNIÃO. PROCURADORA FEDERAL DE PRIMEIRA CATEGORIA. PRETENSÃO DE CÔMPUTO DAS PONTUAÇÕES REFERENTES À CONCLUSÃO DE CURSO DE PÓS-GRADUAÇÃO LATO SENSU E AO EXERCÍCIO DO MESMO CARGO EM COMISSÃO, POR UM ANO. PRELIMINARES ARGUIDAS PELO IMPETRADO. PRAZO DECADENCIAL PARA IMPETRAÇÃO DO MANDAMUS. NÃO OCORRÊNCIA. INCIDÊNCIA DA SÚMULA 266/STF AFASTADA. AUSÊNCIA DE CITAÇÃO DOS LITISCONSORTES PASSIVOS NECESSÁRIOS. LISTAGEM DOS PROCURADORES FEDERAIS PROMOVIDOS, POR MERECIMENTO, DA PRIMEIRA CATEGORIA PARA A CATEGORIA ESPECIAL, EM DECORRÊNCIA DO EDITAL 01/PGF, DE 2016. ART. 114 DO CPC/2015. PRELIMINAR ACOLHIDA, PARA QUE OS AUTOS RETORNEM AO RELATOR, A FIM DE QUE A IMPETRANTE SEJA INTIMADA PARA QUE PROMOVA A CITAÇÃO DOS LITISCONSORTES PASSIVOS NECESSÁRIOS.\r\r\n\r\r\n I. Trata-se de Mandado de Segurança, impetrado por Procuradora Federal, contra suposto ato ilegal do Ministro Advogado-Geral da União - que negou provimento a recurso administrativo interposto pela impetrante, em face de resultado atinente à pontuação computada a título de merecimento, para fins de promoção na carreira, consoante critérios estabelecidos pelo Edital 01/PGF, de 2016 -, objetivando a concessão da segurança, para reconhecer a ilegalidade e a abusividade do improvimento do recurso administrativo por ela interposto, de modo a computar 1,75 pontos (1 ponto referente ao curso de pós-graduação e 0,75 pelo exercício anual de cargo em comissão), retificando a lista de promoção, reclassificando-a e promovendo-a à categoria subsequente, caso, com a pontuação conferida, obtenha êxito para tanto.\r\r\n\r\r\n [...]\r\r\n\r\r\n IV. Na inicial do mandamus, a impetrante objetiva a concessão da almejada pontuação e a retificação da lista de promoção da primeira categoria para a categoria especial, com a sua reclassificação e promoção à categoria subsequente, o que, à evidência, atinge a esfera jurídica dos Procuradores Federais já promovidos em decorrência do Edital 01/PGF, de 2016, eis que, conforme consta das informações, prestadas pela autoridade coatora, \"a eventual concessão da ordem, necessariamente, afetará a esfera jurídica individual dos 31 (trinta e um) Procuradores Federais promovidos por merecimento, com efeitos a contar de 1º de janeiro de 2016\".\r\r\n\r\r\n V. A jurisprudência do STJ entende que, \"em regra, é prescindível a formação de litisconsórcio passivo necessário entre candidatos de concurso público, na medida em que eles têm apenas expectativa de direito à nomeação\" (STJ, MS 24.596/DF, Rel. Ministra MARIA THEREZA DE ASSIS MOURA, CORTE ESPECIAL, DJe de 20/09/2019). Contudo, a presente hipótese não trata de concurso público de provas e títulos para provimento de cargo público, em que há tão somente expectativa de direito à nomeação. O caso em julgamento cuida de promoção de Procuradores Federais em exercício, em que a quantidade de vagas, em cada categoria, é legalmente definida.\r\r\n\r\r\n VI. Segundo entendimento desta Corte, \"é imperativa a necessidade de citação dos candidatos aprovados no certame em melhor classificação que a da impetrante, na condição de litisconsortes passivos necessários, uma vez que a alteração do resultado pode repercutir na esfera jurídica individual\" (STJ, RMS 50.635/DF, Rel. Ministro HERMAN BENJAMIN, SEGUNDA TURMA, DJe de 27/04/2017), ou, ainda, em caso de promoção de policiais militares, \"a eventual concessão da segurança importaria, inexoravelmente, na remoção dos militares que atualmente ocupam o cargo no nível da carreira pleiteado pelos impetrantes. Claramente, aqueles seriam juridicamente afetados pelo ato impugnado, o que implicaria a necessidade de integrarem a relação processual instaurada pelo mandamus, a título de litisconsortes necessários\", sob pena de nulidade (STJ, RMS 44.122/TO, Rel. Ministro MAURO CAMPBELL MARQUES, SEGUNDA TURMA, DJe de 19/08/2015). Incidência, no caso, do art.114 do CPC/2015.\r\r\n\r\r\n VII. Acolhida a preliminar de necessidade de citação dos litisconsortes passivos necessários, retornando os autos ao Relator, a fim de intimar a impetrante para que promova a citação dos Procuradores Federais constantes da lista de promoção objeto do presente mandamus.\r\r\n\r\r\n (MS n. 22.822/DF, relator Ministro Napoleão Nunes Maia Filho, relatora para acórdão Ministra Assusete Magalhães, Primeira Seção, julgado em 9/9/2020, DJe de 2/2/2021.)\r\r\n\r\r\n ADMINISTRATIVO E PROCESSUAL CIVIL. RECURSO EM MANDADO DE SEGURANÇA. CONCURSO PÚBLICO. CARTÓRIO. NOTIFICAÇÃO DOS DEMAIS CANDIDATOS MAIS BEM CLASSIFICADOS QUE O IMPETRANTE. DESNECESSIDADE. CITAÇÃO DE LITISCONSORTES PASSIVOS NECESSÁRIOS NÃO REALIZADA. POTENCIAL ALTERAÇÃO DO RESULTADO FINAL. NECESSIDADE DA CITAÇÃO. NULIDADE PROCESSUAL. ANULAÇÃO DO ACÓRDÃO E RETORNO DOS AUTOS À INSTÂNCIA ORDINÁRIA PARA REGULARIZAÇÃO. 1. Na origem, cuida-se de Mandado de Segurança impetrado por candidata portadora de necessidade especial aprovada no Concurso Público para Outorga de Delegações de Serventias Extrajudiciais de Notas e de Registro do Distrito Federal (Edital 1/2013), promovido pelo TJDFT, visando à anulação do Edital 29/2015 e dos atos a ele subsequentes, porque foi publicado o resultado final do certame sem que constassem na classificação geral os candidatos portadores de necessidade especial também aprovados, os quais foram arrolados apenas em lista específica, embora o item 14.3 do edital do certame assegurasse que os candidatos com deficiência teriam seus nomes publicados tanto em lista específica quanto na lista de classificação geral.\r\r\n\r\r\n [...]\r\r\n\r\r\n 5. O STJ firmou o entendimento de que sempre que os efeitos da sentença atingem os candidatos já aprovados, alterando-lhes notas e ordem de classificação, devem todos eles integrar a lide na condição de litisconsortes necessários, em aplicação ao comando do art. 47 do CPC, sob pena de nulidade do processo a partir de sua origem.\r\r\n\r\r\n Precedentes: RMS 40.956/MG, Rel. Ministro Mauro Campbell Marques, Segunda Turma, DJe 1º.4.2013; AgRg no RMS 37.596/RS, Rel. Ministro Benedito Gonçalves, Primeira Turma, DJe 4.6.2013; RMS 27.777/PI, Rel. Ministra Maria Thereza de Assis Moura, Sexta Turma, DJe 2.4.2012; AgRg no RMS 25.487/SP, Rel. Ministro Francisco Falcão, Primeira Turma, DJe 18/3/2009.\r\r\n\r\r\n 6. Com amparo no ditame do art. 24 da Lei 12.016/2009, é possível a inclusão de litisconsortes passivos necessários em casos excepcionais ao Mandado de Segurança, apesar do cunho processual diverso do rito mandamental. Precedentes: RMS 44.566/MG, Rel. Ministro Humberto Martins, Segunda Turma, DJe 16/12/2015; RMS 44.122/TO, Rel. Ministro Mauro Campbell Marques, Segunda Turma, DJe 19.8.2015.\r\r\n\r\r\n 7. No caso concreto, é imperativa a necessidade de citação dos candidatos aprovados no certame em melhor classificação que a da impetrante, na condição de litisconsortes passivos necessários, uma vez que a alteração do resultado pode repercutir na esfera jurídica individual.\r\r\n\r\r\n 8. Impõe-se a anulação do acórdão de origem e a devolução autos à instância ordinária a fim de que seja feita a citação dos litisconsortes passivos necessários, nos termos do art. 47 do Código de Processo Civil e da jurisprudência do STJ.\r\r\n\r\r\n 9. Recurso Ordinário provido em parte.\r\r\n\r\r\n (RMS n. 50.635/DF, relator Ministro Herman Benjamin, Segunda Turma, julgado em 13/12/2016, DJe de 27/4/2017.)\r\r\n\r\r\n Em face do exposto, DOU PROVIMENTO à Remessa Necessária e Apelação interposta por MARCIO LIMA BARROS DA SILVA para anular o processo desde a origem e determinar o retorno dos autos ao juízo a quo, a fim de que se promova a sua citação na condição de litisconsorte passivo necessário, prosseguindo-se, em seguida, com o regular processamento do mandamus.\r\r\n\r\r\n Julgo prejudicada a Apelação do IFPE.\r\r\n\r\r\n É como voto.", "acordao": "Vistos, etc.\r\r\n\r\r\n Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, DAR PROVIMENTO à Remessa Necessária e à Apelação do particular, julgando prejudicada a Apelação do IFPE, nos termos do voto do relator e na forma do relatório constante dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Provido", "css": "provido"}, {"nome": "20260317_080825_Re__VOTO.0008022-94.2025.4.05.0000.VIRTUAL.26.03.2026", "cnj": "0008022-94.2025.4.05.0000", "cab": "AGRAVO DE INSTRUMENTO (202) Nº 0008022-94.2025.4.05.0000", "assessor": "Ariel C. Santana", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "ADMINISTRATIVO. AGRAVO DE INSTRUMENTO. BENEFÍCIO DA JUSTIÇA GRATUITA. ALEGAÇÃO DE HIPOSSUFICIÊNCIA. PERDA AUDITIVA NEUROSSENSORIAL UNILATERAL PROFUNDA (CID H90.4). DESPESAS MÉDICAS. ART. 98 DO CPC. JURISPRUDÊNCIA DO STJ. VALOR DA CAUSA. AUSÊNCIA DE CONTEÚDO ECONÔMICO DA PRETENSÃO DEDUZIDA. AGRAVO DE INSTRUMENTO PROVIDO.\r\r\n\r\r\n 1. Agravo de instrumento, com pedido de atribuição de efeito suspensivo, interposto por ANTONIO WARNER DE ARAUJO VASCONCELOS contra decisão proferida pelo Juízo da 13ª Vara Federal da Seção Judiciária de Alagoas que indeferiu o pedido de gratuidade da justiça por ele formulado.\r\r\n\r\r\n 2. O agravante sustenta que os elementos constantes dos autos, corroborados pelos documentos de comprovação de gastos (boletos, comprovantes de imposto de renda e demonstrativos de proventos), evidenciam sua hipossuficiência econômica, diante dos elevados gastos mensais decorrentes de dificuldades de saúde (perda auditiva neurossensorial unilateral profunda e uso de medicamentos controlados).\r\r\n\r\r\n 3. O Juiz a quo indeferiu o pedido de justiça gratuita sob o seguinte fundamento: (...) Indefiro, ainda, o pedido de assistência judiciária gratuita, eis que os documentos colacionados dão conta de não ser o autor hipossuficiente. Ademais, o demandante não deu escorreito cumprimento ao quanto determinado no despacho de id. 17241305, não apresentando as cópias de suas declarações de imposto de renda (...).\r\r\n\r\r\n 4. O Código de Processo Civil, ao disciplinar o pedido de gratuidade da justiça, prevê o seguinte: \"Art. 98. A pessoa natural ou jurídica, brasileira ou estrangeira, com insuficiência de recursos para pagar as custas, as despesas processuais e os honorários advocatícios tem direito à gratuidade da justiça, na forma da lei\".\r\r\n\r\r\n 5. O Superior Tribunal de Justiça rejeita a utilização de critérios exclusivamente objetivos para a concessão do benefício da assistência judiciária gratuita, impondo-se a realização de avaliação concreta sobre a capacidade econômica da parte postulante de arcar com os ônus processuais. Precedentes: AgInt no AgInt no AREsp: 1.368.717/PR, Ministro Relator: Ministro Gurgel de Faria, 1ª Turma, Julgamento: 28/04/2020, DJe 04/05/2020; EDcl no REsp 1803554/CE, Ministro Relator: Herman Benjamin, 2ª Turma, Julgamento: 26/11/2019, DJe: 12/05/2020.\r\r\n\r\r\n 6. O agravante, acometido por perda auditiva neurossensorial unilateral profunda – CID H90.4 (surdez unilateral), enfrenta elevados custos decorrentes de sua condição de saúde (e.g. dispêndio de R$ 30.450,00 com aparelho auditivo de alto custo), bem como gastos adicionais com medicamentos, além de outros descontos legais expressivos em sua remuneração, o que reduz de forma sensível a renda líquida efetivamente disponível.\r\r\n\r\r\n 7. Demonstrado, no caso concreto, que o agravante não possui condições de arcar com as custas processuais sem comprometimento de sua própria subsistência. Assim, em consonância com o disposto no art. 98 do CPC e com a orientação jurisprudencial do STJ, faz jus ao benefício da gratuidade de justiça, que visa assegurar o pleno acesso ao Poder Judiciário àqueles que carecem de recursos para custear o processo sem prejuízo de seu sustento.\r\r\n\r\r\n 8. O direito ao benefício da gratuidade da justiça não exige que a parte se encontre em estado de penúria ou miserabilidade, sendo suficiente que a assunção dos encargos processuais importe prejuízo ao sustento próprio ou de sua família.\r\r\n\r\r\n 9. No que concerne ao valor da causa, verifica-se, inicialmente, que o autor ingressou com a presente ação objetivando: (i) o reconhecimento da natureza ocupacional da perda auditiva neurossensorial unilateral, com base no nexo causal entre a enfermidade e as atividades docentes desempenhadas no âmbito do Instituto Federal de Alagoas – IFAL; (ii) a condenação da União ao pagamento de indenização por danos morais, em razão do alegado abalo psíquico, dor, frustração e insegurança decorrentes da surdez unilateral, sugerindo a fixação de valor não inferior a R$ 150.000,00 (cento e cinquenta mil reais); (iii) a determinação de readaptação funcional definitiva, nos termos do art. 24 da Lei nº 8.112/1990, com a manutenção do exercício das funções em ambiente compatível com a limitação auditiva apresentada; e (iv) a garantia de preservação de todos os seus direitos funcionais, sem redução de vencimentos, cargos ou funções atualmente exercidos ou que venha a exercer. Tomando por base o pedido indenizatório formulado, o autor atribuiu à causa o valor de R$ 150.000,00 (cento e cinquenta mil reais), correspondente ao montante indicado a título de compensação por danos morais.\r\r\n\r\r\n 10. O juízo de origem entendeu que os pedidos relacionados a acidente de trabalho, bem como a pretensão indenizatória por danos morais dele decorrente, inserem-se na esfera de competência da Justiça Estadual, e não da Justiça Federal. Em razão disso, reconheceu a incompetência da Justiça Federal para apreciar tais pleitos, determinando o prosseguimento do feito no âmbito federal exclusivamente em relação ao pedido de readaptação funcional definitiva. Não obstante, manteve o valor da causa fixado no montante de R$ 150.000,00 (cento e cinquenta mil reais).\r\r\n\r\r\n 11. Via de regra, o valor atribuído à causa deve refletir o proveito econômico pretendido com o ajuizamento da ação (art. 291 do CPC). Na hipótese em exame, entretanto, uma vez excluídos do âmbito de apreciação da Justiça Federal os pedidos relacionados ao reconhecimento do acidente de trabalho e à indenização por danos morais, remanesce apenas a pretensão voltada à readaptação funcional do servidor, sem quaisquer reflexos na remuneração. É dizer, um eventual provimento do pedido não tem o condão de gerar qualquer enriquecimento material ao autor, tampouco impor diminuição patrimonial ao réu, porquanto a pretensão deduzida não envolve condenação de natureza pecuniária.\r\r\n\r\r\n 12. Agravo de instrumento provido para, suspendendo os efeitos da decisão agravada, conceder ao agravante os benefícios da assistência judiciária gratuita, nos termos do art. 98 do CPC, e fixar o valor da causa em R$ 1.000,00 (mil reais), por ausência de conteúdo econômico imediato da pretensão deduzida (readaptação funcional do servidor).", "relatorio": "Trata-se de agravo de instrumento, com pedido de atribuição de efeito suspensivo, interposto por ANTONIO WARNER DE ARAUJO VASCONCELOS contra decisão proferida pelo Juízo da 13ª Vara Federal da Seção Judiciária de Alagoas que indeferiu o pedido de gratuidade da justiça por ele formulado.\r\r\n\r\r\n O agravante, em suas razões recursais, defende, em síntese, que: a) a decisão agravada indeferiu a justiça gratuita com base na renda bruta anual superior a R$ 220.000,00 (duzentos e vinte mil reais), conforme declarações de Imposto de Renda (IRPF), todavia, não analisou a renda líquida disponível e as despesas extraordinárias apresentadas pelo autor; b) o agravante comprovou: i) elevados descontos: a folha de pagamento acostada demonstra um bruto de R$ 20.560,93 e um desconto total de R$ 10.322,22, resultando em um líquido de R$ 10.238,71 (50% da renda); ii) despesas críticas: o autor tem despesas com pensão alimentícia (R$ 3.831,52 mensais), dificuldades de saúde decorrentes de perda auditiva neurossensorial unilateral profunda (gastos de R$ 30.450,00 com aparelho auditivo de alto custo) e medicamentos (uso de remédios controlados como Bupropiona e Carbonato de Lítio, em virtude de tratamento psiquiátrico contínuo – CID F31.9 e F41.1); c) o valor da causa deve ser reduzido para o valor mínimo legal de R$ 1.000,00 ou para um valor justo a ser arbitrado pelo juízo, eis que, com o reconhecimento da incompetência da Justiça Federal para os pedidos relacionados a causas de acidente de trabalho, o valor da causa originalmente atribuído tornou-se manifestamente excessivo.\r\r\n\r\r\n Contrarrazões apresentadas pelo Instituto Federal de Alagoas – IFAL (Id. 5573660).\r\r\n\r\r\n É o relatório.", "voto": "O agravante sustenta que os elementos constantes dos autos, corroborados pelos documentos de comprovação de gastos (boletos, comprovantes de imposto de renda e demonstrativos de proventos), evidenciam sua hipossuficiência econômica, diante dos elevados gastos mensais decorrentes de dificuldades de saúde (perda auditiva neurossensorial unilateral profunda e uso de medicamentos controlados).\r\r\n\r\r\n O Juiz a quo indeferiu o pedido de justiça gratuita sob o seguinte fundamento:\r\r\n\r\r\n (...) Indefiro, ainda, o pedido de assistência judiciária gratuita, eis que os documentos colacionados dão conta de não ser o autor hipossuficiente. Ademais, o demandante não deu escorreito cumprimento ao quanto determinado no despacho de id. 17241305, não apresentando as cópias de suas declarações de imposto de renda (...)\r\r\n\r\r\n O Código de Processo Civil, ao disciplinar o pedido de gratuidade da justiça, prevê o seguinte:\r\r\n\r\r\n Art. 98. A pessoa natural ou jurídica, brasileira ou estrangeira, com insuficiência de recursos para pagar as custas, as despesas processuais e os honorários advocatícios tem direito à gratuidade da justiça, na forma da lei.\r\r\n\r\r\n (...).\r\r\n\r\r\n § 3 Vencido o beneficiário, as obrigações decorrentes de sua sucumbência ficarão o sob condição suspensiva de exigibilidade e somente poderão ser executadas se, nos 5 (cinco) anos subsequentes ao trânsito em julgado da decisão que as certificou, o credor demonstrar que deixou de existir a situação de insuficiência de recursos que justificou a concessão de gratuidade, extinguindo-se, passado esse prazo, tais obrigações do beneficiário.\r\r\n\r\r\n Art. 99. O pedido de gratuidade da justiça pode ser formulado na petição inicial, na contestação, na petição para ingresso de terceiro no processo ou em recurso.\r\r\n\r\r\n (...). § 2º O juiz somente poderá indeferir o pedido se houver nos autos elementos que evidenciem a falta dos pressupostos legais para a concessão de gratuidade, devendo, antes de indeferir o pedido, determinar à parte a comprovação do preenchimento dos referidos pressupostos.\r\r\n\r\r\n § 3º Presume-se verdadeira a alegação de insuficiência deduzida exclusivamente por pessoa natural.\r\r\n\r\r\n § 4º A assistência do requerente por advogado particular não impede a concessão de gratuidade da justiça.\r\r\n\r\r\n Sobre a matéria, o Superior Tribunal de Justiça rejeita a utilização de critérios exclusivamente objetivos para a concessão do benefício da assistência judiciária gratuita, impondo-se a realização de avaliação concreta sobre a capacidade econômica da parte postulante de arcar com os ônus processuais. Nesse sentido: AgInt no AgInt no AREsp: 1.368.717/PR, Ministro Relator: Ministro Gurgel de Faria, 1ª Turma, Julgamento: 28/04/2020, DJe 04/05/2020; EDcl no REsp 1803554/CE, Ministro Relator: Herman Benjamin, 2ª Turma, Julgamento: 26/11/2019, DJe: 12/05/2020.\r\r\n\r\r\n No presente caso, a partir da análise dos documentos acostados aos autos, verifica-se que o agravante, acometido por perda auditiva neurossensorial unilateral profunda – CID H90.4 (surdez unilateral), enfrenta elevados custos decorrentes de sua condição de saúde (e.g. dispêndio de R$ 30.450,00 com aparelho auditivo de alto custo), bem como gastos adicionais com medicamentos, além de outros descontos legais expressivos em sua remuneração, o que reduz de forma sensível a renda líquida efetivamente disponível.\r\r\n\r\r\n Em razão de tais circunstâncias, resta demonstrado que o agravante não possui condições de arcar com as custas processuais sem comprometimento de sua própria subsistência. Assim, em consonância com o disposto no art. 98 do CPC e com a orientação jurisprudencial do STJ, faz jus ao benefício da gratuidade de justiça, que visa assegurar o pleno acesso ao Poder Judiciário àqueles que carecem de recursos para custear o processo sem prejuízo de seu sustento.\r\r\n\r\r\n Ressalte-se, ainda, que o direito ao benefício da gratuidade da justiça não exige que a parte se encontre em estado de penúria ou miserabilidade, sendo suficiente que a assunção dos encargos processuais importe prejuízo ao sustento próprio ou de sua família.\r\r\n\r\r\n Por sua vez, no que concerne ao valor da causa, verifica-se, inicialmente, que o autor ingressou com a presente ação objetivando: (i) o reconhecimento da natureza ocupacional da perda auditiva neurossensorial unilateral, com base no nexo causal entre a enfermidade e as atividades docentes desempenhadas no âmbito do Instituto Federal de Alagoas – IFAL; (ii) a condenação da União ao pagamento de indenização por danos morais, em razão do alegado abalo psíquico, dor, frustração e insegurança decorrentes da surdez unilateral, sugerindo a fixação de valor não inferior a R$ 150.000,00 (cento e cinquenta mil reais); (iii) a determinação de readaptação funcional definitiva, nos termos do art. 24 da Lei nº 8.112/1990, com a manutenção do exercício das funções em ambiente compatível com a limitação auditiva apresentada; e (iv) a garantia de preservação de todos os seus direitos funcionais, sem redução de vencimentos, cargos ou funções atualmente exercidos ou que venha a exercer.\r\r\n\r\r\n Tomando por base o pedido indenizatório formulado, o autor atribuiu à causa o valor de R$ 150.000,00 (cento e cinquenta mil reais), correspondente ao montante indicado a título de compensação por danos morais.\r\r\n\r\r\n Ocorre que o juízo de origem entendeu que os pedidos relacionados a acidente de trabalho, bem como a pretensão indenizatória por danos morais dele decorrente, inserem-se na esfera de competência da Justiça Estadual, e não da Justiça Federal. Em razão disso, reconheceu a incompetência da Justiça Federal para apreciar tais pleitos, determinando o prosseguimento do feito no âmbito federal exclusivamente em relação ao pedido de readaptação funcional definitiva. Não obstante, manteve o valor da causa fixado no montante de R$ 150.000,00 (cento e cinquenta mil reais).\r\r\n\r\r\n Via de regra, o valor atribuído à causa deve refletir o proveito econômico pretendido com o ajuizamento da ação (art. 291 do CPC). Na hipótese em exame, entretanto, uma vez excluídos do âmbito de apreciação da Justiça Federal os pedidos relacionados ao reconhecimento do acidente de trabalho e à indenização por danos morais, remanesce apenas a pretensão voltada à readaptação funcional do servidor, sem quaisquer reflexos na remuneração. É dizer, um eventual provimento do pedido não tem o condão de gerar qualquer enriquecimento material ao autor, tampouco impor diminuição patrimonial ao réu, porquanto a pretensão deduzida não envolve condenação de natureza pecuniária.\r\r\n\r\r\n Diante desse contexto, conclui-se que, no que remanesce sob a competência da Justiça Federal, a demanda não possui conteúdo econômico imediatamente mensurável, razão pela qual o valor da causa deve ser fixado em R$ 1.000,00 (mil reais), para efeitos fiscais.\r\r\n\r\r\n Ante o exposto, DOU PROVIMENTO ao agravo de instrumento para, suspendendo os efeitos da decisão agravada, conceder ao agravante os benefícios da assistência judiciária gratuita, nos termos do art. 98 do CPC, e fixar o valor da causa em R$ 1.000,00 (mil reais), por ausência de conteúdo econômico imediato da pretensão deduzida (readaptação funcional do servidor).\r\r\n\r\r\n É como voto.", "acordao": "Vistos, etc.\r\r\n\r\r\n Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, DAR PROVIMENTO ao agravo de instrumento, nos termos do voto do relator e na forma do relatório constante dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Provido", "css": "provido"}, {"nome": "20260317_141451_Re__VOTO.0020322-26.2025.4.05.8201.VIRTUAL.26.03.2026", "cnj": "0020322-26.2025.4.05.8201", "cab": "APELAÇÃO CÍVEL (198) Nº 0020322-26.2025.4.05.8201", "assessor": "Debora Dornelas Camara Sobral", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "(pendente)", "relatorio": "(pendente)", "voto": "(pendente)", "acordao": "(pendente)\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Resultado não identificado", "css": "outro"}, {"nome": "20260317_141851_Re__VOTO.0810962-96.2025.4.05.0000.VIRTUAL.26.03.2026", "cnj": "0810962-96.2025.4.05.0000", "cab": "PROCESSO Nº: 0810962-96.2025.4.05.0000 – AGRAVO DE INSTRUMENTO", "assessor": "Ana Carolina Olímpia Portella", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "PREVIDENCIÁRIO E PROCESSUAL CIVIL. EMBARGOS DE DECLARAÇÃO. MANDADO DE SEGURANÇA. DEMORA INJUSTIFICADA. LEGITIMIDADE PASSIVA DA AUTORIDADE COATORA. INÉRCIA. EMBARGOS DE DECLARAÇÃO PARCIALMENTE PROVIDOS.\r\r\n\r\r\n 1. Embargos de declaração  opostos pelo INSS em face do acórdão prolatado nos presentes autos, no qual a Turma, à unanimidade de votos, deu provimento ao agravo de instrumento do particular para determinar aos impetrados que agendem e realizem a perícia referente ao requerimento administrativo de concessão do benefício assistencial, bem como o agendamento da avaliação social, no prazo máximo de 45 (quarenta e cinco) dias.\r\r\n\r\r\n 2. Os embargos de declaração, consoante disciplina o art.1.022 do CPC, objetivam corrigir erro material ou sanar eventuais omissões, contradições ou obscuridades da decisão judicial, não se prestando como instrumento processual apto a promover a reapreciação do julgado.\r\r\n\r\r\n 3. Constatada a omissão apontada pelo INSS em relação à análise da legitimidade passiva da autoridade dita coatora.\r\r\n\r\r\n 4. O fato de o cargo de Perito Médico Federal ter sido incorporado ao quadro de pessoal do Ministério da Economia, nos termos da Lei nº 13.846/2019, não implica ilegitimidade passiva da autoridade coatora, porque a competência para promover a apreciação dos requerimentos de benefícios previdenciários e assistenciais não foi alterada, permanecendo atribuição do Gerente Executivo e de seus subordinados. Precedente desta Corte Regional: 0813382-16.2019.4.05.8300, AC - Apelação Civel / Remessa necessária - , Des. Fed. Élio Wanderley de Siqueira Filho, 1ª Turma, Julg: 12/10/2020.\r\r\n\r\r\n 5. Esta Turma já decidiu que o prazo de 90 (noventa) dias estabelecido pelo STF quando do julgamento do RE 631.240/MG não se aplica aos casos de demora injustificada para conclusão de processo administrativo. (PROCESSO: 08112403920194058300, APELREEX - Apelação / Reexame Necessário - , DESEMBARGADOR FEDERAL CID MARCONI, 3ª Turma, JULGAMENTO: 26/11/2019).\r\r\n\r\r\n 6. Inexistem as demais omissões apontadas pelo INSS. Na verdade, com a alegação de que houve omissão, pretende a Embargante, simplesmente, que esta Turma proceda à reapreciação da matéria. Entretanto, não há, no presente caso, possibilidade de que se entenda de outra forma que não a adotada na decisão embargada.\r\r\n\r\r\n 7. Embargos de declaração conhecidos e parcialmente providos, sem atribuição de efeitos modificativos, apenas para sanar a omissão apontada no tocante à análise da legitimidade passiva da autoridade dita coatora.", "relatorio": "Trata-se de embargos de declaração opostos pelo INSS em face do acórdão prolatado nos presentes autos, no qual a Turma, à unanimidade de votos, deu provimento ao agravo de instrumento do particular para determinar aos impetrados que agendem e realizem a perícia referente ao requerimento administrativo de concessão do benefício assistencial, bem como o agendamento da avaliação social, no prazo máximo de 45 (quarenta e cinco) dias.\r\r\n\r\r\nEm suas razões recursais, a autarquia federal alega que o acórdão embargado incorreu em omissão quanto ao fato de que a apreciação do pedido depende da perícia médica federal, a qual se encontra completamente desvinculada dos quadros do INSS, motivo pelo qual se verifica que a autoridade coatora não tem qualquer competência para responder pela perícia médica. Afirma, ainda, que houve omissão quanto à ausência de fundamentação legal, e quanto à inaplicabilidade dos prazos definidos no artigo 49 da Lei nº 9.784/99, quanto à ausência de inércia.\r\r\n\r\r\nPor fim, requer que seja adotado como parâmetro temporal o prazo de 90 dias definido pelo Supremo Tribunal Federal na modulação dos efeitos no julgamento do Recurso Extraordinário n. 631.240/MG, o qual seria mais razoável frente aos demais prazos.\r\r\n\r\r\nContrarrazões não apresentadas.\r\r\n\r\r\nÉ o relatório.", "voto": "A teor do que dispõe o art. 1.022 do Código de Processo Civil, cabem embargos de declaração “contra qualquer decisão judicial para esclarecer obscuridade ou eliminar contradição; suprir omissão de ponto ou questão sobre o qual devia se pronunciar o juiz de ofício ou a requerimento; e/ou corrigir erro material.”\r\r\n\r\r\nDe acordo com o parágrafo único do mesmo artigo, considera-se omissa a decisão que “deixe de se manifestar sobre tese firmada em julgamento de casos repetitivos ou em incidente de assunção de competência aplicável ao caso sob julgamento; e incorra em qualquer das condutas descritas no art. 489, § 1º. Este dispositivo, por seu turno, não considera fundamentada qualquer decisão judicial, seja ela interlocutória, sentença ou acórdão, que:\r\r\n\r\r\nI - se limitar à indicação, à reprodução ou à paráfrase de ato normativo, sem explicar sua relação com a causa ou a questão decidida;\r\r\n\r\r\nII - empregar conceitos jurídicos indeterminados, sem explicar o motivo concreto de sua incidência no caso;\r\r\n\r\r\nIII - invocar motivos que se prestariam a justificar qualquer outra decisão;\r\r\n\r\r\nIV - não enfrentar todos os argumentos deduzidos no processo capazes de, em tese, infirmar a conclusão adotada pelo julgador;\r\r\n\r\r\nV - se limitar a invocar precedente ou enunciado de súmula, sem identificar seus fundamentos determinantes nem demonstrar que o caso sob julgamento se ajusta àqueles fundamentos;\r\r\n\r\r\nVI - deixar de seguir enunciado de súmula, jurisprudência ou precedente invocado pela parte, sem demonstrar a existência de distinção no caso em julgamento ou a superação do entendimento.\r\r\n\r\r\nO acórdão embargado encontra-se assim ementado:\r\r\n\r\r\n “PREVIDENCIÁRIO. PROCESSUAL CIVIL. AGRAVO DE INSTRUMENTO. TUTELA ANTECIPADA. DEMORA INJUSTIFICADA. ANTECIPAÇÃO DE PERÍCIA. AGRAVO PROVIDO.\r\r\n\r\r\n 1. Agravo de instrumento, com pedido de antecipação da tutela, interposto por RAIMUNDA CARLOS DA SILVA contra decisão proferida pelo Juízo da 18ª Vara Federal da Seção Judiciária do Ceará que indeferiu a liminar objetivando provimento jurisdicional que determine à autoridade coatora que antecipe a realização da perícia médica da Impetrante para data mais próxima.\r\r\n\r\r\n 2. O agravante traz os seguintes argumentos: a) requereu Benefício por Incapacidade no dia 23/05/2025, contudo, a perícia médica foi marcada somente para 309/03/2026; d) tal lapso extrapola o prazo máximo de 45 (quarenta e cinco dias) para a realização da perícia médica após o agendamento na esfera administrativa; d) não é razoável impor à agravante a espera por um período excessivo e desproporcional para a realização das perícias.\r\r\n\r\r\n 3. A decisão recorrida está em desconformidade com orientação firmada por esta Terceira Turma. Em que pese não haver especificação quanto ao prazo limite nas normas de regência (Lei 8.213/91 c/c Decreto 3.048/99), o magistrado deve se atentar para o fato de estar-se diante de verba alimentar, pelo que a marcação de perícia médica em prazo longínquo pode ocasionar risco à saúde do trabalhador ou mesmo afastar benefício a que teria direito (no caso de, nesse ínterim, recuperar a capacidade laborativa).\r\r\n\r\r\n 4. Nessa direção caminhou o acordo homologado pelo STF entre o Procurador-Geral da República, o Advogado-Geral da União e o Procurador-Geral Federal, no RE 1.171.152/SC, o qual prevê prazos máximos para a análise dos processos administrativos relacionados a todos os benefícios administrados pela autarquia e a avaliação social nos casos em que o benefício dependa da aferição da deficiência do segurado.\r\r\n\r\r\n 5. Não se desconhece a alegação de inexistência de médicos-peritos necessários ao atendimento adequado à apreciação de todas as demandas previdenciárias, contudo, a inadequação do serviço público prestado não pode ser utilizada como argumento legitimador da violação à dignidade da pessoa humana.\r\r\n\r\r\n 6. Há relevância da fundamentação na medida em que os prazos a serem cumpridos pela autarquia previdenciária estão expressamente definidos no acordo mencionado, dentre os quais o prazo máximo de até 45 (quarenta e cinco) dias após o seu agendamento para a realização da perícia médica necessária à instrução e análise do processo administrativo de reconhecimento inicial de direitos previdenciários e assistenciais operacionalizados pelo INSS.\r\r\n\r\r\n 7. Agravo de instrumento provido para determinar aos impetrados que agendem e realizem a perícia referente ao requerimento administrativo de concessão do benefício assistencial, bem como o agendamento da avaliação social, no prazo máximo de 45 (quarenta e cinco) dias”.\r\r\n\r\r\nNo caso, alega o INSS que o acórdão foi omisso em relação à ilegitimidade passiva da autoridade dita coatora, por não estar o serviço de perícia médica mais vinculado ao INSS, estando a cargo da União. Constato a existência da omissão apontada, motivo pelo qual passo à análise da questão.\r\r\n\r\r\nO fato de o cargo de Perito Médico Federal ter sido incorporado ao quadro de pessoal do Ministério da Economia, nos termos da Lei nº 13.846/2019), não implica ilegitimidade passiva da autoridade coatora, porque a competência para promover a apreciação dos requerimentos referentes a benefícios previdenciários e assistenciais não foi alterada, permanecendo atribuição do Gerente Executivo do INSS e de seus subordinados. Precedente desta Corte Regional: 0813382-16.2019.4.05.8300, AC - Apelação Civel / Remessa necessária - , Des. Fed. Élio Wanderley de Siqueira Filho, 1ª Turma, Julg: 12/10/2020.\r\r\n\r\r\nPor fim, ressalto que esta Turma já decidiu que o prazo de 90 (noventa) dias estabelecido pelo STF quando do julgamento do RE 631.240/MG não se aplica aos casos de demora injustificada para conclusão de processo administrativo. Veja-se precedente:\r\r\n\r\r\n ADMINISTRATIVO E PROCESSUAL CIVIL. MANDADO DE SEGURANÇA. PROCESSO ADMINISTRATIVO PERANTE O INSS. DEMORA INJUSTIFICADA NA APRECIAÇÃO DO PEDIDO. DURAÇÃO RAZOÁVEL DO PROCESSO. LEI 9.784/99, ART. 49. PRELIMINARES DE ILEGITIMIDADE PASSIVA DA AUTORIDADE INDICADA COMO COATORA E DE INADEQUAÇÃO DA VIA ELEITA REJEITADAS. EXCLUSÃO DA ASTREINTE.\r\r\n\r\r\n 1. Apelação e Remessa Necessária em face de sentença que concedeu a segurança para, confirmando a liminar, condenar a autoridade Impetrada a proceder à análise e ao julgamento do pedido administrativo protocolado pela parte Impetrante, no prazo de 20 (vinte) dias úteis, a contar da decisão que apreciou o pedido liminar, sob pena de multa diária de R$ 200,00 (duzentos reais).\r\r\n 2. Não há que falar em perda de objeto, uma vez que a satisfação da pretensão ocorreu apenas em razão de determinação judicial, após a propositura do feito.\r\r\n 3. A Autoridade Coatora é a pessoa que ordena, executa diretamente ou omite a prática do ato impugnado. No caso em comento, o efetivo atraso na apreciação do processo administrativo da Impetrante só pode ser imputado ao Gerente Executivo do INSS em Recife/PE, por ser o gestor da Autarquia nessa cidade. Ademais, o INSS se limite a alegar a ilegitimidade da autoridade indicada como coatora, sem indicar quem, de fato, teria legitimidade para figurar nessa condição no presente \"Mandamus\". Rejeita-se, portanto, tal preliminar.\r\r\n 4. Também deve ser rechaçada a alegação de inadequação da via eleita, uma vez que o presente feito está suficientemente instruído, não sendo necessária haver dilação probatória.\r\r\n 5. A Lei nº 9.784/99, que regula o processo administrativo no âmbito federal, determina, em seu art. 49, o prazo de 30 (trinta) dias para a Administração decidir um processo administrativo após a sua instrução, salvo se houver prorrogação por igual período expressamente motivada.Inclusive, a própria Constituição Federal, no art. 5º, LXXVIII, garantiu a todos, no âmbito judicial e administrativo, a razoável duração do processo e os meios que garantam a celeridade de sua tramitação.\r\r\n 6. O protocolo de requerimento junto à Administração Pública está datado de 09/05/2019. No entanto, até a data da impetração do presente Mandado de Segurança, em 26/06/2019, ainda não havia sido proferida decisão pela autoridade administrativa.\r\r\n 7. Havendo demora excessiva na conclusão do processo administrativo, sem justificativa, deve ser mantida a liminar que determinou prazo para a finalização do aludido processo.\r\r\n 8. Não há como acolher a alegação de que a demora na apreciação do processo administrativo da Impetrante se deveu à falta de servidores em número suficiente para análise dos pedidos de aposentadoria, que aumentaram com a Proposta de Reforma da Previdência, posto que compete ao INSS prover o seu serviço de forma adequada para atender a demanda.\r\r\n 9. O prazo de 90 (noventa) dias definido pelo STF por ocasião da modulação dos efeitos do julgamento do RE 631.240/MG apenas se aplica quando há a presença cumulativa dos seguintes requisitos: a) a ação foi ajuizada sem prévio requerimento; b) não se trata de juizado itinerante; e c) o INSS não apresentou contestação de mérito. Evidentemente, o caso em apreço não cumpre os requisitos para que seja aplicado esse prazo.\r\r\n 10. O Juiz a quo entendeu pela cominação de multa diária no valor de R$ 200,00 (duzentos reais), em caso de não conclusão do processo no prazo estabelecido. Considerando-se, entretanto, as dificuldades operacionais sabidamente enfrentadas pela Previdência Social, mostra-se razoável a exclusão da astreinte
