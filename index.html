<script>
// ── Dados embutidos ───────────────────────────────────────────
const DECISOES = [{"nome": "20260305_123341_Re__VOTO.0802407-39.2022.4.05.8102.VIRTUAL.26.03.2026", "cnj": "0802407-39.2022.4.05.8102", "cab": "PROCESSO Nº: 0802407-39.2022.4.05.8102 - APELAÇÃO CÍVEL (198)", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "PROCESSUAL CIVIL E ADMINISTRATIVO. APELAÇÃO CÍVEL. EXECUÇÃO DE TÍTULO EXTRAJUDICIAL. ORDEM DOS ADVOGADOS DO BRASIL. COBRANÇA DE ANUIDADES. NATUREZA JURÍDICA PRIVADA. DESNECESSIDADE DE PRÉVIA COBRANÇA ADMINISTRATIVA. APELAÇÃO PROVIDA.\r\r\n\r\r\n1. Apelação interposta pela ORDEM DOS ADVOGADOS DO BRASIL - SECAO DO CEARA (OAB/CE) contra sentença que, considerando que a exequente, ora apelante, não comprovou a tentativa de conciliação ou adoção de solução administrativa para pagamento do débito, julgou extinta sem resolução do mérito a execução de título extrajudicial, “por não concorrer, no presente caso, pressuposto de constituição e desenvolvimento regular do processo, nos termos do art. 485, IV, do CPC”.\r\r\n\r\r\n2. O Supremo Tribunal Federal, no julgamento do RE 1.182.189 (Tema 1.054), consolidou o entendimento de que as anuidades devidas à OAB possuem natureza privada, não se configurando como tributos ou contribuições parafiscais, de modo que as receitas obtidas com sua cobrança são classificadas como recursos privados, não sujeitos ao regime jurídico aplicável aos conselhos profissionais de natureza tributária.\r\r\n\r\r\n3. A Lei nº 8.906/94 - Estatuto da OAB, estabelece, em seu artigo 46, parágrafo único, que a Certidão de Débito constitui Título Executivo Extrajudicial, não estando a execução objeto deste feito, portanto, condicionada à prévia cobrança administrativa do débito, à imposição anterior de sanção por parte da autarquia, ou a qualquer outra exigência desprovida de previsão normativa.\r\r\n\r\r\n4. Precedentes desta Corte Regional: PROCESSO: 08022316520194058102, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL FERNANDO BRAGA DAMASCENO, 3ª TURMA, JULGAMENTO: 21/07/2022; PROCESSO: 0800722-89.2025.4.05.8102, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL RODRIGO ANTÔNIO TENÓRIO CORREIA DA SILVA, 6ª TURMA, JULGAMENTO: 26/02/2026; PROCESSO: 08010544920224058300, APELAÇÃO / REMESSA NECESSÁRIA, DESEMBARGADOR FEDERAL LEONARDO AUGUSTO NUNES COUTINHO, 7ª TURMA, JULGAMENTO: 13/08/2024.\r\r\n\r\r\n5. Apelação provida.", "relatorio": "Apelação interposta pela ORDEM DOS ADVOGADOS DO BRASIL - SECAO DO CEARA (OAB/CE) contra sentença que, considerando que a exequente, ora apelante, não comprovou a tentativa de conciliação ou adoção de solução administrativa para pagamento do débito, julgou extinta sem resolução do mérito a execução de título extrajudicial, “por não concorrer, no presente caso, pressuposto de constituição e desenvolvimento regular do processo, nos termos do art. 485, IV, do CPC”.\r\r\n\r\r\nNas razões recursais, a apelante alega que as execuções propostas pela OAB seguem o rito previsto no Código de Processo Civil, referente às execuções fundadas em título extrajudicial, por imposição legal, inserta no Estatuto da Advocacia e no Regimento Interno da OAB/CE, mostrando-se indevida a exigência de instauração de processo administrativo prévio ou a assinatura do devedor para a constituição do título executivo.\r\r\n\r\r\nSem contrarrazões.\r\r\n\r\r\nÉ o relatório.\r\r\n\r\r\nFIM RELATÓRIO\r\r\n\r\r\n PROCESSO Nº: 0802407-39.2022.4.05.8102 - APELAÇÃO CÍVEL (198)\r\r\n\r\r\n APELANTE: ORDEM DOS ADVOGADOS DO BRASIL SECAO DO CEARA\r\r\n\r\r\n APELADO: WALLACE ARAUJO DA SILVA\r\r\n\r\r\n RELATOR(A): Desembargador(a) Federal ROGERIO DE MENESES FIALHO MOREIRA\r\r\n\r\r\nINICIO VOTO", "voto": "A sentença recorrida, considerando que a OAB, ora apelante, não comprovou a tentativa de conciliação ou adoção de solução administrativa para pagamento do débito, julgou extinta sem resolução do mérito a execução de título extrajudicial, “por não concorrer, no presente caso, pressuposto de constituição e desenvolvimento regular do processo, nos termos do art. 485, IV, do CPC”.\r\r\n\r\r\nA apelante alega que as execuções propostas pela OAB seguem o rito previsto no Código de Processo Civil, referente às execuções fundadas em título extrajudicial, por imposição legal, inserta no Estatuto da Advocacia e no Regimento Interno da OAB/CE, mostrando-se indevida a exigência de instauração de processo administrativo prévio ou a assinatura do devedor para a constituição do título executivo.\r\r\n\r\r\nSabe-se que o Supremo Tribunal Federal, no julgamento do RE 1.182.189 (Tema 1.054), consolidou o entendimento de que as anuidades devidas à OAB possuem natureza privada, não se configurando como tributos ou contribuições parafiscais, de modo que as receitas obtidas com sua cobrança são classificadas como recursos privados, não sujeitos ao regime jurídico aplicável aos conselhos profissionais de natureza tributária.\r\r\n\r\r\nDe fato, a Lei nº 8.906/94 - Estatuto da OAB, estabelece, em seu artigo 46, parágrafo único, que a Certidão de Débito constitui Título Executivo Extrajudicial, não estando a execução objeto deste feito, portanto, condicionada à prévia cobrança administrativa do débito, à imposição anterior de sanção por parte da autarquia, ou a qualquer outra exigência desprovida de previsão normativa. Nesse sentido, confiram-se, dentre outros, os seguintes precedentes desta Corte Regional: PROCESSO: 08022316520194058102, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL FERNANDO BRAGA DAMASCENO, 3ª TURMA, JULGAMENTO: 21/07/2022; PROCESSO: 0800722-89.2025.4.05.8102, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL RODRIGO ANTÔNIO TENÓRIO CORREIA DA SILVA, 6ª TURMA, JULGAMENTO: 26/02/2026; PROCESSO: 08010544920224058300, APELAÇÃO / REMESSA NECESSÁRIA, DESEMBARGADOR FEDERAL LEONARDO AUGUSTO NUNES COUTINHO, 7ª TURMA, JULGAMENTO: 13/08/2024.\r\r\n\r\r\nAs razões dos precedentes transcritos se aplicam ao caso dos autos.\r\r\n\r\r\nCom tais considerações, DOU PROVIMENTO à apelação.\r\r\n\r\r\n É como voto.\r\r\n\r\r\nFIM VOTO\r\r\n\r\r\n PROCESSO Nº: 0802407-39.2022.4.05.8102 - APELAÇÃO CÍVEL (198)\r\r\n\r\r\n APELANTE: ORDEM DOS ADVOGADOS DO BRASIL SECAO DO CEARA\r\r\n\r\r\n APELADO: WALLACE ARAUJO DA SILVA\r\r\n\r\r\n RELATOR(A): Desembargador(a) Federal ROGERIO DE MENESES FIALHO MOREIRA", "acordao": "Vistos, etc.\r\r\n\r\r\nDecide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, DAR PROVIMENTO à apelação, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Provido", "css": "provido"}, {"nome": "20260305_123501_Re__VOTO.0036810-77.2025.4.05.8000.VIRTUAL.26.03.2026", "cnj": "0036810-77.2025.4.05.8000", "cab": "PROCESSO Nº: 0036810-77.2025.4.05.8000 - APELAÇÃO CÍVEL (198)", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "CUMPRIMENTO DE SENTENÇA. HABILITAÇÃO. HABILITAÇÃO DE SUCESSORES DE AUTOR FALECIDO. CABIMENTO PRESCRIÇÃO. INOCORRÊNCIA. IMPROVIMENTO DA APELAÇÃO.\r\r\n\r\r\n1. Apelação interposta pela UNIÃO FEDERAL contra sentença que, afastando a prescrição, julgou procedente o pedido de habilitação da sucessora do autor falecido.\r\r\n\r\r\n2. Segundo a jurisprudência do STJ, a morte de uma das partes, inclusive no curso da execução, implica a suspensão do processo, razão pela qual, na ausência de previsão legal que imponha prazo para a habilitação dos respectivos sucessores, não há que falar em prescrição. Ocorrendo o óbito do participante da relação processual, impõe-se a suspensão do feito, nos termos do art. 265, I, do Código Processual Civil/1973 (art. 313, I, do CPC/2015), até que se promova a habilitação. Precedentes: AgInt no AgInt no AREsp n. 1.318.017/SP, relator Ministro Francisco Falcão, Segunda Turma, julgado em 4/12/2024, DJEN de 9/12/2024; AgInt no REsp n. 2.102.691/RJ, relator Ministro Gurgel de Faria, Primeira Turma, julgado em 26/2/2024, DJe de 6/3/2024.\r\r\n\r\r\n3. \"A morte de uma das partes tem, como consequência, a suspensão do processo, razão pela qual, na ausência de previsão legal impondo prazo para a habilitação dos sucessores da parte, não corre a prescrição, inclusive para a execução\". Nesse sentido: STJ, REsp 1.830.518/PE, Rel. Ministro OG FERNANDES, SEGUNDA TURMA, DJe de 27/04/2021; REsp 1.869.009/CE, Rel. Ministra ASSUSETE MAGALHÃES, SEGUNDA TURMA, DJe de 27/05/2020.\r\r\n\r\r\n4. Sobre a discussão da questão no Superior Tribunal de Justiça, no Tema 1254, a ordem de suspensão é apenas para os Recursos Especiais e Agravos em Recurso Especial na segunda instância e/ou que tramitem no STJ, que versem acerca da questão delimitada.\r\r\n\r\r\n5. Apelação improvida.", "relatorio": "Apelação interposta pela UNIÃO FEDERAL contra sentença que, afastando a prescrição, julgou procedente o pedido de habilitação da sucessora do autor falecido.\r\r\n\r\r\nNas razões recursais, a apelante sustenta que a habilitação não pode ser admitida, considerando que da data do óbito até o pedido de habilitação já se observou o transcurso de mais que 5 (cinco) anos, estando evidente a ocorrência da prescrição pretensão executória, de acordo com o art. 1º, do Decreto n. 20.910/32, c/c arts. 196 a 199 do Código Civil e a Súmula 150 do STF. Defende, ainda, ser necessário se aguardar a definição da questão da prescrição da pretensão, objeto do Tema 1.254 dos julgamentos repetitivos do STJ.\r\r\n\r\r\nContrarrazões apresentadas.\r\r\n\r\r\nÉ o relatório.\r\r\n\r\r\nFIM RELATÓRIO\r\r\n\r\r\n PROCESSO Nº: 0036810-77.2025.4.05.8000 - APELAÇÃO CÍVEL (198)\r\r\n\r\r\n APELANTE: UNIAO FEDERAL\r\r\n\r\r\n APELADO: CARLOS ALBERTO MARTINS SEQUEIRA\r\r\n\r\r\n RELATOR(A): Desembargador(a) Federal ROGERIO DE MENESES FIALHO MOREIRA\r\r\n\r\r\nINICIO VOTO", "voto": "Recebo a apelação interposta, considerando presentes os requisitos intrínsecos e extrínsecos à admissibilidade dos recursos.\r\r\n\r\r\nSegundo a jurisprudência do STJ, a morte de uma das partes, inclusive no curso da execução, implica a suspensão do processo, razão pela qual, na ausência de previsão legal que imponha prazo para a habilitação dos respectivos sucessores, não há que falar em prescrição. Ocorrendo o óbito do participante da relação processual, impõe-se a suspensão do feito, nos termos do art. 265, I, do Código Processual Civil/1973 (art. 313, I, do CPC/2015), até que se promova a habilitação.\r\r\n\r\r\nA propósito, confiram-se os seguintes precedentes:\r\r\n\r\r\nPROCESSUAL CIVIL. DIREITO ADMINISTRATIVO. AÇÃO DE DESAPROPRIAÇÃO. EXPROPRIAÇÃO DE ÁREA. ART. 1.022 DO CPC 2015. OPOSIÇÃO DOS EMBARGOS DECLARATÓRIOS CARACTERIZOU, TÃO SOMENTE, A IRRESIGNAÇÃO DO EMBARGANTE DIANTE DE DECISÃO CONTRÁRIA A SEUS INTERESSES. AFASTAMENTO DA SUPOSTA VIOLAÇÃO. SUPERVENIÊNCIA DO ÓBITO DE UMA DAS PARTES DO PROCESSO ENSEJA, COMO CONSEQUÊNCIA, A IMEDIATA SUSPENSÃO DO PROCESSO, DESDE O EVENTO MORTE. ART. 1º DO DECRETO N. 20.910/1932. DEMORA NA CITAÇÃO DA UNIÃO ATRIBUÍDA EXCLUSIVAMENTE AO PODER JUDICIÁRIO. DESPROVIMENTO DO AGRAVO INTERNO. MANUTENÇÃO DA DECISÃO RECORRIDA.\r\r\n\r\r\n[...]\r\r\n\r\r\nIII - No que trata da alegada violação dos arts. 180 e 265, I, do CPC/1973 (atuais arts. 221 e 313, I do CPC/2015), do art. 12 do Decreto-Lei n. 20.910/1932, bem como do teor da Súmula n. 150 do STF, relacionados à ocorrência (ou não) da prescrição executiva, a Corte Regional, na fundamentação do aresto recorrido, assim firmou seu entendimento (fls. 603).\r\r\n\r\r\nIV - Consoante se depreende dos excertos reproduzidos, o trânsito em julgado da ação originária ocorreu em 16/4/1985 e o falecimento do exequente em 13/7/1989, embora a notícia do seu falecimento só tenha sido comunicada, no processo, em 25/10/1991. Conforme jurisprudência desta Corte Superior, a superveniência do óbito de uma das partes do processo enseja, como consequência, a imediata suspensão do processo, desde o evento morte, a fim de viabilizar a substituição processual da parte pelo seu espólio ou herdeiro.\r\r\n\r\r\nAssim, pelo fato de não existir previsão legal impondo prazo para a habilitação dos sucessores da parte falecida, impõe-se a suspensão do feito até a regularização da representação processual, ou seja, não corre a prescrição, inclusive para as ações executivas. Nesse sentido: STJ, REsp n. 1.830.518/PE, relator Ministro Og Fernandes, Segunda Turma, DJe de 27/04/2021; REsp n. 1.869.009/CE, relatora Ministra Assusete Magalhães, Segunda Turma, DJe de 27/5/2020; AREsp n. 1.542.143/CE, relator Ministro Herman Benjamin, Segunda Turma, DJe de 11/10/2019; AgInt no AREsp n. 1.059.362/RS, relator Ministro Sérgio Kukina, Primeira Turma, DJe de 9/3/2018.\r\r\n\r\r\nV - À luz desse entendimento, para o caso dos autos, pode-se afirmar que entre o trânsito em julgado da ação originária - 16/4/1985 - e o falecimento do exequente - 13/7/1989 - não transcorreu o prazo de 5 (cinco) anos previsto no art. 1º do Decreto 20.910/1932.\r\r\n\r\r\nVI - Tem-se, ainda, que a suspensão do processo somente voltou a correr com a habilitação do espólio ou dos herdeiros do falecido que, conforme consignado à fl. 635, ocorreu em 25/10/1991, com o desarquivamento do processo a pedido do inventariante do expropriado/exequente, oportunidade em que se promoveu a regularização da representação processual (informação do acórdão recorrido, à fl. 603). Desse modo, se entre a habilitação do inventariante, em 25/10/1991, e a citação da União, em 24/08/1995, transcorreram 3 (três) anos e dez (meses), tempo esse superior aos 9 (nove) meses restante do prazo da prescrição, sendo a demora na citação da União atribuída exclusivamente ao Poder Judiciário, que deixou de praticar ato de sua atribuição para a efetivação da citação, não se pode pretender/deduzir pela prescrição da pretensão executiva, sob pena de impor prejuízo injustificado ao exequente.\r\r\n\r\r\nVII - Agravo interno improvido. (AgInt no AgInt no AREsp n. 1.318.017/SP, relator Ministro Francisco Falcão, Segunda Turma, julgado em 4/12/2024, DJEN de 9/12/2024.)\r\r\n\r\r\nPROCESSUAL CIVIL. RECURSO ESPECIAL. EXECUÇÃO DE SENTENÇA. PRESCRIÇÃO. NÃO OCORRÊNCIA.\r\r\n\r\r\n1. Segundo a jurisprudência do STJ, a morte de uma das partes, inclusive no curso da execução, implica a suspensão do processo, razão pela qual, na ausência de previsão legal que imponha prazo para a habilitação dos respectivos sucessores, não há que falar em prescrição. Ocorrendo o óbito do participante da relação processual, impõe-se a suspensão do feito, nos termos do art. 265, I, do Código Processual Civil/1973 (art. 313, I, do CPC/2015), até que se promova a habilitação.\r\r\n\r\r\n2. Agravo interno desprovido. (AgInt no REsp n. 2.102.691/RJ, relator Ministro Gurgel de Faria, Primeira Turma, julgado em 26/2/2024, DJe de 6/3/2024.)\r\r\n\r\r\nNesse contexto, impõem-se reconhecer a não ocorrência de prescrição para habilitação dos herdeiros, conforme corretamente aduzido na decisão agravada.\r\r\n\r\r\nLado outro, a prescrição da pretensão executória ocorre no mesmo prazo da prescrição da ação, ou seja, em 5 (cinco) anos, nos termos do art. 1º do Decreto n. 20.910/32 e Súmula 150 do STF. Contudo, deve-se registrar que a morte da parte suspende o processo, bem como o curso do prazo prescricional, nos termos dos arts. 313, I, e 921, I, do CPC, o qual somente recomeça a correr a partir da habilitação dos herdeiros. Nesse sentido:\r\r\n\r\r\n\"PROCESSUAL CIVIL. EXECUÇÃO DE SENTENÇA. LEGITIMIDADE DOS SUCESSORES. FALECIDO QUE CONSTAVA NA LISTA QUE INSTRUIU A INICIAL DA AÇÃO COLETIVA PROPOSTA PELA ASSOCIAÇÃO. HABILITAÇÃO. POSSIBILIDADE. PRESCRIÇÃO. INOCORRÊNCIA. PRECEDENTES. PROVIMENTO DA APELAÇÃO.\r\r\n\r\r\n1. Apelação interposta por WHOSOEVER DE MORAIS FERREIRA e outros contra sentença do Juízo da 4ª Vara Federal do Rio Grande do Norte, que acolheu a alegação de prescrição suscitada pelo ente público agravado e extinguiu o cumprimento de sentença com resolução do mérito.\r\r\n\r\r\n2. A ação foi proposta pela associação de servidores (ASDNER), à qual o pai dos exequentes, ora apelados, se encontrava inscrito, no mínimo, desde 2000, quando da propositura da ação coletiva. A associação ajuizou a ação após ser devidamente autorizada em assembleia, segundo consta na sentença exequenda.\r\r\n\r\r\n3. A presença do nome do falecido servidor na lista de substituídos do processo 2000.51.01.001586-1, que tramitou junto à 28ª Vara Federal/RJ também está comprovada nos autos, com a juntada de cópia da listagem que instruiu o feito original\r\r\n\r\r\n4. \"São válidos os atos processuais praticados pelo advogado no curso da execução, ainda que ocorrida a morte do representado antes do seu início, salvo comprovada má-fé.\" (REsp 1844121/AL, Rel. Ministro OG FERNANDES, SEGUNDA TURMA, julgado em 22/09/2020, DJe 09/10/2020). No mesmo sentido: AG 00096223920144050000, Desembargador Federal Ivan Lira de Carvalho, TRF5 - Quarta Turma, DJE - Data::05/03/2015 - Página::302.\r\r\n\r\r\n5. \"Nos termos da jurisprudência do STJ e desta Corte, ressalvado entendimento diverso da 2ª Turma, a morte de uma das partes suspende imediatamente o processo (art. 313, I, do CPC) e, ante a ausência de prazo para habilitação dos sucessores, não há que se falar em prescrição da pretensão executória até o momento do pedido de habilitação dos herdeiros.\" (PROCESSO: 08121388620204050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL FERNANDO BRAGA DAMASCENO, 3ª TURMA, JULGAMENTO: 29/04/2021).\r\r\n\r\r\n6. Apelação provida.\" (TRF5 - Processo 08080554720204058400, APELAÇÃO CÍVEL, REL. DESEMBARGADOR FEDERAL ROGÉRIO DE MENESES FIALHO MOREIRA, 3ª TURMA, JULGAMENTO: 28/04/2022).\r\r\n\r\r\nNa espécie, conforme anteriormente relatado, o entendimento da Corte Especial do Superior Tribunal de Justiça, é o de que \"a morte de uma das partes tem, como consequência, a suspensão do processo, razão pela qual, na ausência de previsão legal impondo prazo para a habilitação dos sucessores da parte, não corre a prescrição, inclusive para a execução\". Nesse sentido: STJ, REsp 1.830.518/PE, Rel. Ministro OG FERNANDES, SEGUNDA TURMA, DJe de 27/04/2021; REsp 1.869.009/CE, Rel. Ministra ASSUSETE MAGALHÃES, SEGUNDA TURMA, DJe de 27/05/2020.\r\r\n\r\r\nSobre a discussão da questão no Superior Tribunal de Justiça, no Tema 1254, a ordem de suspensão é apenas para os Recursos Especiais e Agravos em Recurso Especial na segunda instância e/ou que tramitem no STJ, que versem acerca da questão delimitada.\r\r\n\r\r\nPosto isso, NEGO PROVIMENTO à apelação.\r\r\n\r\r\nÉ como voto.\r\r\n\r\r\nFIM VOTO\r\r\n\r\r\n PROCESSO Nº: 0036810-77.2025.4.05.8000 - APELAÇÃO CÍVEL (198)\r\r\n\r\r\n APELANTE: UNIAO FEDERAL\r\r\n\r\r\n APELADO: CARLOS ALBERTO MARTINS SEQUEIRA\r\r\n\r\r\n RELATOR(A): Desembargador(a) Federal ROGERIO DE MENESES FIALHO MOREIRA", "acordao": "Vistos, etc.\r\r\n\r\r\nDecide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO à apelação, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido"}, {"nome": "20260305_150358_Re__VOTO.0007892-07.2025.4.05.0000.VIRTUAL.26.03.2026", "cnj": "0007892-07.2025.4.05.0000", "cab": "PROCESSO Nº: 0007892-07.2025.4.05.0000 - AGRAVO DE INSTRUMENTO (202)", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "AGRAVO DE INSTRUMENTO. CUMPRIMENTO DE SENTENÇA. HABILITAÇÃO. HABILITAÇÃO DE SUCESSORES DE AUTOR FALECIDO. CABIMENTO PRESCRIÇÃO. INOCORRÊNCIA. IMPROVIMENTO.\r\r\n\r\r\n1. Agravo de instrumento interposto pela UNIÃO FEDERAL contra decisão proferida pelo Juízo da 3ª Vara Federal da Seção Judiciária de Alagoas que deferiu o pedido de habilitação dos sucessores do autor falecido.\r\r\n\r\r\n2. Segundo a jurisprudência do STJ, a morte de uma das partes, inclusive no curso da execução, implica a suspensão do processo, razão pela qual, na ausência de previsão legal que imponha prazo para a habilitação dos respectivos sucessores, não há que falar em prescrição. Ocorrendo o óbito do participante da relação processual, impõe-se a suspensão do feito, nos termos do art. 265, I, do Código Processual Civil/1973 (art. 313, I, do CPC/2015), até que se promova a habilitação. Precedentes: AgInt no AgInt no AREsp n. 1.318.017/SP, relator Ministro Francisco Falcão, Segunda Turma, julgado em 4/12/2024, DJEN de 9/12/2024; AgInt no REsp n. 2.102.691/RJ, relator Ministro Gurgel de Faria, Primeira Turma, julgado em 26/2/2024, DJe de 6/3/2024.\r\r\n\r\r\n3. \"A morte de uma das partes tem, como consequência, a suspensão do processo, razão pela qual, na ausência de previsão legal impondo prazo para a habilitação dos sucessores da parte, não corre a prescrição, inclusive para a execução\". Nesse sentido: STJ, REsp 1.830.518/PE, Rel. Ministro OG FERNANDES, SEGUNDA TURMA, DJe de 27/04/2021; REsp 1.869.009/CE, Rel. Ministra ASSUSETE MAGALHÃES, SEGUNDA TURMA, DJe de 27/05/2020.\r\r\n\r\r\n4. Sobre a discussão da questão no Superior Tribunal de Justiça, no Tema 1254, a ordem de suspensão é apenas para os Recursos Especiais e Agravos em Recurso Especial na segunda instância e/ou que tramitem no STJ, que versem acerca da questão delimitada.\r\r\n\r\r\n5. Agravo de instrumento improvido.", "relatorio": "Trata-se de agravo de instrumento interposto pela UNIÃO FEDERAL contra decisão proferida pelo Juízo da 3ª Vara Federal da Seção Judiciária de Alagoas que deferiu o pedido de habilitação dos sucessores.\r\r\n\r\r\nNas razões recursais, traz os seguintes argumentos: a) a execução data do ano de 2004, então com o número 0002159-54.2004.4.05.8000; b) o de cujus falecera ainda em 09 de outubro de 2003; c) o pedido de habilitação de herdeiros, formulado em 16/07/2020; d) está evidente a ocorrência da prescrição pretensão executória. Considerando que da data do óbito até o pedido de habilitação já se observou o transcurso de mais que 5 (cinco) anos; e) a matéria de direito discutida - prescritibilidade da habilitação de herdeiros ou sucessores da parte falecida no curso da ação, foi objeto de afetação, pelo STJ, ao rito dos recursos repetitivos (Tema 1.254) - pelo que, o presente processo deve ser sobrestado até a apreciação da questão jurídica; d) a manutenção da decisão agravada tem o condão de produzir grave lesão aos cofres públicos, porquanto o Juízo a quo já deferiu a habilitação e o pagamento do crédito cuja pretensão encontra-se prescrita. Ademais, deve se considerar o caráter alimentar da verba discutida, sendo irrepetíveis os eventuais valores pagos aos particulares em eventual execução, conforme amplamente se tem alegado e decidido judicialmente; e) o juízo a quo determinou a expedição de requisições de pagamento, mesmo diante da inexistência de trânsito em julgado da medida impugnativa, como exige a Constituição Federal de 1988; f) o pagamento açodado de valores certamente ocasionará dificuldades em reavê-los, diante das alegações de recebimento de boa-fé, irrepetibilidade de verba alimentar e dissipação patrimonial.\r\r\n\r\r\nIndeferido o pedido de atribuição de efeito suspensivo ao recurso.\r\r\n\r\r\nSem contrarrazões.\r\r\n\r\r\nÉ o relatório.\r\r\n\r\r\nFIM RELATÓRIO\r\r\n\r\r\n PROCESSO Nº: 0007892-07.2025.4.05.0000 - AGRAVO DE INSTRUMENTO (202)\r\r\n\r\r\n AGRAVANTE: UNIAO FEDERAL\r\r\n\r\r\n AGRAVADO: AURENITE FREIRE LOBO\r\r\n\r\r\n RELATOR(A): Desembargador(a) Federal ROGERIO DE MENESES FIALHO MOREIRA\r\r\n\r\r\nINICIO VOTO", "voto": "Segundo a jurisprudência do STJ, a morte de uma das partes, inclusive no curso da execução, implica a suspensão do processo, razão pela qual, na ausência de previsão legal que imponha prazo para a habilitação dos respectivos sucessores, não há que falar em prescrição. Ocorrendo o óbito do participante da relação processual, impõe-se a suspensão do feito, nos termos do art. 265, I, do Código Processual Civil/1973 (art. 313, I, do CPC/2015), até que se promova a habilitação.\r\r\n\r\r\nA propósito, confiram-se os seguintes precedentes:\r\r\n\r\r\nPROCESSUAL CIVIL. DIREITO ADMINISTRATIVO. AÇÃO DE DESAPROPRIAÇÃO. EXPROPRIAÇÃO DE ÁREA. ART. 1.022 DO CPC 2015. OPOSIÇÃO DOS EMBARGOS DECLARATÓRIOS CARACTERIZOU, TÃO SOMENTE, A IRRESIGNAÇÃO DO EMBARGANTE DIANTE DE DECISÃO CONTRÁRIA A SEUS INTERESSES. AFASTAMENTO DA SUPOSTA VIOLAÇÃO. SUPERVENIÊNCIA DO ÓBITO DE UMA DAS PARTES DO PROCESSO ENSEJA, COMO CONSEQUÊNCIA, A IMEDIATA SUSPENSÃO DO PROCESSO, DESDE O EVENTO MORTE. ART. 1º DO DECRETO N. 20.910/1932. DEMORA NA CITAÇÃO DA UNIÃO ATRIBUÍDA EXCLUSIVAMENTE AO PODER JUDICIÁRIO. DESPROVIMENTO DO AGRAVO INTERNO. MANUTENÇÃO DA DECISÃO RECORRIDA.\r\r\n\r\r\n[...]\r\r\n\r\r\nIII - No que trata da alegada violação dos arts. 180 e 265, I, do CPC/1973 (atuais arts. 221 e 313, I do CPC/2015), do art. 12 do Decreto-Lei n. 20.910/1932, bem como do teor da Súmula n. 150 do STF, relacionados à ocorrência (ou não) da prescrição executiva, a Corte Regional, na fundamentação do aresto recorrido, assim firmou seu entendimento (fls. 603).\r\r\n\r\r\nIV - Consoante se depreende dos excertos reproduzidos, o trânsito em julgado da ação originária ocorreu em 16/4/1985 e o falecimento do exequente em 13/7/1989, embora a notícia do seu falecimento só tenha sido comunicada, no processo, em 25/10/1991. Conforme jurisprudência desta Corte Superior, a superveniência do óbito de uma das partes do processo enseja, como consequência, a imediata suspensão do processo, desde o evento morte, a fim de viabilizar a substituição processual da parte pelo seu espólio ou herdeiro.\r\r\n\r\r\nAssim, pelo fato de não existir previsão legal impondo prazo para a habilitação dos sucessores da parte falecida, impõe-se a suspensão do feito até a regularização da representação processual, ou seja, não corre a prescrição, inclusive para as ações executivas. Nesse sentido: STJ, REsp n. 1.830.518/PE, relator Ministro Og Fernandes, Segunda Turma, DJe de 27/04/2021; REsp n. 1.869.009/CE, relatora Ministra Assusete Magalhães, Segunda Turma, DJe de 27/5/2020; AREsp n. 1.542.143/CE, relator Ministro Herman Benjamin, Segunda Turma, DJe de 11/10/2019; AgInt no AREsp n. 1.059.362/RS, relator Ministro Sérgio Kukina, Primeira Turma, DJe de 9/3/2018.\r\r\n\r\r\nV - À luz desse entendimento, para o caso dos autos, pode-se afirmar que entre o trânsito em julgado da ação originária - 16/4/1985 - e o falecimento do exequente - 13/7/1989 - não transcorreu o prazo de 5 (cinco) anos previsto no art. 1º do Decreto 20.910/1932.\r\r\n\r\r\nVI - Tem-se, ainda, que a suspensão do processo somente voltou a correr com a habilitação do espólio ou dos herdeiros do falecido que, conforme consignado à fl. 635, ocorreu em 25/10/1991, com o desarquivamento do processo a pedido do inventariante do expropriado/exequente, oportunidade em que se promoveu a regularização da representação processual (informação do acórdão recorrido, à fl. 603). Desse modo, se entre a habilitação do inventariante, em 25/10/1991, e a citação da União, em 24/08/1995, transcorreram 3 (três) anos e dez (meses), tempo esse superior aos 9 (nove) meses restante do prazo da prescrição, sendo a demora na citação da União atribuída exclusivamente ao Poder Judiciário, que deixou de praticar ato de sua atribuição para a efetivação da citação, não se pode pretender/deduzir pela prescrição da pretensão executiva, sob pena de impor prejuízo injustificado ao exequente.\r\r\n\r\r\nVII - Agravo interno improvido. (AgInt no AgInt no AREsp n. 1.318.017/SP, relator Ministro Francisco Falcão, Segunda Turma, julgado em 4/12/2024, DJEN de 9/12/2024.)\r\r\n\r\r\nPROCESSUAL CIVIL. RECURSO ESPECIAL. EXECUÇÃO DE SENTENÇA. PRESCRIÇÃO. NÃO OCORRÊNCIA.\r\r\n\r\r\n1. Segundo a jurisprudência do STJ, a morte de uma das partes, inclusive no curso da execução, implica a suspensão do processo, razão pela qual, na ausência de previsão legal que imponha prazo para a habilitação dos respectivos sucessores, não há que falar em prescrição. Ocorrendo o óbito do participante da relação processual, impõe-se a suspensão do feito, nos termos do art. 265, I, do Código Processual Civil/1973 (art. 313, I, do CPC/2015), até que se promova a habilitação.\r\r\n\r\r\n2. Agravo interno desprovido. (AgInt no REsp n. 2.102.691/RJ, relator Ministro Gurgel de Faria, Primeira Turma, julgado em 26/2/2024, DJe de 6/3/2024.)\r\r\n\r\r\nNesse contexto, impõem-se reconhecer a não ocorrência de prescrição para habilitação dos herdeiros, conforme corretamente aduzido na decisão agravada.\r\r\n\r\r\nLado outro, a prescrição da pretensão executória ocorre no mesmo prazo da prescrição da ação, ou seja, em 5 (cinco) anos, nos termos do art. 1º do Decreto n. 20.910/32 e Súmula 150 do STF. Contudo, deve-se registrar que a morte da parte suspende o processo, bem como o curso do prazo prescricional, nos termos dos arts. 313, I, e 921, I, do CPC, o qual somente recomeça a correr a partir da habilitação dos herdeiros. Nesse sentido:\r\r\n\r\r\n\"PROCESSUAL CIVIL. EXECUÇÃO DE SENTENÇA. LEGITIMIDADE DOS SUCESSORES. FALECIDO QUE CONSTAVA NA LISTA QUE INSTRUIU A INICIAL DA AÇÃO COLETIVA PROPOSTA PELA ASSOCIAÇÃO. HABILITAÇÃO. POSSIBILIDADE. PRESCRIÇÃO. INOCORRÊNCIA. PRECEDENTES. PROVIMENTO DA APELAÇÃO.\r\r\n\r\r\n1. Apelação interposta por WHOSOEVER DE MORAIS FERREIRA e outros contra sentença do Juízo da 4ª Vara Federal do Rio Grande do Norte, que acolheu a alegação de prescrição suscitada pelo ente público agravado e extinguiu o cumprimento de sentença com resolução do mérito.\r\r\n\r\r\n2. A ação foi proposta pela associação de servidores (ASDNER), à qual o pai dos exequentes, ora apelados, se encontrava inscrito, no mínimo, desde 2000, quando da propositura da ação coletiva. A associação ajuizou a ação após ser devidamente autorizada em assembleia, segundo consta na sentença exequenda.\r\r\n\r\r\n3. A presença do nome do falecido servidor na lista de substituídos do processo 2000.51.01.001586-1, que tramitou junto à 28ª Vara Federal/RJ também está comprovada nos autos, com a juntada de cópia da listagem que instruiu o feito original\r\r\n\r\r\n4. \"São válidos os atos processuais praticados pelo advogado no curso da execução, ainda que ocorrida a morte do representado antes do seu início, salvo comprovada má-fé.\" (REsp 1844121/AL, Rel. Ministro OG FERNANDES, SEGUNDA TURMA, julgado em 22/09/2020, DJe 09/10/2020). No mesmo sentido: AG 00096223920144050000, Desembargador Federal Ivan Lira de Carvalho, TRF5 - Quarta Turma, DJE - Data::05/03/2015 - Página::302.\r\r\n\r\r\n5. \"Nos termos da jurisprudência do STJ e desta Corte, ressalvado entendimento diverso da 2ª Turma, a morte de uma das partes suspende imediatamente o processo (art. 313, I, do CPC) e, ante a ausência de prazo para habilitação dos sucessores, não há que se falar em prescrição da pretensão executória até o momento do pedido de habilitação dos herdeiros.\" (PROCESSO: 08121388620204050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL FERNANDO BRAGA DAMASCENO, 3ª TURMA, JULGAMENTO: 29/04/2021).\r\r\n\r\r\n6. Apelação provida.\" (TRF5 - Processo 08080554720204058400, APELAÇÃO CÍVEL, REL. DESEMBARGADOR FEDERAL ROGÉRIO DE MENESES FIALHO MOREIRA, 3ª TURMA, JULGAMENTO: 28/04/2022).\r\r\n\r\r\nNa espécie, conforme anteriormente relatado, o entendimento da Corte Especial do Superior Tribunal de Justiça, é o de que \"a morte de uma das partes tem, como consequência, a suspensão do processo, razão pela qual, na ausência de previsão legal impondo prazo para a habilitação dos sucessores da parte, não corre a prescrição, inclusive para a execução\". Nesse sentido: STJ, REsp 1.830.518/PE, Rel. Ministro OG FERNANDES, SEGUNDA TURMA, DJe de 27/04/2021; REsp 1.869.009/CE, Rel. Ministra ASSUSETE MAGALHÃES, SEGUNDA TURMA, DJe de 27/05/2020.\r\r\n\r\r\nSobre a discussão da questão no Superior Tribunal de Justiça, no Tema 1254, a ordem de suspensão é apenas para os Recursos Especiais e Agravos em Recurso Especial na segunda instância e/ou que tramitem no STJ, que versem acerca da questão delimitada.\r\r\n\r\r\nPosto isso, NEGO PROVIMENTO ao agravo de instrumento.\r\r\n\r\r\nÉ como voto.\r\r\n\r\r\nFIM VOTO\r\r\n\r\r\n PROCESSO Nº: 0007892-07.2025.4.05.0000 - AGRAVO DE INSTRUMENTO (202)\r\r\n\r\r\n AGRAVANTE: UNIAO FEDERAL\r\r\n\r\r\n AGRAVADO: AURENITE FREIRE LOBO\r\r\n\r\r\n RELATOR(A): Desembargador(a) Federal ROGERIO DE MENESES FIALHO MOREIRA", "acordao": "Vistos, etc.\r\r\n\r\r\nDecide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO ao agravo de instrumento, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido"}, {"nome": "20260305_150911_Re__VOTO.0002427-17.2025.4.05.0000.VIRTUAL.26.03.2026", "cnj": "0002427-17.2025.4.05.0000", "cab": "AGRAVO DE INSTRUMENTO (202) Nº 0002427-17.2025.4.05.0000", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "EMBARGOS DE DECLARAÇÃO. PROCESSUAL CIVIL. AGRAVO DE INSTRUMENTO. CUMPRIMENTO DE SENTENÇA COLETIVA. PRESCRIÇÃO. INOCORRÊNCIA. INTERRUPÇÃO DO PRAZO PRESCRICIONAL PELO PROTESTO. OMISSÕES. INOCORRÊNCIA. REEXAME DO MÉRITO. DESCABIMENTO. IMPROVIMENTO.\r\r\n\r\r\n1. Embargos de declaração opostos pela UNIVERSIDADE FEDERAL DE PERNAMBUCO – UFPE contra o acórdão que, por unanimidade, negou provimento ao agravo de instrumento interposto pela embargante, mantendo a decisão de primeiro grau que afastara a alegação de prescrição da pretensão executória e fixara os critérios de cálculo na execução do título coletivo formado no processo nº 0004926-28.2010.4.05.8300.\r\r\n\r\r\n2. A embargante sustenta, em síntese, a existência de omissão no acórdão, argumentando que: (a) o protesto judicial manejado pelo SINTUFEPE, por se tratar de procedimento de jurisdição voluntária disciplinado pelo art. 726 do CPC/2015, não produziria o efeito de interromper a prescrição, uma vez que o ato nele praticado é mera notificação — e não citação — e que somente a citação válida, nos termos dos arts. 202, I, do Código Civil e 240, § 1º, do CPC, teria tal aptidão interruptiva; e (b) o feito deveria ser suspenso até o julgamento do Tema Repetitivo nº 1.033 do STJ, que trata justamente da interrupção do prazo prescricional para o cumprimento de sentença coletiva em virtude do ajuizamento de protesto ou execução coletiva por legitimado para propor demandas coletivas, matéria que a embargante reputa idêntica à controvertida nestes autos.\r\r\n\r\r\n3. A pretensão de rediscutir a conclusão do julgado, sob o rótulo de omissão, não configura vício integrável via embargos de declaração. O acórdão embargado enfrentou, de forma expressa e suficiente, tanto a questão da interrupção do prazo prescricional pelo protesto judicial quanto a inaplicabilidade do sobrestamento determinado no Tema 1.033/STJ às condições processuais do presente feito. Embargos de declaração rejeitados.\r\r\n\r\r\n4. Embargos de declaração conhecidos e improvidos.", "relatorio": "Trata-se de embargos de declaração opostos pela UNIVERSIDADE FEDERAL DE PERNAMBUCO – UFPE contra o acórdão que, por unanimidade, negou provimento ao agravo de instrumento interposto pela embargante, mantendo a decisão de primeiro grau que afastara a alegação de prescrição da pretensão executória e fixara os critérios de cálculo na execução do título coletivo formado no processo nº 0004926-28.2010.4.05.8300.\r\r\n\r\r\nA embargante sustenta, em síntese, a existência de omissão no acórdão, argumentando que: (a) o protesto judicial manejado pelo SINTUFEPE, por se tratar de procedimento de jurisdição voluntária disciplinado pelo art. 726 do CPC/2015, não produziria o efeito de interromper a prescrição, uma vez que o ato nele praticado é mera notificação — e não citação — e que somente a citação válida, nos termos dos arts. 202, I, do Código Civil e 240, § 1º, do CPC, teria tal aptidão interruptiva; e (b) o feito deveria ser suspenso até o julgamento do Tema Repetitivo nº 1.033 do STJ, que trata justamente da interrupção do prazo prescricional para o cumprimento de sentença coletiva em virtude do ajuizamento de protesto ou execução coletiva por legitimado para propor demandas coletivas, matéria que a embargante reputa idêntica à controvertida nestes autos.\r\r\n\r\r\nContrarrazões apresentadas.\r\r\n\r\r\nÉ o relatório.", "voto": "A teor do que dispõe o art. 1.022 do Código de Processo Civil, cabem embargos de declaração “contra qualquer decisão judicial para esclarecer obscuridade ou eliminar contradição; suprir omissão de ponto ou questão sobre o qual devia se pronunciar o juiz de ofício ou a requerimento; e/ou corrigir erro material”.\r\r\n\r\r\nDe acordo com o parágrafo único do mesmo artigo, considera-se omissa a decisão que “deixe de se manifestar sobre tese firmada em julgamento de casos repetitivos ou em incidente de assunção de competência aplicável ao caso sob julgamento; e incorra em qualquer das condutas descritas no art. 489, § 1º. Este dispositivo, por seu turno, não considera fundamentada qualquer decisão judicial, seja ela interlocutória, sentença ou acórdão, que:\r\r\n\r\r\nI - se limitar à indicação, à reprodução ou à paráfrase de ato normativo, sem explicar sua relação com a causa ou a questão decidida;\r\r\n\r\r\nII - empregar conceitos jurídicos indeterminados, sem explicar o motivo concreto de sua incidência no caso;\r\r\n\r\r\nIII - invocar motivos que se prestariam a justificar qualquer outra decisão;\r\r\n\r\r\nIV - não enfrentar todos os argumentos deduzidos no processo capazes de, em tese, infirmar a conclusão adotada pelo julgador;\r\r\n\r\r\nV - se limitar a invocar precedente ou enunciado de súmula, sem identificar seus fundamentos determinantes nem demonstrar que o caso sob julgamento se ajusta àqueles fundamentos;\r\r\n\r\r\nVI - deixar de seguir enunciado de súmula, jurisprudência ou precedente invocado pela parte, sem demonstrar a existência de distinção no caso em julgamento ou a superação do entendimento.\r\r\n\r\r\nO acórdão embargado encontra-se assim ementado:\r\r\n\r\r\nAGRAVO DE INSTRUMENTO. CUMPRIMENTO DE SENTENÇA COLETIVA. PRESCRIÇÃO. INOCORRÊNCIA. INTERRUPÇÃO DO PRAZO PRESCRICIONAL PELO PROTESTO. EXCLUSÃO DO PSS DA BASE DOS JUROS. INCABIMENTO. IMPROVIMENTO.\r\r\n\r\r\n1. Agravo de instrumento, com pedido de atribuição de efeito suspensivo, interposto pela UNIVERSIDADE FEDERAL DE PERNAMBUCO - UFPE contra decisão proferida pelo Juízo da 10ª Vara Federal da Seção Judiciária de Pernambuco que, em cumprimento de sentença, afastou a alegação de prescrição, fixou critérios de cálculo para a execução e determinou à Contadoria Judicial a elaboração de parecer com base na incidência de juros sobre o principal sem desconto prévio da contribuição ao Plano de Seguridade Social do Servidor (PSS).\r\r\n\r\r\n2. O título executivo judicial formado no Processoº. 004926-28.2010.4.05.830, proposto pelo SINDICATO DOS TRABALHADORES DAS UNIVERSIDADES FEDERAIS DE PERNAMBUCO - SINTUFEPE-SS/UFPE, garantiu aos servidores substituídos o direito ao pagamento de juros e correção monetária sobre valores recebidos administrativamente. A decisão agravada afastou a alegação de prescrição, considerando que, em 05/07/2019, antes do término do prazo prescricional, o SINTUFEPE manejou Medida Cautelar de Protesto (processo nº 0812614-90.2019.4.05.8300), por dependência ao processo originário o que teria o condão de interromper o prazo prescricional.\r\r\n\r\r\n3. Quanto aos efeitos interruptivos do prazo prescricional em decorrência da propositura de cautelar de protesto pelo sindicado, a decisão recorrida encontra-se em harmonia com o entendimento desta Terceira Turma. Precedente: PROCESSO: 08004846820214050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL FERNANDO BRAGA DAMASCENO, 3ª TURMA, JULGAMENTO: 05/08/2021.\r\r\n\r\r\n4. Não é hipótese de sobrestamento do feito, tendo em vista que o STJ, ao decidir pela afetação da questão referente à \"interrupção do prazo prescricional para pleitear o cumprimento de sentença coletiva, em virtude do ajuizamento de ação de protesto ou de execução coletiva por legitimado para propor demandas coletivas\" (Tema 1.033), foi claro ao determinar a suspensão do processamento apenas dos processos, individuais ou coletivos que versem sobre a mesma matéria, e nos quais tenha havido a interposição de recurso especial ou de agravo em recurso especial, na segunda instância, ou que estejam em tramitação no STJ, o que não é a situação dos autos.\r\r\n\r\r\n5. \"A retenção na fonte, para cumprimento da obrigação tributária, não afasta a propriedade do servidor sobre a totalidade da verba em que incidirá o tributo, de modo que os juros moratórios sobre ela incidentes lhe pertencem por inteiro, sendo inadmissível a pretendida projeção da contribuição sobre verba ainda não paga, a fim de excluir a incidência de juros moratórios sobre a parcela a ser retida para pagamento do tributo.\" Recurso Especial Nº 1.571.886 - RS (2015/0308016-0), decisão publ.em 18/2/2020). Na mesma linha de entendimento: AgInt no REsp 1891400/PE, Rel. Ministro FRANCISCO FALCÃO, SEGUNDA TURMA, julgado em 14/06/2021, DJe 18/06/2021.\r\r\n\r\r\n 6. Agravo de instrumento improvido.\r\r\n\r\r\nA embargante sustenta que o acórdão teria sido omisso ao deixar de enfrentar a distinção entre a notificação própria do procedimento de protesto judicial e a citação válida exigida pelo art. 202, I, do Código Civil e pelo art. 240, § 1º, do CPC como pressuposto para a interrupção da prescrição.\r\r\n\r\r\nO vício, contudo, não se configura.\r\r\n\r\r\nO acórdão embargado enfrentou, de forma direta e suficiente, a questão da eficácia interruptiva do protesto judicial manejado pelo SINTUFEPE. Ao fazê-lo, adotou como fundamento determinante o entendimento consolidado nesta Terceira Turma — explicitado no precedente do Agravo de Instrumento nº 08004846820214050000 — segundo o qual a propositura de medida cautelar de protesto pelo sindicato, antes do término do prazo prescricional, tem o condão de interromper a prescrição da pretensão executória coletiva, recomeçando o prazo pela metade a partir do último ato processual da causa interruptiva.\r\r\n\r\r\nO que a embargante denomina de omissão não é, a rigor, ausência de manifestação judicial sobre ponto relevante. É, antes, discordância quanto ao fundamento adotado. A embargante pretende que o acórdão se pronunciasse especificamente sobre a tese de que a notificação inerente ao rito do protesto não equivaleria à citação para fins do art. 202, I, do Código Civil. Ocorre que o julgado, ao acolher a eficácia interruptiva do protesto com base no entendimento jurisprudencial desta Turma, enfrentou — ainda que sem percorrer analiticamente cada argumento da UFPE — a questão subjacente, chegando à conclusão contrária à pretendida pela embargante.\r\r\n\r\r\nO dever de fundamentação não impõe ao julgador a obrigação de rebater individualmente cada linha argumentativa apresentada pela parte, desde que a ratio decidendi seja clara e suficiente para justificar o resultado alcançado. Essa condição está satisfeita no acórdão embargado.\r\r\n\r\r\nA argumentação trazida nos embargos — sobre a natureza voluntária do procedimento de protesto, a insuficiência da notificação para fins interruptivos e a necessidade de ato citatório stricto sensu — configura, em sua essência, tentativa de reexame do mérito do julgado, o que é vedado pela via dos embargos de declaração.\r\r\n\r\r\nA embargante sustenta que o feito deveria ser sobrestado até o julgamento do Tema Repetitivo nº 1.033 do STJ, por versar sobre matéria idêntica à ali debatida.\r\r\n\r\r\nTambém aqui não há omissão a suprir.\r\r\n\r\r\nO acórdão embargado pronunciou-se expressamente sobre essa questão, consignando que a determinação de suspensão associada ao Tema 1.033 alcança apenas os processos nos quais tenha havido interposição de recurso especial ou de agravo em recurso especial na segunda instância, ou que estejam em tramitação no STJ — o que não é a situação dos presentes autos.\r\r\n\r\r\nAo assim decidir, o julgado examinou a questão do sobrestamento de forma completa e suficiente, à luz dos exatos termos da decisão de afetação proferida pelo STJ. O fato de a embargante discordar da solução adotada, argumentando que a similitude temática justificaria a suspensão independentemente de recurso especial pendente, não autoriza o manejo dos embargos de declaração como sucedâneo recursal para infirmar o julgado.\r\r\n\r\r\nEm face do exposto, CONHEÇO E NEGO PROVIMENTO aos embargos de declaração.\r\r\n\r\r\nÉ como voto.\r\r\n\r\r\n Recife, 22 de março de 2018.", "acordao": "Vistos, etc.\r\r\n\r\r\n Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, CONHECER E NEGAR PROVIMENTO aos embargos de declaração, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido"}, {"nome": "20260305_183131_Re__VOTO.ED.0801851-81.2024.4.05.8000.VIRTUAL.26.03.2026", "cnj": "0801851-81.2024.4.05.8000", "cab": "APELAÇÃO / REMESSA NECESSÁRIA (1728) Nº 0801851-81.2024.4.05.8000", "assessor": "Gabriel Santos Aquino De Oliveira", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "PREVIDENCIÁRIO. PROCESSUAL CIVIL. EMBARGOS DE DECLARAÇÃO. BENEFÍCIO DE PRESTAÇÃO CONTINUADA – BPC. DATA DE INÍCIO DO BENEFÍCIO. ALEGAÇÃO DE OMISSÃO NO JULGADO. QUESTÃO JÁ APRECIADA NA ORIGEM. EMBARGOS IMPROVIDOS.\r\r\n\r\r\n 1. Embargos de Declaração opostos pelo INSTITUTO NACIONAL DO SEGURO SOCIAL - INSS em face de acórdão desta Turma que, à unanimidade, negou provimento à Apelação e à Remessa Necessária em face de sentença que condenou a autarquia previdenciária a conceder, em favor da parte autora, o Benefício Assistencial de Prestação Continuada à Pessoa com Deficiência.\r\r\n\r\r\n 2. A teor do que dispõe o art. 1.022 do Código de Processo Civil, cabem embargos de declaração \"contra qualquer decisão judicial para esclarecer obscuridade ou eliminar contradição; suprir omissão de ponto ou questão sobre o qual devia se pronunciar o juiz de ofício ou a requerimento; e/ou corrigir erro material\".\r\r\n\r\r\n 3. No caso, inexistem os vícios apontados pela parte embargante, não se subsumindo o objeto dos presentes embargos a nenhuma das hipóteses previstas no sobredito dispositivo legal.\r\r\n\r\r\n 4. Da leitura do julgado, extrai-se que não houve reforma da decisão proferida pelo Juízo de Origem, razão pela qual a instituição do benefício deve ocorrer nos termos da sentença, que já fixou a data de início do benefício, inexistindo demonstração de alteração superveniente do quadro fático apta a justificar sua fixação apenas a partir da citação. Não se verifica, portanto, a omissão apontada pela parte embargante.\r\r\n\r\r\n 5. Para desconstituir os fundamentos utilizados no acórdão cabe à parte manejar o recurso cabível, não se prestando os aclaratórios à modificação do que foi sobejamente decidido, mesmo quando interpostos para fins de prequestionamento.\r\r\n\r\r\n 6. Embargos de declaração conhecidos e improvidos.", "relatorio": "Trata-se de Embargos de Declaração opostos pelo INSTITUTO NACIONAL DO SEGURO SOCIAL - INSS em face de acórdão desta Turma que, à unanimidade, negou provimento à Apelação e à Remessa Necessária em face de sentença que condenou a autarquia previdenciária a conceder, em favor da parte autora, o Benefício Assistencial de Prestação Continuada à Pessoa com Deficiência.\r\r\n\r\r\n Alega-se, nas razões de recurso, que o v. acórdão foi omisso quanto à análise da necessidade de fixação do início do benefício (DIB) na data da citação, tendo em vista a alteração do quadro fático acerca da incapacidade e/ou impedimento da parte autora após o indeferimento/cessação administrativa do benefício.\r\r\n\r\r\n Contrarrazões apresentadas pelo particular.\r\r\n\r\r\n É o relatório.", "voto": "A teor do que dispõe o art. 1.022 do Código de Processo Civil, cabem embargos de declaração \"contra qualquer decisão judicial para esclarecer obscuridade ou eliminar contradição; suprir omissão de ponto ou questão sobre o qual devia se pronunciar o juiz de ofício ou a requerimento; e/ou corrigir erro material\".\r\r\n\r\r\n De acordo com o seu parágrafo único, considera-se omissa a decisão que \"deixe de se manifestar sobre tese firmada em julgamento de casos repetitivos ou em incidente de assunção de competência aplicável ao caso sob julgamento; e incorra em qualquer das condutas descritas no art. 489, § 1º. Este dispositivo, por seu turno, não considera fundamentada qualquer decisão judicial, seja ela interlocutória, sentença ou acórdão, que:\r\r\n\r\r\n I - se limitar à indicação, à reprodução ou à paráfrase de ato normativo, sem explicar sua relação com a causa ou a questão decidida;\r\r\n\r\r\n II - empregar conceitos jurídicos indeterminados, sem explicar o motivo concreto de sua incidência no caso;\r\r\n\r\r\n III - invocar motivos que se prestariam a justificar qualquer outra decisão;\r\r\n\r\r\n IV - não enfrentar todos os argumentos deduzidos no processo capazes de, em tese, infirmar a conclusão adotada pelo julgador;\r\r\n\r\r\n V - se limitar a invocar precedente ou enunciado de súmula, sem identificar seus fundamentos determinantes nem demonstrar que o caso sob julgamento se ajusta àqueles fundamentos;\r\r\n\r\r\n VI - deixar de seguir enunciado de súmula, jurisprudência ou precedente invocado pela parte, sem demonstrar a existência de distinção no caso em julgamento ou a superação do entendimento.\r\r\n\r\r\n No caso, inexistem os vícios apontados pela parte embargante, não se subsumindo o objeto dos presentes embargos a nenhuma das hipóteses previstas no sobredito dispositivo legal.\r\r\n\r\r\n O acórdão embargado encontra-se assim ementado:\r\r\n\r\r\n PREVIDENCIÁRIO. REMESSA NECESSÁRIA. APELAÇÃO. BENEFÍCIO DE PRESTAÇÃO CONTINUADA - BPC. PESSOA COM DEFICIÊNCIA. SURDO-MUDEZ. CONDIÇÃO DE MISERABILIDADE. IMPEDIMENTO PARA PARTICIPAÇÃO PLENA NA SOCIEDADE. INCAPACIDADE PARA O TRABALHO. REMESSA NECESSÁRIA E APELAÇÃO NÃO PROVIDAS. AGRAVO INTERNO PREJUDICADO.\r\r\n\r\r\n 1. Remessa Necessária e Apelação interposta pelo INSS em face de sentença proferida pelo Juízo da 4ª Vara Federal da Seção Judiciária de Alagoas que determinou à autarquia previdenciário a conceder em favor da parte autora o Benefício Assistencial de Prestação Continuada à Pessoa com Deficiência.\r\r\n\r\r\n 2. O pedido de concessão do benefício assistencial possui alicerce no art. 203, V, da Constituição Federal, que elenca, entre os objetivos da assistência social, \"a garantia de um salário mínimo de benefício mensal à pessoa portadora de deficiência e ao idoso que comprovem não possuir meios de prover à própria subsistência ou tê-la provida por sua família, conforme dispuser a lei\".\r\r\n\r\r\n 3. O artigo 20 da Lei nº 8.742/93 consignou que é garantido um salário mínimo mensal à pessoa com deficiência e ao idoso que comprovem não possuir meios para prover a própria manutenção e nem de tê-la provida por sua família.\r\r\n\r\r\n 4. Nesse sentido, conforme definido no Estatuto, e incorporado ao art. 20 da Lei Orgânica da Assistência Social, pessoa com deficiência é \"aquela que tem impedimento de longo prazo de natureza física, mental, intelectual ou sensorial, o qual, em interação com uma ou mais barreiras, pode obstruir sua participação plena e efetiva na sociedade em igualdade de condições com as demais pessoas\".\r\r\n\r\r\n 5. Referido modelo pressupõe, portanto, que o conceito de deficiência não é idêntico à ideia da incapacidade física, seja ela mental, orgânica ou funcional. Sob tal paradigma, a aferição da condição de pessoa com deficiência demanda uma análise abrangente e sistêmica das condições pessoais e socioeconômicas, a fim de constatar a existência de impedimentos capazes de obstruir a participação plena e efetiva na sociedade.\r\r\n\r\r\n 6. A parte autora, ora apelada, requer o benefício com base nos diagnósticos de surdo-mudez e perda auditiva bilateral neurossensorial (CID 10 H91.3/H90.5). Conforme se depreende da leitura do laudo, a Apelada não está incapacitada para o trabalho.\r\r\n\r\r\n 7. Entretanto, considerando que o magistrado não está adstrito ao laudo médico judicial, podendo formar seu convencimento por outros elementos constantes nos autos, bem como considerando que a requerente, de 43 anos, reside sozinha após o falecimento do seu companheiro, em fevereiro de 2024, e a retirada do filho de seus cuidados, pelo Conselho Tutelar, para um serviço de acolhimento para crianças e adolescentes, bem como nunca foi capaz de desempenhar atividade laboral de forma independente e que, apesar da deficiência auditiva, nunca aprendeu a Linguagem Brasileira de Sinais, evidencia-se a impossibilidade da parte autora ter uma vida independente, com um labor que lhe garanta a subsistência.\r\r\n\r\r\n 8. A autora, ora Apelante, teve o companheiro como seu responsável por mais de dez anos e ficou sem renda após o óbito do companheiro, que era beneficiário do benefício de prestação continuada.\r\r\n\r\r\n 9. A condição de hipossuficiência do autor encontra-se demonstrada, conforme o parecer social. Conforme constatou a assistente social responsável pelo laudo pericial: \"pode-se inferir que a autora vivencia situação de pobreza, vulnerabilidade e risco social, além de enfrentar barreiras graves que obstrui sua participação plena e efetiva na sociedade em condições de igualdade com as demais pessoas.\"\r\r\n\r\r\n 10. Remessa Necessária e Apelação não providas. Honorários sucumbenciais majorados em 2%. Agravo interno prejudicado.\r\r\n\r\r\n Da leitura da ementa acima transcrita, extrai-se que não houve reforma da decisão proferida pelo Juízo de Origem, razão pela qual a determinação de instituição do benefício em favor da Embargada deve ocorrer nos termos da sentença.\r\r\n\r\r\n Ademais, a sentença mantida por esta Turma já estabeleceu a data de início do benefício, inexistindo nos autos demonstração de alteração superveniente do quadro fático apta a justificar sua fixação apenas a partir da citação, razão pela qual não se verifica a omissão apontada pela parte embargante.\r\r\n\r\r\n Para desconstituir os fundamentos utilizados no acórdão cabe à parte manejar o recurso cabível, não se prestando os aclaratórios à modificação do que foi sobejamente decidido, mesmo quando interpostos para fins de prequestionamento.\r\r\n\r\r\n Outrossim, é importante destacar que “O órgão julgador não é obrigado a rebater, um a um, todos os argumentos trazidos pelas partes. Deve apenas enfrentar a demanda, observando as questões relevantes e imprescindíveis à sua resolução”. Nesse sentido: REsp 927.216/RS, Segunda Turma, Relatora Ministra Eliana Calmon, DJ de 13/8/2007; e REsp 855.073/SC, Primeira Turma, Relator Ministro Teori Albino Zavascki, DJ de 28/6/2007”[1]\r\r\n\r\r\n Em face do exposto, conheço dos embargos de declaração do INSS e nego-lhes provimento.\r\r\n\r\r\n É como voto.", "acordao": "Vistos, etc.\r\r\n\r\r\n Decide a 3ª Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, CONHECER dos embargos de declaração do ente público e NEGAR-LHES PROVIMENTO, nos termos do voto do relator e na forma do relatório constante dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido"}, {"nome": "20260305_183245_Re__VOTO.0036651-19.2025.4.05.8200.VIRTUAL.26.03.2026", "cnj": "0036651-19.2025.4.05.8200", "cab": "APELAÇÃO CÍVEL (198) Nº 0036651-19.2025.4.05.8200", "assessor": "Gabriel Santos Aquino De Oliveira", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "ADMINISTRATIVO. PROCESSUAL CIVIL. APELAÇÃO CÍVEL. MANDADO DE SEGURANÇA. ENSINO SUPERIOR. PROCESSO DE REVALIDAÇÃO SIMPLIFICADO DE DIPLOMA OBTIDO NO EXTERIOR. IMPOSSIBILIDADE. ADESÃO AO SISTEMA UNIFICADO REVALIDA. DISCRICIONARIEDADE DA ADMINISTRAÇÃO. APELAÇÃO NÃO PROVIDA.\r\r\n\r\r\n 1. Apelação interposta por SAULO OLIVEIRA TREMARIN em face de sentença proferida pelo Juízo da 3ª Vara Federal da Seção Judiciária da Paraíba que denegou a segurança pleiteada, objetivando provimento judicial que determina à autoridade impetrada que instaure o processo de revalidação do diploma de medicina da parte impetrante, sob a modalidade de Tramitação Simplificada, nos termos da Resolução CNE/CES nº 01/2022, dada a ineficácia da Resolução CNE/CES nº 02/2024.\r\r\n\r\r\n 2. O cerne da questão cinge-se em verificar a possibilidade de revalidação simplificada do diploma de medicina do impetrante, médico formado em instituição de ensino superior estrangeira, sem a exigência da prestação do exame Revalida.\r\r\n\r\r\n 3. O § 2º do art. 48 da Lei nº 9.394/96 (LDB) prevê expressamente a exigência da revalidação dos diplomas de graduação expedidos por universidades estrangeiras nos seguintes termos: \"Os diplomas de graduação expedidos por universidades estrangeiras serão revalidados por universidades públicas que tenham curso do mesmo nível e área ou equivalente, respeitando-se os acordos internacionais de reciprocidade ou equiparação\".\r\r\n\r\r\n 4. O entendimento de que é vedado o reconhecimento de diplomas obtidos no exterior sem o anterior procedimento administrativo de revalidação, consoante determina a Lei de Diretrizes e Bases (Lei n. 9.394/96), em seu art. 48, § 2º, encontra amparo na jurisprudência da Primeira Seção do Superior Tribunal de Justiça: REsp 1.215.550/PE, Rel. Ministro Og Fernandes, DJe 5/10/2015 e REsp 1.349.445/SP, Rel. Ministro Mauro Campbell Marques, DJe 14/5/2013, ambos julgados sob a sistemática dos recursos repetitivos. Neles ficou assentado que \"o art. 53, inciso V, da Lei n. 9.394/96 permite à universidade fixar normas específicas a fim de disciplinar o referido processo de revalidação de diplomas de graduação expedidos por estabelecimentos estrangeiros de ensino superior, não havendo qualquer ilegalidade na determinação do processo seletivo para a revalidação do diploma, porquanto decorre da necessidade de adequação dos procedimentos da instituição de ensino para o cumprimento da norma, uma vez que de outro modo não teria a universidade condições para verificar a capacidade técnica do profissional e sua formação, sem prejuízo da responsabilidade social que envolve o ato\".\r\r\n\r\r\n 5. Esta Terceira Turma e as demais Turmas desta Corte Regional vêm se manifestando no sentido de que, \"faz parte do exercício do poder discricionário da Universidade o juízo de conveniência e oportunidade na decisão entre optar pelo REVALIDA ou pelo procedimento ordinário, que consiste na oferta de estudos complementares, para a revalidação dos diplomas de médicos oriundos de instituições de ensino estrangeiras\", não sendo possível ao Poder Judiciário adentrar no mérito administrativo para determinar que IES realize o procedimento ordinário simplificado (PROCESSO: 08001641820194058300, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL FERNANDO BRAGA DAMASCENO, 3ª TURMA, JULGAMENTO: 20/10/2022; PROCESSO: 08150175420224058000, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL CID MARCONI GURGEL DE SOUZA, 3ª TURMA, JULGAMENTO: 01/06/2023).\r\r\n\r\r\n 6. A UFPB, em razão de sua adesão ao Revalida, optou por não mais realizar a Revalidação dos Diplomas Estrangeiros por meio do procedimento ordinário, não sendo assim obrigada a ofertar os estudos complementares previstos na sistemática antiga. Denegação da segurança mantida.\r\r\n\r\r\n 7. Apelação não provida. Sem condenação em honorários sucumbenciais, ex vi art. 25, art. 12.016/2009.", "relatorio": "Trata-se de Apelação interposta por SAULO OLIVEIRA TREMARIN em face de sentença proferida pelo Juízo da 3ª Vara Federal da Seção Judiciária da Paraíba que denegou a segurança pleiteada, objetivando provimento judicial que determina à autoridade impetrada que instaure o processo de revalidação do diploma de medicina da parte impetrante, sob a modalidade de Tramitação Simplificada, nos termos da Resolução CNE/CES nº 01/2022, dada a ineficácia da Resolução CNE/CES nº 02/2024.\r\r\n\r\r\n O Apelante, em suas razões recursais, alega, em síntese, que: a) a universidade não pode usar o Revalida como obstáculo ao trâmite simplificado; b) a resolução nº. 01/2022 garante instauração imediata e prazos para tramitação simplificada em processo de revalidação; c) apresenta decisões que reconheceram direito à tramitação simplificada em casos análogos; d) o precedente STF invocado não trata do regime da revalidação simplificada e não pode justificar indeferimento automático; e) mudança jurisprudencial não pode prejudicar pedidos administrativos já apresentados; f) a autonomia não autoriza omissão ou descumprimento de normas superiores (Resolução/Portaria); g) dispõe a Portaria INEP nº 530/2020 que o Revalida não substitui o processo ordinário de revalidação conduzido pelas universidades públicas e regulados em normas específicas.\r\r\n\r\r\n Sem contrarrazões.\r\r\n\r\r\n É o relatório.", "voto": "De início, recebo a apelação, considerando presentes os pressupostos recursais intrínsecos (cabimento, legitimação, interesse e inexistência de fato impeditivo ou extintivo do direito de recorrer) e extrínsecos (preparo, tempestividade e regularidade formal) para a admissibilidade do recurso.\r\r\n\r\r\n O cerne da questão cinge-se em verificar a possibilidade de revalidação simplificada do diploma de medicina do impetrante, médico formado em instituição de ensino superior estrangeira, sem a exigência da prestação do exame Revalida.\r\r\n\r\r\n O § 2º do art. 48 da Lei nº 9.394/96 (LDB) prevê expressamente a exigência da revalidação dos diplomas de graduação expedidos por universidades estrangeiras nos seguintes termos: \"Os diplomas de graduação expedidos por universidades estrangeiras serão revalidados por universidades públicas que tenham curso do mesmo nível e área ou equivalente, respeitando-se os acordos internacionais de reciprocidade ou equiparação\".\r\r\n\r\r\n O entendimento de que é vedado o reconhecimento de diplomas obtidos no exterior sem o anterior procedimento administrativo de revalidação, consoante determina a Lei de Diretrizes e Bases (Lei n. 9.394/96), em seu art. 48, § 2º, encontra amparo na jurisprudência da Primeira Seção do Superior Tribunal de Justiça: REsp 1.215.550/PE, Rel. Ministro Og Fernandes, julgado em 23/9/2015, DJe 5/10/2015 e REsp 1.349.445/SP, Rel. Ministro Mauro Campbell Marques, julgado em 8/5/2013, DJe 14/5/2013, ambos julgados sob a sistemática dos recursos repetitivos. Neles ficou assentado que \"o art. 53, inciso V, da Lei n. 9.394/96 permite à universidade fixar normas específicas a fim de disciplinar o referido processo de revalidação de diplomas de graduação expedidos por estabelecimentos estrangeiros de ensino superior, não havendo qualquer ilegalidade na determinação do processo seletivo para a revalidação do diploma, porquanto decorre da necessidade de adequação dos procedimentos da instituição de ensino para o cumprimento da norma, uma vez que de outro modo não teria a universidade condições para verificar a capacidade técnica do profissional e sua formação, sem prejuízo da responsabilidade social que envolve o ato\".\r\r\n\r\r\n Esta Terceira Turma e as demais Turmas desta Corte Regional vêm se manifestando no sentido de que, \"faz parte do exercício do poder discricionário da Universidade o juízo de conveniência e oportunidade na decisão entre optar pelo REVALIDA ou pelo procedimento ordinário, que consiste na oferta de estudos complementares, para a revalidação dos diplomas de médicos oriundos de instituições de ensino estrangeiras\", não sendo possível ao Poder Judiciário adentrar no mérito administrativo para determinar que IES realize o procedimento ordinário simplificado (PROCESSO: 08001641820194058300, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL FERNANDO BRAGA DAMASCENO, 3ª TURMA, JULGAMENTO: 20/10/2022; PROCESSO: 08150175420224058000, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL CID MARCONI GURGEL DE SOUZA, 3ª TURMA, JULGAMENTO: 01/06/2023).\r\r\n\r\r\n A UFPB, em razão de sua adesão ao REVALIDA, optou por não mais realizar a Revalidação dos Diplomas Estrangeiros por meio do procedimento ordinário, não sendo assim obrigada a ofertar os estudos complementares previstos na sistemática antiga.\r\r\n\r\r\n Logo, impõe-se, de fato, denegar a segurança perseguida.\r\r\n\r\r\n Ante o exposto, NEGO PROVIMENTO à Apelação. Sem condenação em honorários sucumbenciais, ex vi art. 25, art. 12.016/2009.\r\r\n\r\r\n É como voto.", "acordao": "Vistos, etc.\r\r\n\r\r\n Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO à Apelação, nos termos do voto do relator e na forma do relatório constante dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido"}, {"nome": "20260309_100111_Re__VOTO.0007292-83.2025.4.05.0000.VIRTUAL.26.03.2026", "cnj": "0007292-83.2025.4.05.0000", "cab": "PROCESSO Nº: 0007292-83.2025.4.05.0000 - AGRAVO DE INSTRUMENTO (202)", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "Ok\r\r\n\r\r\nEnviado do meu iPad", "tipo": "Virtual", "data": "26.03.2026", "ementa": "PROCESSUAL CIVIL E ADMINISTRATIVO. AGRAVO DE INSTRUMENTO. CUMPRIMENTO INDIVIDUAL DE SENTENÇA COLETIVA. REAJUSTE DE 28,86%. ABRANGÊNCIA SUBJETIVA DA COISA JULGADA. LIMITAÇÃO AO ESTADO DO MATO GROSSO DO SUL INDEVIDA. LEGITIMIDADE. PRECEDENTES. INTERRUPÇÃO DA PRESCRIÇÃO PELA CAUTELAR DE PROTESTO. COMPENSAÇÃO DOS VALORES PAGOS NA VIA ADMINISTRATIVA ASSEGURADA. IMPROVIMENTO.\r\r\n\r\r\n 1. Agravo de instrumento interposto pela UNIÃO FEDERAL contra decisão que, em cumprimento de sentença: (a) rejeitou a preliminar de ilegitimidade ativa, afastando a delimitação territorial da sentença (b) reconheceu que o valor devido, referente à incidência do reajuste de 28,86% no período de agosto/2006 a dezembro/2012, importa em R$ 324.197,75 (trezentos e vinte e quatro mil, cento e noventa e sete reais e setenta e cinco centavos); (c) fixou que, caso o valor bruto recebido pela parte credora após o termo ad quem fixado na decisão embargada tenha um decréscimo, ela deve receber uma parcela complementar (natureza jurídica de VPNI) para evitar a redução até que haja a absorção dessa diferença.\r\r\n\r\r\n 2. A hipótese trata de Cumprimento de Sentença individual contra a Fazenda Pública que objetiva o recebimento de valores decorrentes da condenação fixada no título judicial formado na ação civil pública n.º 0005019-15.1997.4.03.6000, que se refere ao índice de 28,86%. Ao contrário do que alega a agravante, a inicial e as demais manifestações apresentadas na Ação Civil Pública executada não evidenciam a sua limitação aos servidores do Mato Grosso do Sul, sendo certo que o MPF autor não restringiu o pedido aos servidores lotados naquela unidade da Federação.\r\r\n\r\r\n 3. Diversamente do que alega a agravante, a ação civil pública originária não limitou a sua eficácia territorial ao Estado do Mato Grosso do Sul. Pelo contrário, o MPF foi claro ao delinear o objeto da mencionada ACP, abrangendo todos os servidores públicos civis federais, ativos e inativos, bem como pensionistas do quadro de pessoal da União Federal. Nesse sentido: PROCESSO: 08067307520244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL SEBASTIÃO JOSÉ VASQUES DE MORAES, 6ª TURMA, JULGAMENTO: 25/7/2024; PROCESSO: 08075249620244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL FREDERICO WILDSON DA SILVA DANTAS, 7ª TURMA, JULGAMENTO: 13/08/2024; PROCESSO: 08082272720244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL ALEXANDRE LUNA FREIRE, 3ª TURMA, JULGAMENTO: 12/09/2024; PROCESSO: 08176062120244058300, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL CID MARCONI GURGEL DE SOUZA, 3ª TURMA, JULGAMENTO: 30/01/2025.\r\r\n\r\r\n 4. No que concerne à prescrição, verifica-se que, embora tenha ocorrido o Trânsito em Julgado do Processo originário em 02/08/2019, o Ministério Público Federal - MPF, Autor da Ação Coletiva, propôs Medida Cautelar de Protesto em 11/06/2024, distribuída sob o nº 5004409-14.2024.4.03.6000, para a 1ª Vara Federal da Seção Judiciária do Mato Grosso do Sul, objetivando a interrupção do prazo prescricional. A Medida Cautelar de Protesto, ajuizada pelo MPF, interrompe o prazo prescricional, a partir de seu ajuizamento (11/06/2024), cujo prazo passa a correr pela metade. O termo final somente se dará em 12/2026. O presente Cumprimento de Sentença foi proposto em 06/06/2025, logo, ausente a prescrição.\r\r\n\r\r\n 5. No sentido de afastar a prescrição em razão da propositura da cautela de protesto pelo MPF: PROCESSO: 08066753820244058500, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL ALEXANDRE LUNA FREIRE, 3ª TURMA, JULGAMENTO: 07/08/2025.\r\r\n\r\r\n 6. Não procede a alegação de pagamento em duplicidade. O juízo de origem determinou a compensação dos valores adimplidos administrativamente, de modo que impertinente o pedido da parte agravante de dedução dos pagamentos administrativos decorrentes do acordo firmado, que está de acordo com a tese firmada pelo Superior Tribunal de Justiça no enunciado do Tema 1.102.\r\r\n\r\r\n 7. No que toca ao pagamento de subsídio em observância ao direito à irredutibilidade de vencimentos, a decisão agravada foi exata ao reconhecer que, se da incorporação do reajuste de 28,86% resultar um valor bruto superior ao valor bruto recebido pela parte credora após o termo ad quem, ela deve receber uma parcela complementar para evitar a redução até que haja a absorção dessa diferença.\r\r\n\r\r\n 8. Agravo de instrumento improvido.", "relatorio": "Trata-se de agravo de instrumento interposto pela UNIÃO FEDERAL contra decisão que, em cumprimento de sentença: (a) rejeitou a preliminar de ilegitimidade ativa, afastando a delimitação territorial da sentença (b) reconheceu que o valor devido, referente à incidência do reajuste de 28,86% no período de agosto/2006 a dezembro/2012, importa em R$ 324.197,75 (trezentos e vinte e quatro mil, cento e noventa e sete reais e setenta e cinco centavos); (c) fixou que, caso o valor bruto recebido pela parte credora após o termo ad quem fixado na decisão embargada tenha um decréscimo, ela deve receber uma parcela complementar (natureza jurídica de VPNI) para evitar a redução até que haja a absorção dessa diferença.\r\r\n\r\r\n Nas razões recursais, a agravante traz os seguintes argumentos: a) trata-se, na origem, de cumprimento de sentença lastreado no título executivo judicial formado na Ação Civil Pública n.º 0005019-15.1997.4.03.6000, proposta pelo Ministério Público Federal, transitada em julgado em 02/08/2019, que condenou a UNIÃO e as AUTARQUIAS RÉS a incorporar o percentual de 28,86% às remunerações de seus servidores ativos, inativos e pensionistas, não litigantes em outras ações ou cujas ações estejam suspensas e não firmatários de acordo, a partir de janeiro/1993, com reflexos, respeitadas as datas de admissões, descontadas as reposições já feitas por força das Leis n.º 8.622/93 e 8.627/93; b) o juízo a quo rejeitou a impugnação ao pedido de justiça gratuita e a alegação de ilegitimidade ativa arguida pela UNIÃO; c) a ACP 0005019-15.1997.403.6000 limitou a incorporação do percentual de 28,86% às remunerações de seus servidores, ativos, inativos e pensionistas lotados nos órgãos, no Estado do Mato Grosso do Sul; e) a parte exequente não reside no estado de MS, não há título executivo que possa sustentar a pretensão exposta nos autos, devendo-se a extinção da presente execução; f) considerando que a ACP n. 0005019-15.1997.4.03.6000 transitou em julgado em momento anterior ao julgamento da STF (Tema 1075), a modificação da decisão executada, ainda que para adequação ao que decidido em sede de repercussão geral no intuito de ressalvar a coisa julgada, dar-se-ia, apenas, em sede de ação rescisória, o que não se verificou no presente feito; g) o exequentes não tem mais nada a receber, porquanto receberam os atrasados através de acordo administrativo e passou a receber subsídio que não permite outras incorporações.\r\r\n\r\r\n Contrarrazões apresentadas.\r\r\n\r\r\n É o que havia de relevante para relatar.", "voto": "A hipótese trata de Cumprimento de Sentença individual contra a Fazenda Pública que objetiva o recebimento de valores decorrentes da condenação fixada no título judicial formado na ação civil pública n.º 0005019-15.1997.4.03.6000, que se refere ao índice de 28,86%, cujo dispositivo recebeu a seguinte redação:\r\r\n\r\r\n [...].\r\r\n\r\r\n Diante do exposto e por mais que dos autos consta, julgo procedente a presente ação para o fim de condenar os réus a incorporar o percentual de 28,86% às remunerações de seus servidores, ativos, inativos e pensionistas, não litigantes em outras ações ou cujas ações estejam suspensas e não firmatários de acordo, a partir de janeiro de 1993, com reflexos, respeitadas as datas de admissões, descontadas as reposições já feitas por força das leis n° 8622/93 e 8627/93. Sem custas e sem honorários. Sentença sujeita ao duplo grau de jurisdição.\r\r\n\r\r\n [...].\r\r\n\r\r\n Da leitura do dispositivo da sentença transcrito depreende-se que, de fato, não houve limitação dos efeitos subjetivos da coisa julgada territorialmente.\r\r\n\r\r\n  O TRF da 3ª Região confirmou a sentença, como se observa da parte do voto proferido no respectivo acórdão:\r\r\n\r\r\n  [...]\r\r\n\r\r\n  Feitas tais ponderações, constata-se que o interesse defendido pelo Parquet na presente - direito dos servidores, ativos e inativos, e pensionistas à revisão geral de 28,86% - consiste num direito individual homogêneo disponivel de expressão social, tendo em vista a extraordinária dispersão dos lesados. No particular, cumpre observar que a pretensão deduzida in casu beneficia a todos os servidores públicos civis da esfera federal (ativos, inativos e seus pensionistas), os quais são representados por diversos sindicatos. Não existe uma entidade de classe que represente a todos eles, exatamente em função da extraordinária dispersão dos lesados, o que legitima o Ministério Público Federal a propor esta ação coletiva. A par disso, o enfrentamento da questão aqui debatida em sede de ação coletiva é de todo recomendável, haja vista que, diante da grande quantidade de lesados, a via coletiva evita um sem-número de processos e, consequentemente, a sobrecarga do Poder Judiciário, o que é do interesse de toda a coletividade.\r\r\n\r\r\n  [...]\r\r\n\r\r\n As posteriores decisões do STJ e do STF também não impuseram limitação aos efeitos subjetivos da coisa julgada.\r\r\n\r\r\n Ao contrário do que fixado na decisão recorrida, a inicial e as demais manifestações apresentadas na Ação Civil Pública executada não evidenciam a sua limitação aos servidores do Mato Grosso do Sul, sendo certo que o MPF autor não restringiu o pedido aos servidores lotados naquela unidade da Federação.\r\r\n\r\r\n Em situação em tudo similar à dos autos, este Tribunal Regional Federal da 5ª Região tem entendido que servidores não lotados no Mato Grosso do Sul também têm legitimidade para executar o mesmo título executivo judicial, conforme se observa nos seguintes precedentes:\r\r\n\r\r\n AGRAVO DE INSTRUMENTO NO NOVO CPC. Os Recursos são definidos pela natureza do ato judicial: Sentença, Decisão Interlocutória ou Despacho. O Agravo de Instrumento, no Código de Processo Civil de 2015, consiste no Recurso que tem por Objeto a Relação Jurídica sobre Decisão Interlocutória, envolvendo tutelas distintas sobre duas situações jurídicas processuais: a Evidência e a Urgência. Não estão dissociadas na Finalidade ou Função do Recurso estritamente definido.\r\r\n\r\r\n  EVIDÊNCIA. Consiste na Situação Jurídica derivada da Relação Jurídica projetando a Pretensão à obtenção do dever jurídico, buscado pela Parte diante de Ato Jurídico Processual, e exposto no conjunto ou variedade de atos confluentes da Lide, da Causa, da Demanda ou dos Pressupostos Processuais. A Interlocução própria da Jurisdição é o princípio a estabelecer diretriz do Processo ou do Recurso, porquanto a Ação é proposta e o Recurso interposto, na dicção precisa de Pontes de Miranda. Os pressupostos Processuais e as Condições da Ação são elementos considerados, em cada etapa ou fase, com Atos Processuais, quando não incorrem, em cada caso, no exame dos Atos meramente ordinatórios, nos simples Despachos. Ou, nas hipóteses terminativas encerrando literalmente a Prestação Jurisdicional de Mérito com a Sentença, e/ou com a Execução.\r\r\n\r\r\n  URGÊNCIA. Como poder-dever cautelar busca no exame da situação, de ato ou fato jurídico, realçar a utilidade da Jurisdição de modo Imediato, a realização do Direito Objetivo e, de modo Mediato, o Direto Subjetivo buscado no Pedido intercorrente para obtenção do Dever Jurídico; a Obrigação de quem de Direito. A Urgência está atinada sempre à Evidência.\r\r\n\r\r\n  Agravo de Instrumento interposto em face de Decisão que desacolheu, em parte, a Impugnação ofertada pela Executada (FUNASA) e determinou a remessa dos autos à Contadoria Judicial para aferição de eventuais valores devidos, a título de diferenças do índice de 28,86%.\r\r\n\r\r\n  No caso, destaca-se da Decisão agravada os seguintes fundamentos, com os quais se compartilha:\r\r\n\r\r\n  \"A executada, FUNDAÇÃO NACIONAL DE SAÚDE - FUNASA, apresentou impugnação ao cumprimento de sentença, alegando ilegitimidade ativa da exequente.\r\r\n\r\r\n  Para tanto, afirma que a autora não comprovou estar lotada no Mato Gro
