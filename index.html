ia à fixação de honorários em valor ínfimo, em consonância com o entendimento firmado no Tema 1.076 do STJ.\r\r\n\r\r\n Outrossim, o acórdão que deu parcial provimento ao Agravo de Instrumento foi claro ao ressaltar que esta eg. Terceira Turma “já se manifestou no sentido que \"No caso da impugnação em cumprimento de sentença, a vantagem alcançada pelo impugnante deve equivaler à diferença entre o valor inicialmente executado e o que foi devidamente apurado pela Contadoria. Já a vantagem obtida pelo exequente corresponde à diferença entre o excesso apontado pelo impugnante e o que foi efetivamente confirmado pelo juízo.\" (PROCESSO: 08071545920204050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL ROGÉRIO DE MENESES FIALHO MOREIRA, 3ª TURMA, JULGAMENTO: 10/09/2020). Na mesma direção: PROCESSO: 08123677520224050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL FERNANDO BRAGA DAMASCENO, 3ª TURMA, JULGAMENTO: 23/03/2023\r\r\n\r\r\n Quanto ao argumento relativo à Súmula 345 e ao Tema 973 do STJ, registre-se que a matéria é suscitada pela primeira vez nestes segundos aclaratórios, configurando inovação recursal inadmissível nessa sede.\r\r\n\r\r\n Conclui-se que o sindicato embargante deseja rediscutir questões efetivamente apreciadas por ocasião do julgamento que originou o acórdão ora questionado. Frise-se, entretanto, que embargos de declaração, ainda que opostos para fins de prequestionamento, não se prestam a este fim.\r\r\n\r\r\n Em face do exposto, conheço dos embargos de declaração do SINDICATO DOS TRABALHADORES DAS UNIVERSIDADES FEDERAIS DE PERNAMBUCO - SEÇÃO SINDICAL DA UNIVERSIDADE FEDERAL DE PERNAMBUCO e nego-lhes provimento.\r\r\n\r\r\n É como voto.", "acordao": "Vistos, etc.\r\r\n\r\r\n Decide a 3ª Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, CONHECER dos embargos de declaração do ente sindical e NEGAR-LHES PROVIMENTO, nos termos do voto do relator e na forma do relatório constante dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido"}, {"nome": "20260310_154232_Re__VOTO.0050597-76.2025.4.05.8000.VIRTUAL.26.03.2026", "cnj": "0050597-76.2025.4.05.8000", "cab": "PROCESSO Nº: 0050597-76.2025.4.05.8000 - APELAÇÃO CÍVEL (198)", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "CUMPRIMENTO DE SENTENÇA. HABILITAÇÃO DE SUCESSORES DE AUTOR FALECIDO. CABIMENTO PRESCRIÇÃO. INOCORRÊNCIA. IMPROVIMENTO DA APELAÇÃO.\r\r\n\r\r\n1. Apelação interposta pela UNIÃO FEDERAL contra sentença que, afastando a prescrição, julgou procedente o pedido de habilitação da sucessora do autor falecido.\r\r\n\r\r\n2. Segundo a jurisprudência do STJ, a morte de uma das partes, inclusive no curso da execução, implica a suspensão do processo, razão pela qual, na ausência de previsão legal que imponha prazo para a habilitação dos respectivos sucessores, não há que falar em prescrição. Ocorrendo o óbito do participante da relação processual, impõe-se a suspensão do feito, nos termos do art. 265, I, do Código Processual Civil/1973 (art. 313, I, do CPC/2015), até que se promova a habilitação. Precedentes: AgInt no AgInt no AREsp n. 1.318.017/SP, relator Ministro Francisco Falcão, Segunda Turma, julgado em 4/12/2024, DJEN de 9/12/2024; AgInt no REsp n. 2.102.691/RJ, relator Ministro Gurgel de Faria, Primeira Turma, julgado em 26/2/2024, DJe de 6/3/2024.\r\r\n\r\r\n3. \"A morte de uma das partes tem, como consequência, a suspensão do processo, razão pela qual, na ausência de previsão legal impondo prazo para a habilitação dos sucessores da parte, não corre a prescrição, inclusive para a execução\". Nesse sentido: STJ, REsp 1.830.518/PE, Rel. Ministro OG FERNANDES, SEGUNDA TURMA, DJe de 27/04/2021; REsp 1.869.009/CE, Rel. Ministra ASSUSETE MAGALHÃES, SEGUNDA TURMA, DJe de 27/05/2020.\r\r\n\r\r\n4. Sobre a discussão da questão no Superior Tribunal de Justiça, no Tema 1254, a ordem de suspensão é apenas para os Recursos Especiais e Agravos em Recurso Especial na segunda instância e/ou que tramitem no STJ, que versem acerca da questão delimitada.\r\r\n\r\r\n5. Apelação improvida.", "relatorio": "Apelação interposta pela UNIÃO FEDERAL contra sentença que, afastando a prescrição, julgou procedente o pedido de habilitação da sucessora do autor falecido.\r\r\n\r\r\nNas razões recursais, a apelante sustenta que a habilitação não pode ser admitida, considerando que da data do óbito até o pedido de habilitação já se observou o transcurso de mais que 5 (cinco) anos, estando evidente a ocorrência da prescrição pretensão executória, de acordo com o art. 1º, do Decreto n. 20.910/32, c/c arts. 196 a 199 do Código Civil e a Súmula 150 do STF. Defende, ainda, ser necessário se aguardar a definição da questão da prescrição da pretensão, objeto do Tema 1.254 dos julgamentos repetitivos do STJ.\r\r\n\r\r\nContrarrazões apresentadas.\r\r\n\r\r\nÉ o relatório.\r\r\n\r\r\nFIM RELATÓRIO\r\r\n\r\r\n PROCESSO Nº: 0050597-76.2025.4.05.8000 - APELAÇÃO CÍVEL (198)\r\r\n\r\r\n APELANTE: UNIAO FEDERAL\r\r\n\r\r\n APELADO: VERA LUCIA GIFFONI WBATUBA e outros\r\r\n\r\r\n RELATOR(A): Desembargador(a) Federal ROGERIO DE MENESES FIALHO MOREIRA\r\r\n\r\r\nINICIO VOTO", "voto": "Recebo a apelação interposta, considerando presentes os requisitos intrínsecos e extrínsecos à admissibilidade dos recursos.\r\r\n\r\r\nSegundo a jurisprudência do STJ, a morte de uma das partes, inclusive no curso da execução, implica a suspensão do processo, razão pela qual, na ausência de previsão legal que imponha prazo para a habilitação dos respectivos sucessores, não há que falar em prescrição. Ocorrendo o óbito do participante da relação processual, impõe-se a suspensão do feito, nos termos do art. 265, I, do Código Processual Civil/1973 (art. 313, I, do CPC/2015), até que se promova a habilitação.\r\r\n\r\r\nA propósito, confiram-se os seguintes precedentes:\r\r\n\r\r\nPROCESSUAL CIVIL. DIREITO ADMINISTRATIVO. AÇÃO DE DESAPROPRIAÇÃO. EXPROPRIAÇÃO DE ÁREA. ART. 1.022 DO CPC 2015. OPOSIÇÃO DOS EMBARGOS DECLARATÓRIOS CARACTERIZOU, TÃO SOMENTE, A IRRESIGNAÇÃO DO EMBARGANTE DIANTE DE DECISÃO CONTRÁRIA A SEUS INTERESSES. AFASTAMENTO DA SUPOSTA VIOLAÇÃO. SUPERVENIÊNCIA DO ÓBITO DE UMA DAS PARTES DO PROCESSO ENSEJA, COMO CONSEQUÊNCIA, A IMEDIATA SUSPENSÃO DO PROCESSO, DESDE O EVENTO MORTE. ART. 1º DO DECRETO N. 20.910/1932. DEMORA NA CITAÇÃO DA UNIÃO ATRIBUÍDA EXCLUSIVAMENTE AO PODER JUDICIÁRIO. DESPROVIMENTO DO AGRAVO INTERNO. MANUTENÇÃO DA DECISÃO RECORRIDA.\r\r\n\r\r\n[...]\r\r\n\r\r\nIII - No que trata da alegada violação dos arts. 180 e 265, I, do CPC/1973 (atuais arts. 221 e 313, I do CPC/2015), do art. 12 do Decreto-Lei n. 20.910/1932, bem como do teor da Súmula n. 150 do STF, relacionados à ocorrência (ou não) da prescrição executiva, a Corte Regional, na fundamentação do aresto recorrido, assim firmou seu entendimento (fls. 603).\r\r\n\r\r\nIV - Consoante se depreende dos excertos reproduzidos, o trânsito em julgado da ação originária ocorreu em 16/4/1985 e o falecimento do exequente em 13/7/1989, embora a notícia do seu falecimento só tenha sido comunicada, no processo, em 25/10/1991. Conforme jurisprudência desta Corte Superior, a superveniência do óbito de uma das partes do processo enseja, como consequência, a imediata suspensão do processo, desde o evento morte, a fim de viabilizar a substituição processual da parte pelo seu espólio ou herdeiro.\r\r\n\r\r\nAssim, pelo fato de não existir previsão legal impondo prazo para a habilitação dos sucessores da parte falecida, impõe-se a suspensão do feito até a regularização da representação processual, ou seja, não corre a prescrição, inclusive para as ações executivas. Nesse sentido: STJ, REsp n. 1.830.518/PE, relator Ministro Og Fernandes, Segunda Turma, DJe de 27/04/2021; REsp n. 1.869.009/CE, relatora Ministra Assusete Magalhães, Segunda Turma, DJe de 27/5/2020; AREsp n. 1.542.143/CE, relator Ministro Herman Benjamin, Segunda Turma, DJe de 11/10/2019; AgInt no AREsp n. 1.059.362/RS, relator Ministro Sérgio Kukina, Primeira Turma, DJe de 9/3/2018.\r\r\n\r\r\nV - À luz desse entendimento, para o caso dos autos, pode-se afirmar que entre o trânsito em julgado da ação originária - 16/4/1985 - e o falecimento do exequente - 13/7/1989 - não transcorreu o prazo de 5 (cinco) anos previsto no art. 1º do Decreto 20.910/1932.\r\r\n\r\r\nVI - Tem-se, ainda, que a suspensão do processo somente voltou a correr com a habilitação do espólio ou dos herdeiros do falecido que, conforme consignado à fl. 635, ocorreu em 25/10/1991, com o desarquivamento do processo a pedido do inventariante do expropriado/exequente, oportunidade em que se promoveu a regularização da representação processual (informação do acórdão recorrido, à fl. 603). Desse modo, se entre a habilitação do inventariante, em 25/10/1991, e a citação da União, em 24/08/1995, transcorreram 3 (três) anos e dez (meses), tempo esse superior aos 9 (nove) meses restante do prazo da prescrição, sendo a demora na citação da União atribuída exclusivamente ao Poder Judiciário, que deixou de praticar ato de sua atribuição para a efetivação da citação, não se pode pretender/deduzir pela prescrição da pretensão executiva, sob pena de impor prejuízo injustificado ao exequente.\r\r\n\r\r\nVII - Agravo interno improvido. (AgInt no AgInt no AREsp n. 1.318.017/SP, relator Ministro Francisco Falcão, Segunda Turma, julgado em 4/12/2024, DJEN de 9/12/2024.)\r\r\n\r\r\nPROCESSUAL CIVIL. RECURSO ESPECIAL. EXECUÇÃO DE SENTENÇA. PRESCRIÇÃO. NÃO OCORRÊNCIA.\r\r\n\r\r\n1. Segundo a jurisprudência do STJ, a morte de uma das partes, inclusive no curso da execução, implica a suspensão do processo, razão pela qual, na ausência de previsão legal que imponha prazo para a habilitação dos respectivos sucessores, não há que falar em prescrição. Ocorrendo o óbito do participante da relação processual, impõe-se a suspensão do feito, nos termos do art. 265, I, do Código Processual Civil/1973 (art. 313, I, do CPC/2015), até que se promova a habilitação.\r\r\n\r\r\n2. Agravo interno desprovido. (AgInt no REsp n. 2.102.691/RJ, relator Ministro Gurgel de Faria, Primeira Turma, julgado em 26/2/2024, DJe de 6/3/2024.)\r\r\n\r\r\nNesse contexto, impõem-se reconhecer a não ocorrência de prescrição para habilitação dos herdeiros, conforme corretamente aduzido na decisão agravada.\r\r\n\r\r\nLado outro, a prescrição da pretensão executória ocorre no mesmo prazo da prescrição da ação, ou seja, em 5 (cinco) anos, nos termos do art. 1º do Decreto n. 20.910/32 e Súmula 150 do STF. Contudo, deve-se registrar que a morte da parte suspende o processo, bem como o curso do prazo prescricional, nos termos dos arts. 313, I, e 921, I, do CPC, o qual somente recomeça a correr a partir da habilitação dos herdeiros. Nesse sentido:\r\r\n\r\r\n\"PROCESSUAL CIVIL. EXECUÇÃO DE SENTENÇA. LEGITIMIDADE DOS SUCESSORES. FALECIDO QUE CONSTAVA NA LISTA QUE INSTRUIU A INICIAL DA AÇÃO COLETIVA PROPOSTA PELA ASSOCIAÇÃO. HABILITAÇÃO. POSSIBILIDADE. PRESCRIÇÃO. INOCORRÊNCIA. PRECEDENTES. PROVIMENTO DA APELAÇÃO.\r\r\n\r\r\n1. Apelação interposta por WHOSOEVER DE MORAIS FERREIRA e outros contra sentença do Juízo da 4ª Vara Federal do Rio Grande do Norte, que acolheu a alegação de prescrição suscitada pelo ente público agravado e extinguiu o cumprimento de sentença com resolução do mérito.\r\r\n\r\r\n2. A ação foi proposta pela associação de servidores (ASDNER), à qual o pai dos exequentes, ora apelados, se encontrava inscrito, no mínimo, desde 2000, quando da propositura da ação coletiva. A associação ajuizou a ação após ser devidamente autorizada em assembleia, segundo consta na sentença exequenda.\r\r\n\r\r\n3. A presença do nome do falecido servidor na lista de substituídos do processo 2000.51.01.001586-1, que tramitou junto à 28ª Vara Federal/RJ também está comprovada nos autos, com a juntada de cópia da listagem que instruiu o feito original\r\r\n\r\r\n4. \"São válidos os atos processuais praticados pelo advogado no curso da execução, ainda que ocorrida a morte do representado antes do seu início, salvo comprovada má-fé.\" (REsp 1844121/AL, Rel. Ministro OG FERNANDES, SEGUNDA TURMA, julgado em 22/09/2020, DJe 09/10/2020). No mesmo sentido: AG 00096223920144050000, Desembargador Federal Ivan Lira de Carvalho, TRF5 - Quarta Turma, DJE - Data::05/03/2015 - Página::302.\r\r\n\r\r\n5. \"Nos termos da jurisprudência do STJ e desta Corte, ressalvado entendimento diverso da 2ª Turma, a morte de uma das partes suspende imediatamente o processo (art. 313, I, do CPC) e, ante a ausência de prazo para habilitação dos sucessores, não há que se falar em prescrição da pretensão executória até o momento do pedido de habilitação dos herdeiros.\" (PROCESSO: 08121388620204050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL FERNANDO BRAGA DAMASCENO, 3ª TURMA, JULGAMENTO: 29/04/2021).\r\r\n\r\r\n6. Apelação provida.\" (TRF5 - Processo 08080554720204058400, APELAÇÃO CÍVEL, REL. DESEMBARGADOR FEDERAL ROGÉRIO DE MENESES FIALHO MOREIRA, 3ª TURMA, JULGAMENTO: 28/04/2022).\r\r\n\r\r\nNa espécie, conforme anteriormente relatado, o entendimento da Corte Especial do Superior Tribunal de Justiça, é o de que \"a morte de uma das partes tem, como consequência, a suspensão do processo, razão pela qual, na ausência de previsão legal impondo prazo para a habilitação dos sucessores da parte, não corre a prescrição, inclusive para a execução\". Nesse sentido: STJ, REsp 1.830.518/PE, Rel. Ministro OG FERNANDES, SEGUNDA TURMA, DJe de 27/04/2021; REsp 1.869.009/CE, Rel. Ministra ASSUSETE MAGALHÃES, SEGUNDA TURMA, DJe de 27/05/2020.\r\r\n\r\r\nSobre a discussão da questão no Superior Tribunal de Justiça, no Tema 1254, a ordem de suspensão é apenas para os Recursos Especiais e Agravos em Recurso Especial na segunda instância e/ou que tramitem no STJ, que versem acerca da questão delimitada.\r\r\n\r\r\nPosto isso, NEGO PROVIMENTO à apelação.\r\r\n\r\r\nÉ como voto.\r\r\n\r\r\nFIM VOTO\r\r\n\r\r\n PROCESSO Nº: 0050597-76.2025.4.05.8000 - APELAÇÃO CÍVEL (198)\r\r\n\r\r\n APELANTE: UNIAO FEDERAL\r\r\n\r\r\n APELADO: VERA LUCIA GIFFONI WBATUBA e outros\r\r\n\r\r\n RELATOR(A): Desembargador(a) Federal ROGERIO DE MENESES FIALHO MOREIRA", "acordao": "Vistos, etc.\r\r\n\r\r\nDecide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO à apelação, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido"}, {"nome": "20260311_134230_RES__VOTO.0808299-82.2020.4.05.8300.VIRTUAL.26.03.2026", "cnj": "0808299-82.2020.4.05.8300", "cab": "APELAÇÃO CÍVEL (198) Nº 0808299-82.2020.4.05.8300", "assessor": "Gabriel Santos Aquino De Oliveira", "comentario": "ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "ADMINISTRATIVO. APELAÇÃO. SERVIDOR PÚBLICO. MÉDICO. FUNASA. DUPLA JORNADA DE TRABALHO. 40 HORAS SEMANAIS. LEI Nº 9.436/97. GRATIFICAÇÃO DE DESEMPENHO DA CARREIRA DA PREVIDÊNCIA, SAÚDE E TRABALHO - GDPST. GRATIFICAÇÃO DE DESEMPENHO DE ATIVIDADES MÉDICAS - GDM-PST. PAGAMENTO EM DOBRO. POSSIBILIDADE. JURISPRUDÊNCIA DO STJ. RECURSO PROVIDO.\r\r\n\r\r\n1. Apelação interposta por particular em face de sentença que julgou improcedente o pedido pretendendo a incorporação do valor da GDM-PST, atinente a segunda jornada de trabalho como médica, nos mesmos moldes em que é paga a primeira jornada de trabalho de 20 horas semanais, cumulando com a condenação da ré ao pagamento dos valores atrasados devidos a título de GDPST e GDM-PST, no tocante à segunda jornada de 20 horas semanais de trabalho, a contar da data em que passou a ser devida até a efetiva implantação do valor em contracheque da autora, inclusive sobre o valor da gratificação natalina, acrescida de correção monetária e juros de mora.\r\r\n\r\r\n2. Concedida a assistência judiciária gratuita pelo Juízo de primeiro grau e inexistentes nos autos elementos que evidenciem a falta superveniente dos pressupostos legais para a sua concessão, devem seus efeitos permanecer inalterados, sendo desnecessária a renovação do pedido a cada instância ou interposição de recurso.\r\r\n\r\r\n3. A GDPST e a GDM-PST, sua sucessora, são gratificações de atividade cujo valor é apurado mediante avaliação de desempenho institucional e individual.\r\r\n\r\r\n4. Embora esta Corte Regional tenha firmado entendimento no sentido de que não é possível o pagamento em dobro das gratificações GDPST e GDM-PST ao médico optante pela dupla jornada, tendo em vista que tais vantagens são calculadas com base no nível e na posição do servidor na carreira, ambas as Turmas de Direito Público do Superior Tribunal de Justiça se posicionam em sentido contrário, assentando que os servidores públicos da área de saúde que optaram pelo regime de 40 horas semanais, nos termos da Lei nº 9.436/97, possuem direito ao recebimento das referidas gratificações em relação ao vencimento de duas jornadas de 20 horas semanais. Prevalência da jurisprudência consolidada do STJ.\r\r\n\r\r\n5. Precedentes do STJ: AgInt no REsp n. 2.003.724/RJ, relator Ministro Manoel Erhardt (Desembargador Convocado do Trf5), Primeira Turma, julgado em 3/10/2022, DJe de 5/10/2022; AgInt no REsp n. 1.995.283/RJ, relatora Ministra Assusete Magalhães, Segunda Turma, julgado em 29/8/2022, DJe de 1/9/2022\r\r\n\r\r\n6. Apelação provida para julgar procedente o pedido, determinando o pagamento em dobro das gratificações pleiteadas, com inclusão das parcelas pretéritas, respeitada a prescrição quinquenal, e com correção monetária e juros de mora calculados nos termos do Manual de Cálculos da Justiça Federal.", "relatorio": "Trata-se de Apelação interposta por ESTHER FERREIRA DA COSTA ALBUQUERQUE em face de sentença proferida pelo Juízo da 2ª Vara Federal da Seção Judiciária de Pernambuco que julgou improcedente o pedido pretendendo a incorporação do valor da GDM-PST, atinente a segunda jornada de trabalho como médica, nos mesmos moldes em que é paga a primeira jornada de trabalho de 20 horas semanais, cumulando com a condenação da ré ao pagamento dos valores atrasados devidos a título de GDPST e GDM-PST, no tocante à segunda jornada de 20 horas semanais de trabalho, a contar da data em que passou a ser devida até a efetiva implantação do valor em contracheque da autora, inclusive sobre o valor da gratificação natalina, acrescida de correção monetária e juros de mora.\r\r\n\r\r\nA Apelante, em suas razões recursais, alega, em síntese, que: a) a sentença recorrida, ao negar o direito pleiteado, contrariou a jurisprudência desta Corte Regional e do STJ quanto ao direito dos médicos da FUNASA ao pagamento das gratificações da GDPST e da GDM-PST, correspondente à segunda jornada semanal de 20 horas de trabalho; b) a jurisprudência do STJ é pacífica no sentido de que os médicos da FUNASA que laboram em regime de duas jornadas de 20 horas, totalizando 40 horas por semana, conforme autoriza a Lei nº. 9.436/97, devem receber a remuneração correspondente às duas jornadas; c) foi contratada inicialmente para o cargo de Médica da FUNASA, sob o regime da CLT, com carga horária de 20 horas semanais e, com o advento da Lei nº. 8.112/90, foi somado à sua remuneração o valor correspondente a mais 20 horas, com incidência de todas as vantagens sobre o valor da dupla jornada; d) não se questiona a pontuação adotada para o cálculo das gratificações GDPST e GDM-PST, mas seu pagamento atinente à segunda jornada do médico, com pagamento em dobro do valor recebido atualmente, uma vez que dobrada é a jornada dos médicos da FUNASA; e) deve ser adotada a posição do STJ para considerar devida a remuneração em dobro das gratificações GDPST e GDM-PST sob os seguintes fundamentos: o §3º do art. 1º da Lei nº. 9.436/97 não deve ser interpretado isoladamente, mas em conjunto com os demais parágrafos do dispositivo legal e afronta o princípio da proporcionalidade o fato de o trabalho ser desempenhado em dupla jornada de 20 horas semanais, mas as gratificações em questão serem pagas apenas em relação a uma delas, e tal interpretação está em consonância com o disposto nos arts. 39 a 46 da Lei nº. 12.702/2012\r\r\n\r\r\nContrarrazões apresentadas pela FUNDAÇÃO NACIONAL DE SAÚDE - FUNASA.\r\r\n\r\r\nÉ o relatório.", "voto": "De início, recebo a Apelação, considerando presentes os pressupostos recursais intrínsecos (cabimento, legitimação, interesse e inexistência de fato impeditivo ou extintivo do direito de recorrer) e extrínsecos (preparo, tempestividade e regularidade formal) para a admissibilidade do recurso.\r\r\n\r\r\nConcedida pelo Juízo de primeiro grau a assistência judiciária gratuita, revela-se desnecessária a renovação das solicitações em cada instância e a cada interposição de recurso. Apesar disso, reiterado o pedido quando da interposição da apelação, tendo a gratuidade da justiça sido acolhida pelo magistrado de primeiro grau e inexistente nos autos elementos que evidenciem a falta superveniente dos pressupostos legais para a sua concessão, devem seus efeitos permanecer inalterados.\r\r\n\r\r\nO cerne da questão devolvida refere-se à apreciação de direito alegado por servidora pública, ocupante do cargo de médica da FUNASA, que objetiva o recebimento da GDPST, substituída pela GDM-PST, em valor equivalente ao dobro do valor do ponto pago aos servidores médicos que trabalham apenas 20 horas semanais e que se encontram no mesmo nível que a autora.\r\r\n\r\r\nA GDPST é uma gratificação de atividade, cujo valor é determinado por meio de uma avaliação de desempenho, resultado do somatório das avaliações de desempenho institucional e individual.\r\r\n\r\r\n A Lei n° 12.702/12 instituiu a GDM-PST (Gratificação de Desempenho de Atividades Médicas), gratificação que veio substituir a GDPST, e manteve os mesmos critérios de avaliação.\r\r\n\r\r\nEmbora esta Corte Regional tenha firmado entendimento no sentido de que não é possível que o médico optante pela dupla jornada de trabalho (40 horas/semanais) perceba as gratificações denominadas GDPST (Lei 11.355/06) ou GDM-PST (Lei 12.702/2012) em dobro, tendo em vista que tais vantagens são calculadas com base no nível e na posição do servidor na carreira, na forma da lei, em valor nominal, de acordo com a pontuação alcançada, ambas as Turmas de Direito Público no Superior Tribunal de Justiça se posicionam no sentido contrário.  Vejamos:\r\r\n\r\r\nPROCESSUAL CIVIL. AGRAVO INTERNO NO RECURSO ESPECIAL.SERVIDOR PÚBLICO CIVIL. MÉDICO. JORNADA DE 40 HORAS. DUPLA JORNADA. GRATIFICAÇÕES. GDM-PST. INCIDÊNCIA SOBRE VENCIMENTOS RELATIVOS ÀS DUAS JORNADAS. ORIENTAÇÃO CONSOLIDADA NESTA CORTE. AGRAVO INTERNO DA UNIÃO A QUE SE NEGA PROVIMENTO.\r\r\n\r\r\n1.A jurisprudência desta Corte Superior firmou-se na compreensão que os servidores públicos da área de saúde que optaram pelo regime de trabalho de 40 horas semanais, nos termos da Lei n. 9.436/1997, possuem direito aos benefícios em relação ao vencimento de duas jornadas de 20 (vinte) horas semanais. Precedentes.\r\r\n\r\r\n2.Agravo interno a que se nega provimento.\r\r\n\r\r\n(AgInt no REsp n. 2.003.724/RJ, relator Ministro Manoel Erhardt (Desembargador Convocado do Trf5), Primeira Turma, julgado em 3/10/2022, DJe de 5/10/2022.).\r\r\n\r\r\nADMINISTRATIVO E PROCESSUAL CIVIL. AGRAVO INTERNO NO RECURSO ESPECIAL. AÇÃO ORDINÁRIA. SERVIDOR PÚBLICO FEDERAL. ÁREA DE SAÚDE. JORNADA DE TRABALHO. REGIME DE TRABALHO DE 20 HORAS SEMANAIS. OPÇÃO POR 40 HORAS SEMANAIS. LEI 9.436/97. GRATIFICAÇÃO DE DESEMPENHO DA CARREIRA DA PREVIDÊNCIA, DA SAÚDE E DO TRABALHO - GDPST. GRATIFICAÇÃO DE DESEMPENHO DE ATIVIDADES MÉDICAS DA CARREIRA DA PREVIDÊNCIA, DA SAÚDE E DO TRABALHO - GDM-PST. INCIDÊNCIA SOBRE VENCIMENTOS DE DUAS JORNADAS DE 20 HORAS SEMANAIS. ACÓRDÃO RECORRIDO EM DISSONÂNCIA COM A JURISPRUDÊNCIA DESTA CORTE.\r\r\n\r\r\nPRECEDENTES. AGRAVO INTERNO IMPROVIDO.\r\r\n\r\r\nI. Agravo interno aviado contra decisão que julgara Recurso Especial interposto contra acórdão publicado na vigência do CPC/2015.\r\r\n\r\r\nIl. Na origem, trata-se de demanda proposta pela parte ora recorrente, objetivando \"perceber a Gratificação de Desempenho na 2ª jornada de trabalho, no mesmo valor pago hoje na 1ª jornada de trabalho\"\r\r\n\r\r\nIII. E firme o entendimento no âmbito desta Corte, no sentido de que os servidores públicos da área de saúde que optaram pelo regime de trabalho de 40 horas semanais, nos termos da Lei 9.436/97, possuem direito aos benefícios em relação ao vencimento de duas jornadas de 20 horas semanais.\r\r\n\r\r\nPrecedentes: STJ, REsp 1.865.032/PB, Rel. Ministro MAURO CAMPBELL MARQUES, SEGUNDA TURMA, DJe de 01/06/2020; AgInt no REsp 1.796.034/PE, Rel. Ministro FRANCISCO FALCÃO, SEGUNDA TURMA, DJe de 11/12/2019; REsp 1.568.559/PB, Rel. Ministra REGINA HELENA COSTA, PRIMEIRA TURMA, DJe de 06/04/2018; Agint no REsp 1.541.579/RS, Rel. Ministro MAURO CAMPBELL MARQUES, SEGUNDA TURMA, DJe de 14/08/2018; AgRg no REsp 1.531.566/PB, Rel. Ministro OG FERNANDES, SEGUNDA TURMA, DJe de 02/03/2017. No mesmo sentido, monocraticamente, os seguintes julgados: STJ, REsp 1.942.775/PE, Rel Ministro MANOEL ERHARDT (Desembargador Federal convocado do TRF/5ª Região), DJe de 02/02/2022; REsp 1.969.944/RN, Rel. Ministro BENEDITO GONÇALVES, DJe de 02/12/2021; REsp 1.967.635/PE, Rel. Ministra ASSUSETE MAGALHÃES, DJe de 29/11/2021; REsp 1.954.925/PB, Rel. Ministro HERMAN BENJAMIN, DJe de 13/10/2021; REsp 1.894.390/RN, Rel. Ministro SÉRGIO KUKINA, DJe de 21/10/2020; REsp 1.877.563/PE, Rel. Ministro OG FERNANDES, DJe de 06/10/2020; REsp 1.885.219/PB, Rel. Ministro MAURO CAMPBELL MARQUES, DJe de 28/09/2020.\r\r\n\r\r\nIV. Agravo interno improvido.\r\r\n\r\r\n(AgInt no REsp n. 1.995.283/RJ, relatora Ministra Assusete Magalhães, Segunda Turma, julgado em 29/8/2022, DJe de 1/9/2022.).\r\r\n\r\r\nLogo, impõe-se o reconhecimento da procedência do pedido da Apelante quanto à incorporação do valor da GDM-PST, atinente a segunda jornada de trabalho como médica, nos mesmos moldes em que é paga a primeira jornada de trabalho de 20 horas semanais, inclusive com o pagamento das parcelas pretéritas, desde que respeitada a prescrição quinquenal e com correção e juros calculados na forma do Manual de Cálculos da Justiça Federal.\r\r\n\r\r\n Em face do exposto, DOU PROVIMENTO à Apelação para, reformando a sentença, julgar procedente o pedido, determinando o pagamento em dobro da gratificação pleiteada e, respeitada a prescrição quinquenal, das parcelas pretéritas, com correção e juros calculados nos termos do Manual de Cálculos da Justiça Federal.\r\r\n\r\r\nÉ como voto.", "acordao": "Vistos, etc.\r\r\n\r\r\nDecide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, DAR PROVIMENTO à Apelação, nos termos do voto do relator e na forma do relatório constante dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido"}, {"nome": "20260311_134331_RES__VOTO.0007181-02.2025.4.05.0000.ORDINÁRIA.26.03.2026", "cnj": "0007181-02.2025.4.05.0000", "cab": "PROCESSO Nº: 0007181-02.2025.4.05.0000 - AGRAVO DE INSTRUMENTO (202)", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "ok", "tipo": "Ordinária", "data": "26.03.2026", "ementa": "PROCESSUAL CIVIL. AGRAVO DE INSTRUMENTO. CUMPRIMENTO DE SENTENÇA. EMPRÉSTIMO COMPULSÓRIO SOBRE ENERGIA ELÉTRICA. DECISÃO QUE REJEITOU EXCEÇÃO DE PRÉ-EXECUTIVIDADE E CONDICIONOU O LEVANTAMENTO DOS VALORES À PRECLUSÃO DA DECISÃO. AUSÊNCIA DE NULIDADE NA FASE DE LIQUIDAÇÃO. MANIFESTAÇÃO DAS PARTES E APRECIAÇÃO JUDICIAL DOS CÁLCULOS. PRECLUSÃO CONSUMATIVA. IMPOSSIBILIDADE DE REDISCUSSÃO DOS CRITÉRIOS DE CÁLCULO EM EXCEÇÃO DE PRÉ-EXECUTIVIDADE. TERMO FINAL DOS JUROS REMUNERATÓRIOS. MATÉRIA NÃO SUSCITADA OPORTUNAMENTE. ESTABILIZAÇÃO DAS DECISÕES PROCESSUAIS. PRECEDENTE DA TURMA. LEVANTAMENTO IMEDIATO DOS VALORES. LITIGÂNCIA DE MÁ-FÉ NÃO CONFIGURADA. PARCIAL PROVIMENTO.\r\r\n\r\r\n1. Agravo de instrumento interposto contra decisão proferida pelo Juízo da 2ª Vara Federal da Seção Judiciária de Pernambuco, nos autos de cumprimento de sentença relativo à devolução de valores decorrentes de empréstimo compulsório sobre energia elétrica, que rejeitou exceção de pré-executividade oposta pela executada e condicionou o levantamento dos valores depositados à preclusão da decisão.\r\r\n\r\r\n2. A ausência de decisão formalmente intitulada como “homologação” do laudo pericial não configura nulidade quando verificado que houve pronunciamento judicial com conteúdo decisório acerca dos cálculos apresentados, precedido de regular intimação das partes e apreciação das manifestações formuladas, inexistindo demonstração de prejuízo.\r\r\n\r\r\n3. A parte executada que, regularmente intimada para se manifestar sobre o laudo pericial e sobre os cálculos elaborados na fase de liquidação, deixa de suscitar insurgência quanto aos critérios adotados, sujeita-se à preclusão consumativa, não sendo possível rediscutir a matéria em momento posterior por meio de exceção de pré-executividade.\r\r\n\r\r\n4. A exceção de pré-executividade constitui meio de defesa de cognição restrita, admitido apenas para matérias de ordem pública ou questões demonstráveis de plano, não se prestando à rediscussão de metodologia de cálculo já apreciada pelo Juízo de origem.\r\r\n\r\r\n5. A pretensão de limitação dos juros remuneratórios à data da Assembleia Geral Extraordinária realizada em 30/06/2005 não pode ser apreciada nesta fase processual, porquanto não suscitada oportunamente durante a liquidação, encontrando-se estabilizadas as decisões anteriormente proferidas no processo.\r\r\n\r\r\n6. Esta Terceira Turma do TRF da 5ª Região, ao julgar o Agravo de Instrumento nº 0007099-68.2025.4.05.0000, em sessão realizada em 12/03/2026, manteve a decisão de origem e reconheceu a preclusão da discussão acerca dos critérios de cálculo e do termo final dos juros remuneratórios, reforçando a estabilização das decisões proferidas na fase de liquidação.\r\r\n\r\r\n7. Reconhecida a preclusão das matérias suscitadas pela executada e inexistindo controvérsia processual idônea a justificar a postergação da satisfação do crédito, mostra-se cabível a reforma parcial da decisão agravada para autorizar o imediato levantamento dos valores depositados em favor da exequente.\r\r\n\r\r\n8. A condenação por litigância de má-fé exige demonstração inequívoca de dolo processual ou de conduta deliberadamente destinada a alterar a verdade dos fatos, o que não se verifica no caso concreto.\r\r\n\r\r\n9. Agravo de instrumento parcialmente provido, para autorizar o levantamento imediato dos valores depositados, mantido o afastamento da condenação por litigância de má-fé.", "relatorio": "Trata-se de Agravo de Instrumento interposto por Owens-Illinois do Brasil Indústria e Comércio Ltda. em face de decisão proferida pelo Juízo da 2ª Vara Federal da Seção Judiciária de Pernambuco, nos autos de cumprimento de sentença movido contra Centrais Elétricas Brasileiras S/A – Eletrobras (Axia Energia).\r\r\n\r\r\nNa origem, cuida-se de cumprimento de sentença decorrente de ação que reconheceu o direito da parte exequente à restituição de valores relativos ao empréstimo compulsório sobre consumo de energia elétrica, cuja apuração do crédito foi submetida à fase de liquidação por meio de perícia contábil.\r\r\n\r\r\nApós a realização da perícia e apresentação de esclarecimentos pelo expert, foi fixado o valor da execução, tendo sido oportunizada manifestação às partes. Intimada para pagamento, a executada não efetuou o adimplemento voluntário, o que ensejou a adoção de medidas constritivas, com bloqueio de valores.\r\r\n\r\r\nPosteriormente, a executada apresentou impugnação e incidentes processuais, questionando os cálculos periciais e alegando, em síntese, nulidades relacionadas à ausência de homologação formal do segundo laudo pericial, bem como suposta inexigibilidade do crédito executado, especialmente quanto ao termo final de incidência dos juros remuneratórios.\r\r\n\r\r\nA decisão agravada rejeitou as alegações deduzidas pela executada em exceção de pré-executividade, reconhecendo que as discussões acerca dos cálculos estavam preclusas, uma vez que a parte teve diversas oportunidades processuais para se manifestar sobre o laudo pericial e deixou transcorrer os respectivos prazos. Na mesma decisão, foi homologada a correção apresentada pela Contadoria do Juízo, determinando-se que a liberação dos valores depositados ocorresse após a preclusão da decisão. O Juízo de origem, contudo, afastou a caracterização de litigância de má-fé por parte da executada.\r\r\n\r\r\nInconformada, a exequente interpôs o presente Agravo de Instrumento, sustentando, em síntese, que inexiste fundamento para condicionar o levantamento dos valores depositados à preclusão da decisão, porquanto o crédito já teria sido devidamente individualizado por meio de perícia homologada, sem impugnação tempestiva da executada. Aduz que a resistência apresentada pela parte executada revela comportamento procrastinatório, razão pela qual requer, além da imediata liberação dos valores, a condenação da agravada por litigância de má-fé.\r\r\n\r\r\nA agravada apresentou contrarrazões, defendendo a manutenção da decisão recorrida. Sustenta, em síntese, a existência de nulidade processual decorrente da ausência de homologação formal do laudo pericial que teria encerrado a fase de liquidação, circunstância que, segundo afirma, teria impedido a interposição de recurso adequado. Argumenta, ainda, que o cálculo do débito estaria em desacordo com precedentes do Superior Tribunal de Justiça relativos ao termo final de incidência dos juros remuneratórios no âmbito do empréstimo compulsório de energia elétrica, razão pela qual seria inadequada a liberação dos valores antes do trânsito em julgado da controvérsia.\r\r\n\r\r\nÉ o relatório.\r\r\n\r\r\nFIM RELATÓRIO\r\r\n\r\r\nPROCESSO Nº: 0007181-02.2025.4.05.0000 - AGRAVO DE INSTRUMENTO (202)\r\r\n\r\r\nAGRAVANTE: COMPANHIA INDUSTRIAL DE VIDROS CIV\r\r\n\r\r\nAGRAVADO: CENTRAIS ELETRICAS BRASILEIRAS SA ELETROBRAS\r\r\n\r\r\nRELATOR(A): Desembargador(a) Federal ROGERIO DE MENESES FIALHO MOREIRA", "voto": "Da análise dos autos verifica-se que, no curso da fase de liquidação, foi realizada perícia contábil destinada à individualização do crédito decorrente da condenação judicial.\r\r\n\r\r\nApós a apresentação do laudo pericial e dos respectivos esclarecimentos, as partes foram regularmente intimadas para se manifestar acerca dos cálculos elaborados. Consta, ainda, que a executada deixou transcorrer sem manifestação (in albis) o prazo para impugnação, somente vindo a apresentar insurgência após a adoção de medidas constritivas destinadas à satisfação do crédito.\r\r\n\r\r\nNesse contexto, correta a conclusão do Juízo de origem no sentido de que a executada teve diversas oportunidades processuais para questionar os critérios adotados na liquidação, não tendo se insurgido no momento oportuno.\r\r\n\r\r\nA inércia da parte no momento processual adequado conduz à incidência da preclusão consumativa, impedindo a rediscussão posterior de matéria já estabilizada no processo, sob pena de comprometimento da segurança jurídica e da duração razoável do processo.\r\r\n\r\r\nSustenta a executada que o prosseguimento do cumprimento de sentença estaria maculado por nulidade, em razão da ausência de decisão formal intitulada como homologação do segundo laudo pericial.\r\r\n\r\r\nA alegação não procede.\r\r\n\r\r\nCom efeito, a nulidade processual somente se configura quando demonstrado prejuízo efetivo à parte, o que não se verifica na hipótese.\r\r\n\r\r\nNo caso concreto, verifica-se que houve pronunciamento judicial com conteúdo decisório acerca dos cálculos apresentados pelo perito, precedido da regular intimação das partes e da apreciação das manifestações formuladas no processo.\r\r\n\r\r\nNessas circunstâncias, a inexistência de decisão formalmente intitulada como “homologação do laudo” não é suficiente, por si só, para caracterizar nulidade processual, sobretudo quando evidenciado que o Juízo de origem apreciou o conteúdo dos cálculos e oportunizou o contraditório às partes.\r\r\n\r\r\nA executada também sustenta que os juros remuneratórios incidentes sobre o crédito decorrente do empréstimo compulsório sobre energia elétrica deveriam ser limitados à data da Assembleia Geral Extraordinária realizada em 30/06/2005.\r\r\n\r\r\nEntretanto, verifica-se que tal discussão não foi suscitada no momento processual oportuno durante a fase de liquidação.\r\r\n\r\r\nA tentativa de rediscussão da matéria em momento posterior, por meio de exceção de pré-executividade, revela-se incompatível com o regime das preclusões processuais, uma vez que os critérios de cálculo adotados no processo foram regularmente submetidos ao contraditório e não foram oportunamente impugnados pela executada.\r\r\n\r\r\nDesse modo, operada a estabilização das decisões anteriormente proferidas, não se admite a reabertura do debate acerca de critérios já definidos no processo. Registre-se que a agravante busca alterar o termo final da aplicação dos juros remuneratórios, não dos juros moratórios.\r\r\n\r\r\nCumpre destacar, ademais, que esta Terceira Turma deste Tribunal Regional Federal da 5ª Região, em sessão realizada em 12/03/2026, ao julgar o Agravo de Instrumento nº 0007099-68.2025.4.05.0000, interposto por Centrais Elétricas Brasileiras S/A – Eletrobras, examinou controvérsia diretamente relacionada à mesma decisão ora agravada.\r\r\n\r\r\nNaquela oportunidade, sob minha relatoria, o colegiado manteve a decisão proferida pelo Juízo de origem, reconhecendo a preclusão das discussões relativas à liquidação do julgado, afastando a alegada nulidade pela ausência de homologação formal do laudo pericial e rejeitando a tentativa de rediscussão do termo final dos juros remuneratórios.\r\r\n\r\r\nO acórdão restou assim ementado:\r\r\n\r\r\nPROCESSUAL CIVIL. AGRAVO DE INSTRUMENTO. CUMPRIMENTO DE SENTENÇA. EMPRÉSTIMO COMPULSÓRIO SOBRE ENERGIA ELÉTRICA. FASE DE LIQUIDAÇÃO. ALEGADA NULIDADE POR AUSÊNCIA DE HOMOLOGAÇÃO FORMAL DE LAUDO PERICIAL. INOCORRÊNCIA. MANIFESTAÇÃO DAS PARTES E APRECIAÇÃO JUDICIAL DOS CÁLCULOS. PRECLUSÃO. TERMO FINAL DOS JUROS REMUNERATÓRIOS. PRETENSÃO DE LIMITAÇÃO À DATA DA ASSEMBLEIA GERAL EXTRAORDINÁRIA DE 30/06/2005. MATÉRIA NÃO SUSCITADA OPORTUNAMENTE. ESTABILIZAÇÃO DAS DECISÕES ANTERIORES. INADEQUAÇÃO DA EXCEÇÃO DE PRÉ-EXECUTIVIDADE. RECURSO DESPROVIDO.\r\r\n\r\r\n1. Agravo de Instrumento interposto por CENTRAIS ELÉTRICAS BRASILEIRAS S/A – ELETROBRAS em face de decisão proferida pelo Juízo da 2ª Vara Federal Cível da Seção Judiciária de Pernambuco, nos autos do cumprimento de sentença movido por COMPANHIA INDUSTRIAL DE VIDROS CIV, posteriormente incorporada por OWENS-ILLINOIS DO BRASIL INDÚSTRIA E COMÉRCIO LTDA.\r\r\n\r\r\n2. A decisão agravada rejeitou exceção de pré-executividade oposta pela executada, na qual se alegava, em síntese: (i) nulidade do prosseguimento do feito para a fase executiva, em razão da ausência de decisão formal de homologação do segundo laudo pericial elaborado na fase de liquidação; e (ii) inexigibilidade parcial do crédito executado, ao fundamento de que os juros remuneratórios incidentes sobre o empréstimo compulsório sobre energia elétrica deveriam ter como termo final a data da Assembleia Geral Extraordinária realizada em 30/06/2005, e não a data do efetivo pagamento.\r\r\n\r\r\n3. A ausência de decisão formal intitulada como “homologação” do laudo pericial não configura nulidade quando verificado que houve pronunciamento judicial com conteúdo decisório acerca dos cálculos apresentados, precedido de regular intimação das partes e apreciação das impugnações formuladas, inexistindo demonstração de prejuízo.\r\r\n\r\r\n4. “A jurisprudência do STJ consolidou o entendimento de que matérias de ordem pública, uma vez decididas e não impugnadas oportunamente, estão sujeitas à preclusão consumativa”. (EREsp n. 1.946.826/SP, relator Ministro Raul Araújo, Corte Especial, julgado em 4/2/2026, DJEN de 13/2/2026.).\r\r\n\r\r\n4. No caso, a parte executada/agavante, regularmente intimada para se manifestar sobre o laudo pericial e sobre os cálculos da contadoria, que deixa de suscitar, no momento processual oportuno, insurgência quanto aos critérios adotados, sujeita-se à preclusão consumativa, não sendo possível rediscutir a matéria em momento posterior por meio de exceção de pré-executividade.\r\r\n\r\r\n5. A invocação de precedente do Superior Tribunal de Justiça anterior à fase de liquidação não afasta a preclusão, nem autoriza a reabertura de discussão sobre critérios já estabilizados no processo, sob pena de violação à segurança jurídica e à duração razoável do processo.\r\r\n\r\r\n6. A exceção de pré-executividade é via de cognição restrita, admitida apenas para matérias de ordem pública ou questões comprováveis de plano, não se prestando à rediscussão de metodologia de cálculo já apreciada pelo Juízo de origem.\r\r\n\r\r\n7. Agravo de instrumento improvido. (TRF5, Agravo de Instrumento nº 0007099-68.2025.4.05.0000, Rel. Des. Fed. Rogério Fialho Moreira, 3ª Turma, julgamento em 12/03/2026).\r\r\n\r\r\nO referido precedente reforça a conclusão de que as matérias suscitadas pela executada se encontram efetivamente preclusas, não sendo possível reabrir discussão sobre critérios já estabilizados no processo.\r\r\n\r\r\nReconhecida a preclusão das matérias suscitadas pela executada e afastada a alegação de nulidade processual, não subsiste fundamento jurídico apto a justificar a postergação do levantamento dos valores depositados em juízo.\r\r\n\r\r\nNo caso concreto, os valores encontram-se constritos para satisfação do crédito executado, inexistindo controvérsia processual idônea a impedir a prática dos atos executivos necessários à efetivação da tutela jurisdicional.\r\r\n\r\r\nA manutenção da restrição imposta pela decisão agravada, condicionando o levantamento dos valores à preclusão da decisão, acaba por impor à exequente demora injustificada no recebimento de crédito já devidamente individualizado no processo.\r\r\n\r\r\nNessas circunstâncias, mostra-se cabível a reforma da decisão agravada, a fim de autorizar o imediato levantamento dos valores depositados, em consonância com a sistemática prevista no art. 523, §3º, do Código de Processo Civil.\r\r\n\r\r\nNo que se refere ao pedido de condenação da executada por litigância de má-fé, entendo que não estão presentes os pressupostos necessários para a aplicação da penalidade prevista nos arts. 79 a 81 do Código de Processo Civil.\r\r\n\r\r\nEmbora a postura processual da executada revele resistência à satisfação do crédito executado, não se verifica, no caso concreto, demonstração inequívoca de dolo processual específico ou de conduta deliberadamente destinada a alterar a verdade dos fatos.\r\r\n\r\r\nDessa forma, deve ser mantida a decisão agravada no ponto em que afastou a caracterização da litigância de má-fé.\r\r\n\r\r\nAnte o exposto, dou parcial provimento ao agravo de instrumento, para reformar parcialmente a decisão agravada, a fim de autorizar o levantamento imediato dos valores depositados em favor da agravante, mantendo, contudo, o afastamento da condenação da executada por litigância de má-fé.\r\r\n\r\r\nÉ como voto.\r\r\n\r\r\nFIM VOTO\r\r\n\r\r\nPROCESSO Nº: 0007181-02.2025.4.05.0000 - AGRAVO DE INSTRUMENTO (202)\r\r\n\r\r\nAGRAVANTE: COMPANHIA INDUSTRIAL DE VIDROS CIV\r\r\n\r\r\nAGRAVADO: CENTRAIS ELETRICAS BRASILEIRAS SA ELETROBRAS\r\r\n\r\r\nRELATOR(A): Desembargador(a) Federal ROGERIO DE MENESES FIALHO MOREIRA", "acordao": "Vistos, etc.\r\r\n\r\r\nDecide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, DAR PARCIAL PROVIMENTO ao agravo de instrumento, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido"}, {"nome": "20260311_151909_Re__VOTO.0805883-49.2017.4.05.8300.ORDINÁRIA.26.03.2026", "cnj": "0805883-49.2017.4.05.8300", "cab": "PROCESSO Nº: 0805883-49.2017.4.05.8300 - APELAÇÃO CÍVEL (198)", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "Ok\r\r\n\r\r\nEnviado do meu iPad", "tipo": "Ordinária", "data": "26.03.2026", "ementa": "PROCESSUAL CIVIL E TRIBUTÁRIO. APELAÇÃO CÍVEL. CUMPRIMENTO DE SENTENÇA CONTRA A FAZENDA PÚBLICA. REPETIÇÃO DE INDÉBITO. FINSOCIAL. ALEGAÇÃO DE UTILIZAÇÃO DO CRÉDITO PARA COMPENSAÇÃO DE DÉBITOS TRIBUTÁRIOS. EXTINÇÃO DA OBRIGAÇÃO EXECUTADA. ART. 924, II, DO CPC. PEDIDO DE SUBSTITUIÇÃO DO CRÉDITO NÃO COMPROVADO. AUSÊNCIA DE DILIGÊNCIA DO CONTRIBUINTE NO ACOMPANHAMENTO DO PROCEDIMENTO ADMINISTRATIVO. LIMITES COGNITIVOS DO CUMPRIMENTO DE SENTENÇA. IMPOSSIBILIDADE DE REDISCUSSÃO DA VALIDADE DA COMPENSAÇÃO NA VIA EXECUTIVA. HONORÁRIOS RECURSAIS.\r\r\n\r\r\n1. Apelação interposta contra sentença que, em sede de cumprimento de sentença, acolheu a impugnação apresentada pela Fazenda Nacional e reconheceu a extinção da obrigação executada, ao fundamento de que o crédito tributário reconhecido judicialmente foi utilizado para compensação de débitos fiscais.\r\r\n\r\r\n2. A compensação constitui modalidade de extinção do crédito tributário, nos termos do art. 156, II, do Código Tributário Nacional, podendo ser declarada pelo sujeito passivo perante a autoridade fiscal, nos termos do art. 74 da Lei nº 9.430/96.\r\r\n\r\r\n3.  No caso concreto, a compensação foi inicialmente declarada pela própria contribuinte no âmbito do processo administrativo correspondente, mediante indicação de débitos de IRPJ e CSLL a serem quitados com o crédito de FINSOCIAL objeto da presente demanda.\r\r\n\r\r\n4. A alegação de posterior substituição do crédito indicado para a compensação não restou demonstrada de forma suficiente nos autos, inexistindo prova de que o pedido administrativo tenha sido efetivamente acolhido ou tenha produzido efeitos aptos a desconstituir a compensação anteriormente declarada.\r\r\n\r\r\n5. Incumbia à própria contribuinte acompanhar diligentemente o processamento administrativo de seus pedidos, não sendo possível afastar os efeitos da compensação sob o argumento de substituição que não restou comprovada.\r\r\n\r\r\n6. Eventual discussão acerca da validade ou nulidade da compensação administrativa não se insere nos limites cognitivos do cumprimento de sentença, que possui natureza executiva e não se presta à rediscussão de atos administrativos tributários.\r\r\n\r\r\n7. Apelação desprovida. Majoração dos honorários advocatícios em sede recursal em 1% (um ponto percentual), nos termos do art. 85, §11, do CPC.", "relatorio": "Trata-se de Apelação interposta por Itaú Unibanco Holding S.A., sucessor do Hipercard Banco Múltiplo S.A., contra sentença proferida pelo Juízo da 6ª Vara Federal da Seção Judiciária de Pernambuco, que, nos autos de cumprimento de sentença ajuizado em face da Fazenda Nacional, acolheu a impugnação apresentada pela executada e julgou extinto o cumprimento de sentença, ao fundamento de que a obrigação executada teria sido integralmente satisfeita mediante compensação tributária.\r\r\n\r\r\nA sentença também condenou a parte exequente ao pagamento de honorários advocatícios sucumbenciais fixados em 2% sobre o valor da causa, com fundamento no art. 85, §8º, do Código de Processo Civil.\r\r\n\r\r\nEm suas razões recursais, o apelante sustenta, preliminarmente, a tempestividade da apelação, argumentando que os embargos de declaração opostos na origem foram tempestivos e cabíveis, circunstância que teria interrompido o prazo recursal nos termos do art. 1.026 do CPC.\r\r\n\r\r\nNo mérito, aduz que a decisão recorrida incorreu em equívoco ao reconhecer a extinção da obrigação executada por compensação tributária. Argumenta que o crédito de FINSOCIAL, objeto do cumprimento de sentença, não foi utilizado para compensação de débitos de IRPJ e CSLL, uma vez que o pedido de compensação inicialmente apresentado no processo administrativo nº 10120.000487/00-37 teria sido posteriormente substituído por requerimento direcionando tais débitos para compensação com crédito de PIS/PASEP, discutido no processo administrativo nº 10120.000486/00-74.\r\r\n\r\r\nSustenta que o pedido de substituição foi formalizado em 28/06/2001, antes do decurso do prazo legal para eventual homologação tácita da compensação, motivo pelo qual não poderia ser considerada consumada a compensação com o crédito de FINSOCIAL. Alega, ainda, que caberia à Fazenda Nacional comprovar a ocorrência da compensação alegada, nos termos do art. 373, II, do CPC.\r\r\n\r\r\nAfirma também que o juízo de origem teria extrapolado os limites da lide ao examinar suposta insuficiência de crédito relacionado ao processo administrativo nº 10120.000486/00-74, o qual não constituiria objeto da presente demanda. Acrescenta que referido processo administrativo ainda se encontraria pendente de julgamento, inexistindo decisão definitiva que comprove a alegada insuficiência de crédito.\r\r\n\r\r\nDefende, ademais, que a sentença recorrida deixou de apreciar documentos e argumentos relevantes apresentados pela parte exequente, circunstância que configuraria negativa de prestação jurisdicional, em violação ao art. 489, §1º, IV, do CPC.\r\r\n\r\r\nDiante disso, requer o provimento da apelação para reformar a decisão recorrida, rejeitando-se a impugnação ao cumprimento de sentença e determinando-se o regular prosseguimento da execução. Subsidiariamente, pleiteia a anulação da decisão por ausência de fundamentação adequada, com retorno dos autos à origem para novo julgamento.\r\r\n\r\r\nPor sua vez, em sede de contrarrazões remissivas, a Fazenda Nacional pugna pelo desprovimento do recurso, reportando-se integralmente aos fundamentos expostos na impugnação ao cumprimento de sentença e à sentença recorrida.\r\r\n\r\r\nÉ o relatório.\r\r\n\r\r\nFIM RELATÓRIO\r\r\n\r\r\n PROCESSO Nº: 0805883-49.2017.4.05.8300 - APELAÇÃO CÍVEL (198)\r\r\n\r\r\n APELANTE: ITAU UNIBANCO HOLDING S.A.\r\r\n\r\r\n APELADO: FAZENDA NACIONAL\r\r\n\r\r\n RELATOR(A): Desembargador(a) Federal ROGERIO DE MENESES FIALHO MOREIRA\r\r\n\r\r\nINICIO VOTO", "voto": "Cuida-se de apelação interposta por Itaú Unibanco Holding S.A., sucessor do Hipercard Banco Múltiplo S.A., contra sentença que, em sede de cumprimento de sentença, acolheu a impugnação apresentada pela Fazenda Nacional e reconheceu a extinção da obrigação executada, ao fundamento de que o crédito tributário reconhecido judicialmente já teria sido integralmente satisfeito por meio de compensação tributária.\r\r\n\r\r\nEm síntese, sustenta a apelante que o crédito de FINSOCIAL reconhecido judicialmente não teria sido utilizado para compensação de débitos fiscais, afirmando que o pedido originalmente formulado teria sido posteriormente substituído por compensação com crédito de PIS/PASEP, objeto de processo administrativo distinto. Argumenta, ainda, que caberia à Fazenda Nacional comprovar a ocorrência da compensação, bem como que a decisão recorrida teria incorrido em negativa de prestação jurisdicional, por não examinar adequadamente os documentos e argumentos apresentados.\r\r\n\r\r\nPor sua vez, a Fazenda Nacional pugna pela manutenção da sentença, sustentando que a compensação foi regularmente declarada pela própria contribuinte no âmbito administrativo, tendo produzido a extinção do crédito tributário, circunstância que impede o prosseguimento do cumprimento de sentença.\r\r\n\r\r\nA controvérsia central dos autos reside em verificar se o crédito de FINSOCIAL, reconhecido judicialmente na ação originária, foi efetivamente utilizado pela contribuinte para compensação de débitos fiscais, circunstância que teria ocasionado a extinção da obrigação ora executada.\r\r\n\r\r\nConforme consignado na sentença recorrida, a Receita Federal informou que os valores correspondentes ao crédito discutido nesta demanda foram utilizados pelo próprio contribuinte para quitação de débitos fiscais mediante compensação regularmente formalizada, a qual produziu a extinção do crédito tributário.\r\r\n\r\r\nA compensação constitui modalidade de extinção do crédito tributário, nos termos do art. 156, II, do Código Tributário Nacional, podendo ser realizada pelo sujeito passivo mediante declaração apresentada à autoridade fiscal, nos moldes previstos no art. 74 da Lei nº 9.430/96.\r\r\n\r\r\nNo caso concreto, verifica-se que a compensação foi inicialmente declarada pela própria contribuinte no âmbito administrativo, mediante pedido de compensação protocolado no processo administrativo nº 10120.000487/00-37, no qual foram indicados débitos de IRPJ e CSLL a serem quitados com o crédito tributário discutido.\r\r\n\r\r\nA partir dessa declaração, a compensação passou a produzir efeitos jurídicos, sujeita apenas à eventual homologação pela autoridade fiscal.\r\r\n\r\r\nNesse contexto, não se mostra plausível admitir que, após declarar administrativamente a utilização do crédito para compensação de débitos fiscais, a própria contribuinte venha posteriormente sustentar, em sede de cumprimento de sentença, que tal compensação não teria ocorrido.\r\r\n\r\r\nA apelante sustenta que o pedido de compensação inicialmente apresentado teria sido posteriormente substituído por requerimento direcionando os débitos para compensação com crédito de PIS/PASEP, objeto do processo administrativo nº 10120.000486/00-74.\r\r\n\r\r\nTodavia, a análise dos autos não demonstra que tenha ocorrido efetiva desconstituição da compensação originalmente declarada.\r\r\n\r\r\nCom efeito, ainda que a contribuinte alegue ter formulado requerimento de substituição do crédito indicado para a compensação, não há comprovação de que tal pedido tenha sido efetivamente acolhido pela autoridade administrativa ou que tenha produzido efeitos aptos a desfazer a compensação anteriormente declarada.\r\r\n\r\r\nAdemais, é relevante destacar que a insurgência da apelante quanto à compensação somente foi apresentada em momento posterior, quando, conforme apontado pela Receita Federal, a compensação já se encontrava consumada.\r\r\n\r\r\nNesse ponto, cumpre ressaltar que incumbia à própria contribuinte acompanhar diligentemente o processamento administrativo de seus pedidos, especialmente quando se trata de pretensão voltada à alteração de compensação previamente declarada por iniciativa própria.\r\r\n\r\r\nA ausência de acompanhamento eficaz do procedimento administrativo não pode ser posteriormente invocada como fundamento para afastar os efeitos da compensação realizada.\r\r\n\r\r\nAssim, não há elementos que infirmem a conclusão alcançada pelo juízo de origem quanto à ocorrência de compensação apta a extinguir o crédito tributário executado.\r\r\n\r\r\nCumpre destacar, ainda, que eventual discussão acerca da validade ou nulidade da compensação realizada na esfera administrativa não se mostra adequada à via processual eleita.\r\r\n\r\r\nO cumprimento de sentença possui natureza eminentemente executiva, destinando-se à satisfação do título judicial formado na fase de conhecimento, não se prestando à rediscussão ampla de atos administrativos tributários eventualmente praticados no âmbito da relação fiscal entre as partes.\r\r\n\r\r\nDesse modo, eventual questionamento acerca da regularidade da compensação realizada deveria ser deduzido na via processual apropriada, não sendo possível, em sede de cumprimento de sentença, desconstituir ato administrativo que reconheceu a utilização do crédito para quitação de débitos fiscais.\r\r\n\r\r\nDiante desse contexto, correta a sentença ao reconhecer que a obrigação executada já se encontrava satisfeita por meio de compensação regularmente formalizada, circunstância que conduz à extinção do cumprimento de sentença, nos termos do art. 924, II, do Código de Processo Civil.\r\r\n\r\r\nAnte do exposto, NEGO PROVIMENTO à apelação.\r\r\n\r\r\nNos termos do art. 85, §11, do CPC/2015, majoro os honorários advocatícios em 1 (um) ponto percentual, a incidir sobre a mesma base fixada na sentença.\r\r\n\r\r\nÉ como voto.\r\r\n\r\r\n Recife, 2 de maio de 2019.\r\r\n\r\r\nFIM VOTO\r\r\n\r\r\n PROCESSO Nº: 0805883-49.2017.4.05.8300 - APELAÇÃO CÍVEL (198)\r\r\n\r\r\n APELANTE: ITAU UNIBANCO HOLDING S.A.\r\r\n\r\r\n APELADO: FAZENDA NACIONAL\r\r\n\r\r\n RELATOR(A): Desembargador(a) Federal ROGERIO DE MENESES FIALHO MOREIRA", "acordao": "Vistos, etc.\r\r\n\r\r\nDecide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO à apelação, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido"}, {"nome": "20260312_175154_Re__VOTO.0800373-84.2024.4.05.8502.ORDINÁRIA.26.03.2026", "cnj": "0800373-84.2024.4.05.8502", "cab": "APELAÇÃO CÍVEL (198) Nº 0800373-84.2024.4.05.8502", "assessor": "Debora Dornelas Camara Sobral", "comentario": "Que coisa! Ok", "tipo": "Ordinária", "data": "26.03.2026", "ementa": "(pendente)", "relatorio": "Trata-se de apelação interposta em face de sentença que julgou improcedentes os pedidos de indenização por danos morais e estéticos formulados pelo autor, extinguindo o feito com resolução do mérito, nos termos do art. 487, I, do CPC. Entendeu o Magistrado de primeiro grau que o dano decorreu de conduta exclusiva da vítima, que, em estado de surto psicótico, deu causa direta e imediata à reação dos vigilantes. Trata-se, portanto, de hipótese de culpa exclusiva da vítima, prevista no artigo 14, §3º, II, do Código de Defesa do Consumidor, afastando qualquer responsabilidade civil da CEF.\r\r\nEm suas razões recursais, sustenta o apelante, em síntese, que é \"evidente nos relatórios médicos e no depoimento das testemunhas oculares que a ação do preposto da Caixa, foi desproporcional ao risco ali apresentado, incorrendo em excesso e causando danos irreparáveis ao requerente e à sua família, uma vez que os tiros que lhe atingiram quase tiraram a sua vida\". Afirma ser portador de esquizofrenia grave (CID-10 F29), e que se encontrava em surto psicótico na data dos fatos (13/05/2024). Alega, ainda, que \"O vigilante não se limitou a neutralizar o risco: descarregou a arma em plena agência bancária, colocando em perigo clientes, funcionários e sobretudo a vida do apelante\".\r\r\nRequer, assim, a reforma da sentença, para que seja julgado totalmente procedente o pedido inicial, com a condenação da CEF ao pagamento de R$ 100.000,00 (cem mil reais) a título de danos morais e R$ 50.000,00 (cinquenta mil reais) a título de danos estéticos.\r\r\nContrarrazões apresentadas.\r\r\nÉ o relatório.\r\r\n\r\r\nRecebo a apelação do particular, considerando presentes os requisitos de admissibilidade recursal.\r\r\nO ponto central da controvérsia recursal cinge-se a verificar se a Caixa Econômica Federal (CEF) praticou ato ilícito capaz de violar direito do Apelante e lhe causar dano de natureza extrapatrimonial e, em caso afirmativo, se deve ser responsabilizada pela correspondente reparação.\r\r\nNo que concerne à responsabilidade civil do Estado e seu dever de indenizar, a Constituição Federal prevê a responsabilidade objetiva do Estado pelos danos causados por seus agentes a terceiros, nos seguintes termos:\r\r\nArt. 37. A administração pública direta e indireta de qualquer dos Poderes da União, dos Estados, do Distrito Federal e dos Municípios obedecerá aos princípios de legalidade, impessoalidade, moralidade, publicidade e eficiência e, também, ao seguinte:\r\r\n(...)\r\r\n§ 6° As pessoas jurídicas de direito público e as de direito privado prestadoras de serviços públicos responderão pelos danos que seus agentes, nessa qualidade, causarem a terceiros, assegurado o direito de regresso contra o responsável nos casos de dolo ou culpa.\r\r\nNão obstante a adoção da teoria do risco administrativo, a responsabilidade estatal não é absoluta, podendo ser afastada quando demonstrada a ocorrência de alguma causa excludente do nexo causal, como culpa exclusiva da vítima ou de terceiro, caso fortuito ou força maior.\r\r\nA culpa exclusiva da vítima configura-se quando o próprio comportamento do lesado constitui a única causa do evento danoso, sem contribuição de terceiros. Nessa hipótese, o dano decorre unicamente de ação, omissão ou imprudência da própria vítima, rompendo-se o nexo causal que poderia ensejar a responsabilização civil de outrem.\r\r\nNo caso concreto, entendeu o Magistrado de primeiro grau que \"o dano decorreu de conduta exclusiva da vítima, que, em estado de surto psicótico, deu causa direta e imediata à reação dos vigilantes. Trata-se, portanto, de hipótese de culpa exclusiva da vítima, prevista no artigo 14, §3º, II, do Código de Defesa do Consumidor, afastando qualquer responsabilidade civil da CEF\".\r\r\nEntendo que a sentença não merece reparos.\r\r\nCom efeito, o conjunto probatório constante dos autos afasta as alegações do apelante no sentido de que não teria agido de forma agressiva ou violenta com os profissionais presentes na agência bancária ou com os demais clientes, e de que seu único intuito, em momento de surto psicótico, era atentar contra a própria vida.\r\r\nDa análise da gravação das câmeras de segurança da agência bancária, anexada aos autos sob Id. 5625840, verifica-se que o autor investiu contra um dos seguranças com a intenção de apoderar-se de sua arma, dando início a uma luta corporal diante da resistência apresentada pelo profissional. Quando da intervenção do segundo segurança, a situação ainda não se encontrava sob controle e, mesmo após os primeiros disparos, o autor passou a perseguir o segundo agente, igualmente com o propósito de tomar-lhe a arma. A imobilização completa do autor só ocorreu com a atuação conjunta de três seguranças portando armas, apesar dos disparos já efetuados.\r\r\nNesse contexto, não se evidencia qualquer excesso na reação dos vigilantes, que se mostrou adequada e necessária para conter a conduta inesperada e agressiva do autor. Do mesmo modo, após a imobilização do autor, não se observa violência indevida na atuação dos profissionais.\r\r\nAdemais, conforme consignou o Magistrado, \"Importante destacar que toda a ocorrência se desenrolou em menos de dois minutos, impossibilitando os seguranças de identificar que o agressor sofria de transtorno psiquiátrico ou de avaliar suas supostas intenções subjetivas. A conduta dos vigilantes deve ser analisada sob a ótica do momento da ocorrência, em que o risco era real, atual e grave\".\r\r\nDiante desse cenário, conclui-se que a atuação dos agentes de segurança da Caixa Econômica Federal ocorreu dentro dos limites da proporcionalidade e da necessidade, voltada à contenção da situação de risco instaurada exclusivamente pela ação do autor, não havendo qualquer elemento que indique excesso ou falha na prestação do serviço capaz de ensejar a responsabilização civil da instituição financeira.\r\r\nAssim, configurada a culpa exclusiva da vítima, resta afastado o nexo causal indispensável à caracterização da responsabilidade civil da ré.\r\r\nEm face do exposto, NEGO PROVIMENTO à Apelação do Autor.  Honorários recursais majorados em 1% (um por cento), nos termos do art. 85, § 11, do CPC, mantida sua exigibilidade suspensa em razão do benefício da assistência judiciária gratuita concedido à autora.\r\r\nÉ como voto.\r\r\n\r\r\nADMINISTRATIVO E PROCESSUAL CIVIL. RESPONSABILIDADE CIVIL. CAIXA ECONÔMICA FEDERAL. DANOS MORAIS. INTERVENÇÃO DE SEGURANÇAS EM AGÊNCIA BANCÁRIA. TENTATIVA DE SUBTRAÇÃO DE ARMA DE VIGILANTE. REAÇÃO PARA CONTER AGRESSÃO. CULPA EXCLUSIVA DA VÍTIMA. ROMPIMENTO DO NEXO CAUSAL. INEXISTÊNCIA DE ATO ILÍCITO. APELAÇÃO DESPROVIDA.\r\r\n1. Apelação interposta em face de sentença que julgou improcedentes os pedidos de indenização por danos morais e estéticos formulados pelo autor, extinguindo o feito, com resolução do mérito, nos termos do art. 487, I, do CPC. Entendeu o Magistrado de primeiro grau que o dano decorreu de conduta exclusiva da vítima, que, em estado de surto psicótico, deu causa direta e imediata à reação dos vigilantes. Trata-se, portanto, de hipótese de culpa exclusiva da vítima, prevista no artigo 14, §3º, II, do Código de Defesa do Consumidor, afastando qualquer responsabilidade civil da CEF.\r\r\n2. A responsabilidade civil das pessoas jurídicas de direito público e das pessoas jurídicas de direito privado prestadoras de serviço público é objetiva, nos termos do art. 37, § 6º, da Constituição Federal, exigindo-se, contudo, a demonstração do dano e do nexo causal entre a conduta do agente estatal e o prejuízo experimentado.\r\r\n3. A responsabilidade estatal pode ser afastada quando configurada alguma das causas excludentes do nexo causal, entre elas a culpa exclusiva da vítima. Nessa hipótese, o dano decorre unicamente de ação, omissão ou imprudência da própria vítima, rompendo-se o nexo causal que poderia ensejar a responsabilização civil de outrem.\r\r\n4. Hipótese em que o conjunto probatório, especialmente as imagens das câmeras de segurança da agência bancária, demonstra que o autor investiu de forma violenta contra vigilante com o intuito de tomar-lhe a arma, iniciando luta corporal e mantendo comportamento agressivo mesmo após a intervenção de outro agente de segurança. A imobilização completa do autor só ocorreu com a atuação conjunta de três seguranças portando armas, apesar dos disparos já efetuados.\r\r\n5. Conforme consignado na sentença, a reação dos vigilantes foi proporcional e necessária para conter situação de risco real, atual e grave, não sendo possível exigir dos profissionais, no curto espaço de tempo em que se desenvolveram os fatos (menos de dois minutos), a identificação de eventual transtorno psiquiátrico do agressor ou a avaliação de suas intenções subjetivas. Após a imobilização do autor, não se observa qualquer excesso ou uso indevido de violência na atuação dos profissionais.\r\r\n6. Configuração de culpa exclusiva da vítima, a romper o nexo causal e afastar o dever de indenizar.\r\r\n7. Apelação improvida. Honorários recursais majorados, nos termos do art. 85, § 11, do CPC, mantida a suspensão de exigibilidade em razão da gratuidade da justiça.", "voto": "(pendente)", "acordao": "(pendente)\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Resultado não identificado", "css": "outro"}, {"nome": "20260312_175351_Re__VOTO.0004946-62.2025.4.05.0000.VIRTUAL.26.03.2026", "cnj": "0004946-62.2025.4.05.0000", "cab": "AGRAVO DE INSTRUMENTO (202) Nº 0004946-62.2025.4.05.0000", "assessor": "Gabriel Santos Aquino De Oliveira", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "ADMINISTRATIVO E PROCESSUAL CIVIL. AGRAVO DE INSTRUMENTO. PROCESSO SELETIVO DE RESIDÊNCIA MÉDICA. BONIFICAÇÃO DE 10% (DEZ POR CENTO). PROGRAMA MAIS MÉDICOS PELO BRASIL (PMMB) E PROVAB. BONIFICAÇÃO DE 10%. DIREITO À PONTUAÇÃO ADICIONAL. LEI Nº 12.871/2013. DISPOSITIVO LEGAL REVOGADO. SEGURANÇA JURÍDICA. MANUTENÇÃO DOS EFEITOS. REQUISITOS PREENCHIDOS ANTES DA REVOGAÇÃO. AGRAVO DE INSTRUMENTO IMPROVIDO. AGRAVO INTERNO PREJUDICADO.\r\r\n\r\r\n 1. Agravo de Instrumento, com pedido de atribuição de efeito suspensivo, interposto pela EMPRESA BRASILEIRA DE SERVIÇOS HOSPITALARES - EBSERH contra decisão deferiu a liminar para determinar aos impetrados que considerem a participação no Programa Estratégia Saúde da Família em região prioritária como uma das \"ações de aperfeiçoamento na área de Atenção Básica em saúde em regiões prioritárias para o SUS, voltadas especificamente para os médicos formados em instituições de educação superior brasileiras ou com diploma revalidado, serão desenvolvidas por meio de projetos e programas dos Ministérios da Saúde e da Educação\", na forma do art. 22, §2º, Lei nº 12.871/2013, devendo conferir se a parte autora cumpriu integralmente as ações daquele programa por 1 ano e, nesse caso, atribuir-lhe a bonificação de 10% na sua nota no ENARE EDIÇÃO 2025/2026, atualizando sua classificação, bem como que incluam o seu nome na lista PROVAB como profissional médico apta a receber o adicional de 10% (dez por cento) nos processos seletivos dos Programas de Residência Médica (PRMs), até ulterior deliberação.\r\r\n\r\r\n 2. Em que pese o Relator ter entendimento no sentido de que o benefício é direcionado apenas para projetos e programas dos Ministérios da Saúde e da Educação desenvolvidos para o aperfeiçoamento na área de Atenção Básica em saúde em regiões prioritárias para o SUS, sendo equivocada a interpretação de que todo e qualquer integrante do Programa Mais Médicos pelo Brasil fazem jus à bonificação adicional de 10% (dez por cento) nas provas de residência médica, na forma do art. 22, §2º, da Lei n.º 12.871/13, e, portanto, ser indevida a equiparação do Programa Mais Médicos pelo Brasil ao PROVAB para fins de bonificação, a 1ª e 3ª Turmas têm aplicado o entendimento favorável aos médicos - no sentido de que é possível, sim, conceder a bonificação pleiteada aos egressos do PMMB, ponderando que o edital que não a contemplou restou omisso e que o Judiciário poderia se pronunciar para abarcá-la também - desde que: (i) tenha havido a participação e cumprimento integral de ações na área de Atenção Básica em saúde em regiões prioritárias para o SUS; bem como (i) a realização do Programa em 1 (um) ano.\r\r\n\r\r\n 3. Embora a EBSERH mencione que a agravada não participou de nenhuma ação de aperfeiçoamento na área de atenção básica em saúde desenvolvidas por meio de projetos e programas dos Ministérios da Saúde e da Educação, tratando-se de profissional contratada diretamente junto à Municipalidade, não houve, nas razões recursais, qualquer alegação genérica sobre quais seriam os efeitos deletérios advindos do lapso temporal entre o início da demanda e a conclusão da prestação jurisdicional pelo órgão colegiado, limitando-se a requerer o pedido de atribuição de efeito suspensivo ao recurso no pedido apenas diante da plausibilidade da alegação.\r\r\n\r\r\n 4. Apesar de a Lei 15.233/25, de 07/10/25, ter revogado o trecho que prévia o acréscimo de 10% nas notas dos processos seletivos de residência medica para quem tivesse atuação por pelo menos 1 ano em programas relacionados à Atenção Básica, dada a necessidade de preservar a segurança jurídica, tal norma deve se restringir aos interessados que ainda não tenham completado 1 ano até 08/10/2025.\r\r\n\r\r\n 5. Constatado que a Agravada havia preenchido, ao tempo da publicação do Edital do ENARE Edição 2025/2026, em 20 de junho de 2025, os requisitos legais previstos no dispositivo legal agora revogado, não se configura hipótese de reforma da decisão do juízo de origem.\r\r\n\r\r\n 6. Agravo de Instrumento não provido. Agravo interno prejudicado", "relatorio": "Trata-se de Agravo de Instrumento, com pedido de atribuição de efeito suspensivo, interposto pela EMPRESA BRASILEIRA DE SERVIÇOS HOSPITALARES - EBSERH contra decisão proferida pelo Juízo da 2ª Vara Federal da Seção Judiciária da Paraíba que deferiu a liminar para determinar aos impetrados que considerem a participação no Programa Estratégia Saúde da Família em região prioritária como uma das \"ações de aperfeiçoamento na área de Atenção Básica em saúde em regiões prioritárias para o SUS, voltadas especificamente para os médicos formados em instituições de educação superior brasileiras ou com diploma revalidado, serão desenvolvidas por meio de projetos e programas dos Ministérios da Saúde e da Educação\", na forma do art. 22, §2º, Lei nº 12.871/2013, devendo conferir se a parte autora cumpriu integralmente as ações daquele programa por 1 ano e, nesse caso, atribuir-lhe a bonificação de 10% na sua nota no ENARE EDIÇÃO 2025/2026, atualizando sua classificação, bem como que incluam o seu nome na lista PROVAB como profissional médico apta a receber o adicional de 10% (dez por cento) nos processos seletivos dos Programas de Residência Médica (PRMs), até ulterior deliberação.\r\r\n\r\r\n Nas razões recursais, traz os seguintes argumentos:\r\r\n\r\r\n a) a impetrante ajuizou mandado de segurança requerendo judicialmente a bonificação de 10% (dez por cento) em todas as etapas do Exame Nacional de Residência Médica (Enare 2025/2026) sob o argumento de que \"atua em equipes de saúde básica da família\";\r\r\n\r\r\n b) no caso concreto, a parte impetrante tenta induzir o juízo em erro, alegando participar de \"outros programas\", quando sequer participou de algum programa governamental de integração ensino-serviço, notadamente os programas Provab, Mais Médicos, Médicos pelo Brasil ou Brasil Conta Comigo, quando, de fato, tem atuação na atenção básica à saúde em caráter estritamente profissional;\r\r\n\r\r\n c) a impetrante atua profissionalmente por meio de vínculo com o ente municipal, mas busca se valer de decisões judiciais que entendem pela inclusão dos programas Mais Médicos, Médicos pelo Brasil ou Brasil Conta Comigo;\r\r\n\r\r\n d) a agravada não participou de nenhuma ação de aperfeiçoamento na área de atenção básica em saúde desenvolvidas por meio de projetos e programas dos Ministérios da Saúde e da Educação, ou caso tenha participado, não logrou comprovar nos autos, não fazendo jus à pontuação adicional pleiteada;\r\r\n\r\r\n e) com base na Lei nº 14.621/2023, a bonificação será concedida exclusivamente aos médicos que tenham concluído o Programa de Residência Médica em Medicina de Família e Comunidade em instituição credenciada pela Comissão Nacional de Residência Médica. Isso se deve ao fato de que a lei define apenas esta modalidade como ação de aperfeiçoamento da Atenção Básica. Portanto, essa possibilidade não se estende aos participantes do Programa Médicos pelo Brasil, como é o caso da impetrante\r\r\n\r\r\n f) o Poder Judiciário não pode substituir a banca examinadora nem intervir na correção/atribuição de notas (risco de usurpação de competência).\r\r\n\r\r\n Pedido de atribuição de efeito suspensivo indeferido.\r\r\n\r\r\n Agravo interno interposto pela EBSERH em face da decisão que indeferiu a atribuição de efeito suspensivo.\r\r\n\r\r\n Sem contrarrazões.\r\r\n\r\r\n É o relatório.", "voto": "Por ocasião do pedido de atribuição de efeito suspensivo, o indeferi, nos seguintes termos:\r\r\n\r\r\n “(...)\r\r\n\r\r\n Nos termos do art. 1.019, inciso I, do CPC, poderá o relator atribuir efeito suspensivo ao agravo de instrumento ou deferir, em antecipação de tutela, total ou parcialmente a pretensão recursal, comunicando ao juiz sua decisão.\r\r\n\r\r\n No caso dos autos, entendo, em sede de cognição sumária, própria das decisões liminares, que não estão presentes os requisitos para o deferimento do pedido antecipatório.\r\r\n\r\r\n Explico.\r\r\n\r\r\n Em que pese esta Relatoria ter entendimento no sentido de que o benefício é direcionado apenas para projetos e programas dos Ministérios da Saúde e da Educação desenvolvidos para o aperfeiçoamento na área de Atenção Básica em saúde em regiões prioritárias para o SUS, sendo equivocada a interpretação de que todo e qualquer integrante do Programa Mais Médicos pelo Brasil fazem jus à bonificação adicional de 10% (dez por cento) nas provas de residência médica, na forma do art. 22, §2º, da Lei n.º 12.871/13, e, portanto, ser indevida a equiparação do Programa Mais Médicos pelo Brasil ao PROVAB para fins de bonificação, a 1ª e 3ª Turmas têm aplicado o entendimento favorável aos médicos - no sentido de que é possível, sim, conceder a bonificação pleiteada aos egressos do PMMB, ponderando que o edital que não a contemplou restou omisso e que o Judiciário poderia se pronunciar para abarcá-la também - desde que: (i) tenha havido a participação e cumprimento integral de ações na área de Atenção Básica em saúde em regiões prioritárias para o SUS; bem como (i) a realização do Programa em 1 (um) ano.\r\r\n\r\r\n Quanto ao item \"b\", embora a EBSERH mencione que a agravada não participou de nenhuma ação de aperfeiçoamento na área de atenção básica em saúde desenvolvidas por meio de projetos e programas dos Ministérios da Saúde e da Educação, tratando-se de profissional contratada diretamente junto à Municipalidade, não houve, nas razões recursais, qualquer alegação genérica sobre quais seriam os efeitos deletérios advindos do lapso temporal entre o início da demanda e a conclusão da prestação jurisdicional pelo órgão colegiado, limitando-se a requerer o pedido de atribuição de efeito suspensivo ao recurso no pedido apenas diante da plausibilidade da alegação.\r\r\n\r\r\n Assim, em se tratando de pedido de tutela de evidência não abarcado nas hipóteses dos incisos II e III do art. 311 do CPC, não há como o mesmo ser acolhido neste momento.\r\r\n\r\r\n Ante o exposto, INDEFIRO a liminar.\r\r\n\r\r\n  (...)”\r\r\n\r\r\n Vale ponderar, ainda, que apesar de a Lei 15.233/25, de 07/10/25, ter revogado o trecho que prévia o acréscimo de 10% nas notas dos processos seletivos de residência medica para quem tivesse atuação por pelo menos 1 ano em programas relacionados à Atenção Básica, dada a necessidade de preservar a segurança jurídica, tal norma deve se restringir aos interessados que ainda não tenham completado 1 ano até 08/10/2025.\r\r\n\r\r\n Constatado que a Agravada havia preenchido, ao tempo da publicação do Edital do ENARE Edição 2025/2026, em 20 de junho de 2025, os requisitos legais previstos no dispositivo legal agora revogado, não se configura hipótese de reforma da decisão do juízo de origem.\r\r\n\r\r\n Diante do que ora se expõe e tendo como razão de decidir também os fundamentos já apresentados na decisão que indeferiu o pedido de atribuição de efeito suspensivo e, não havendo qualquer modificação na situação fática e jurídica capaz de alterar as razões do convencimento, o mantenho em todos os seus termos.\r\r\n\r\r\n Pelo exposto, NEGO PROVIMENTO ao agravo de instrumento.\r\r\n\r\r\n Julgo prejudicado o agravo interno.\r\r\n\r\r\n É como voto.", "acordao": "Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO ao agravo de instrumento, julgando prejudicado o agravo interno, nos termos do voto do relator e na forma do relatório constante dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido"}, {"nome": "20260312_210952_Re__VOTO.0805130-41.2025.4.05.8000.VIRTUAL26.03.2026", "cnj": "0805130-41.2025.4.05.8000", "cab": "APELAÇÃO CÍVEL (198) Nº 0805130-41.2025.4.05.8000", "assessor": "Gabriel Santos Aquino De Oliveira", "comentario": "Ok", "tipo": "", "data": "", "ementa": "ADMINISTRATIVO E PROCESSUAL CIVIL. APELAÇÃO CÍVEL. PROCESSO SELETIVO DE RESIDÊNCIA MÉDICA. BONIFICAÇÃO DE 10% (DEZ POR CENTO). PROGRAMA MAIS MÉDICOS PELO BRASIL (PMMB) E PROVAB. BONIFICAÇÃO DE 10%. DIREITO À PONTUAÇÃO ADICIONAL. LEI Nº 12.871/2013. DISPOSITIVO LEGAL REVOGADO. SEGURANÇA JURÍDICA. MANUTENÇÃO DOS EFEITOS. REQUISITOS PREENCHIDOS ANTES DA REVOGAÇÃO. RECURSO PROVIDO.\r\r\n\r\r\n 1. Recurso de Apelação interposto por CLAUDIA PATRÍCIA CARVALHO GOIS em face de sentença que denegou a segurança, visando o reconhecimento de seu direito à pontuação adicional de 10% em processos seletivos de residência médica, nos termos do art. 22, §2º, da Lei nº 12.871/2013, em virtude de sua atuação no Programa Mais Médicos para o Brasil (PMMB), no Município de Quebrangulo/AL, desde 21/09/2023.\r\r\n\r\r\n 2. Ressalvado o entendimento pessoal do Relator, no sentido de que benefício pretendido é extensível tão somente para os candidatos egressos do
