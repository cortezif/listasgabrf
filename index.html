antes em outras ações ou cujas ações estejam suspensas e não firmatários de acordo, a partir de janeiro de 1993, com reflexos, respeitadas as datas de admissões, descontadas as reposições já feitas por força das leis n° 8622/93 e 8627/93. Sem custas e sem honorários. Sentença sujeita ao duplo grau de jurisdição\"\r\r\n\r\r\n 10. Destaca-se, por oportuno, trecho do voto que ensejou o referido acórdão: \"[...] Feitas tais ponderações, constata-se que o interesse defendido pelo Parquet na presente - direito dos servidores, ativos e inativos, e pensionistas à revisão geral de 28,86% - consiste num direito individual homogêneo disponivel de expressão social, tendo em vista a extraordinária dispersão dos lesados. No particular, cumpre observar que a pretensão deduzida in casu beneficia a todos os servidores públicos civis da esfera federal (ativos, inativos e seus pensionistas), os quais são representados por diversos sindicatos. Não existe uma entidade de classe que represente a todos eles, exatamente em função da extraordinária dispersão dos lesados, o que legitima o Ministério Público Federal a propor esta ação coletiva. A par disso, o enfrentamento da questão aqui debatida em sede de ação coletiva é de todo recomendável, haja vista que, diante da grande quantidade de lesados, a via coletiva evita um sem-número de processos e, consequentemente, a sobrecarga do Poder Judiciário, o que é do interesse de toda a coletividade [...].\"\r\r\n\r\r\n 11. Evidente que o agravante não demonstrou a probabilidade do direito pleiteado, já que, diversamente do que alega a ação civil pública originária não limitou a sua eficácia territorial ao Estado do Mato Grosso do Sul. Muito pelo contrário, o MPF foi claro ao delinear o objeto da mencionada ACP, abrangendo todos os servidores públicos civis federais, ativos e inativos, bem como pensionistas do quadro de pessoal da União Federal.\r\r\n\r\r\n 12. Agravo de instrumento desprovido. (PROCESSO: 08044936820244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL SEBASTIÃO JOSÉ VASQUES DE MORAES, 6ª TURMA, JULGAMENTO: 21/05/2024)\r\r\n\r\r\n No que concerne à prescrição, verifica-se que, embora tenha ocorrido o Trânsito em Julgado do Processo originário em 02/08/2019, o Ministério Público Federal - MPF, Autor da Ação Coletiva, propôs Medida Cautelar de Protesto em 11/06/2024, distribuída sob o nº 5004409-14.2024.4.03.6000, para a 1ª Vara Federal da Seção Judiciária do Mato Grosso do Sul, objetivando a interrupção do prazo prescricional.\r\r\n\r\r\n A Medida Cautelar de Protesto, ajuizada pelo MPF, interrompe o prazo prescricional, a partir de seu ajuizamento (11/06/2024), cujo prazo passa a correr pela metade. O termo final somente se dará em 12/2026. O presente Cumprimento de Sentença foi proposto em 06/06/2025, logo, ausente a prescrição.\r\r\n\r\r\n Nesse mesmo sentido de afastar a prescrição em razão da propositura da cautela de protesto pelo MPF: PROCESSO: 08066753820244058500, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL ALEXANDRE LUNA FREIRE, 3ª TURMA, JULGAMENTO: 07/08/2025.\r\r\n\r\r\n Destaque-se, por fim, que não pode haver pagamento em duplicidade. Como bem estabelecido na sentença exequenda, no cálculo do valor devido deve ocorrer a compensação com o reenquadramento concedido pelas Leis 8.622/93 e 8.627/93, bem como a compensação dos valores adimplidos administrativamente, conforme a tese firmada pelo Superior Tribunal de Justiça no enunciado do Tema 1.102, verbis:\r\r\n\r\r\n \"I) É possível a comprovação de transação administrativa, relativa ao pagamento da vantagem de 28,86%, por meio de fichas financeiras ou documento expedido pelo Sistema Integrado de Administração de Recursos Humanos - SIAPE, conforme art. 7º, § 2º, da MP 1.962-33/2000, reproduzida na vigente MP 2.169-43/2001, apenas em relação a acordos firmados posteriormente à sua vigência.\r\r\n\r\r\n II) Quando não for localizado o instrumento de transação devidamente homologado, e buscando impedir o enriquecimento ilícito, os valores recebidos administrativamente, a título de 28,86%, demonstrados por meio dos documentos expedidos pelo SIAPE, devem ser deduzidos da quantia apurada, com as atualizações pertinentes.\"\r\r\n\r\r\n No que toca ao pagamento de subsídio em observância ao direito à irredutibilidade de vencimentos, a decisão agravada foi exata ao reconhecer que, se da incorporação do reajuste de 28,86% resultar um valor bruto superior ao valor bruto recebido pela parte credora após o termo ad quem, ela deve receber uma parcela complementar para evitar a redução até que haja a absorção dessa diferença.\r\r\n\r\r\n Com tais considerações, NEGO PROVIMENTO ao agravo de instrumento.\r\r\n\r\r\n É como voto.", "acordao": "Vistos, etc.\r\r\n\r\r\n Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO ao agravo de instrumento, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido"}, {"nome": "20260309_160110_Re__VOTO.ED.0005115-49.2025.4.05.0000.VIRTUAL.26.03.2026", "cnj": "0005115-49.2025.4.05.0000", "cab": "AGRAVO DE INSTRUMENTO (202) Nº 0005115-49.2025.4.05.0000", "assessor": "Gabriel Santos Aquino De Oliveira", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "PROCESSUAL CIVIL. EMBARGOS DE DECLARAÇÃO. FUNDEF/FUNDEB. HONORÁRIOS ADVOCATÍCIOS CONTRATUAIS. PRECATÓRIO. BASE DE CÁLCULO. ATUALIZAÇÃO MONETÁRIA. ALEGAÇÃO DE OMISSÃO NO JULGADO. REDISCUSSÃO DE QUESTÃO JÁ APRECIADA. EMBARGOS IMPROVIDOS.\r\r\n\r\r\n 1. Embargos de Declaração opostos pela União Federal em face de acórdão desta Turma que, à unanimidade, deu provimento ao Agravo de Instrumento interposto por MONTEIRO E MONTEIRO ADVOGADOS ASSOCIADOS S/C contra decisão que não acolheu a sua ponderação quando à (in)correção relacionada à retenção de honorários advocatícios contratuais quando da expedição do precatório 2025.80.00.002.20015.\r\r\n\r\r\n 2. A teor do que dispõe o art. 1.022 do Código de Processo Civil, cabem embargos de declaração \"contra qualquer decisão judicial para esclarecer obscuridade ou eliminar contradição; suprir omissão de ponto ou questão sobre o qual devia se pronunciar o juiz de ofício ou a requerimento; e/ou corrigir erro material\".\r\r\n\r\r\n 3. No caso, inexistem os vícios apontados pela parte embargante, não se subsumindo o objeto dos presentes embargos a nenhuma das hipóteses previstas no sobredito dispositivo legal.\r\r\n\r\r\n 4. Existência de pronunciamento expresso, no v. acórdão, no sentido de afastar a ocorrência do anatocismo (“Não se trata de fazer incidir juros sobre juros”), na medida em que esclarece a distinção jurídica entre a base de cálculo dos honorários, que incide sobre o valor integral da condenação, e a fonte utilizada para o seu pagamento, limitada aos encargos moratórios\r\r\n\r\r\n 5. A embargante deseja rediscutir questões efetivamente apreciadas por ocasião do julgamento que originou o acórdão ora questionado. Frise-se, entretanto, que embargos de declaração, ainda que opostos para fins de prequestionamento, não se prestam a este fim.\r\r\n\r\r\n 6. Embargos de declaração conhecidos e improvidos.", "relatorio": "Trata-se de Embargos de Declaração opostos pela União Federal em face de acórdão desta Turma que, à unanimidade, deu provimento ao Agravo de Instrumento interposto por MONTEIRO E MONTEIRO ADVOGADOS ASSOCIADOS S/C contra decisão que não acolheu a sua ponderação quando à (in)correção relacionada à retenção de honorários advocatícios contratuais quando da expedição do precatório 2025.80.00.002.20015.\r\r\n\r\r\n Alega-se, nas razões de recurso, que o v. acórdão foi omisso quanto à análise das seguintes questões: a) deferir o pleito da parte exequente implicaria em converter o valor de juros em principal, permitindo, indevidamente, a incidência de novos juros sobre uma parcela que já possui essa natureza, alterando, por conseguinte, a essência da obrigação, o que é inadmissível; b) ausência de qualquer equívoco no precatório tal como expedido, por entender que a natureza jurídica da verba destinada ao pagamento dos honorários não se transmuda pelo simples fato de ser repassada ao advogado.\r\r\n\r\r\n Contrarrazões apresentadas.\r\r\n\r\r\n É o relatório.", "voto": "A teor do que dispõe o art. 1.022 do Código de Processo Civil, cabem embargos de declaração \"contra qualquer decisão judicial para esclarecer obscuridade ou eliminar contradição; suprir omissão de ponto ou questão sobre o qual devia se pronunciar o juiz de ofício ou a requerimento; e/ou corrigir erro material\".\r\r\n\r\r\n De acordo com o seu parágrafo único, considera-se omissa a decisão que \"deixe de se manifestar sobre tese firmada em julgamento de casos repetitivos ou em incidente de assunção de competência aplicável ao caso sob julgamento; e incorra em qualquer das condutas descritas no art. 489, § 1º. Este dispositivo, por seu turno, não considera fundamentada qualquer decisão judicial, seja ela interlocutória, sentença ou acórdão, que:\r\r\n\r\r\n I - se limitar à indicação, à reprodução ou à paráfrase de ato normativo, sem explicar sua relação com a causa ou a questão decidida;\r\r\n\r\r\n II - empregar conceitos jurídicos indeterminados, sem explicar o motivo concreto de sua incidência no caso;\r\r\n\r\r\n III - invocar motivos que se prestariam a justificar qualquer outra decisão;\r\r\n\r\r\n IV - não enfrentar todos os argumentos deduzidos no processo capazes de, em tese, infirmar a conclusão adotada pelo julgador;\r\r\n\r\r\n V - se limitar a invocar precedente ou enunciado de súmula, sem identificar seus fundamentos determinantes nem demonstrar que o caso sob julgamento se ajusta àqueles fundamentos;\r\r\n\r\r\n VI - deixar de seguir enunciado de súmula, jurisprudência ou precedente invocado pela parte, sem demonstrar a existência de distinção no caso em julgamento ou a superação do entendimento.\r\r\n\r\r\n No caso, inexistem os vícios apontados pela parte embargante, não se subsumindo o objeto dos presentes embargos a nenhuma das hipóteses previstas no sobredito dispositivo legal.\r\r\n\r\r\n O acórdão embargado encontra-se assim ementado:\r\r\n\r\r\n AGRAVO DE INSTRUMENTO. PAGAMENTO DE DIFERENÇAS DO FUNDEB/FUNDEF DECORRENTE DO CUMPRIMENTO DE CONDENAÇÃO JUDICIAL. VINCULAÇÃO EXCLUSIVA AO CUSTEIO DO SERVIÇO PÚBLICO DE EDUCAÇÃO. ENCARGOS MORATÓRIOS. POSSIBILIDADE DE RETENÇÃO DE HONORÁRIOS ADVOCATÍCIOS. ADPF 528/DF. TEMA 1.256/STF. INSCRIÇÃO DO PRECATÓRIO. RETIFICAÇÃO. PROVIMENTO.\r\r\n\r\r\n 1. Agravo de Instrumento interposto por MONTEIRO E MONTEIRO ADVOGADOS ASSOCIADOS S/C contra decisão proferida pelo Juízo da 2ª Vara Federal da Seção Judiciária de Alagoas que não acolheu a sua ponderação quando à (in)correção relacionada à retenção de honorários advocatícios contratuais quando da expedição do precatório 2025.80.00.002.20015.\r\r\n\r\r\n 2. No julgamento do Tema 1256, o STF adotou a seguinte tese: \"1. É inconstitucional o emprego de verbas do FUNDEF/FUNDEB para pagamento de honorários advocatícios contratuais. 2. É possível utilização dos juros de mora inseridos na condenação relativa a repasses de verba do FUNDEF, para pagamento dos honorários contratuais\".\r\r\n\r\r\n 3. No julgamento da ADPF n. 528/DF, o STF firmou o seguinte entendimento vinculante: a) \"É inconstitucional o pagamento de honorários advocatícios contratuais com recursos alocados no FUNDEF/FUNDEB, que devem ser utilizados exclusivamente em ações de desenvolvimento e manutenção do ensino\"; b) \"A vinculação constitucional em questão restringe a aplicação do montante principal apurado nas execuções dos títulos judiciais obtidos pelos municípios, mas não sobre os encargos moratórios que, liquidados em favor desses entes, podem servir ao pagamento de honorários contratuais eventualmente ajustados com os profissionais ou escritórios de advocacia que patrocinaram a discussão em juízo sobre o valor dos repasses\".\r\r\n\r\r\n 4. À luz do entendimento do STF, entende-se que os encargos moratórios são a fonte de custeio a ser utilizada para o adimplemento dos honorários advocatícios sucumbenciais nos processos do FUNDEF/FUNDEB. Os honorários ainda são devidos nos valores como contratados, condicionando-se o seu pagamento, porém, à suficiência dos encargos moratórios para tanto.\r\r\n\r\r\n 5. \"Em vista do decidido pelo Plenário do STF na APDF nº 528/DF e no Tema RG nº 1.256, é viável o pagamento dos honorários contratuais do advogado calculado sobre o valor integral do crédito do Município em face da União e quitado mediante utilização dos juros moratórios inseridos na condenação relativa a repasse da verba do Fundef/Fundeb (...)\". (RE 1406559 AgR-segundo, Relator(a): ANDRÉ MENDONÇA, Segunda Turma, julgado em 17-06-2024, PROCESSO ELETRÔNICO DJe-s/n DIVULG 29-07-2024 PUBLIC 30-07-2024).\r\r\n\r\r\n 6. Assiste razão ao agravante, assim, quando afirma que, da forma como atualmente estão disciplinados os honorários contratuais no requisitório (apenas no campo dos juros de mora), verifica-se que, quando do recebimento do crédito, a parcela correspondente aos juros da atualização, incidente entre a data do cálculo homologado até a data do efetivo pagamento, não será repassada aos advogados, que receberão o valor inscrito sem qualquer tipo de atualização.\r\r\n\r\r\n 7. Não se trata de fazer incidir juros sobre juros. O crédito principal referente aos honorários advocatícios contratuais corresponde ao percentual previsto no contrato a incidir sobre a integralidade da condenação. O pagamento desse crédito, entretanto, é que somente pode ser feito, no mesmo processo, até o limite correspondente à parcela dos encargos moratórios, razão pela qual merece acolhimento a pretensão da agravante à retificação do precatório.\r\r\n\r\r\n 8. No mesmo sentido, precedente recente da eg. Terceira Turma: (PROCESSO: 0810073-45.2025.4.05.0000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL ROGÉRIO FIALHO MOREIRA, 3ª TURMA, JULGAMENTO: 18/09/2025).\r\r\n\r\r\n 9. Agravo de instrumento provido.\r\r\n\r\r\n Da simples leitura da ementa acima transcrita, verifica-se a existência de pronunciamento expresso, no v. acórdão, no sentido de afastar a ocorrência do anatocismo (“Não se trata de fazer incidir juros sobre juros”), na medida em que esclarece a distinção jurídica entre a base de cálculo dos honorários, que incide sobre o valor integral da condenação, e a fonte utilizada para o seu pagamento, limitada aos encargos moratórios\r\r\n\r\r\n Conclui-se que a embargante deseja rediscutir questões efetivamente apreciadas por ocasião do julgamento que originou o acórdão ora questionado. Frise-se, entretanto, que embargos de declaração, ainda que opostos para fins de prequestionamento, não se prestam a este fim.\r\r\n\r\r\n Em face do exposto, conheço dos embargos de declaração da União e nego-lhes provimento.\r\r\n\r\r\n É como voto.", "acordao": "Vistos, etc.\r\r\n\r\r\n Decide a 3ª Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, CONHECER dos embargos de declaração do ente público e NEGAR-LHES PROVIMENTO, nos termos do voto do relator e na forma do relatório constante dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Provido", "css": "provido"}, {"nome": "20260309_160138_Re__VOTO.0000225-33.2026.4.05.0000.VIRTUAL.26.03.2026", "cnj": "0000225-33.2026.4.05.0000", "cab": "PROCESSO Nº: 0000225-33.2026.4.05.0000 - AGRAVO DE INSTRUMENTO (202)", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "AGRAVO DE INSTRUMENTO. AÇÃO MONITÓRIA. CONTRATO BANCÁRIO. JUNTADA DE DOCUMENTOS. PRECLUSÃO EM MATÉRIA PROBATÓRIA PARA O MAGISTRADO. INOCORRÊNCIA. IMPROVIMENTO.\r\r\n\r\r\n 1. Agravo de instrumento interposto por MSW COMERCIO DE MEDICAMENTOS LTDA contra decisão proferida pela 6ª Vara Federal da Seção Judiciária de Pernambuco que deferiu a renovação de prazo para a Agravada apresentar documentos.\r\r\n\r\r\n 2. A agravante se insurge contra decisão que deferiu a renovação de prazo para a CEF apresentar documentos, alegando, em síntese, que a hipótese seria de preclusão, tendo em vista que o banco teria ignorado três oportunidades anteriores para juntar os documentos (na inicial, após despacho saneador e em prazo específico de 5 dias.\r\r\n\r\r\n 3. O STJ possui entendimento sedimentado de que não há preclusão em matéria probatória para o magistrado. Nesse sentido: AgInt no AREsp 1.525.948/SP, Rel. Ministro Luis Felipe Salomão, Quarta Turma, julgado em 22/3/2021, DJe 25/3/2021; REsp n. 1.949.596/MG, relator Ministro Humberto Martins, Terceira Turma, julgado em 13/10/2025, DJEN de 16/10/2025.\r\r\n\r\r\n 4. Ainda que a CEF tenha sido desidiosa, o juiz, como destinatário da prova, pode e deve determinar a juntada de documentos indispensáveis para evitar um enriquecimento sem causa ou uma decisão baseada em ficções processuais. O magistrado pode readequar o procedimento para conferir efetividade ao processo, não se tratando de \"renovação de prazo\" para ato facultativo da parte, mas de determinação judicial para saneamento de prova indispensável à constituição do título executivo monitório\r\r\n\r\r\n 5. Agravo de instrumento improvido.", "relatorio": "Trata-se de agravo de instrumento interposto por MSW COMERCIO DE MEDICAMENTOS LTDA contra decisão proferida pela 6ª Vara Federal da Seção Judiciária de Pernambuco que deferiu a renovação de prazo para a Agravada apresentar documentos.\r\r\n\r\r\n Nas razões recursais, traz os seguintes argumentos: a) a Caixa Econômica Federal teria ignorado três oportunidades anteriores para juntar os documentos (na inicial, após despacho saneador e em prazo específico de 5 dias); b) o prazo expirou in albis, pelo que a renovação após o vencimento afronta o sistema preclusivo; c) a dilação de prazos pelo juiz só poderia ocorrer antes do encerramento do prazo regular; d) a CEF se utiliza de \"nulidade de algibeira\", guardando documentos para surpreender a defesa e ferir a paridade de armas.\r\r\n\r\r\n Indeferida a liminar.\r\r\n\r\r\n Contrarrazões apresentadas.\r\r\n\r\r\n É o que havia de relevante para relatar.", "voto": "A agravante se insurge contra decisão que deferiu a renovação de prazo para a CEF apresentar documentos, alegando, em síntese, que a hipótese seria de preclusão, tendo em vista que o banco teria ignorado três oportunidades anteriores para juntar os documentos (na inicial, após despacho saneador e em prazo específico de 5 dias.\r\r\n\r\r\n Ainda que sejam levadas em consideração a avaliação das partes quanto as provas carreadas/produzidas nos autos, é o juiz o seu destinatário final, não havendo mácula no julgamento quando, após o exame da controvérsia, valora os documentos juntados e as alegações apresentadas pelas partes segundo o seu convencimento, desde que fundamente a sua conclusão.\r\r\n\r\r\n É o Estado, na pessoa do juiz, o seu destinatário direto. Às partes e aos interessados será destinada deforma indireta, como fruto da necessidade de legitimação do pronunciamento jurisdicional.\r\r\n\r\r\n Em outras palavras, \"produzidas provas suficientes ao convencimento do juiz, mesmo que ele decida contra os interesses do destinatário indireto, haverá (ou, pelo menos, poderá haver) conformação, no sentido de que compreenderá que a decisão alcançou o resultado respectivo mediante efetivo conhecimento, pelo juiz, das circunstâncias relacionadas aos fatos apresentados\" (Mouzalas, 2017).\r\r\n\r\r\n No ponto, há que se distinguir a preclusão para a parte com o dever de instrução do juiz.\r\r\n\r\r\n O STJ possui entendimento sedimentado de que não há preclusão em matéria probatória para o magistrado. Nesse sentido: AgInt no AREsp 1.525.948/SP, Rel. Ministro Luis Felipe Salomão, Quarta Turma, julgado em 22/3/2021, DJe 25/3/2021; REsp n. 1.949.596/MG, relator Ministro Humberto Martins, Terceira Turma, julgado em 13/10/2025, DJEN de 16/10/2025.\r\r\n\r\r\n Assim, ainda que a CEF tenha sido desidiosa, o juiz, como destinatário da prova, pode e deve determinar a juntada de documentos indispensáveis para evitar um enriquecimento sem causa ou uma decisão baseada em ficções processuais.\r\r\n\r\r\n O magistrado pode readequar o procedimento para conferir efetividade ao processo., não se tratando de \"renovação de prazo\" para ato facultativo da parte, mas de determinação judicial para saneamento de prova indispensável à constituição do título executivo monitório.\r\r\n\r\r\n Ante o exposto, NEGO PROVIMENTO ao agravo de instrumento.\r\r\n\r\r\n É como voto.", "acordao": "Vistos, etc.\r\r\n\r\r\n Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, negar provimento ao agravo de instrumento nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido"}, {"nome": "20260310_104159_RES__VOTO.0008197-88.2025.4.05.0000.VIRTUAL.26.03.2026", "cnj": "0008197-88.2025.4.05.0000", "cab": "PROCESSO Nº: 0008197-88.2025.4.05.0000 - AGRAVO DE INSTRUMENTO (202)", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "PROCESSUAL CIVIL E ADMINISTRATIVO. AGRAVO DE INSTRUMENTO. CUMPRIMENTO INDIVIDUAL DE SENTENÇA COLETIVA. REAJUSTE DE 28,86%. ABRANGÊNCIA SUBJETIVA DA COISA JULGADA. LIMITAÇÃO AO ESTADO DO MATO GROSSO DO SUL INDEVIDA. LEGITIMIDADE. PRECEDENTES. INTERRUPÇÃO DA PRESCRIÇÃO PELA CAUTELAR DE PROTESTO. COMPENSAÇÃO DOS VALORES PAGOS NA VIA ADMINISTRATIVA ASSEGURADA. IMPROVIMENTO.\r\r\n\r\r\n1. Agravo de instrumento interposto pela UNIÃO FEDERAL contra decisão que, apreciando a impugnação ao cumprimento de sentença apresentada a) manteve os benefícios da justiça gratuita; b) afastou a alegação de ilegitimidade ativa dos exequentes, “em virtude de o legitimado extraordinário, qual seja, o Ministério Público Federal, ter representatividade em todo o território nacional, viabilizando, deste modo, a propositura do cumprimento individual do título executivo judicial coletivo fora do âmbito do juízo que proferiu a sentença, conforme o Tema 1.130 do C. STJ”; c) afastou a alegação de ilegitimidade ativa do sindicato, uma vez que a legitimidade do sindicato é ampla para defender em juízo os direitos e interesses da categoria, cuja abrangência alcança os sucessores do servidor falecido, inclusive os seus pensionistas; d) determinou a remessa dos autos à contadoria da Seção Judiciária para conferência dos cálculos,  esclarecendo se os Exequentes tiveram a implantação do reajuste de 28,86% e deduzindo dos valores apurados os montantes efetivamente pagos administrativamente, bem como analisando os cálculos das partes, à luz do título executivo judicial.\r\r\n\r\r\n2. A hipótese trata de Cumprimento de Sentença individual contra a Fazenda Pública que objetiva o recebimento de valores decorrentes da condenação fixada no título judicial formado na ação civil pública n.º 0005019-15.1997.4.03.6000, que se refere ao índice de 28,86%. Ao contrário do que alega a agravante, a inicial e as demais manifestações apresentadas na Ação Civil Pública executada não evidenciam a sua limitação aos servidores do Mato Grosso do Sul, sendo certo que o MPF autor não restringiu o pedido aos servidores lotados naquela unidade da Federação.\r\r\n\r\r\n3. Diversamente do que alega a agravante, a ação civil pública originária não limitou a sua eficácia territorial ao Estado do Mato Grosso do Sul. Pelo contrário, o MPF foi claro ao delinear o objeto da mencionada ACP, abrangendo todos os servidores públicos civis federais, ativos e inativos, bem como pensionistas do quadro de pessoal da União Federal. Nesse sentido: PROCESSO: 08067307520244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL SEBASTIÃO JOSÉ VASQUES DE MORAES, 6ª TURMA, JULGAMENTO: 25/7/2024; PROCESSO: 08075249620244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL FREDERICO WILDSON DA SILVA DANTAS, 7ª TURMA, JULGAMENTO: 13/08/2024; PROCESSO: 08082272720244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL ALEXANDRE LUNA FREIRE, 3ª TURMA, JULGAMENTO: 12/09/2024; PROCESSO: 08176062120244058300, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL CID MARCONI GURGEL DE SOUZA, 3ª TURMA, JULGAMENTO: 30/01/2025.\r\r\n\r\r\n4. No que concerne à prescrição, verifica-se que, embora tenha ocorrido o Trânsito em Julgado do Processo originário em 02/08/2019, o Ministério Público Federal - MPF, Autor da Ação Coletiva, propôs Medida Cautelar de Protesto em 11/06/2024, distribuída sob o nº 5004409-14.2024.4.03.6000, para a 1ª Vara Federal da Seção Judiciária do Mato Grosso do Sul, objetivando a interrupção do prazo prescricional. A Medida Cautelar de Protesto, ajuizada pelo MPF, interrompe o prazo prescricional, a partir de seu ajuizamento (11/06/2024), cujo prazo passa a correr pela metade. O termo final somente se dará em 12/2026. O presente Cumprimento de Sentença foi proposto em 06/06/2025, logo, ausente a prescrição.\r\r\n\r\r\n5. No sentido de afastar a prescrição em razão da propositura da cautela de protesto pelo MPF: PROCESSO: 08066753820244058500, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL ALEXANDRE LUNA FREIRE, 3ª TURMA, JULGAMENTO: 07/08/2025.\r\r\n\r\r\n6. Não procede a alegação de pagamento em duplicidade. O juízo de origem determinou a compensação dos valores adimplidos administrativamente, de modo que impertinente o pedido da parte agravante de dedução dos pagamentos administrativos decorrentes do acordo firmado, que está de acordo com a tese firmada pelo Superior Tribunal de Justiça no enunciado do Tema 1.102.\r\r\n\r\r\n7. Agravo de instrumento improvido.", "relatorio": "Trata-se de agravo de instrumento interposto pela UNIÃO FEDERAL contra decisão que, apreciando a impugnação ao cumprimento de sentença apresentada a) manteve os benefícios da justiça gratuita; b) afastou a alegação de ilegitimidade ativa dos exequentes, “em virtude de o legitimado extraordinário, qual seja, o Ministério Público Federal, ter representatividade em todo o território nacional, viabilizando, deste modo, a propositura do cumprimento individual do título executivo judicial coletivo fora do âmbito do juízo que proferiu a sentença, conforme o Tema 1.130 do C. STJ”; c) afastou a alegação de ilegitimidade ativa do sindicato, uma vez que a legitimidade do sindicato é ampla para defender em juízo os direitos e interesses da categoria, cuja abrangência alcança os sucessores do servidor falecido, inclusive os seus pensionistas; d) determinou a remessa dos autos à contadoria da Seção Judiciária para conferência dos cálculos,  esclarecendo se os Exequentes tiveram a implantação do reajuste de 28,86% e deduzindo dos valores apurados os montantes efetivamente pagos administrativamente, bem como analisando os cálculos das partes, à luz do título executivo judicial.\r\r\n\r\r\nNas razões recursais, a agravante traz os seguintes argumentos: a) trata-se, na origem, de cumprimento de sentença lastreado no título executivo judicial formado na Ação Civil Pública n.º 0005019-15.1997.4.03.6000, proposta pelo Ministério Público Federal, transitada em julgado em 02/08/2019, que condenou a UNIÃO e as AUTARQUIAS RÉS a incorporar o percentual de 28,86% às remunerações de seus servidores ativos, inativos e pensionistas, não litigantes em outras ações ou cujas ações estejam suspensas e não firmatários de acordo, a partir de janeiro/1993, com reflexos, respeitadas as datas de admissões, descontadas as reposições já feitas por força das Leis n.º 8.622/93 e 8.627/93; b) o juízo a quo rejeitou a impugnação ao pedido de justiça gratuita e a alegação de ilegitimidade ativa arguida pela UNIÃO; c) o agravado tem renda suficiente para arcar com os custos do processo, já que é policial rodoviário federal; d) a ACP 0005019-15.1997.403.6000 limitou a incorporação do percentual de 28,86% às remunerações de seus servidores, ativos, inativos e pensionistas lotados nos órgãos, no Estado do Mato Grosso do Sul; e) a parte exequente não reside no estado de MS, não há título executivo que possa sustentar a pretensão exposta nos autos, devendo-se a extinção da presente execução; f) considerando que a ACP n. 0005019-15.1997.4.03.6000 transitou em julgado em momento anterior ao julgamento da STF (Tema 1075), a modificação da decisão executada, ainda que para adequação ao que decidido em sede de repercussão geral no intuito de ressalvar a coisa julgada, dar-se-ia, apenas, em sede de ação rescisória, o que não se verificou no presente feito; g) os exequentes não têm mais nada a receber, porquanto receberam os atrasados através de acordo administrativo.\r\r\n\r\r\nContrarrazões apresentadas.\r\r\n\r\r\nÉ o que havia de relevante para relatar.", "voto": "A hipótese trata de Cumprimento de Sentença individual contra a Fazenda Pública que objetiva o recebimento de valores decorrentes da condenação fixada no título judicial formado na ação civil pública n.º 0005019-15.1997.4.03.6000, que se refere ao índice de 28,86%, cujo dispositivo recebeu a seguinte redação:\r\r\n\r\r\n[...].\r\r\n\r\r\nDiante do exposto e por mais que dos autos consta, julgo procedente a presente ação para o fim de condenar os réus a incorporar o percentual de 28,86% às remunerações de seus servidores, ativos, inativos e pensionistas, não litigantes em outras ações ou cujas ações estejam suspensas e não firmatários de acordo, a partir de janeiro de 1993, com reflexos, respeitadas as datas de admissões, descontadas as reposições já feitas por força das leis n° 8622/93 e 8627/93. Sem custas e sem honorários. Sentença sujeita ao duplo grau de jurisdição.\r\r\n\r\r\n[...].\r\r\n\r\r\nDa leitura do dispositivo da sentença transcrito depreende-se que, de fato, não houve limitação dos efeitos subjetivos da coisa julgada territorialmente.\r\r\n\r\r\n O TRF da 3ª Região confirmou a sentença, como se observa da parte do voto proferido no respectivo acórdão:\r\r\n\r\r\n [...]\r\r\n\r\r\n Feitas tais ponderações, constata-se que o interesse defendido pelo Parquet na presente - direito dos servidores, ativos e inativos, e pensionistas à revisão geral de 28,86% - consiste num direito individual homogêneo disponivel de expressão social, tendo em vista a extraordinária dispersão dos lesados. No particular, cumpre observar que a pretensão deduzida in casu beneficia a todos os servidores públicos civis da esfera federal (ativos, inativos e seus pensionistas), os quais são representados por diversos sindicatos. Não existe uma entidade de classe que represente a todos eles, exatamente em função da extraordinária dispersão dos lesados, o que legitima o Ministério Público Federal a propor esta ação coletiva. A par disso, o enfrentamento da questão aqui debatida em sede de ação coletiva é de todo recomendável, haja vista que, diante da grande quantidade de lesados, a via coletiva evita um sem-número de processos e, consequentemente, a sobrecarga do Poder Judiciário, o que é do interesse de toda a coletividade.\r\r\n\r\r\n [...]\r\r\n\r\r\nAs posteriores decisões do STJ e do STF também não impuseram limitação aos efeitos subjetivos da coisa julgada.\r\r\n\r\r\nAo contrário do que fixado na decisão recorrida, a inicial e as demais manifestações apresentadas na Ação Civil Pública executada não evidenciam a sua limitação aos servidores do Mato Grosso do Sul, sendo certo que o MPF autor não restringiu o pedido aos servidores lotados naquela unidade da Federação.\r\r\n\r\r\nEm situação em tudo similar à dos autos, este Tribunal Regional Federal da 5ª Região tem entendido que servidores não lotados no Mato Grosso do Sul também têm legitimidade para executar o mesmo título executivo judicial, conforme se observa nos seguintes precedentes:\r\r\n\r\r\nAGRAVO DE INSTRUMENTO NO NOVO CPC. Os Recursos são definidos pela natureza do ato judicial: Sentença, Decisão Interlocutória ou Despacho. O Agravo de Instrumento, no Código de Processo Civil de 2015, consiste no Recurso que tem por Objeto a Relação Jurídica sobre Decisão Interlocutória, envolvendo tutelas distintas sobre duas situações jurídicas processuais: a Evidência e a Urgência. Não estão dissociadas na Finalidade ou Função do Recurso estritamente definido.\r\r\n\r\r\n EVIDÊNCIA. Consiste na Situação Jurídica derivada da Relação Jurídica projetando a Pretensão à obtenção do dever jurídico, buscado pela Parte diante de Ato Jurídico Processual, e exposto no conjunto ou variedade de atos confluentes da Lide, da Causa, da Demanda ou dos Pressupostos Processuais. A Interlocução própria da Jurisdição é o princípio a estabelecer diretriz do Processo ou do Recurso, porquanto a Ação é proposta e o Recurso interposto, na dicção precisa de Pontes de Miranda. Os pressupostos Processuais e as Condições da Ação são elementos considerados, em cada etapa ou fase, com Atos Processuais, quando não incorrem, em cada caso, no exame dos Atos meramente ordinatórios, nos simples Despachos. Ou, nas hipóteses terminativas encerrando literalmente a Prestação Jurisdicional de Mérito com a Sentença, e/ou com a Execução.\r\r\n\r\r\n URGÊNCIA. Como poder-dever cautelar busca no exame da situação, de ato ou fato jurídico, realçar a utilidade da Jurisdição de modo Imediato, a realização do Direito Objetivo e, de modo Mediato, o Direto Subjetivo buscado no Pedido intercorrente para obtenção do Dever Jurídico; a Obrigação de quem de Direito. A Urgência está atinada sempre à Evidência.\r\r\n\r\r\n Agravo de Instrumento interposto em face de Decisão que desacolheu, em parte, a Impugnação ofertada pela Executada (FUNASA) e determinou a remessa dos autos à Contadoria Judicial para aferição de eventuais valores devidos, a título de diferenças do índice de 28,86%.\r\r\n\r\r\n No caso, destaca-se da Decisão agravada os seguintes fundamentos, com os quais se compartilha:\r\r\n\r\r\n \"A executada, FUNDAÇÃO NACIONAL DE SAÚDE - FUNASA, apresentou impugnação ao cumprimento de sentença, alegando ilegitimidade ativa da exequente.\r\r\n\r\r\n Para tanto, afirma que a autora não comprovou estar lotada no Mato Grosso do Sul entre 1993 e 2001, o que impede a obtenção dos benefícios da ação civil pública.\r\r\n\r\r\n No entanto, não assiste razão à EXECUTADA.\r\r\n\r\r\n O dispositivo da ação coletiva n. 0005019-15.1997.4.03.6000 julgou procedente o pedido do Ministério Público Federal nos seguintes termos (id. 30920614):\r\r\n\r\r\n Diante do exposto e por mais que dos autos consta, julgo procedente a presente ação para o fim de condenar os réus a incorporar o percentual de 28,86% às remunerações de seus servidores, ativos, inativos e pensionistas, não litigantes em outras ações ou cujas ações estejam suspensas e não firmatários de acordo, a partir de janeiro de 1993, com reflexos, respeitadas as datas de admissões, descontadas as reposições já feitas por força das leis n° 8622/93 e 8627/93. Sem custas e sem honorários. Sentença sujeita ao duplo grau de jurisdição.\r\r\n\r\r\n Como se percebe, o juízo prolator da sentença de primeiro grau não limitou os efeitos subjetivos da coisa julgada territorialmente.\r\r\n\r\r\n O TRF da 3ª Região confirmou a sentença. Destaco, inclusive, parte do voto proferido no referido acórdão (id. 30920617):\r\r\n\r\r\n [...]\r\r\n\r\r\n Feitas tais ponderações, constata-se que o interesse defendido pelo Parquet na presente - direito dos servidores, ativos e inativos, e pensionistas à revisão geral de 28,86% - consiste num direito individual homogêneo disponivel de expressão social, tendo em vista a extraordinária dispersão dos lesados. No particular, cumpre observar que a pretensão deduzida in casu beneficia a todos os servidores públicos civis da esfera federal (ativos, inativos e seus pensionistas), os quais são representados por diversos sindicatos. Não existe uma entidade de classe que represente a todos eles, exatamente em função da extraordinária dispersão dos lesados, o que legitima o Ministério Público Federal a propor esta ação coletiva. A par disso, o enfrentamento da questão aqui debatida em sede de ação coletiva é de todo recomendável, haja vista que, diante da grande quantidade de lesados, a via coletiva evita um sem-número de processos e, consequentemente, a sobrecarga do Poder Judiciário, o que é do interesse de toda a coletividade.\r\r\n\r\r\n [...]\r\r\n\r\r\n As decisões do STJ e do STF corroboram o entendimento de que não houve limitação aos efeitos subjetivos da coisa julgada.\r\r\n\r\r\n Nesse contexto, destaca-se a tese jurídica firmada pelo Supremo Tribunal Federal ao analisar o art. 16 da Lei 7.347/1985 (tema n.º 1.075):\r\r\n\r\r\nCONSTITUCIONAL E PROCESSO CIVIL. INCONSTITUCIONALIDADE DO ART. 16 DA LEI 7.347/1985, COM A REDAÇÃO DADA PELA LEI 9.494/1997. AÇÃO CIVIL PÚBLICA. IMPOSSIBILIDADE DE RESTRIÇÃO DOS EFEITOS DA SENTENÇA AOS LIMITES DA COMPETÊNCIA TERRITORIAL DO ÓRGÃO PROLATOR. REPERCUSSÃO GERAL. RECURSOS EXTRAORDINÁRIOS DESPROVIDOS. 1. A Constituição Federal de 1988 ampliou a proteção aos interesses difusos e coletivos, não somente constitucionalizando-os, mas também prevendo importantes instrumentos para garantir sua pela efetividade. 2. O sistema processual coletivo brasileiro, direcionado à pacificação social no tocante a litígios meta individuais, atingiu status constitucional em 1988, quando houve importante fortalecimento na defesa dos interesses difusos e coletivos, decorrente de uma natural necessidade de efetiva proteção a uma nova gama de direitos resultante do reconhecimento dos denominados direitos humanos de terceira geração ou dimensão, também conhecidos como direitos de solidariedade ou fraternidade. 3. Necessidade de absoluto respeito e observância aos princípios da igualdade, da eficiência, da segurança jurídica e da efetiva tutela jurisdicional. 4. Inconstitucionalidade do artigo 16 da LACP, com a redação da Lei 9.494/1997, cuja finalidade foi ostensivamente restringir os efeitos condenatórios de demandas coletivas, limitando o rol dos beneficiários da decisão por meio de um critério territorial de competência, acarretando grave prejuízo ao necessário tratamento isonômico de todos perante a Justiça, bem como à total incidência do Princípio da Eficiência na prestação da atividade jurisdicional. 5. RECURSOS EXTRAORDINÁRIOS DESPROVIDOS, com a fixação da seguinte tese de repercussão geral: \"I - É inconstitucional a redação do art. 16 da Lei 7.347/1985, alterada pela Lei 9.494/1997, sendo repristinada sua redação original. II - Em se tratando de ação civil pública de efeitos nacionais ou regionais, a competência deve observar o art. 93, II, da Lei 8.078/1990 (Código de Defesa do Consumidor). III - Ajuizadas múltiplas ações civis públicas de âmbito nacional ou regional e fixada a competência nos termos do item II, firma-se a prevenção do juízo que primeiro conheceu de uma delas, para o julgamento de todas as demandas conexas\". (STF, RE 1.101.937, Relator(a): ALEXANDRE DE MORAES, Tribunal Pleno, julgado em 08/04/2021, PROCESSO ELETRÔNICO REPERCUSSÃO GERAL - MÉRITO DJe-113 DIVULG 11/06/2021 PUBLIC 14/06/2021)\r\r\n\r\r\n Portanto, é incontestável reconhecer que os efeitos da sentença alcançam a todos os servidores na situação fático-jurídica abordada pela Ação Civil Pública n. 0005019-15.1997.4.03.6000, independentemente, da sua lotação territorial.\r\r\n\r\r\n Diante disso, rejeito a preliminar de ilegitimidade ativa.\"\r\r\n\r\r\n Assim, a Agravada possui Legitimidade Ativa, devendo ser afastada a alegação da FUNASA.\r\r\n\r\r\n Com efeito, a Decisão agravada pontuou \"que me parece razoável, tendo em vista a possibilidade de ocorrência de bis in idem, a continuidade da execução, com a realização dos cálculos relativos à obrigação decorrente do título exequendo e a compensação dos valores adimplidos administrativamente, conforme rubrica específica nas fichas financeiras, verificando-se a existência ou não de saldo a pagar\", ou seja, somente após as Informações da Contadoria Judicial é que se poderá aferir com mais exatidão se existe, ou não, crédito em favor da Exequente (e respectivo montante).\r\r\n\r\r\n Nesse sentido: Processo nº 08044936820244050000, Agravo de Instrumento, Desembargador Federal Sebastião José Vasques de Moraes, 6ª Turma, Julgamento: 21/05/2024.\r\r\n\r\r\n Desprovimento do Agravo de Instrumento. (PROCESSO: 08082272720244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL ALEXANDRE LUNA FREIRE, 3ª TURMA, JULGAMENTO: 12/09/2024)\r\r\n\r\r\nADMINISTRATIVO E PROCESSUAL CIVIL. CUMPRIMENTO DE SENTENÇA CONTRA A FAZENDA PÚBLICA. 28,86%. EFEITOS DA COISA JULGADA. LIMITAÇÃO AO SERVIDORES LOTADOS NA UNIDADE DA FEDERAÇÃO DO ÓRGÃO PROLATOR DA SENTENÇA. AUSÊNCIA DE PREVISÃO NO TÍTULO. LEGITIMIDADE ATIVA DA EXEQUENTE. PROSSEGUIMENTO DA EXECUÇÃO.\r\r\n\r\r\n1. Apelação interposta pelo Particular em face da sentença que, em sede de cumprimento de sentença contra a Fazenda Pública, acolheu a preliminar de ilegitimidade ativa do exequente e, de consequência, extinguiu o feito, sem resolução do mérito, com fulcro no art. 485, VI, §3º, do CPC.\r\r\n\r\r\n2. Alega a Apelante, nas razões de apelo, que: a) o título judicial formado nos autos da Ação Coletiva n° 0005019-15.1997.4.03.6000 não limitou os efeitos da coisa julgada aos servidores com domicílio funcional no Mato Grosso do Sul, sendo totalmente possível qualquer servidor ou ex-servidor ser atingido pelo título judicial; b) o STJ e STF já se posicionaram no sentido de que os efeitos de uma sentença proferida em ação civil pública têm abrangência nacional; c) não subsiste a alegação quanto à violação do art. 16, da lei 9494/97, porque o Supremo Tribunal Federal, ao declará-lo inconstitucional, o fez sob a justificativa de se resguardar os direitos individuais homogêneos, prezando pela efetividade da prestação jurisdicional e pela segurança jurídica.\r\r\n\r\r\n3. O pedido de cumprimento de sentença está fundamentado em título judicial obtido na ação civil pública nº 0005019-15.1997.4.03.6000, que tramitou na 3ª Vara Cível da Seção Judiciária de Campo Grande, em que foi reconhecido o direito à incorporação do percentual de 28,86% dos servidores públicos civis, ativos, inativos e pensionistas.\r\r\n\r\r\n4. Ao contrário do que alega a agravante, a inicial e as demais manifestações apresentadas na Ação Civil Pública executada não evidenciam a sua limitação aos servidores do Mato Grosso do Sul, sendo certo que o MPF autor não restringiu o pedido aos servidores lotados naquela unidade da Federação.\r\r\n\r\r\n5. Ao tratar do tema, esta Terceira Turma tem compreendido que a Ação Civil Pública n.º 0005019-15.1997.4.03.6000 não limitou a sua eficácia territorial ao Estado do Mato Grosso do Sul. Pelo contrário, o MPF foi claro ao delinear o objeto da mencionada ACP, abrangendo todos os servidores públicos civis federais, ativos e inativos, bem como pensionistas do quadro de pessoal da União Federal. Confiram-se: Processo nº 08128122520244050000, Agravo de Instrumento, Desembargador Federal Luiz Bispo da Silva Neto (Convocado), 3ª Turma, Julgamento: 05/12/2024; Processo nº 08082272720244050000, Agravo de Instrumento, Desembargador Federal Alexandre Luna Freire, 3ª Turma, Julgamento: 12/09/2024.\r\r\n\r\r\n6. Outros precedentes deste Tribunal corroborando o entendimento: Processo nº 08108722520244050000, Agravo De Instrumento, Desembargadora Federal Cibele Benevides Guedes Da Fonseca, 5ª Turma, Julgamento: 03/12/2024; Processo nº 08095280920244050000, Agravo De Instrumento, Desembargador Federal Leonardo Augusto Nunes Coutinho, 7ª Turma, Julgamento: 19/11/2024.\r\r\n\r\r\n7. Sentença reformada para afastar a preliminar de ilegitimidade ativa da exequente. Apelação provida. (PROCESSO: 08176062120244058300, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL CID MARCONI GURGEL DE SOUZA, 3ª TURMA, JULGAMENTO: 30/01/2025)\r\r\n\r\r\nPROCESSUAL CIVIL E ADMINISTRATIVO. AGRAVO DE INSTRUMENTO. CUMPRIMENTO INDIVIDUAL DE SENTENÇA COLETIVA. ACORDO ADMINISTRATIVO PARA IMPLANTAÇÃO DO REAJUSTE DE 28,86% REMUNERAÇÕES E PROVENTOS DOS SERVIDORES ATIVOS, INATIVOS E PENSIONISTAS DO QUADRO DE PESSOAL DA UNIÃO. LEIS FEDERAIS 8.622/93 E 8.627/93. LIMITAÇÃO NO TÍTULO JUDICIAL. AUSÊNCIA. COMPENSAÇÃO. TEMA 1.102 STJ. AGRAVO DE INSTRUMENTO DESPROVIDO.\r\r\n\r\r\n1. Trata-se de agravo de instrumento interposto pela Fundação Nacional de Saúde - FUNASA, com pedido de tutela provisória recursal, visando a suspensão de decisão que reconheceu o direito à incorporação do percentual de 28,86% às remunerações e proventos dos servidores ativos, inativos e pensionistas do quadro de pessoal da União, descontadas as reposições salariais já realizadas pelas Leis Federais 8.622/93 e 8.627/93, rejeitando a preliminar de ilegitimidade ativa do agravado e determinando a remessa dos autos à Contadoria.\r\r\n\r\r\n2. A agravante alega em síntese: a) que o agravado não comprovou estar lotado no Mato Grosso do Sul entre 1993 e 2001, o que impede terminantemente que se beneficie da ação civil pública; b) ilegitimidade ativa do recorrido para a causa, uma vez que a sentença transitada em julgada não beneficia servidores lotados em Estados da Federação que não o Mato Grosso do Sul, obstando, assim, que se dê seguimento ao feito, dada a lotação da parte no Ceará; c) entender de modo diverso implica desrespeitar a coisa julgada, uma vez que a sentença foi prolatada e confirmada sob a égide do art. 16 da LACP, com a redação que lhe deu a Lei nº 9.494/97, sendo defeso aos autores impugnarem essa norma apenas agora, anos depois do trânsito em julgado, na fase de execução; d) possibilidade de dedução dos pagamentos administrativos decorrentes do acordo firmado, comprovados mediante fichas financeiras e extratos SIAPE acostados aos autos, de acordo com a alínea 'b' do tema 1102 do STJ.\r\r\n\r\r\n3. O cerne do presente recurso consiste em analisar a legitimidade ativa do agravado na ação original, bem como a possibilidade de dedução dos pagamentos administrativos decorrentes do acordo firmado entre as partes.\r\r\n\r\r\n4. Em relação à ilegitimidade ativa do recorrido, na ação coletiva nº 0005019-15.1997.4.03.6000, em que julgado procedente o pedido do Ministério Público Federal, não foram limitados os efeitos subjetivos da coisa julgada territorialmente.\r\r\n\r\r\n5. A agravante não demonstrou a probabilidade do direito pleiteado, já que, diversamente do que alega, a ação civil pública originária não limitou a sua eficácia territorial ao Estado do Mato Grosso do Sul. Pelo contrário, o MPF foi claro ao delinear o objeto da mencionada ACP, abrangendo todos os servidores públicos civis federais, ativos e inativos, bem como pensionistas do quadro de pessoal da União Federal. Nesse sentido: PROCESSO: 08067307520244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL SEBASTIÃO JOSÉ VASQUES DE MORAES, 6ª TURMA, JULGAMENTO: 25/7/2024.\r\r\n\r\r\n6. O juízo de origem determinou o cálculo pela Contadoria Judicial do valor devido ao agravado com o reenquadramento concedido pelas Leis 8.622/93 e 8.627/93, bem como a compensação dos valores adimplidos administrativamente, de modo que impertinente o pedido da parte agravante de dedução dos pagamentos administrativos decorrentes do acordo firmado, que está de acordo com a tese jurídica consagrada pelo Superior Tribunal de Justiça no enunciado do Tema 1.102.\r\r\n\r\r\n7. Agravo de instrumento desprovido. (PROCESSO: 08075249620244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL FREDERICO WILDSON DA SILVA DANTAS, 7ª TURMA, JULGAMENTO: 13/08/2024)\r\r\n\r\r\nPROCESSUAL CIVIL E ADMINISTRATIVO. CUMPRIMENTO INDIVIDUAL DE SENTENÇA COLETIVA. ACORDO ADMINISTRATIVO PARA IMPLANTAÇÃO DO REAJUSTE DE 28,86% REMUNERAÇÕES E PROVENTOS DOS SERVIDORES ATIVOS, INATIVOS E PENSIONISTAS DO QUADRO DE PESSOAL DA UNIÃO. LEIS FEDERAIS 8.622/93 E 8.627/93. ABRANGÊNCIA. POSSIBILIDADE. RECURSO DESPROVIDO.\r\r\n\r\r\n1. Agravo de instrumento com pedido de tutela provisória recursal visando a suspensão de decisão que - em sede de impugnação ao cumprimento de sentença (que reconheceu ao ora recorrido o direito a incorporação do percentual de 28,86% (vinte e oito virgula oitenta e seis por cento) às remunerações e proventos dos servidores ativos, inativos e pensionistas do quadro de pessoal da União, descontadas as reposições salariais já realizadas pelas Leis Federais 8.622/93 e 8.627/93) - rejeitou a preliminar de ilegitimidade ativa de Jose Edilberto Leite Esmeraldo e homologou os cálculos apresentados por este, fixando como devido o valor de R$ 109.206,09 (Planilha de cálculos no id. 4058102.30327346).\r\r\n\r\r\n2. A FUNASA alegou, em suas razões de recurso: a) que o autor não comprovou estar lotado no Mato Grosso do Sul entre 1993 e 2001, o que impede terminantemente que se beneficie da ação civil pública; b) a ilegitimidade ativa do recorrido para a causa, uma vez que a sentença transitada em julgada não beneficia servidores lotados em outros Estados da Federação que não o Mato Grosso do Sul, obstando, assim, que se dê seguimento ao feito dada a lotação dos autores no Rio Grande do Norte; e c) que entender de modo diverso implica desrespeitar a coisa julgada, uma vez que a r. sentença foi prolatada e confirmada sob a égide do art. 16 da LACP com a redação que lhe deu a Lei nº 9.494/97, sendo defeso aos autores querer impugnar tal norma apenas agora, anos depois do trânsito em julgado e na fase de execução. A matéria se encontra obviamente preclusa.\r\r\n\r\r\n3. O dispositivo da ação coletiva n. 0005019-15.1997.4.03.6000 julgou procedente o pedido do Ministério Público Federal nos seguintes termos (fl. 09 do id. 4058102.30327338): \"[...] Diante do exposto e por mais que dos autos consta, julgo procedente a presente ação para o fim de condenar os réus a incorporar o percentual de 28,86% às remunerações de seus servidores, ativos, inativos e pensionistas, não litigantes em outras ações ou cujas ações estejam suspensas e não firmatários de acordo, a partir de janeiro de 1993, com reflexos, respeitadas as datas de admissões, descontadas as reposições já feitas por força das leis n° 8622/93 e 8627/93. Sem custas e sem honorários. Sentença sujeita ao duplo grau de jurisdição.\"\r\r\n\r\r\n4. O juízo prolator da sentença de primeiro grau não limitou os efeitos subjetivos da coisa julgada territorialmente.\r\r\n\r\r\n5. O TRF da 3ª Região confirmou a sentença, conforme demonstra o acórdão de id. 4058102.30327341.Destaco, inclusive, parte do voto proferido no referido acórdão (Fl. 16 do id. 4058102.30327341): \"[...] Feitas tais ponderações, constata-se que o interesse defendido pelo Parquet na presente - direito dos servidores, ativos e inativos, e pensionistas à revisão geral de 28,86% - consiste num direito individual homogêneo disponivel de expressão social, tendo em vista a extraordinária dispersão dos lesados. No particular, cumpre observar que a pretensão deduzida in casu beneficia a todos os servidores públicos civis da esfera federal (ativos, inativos e seus pensionistas), os quais são representados por diversos sindicatos. Não existe uma entidade de classe que represente a todos eles, exatamente em função da extraordinária dispersão dos lesados, o que legitima o Ministério Público Federal a propor esta ação coletiva. A par disso, o enfrentamento da questão aqui debatida em sede de ação coletiva é de todo recomendável, haja vista que, diante da grande quantidade de lesados, a via coletiva evita um sem-número de processos e, consequentemente, a sobrecarga do Poder Judiciário, o que é do interesse de toda a coletividade [...].\"\r\r\n\r\r\n6. As decisões dos Tribunais Superiores, STJ e STF, registradas nos acórdãos das páginas 33/36 e 37/40 do id. 4058102.30327341, corroboram o entendimento de que não houve limitação aos efeitos subjetivos da coisa julgada. Nesse contexto, destaca-se a tese jurídica firmada pelo Supremo Tribunal Federal ao analisar o art. 16 da Lei 7.347/1985 (tema n.º 1.075): STF, RE 1.101.937, Relator(a): ALEXANDRE DE MORAES, Tribunal Pleno, julgado em 08/04/2021, PROCESSO ELETRÔNICO REPERCUSSÃO GERAL - MÉRITO DJe-113 DIVULG 11/06/2021 PUBLIC 14/06/2021).\r\r\n\r\r\n7. É incontestável reconhecer que os efeitos da sentença alcançam a todos os servidores na situação fático-jurídica abordada pela Ação Civil Pública n. 0005019-15.1997.4.03.6000, independentemente, da sua lotação territorial.\r\r\n\r\r\n8. Ademais, os efeitos da sentença proferida em ação coletiva, em regra, se estendem a todos os titulares do direito oriundo da mesma relação jurídica (erga omnes). Podem, ainda, limitar-se a determinado grupo, categoria ou classe. Em qualquer dos casos, a decisão não fica adstrita aos limites da competência territorial do órgão julgador e é válida para todo o território nacional.\r\r\n\r\r\n9. No caso, o douto juiz sentenciante de forma bastante acertada fez ver que tanto no decisum proferido na Ação de Cumprimento de Sentença quanto no Acórdão do TRF da 3ª Região, não restaram limitados os efeitos subjetivos da coisa julgada territorialmente. O Tribunal confirmou a sentença que trouxe o seguinte dispositivo: \"[...] Diante do exposto e por mais que dos autos consta, julgo procedente a presente ação para o fim de condenar os réus a incorporar o percentual de 28,86% às remunerações de seus servidores, ativos, inativos e pensionistas, não litigantes em outras ações ou cujas ações estejam suspensas e não firmatários de acordo, a partir de janeiro de 1993, com reflexos, respeitadas as datas de admissões, descontadas as reposições já feitas por força das leis n° 8622/93 e 8627/93. Sem custas e sem honorários. Sentença sujeita ao duplo grau de jurisdição\"\r\r\n\r\r\n10. Destaca-se, por oportuno, trecho do voto que ensejou o referido acórdão: \"[...] Feitas tais ponderações, constata-se que o interesse defendido pelo Parquet na presente - direito dos servidores, ativos e inativos, e pensionistas à revisão geral de 28,86% - consiste num direito individual homogêneo disponivel de expressão social, tendo em vista a extraordinária dispersão dos lesados. No particular, cumpre observar que a pretensão deduzida in casu beneficia a todos os servidores públicos civis da esfera federal (ativos, inativos e seus pensionistas), os quais são representados por diversos sindicatos. Não existe uma entidade de classe que represente a todos eles, exatamente em função da extraordinária dispersão dos lesados, o que legitima o Ministério Público Federal a propor esta ação coletiva. A par disso, o enfrentamento da questão aqui debatida em sede de ação coletiva é de todo recomendável, haja vista que, diante da grande quantidade de lesados, a via coletiva evita um sem-número de processos e, consequentemente, a sobrecarga do Poder Judiciário, o que é do interesse de toda a coletividade [...].\"\r\r\n\r\r\n11. Evidente que o agravante não demonstrou a probabilidade do direito pleiteado, já que, diversamente do que alega a ação civil pública originária não limitou a sua eficácia territorial ao Estado do Mato Grosso do Sul. Muito pelo contrário, o MPF foi claro ao delinear o objeto da mencionada ACP, abrangendo todos os servidores públicos civis federais, ativos e inativos, bem como pensionistas do quadro de pessoal da União Federal.\r\r\n\r\r\n12. Agravo de instrumento desprovido. (PROCESSO: 08044936820244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL SEBASTIÃO JOSÉ VASQUES DE MORAES, 6ª TURMA, JULGAMENTO: 21/05/2024)\r\r\n\r\r\nNo que concerne à prescrição, verifica-se que, embora tenha ocorrido o Trânsito em Julgado do Processo originário em 02/08/2019, o Ministério Público Federal - MPF, Autor da Ação Coletiva, propôs Medida Cautelar de Protesto em 11/06/2024, distribuída sob o nº 5004409-14.2024.4.03.6000, para a 1ª Vara Federal da Seção Judiciária do Mato Grosso do Sul, objetivando a interrupção do prazo prescricional.\r\r\n\r\r\nA Medida Cautelar de Protesto, ajuizada pelo MPF, interrompe o prazo prescricional, a partir de seu ajuizamento (11/06/2024), cujo prazo passa a correr pela metade. O termo final somente se dará em 12/2026. O presente Cumprimento de Sentença foi proposto em 06/06/2025, logo, ausente a prescrição.\r\r\n\r\r\nNesse mesmo sentido de afastar a prescrição em razão da propositura da cautela de protesto pelo MPF: PROCESSO: 08066753820244058500, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL ALEXANDRE LUNA FREIRE, 3ª TURMA, JULGAMENTO: 07/08/2025.\r\r\n\r\r\nDestaque-se, por fim, que não pode haver pagamento em duplicidade. Como bem estabelecido na sentença exequenda, no cálculo do valor devido deve ocorrer a compensação com o reenquadramento concedido pelas Leis 8.622/93 e 8.627/93, bem como a compensação dos valores adimplidos administrativamente, conforme a tese firmada pelo Superior Tribunal de Justiça no enunciado do Tema 1.102, verbis:\r\r\n\r\r\n\"I) É possível a comprovação de transação administrativa, relativa ao pagamento da vantagem de 28,86%, por meio de fichas financeiras ou documento expedido pelo Sistema Integrado de Administração de Recursos Humanos - SIAPE, conforme art. 7º, § 2º, da MP 1.962-33/2000, reproduzida na vigente MP 2.169-43/2001, apenas em relação a acordos firmados posteriormente à sua vigência.\r\r\n\r\r\nII) Quando não for localizado o instrumento de transação devidamente homologado, e buscando impedir o enriquecimento ilícito, os valores recebidos administrativamente, a título de 28,86%, demonstrados por meio dos documentos expedidos pelo SIAPE, devem ser deduzidos da quantia apurada, com as atualizações pertinentes.\"\r\r\n\r\r\nCom tais considerações, NEGO PROVIMENTO ao agravo de instrumento.\r\r\n\r\r\nÉ como voto.", "acordao": "Vistos, etc.\r\r\n\r\r\nDecide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO ao agravo de instrumento, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido"}, {"nome": "20260310_151353_Re__VOTO.0807418-64.2022.4.05.8000.ED.VIRTUAL.26.03.2026", "cnj": "0807418-64.2022.4.05.8000", "cab": "PROCESSO Nº: 0807418-64.2022.4.05.8000 - APELAÇÃO / REMESSA NECESSÁRIA (1728)", "assessor": "Arthur Pinheiro Pedrosa", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "EMBARGOS DE DECLARAÇÃO. EXECUÇÃO INDIVIDUAL DE SENTENÇA COLETIVA. GOE – GRATIFICAÇÃO DE OPERAÇÕES ESPECIAIS. PRESCRIÇÃO. ALEGAÇÃO DE OMISSÃO QUANTO À INAPLICABILIDADE DO TEMA 880/STJ, À NÃO ABRANGÊNCIA DA EXECUÇÃO PRIMITIVA E À OFENSA À COISA JULGADA. VÍCIOS INEXISTENTES. PRETENSÃO DE REDISCUSSÃO DO MÉRITO. EMBARGOS REJEITADOS.\r\r\n\r\r\n1. EMBARGOS DE DECLARAÇÃO opostos pela UNIÃO FEDERAL contra o acórdão que deu parcial provimento à apelação da ASSOCIAÇÃO NACIONAL DOS SERVIDORES DA POLÍCIA FEDERAL – ANSEF, para reconhecer a não ocorrência da prescrição da pretensão executória relativa ao cumprimento de sentença do processo nº 0002329-17.1990.4.05.8000, determinando, contudo, que os exequentes comprovem filiação prévia à data da sentença de conhecimento.\r\r\n\r\r\n2. A embargante alega, em síntese, a existência de omissão quanto aos seguintes pontos: (i) a pretensa inaplicabilidade da modulação de efeitos do Tema 880 do STJ ao caso, ao argumento de que a demora na propositura da execução pelos 2.081 servidores remanescentes não teria decorrido da falta de fichas financeiras a cargo da executada, mas da ausência de fichas cadastrais de responsabilidade da própria associação; (ii) a alegada não abrangência dos 2.081 servidores pela execução primitiva, sustentando que o acórdão proferido na AC nº 93.932-AL teria limitado o prosseguimento executivo exclusivamente aos cerca de 6.927 associados cujas petições individuais foram tempestivamente apresentadas, de modo que os remanescentes nunca teriam integrado validamente qualquer execução; (iii) a suposta ofensa à coisa julgada formada no julgamento do Agravo de Instrumento nº 0000286-69.2018.4.05.0000, que negou provimento ao recurso interposto contra a decisão que indeferiu o pedido de prosseguimento da execução em favor dos 2.081 servidores nos autos originários.\r\r\n\r\r\n3. Os embargos de declaração têm por finalidade a integração do julgado nas hipóteses de obscuridade, contradição, omissão ou erro material, não se prestando ao reexame do mérito já decidido.\r\r\n\r\r\n4. Não há omissão quando o acórdão embargado adotou fundamento autônomo e suficiente para solucionar a controvérsia, qual seja, a ausência de extinção da execução coletiva como marco inicial do prazo prescricional, fundamento esse que, por si só, sustenta o resultado do julgamento independentemente das teses paralelas invocadas pela embargante.\r\r\n\r\r\n5. Os demais argumentos suscitados nos embargos — inaplicabilidade do Tema 880/STJ, pretensa não abrangência dos 2.081 servidores pela execução originária e alegada ofensa à coisa julgada — constituem matérias que ou foram implicitamente afastadas pela fundamentação adotada, ou representam mera inconformidade com o resultado do julgamento, sem configurar vício integrativo.\r\r\n\r\r\n6. Embargos de declaração conhecidos e improvidos.", "relatorio": "Trata-se de EMBARGOS DE DECLARAÇÃO opostos pela UNIÃO FEDERAL contra o acórdão que deu parcial provimento à apelação da ASSOCIAÇÃO NACIONAL DOS SERVIDORES DA POLÍCIA FEDERAL – ANSEF, para reconhecer a não ocorrência da prescrição da pretensão executória relativa ao cumprimento de sentença do processo nº 0002329-17.1990.4.05.8000, determinando, contudo, que os exequentes comprovem filiação prévia à data da sentença de conhecimento.\r\r\n\r\r\nA embargante alega, em síntese, a existência de omissão quanto aos seguintes pontos: (i) a pretensa inaplicabilidade da modulação de efeitos do Tema 880 do STJ ao caso, ao argumento de que a demora na propositura da execução pelos 2.081 servidores remanescentes não teria decorrido da falta de fichas financeiras a cargo da executada, mas da ausência de fichas cadastrais de responsabilidade da própria associação; (ii) a alegada não abrangência dos 2.081 servidores pela execução primitiva, sustentando que o acórdão proferido na AC nº 93.932-AL teria limitado o prosseguimento executivo exclusivamente aos cerca de 6.927 associados cujas petições individuais foram tempestivamente apresentadas, de modo que os remanescentes nunca teriam integrado validamente qualquer execução; (iii) a suposta ofensa à coisa julgada formada no julgamento do Agravo de Instrumento nº 0000286-69.2018.4.05.0000, que negou provimento ao recurso interposto contra a decisão que indeferiu o pedido de prosseguimento da execução em favor dos 2.081 servidores nos autos originários.\r\r\n\r\r\nA embargante requer, ao final, o acolhimento dos embargos com atribuição de efeitos infringentes e, subsidiariamente, o reconhecimento do prequestionamento das matérias para fins de interposição de recursos excepcionais.\r\r\n\r\r\nA ANSEF apresentou contrarrazões, pugnando pelo improvimento total dos embargos, sustentando que as alegações configuram mera reiteração de argumentos já apreciados e que o fundamento central do acórdão — a não extinção da execução coletiva como marco inicial do prazo prescricional — não foi impugnado especificamente pela embargante.\r\r\n\r\r\nÉ o relatório.", "voto": "A teor do que dispõe o art. 1.022 do Código de Processo Civil, cabem embargos de declaração “contra qualquer decisão judicial para esclarecer obscuridade ou eliminar contradição; suprir omissão de ponto ou questão sobre o qual devia se pronunciar o juiz de ofício ou a requerimento; e/ou corrigir erro material”.\r\r\n\r\r\nDe acordo com o parágrafo único do mesmo artigo, considera-se omissa a decisão que “deixe de se manifestar sobre tese firmada em julgamento de casos repetitivos ou em incidente de assunção de competência aplicável ao caso sob julgamento; e incorra em qualquer das condutas descritas no art. 489, § 1º. Este dispositivo, por seu turno, não considera fundamentada qualquer decisão judicial, seja ela interlocutória, sentença ou acórdão, que:\r\r\n\r\r\nI - se limitar à indicação, à reprodução ou à paráfrase de ato normativo, sem explicar sua relação com a causa ou a questão decidida;\r\r\n\r\r\nII - empregar conceitos jurídicos indeterminados, sem explicar o motivo concreto de sua incidência no caso;\r\r\n\r\r\nIII - invocar motivos que se prestariam a justificar qualquer outra decisão;\r\r\n\r\r\nIV - não enfrentar todos os argumentos deduzidos no processo capazes de, em tese, infirmar a conclusão adotada pelo julgador;\r\r\n\r\r\nV - se limitar a invocar precedente ou enunciado de súmula, sem identificar seus fundamentos determinantes nem demonstrar que o caso sob julgamento se ajusta àqueles fundamentos;\r\r\n\r\r\nVI - deixar de seguir enunciado de súmula, jurisprudência ou precedente invocado pela parte, sem demonstrar a existência de distinção no caso em julgamento ou a superação do entendimento.\r\r\n\r\r\nO acórdão embargado encontra-se assim ementado:\r\r\n\r\r\nPROCESSUAL CIVIL. EXECUÇÃO INDIVIDUAL DE SENTENÇA COLETIVA. GOE- GRATIFICAÇÃO DE OPERAÇÕES ESPECIAIS. PRESCRIÇÃO. NÃO OCORRÊNCIA. COMPROVAÇÃO DA FILIAÇÃO À DATA DA SENTENÇA DO PROCESSO DE CONHECIMENTO. NECESSIDADE. PARCIAL PROVIMENTO DA APELAÇÃO.\r\r\n\r\r\n1. Apelação interposta pela ASSOCIAÇÃO NACIONAL DOS SERVIDORES DA POLÍCIA FEDERAL - ANSEF contra sentença que indeferiu a petição inicial do cumprimento de sentença apresentado em face da UNIÃO FEDERAL para execução de sentença de conhecimento proferida na ação 0002329-17.1990.4.05.8000, transitada em julgado em 24/04/1991. A sentença declarou que a pretensão executiva, deduzida em favor dos servidores substituídos, encontrava-se prescrita, vez que transcorreram mais de 30 (trinta) anos do trânsito em julgado do título executivo.\r\r\n\r\r\n2. De acordo com o art. 98 do CPC, a justiça gratuita poderá ser concedida indistintamente tanto à pessoa natural quanto à pessoa jurídica que não disponha de recursos suficientes para o pagamento das custas, honorários advocatícios e demais despesas processuais. O § 3º do art. 99 do CPC, por sua vez, estabelece que a declaração de insuficiência de recursos aproveita apenas à pessoa natural, exigindo-se, por consequência, a comprovação do estado de hipossuficiência para concessão da justiça gratuita à pessoa jurídica. Assim, diante da inexistência de prova suficiente da alegada insuficiência de recursos, a hipótese é de indeferimento da justiça gratuita.\r\r\n\r\r\n3. Este Tribunal Regional Federal, tratando exatamente da mesma execução, tem manifestado que \"a execução individual de título judicial formado em ação coletiva ajuizada pela ANSEF constitui desdobramento da execução coletiva originária, não se tratando de nova demanda, mas de continuidade procedimental\". (TRF5. Primeira Turma. AGRAVO DE INSTRUMENTO (202) Nº 0810144-81.2024.4.05.0000. Rel. Des. Federal Tiago Antunes de Aguiar - convocado. Julg. em 27/10/2025). Decidiu-se, ainda, que \"No que diz respeito à subsistência/tempo de tramitação do feito executivo, o fato é que, mesmo após milhares de petições individuais/em litisconsórcio, inclusive com inúmeros autos vinculados ao processo principal (nº 0002329-17.1990.4.05.8000), a execução coletiva não chegou a termo\". (TRF5. Sétima Turma. AGRAVO DE INSTRUMENTO (202) Nº 0807184-82.2022.4.05.8000. Rel. Des. Federal Leonardo Henrique de Cavalcante Carvalho. Julg. em 09/10/2025).\r\r\n\r\r\n4. Consoante pacífica jurisprudência do Superior Tribunal de Justiça, \"em conformidade com as Súmulas 150 e 383 do STF, a ação de execução promovida contra a Fazenda Pública prescreve em cinco anos, contados do trânsito em julgado da sentença de conhecimento. Todavia, o ajuizamento da ação de execução coletiva pelo sindicato interrompe a contagem do prazo prescricional, recomeçando a correr pela metade, isto é, em dois anos e meio, a partir do último ato processual da causa interruptiva, nos termos do art. 9º do Decreto n. 20.910/32, resguardado o prazo mínimo de cinco anos\" (EREsp 1.121.138/RS, rel. Ministro Humberto Martins, Corte Especial, DJe 18/06/2019). No mesmo sentido: AgInt no REsp n. 2.120.827/DF, relatora Ministra Maria Thereza de Assis Moura, Segunda Turma, julgado em 7/10/2024, DJe de 14/10/2024.\r\r\n\r\r\n5. Afasta-se a prescrição, exatamente porque não houve a extinção da execução, marco inicial para a contagem do prazo prescricional para a propositura do cumprimento de sentença pelos servidores que fazem parte da associação autora e que estavam inscritos até o dia em que foi proferida a sentença exequenda.\r\r\n\r\r\n 6. \"O afastamento da prescrição, contudo, não exime os exequentes de comprovarem o preenchimento de requisito de procedibilidade, qual seja, a existência de vínculo com a associação anteriormente ao advento da sentença de conhecimento do processo originário (de nº 0002329-17.1990.4.05.8000). Este eg. TRF 5ª Região, nos autos dos embargos à execução proposta pela associação à época (processo nº 9605026910 - AC nº 93.932/AL), estabeleceu, expressamente, que seus efeitos aproveitariam apenas àqueles que já eram associados quando a sentença de conhecimento veio a ser proferida. Consta no aludido acórdão, com efeito, que 'A ANSEF é parte legítima para mover execução. No caso, deverá limitar-se aos que a ela estavam filiados, até o dia em que foi proferida a sentença'\". (TRF5. Quinta Turma. APELAÇÃO CÍVEL (198) Nº 0807691-43.2022.4.05.8000. Rel. Des. Federal Cibele Benevides Guedes da Fonseca. Julg. em 10/11/2025).\r\r\n\r\r\n 7. Apelação parcialmente provido, para reconhecer que não incidiu a prescrição da pretensão executória, devendo ser observada a legitimidade dos exequentes, que devem comprovar filiação prévia à prolação da sentença de conhecimento do processo nº 0002329-17.1990.4.05.8000, por meio de elementos como cópia da ficha cadastral, documento de identificação do associado, cópia de contracheque com registro de desconto em favor da associação, entre outras.\r\r\n\r\r\nA União sustenta que o acórdão teria sido omisso ao não enfrentar o argumento de que o caso concreto não se amolda à modulação de efeitos do Tema 880/STJ, porque a inércia da ANSEF quanto aos 2.081 remanescentes teria decorrido da ausência de fichas cadastrais — documentos próprios da entidade associativa — e não da falta de fichas financeiras a cargo da executada, o que afastaria a aplicação da tese repetitiva.\r\r\n\r\r\nO argumento, porém, não identifica vício integrativo algum.\r\r\n\r\r\nO acórdão embargado não assentou seu resultado na incidência do Tema 880/STJ. O fundamento determinante adotado foi outro, completamente distinto: a não extinção da execução coletiva como condição para o início do prazo prescricional. Com efeito, o acórdão estabeleceu expressamente que a execução coletiva, por ordem judicial fragmentada em grupos de cinco substituídos, jamais chegou a termo, razão pela qual o prazo para a propositura de novos cumprimentos de sentença ainda não teria se iniciado, independentemente de qualquer discussão sobre fichas financeiras ou a modulação do Tema 880.\r\r\n\r\r\nQuando o julgado adota fundamento suficiente para sustentar o resultado, não há omissão pelo fato de outras teses alegadas pelas partes não terem sido individualmente enfrentadas. O argumento sobre o Tema 880 sequer era necessário ao dispositivo, razão pela qual não constitui ponto sobre o qual o acórdão estava obrigado a se pronunciar. Não há vício de omissão nesse ponto.\r\r\n\r\r\nA embargante argumenta que o acórdão teria sido omisso ao não considerar que a AC nº 93.932-AL teria restringido a execução exclusivamente aos cerca de 6.927 filiados que apresentaram petições individuais, de modo que os 2.081 remanescentes nunca teriam sido validamente incluídos em qualquer execução, o que afastaria a tese de que o presente cumprimento seria mero desdobramento da execução coletiva originária.\r\r\n\r\r\nTambém aqui não há omissão.\r\r\n\r\r\nO acórdão embargado enfrentou direta e explicitamente essa matéria ao examinar a natureza jurídica do cumprimento de sentença ora em discussão, concluindo — com apoio em precedentes específicos desta Corte — que as execuções individuais dos filiados da ANSEF constituem desdobramento da execução coletiva originária, não nova demanda, e que esta execução coletiva não chegou a termo. A conclusão sobre o caráter de continuidade procedimental está fundamentada e é exatamente o que sustenta o resultado do julgamento.\r\r\n\r\r\nO que a União faz, sob o rótulo de omissão, é contrapor ao fundamento adotado no acórdão outro entendimento jurídico que entende mais correto — o de que a execução primitiva jamais abrangeu os 2.081 remanescentes. Isso não é omissão: é discordância de mérito. Não cabe aos embargos de declaração substituir o raciocínio jurídico adotado pelo julgado por outro que a parte considere mais adequado.\r\r\n\r\r\nRejeita-se, portanto, a alegação de omissão também neste ponto.\r\r\n\r\r\nA embargante sustenta que o trânsito em julgado do acórdão que negou provimento ao Agravo de Instrumento nº 0000286-69.2018.4.05.0000 — o qual manteve a decisão que indeferiu o pedido de prosseguimento da execução em favor dos 2.081 servidores nos autos originários — teria criado coisa julgada impeditiva do presente cumprimento de sentença, e que o acórdão embargado teria sido omisso ao não enfrentar esse ponto.\r\r\n\r\r\nA alegação também não prospera.\r\r\n\r\r\nEm primeiro lugar, o objeto daquele agravo de instrumento foi o pedido de que, nos próprios autos da ação coletiva originária, fosse determinado o prosseguimento da execução com encaminhamento à contadoria para cálculos em favor dos 2.081 servidores — pedido que foi indeferido porque, à época, sequer havia execução formalmente proposta em relação a eles, devendo cada interessado apresentar seu próprio cumprimento de sentença em separado. O acórdão daquele agravo não decidiu sobre a existência ou inexistência de prescrição, nem sobre a viabilidade ou inviabilidade dos cumprimentos de sentença individuais. Decidiu, apenas, que o procedimento pleiteado — prosseguimento nos autos originários — era inadequado.\r\r\n\r\r\nO presente cumprimento de sentença tem objeto e causa de pedir distintos daquele pedido de prosseguimento. Não há, portanto, identidade de demandas que pudesse gerar coisa julgada impeditiva.\r\r\n\r\r\nEm segundo lugar, e de forma mais relevante, o acórdão embargado não ignorou a existência daquele precedente: ao fundamentar sua conclusão sobre a não extinção da execução coletiva, o julgado analisou todo o histórico da execução originária, tendo construído sua ratio sobre a ausência de sentença extintiva da execução coletiva. O argumento sobre a coisa julgada do AI nº 0000286-69.2018.4.05.0000 é, portanto, mais uma linha de raciocínio alternativa que o acórdão implicitamente afastou ao adotar fundamento incompatível com ela.\r\r\n\r\r\nEm face do exposto, CONHEÇO E NEGO PROVIMENTO aos embargos de declaração.\r\r\n\r\r\nÉ como voto.\r\r\n\r\r\n Recife, 22 de março de 2018.", "acordao": "Vistos, etc.\r\r\n\r\r\n Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, CONHECER E NEGAR PROVIMENTO aos embargos de declaração, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Parcialmente provido", "css": "parcial"}, {"nome": "20260310_153923_Re__VOTO.ED.0806912-27.2025.4.05.0000.VIRTUAL.26.03.2026", "cnj": "0806912-27.2025.4.05.0000", "cab": "AGRAVO DE INSTRUMENTO (202) Nº 0806912-27.2025.4.05.0000", "assessor": "Gabriel Santos Aquino De Oliveira", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "PROCESSUAL CIVIL. EMBARGOS DE DECLARAÇÃO. HONORÁRIOS ADVOCATÍCIOS. CUMPRIMENTO DE SENTENÇA. IMPUGNAÇÃO. PROVEITO ECONÔMICO. FIXAÇÃO POR EQUIDADE. ART. 85, § 8º, DO CPC. TEMA 1.076 DO STJ. ALEGAÇÃO DE OMISSÃO NO JULGADO. REDISCUSSÃO DE QUESTÃO JÁ APRECIADA. SÚMULA 345 E TEMA 973 DO STJ. INOVAÇÃO RECURSAL. EMBARGOS IMPROVIDOS.\r\r\n\r\r\n 1. Embargos de Declaração opostos pelo SINDICATO DOS TRABALHADORES DAS UNIVERSIDADES FEDERAIS DE PERNAMBUCO - SEÇÃO SINDICAL DA UNIVERSIDADE FEDERAL DE PERNAMBUCO em face de acórdão desta Turma que, à unanimidade, negou provimento aos Embargos de Declaração previamente opostos em face de acórdão desta Turma que, à unanimidade, deu parcial provimento ao agravo de instrumento para majorar os honorários advocatícios para R$ 2.500,00.\r\r\n\r\r\n 2. A teor do que dispõe o art. 1.022 do Código de Processo Civil, cabem embargos de declaração \"contra qualquer decisão judicial para esclarecer obscuridade ou eliminar contradição; suprir omissão de ponto ou questão sobre o qual devia se pronunciar o juiz de ofício ou a requerimento; e/ou corrigir erro material\".\r\r\n\r\r\n 3. O acórdão embargado pronunciou-se de forma expressa e fundamentada sobre a questão dos honorários advocatícios, reconhecendo que a aplicação dos percentuais previstos nos §§ 2º e 3º do art. 85 do CPC, ainda que em seus patamares máximos, levaria à fixação de honorários em valor ínfimo, em consonância com o Tema 1.076 do STJ.\r\r\n\r\r\n 4. O proveito econômico na hipótese de rejeição da impugnação ao cumprimento de sentença fundamentada em excesso de execução corresponde à diferença entre o valor inicialmente executado e o que foi apurado pela Contadoria, e não ao valor total da condenação. Precedentes desta eg. Terceira Turma.\r\r\n\r\r\n 5. O argumento fundado na Súmula 345 e no Tema 973 do STJ, suscitado pela primeira vez nos presentes segundos aclaratórios, configura inovação recursal inadmissível nessa sede.\r\r\n\r\r\n 6. O sindicato embargante deseja rediscutir questões efetivamente apreciadas por ocasião do julgamento que originou o acórdão ora questionado. Frise-se, entretanto, que embargos de declaração, ainda que opostos para fins de prequestionamento, não se prestam a este fim.\r\r\n\r\r\n 7. Embargos de declaração conhecidos e improvidos.", "relatorio": "Trata-se de Embargos de Declaração opostos pelo SINDICATO DOS TRABALHADORES DAS UNIVERSIDADES FEDERAIS DE PERNAMBUCO - SEÇÃO SINDICAL DA UNIVERSIDADE FEDERAL DE PERNAMBUCO em face de acórdão desta Turma que, à unanimidade, negou  provimento aos Embargos de Declaração previamente opostos em face de acórdão desta Turma que, à unanimidade, deu parcial provimento ao agravo de instrumento para majorar os honorários advocatícios para R$ 2.500,00.\r\r\n\r\r\n Alega-se, nas razões de recurso, que o v. acórdão foi omisso quanto à análise das seguintes questões: a) persistência do equívoco quanto à fase processual em debate, o que causou equívoco quanto à definição do proveito econômico obtido; b) observância quanto à Súmula 345 do STJ e ao que foi decidido no Tema 973 do STJ, em se tratando de execução de sentença coletiva.\r\r\n\r\r\n Contrarrazões apresentadas pela UFPE.\r\r\n\r\r\n É o relatório.", "voto": "A teor do que dispõe o art. 1.022 do Código de Processo Civil, cabem embargos de declaração \"contra qualquer decisão judicial para esclarecer obscuridade ou eliminar contradição; suprir omissão de ponto ou questão sobre o qual devia se pronunciar o juiz de ofício ou a requerimento; e/ou corrigir erro material\".\r\r\n\r\r\n O acórdão ora embargado, ao negar provimento aos primeiros aclaratórios, consignou de forma expressa e fundamentada que o julgado original se pronunciou sobre a questão dos honorários advocatícios, aplicando a equidade prevista no § 8º do art. 85 do CPC por reconhecer que, no caso concreto, a aplicação dos percentuais previstos nos §§ 2º e 3º do mesmo dispositivo — ainda que em seus patamares máximos — levar
