cominada, especialmente considerando que o INSS já deu impulso e concluiu o processo administrativo, em cumprimento à decisão liminar.\r\r\n 11. Apelação e Remessa Necessária parcialmente providas, para excluir a astreinte cominada.\r\r\n (PROCESSO: 08112403920194058300, APELREEX - Apelação / Reexame Necessário - , DESEMBARGADOR FEDERAL CID MARCONI, 3ª Turma, JULGAMENTO: 26/11/2019).\r\r\n [grifos acrescidos]\r\r\n\r\r\nCom relação aos demais pontos apresentados pelo INSS nos embargos de declaração, entendo que inexistem as omissões apontadas. Na verdade, com a alegação de que houve omissão, pretende a Embargante, simplesmente, que esta Turma proceda à reapreciação da matéria. Entretanto, não há, no presente caso, possibilidade de que se entenda de outra forma que não a adotada na decisão embargada.\r\r\n\r\r\nPor tais razões, conheço dos presentes embargos de declaração, dando-lhes parcial provimento, sem atribuição de efeitos modificativos, apenas para sanar a omissão apontada no tocante à análise da legitimidade passiva da autoridade dita coatora.\r\r\n\r\r\nÉ como voto.", "acordao": "Vistos, etc.\r\r\n\r\r\nDecide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, DAR PARCIAL PROVIMENTO aos embargos de declaração, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Parcialmente provido", "css": "parcial"}, {"nome": "20260317_141911_Re__VOTO.0801484-06.2024.4.05.8308.VIRTUAL.26.03.2026", "cnj": "0801484-06.2024.4.05.8308", "cab": "APELAÇÃO CÍVEL (198) Nº 0801484-06.2024.4.05.8308", "assessor": "Mariana Nascimento Marinho", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "TRIBUTÁRIO. IMPOSTO DE RENDA PESSOA FÍSICA. ISENÇÃO. PORTADOR DE NEOPLASIA MALIGNA. ART. 6°, XIV, LEI 7.713/1988. APELAÇÃO PROVIDA.\r\r\n\r\r\n1. Apelação interposta por MAURO PEREIRA DE EMERY contra sentença que jugou improcedente o pedido de isenção de imposto de renda e contribuição previdenciária em razão de o Autor ser idoso portador de neoplasia mielodisplástica.\r\r\n\r\r\n2. Em suas razões recursais, a Apelante requer a reforma da sentença, alegando que:  a) a isenção tem o fito de garantir ao Autor condições equânimes, assegurando-lhe subsistência digna enquanto portador de enfermidade grave, com fundamento no princípio da dignidade da pessoa humana (art. 1º, III, da Constituição Federal). A negativa da Ré viola os ditames legais, impondo cobranças indevidas e colocando o Autor em situação de vulnerabilidade; b) a legislação (art. 6º, XIV, da Lei nº 7.713/88) assegura a isenção do imposto de renda aos portadores de moléstias graves, como neoplasia maligna, sendo desnecessária a demonstração de contemporaneidade dos sintomas ou recidiva da doença, conforme entendimento consolidado dos tribunais e Súmula 627 do STJ; c) a jurisprudência é uníssona no sentido de reconhecer o direito à isenção e à restituição dos valores indevidamente descontados, mesmo diante da ausência de laudo oficial vigente, desde que comprovada a enfermidade por outros meios idôneos; d) o Autor comprovou ser portador de neoplasia mielodisplástica maligna (CID D46.1), apresentando laudos médicos que evidenciam a persistência da doença, fazendo jus à isenção e à restituição dos valores pagos indevidamente.\r\r\n\r\r\n3. O cerne do apelo consiste em definir se o particular faz jus a isenção tributária prevista no art. art. 6°, XIV, da Lei n° 7.713/1988, tendo em vista que o apelante alega ser portador de neoplasia mielodisplástica.\r\r\n\r\r\n4. A isenção tributária invocada pela parte autora, ora apelante, deriva da previsão normativa constante do art. 6°, XIV, da Lei n° 7.713/1988, que assim dispõe: Art. 6º Ficam isentos do imposto de renda os seguintes rendimentos percebidos por pessoas físicas: (...) XIV - os proventos de aposentadoria ou reforma motivada por acidente em serviço e os percebidos pelos portadores de moléstia profissional, tuberculose ativa, alienação mental, esclerose múltipla, neoplasia maligna, cegueira, hanseníase, paralisia irreversível e incapacitante, cardiopatia grave, doença de Parkinson, espondiloartrose anquilosante, nefropatia grave, hepatopatia grave, estados avançados da doença de Paget (osteíte deformante), contaminação por radiação, síndrome da imunodeficiência adquirida, com base em conclusão da medicina especializada, mesmo que a doença tenha sido contraída depois da aposentadoria ou reforma;\r\r\n\r\r\n5. A constatação das doenças prescritas na norma isentiva deve ser feita com base em conclusão da medicina especializada.\r\r\n\r\r\n6. No caso dos autos, restou devidamente comprovado, por meio de relatório médico particular (Id. nº 6556089), que o Autor é portador de neoplasia mielodisplástica (CID D46.1), enfermidade classificada como neoplasia maligna. Assim, verifica-se o preenchimento dos requisitos legais para a concessão da isenção tributária pleiteada.\r\r\n\r\r\n7. Precedente desta Eg. Corte sobre a mesma doença: PROCESSO: 08123547620204058300, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL LEONARDO HENRIQUE DE CAVALCANTE CARVALHO, 2ª TURMA, JULGAMENTO: 20/10/2020.\r\r\n\r\r\n8. No tocante ao pedido de isenção de contribuição previdenciária, cumpre esclarecer que, tratando-se de aposentadoria vinculada ao Regime Geral de Previdência Social (RGPS), não há incidência de contribuição previdenciária sobre os proventos percebidos, razão pela qual não se revela juridicamente cabível o pleito de isenção nesse particular.\r\r\n\r\r\n9. Apelação parcialmente provida para julgar parcialmente procedente o pedido, para reconhecer o direito do autor à isenção do IRPF sobre os proventos do autor, nos termos do art. 6º, XIV, da Lei nº 7.713/88, bem como condenar a parte ré à restituição dos valores indevidamente descontados, observada a prescrição quinquenal, acrescidos de correção monetária atualização monetária a ser calculada pela SELIC, nos termos do artigo 39, § 4º, da Lei 9.250/95.", "relatorio": "Trata-se de Apelação interposta por MAURO PEREIRA DE EMERY contra sentença que jugou improcedente o pedido de isenção de imposto de renda e contribuição previdenciária em razão de o Autor ser idoso portador de neoplasia mielodisplástica.\r\r\n\r\r\nEm suas razões recursais, a Apelante requer a reforma da sentença, alegando que:\r\r\n\r\r\na) a isenção tem o fito de garantir ao Autor condições equânimes, assegurando-lhe subsistência digna enquanto portador de enfermidade grave, com fundamento no princípio da dignidade da pessoa humana (art. 1º, III, da Constituição Federal). A negativa da Ré viola os ditames legais, impondo cobranças indevidas e colocando o Autor em situação de vulnerabilidade;\r\r\n\r\r\nb) a legislação (art. 6º, XIV, da Lei nº 7.713/88) assegura a isenção do imposto de renda aos portadores de moléstias graves, como neoplasia maligna, sendo desnecessária a demonstração de contemporaneidade dos sintomas ou recidiva da doença, conforme entendimento consolidado dos tribunais e Súmula 627 do STJ;\r\r\n\r\r\nc) a jurisprudência é uníssona no sentido de reconhecer o direito à isenção e à restituição dos valores indevidamente descontados, mesmo diante da ausência de laudo oficial vigente, desde que comprovada a enfermidade por outros meios idôneos;\r\r\n\r\r\nd) o Autor comprovou ser portador de neoplasia mielodisplástica maligna (CID D46.1), apresentando laudos médicos que evidenciam a persistência da doença, fazendo jus à isenção e à restituição dos valores pagos indevidamente.\r\r\n\r\r\nContrarrazões apresentadas.\r\r\n\r\r\nÉ o relatório.", "voto": "De início, recebo a Apelação, considerando presentes os pressupostos recursais intrínsecos (cabimento, legitimação, interesse e inexistência de fato impeditivo ou extintivo do direito de recorrer) e extrínsecos (preparo, tempestividade e regularidade formal) para a admissibilidade do recurso.\r\r\n\r\r\nO cerne do apelo consiste em definir se o particular faz jus a isenção tributária prevista no art. art. 6°, XIV, da Lei n° 7.713/1988, tendo em vista que o apelante alega ser portador de neoplasia mielodisplástica.\r\r\n\r\r\n A isenção tributária invocada pela parte autora, ora apelante, deriva da previsão normativa constante do art. 6°, XIV, da Lei n° 7.713/1988, que assim dispõe: Art. 6º Ficam isentos do imposto de renda os seguintes rendimentos percebidos por pessoas físicas: (...) XIV - os proventos de aposentadoria ou reforma motivada por acidente em serviço e os percebidos pelos portadores de moléstia profissional, tuberculose ativa, alienação mental, esclerose múltipla, neoplasia maligna, cegueira, hanseníase, paralisia irreversível e incapacitante, cardiopatia grave, doença de Parkinson, espondiloartrose anquilosante, nefropatia grave, hepatopatia grave, estados avançados da doença de Paget (osteíte deformante), contaminação por radiação, síndrome da imunodeficiência adquirida, com base em conclusão da medicina especializada, mesmo que a doença tenha sido contraída depois da aposentadoria ou reforma;\r\r\n\r\r\n A constatação das doenças prescritas na norma isentiva deve ser feita com base em conclusão da medicina especializada.\r\r\n\r\r\nNo caso dos autos, restou devidamente comprovado, por meio de relatório médico particular (Id. nº 6556089), que o Autor é portador de neoplasia mielodisplástica (CID D46.1), enfermidade classificada como neoplasia maligna. Assim, verifica-se o preenchimento dos requisitos legais para a concessão da isenção tributária pleiteada.\r\r\n\r\r\nNo mesmo sentido, transcrevo precedente desta Eg. Corte sobre a mesma doença.\r\r\n\r\r\n TRIBUTÁRIO. IMPOSTO DE RENDA. ISENÇÃO. PORTADORA DE NEOPLASIA MALIGNA. ART. 6º DA LEI Nº 7713/88. DIREITO À ISENÇÃO. HONORÁRIOS ADVOCATÍCIOS. SENTENÇA ILÍQUIDA.\r\r\n\r\r\n 1. Trata-se de apelação de sentença que julgou procedentes os pedidos para declarar o direito do autor à isenção do imposto de renda, conforme art. 6º, XIV, da Lei nº 7.713/88, condenar a ré a restituir os valores pagos desde 06/12/2015, corrigidos pela SELIC e de acordo com o Manual de Cálculos da Justiça Federal. No tocante ao ônus sucumbencial, condenada a ré ao pagamento de honorários advocatícios, no mínimo legal, aplicando-se as menores alíquotas previstas no art. 85, §3º, II do CPC sobre o valor da condenação.\r\r\n\r\r\n 2. Em suas razões de apelação, sustenta a FAZENDA NACIONAL que a moléstia ostentada, síndrome mielodisplástica, não dá direito à isenção, porquanto a isenção prevista se dá em casos confirmados de \"portadores de moléstia profissional, tuberculose ativa, alienação mental, esclerose múltipla, neoplasia maligna, cegueira, hanseníase, paralisia irreversível e incapacitante, cardiopatia grave, doença de Parkinson, espondiloartrose anquilosante, nefropatia grave, hepatopatia grave, estados avançados da doença de Paget (osteíte deformante), contaminação por radiação, síndrome da imunodeficiência adquirida\", nos termos do inciso XIV do art. 6º da Lei nº 7.713/88. Sustenta que, no caso dos autos, o autor foi diagnosticado oficialmente com o CID 10 D46.9, correspondente a \"Síndrome mielodisplásica, não especificada\", conforme documento que o mesmo juntou no id. 4058300.15383947, de 29/07/2020. Entende que síndrome mielodisplástica não é classificada como neoplasia maligna, tanto que possuem CID's diversos, já que o CID para a síndrome mielodisplásica é 10 D46 e, por seu turno, a neoplasia maligna exige uma das variações do CID 10 C76. Subsidiariamente, defende que a isenção legal estabelecida se restringe ao imposto de renda incidente sobre os proventos de aposentadoria e pensão, e mais nenhum outro rendimento eventualmente auferido pelo autor, nos moldes previstos no art. 6º, incisos XVI e XXI, da Lei no 7.713/1988, com a redação que lhe deu Lei no11.052/2004. Por fim, no tocante aos honorários advocatícios, a hipótese é de sentença ilíquida, de modo que requer a definição dos percentuais, consoante os §§ 3º e 5º do art. 85, do CPC, somente após a liquidação.\r\r\n\r\r\n 3. A matéria aqui devolvida versa acerca do direito à isenção do Imposto de Renda sobre os proventos de portador de moléstia relacionada no art. 6º, inciso XIV, da Lei 7.713/1988, dentre as quais está a neoplasia maligna.\r\r\n\r\r\n 4. No caso, do compulsar dos autos se observa que, em 06/12/2015, a hematologista Anna Maria Vanderley atestou ser o autor portador de síndrome mielodisplásica, classificando como neoplasia maligna, ressalvando, a possibilidade de evoluir para leucemia. Em 15/06/2019, a perita Eleonora Barros de Melo concluiu estar o demandante incapacitado definitivamente com leucemia mieloide aguda (ids. nºs 15383926, 15383942, 15383943, 15383945 e 15383984).\r\r\n\r\r\n 5. No que tange à exigência de apresentação de laudo oficial emitido pela União, pelos Estados ou pelos Municípios, para fins de obtenção da isenção do IR, tal requisito é direcionado à esfera administrativa, não vinculando, obviamente, o magistrado, em vista do princípio da persuasão racional do conhecimento. Em relação ao tema, tem decidido esta Segunda turma que \"o magistrado deve valer-se das provas acostadas aos autos para formar o seu convencimento acerca da existência da moléstia grave, para fins da isenção do imposto de renda, não estando adstrito a laudo médico oficial, exigência que se destina à isenção concedida na seara administrativa. Na esfera judicial, o juiz está jungido às provas constantes dos autos, conforme o disposto na legislação processual civil. Precedentes do STJ e desta Corte Regional.\" (PJE 08109972320184058400, Rel. Desembargador Federal Paulo Roberto de Oliveira Lima, 2ª Turma, julg. 25/09/2019 ).\r\r\n\r\r\n 6. No caso, as provas que constam dos autos evidenciam de plano que o demandante é portador de doença grave, encontrando-se, em razão de tal circunstância, alcançada pela isenção tributária dos seus proventos prevista no art. 6º, inciso XIV, da Lei 7.713/88.\r\r\n\r\r\n 7. Quanto à condenação em honorários advocatícios, o art. 85, parágrafo 4º, II, referindo-se aos percentuais estabelecidos nos incisos I a V do parágrafo 3º do art.85, em causas em que a Fazenda Pública for parte, determina que \"não sendo líquida a sentença, a definição do percentual, nos termos previstos nos incisos I a V, somente ocorrerá quando liquidado o julgado\".\r\r\n\r\r\n 8. Apelação parcialmente provida apenas para reformar a parte da sentença que fixou os honorários e determinar que o percentual seja definido por ocasião da liquidação do julgado, nos termos do art. 85, parágrafo 4º, inciso II, do CPC. (PROCESSO: 08123547620204058300, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL LEONARDO HENRIQUE DE CAVALCANTE CARVALHO, 2ª TURMA, JULGAMENTO: 20/10/2020)\r\r\n\r\r\nNo tocante ao pedido de isenção de contribuição previdenciária, cumpre esclarecer que, tratando-se de aposentadoria vinculada ao Regime Geral de Previdência Social (RGPS), não há incidência de contribuição previdenciária sobre os proventos percebidos, razão pela qual não se revela juridicamente cabível o pleito de isenção nesse particular.\r\r\n\r\r\nEm face do exposto, DOU PROVIMENTO à Apelação para julgar parcialmente procedente o pedido, para reconhecer o direito do autor à isenção do IRPF sobre os proventos do autor, nos termos do art. 6º, XIV, da Lei nº 7.713/88, bem como condenar a parte ré à restituição dos valores indevidamente descontados, observada a prescrição quinquenal, acrescidos de correção monetária atualização monetária a ser calculada pela SELIC, nos termos do artigo 39, § 4º, da Lei 9.250/95.\r\r\n\r\r\nÉ como voto.", "acordao": "Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, DAR PROVIMENTO à Apelação, nos termos do voto do relator, na forma do relatório constante dos autos, que fica fazendo parte integrante do presente julgado.\r\r\n\r\r\n Des. Federal ROGÉRIO FIALHO MOREIRA\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Parcialmente provido", "css": "parcial"}, {"nome": "20260317_142223_Re__VOTO.0056303-13.2025.4.05.8300.VIRTUAL.26.03.2026", "cnj": "0056303-13.2025.4.05.8300", "cab": "APELAÇÃO CÍVEL (198) Nº 0056303-13.2025.4.05.8300", "assessor": "Joana Barbosa Lima De Oliveira", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "TRIBUTÁRIO. IPI. ISENÇÃO. AQUISIÇÃO DE VEÍCULO AUTOMOTOR. PESSOA COM DEFICIÊNCIA FÍSICA. LEI Nº 8.989/95. REGULARIDADE FISCAL. EXIGÊNCIA NÃO PREVISTA EM LEI. ANOTAÇÃO RESTRITIVA NA CNH. DESNECESSIDADE. LAUDO OFICIAL. REQUISITOS LEGAIS PREENCHIDOS. APELAÇÃO PROVIDA.\r\r\n\r\r\n 1. Recurso de Apelação interposto por IRACEMA FATIMA MEYER ROJAS CARNEIRO em face de sentença que denegou a segurança pleiteada que objetivava, em síntese, a concessão do benefício fiscal de isenção do Imposto sobre Produtos Industrializados (IPI) na aquisição de veículo automotor, nos termos da Lei nº 8.989/95.\r\r\n\r\r\n2. A controvérsia consiste em examinar a possibilidade de concessão da isenção do Imposto sobre Produtos Industrializados (IPI), na aquisição de veículo automotor, requerida administrativamente pela impetrante, independentemente da comprovação de regularidade fiscal e/ou da anotação restritiva na CNH.\r\r\n\r\r\n3. A Lei nº 8.989/95 instituiu hipótese de isenção de IPI na aquisição de automóvel por pessoa com deficiência, observados os requisitos legais pertinentes.\r\r\n\r\r\n4. A apelante foi submetida a cirurgia de mastectomia, com esvaziamento axilar bilateral, e encontra-se em tratamento radioterápico. Do laudo de avaliação expedido pela Gerência de Psicomédica do Detran/PE (Id 6585231), extrai-se o reconhecimento de deficiência física, com o seguinte registro: “Usuária portadora de neoplasia maligna de mama, submetida a mastectomia e esvaziamento axilar bilateral. Deformidade adquirida. Apta a dirigir veículo automático”.\r\r\n\r\r\n5. Para os fins de incidência da norma isencional, a apelante deve ser considerada pessoa com deficiência física, nos termos do laudo oficial juntado aos autos.\r\r\n\r\r\n6. A apelante formulou requerimento administrativo de isenção de IPI para aquisição de veículo automotor. Todavia, o pleito foi indeferido sob o fundamento de que “as informações disponíveis sobre o contribuinte 245.090.274-00 são insuficientes para emissão da Certidão de Débitos Relativos a Créditos Tributários Federais e à Dívida Ativa da União, não estando, portanto, comprovada sua regularidade fiscal” (Id 6585232).\r\r\n\r\r\n7. O § 6º do art. 150 da Constituição Federal estabelece que qualquer subsídio ou isenção, redução de base de cálculo, concessão de crédito presumido, anistia ou remissão, relativos a impostos, taxas ou contribuições, só poderá ser concedido mediante lei específica, federal, estadual ou municipal, que regule exclusivamente as matérias acima enumeradas ou o correspondente tributo ou contribuição.\r\r\n\r\r\n8. A Lei nº 8.989/95, por sua vez, instituiu isenção de IPI incidente sobre automóveis de passageiros adquiridos por pessoas com deficiência física, visual, mental severa ou profunda, ou por pessoas com transtorno do espectro autista, diretamente ou por intermédio de seu representante legal, dispondo, ainda, que “a isenção será reconhecida pela Secretaria da Receita Federal do Ministério da Fazenda, mediante prévia verificação de que o adquirente preenche os requisitos previstos nesta Lei”.\r\r\n\r\r\n9. Há lei específica que concede a isenção e disciplina, de modo próprio, os requisitos para o reconhecimento do benefício, em conformidade com o art. 150, § 6º, da Constituição Federal, não podendo ato normativo infralegal contrariar a finalidade buscada pelo legislador nem ultrapassar os limites da delegação legal, segundo a qual a Secretaria da Receita Federal deve se limitar à verificação do preenchimento dos requisitos legalmente estabelecidos.\r\r\n\r\r\n10. O art. 60 da Lei nº 9.069/95 estabelece que “a concessão ou reconhecimento de qualquer incentivo ou benefício fiscal, relativos a tributos e contribuições administrados pela Secretaria da Receita Federal, fica condicionada à comprovação, pelo contribuinte, pessoa física ou jurídica, da quitação de tributos e contribuições federais”.\r\r\n\r\r\n11. Embora o dispositivo apresente redação ampla, sua incidência não pode ser examinada de forma isolada, desconsiderando-se a disciplina específica conferida pela legislação de regência do benefício pleiteado. Com efeito, consoante dispõe o art. 2º, caput e § 2º, da LINDB, a superveniência de norma geral não implica revogação ou modificação da disciplina especial anteriormente estabelecida, salvo expressa disposição em sentido diverso ou hipótese de incompatibilidade.\r\r\n\r\r\n12. Trata-se de isenção tributária instituída por lei específica, a qual deve ser regida, primordialmente, pelos requisitos nela expressamente previstos. Desse modo, ausente, na Lei nº 8.989/95, previsão de exigência de regularidade fiscal e/ou anotação restritiva na CNH como condição para o reconhecimento do benefício, não se revela legítima a imposição administrativa de condicionante não contemplada na legislação de regência.\r\r\n\r\r\n13. Precedente STJ: REsp 1.822.097/RS, Rel. Ministro Gurgel de Faria, Primeira Turma, Julgamento: 05/09/2019, DJe 26/09/2019. Precedentes TRF5: Processo nº 0804187-36.2021.4.05.8300, Apelação/Remessa Necessária, Desembargador Relator.: Rogério de Meneses Fialho Moreira, Julgamento: 23/06/2022, 3ª Turma; Processo nº 0807791-57.2020.4.05.8100, Apelação Cível, Desembargador Relator: Cid Marconi Gurgel de Souza, Julgamento: 04/02/2021, 3ª Turma.\r\r\n\r\r\n14. Recurso de Apelação provido.", "relatorio": "Trata-se de Recurso de Apelação interposto por IRACEMA FATIMA MEYER ROJAS CARNEIRO em face de sentença que denegou a segurança pleiteada que objetivava, em síntese, a concessão do benefício fiscal de isenção do Imposto sobre Produtos Industrializados (IPI) na aquisição de veículo automotor, nos termos da Lei nº 8.989/95.\r\r\n\r\r\nNas razões recursais, a apelante defende, em síntese, que:\r\r\n\r\r\na) é incontroverso que a apelante é portadora de neoplasia maligna (câncer de mama), tendo sido submetida à mastectomia radical, circunstância que lhe ocasionou limitação física permanente, fazendo jus, portanto, ao benefício fiscal previsto na legislação de regência;\r\r\n\r\r\nb) a Lei nº 8.989/1995, que dispõe especificamente sobre a isenção do Imposto sobre Produtos Industrializados – IPI na aquisição de veículos por pessoas com deficiência, estabelece de forma taxativa os requisitos necessários à fruição do benefício fiscal, não contemplando, em nenhum de seus dispositivos, a exigência de regularidade fiscal do beneficiário;\r\r\n\r\r\nc) a invocação do art. 60 da Lei nº 9.069/1995 como óbice à concessão da isenção configura restrição ilegal e inconstitucional, porquanto lei ordinária de caráter genérico não possui aptidão para inovar na ordem jurídica ou criar limitações a direito expressamente assegurado por lei especial de isenção;\r\r\n\r\r\nd) a jurisprudência pátria é pacífica no sentido de que a isenção do IPI tem por finalidade precípua a integração social da pessoa com deficiência, não podendo a Administração Pública erigir exigências meramente formais;\r\r\n\r\r\ne) violação ao art. 4º, §1º, da Lei nº 13.146/2015 (Lei Brasileira de Inclusão da Pessoa com Deficiência);\r\r\n\r\r\nf) ao condicionar o reconhecimento de uma isenção fiscal — que possui nítido caráter de inclusão social — à quitação de débitos tributários, a Administração Pública utiliza-se de um meio coercitivo oblíquo para a cobrança de tributos;\r\r\n\r\r\ng) o Supremo Tribunal Federal possui entendimento sumulado repelindo qualquer obstáculo imposto pelo Estado ao livre exercício de atividades ou ao usufruto de direitos como forma de compelir o pagamento de tributos.\r\r\n\r\r\n Contrarrazões apresentadas pela Fazenda Nacional.\r\r\n\r\r\n É o relatório.", "voto": "A controvérsia consiste em examinar a possibilidade de concessão da isenção do Imposto sobre Produtos Industrializados (IPI), na aquisição de veículo automotor, requerida administrativamente pela impetrante, independentemente da comprovação de regularidade fiscal e/ou da anotação restritiva na CNH.\r\r\n\r\r\nSobre a matéria, cumpre destacar que a Lei nº 8.989/95 instituiu hipótese de isenção de IPI na aquisição de automóvel por pessoa com deficiência, observados os requisitos legais pertinentes.\r\r\n\r\r\nNo caso concreto, consta dos autos que a apelante foi submetida a cirurgia de mastectomia, com esvaziamento axilar bilateral, e encontra-se em tratamento radioterápico. Ademais, do laudo de avaliação expedido pela Gerência de Psicomédica do Detran/PE (Id 6585231), extrai-se o reconhecimento de deficiência física, com o seguinte registro: “Usuária portadora de neoplasia maligna de mama, submetida a mastectomia e esvaziamento axilar bilateral. Deformidade adquirida. Apta a dirigir veículo automático”.\r\r\n\r\r\nAssim, para os fins de incidência da norma isencional, a apelante deve ser considerada pessoa com deficiência física, nos termos do laudo oficial juntado aos autos.\r\r\n\r\r\nVerifica-se, ainda, que a apelante formulou requerimento administrativo de isenção de IPI para aquisição de veículo automotor. Todavia, o pleito foi indeferido sob o fundamento de que “as informações disponíveis sobre o contribuinte 245.090.274-00 são insuficientes para emissão da Certidão de Débitos Relativos a Créditos Tributários Federais e à Dívida Ativa da União, não estando, portanto, comprovada sua regularidade fiscal” (Id 6585232).\r\r\n\r\r\nO § 6º do art. 150 da Constituição Federal estabelece que qualquer subsídio ou isenção, redução de base de cálculo, concessão de crédito presumido, anistia ou remissão, relativos a impostos, taxas ou contribuições, só poderá ser concedido mediante lei específica, federal, estadual ou municipal, que regule exclusivamente as matérias acima enumeradas ou o correspondente tributo ou contribuição.\r\r\n\r\r\nA Lei nº 8.989/95, por sua vez, instituiu isenção de IPI incidente sobre automóveis de passageiros adquiridos por pessoas com deficiência física, visual, mental severa ou profunda, ou por pessoas com transtorno do espectro autista, diretamente ou por intermédio de seu representante legal, dispondo, ainda, que “a isenção será reconhecida pela Secretaria da Receita Federal do Ministério da Fazenda, mediante prévia verificação de que o adquirente preenche os requisitos previstos nesta Lei”.\r\r\n\r\r\nObserva-se, portanto, que há lei específica que concede a isenção e disciplina, de modo próprio, os requisitos para o reconhecimento do benefício, em conformidade com o art. 150, § 6º, da Constituição Federal, não podendo ato normativo infralegal contrariar a finalidade buscada pelo legislador nem ultrapassar os limites da delegação legal, segundo a qual a Secretaria da Receita Federal deve se limitar à verificação do preenchimento dos requisitos legalmente estabelecidos.\r\r\n\r\r\nO art. 60 da Lei nº 9.069/95 estabelece que “a concessão ou reconhecimento de qualquer incentivo ou benefício fiscal, relativos a tributos e contribuições administrados pela Secretaria da Receita Federal, fica condicionada à comprovação, pelo contribuinte, pessoa física ou jurídica, da quitação de tributos e contribuições federais”.\r\r\n\r\r\nEmbora o dispositivo apresente redação ampla, sua incidência não pode ser examinada de forma isolada, desconsiderando-se a disciplina específica conferida pela legislação de regência do benefício pleiteado. Com efeito, consoante dispõe o art. 2º, caput e § 2º, da LINDB, a superveniência de norma geral não implica revogação ou modificação da disciplina especial anteriormente estabelecida, salvo expressa disposição em sentido diverso ou hipótese de incompatibilidade.\r\r\n\r\r\nNa espécie, trata-se de isenção tributária instituída por lei específica, a qual deve ser regida, primordialmente, pelos requisitos nela expressamente previstos. Desse modo, ausente, na Lei nº 8.989/95, previsão de exigência de regularidade fiscal e/ou anotação restritiva na CNH como condição para o reconhecimento do benefício, não se revela legítima a imposição administrativa de condicionante não contemplada na legislação de regência.\r\r\n\r\r\nNesse mesmo sentido é a jurisprudência do STJ:\r\r\n\r\r\nTRIBUTÁRIO. IMPOSTO SOBRE PRODUTOS INDUSTRIALIZADOS. ISENÇÃO. AQUISIÇÃO DE VEÍCULO. PORTADOR DE DEFICIÊNCIA. REGULARIDADE FISCAL. COMPROVAÇÃO. DESNECESSIDADE.\r\r\n\r\r\n1. Nos termos do § 6º do art. 150 da CF/1988 e do art. 2º, caput e § 2º, do Decreto-Lei n. 4.657/1942, a isenção estabelecida pela Lei n.8.989/1995, em favor dos portadores de deficiência, deve ser regulada exclusivamente pelas disposições legais nela veiculadas, entre as quais não se encontra a comprovação da regularidade fiscal.\r\r\n\r\r\n2. Hipótese em que o Tribunal Regional Federal da 4ª Região decidiu acertadamente não ser necessária a comprovação da regularidade fiscal para fruição do benefício, uma vez que essa condição não se encontra prevista em lei.\r\r\n\r\r\n3. Recurso especial parcialmente conhecido e não provido.\"\r\r\n\r\r\n(STJ, REsp 1.822.097/RS, Rel. Ministro Gurgel de Faria, Primeira Turma, Julgamento: 05/09/2019, DJe 26/09/2019).\r\r\n\r\r\nNo mesmo sentido, colhem-se precedentes deste Egrégio Tribunal: Processo nº 0804187-36.2021.4.05.8300, Apelação/Remessa Necessária, Desembargador Relator.: Rogério de Meneses Fialho Moreira, Julgamento: 23/06/2022, 3ª Turma; Processo nº 0807791-57.2020.4.05.8100, Apelação Cível, Desembargador Relator: Cid Marconi Gurgel de Souza, Julgamento: 04/02/2021, 3ª Turma.\r\r\n\r\r\nAssim, não há como negar à apelante o direito à isenção de IPI na aquisição de veículo automotor, porquanto restaram preenchidos os requisitos legais para a fruição do benefício fiscal.\r\r\n\r\r\nEm face do exposto, DOU PROVIMENTO à apelação.\r\r\n\r\r\nÉ como voto.", "acordao": "Vistos, etc.\r\r\n\r\r\nDecide a 3ª Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, DAR PROVIMENTO à apelação, nos termos do voto do relator e na forma do relatório constante dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido"}, {"nome": "20260317_142238_Re__VOTO.0000946-82.2026.4.05.0000.VIRTUAL.26.03.2026", "cnj": "0000946-82.2026.4.05.0000", "cab": "PROCESSO Nº: 0000946-82.2026.4.05.0000 - AGRAVO DE INSTRUMENTO", "assessor": "Ana Carolina Olímpia Portella", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "PREVIDENCIÁRIO. AGRAVO DE INSTRUMENTO. TUTELA ANTECIPADA. PEDIDO DE EFEITO SUSPENSIVO. PRORROGAÇÃO DE BENEFÍCIO.  AGRAVO IMPROVIDO.\r\r\n\r\r\n 1. de instrumento, com pedido de atribuição de efeito suspensivo, interposto pelo INSTITUTO NACIONAL DO SEGURO SOCIAL - INSS contra decisão proferida pelo Juízo da 9ª Vara Federal da Seção Judiciária do Rio Grande do Norte que deferiu a liminar para determinar o restabelecimento do benefício de auxílio por incapacidade temporária percebido pela parte autora fixando a data de cessação do benefício (DCB) em 30 (trinta) dias após a comunicação da decisão final proferida nos autos do processo administrativo (DCB em 20/02/2026).\r\r\n\r\r\n 2. A autarquia previdenciária alega que a perícia médica realizada em 15/01/2026 (DCB inicial) concluiu pela ausência de incapacidade laboral atual, pelo que, o procedimento correto não seria o pedido de prorrogação, mas sim o recurso administrativo ou pedido de reconsideração, inexistindo o direito ao restabelecimento automático.\r\r\n\r\r\n 3. O STF, no julgamento do Tema 1.196 sob o Rito Especial de Repercussão Geral, reconheceu a constitucionalidade da estipulação de prazo estimado para a duração do benefício de auxílio-doença, conforme previsto no art. 60, §§ 8º e 9º, da Lei nº 8.213/91. A mesma legislação (Lei nº 8.213/91) que autoriza a alta programada exige, em contrapartida, que, não cessada a incapacidade, o segurado seja notificado e tenha a oportunidade de solicitar a prorrogação do benefício.\r\r\n\r\r\n 4. O fato de a perícia coincidir com a data de cessação do benefício inviabilizou o pedido de prorrogação - o impetrante/agravado, inclusive, apresenta comprovação documental de que o sistema do INSS impediu o protocolo do pedido de prorrogação, exibindo mensagem de bloqueio. Tal conduta administrativa representa uma restrição a direito não prevista em lei, violando o devido processo legal e o direito à ampla defesa do segurado na esfera administrativa.\r\r\n\r\r\n 5. Ao bloquear o pedido de prorrogação e sugerir o pedido de reconsideração, a autarquia impõe um ônus indevido ao segurado, obrigando-o a aceitar a cessação para depois tentar reverter a decisão, em flagrante violação ao Princípio da Proteção Social e ao devido processo legal administrativo.\r\r\n\r\r\n 6. A decisão agravada não concedeu o benefício por prazo indeterminado, nem invadiu o mérito da perícia, mas se limitou a corrigir uma ilegalidade procedimental ao determinar que o INSS oportunize o rito legal, assegurando o direito do segurado de utilizar o instrumento adequado e tempestivo para a continuidade de seu sustento.\r\r\n\r\r\n 7. As Cortes Superiores já consolidaram entendimento no sentido de que, na hipótese de dúvida quanto à continuidade da incapacidade, deve prevalecer a proteção ao segurado, garantindo-lhe o mínimo existencial.\r\r\n\r\r\n 8. Ausente perícia que comprove a recuperação da capacidade laborativa, mostra-se razoável a manutenção do benefício até que nova avaliação médica seja realizada.\r\r\n\r\r\n 9. Agravo de instrumento improvido.", "relatorio": "Trata-se de agravo de instrumento, com pedido de atribuição de efeito suspensivo, interposto pelo INSTITUTO NACIONAL DO SEGURO SOCIAL - INSS contra decisão proferida pelo Juízo da 9ª Vara Federal da Seção Judiciária do Rio Grande do Norte que deferiu a liminar para determinar o restabelecimento do benefício de auxílio por incapacidade temporária percebido pela parte autora fixando a data de cessação do benefício (DCB) em 30 (trinta) dias após a comunicação da decisão final proferida nos autos do processo administrativo (DCB em 20/02/2026).\r\r\n\r\r\n Nas razões recursais, sustenta, em apertada síntese que a perícia médica realizada em 15/01/2026 (DCB inicial) concluiu pela ausência de incapacidade laboral atual, pelo que, o procedimento correto não seria o pedido de prorrogação, mas sim o recurso administrativo ou pedido de reconsideração, inexistindo o direito ao restabelecimento automático.\r\r\n\r\r\n Pedido de efeito suspensivo indeferido.\r\r\n\r\r\n Contrarrazões não apresentadas.\r\r\n\r\r\n É o relatório.", "voto": "O STF, no julgamento do Tema 1.196 sob o Rito Especial de Repercussão Geral, reconheceu a constitucionalidade da estipulação de prazo estimado para a duração do benefício de auxílio-doença, conforme previsto no art. 60, §§ 8º e 9º, da Lei nº 8.213/91.\r\r\n\r\r\n Portanto, o ato de fixar a DCB pelo INSS está, em tese, amparado pela lei e pela jurisprudência da Suprema Corte.\r\r\n\r\r\n Ocorre que a mesma legislação (Lei nº 8.213/91) que autoriza a alta programada exige, em contrapartida, que, não cessada a incapacidade, o segurado seja notificado e tenha a oportunidade de solicitar a prorrogação do benefício.\r\r\n\r\r\n Conforme narrado na petição inicial, o fato de a perícia coincidir com a data de cessação do benefício inviabilizou o pedido de prorrogação - o impetrante/agravado, inclusive, apresenta comprovação documental de que o sistema do INSS impediu o protocolo do pedido de prorrogação, exibindo mensagem de bloqueio.\r\r\n\r\r\n Tal conduta administrativa representa uma restrição a direito não prevista em lei, violando o devido processo legal e o direito à ampla defesa do segurado na esfera administrativa.\r\r\n\r\r\n Isso porque, ao bloquear o pedido de prorrogação e sugerir o pedido de reconsideração, a autarquia impõe um ônus indevido ao segurado, obrigando-o a aceitar a cessação para depois tentar reverter a decisão, em flagrante violação ao Princípio da Proteção Social e ao devido processo legal administrativo.\r\r\n\r\r\n Dito isso, tenho que a decisão agravada não concedeu o benefício por prazo indeterminado, nem invadiu o mérito da perícia, mas se limitou a corrigir uma ilegalidade procedimental ao determinar que o INSS oportunize o rito legal, assegurando o direito do segurado de utilizar o instrumento adequado e tempestivo para a continuidade de seu sustento.\r\r\n\r\r\n Ainda que a atuação administrativa esteja pautada, entre outros, nos princípios da legalidade, impessoalidade, eficiência e moralidade, certo é que também deve estar sensível aos interesses do administrado, valendo-se de interpretações flexíveis e razoáveis quanto à forma do procedimento, sob pena de esta ser vista como fim em si mesma, desligada da verdadeira finalidade do processo.\r\r\n\r\r\n Além disso, as Cortes Superiores já consolidaram entendimento no sentido de que, na hipótese de dúvida quanto à continuidade da incapacidade, deve prevalecer a proteção ao segurado, garantindo-lhe o mínimo existencial.\r\r\n\r\r\n Assim, ausente perícia que comprove a recuperação da capacidade laborativa, mostra-se razoável a manutenção do benefício até que nova avaliação médica seja realizada.\r\r\n\r\r\n Do exposto, nego provimento ao agravo de instrumento.\r\r\n\r\r\n É como voto.", "acordao": "Vistos, etc.\r\r\n\r\r\n Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO ao agravo de instrumento, nos termos do voto do relator, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido"}, {"nome": "20260317_165045_Re__VOTO.0018835-21.2025.4.05.8201.ORDINÁRIA.26.03.2026", "cnj": "0018835-21.2025.4.05.8201", "cab": "APELAÇÃO CÍVEL (198) Nº 0018835-21.2025.4.05.8201", "assessor": "Wellington dos Santos Santana", "comentario": "Ok", "tipo": "Ordinária", "data": "26.03.2026", "ementa": "CONSTITUCIONAL E ADMINISTRATIVO. AÇÃO ORDINÁRIA. CONCURSO PÚBLICO MUNICIPAL. PROFISSIONAIS MÉDICOS. APELAÇÃO CÍVEL. PRELIMINAR DE NULIDADE DA SENTENÇA POR AUSÊNCIA DE CITAÇÃO. COMPARECIMENTO ESPONTÂNEO. INSTRUMENTALIDADE DAS FORMAS. PEDIDO DE SUSPENSÃO DO FEITO EM RAZÃO DO TEMA 1250 DO STF. INEXISTÊNCIA DE DETERMINAÇÃO DE SOBRESTAMENTO. LEI Nº 3.999/1961. JORNADA DE TRABALHO E PISO SALARIAL. SERVIDORES MUNICIPAIS ESTATUTÁRIOS. AUTONOMIA ADMINISTRATIVA E ORÇAMENTÁRIA DO ENTE FEDERATIVO. INAPLICABILIDADE DO PISO SALARIAL LEGAL À REMUNERAÇÃO DE SERVIDORES PÚBLICOS. APLICAÇÃO DA LEI FEDERAL QUANTO À JORNADA DE TRABALHO. RECURSO PARCIALMENTE PROVIDO.\r\r\n\r\r\n 1. Apelação cível interposta pelo Município de Olivedos/PB contra sentença que determinou a retificação do Edital nº 01/2025 de concurso público municipal, para adequar a jornada de trabalho dos médicos a 20 horas semanais e fixar o piso remuneratório em três salários mínimos, nos termos da Lei nº 3.999/1961.\r\r\n\r\r\n 2. Na origem, trata-se de ação proposta pelo Sindicato dos Médicos do Estado da Paraíba e pelo Conselho Regional de Medicina do Estado da Paraíba visando compelir o Município de Olivedos/PB a adequar o edital de concurso público destinado ao provimento do cargo de Médico às disposições da Lei nº 3.999/1961, especialmente quanto à jornada de trabalho e ao piso remuneratório da categoria.\r\r\n\r\r\n 3. O edital impugnado previa remuneração de R$ 3.000,00, acrescida de gratificação, para jornada de 40 horas semanais, circunstância que, segundo os autores da ação, estaria em desacordo com o piso salarial e a carga horária previstos na legislação federal que regula o exercício da profissão médica.\r\r\n\r\r\n 4. O Juízo de primeiro grau julgou parcialmente procedente a demanda, determinando a retificação do edital para fixar o piso remuneratório em três salários mínimos e limitar a jornada de trabalho dos médicos a 20 horas semanais, nos termos da Lei nº 3.999/1961.\r\r\n\r\r\n 5. Em suas razões recursais, o Município sustenta, preliminarmente, a nulidade da sentença por ausência de citação válida, alegando ter tomado ciência da demanda apenas em 17/10/2025. No mérito, defende a inaplicabilidade da Lei nº 3.999/1961 aos servidores públicos municipais submetidos a regime estatutário, sob o argumento de que a referida norma teria sido concebida para disciplinar relações de emprego regidas pela CLT, não podendo impor piso salarial obrigatório aos entes federativos.\r\r\n\r\r\n 6. A controvérsia recursal consiste em definir: (i) a existência de nulidade da sentença por ausência de citação válida; (ii) a possibilidade de suspensão do feito em razão do reconhecimento de repercussão geral no RE nº 1.416.266/PE (Tema 1250); e (iii) a aplicabilidade da Lei nº 3.999/1961 aos servidores públicos municipais quanto ao piso salarial e à jornada de trabalho.\r\r\n\r\r\n 7. A preliminar de nulidade por ausência de citação é afastada, pois o comparecimento espontâneo do Município aos autos supre eventual irregularidade do ato citatório, nos termos do art. 239, §1º, do CPC. A ciência inequívoca da demanda em 17/10/2025, seguida da interposição de agravo de instrumento, evidencia o pleno exercício do contraditório e da ampla defesa, inexistindo demonstração de prejuízo apta a justificar a anulação dos atos processuais. Ademais, observa-se que, mesmo na data em que o próprio ente municipal afirma ter tomado conhecimento da demanda, ainda estava em curso o prazo para apresentação de contestação, o que afasta a alegação de prejuízo processual e inviabiliza o reconhecimento de nulidade.\r\r\n\r\r\n 8. O pedido de suspensão do processo em razão do Tema 1250 do STF também é rejeitado, uma vez que, no Recurso Extraordinário nº 1.416.266/PE, a Suprema Corte limitou-se a reconhecer a repercussão geral da matéria constitucional relativa à obrigatoriedade de observância do piso salarial profissional estabelecido por lei federal, sem determinar a suspensão dos processos em tramitação.\r\r\n\r\r\n 9. No mérito, a jurisprudência consolidada da Terceira Turma do TRF da 5ª Região entende que o piso salarial previsto na Lei nº 3.999/1961 aplica-se às relações de emprego estabelecidas sob regime celetista com pessoas físicas ou jurídicas de direito privado, não alcançando os vínculos estatutários mantidos com entes federativos, em razão da autonomia administrativa e orçamentária municipal para fixação da remuneração de seus servidores.\r\r\n\r\r\n 10. Por outro lado, a mesma jurisprudência reconhece que a jornada de trabalho prevista na Lei nº 3.999/1961 constitui condição para o exercício da profissão, matéria inserida na competência privativa da União para legislar sobre profissões regulamentadas (art. 22, XVI, da Constituição Federal), devendo ser observada também no âmbito da Administração Pública.\r\r\n\r\r\n 11. Assim, a autonomia administrativa dos municípios não autoriza a fixação de jornada diversa daquela estabelecida na legislação federal que disciplina o exercício da atividade médica, sendo legítima a adequação do edital do concurso público à carga horária semanal de 20 horas.\r\r\n\r\r\n 12. Conclui-se que a Lei nº 3.999/1961 não impõe aos entes municipais a observância do piso remuneratório nela previsto para servidores estatutários, mas estabelece jornada máxima de trabalho aplicável aos profissionais médicos, por se tratar de norma federal que regula condições para o exercício profissional.\r\r\n\r\r\n 13. Apelação parcialmente provida para afastar a determinação de adequação da remuneração prevista no Edital nº 01/2025 ao piso salarial de três salários mínimos, mantendo-se a sentença no ponto em que determinou a limitação da jornada de trabalho dos médicos a 20 horas semanais. Honorários mantidos na forma fixada na sentença, sem majoração.", "relatorio": "Trata-se de Apelação Cível interposta pelo Município de Olivedos contra sentença proferida pelo Juízo da 4ª Vara Federal da Seção Judiciária de Campina Grande/PB, com o objetivo de obter a cassação ou reforma da decisão que determinou a retificação do Edital nº 01/2025 do concurso público municipal para adequar a jornada de trabalho dos médicos a 20 horas semanais e fixar o piso remuneratório em três salários mínimos, conforme a Lei nº 3.999/1961.\r\r\n\r\r\n Alega o recorrente que a sentença é nula em razão da ausência de citação válida do Município, circunstância que teria levado à indevida decretação de revelia e à prolação de sentença sem a observância do contraditório e da ampla defesa. Sustenta que a Fazenda Pública deve ser citada pessoalmente, inclusive por meio do domicílio eletrônico no sistema do Processo Judicial Eletrônico, o que não teria ocorrido, inexistindo procurador cadastrado ou citação física válida. Afirma que somente tomou ciência da existência da demanda em 17/10/2025, após pesquisa realizada por sua assessoria jurídica no sistema PJe, ocasião em que interpôs agravo de instrumento. Argumenta que, considerado esse momento como marco do comparecimento espontâneo, o prazo para apresentação de contestação ainda estava em curso quando a sentença foi proferida, razão pela qual não poderia ter sido considerado revel. Defende que tal irregularidade constitui nulidade absoluta, impondo a cassação da sentença e o retorno dos autos ao juízo de origem para reabertura do prazo de defesa.\r\r\n\r\r\n No mérito, sustenta que a decisão incorreu em error in judicando ao aplicar a Lei nº 3.999/1961 aos servidores públicos municipais, argumentando que o referido diploma legal teria sido concebido para regular relações de emprego no setor privado regidas pela Consolidação das Leis do Trabalho, não se aplicando a vínculos estatutários.\r\r\n\r\r\n Aduz que a remuneração dos servidores municipais depende de lei específica de iniciativa do chefe do Poder Executivo local, em respeito à autonomia federativa e à repartição constitucional de competências.\r\r\n\r\r\n Acrescenta que decisão liminar anteriormente proferida em agravo de instrumento reconheceu a plausibilidade de sua tese ao suspender os efeitos da tutela concedida em primeiro grau, razão pela qual sustenta a necessidade de reforma integral da sentença.\r\r\n\r\r\n Em suas contrarrazões, o Sindicato dos Médicos do Estado da Paraíba e o Conselho Regional de Medicina do Estado da Paraíba sustentam que a sentença deve ser mantida integralmente, por ter aplicado corretamente a legislação federal e a jurisprudência consolidada do Supremo Tribunal Federal.\r\r\n\r\r\n Argumentam que a Constituição Federal atribui à União competência privativa para legislar sobre condições para o exercício das profissões, o que abrange a definição de jornada de trabalho e piso remuneratório das categorias profissionais, razão pela qual a Lei nº 3.999/1961 possui caráter nacional e prevalece sobre eventuais disposições municipais em sentido contrário.\r\r\n\r\r\n  Destacam que o STF, inclusive no julgamento da ADPF 325 e em recursos extraordinários recentes, reconheceu a constitucionalidade da referida lei e sua aplicabilidade também aos vínculos estatutários, afastando alegações de violação à autonomia municipal.\r\r\n\r\r\n  Defendem, ainda, que a alegação de nulidade por ausência de citação não procede, pois o comparecimento espontâneo do Município aos autos, ao interpor agravo de instrumento e posteriormente a apelação, supre eventual vício formal, além de inexistir demonstração concreta de prejuízo processual. Acrescentam que eventual decisão liminar concedida no agravo de instrumento possui natureza provisória e não tem o condão de afastar os efeitos da sentença de mérito posteriormente proferida.\r\r\n\r\r\n Por fim, sustentam que o Município não comprovou impacto financeiro efetivo decorrente da aplicação do piso legal, afirmando que a manutenção do edital em desacordo com a legislação federal compromete a valorização da profissão médica, reduz a atratividade do concurso público e pode prejudicar a continuidade dos serviços de saúde à população.\r\r\n\r\r\n Petição apresentada pelo Sindicato dos Médicos do Estado da Paraíba e pelo Conselho Regional de Medicina do Estado da Paraíba, na qual requerem a suspensão do processo, em razão do reconhecimento da repercussão geral no Recurso Extraordinário nº 1.416.266 (Tema 1250), cuja matéria submetida à apreciação do Supremo Tribunal Federal guarda correspondência com a controvérsia discutida nos presentes autos.\r\r\n\r\r\n É o relatório.\r\r\n\r\r\n APELAÇÃO CÍVEL (198) Nº 0018835-21.2025.4.05.8201\r\r\n\r\r\n APELANTE: MUNICIPIO DE OLIVEDOS\r\r\n\r\r\n ADVOGADO do(a) APELANTE: ALBERTO JORGE SANTOS LIMA CARVALHO - PB11106\r\r\n APELADO: SINDICATO DOS MEDICOS DO ESTADO DA PARAIBA, CONSELHO REGIONAL DE MEDICINA DO ESTADO DA PARAIBA\r\r\n\r\r\n ADVOGADO do(a) APELADO: ADILSON DE QUEIROZ COUTINHO FILHO - PB12897\r\r\n\r\r\n ADVOGADO do(a) APELADO: RODRIGO NÓBREGA FARIAS - PB10220", "voto": "Recebo a apelação interposta, considerando presentes os requisitos intrínsecos e extrínsecos para a admissibilidade do recurso.\r\r\n\r\r\n A presente controvérsia tem origem em ação proposta pelo Sindicato dos Médicos do Estado da Paraíba e pelo Conselho Regional de Medicina do Estado da Paraíba em face do Município de Olivedos/PB, visando à adequação do Edital nº 01/2025 de concurso público municipal destinado ao provimento do cargo de Médico Clínico Geral. No edital impugnado, a remuneração prevista para o cargo foi fixada em R$ 3.000,00, acrescida de gratificação, para jornada de 40 horas semanais, circunstância que, segundo os autores da ação, estaria em desacordo com o piso salarial da categoria médica previsto na Lei nº 3.999/1961.\r\r\n\r\r\n Diante disso, os autores pleitearam judicialmente a retificação do edital para adequar a jornada e o piso remuneratório dos cargos médicos aos parâmetros previstos na legislação federal.\r\r\n\r\r\n O Juízo da 4ª Vara Federal da Seção Judiciária de Campina Grande/PB, em sede de cognição inicial, deferiu parcialmente tutela de urgência determinando a adequação do edital. Posteriormente, foi proferida sentença que julgou parcialmente procedente o pedido, determinando que o Município promovesse a retificação do edital para fixar o piso remuneratório em três salários mínimos para jornada de 20 horas semanais, conforme a Lei nº 3.999/1961.\r\r\n\r\r\n A tese recursal central sustentada pelo Município apelante consiste na inaplicabilidade da Lei nº 3.999/1961 aos servidores públicos municipais submetidos ao regime estatutário, sob o fundamento de que tal diploma legal teria sido concebido para regular relações de emprego no setor privado regidas pela Consolidação das Leis do Trabalho. Assim, defende que a fixação da remuneração e da jornada de trabalho dos médicos integrantes do quadro municipal depende de lei específica local, em respeito à autonomia administrativa e legislativa dos entes federativos, não podendo a legislação federal impor piso salarial obrigatório ao Município.\r\r\n\r\r\n De início, não prospera a preliminar de nulidade da sentença por ausência de citação válida. Isso porque, conforme sustentado pelo Conselho Regional de Medicina do Estado da Paraíba e pelo Sindicato dos Médicos do Estado da Paraíba, o comparecimento espontâneo do réu supre a falta ou eventual irregularidade da citação, nos termos do art. 239, § 1º, do CPC. Nos autos, o próprio Município afirma que tomou ciência inequívoca da demanda em 17/10/2025, tanto que, a partir dessa ciência, adotou providência processual concreta ao interpor o Agravo de Instrumento nº 0005567-59.2025.4.05.0000, demonstrando pleno conhecimento da existência da ação e aptidão para o exercício do contraditório e da ampla defesa. Nessas condições, eventual vício formal do ato citatório não autoriza, por si só, a decretação de nulidade, sobretudo porque o processo civil contemporâneo repele nulidades sem demonstração efetiva de prejuízo, à luz do princípio da instrumentalidade das formas.\r\r\n\r\r\n Também não se verifica prejuízo processual concreto. O próprio recorrente sustenta que sua ciência do feito ocorreu em 17/10/2025 e que a sentença foi proferida em 10/11/2025. Assim, mesmo sob a ótica da tese recursal, ainda estava em curso o prazo para contestação quando o Município afirma ter tomado conhecimento da demanda. Esse dado, longe de evidenciar nulidade insanável, revela que havia possibilidade de atuação processual tempestiva no feito originário, de modo que a parte tinha condições de deduzir defesa, requerer prazo, juntar documentos e suscitar as matérias pertinentes, não sendo possível reconhecer nulidade absoluta sem comprovação de efetivo cerceamento. A alegação genérica de prejuízo, desacompanhada de demonstração específica de impossibilidade de defesa, não basta para invalidar a marcha processual.\r\r\n\r\r\n Além disso, as contrarrazões registram que, ao consultar a aba de expedientes do processo, consta que o Município foi regularmente citado por meio de expedição eletrônica, não se extraindo dos autos elemento seguro apto a infirmar, de plano, a presunção de regularidade do ato processual. A alegação de direcionamento a procurador não vinculado, por sua vez, não afasta essa presunção, especialmente quando incumbia ao próprio ente público manter atualizados seus cadastros e representantes no sistema eletrônico. Ainda que assim não fosse, a ciência inequívoca posterior e a efetiva prática de ato processual pela municipalidade retiram consistência da tese de nulidade, pois a finalidade essencial da citação - dar conhecimento da demanda e viabilizar a defesa - foi alcançada.\r\r\n\r\r\n Desse modo, não há base para desconstituir a sentença por vício de citação. A controvérsia deve ser resolvida à luz da inexistência de prejuízo demonstrado, da incidência do art. 239, § 1º, do CPC e do fato de que o Município, desde 17/10/2025, já detinha ciência inequívoca da ação, tendo inclusive adotado providência recursal, o que inviabiliza o reconhecimento da nulidade pretendida.\r\r\n\r\r\n No que se refere ao pedido de suspensão formulado pelo Conselho e pelo Sindicato, não há razão para seu acolhimento. Isso porque o Supremo Tribunal Federal, ao apreciar o Recurso Extraordinário nº 1.416.266/PE (Tema 1250), limitou-se a reconhecer a existência de repercussão geral da matéria constitucional discutida - consistente na obrigatoriedade de observância do piso salarial de categoria profissional fixado em lei federal, inclusive em relação aos servidores públicos municipais, à luz da competência da União prevista no art. 22, XVI, da Constituição Federal - sem, contudo, determinar a suspensão dos processos em curso sobre o tema. Dessa forma, inexistindo determinação expressa da Suprema Corte nesse sentido, não há fundamento para sobrestar o presente feito.\r\r\n\r\r\n No mérito, o art. 22, inciso XVI, da Constituição Federal dispõe que compete privativamente à União legislar sobre a \"organização do sistema nacional de emprego e condições para o exercício de profissões\". Nessa perspectiva, a Lei nº 3.999/61 concretiza tal mandamento constitucional no que se refere à regulamentação da atividade dos médicos.\r\r\n\r\r\n Assim, o entendimento pessoal do Relator é no sentido de que, existente legislação federal sobre o assunto, prevalece, em virtude da competência acima referida, a norma federal em detrimento da norma municipal, o que limita a autonomia do município, tornando obrigatório o cumprimento das disposições da Lei nº 3.999/61, que regula o exercício da profissão de médico/cirurgiões dentistas, no que tange ao preenchimento de cargo de profissionais dessa área.\r\r\n\r\r\n Entretanto, a Eg. Terceira Turma, em sua composição ampliada, ao julgar a AC nº 0800543-30.2022.4.05.8404, em sessão de 11/02/2024, decidiu que extrai-se, do enunciado normativo contido nos arts. 4º e 22 da Lei nº 3.999/1961, que o salário-mínimo ali referido se aplica apenas aos médicos que atuam na iniciativa privada. Confira-se:\r\r\n\r\r\n \"Art. 4º É salário-mínimo dos médicos a remuneração mínima, permitida por lei, pelos serviços profissionais prestados por médicos, com a relação de emprêgo, a pessoas físicas ou jurídicas de direito privado.\r\r\n\r\r\n (...)\r\r\n\r\r\n Art. 22. As disposições desta lei são extensivas aos cirurgiões dentistas, inclusive aos que trabalham em organizações sindicais\".\r\r\n\r\r\n O entendimento que passou a prevalecer no âmbito da Terceira Turma é o de que a Lei nº 3.999/61 se aplica às relações de emprego estabelecidas sob regime celetista com pessoas físicas ou jurídicas de direito privado, o que não corresponde à hipótese dos autos, pois aqui se discute vínculo funcional estabelecido com ente federativo.\r\r\n\r\r\n Considerando que o Município detém autonomia orçamentária para fixar a remuneração dos cargos que pretende prover mediante concurso público, não se revela plausível compelir-lhe a adotar vencimentos superiores àqueles definidos em seus atos normativos próprios, editados nos termos do art. 39 da Constituição da República de 1988.\r\r\n\r\r\n A pretensão deduzida pelo Município está de acordo com o entendimento firmado pelo Supremo Tribunal Federal no sentido da impossibilidade de vinculação da remuneração de servidores públicos a pisos salariais profissionais (Precedente: ADI 668, Pleno, Rel. Min. Dias Toffoli, j. 19/02/2014, pub. 28/03/2014).\r\r\n\r\r\n No mesmo sentido, reconheceu-se que \"(...) é possível que um ente municipal, dentro de sua autonomia como ente federativo, ao editar estatuto para disciplinar sua relação com ocupantes de cargo público, disponha livremente sobre os direitos e deveres de seus servidores, sem vinculação à legislação federal, desde que observados os direitos constitucionalmente previstos. Ademais, merece relevo que, embora a Lei nº 3.999/1961 preveja piso salarial aplicável aos cirurgiões dentistas (art. 22) - e num valor superior ao oferecido no Edital nº 01/2019 -, também ressalva que tal contrapartida deve alcançar serviços profissionais prestados a pessoas físicas e jurídicas de direito privado (art. 4º), o que não é o caso dos autos.\" (PROCESSO: 08000675620214058103, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL BRUNO LEONARDO CAMARA CARRA (CONVOCADO), 4ª TURMA, JULGAMENTO: 21/06/2022).\r\r\n\r\r\n Dessa forma, a jurisprudência da 3ª Turma do TRF5 afasta a imposição do piso previsto na Lei nº 3.999/61 aos servidores municipais, por entender que a autonomia financeira e administrativa do ente federado prevalece na definição de sua política remuneratória.\r\r\n\r\r\n Nesse sentido: (PROCESSO: 08000928020234058303, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL RAFAEL CHALEGRE DO REGO BARROS (CONVOCADO), 3ª TURMA, JULGAMENTO: 01/08/2024).\r\r\n\r\r\n Com a mesma temática: (PROCESSO: 08061972420194058300, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL BRUNO LEONARDO CAMARA CARRA, 6ª TURMA, JULGAMENTO: 22/04/2025); (PROCESSO: 08006030520234058101, APELAÇÃO CÍVEL, DESEMBARGADORA FEDERAL CIBELE BENEVIDES GUEDES DA FONSECA, 5ª TURMA, JULGAMENTO: 25/02/2025).\r\r\n\r\r\n No que se refere à fixação da jornada de trabalho dos profissionais de saúde citados, o entendimento fixado no julgamento desta demanda pela 3ª Turma, em sua composição ampliada, foi no sentido de que o Município deve observar as disposições da referida Lei nº 3.999/1961 quanto à jornada de trabalho dos médicos/cirurgiões dentistas, seja para os servidores estatutários seja para os empregados celetistas e temporários.\r\r\n\r\r\n Dessa forma, a autonomia administrativa dos entes municipais não autoriza a fixação de jornada diversa da prevista na Lei Federal nº 3.999/61 para os profissionais da medicina/cirurgiões dentistas, uma vez que tal norma estabelece condição para o exercício profissional e não disciplina a organização administrativa local - esta, sim, inserida na esfera de competência dos municípios.\r\r\n\r\r\n Assim, conclui-se que o edital do concurso público lançado pelo Município de Olivedos está em dissonância com a carga horária prevista na Lei nº 3.999/1961, que estabelece uma jornada de 20h semanais.\r\r\n\r\r\n No mesmo sentido, transcrevo precedente desta Eg. Turma:\r\r\n\r\r\n CONSTITUCIONAL E ADMINISTRATIVO. CONSELHO REGIONAL DE ODONTOLOGIA. ADEQUAÇÃO DO PISO SALARIAL E DA JORNADA DE TRABALHO. TRABALHO E CONDIÇÕES PARA O EXERCÍCIO DE PROFISSÕES. COMPETÊNCIA PRIVATIVA DA UNIÃO. LEI Nº 3.999/61. PISO SALARIAL. INAPLICABILIDADE A SERVIDORES PÚBLICOS. EXEGESE DO ART. 39, CF/88. AUTONOMIA MUNICIPAL. APELAÇÃO PARCIALMENTE PROVIDA. AGRAVO INTERNO PREJUDICADO.\r\r\n\r\r\n 1. Apelação interposta pelo Conselho Regional de Odontologia do Ceara contra sentença que julgou improcedente ação civil pública ajuizada em face do Município de General Sampaio/CE, objetivando que o réu aplique aos cirurgiões dentistas o piso salarial e a carga horária previstos na Lei nº. 3.999/1961, retificando o edital nº. 001/2023 em andamento para provimento desse cargo ou suspendendo o certame.\r\r\n\r\r\n 2. A questão preliminar suscitada pelo Conselho apelante deve ser rejeitada, haja vista que o STF, no Recurso Extraordinário nº 1.416.266/PE, apenas reconheceu a existência de repercussão geral acerca da questão constitucional suscitada, qual seja, a \"obrigatoriedade de observância do piso salarial da categoria profissional, estabelecido por lei federal, inclusive em relação aos servidores públicos municipais, ante a competência da União prevista no art. 22, XVI, da Constituição Federal\", sem determinar a suspensão dos feitos em tramitação.\r\r\n\r\r\n 3. A teor do entendimento firmado por esta Terceira Turma, em sua composição ampliada, em virtude da competência referida no art. 22, incisos I e XVI, da Constituição Federal, prevalece \"a norma federal em detrimento da norma municipal, o que limita a autonomia do município, tornando obrigatório o cumprimento das disposições da Lei nº 3.999/61, que regula o exercício da profissão de cirurgião dentista, no que tange ao preenchimento de cargo de profissional dessa área. Ocorre que, extrai-se do enunciado normativo contido nos arts. 4º e 22 da Lei nº 3.999/1961, que o salário-mínimo ali referido se aplica apenas aos cirurgiões-dentistas que atuam na iniciativa privada.\", de modo que \"a norma em referência guarda pertinência com serviços profissionais prestados por médicos e cirurgiões-dentistas com relação de emprego (isto é, sob regime celetista), a pessoas físicas ou jurídicas de direito privado\", não sendo essa a hipótese em apreço, já que envolve ente da federação e o provimento de cargo estatutário de odontólogo e não de celetista, consoante se observa do Edital nº 001/2023.\r\r\n\r\r\n 4. Com relação à jornada de trabalho, o entendimento fixado pela Turma foi no sentido de que o Município deve observar as disposições da Lei nº 3.999/1961 quanto à jornada de trabalho dos cirurgiões-dentistas, seja para os servidores estatutários seja para os empregados celetistas e temporários (PROCESSO: 08045776020224058400, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL CID MARCONI GURGEL DE SOUZA, 3ª TURMA, JULGAMENTO: 20/02/2024)\r\r\n\r\r\n 5. Apelação parcialmente provida, para condenar o Município de General Sampaio/CE a retificar o Edital nº 001/2023 e aplicar a Lei nº 3.999/61 apenas quanto à jornada de trabalho dos Cirurgiões-Dentistas. Agravo interno prejudicado.\r\r\n\r\r\n (PROCESSO: 08010861120234058109, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL ROGÉRIO DE MENESES FIALHO MOREIRA, 3ª TURMA, JULGAMENTO: 29/05/2025)\r\r\n\r\r\n Ante o exposto, rejeito as preliminares suscitadas e, no mérito, dou parcial provimento à apelação interposta pelo Município de Olivedos, para afastar a determinação de adequação da remuneração prevista no Edital nº 01/2025 ao piso salarial de três salários-mínimos, mantendo-se, contudo, a sentença no ponto em que determinou a retificação do edital quanto à jornada de trabalho dos cargos de médico, a fim de limitá-la a 20 (vinte) horas semanais.\r\r\n\r\r\n É como voto.", "acordao": "Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, DAR PARCIAL PROVIMENTO à apelação, nos termos do voto do relator, na forma do relatório constante dos autos, que fica fazendo parte integrante do presente julgado.\r\r\n\r\r\n Des. Federal ROGÉRIO FIALHO MOREIRA\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Parcialmente provido", "css": "parcial"}, {"nome": "20260317_165047_Re__VOTO.0025209-53.2025.4.05.8201.VIRTUAL.26.03.2026", "cnj": "0025209-53.2025.4.05.8201", "cab": "APELAÇÃO CÍVEL (198) Nº 0025209-53.2025.4.05.8201", "assessor": "Wellington dos Santos Santana", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "ADMINISTRATIVO. CONCURSO PÚBLICO. AÇÃO DE OBRIGAÇÃO DE FAZER CUMULADA COM INDENIZAÇÃO POR DANOS MORAIS E MATERIAIS. APELAÇÃO CÍVEL. CANDIDATO PCD APROVADO EM CADASTRO DE RESERVA. ABERTURA DE NOVO CERTAME. TEMA 784 DO STF. AUSÊNCIA DE PRETERIÇÃO ARBITRÁRIA E IMOTIVADA. INEXISTÊNCIA DE DIREITO SUBJETIVO À NOMEAÇÃO. AUSÊNCIA DE CERCEAMENTO DE DEFESA. INEXISTÊNCIA DE DISCRIMINAÇÃO COMPROVADA. IMPROCEDÊNCIA DOS PEDIDOS. MANUTENÇÃO DA SENTENÇA. MAJORAÇÃO DOS HONORÁRIOS. APELAÇÃO DESPROVIDA.\r\r\n\r\r\n 1. Apelação cível interposta por Samuel Pessoa de Matos contra sentença que julgou improcedentes os pedidos formulados em face da Empresa Brasileira de Serviços Hospitalares - EBSERH, por meio dos quais buscava sua convocação ou nomeação para o cargo de Analista Administrativo - Gestão Hospitalar, com lotação no Hospital Universitário Alcides Carneiro, ou, subsidiariamente, indenização por danos morais e materiais decorrentes de alegada preterição e de suposta violação à política de cotas destinada às pessoas com deficiência.\r\r\n\r\r\n 2. Na origem, trata-se de ação em que o autor, aprovado em primeiro lugar na lista específica de candidatos com deficiência e inserido em cadastro de reserva, sustenta ter sido indevidamente preterido em concurso público promovido pela EBSERH, ao argumento de que a Administração, durante a validade do certame anterior, publicou novo edital para o mesmo cargo e localidade sem proceder à sua convocação.\r\r\n\r\r\n 3. O demandante afirma que, embora tenha sido o único candidato PCD classificado para a lotação pretendida, não foi convocado no prazo de validade do concurso, sustentando que a abertura de novo certame evidenciaria a necessidade de provimento do cargo e revelaria tratamento incompatível com a efetividade da reserva de vagas destinada às pessoas com deficiência.\r\r\n\r\r\n 4. A sentença concluiu pela improcedência dos pedidos ao fundamento de que não houve demonstração de convocação de candidatos classificados em posição posterior, de existência de novas vagas efetivas para o cargo pretendido nem de prática discriminatória concreta no concurso específico do autor, assentando, ainda, que a simples abertura de novo concurso, voltado igualmente a cadastro de reserva, não gera automaticamente direito à nomeação.\r\r\n\r\r\n 5. Em apelação, o recorrente sustenta nulidade da sentença por cerceamento de defesa, sob o argumento de que o juízo deveria ter determinado a exibição de documentos administrativos e aprofundado a instrução probatória. Defende, ainda, que a sentença lhe impôs ônus probatório excessivo, que sua classificação em primeiro lugar na lista PCD, aliada à abertura de novo certame para o mesmo cargo e localidade, seria suficiente para demonstrar preterição arbitrária e necessidade inequívoca de nomeação, e que haveria discriminação e esvaziamento indevido da política de cotas.\r\r\n\r\r\n 6. A controvérsia consiste em definir se candidato aprovado em cadastro de reserva, ainda que em primeiro lugar na lista específica de pessoas com deficiência, adquiriu direito subjetivo à nomeação em razão da abertura de novo concurso durante a validade do certame anterior, bem como se a improcedência da demanda decorreu de julgamento prematuro capaz de caracterizar cerceamento de defesa.\r\r\n\r\r\n 7. Não há cerceamento de defesa quando o conjunto probatório já se mostra suficiente para o julgamento da lide e a controvérsia jurídica se restringe à verificação da presença, ou não, dos requisitos fixados no Tema 784 do STF. A instrução complementar pretendida pelo autor não se revela indispensável quando os fatos essenciais da causa já estão delimitados, consistindo a improcedência não em deficiência de instrução imputável ao juízo, mas na ausência de comprovação do fato constitutivo do direito alegado. A distribuição dinâmica do ônus da prova não se presta a suprir mera conjectura nem a substituir a demonstração mínima da tese recursal.\r\r\n\r\r\n 8. Nos termos do RE 837.311, Tema 784 da repercussão geral, o surgimento de novas vagas ou a abertura de novo concurso durante a validade do certame anterior não gera, por si só, direito subjetivo à nomeação de candidato aprovado fora das vagas previstas no edital, exigindo-se demonstração cabal de preterição arbitrária e imotivada, reveladora de inequívoca necessidade de nomeação. Inexistindo aprovação dentro do número de vagas, convocação de candidatos posicionados posteriormente ou prova de novas vagas efetivas para o cargo e a lotação em disputa, subsiste apenas expectativa de direito.\r\r\n\r\r\n 9. A posição do candidato em primeiro lugar na lista PCD assegura precedência na hipótese de convocação válida, mas não converte automaticamente cadastro de reserva em direito subjetivo à nomeação. A política de cotas deve ser observada com rigor, porém não dispensa a comprovação dos pressupostos concretos exigidos para a investidura quando o edital não previu vaga imediata. Também não se presume discriminação a partir de referências genéricas a fatos externos ou pretéritos, sendo indispensável a demonstração de ato concreto de tratamento desigual no certame específico.\r\r\n\r\r\n 10. Ausente prova de preterição arbitrária e imotivada, de violação da ordem classificatória, de discriminação específica ou de comportamento administrativo capaz de revelar necessidade inequívoca de nomeação durante o prazo de validade do concurso, permanece hígida a improcedência do pedido de obrigação de fazer e, por consequência, do pedido indenizatório, já que a responsabilidade civil não se presume sem demonstração do ato ilícito.\r\r\n\r\r\n 11. Apelação desprovida. Honorários advocatícios majorados em 1% em grau recursal, nos termos do art. 85, § 11, do CPC, mantida a suspensão de exigibilidade em razão da gratuidade da justiça.", "relatorio": "Trata-se de recurso de apelação interposto por Samuel Pessoa de Matos contra a sentença proferida pelo Juízo da 4ª Vara Federal da Seção Judiciária da Paraíba (Subseção Judiciária de Campina Grande/PB), que julgou improcedentes os pedidos formulados na ação, com o objetivo de reformar a decisão para reconhecer seu direito à convocação ou nomeação no cargo de Analista Administrativo - Gestão Hospitalar, com lotação no Hospital Universitário Alcides Carneiro (HUAC/UFCG), bem como, subsidiariamente, obter indenização por danos morais e materiais decorrentes da alegada preterição e violação da política de cotas para pessoas com deficiência em concurso público promovido pela Empresa Brasileira de Serviços Hospitalares - EBSERH.\r\r\n\r\r\n Alega o recorrente que é pessoa com deficiência e foi aprovado em primeiro lugar na lista específica de candidatos com deficiência para o cargo mencionado no concurso público EBSERH/IBFC - Região 2, sendo inclusive o único candidato PCD classificado para a referida lotação, mas não foi convocado durante o prazo de validade do certame.\r\r\n\r\r\n Sustenta que a Administração deixou de assegurar a efetividade da política de cotas prevista para pessoas com deficiência, especialmente porque, mesmo sem convocá-lo, promoveu a abertura de novo certame para o mesmo cargo e localidade durante a vigência do concurso anterior, circunstância que evidenciaria necessidade de provimento do cargo e indicaria possível preterição.\r\r\n\r\r\n Defende que a sentença recorrida incorreu em equívoco ao concluir pela inexistência de prova de preterição ou discriminação, impondo ao candidato ônus probatório excessivo, uma vez que as informações relativas a quadro de pessoal, vacâncias e convocações estão sob posse da própria Administração.\r\r\n\r\r\n Argumenta ainda que houve cerceamento de defesa, pois a improcedência foi declarada sem a produção de provas essenciais e sem determinar a exibição de documentos administrativos capazes de demonstrar a efetiva necessidade de provimento do cargo e o cumprimento da reserva de vagas destinadas a pessoas com deficiência.\r\r\n\r\r\n Em suas contrarrazões, a Empresa Brasileira de Serviços Hospitalares - EBSERH sustenta, preliminarmente, sua ilegitimidade passiva, argumentando que a execução das etapas do concurso público foi atribuída à banca organizadora contratada, responsável pela condução das fases do certame, análise de documentos e resultados, cabendo à EBSERH apenas a homologação final.\r\r\n\r\r\n Também invoca prerrogativas processuais próprias da Fazenda Pública, por se tratar de empresa pública federal responsável pela gestão de hospitais universitários e pela execução de política pública de saúde e educação.\r\r\n\r\r\n Ademais, impugna a concessão da gratuidade da justiça ao autor e o valor atribuído à causa. No mérito, defende que o candidato foi aprovado apenas para formação de cadastro de reserva, não havendo direito subjetivo à nomeação, mas mera expectativa de direito.\r\r\n\r\r\n Afirma que não houve preterição, pois não foram convocados candidatos classificados em posição posterior à do autor e não existe vaga efetiva ociosa para o cargo pretendido.\r\r\n\r\r\n  Acrescenta que o novo edital mencionado também previu apenas cadastro de reserva, sem criação de novas vagas, de modo que não se configuraria ilegalidade ou violação à ordem classificatória do concurso público.\r\r\n\r\r\n Diante disso, requer a manutenção integral da sentença que julgou improcedente o pedido inicial.\r\r\n\r\r\n É o relatório.\r\r\n\r\r\n APELAÇÃO CÍVEL (198) Nº 0025209-53.2025.4.05.8201\r\r\n\r\r\n APELANTE: SAMUEL PESSOA DE MATOS\r\r\n\r\r\n ADVOGADO do(a) APELANTE: WAGNER DE OLIVEIRA MENDES - PE38940\r\r\n APELADO: EMPRESA BRASILEIRA DE SERVICOS HOSPITALARES - EBSERH\r\r\n\r\r\n ADVOGADO do(a) APELADO: CIRLANIA MOTA ALEXANDRINO - DF69631", "voto": "Recebo a apelação interposta, considerando presentes os requisitos intrínsecos e extrínsecos para a admissibilidade do recurso.\r\r\n\r\r\n A demanda decorre de ação ajuizada por Samuel Pessoa de Matos, pessoa com deficiência, em face da Empresa Brasileira de Serviços Hospitalares - EBSERH, relacionada a concurso público para o cargo de Analista Administrativo - Gestão Hospitalar, com lotação no Hospital Universitário Alcides Carneiro (HUAC/UFCG). O autor foi aprovado em 1º lugar na lista específica de candidatos com deficiência (PCD) e sustenta que, apesar da classificação e da vigência do certame, não foi convocado para o cargo.\r\r\n\r\r\n Segundo o autor, a Administração teria demonstrado necessidade de provimento ao abrir novo concurso para o mesmo cargo e localidade durante a vigência do certame anterior, o que indicaria possível preterição e violação à política de reserva de vagas para pessoas com deficiência. Por essa razão, ajuizou ação buscando a convocação/nomeação para o cargo ou, subsidiariamente, indenização por danos morais e materiais.\r\r\n\r\r\n A sentença de primeiro grau julgou improcedentes os pedidos, por entender que não houve prova de preterição nem de discriminação e que a abertura de novo certame não comprovaria, por si só, o direito à nomeação. Inconformado, o autor interpôs recurso de apelação, pleiteando a reforma da decisão.\r\r\n\r\r\n De início, registre-se que a EBSERH é a destinatária final do certame e a gestora dos empregos públicos em disputa, razão pela qual detém poder de revisão e de correção dos atos relativos à contratação, não sendo a mera delegação de fases do concurso à banca examinadora suficiente para afastar sua sujeição ao controle jurisdicional. A jurisprudência regional, inclusive em hipóteses análogas, reconhece a legitimidade da empresa pública para figurar no polo passivo. Confira-se: (PROCESSO: 08017391520244058000, APELAÇÃO CÍVEL, DESEMBARGADORA FEDERAL CIBELE BENEVIDES GUEDES DA FONSECA, 5ª TURMA, JULGAMENTO: 06/05/2025); (PROCESSO: 08007332520244058500, APELAÇÃO / REMESSA NECESSÁRIA, DESEMBARGADOR FEDERAL ARNALDO PEREIRA DE ANDRADE SEGUNDO, 1ª TURMA, JULGAMENTO: 24/04/2025); (PROCESSO: 08058962220244058100, APELAÇÃO / REMESSA NECESSÁRIA, DESEMBARGADOR FEDERAL ANDRE LUIS MAIA TOBIAS GRANJA (CONVOCADO), 6ª TURMA, JULGAMENTO: 11/03/2025).\r\r\n\r\r\n A primeira alegação do apelante é de nulidade da sentença por cerceamento de defesa, sob o argumento de que o juízo de origem deveria ter determinado a exibição de documentos internos da EBSERH, redistribuído o ônus da prova e aprofundado a instrução para apurar eventual preterição e esvaziamento da reserva de vagas destinada a pessoas com deficiência. Não lhe assiste razão.\r\r\n\r\r\n Não houve cerceamento de defesa. O ponto central da causa sempre foi simples e objetivo. Saber se, apesar de aprovado apenas em cadastro de reserva, o autor demonstrou uma das hipóteses excepcionais que, à luz do RE 837.311, Tema 784 do Supremo Tribunal Federal, fazem nascer direito subjetivo à nomeação. A sentença enfrentou exatamente essa questão e concluiu, com acerto, que a resposta é negativa. O processo continha elementos suficientes para esse juízo, porque a própria tese do autor estava fundada, essencialmente, em dois fatos já conhecidos e delimitados, sua aprovação em cadastro de reserva e a publicação de novo edital. Ocorre que, por si só, esses fatos não bastam para gerar o direito pretendido. Assim, a produção de outras provas não era indispensável para o deslinde da controvérsia. O juiz é o destinatário da prova e pode indeferir diligências inúteis ou desnecessárias quando o conjunto já permite julgamento seguro. A improcedência, portanto, não decorreu de surpresa processual nem de supressão de defesa, mas da falta de comprovação do fato constitutivo do direito alegado.\r\r\n\r\r\n Também não procede a afirmação de que a sentença teria imposto ao autor um ônus probatório impossível. A tese firmada pelo Supremo é expressa ao exigir demonstração cabal da preterição arbitrária e imotivada quando se trata de candidato aprovado fora das vagas previstas no edital ou em cadastro de reserva. Essa exigência não foi criada pela sentença. Ela decorre diretamente do precedente vinculante invocado pelo próprio recorrente. No caso concreto, o autor não comprovou convocação de candidato em posição posterior, não comprovou existência formal de novas vagas para o cargo em questão, nem comprovou ato concreto da Administração revelador de inequívoca necessidade de nomeação durante a validade do certame anterior. Sem esses elementos mínimos, não havia motivo para deslocar o eixo do processo e transformar a instrução em verdadeira busca exploratória por fatos que o próprio autor não indicou de modo objetivo. A distribuição dinâmica do ônus da prova não serve para suprir ausência de lastro fático inicial, mas para ajustar situações em que já exista controvérsia concreta minimamente demonstrada. Não foi o que ocorreu aqui.\r\r\n\r\r\n Superadas essas preliminares, o mérito recursal igualmente não prospera.\r\r\n\r\r\n O STF, no julgamento do RE 837.311/PI (Tema 784) fixou a seguinte tese:\r\r\n\r\r\n \"O surgimento de novas vagas ou a abertura de novo concurso para o mesmo cargo, durante o prazo de validade do certame anterior, não gera automaticamente o direito à nomeação dos candidatos aprovados fora das vagas previstas no edital, ressalvadas as hipóteses de preterição arbitrária e imotivada por parte da administração, caracterizada por comportamento tácito o
