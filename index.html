u expresso do Poder Público capaz de revelar a inequívoca necessidade de nomeação do aprovado durante o período de validade do certame, a ser demonstrada de forma cabal pelo candidato. Assim, o direito subjetivo à nomeação do candidato aprovado em concurso público exsurge nas seguintes hipóteses: I - Quando a aprovação ocorrer dentro do número de vagas dentro do edital; II - Quando houver preterição na nomeação por não observância da ordem de classificação; III - Quando surgirem novas vagas, ou for aberto novo concurso durante a validade do certame anterior, e ocorrer a preterição de candidatos de forma arbitrária e imotivada por parte da administração nos termos acima\".\r\r\n\r\r\n A sentença aplicou corretamente o Tema 784. O autor não foi aprovado dentro do número de vagas. Ao contrário, foi aprovado para cadastro de reserva, situação expressamente reconhecida na sentença e também nas contrarrazões. Isso afasta, desde logo, a primeira hipótese de direito subjetivo à nomeação. Também não se demonstrou preterição por quebra da ordem classificatória, o que afasta a segunda hipótese. Segundo os documentos dos autos, não houve notícia de convocação de candidatos em posição posterior à do autor para o cargo de Analista Administrativo com lotação no HUAC. A própria defesa da EBSERH afirma que, para essa lotação, não houve convocação para o cargo e que o demandante permanecia no cadastro de reserva, ocupando o primeiro lugar na lista PCD e a nona posição na ampla concorrência. A sentença, ao registrar ausência de convocação de candidatos posteriores, apoiou-se exatamente nesse quadro. Logo, não há violação da ordem de classificação.\r\r\n\r\r\n Resta, então, a terceira hipótese do Tema 784, que exige algo a mais do que a simples abertura de novo concurso ou o mero surgimento abstrato de vagas. Exige preterição arbitrária e imotivada, reveladora de inequívoca necessidade de nomeação do candidato durante a validade do certame anterior. Esse ponto é decisivo e resolve a controvérsia.\r\r\n\r\r\n O apelante sustenta que a abertura de novo certame para o mesmo cargo e localidade, somada à sua não convocação como primeiro colocado da lista PCD, já seria suficiente para evidenciar a necessidade administrativa e impor motivação reforçada à EBSERH. Essa linha de argumentação, porém, contraria a própria tese vinculante do Supremo, que afasta o automatismo entre novo concurso e direito à nomeação. E contraria também os dados do caso concreto, porque a sentença registrou que o novo edital igualmente contemplava apenas cadastro de reserva, sem previsão de novas vagas. Esse dado esvazia a principal premissa do recurso. Se o novo certame não abriu vagas efetivas, a sua simples publicação não revela, de forma inequívoca, necessidade de nomeação imediata do autor. Ela pode indicar planejamento administrativo, mas não demonstra, por si só, preterição arbitrária e imotivada. O Supremo foi claro ao exigir prova cabal, e essa prova não apareceu nos autos.\r\r\n\r\r\n Também não convence a alegação de que a condição de primeiro colocado na lista PCD e de único candidato com deficiência aprovado para a lotação bastaria para converter expectativa em direito subjetivo. A reserva de vagas para pessoas com deficiência é instrumento constitucional de inclusão e deve ser observada com seriedade pela Administração. Mas isso não elimina a premissa antecedente do caso, que é a inexistência de vaga efetiva prevista no edital originário para esse candidato. A política de cotas não cria, por si, cargo novo nem dispensa a demonstração dos requisitos exigidos pelo Tema 784 quando o concurso é para cadastro de reserva. O fato de o autor ocupar a primeira posição da lista específica PCD lhe assegura precedência dentro da sua lista, caso ocorra convocação válida, mas não lhe garante nomeação automática sem prova de vaga, de convocação de posteriores ou de ato administrativo arbitrário apto a revelar necessidade inequívoca de provimento. A sentença foi correta ao não transformar a posição classificatória do autor em direito subjetivo que o edital não lhe conferiu.\r\r\n\r\r\n A apelação também insiste em que a sentença teria tratado de forma excessivamente formalista a abertura do novo concurso e ignorado a suposta opacidade administrativa da EBSERH. Mas o fundamento decisivo não foi formalismo. Foi falta de prova do fato jurídico exigido pelo precedente vinculante. O julgador de origem não negou relevância ao contexto narrado pelo autor. Apenas reconheceu que ele não ultrapassou o plano das suposições. Em matéria de concurso público, sobretudo quando se discute direito à nomeação fora das vagas previstas, não basta levantar a possibilidade de futura preterição ou apontar a necessidade genérica do serviço. É indispensável demonstrar, de modo objetivo, que a Administração agiu de maneira arbitrária ao deixar de nomear o candidato. A sentença concluiu justamente que essa demonstração não ocorreu. E essa conclusão permanece correta.\r\r\n\r\r\n Igualmente não prospera a tese de discriminação. O autor procura atribuir relevância ao fato de existir ação civil pública pretérita envolvendo a EBSERH e a situações institucionais mais amplas relacionadas ao tratamento de candidatos com deficiência. O problema é que a sentença não negou, em abstrato, a importância do tema. O que afirmou, com precisão, foi que não houve comprovação dessa prática discriminatória no concurso específico prestado pelo autor. Esse fundamento permanece íntegro. Fatos externos, históricos ou genéricos não substituem a prova do caso concreto. A existência de discussões pretéritas sobre políticas de inclusão não autoriza presumir, automaticamente, que tenha havido discriminação nesta seleção, nesta lotação e em relação a este candidato. Sem prova de ato concreto de discriminação ou de desrespeito específico à reserva PCD no certame em debate, a alegação não passa de conjectura.\r\r\n\r\r\n Também não procede a crítica de que a sentença teria deixado de considerar o dever de transparência da Administração. Ainda que se admita que a Administração deva agir com clareza, a falta de informação adicional, por si só, não supre a ausência dos requisitos do Tema 784. O processo judicial não prescinde de base fática concreta. E aqui o dado objetivo que prevalece é este, o autor estava em cadastro de reserva, não houve convocação de candidatos posteriores e o novo edital igualmente não ofereceu novas vagas, apenas cadastro de reserva. Diante desse quadro, não há como inferir preterição arbitrária. A Administração não está obrigada a nomear quem está fora das vagas apenas porque publicou novo edital de cadastro. Esse foi, aliás, o núcleo da sentença e continua sendo a resposta juridicamente correta para o caso.\r\r\n\r\r\n Quanto ao pedido subsidiário de indenização por danos morais, a improcedência também deve ser mantida. A sentença afirmou que, não reconhecido o direito à nomeação, ficava prejudicado o pedido indenizatório. O raciocínio é adequado. O dano moral pretendido foi construído como consequência da suposta preterição e da alegada discriminação. Se não se comprovou o ato ilícito administrativo que serviria de base à responsabilização, não há como avançar para condenação indenizatória. A responsabilidade civil não pode ser presumida. Sem ilicitude demonstrada, inexiste dever de indenizar.\r\r\n\r\r\n Em síntese, o caso não se enquadra em nenhuma das hipóteses do Tema 784 que fazem surgir direito subjetivo à nomeação. O autor não foi aprovado dentro das vagas, não houve convocação de candidatos posteriores, o novo edital não criou novas vagas para o cargo e a lotação em questão, e não se comprovou preterição arbitrária, discriminação específica ou qualquer ato concreto da Administração capaz de revelar necessidade inequívoca de sua nomeação durante a validade do certame. A sentença examinou esses pontos de forma suficiente e chegou à conclusão correta.\r\r\n\r\r\n Ante o exposto, nego provimento à apelação.\r\r\n\r\r\n Majoro os honorários advocatícios em grau recursal em 1% (um ponto percentual), nos termos do art. 85, § 11, do CPC/2015, permanecendo suspensa a exigibilidade dessa verba em razão da concessão do benefício da gratuidade da justiça ao autor.\r\r\n\r\r\n É como voto.", "acordao": "Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO à apelação, nos termos do voto do relator, na forma do relatório constante dos autos, que fica fazendo parte integrante do presente julgado.\r\r\n\r\r\n Des. Federal ROGÉRIO FIALHO MOREIRA\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido"}, {"nome": "20260317_165100_Re__VOTO.0800202-12.2023.4.05.8002.VIRTUAL.26.03.2026", "cnj": "0800202-12.2023.4.05.8002", "cab": "APELAÇÃO CÍVEL (198) Nº 0800202-12.2023.4.05.8002", "assessor": "Wellington dos Santos Santana", "comentario": "﻿Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "DIREITO ADMINISTRATIVO. INFRAESTRUTURA RODOVIÁRIA. FAIXA DE DOMÍNIO. ÁREA NON AEDIFICANDI. OCUPAÇÃO EM MARGEM DE RODOVIA FEDERAL. AÇÃO DE OBRIGAÇÃO DE FAZER. APELAÇÃO CÍVEL. AUTO DE INFRAÇÃO. AUSÊNCIA DE INDICAÇÃO CLARA DO ATO NORMATIVO INSTITUIDOR DA FAIXA DE DOMÍNIO. INDEFINIÇÃO DA METRAGEM DA FAIXA DE DOMÍNIO E DA ÁREA NON AEDIFICANDI. CROQUI GEOREFERENCIADO PRODUZIDO UNILATERALMENTE. INSUFICIÊNCIA PROBATÓRIA. NECESSIDADE DE PROVA TÉCNICA PERICIAL. ANULAÇÃO DO JULGAMENTO ANTECIPADO DO MÉRITO. RETORNO DOS AUTOS À ORIGEM. PROVIMENTO DA APELAÇÃO.\r\r\n\r\r\n 1. Apelação cível interposta contra sentença que julgou procedente ação de obrigação de fazer e determinou a relocação de cercas instaladas em imóvel rural para fora da faixa de domínio da rodovia federal BR-104, com imposição de multa diária e autorização para retirada compulsória pelo DNIT em caso de descumprimento.\r\r\n\r\r\n 2. Na origem, trata-se de ação de obrigação de fazer ajuizada pelo Departamento Nacional de Infraestrutura de Transportes - DNIT com fundamento em auto de infração lavrado durante fiscalização realizada na BR-104, no trecho compreendido aproximadamente entre os quilômetros 65,92 e 66,45, no Estado de Alagoas.\r\r\n\r\r\n 3. A autarquia afirmou que o proprietário teria instalado cercas na margem da rodovia, ocupando área considerada irregular, supostamente localizada dentro da faixa de domínio e da área non aedificandi, circunstância classificada no auto de infração como \"localização perigosa\", enquadrada no código de risco nº 4, descrito como ocupação situada a menos de 10 metros do bordo externo do acostamento sem dispositivos de segurança.\r\r\n\r\r\n 4. A sentença reconheceu a irregularidade da ocupação e determinou a retirada ou relocação das cercas para fora da faixa de domínio da rodovia, sob o fundamento de que a prova documental apresentada pelo DNIT, composta por relatório fotográfico e croqui georreferenciado, demonstraria de forma inequívoca a invasão da área pública e da área não edificável.\r\r\n\r\r\n 5. O recorrente sustenta a nulidade do auto de infração que embasou a pretensão do DNIT, argumentando que o documento não indica de forma clara o ato normativo instituidor da faixa de domínio da BR-104, tampouco especifica a metragem correspondente à faixa de domínio e à área non aedificandi. Afirma ainda que a autuação se baseia apenas na indicação de proximidade inferior a 10 metros do acostamento, circunstância que não comprova invasão de faixa de domínio de 40 metros, além de apontar ausência de prova técnica pericial capaz de confirmar a suposta irregularidade.\r\r\n\r\r\n 6. A controvérsia consiste em definir se há prova suficiente da ocupação irregular da faixa de domínio ou da área non aedificandi da rodovia federal e se o conjunto probatório apresentado pelo DNIT é suficiente para justificar a imposição judicial de obrigação de remoção das cercas.\r\r\n\r\r\n 7. Reconhece-se que a distinção entre faixa de domínio e área non aedificandi foi corretamente exposta na sentença e que a proteção das rodovias federais constitui atribuição legítima da administração pública. Contudo, verifica-se que o auto de infração não indica com precisão o ato normativo instituidor da faixa de domínio aplicável ao trecho fiscalizado da BR-104, nem apresenta delimitação técnica clara entre a faixa de domínio e a área non aedificandi, limitando-se a afirmar genericamente que a faixa de domínio possuiria largura de 40 metros.\r\r\n\r\r\n 8. Assenta-se que o croqui georreferenciado e o relatório fotográfico apresentados pela autarquia, embora constituam instrumentos técnicos úteis, foram produzidos unilateralmente e não substituem a realização de perícia judicial quando a controvérsia depende da delimitação precisa entre área pública e propriedade privada. A ausência de perícia impede a verificação da metodologia empregada no levantamento, dos marcos de referência utilizados e da efetiva correspondência entre o levantamento técnico e os limites normativos da rodovia.\r\r\n\r\r\n 9. A imposição de obrigação de remoção de estruturas instaladas em imóvel particular exige prova técnica clara e segura acerca da efetiva invasão da faixa de domínio ou da área sujeita à limitação administrativa, não sendo suficiente a mera indicação de proximidade com o acostamento ou a apresentação de documento cartográfico unilateral desacompanhado de verificação pericial.\r\r\n\r\r\n 10. Apelação provida para reformar a sentença, anular o julgamento antecipado do mérito e determinar o retorno dos autos ao juízo de origem para realização de prova técnica pericial destinada a apurar a delimitação da faixa de domínio e da área non aedificandi no trecho da BR-104 mencionado no auto de infração e verificar eventual ocupação irregular. Sem majoração de honorários, em razão da anulação da sentença.", "relatorio": "Trata-se de apelação cível interposta por José Medeiros Rocha contra sentença proferida pelo Juízo da 7ª Vara Federal da Seção Judiciária de Alagoas, que julgou procedente ação de obrigação de fazer ajuizada pelo Departamento Nacional de Infraestrutura de Transportes - DNIT, confirmando a liminar e determinando que o réu procedesse, no prazo de 60 dias úteis, à relocação das cercas de arame, mantendo-as fora da faixa de domínio, sob pena de multa diária, bem como autorizando o DNIT, em caso de descumprimento, a promover a retirada das cercas, com prévia notificação.\r\r\n\r\r\n Alega o recorrente, em síntese, que o auto de infração que embasou a pretensão do DNIT é insubsistente, por não indicar de forma clara o ato normativo instituidor da área de domínio da BR-104, nem precisar a metragem correspondente à faixa de domínio e à área non aedificandi, elementos que reputa essenciais para a validade da penalidade aplicada.\r\r\n\r\r\n Sustenta, ainda, que a notificação mencionou código de risco referente à \"localização perigosa\", ligado à ocupação situada a menos de 10 metros do bordo externo do acostamento sem dispositivos de segurança, circunstância que, segundo afirma, não se confunde com a existência de faixa de domínio e não justificaria a desocupação de 40 metros pretendida pelo DNIT.\r\r\n\r\r\n Aduz também que é proprietário do imóvel desde 1984, que as cercas existem desde a aquisição da propriedade e que, durante cerca de 41 anos, o poder público permaneceu inerte quanto à remoção das cercas, o que teria gerado legítima confiança na legalidade da situação, razão pela qual requer a aplicação do instituto da supressio ao direito do DNIT de exigir a retirada das cercas.\r\r\n\r\r\n Em suas contrarrazões, o Departamento Nacional de Infraestrutura de Transportes - DNIT sustenta que a sentença deve ser integralmente mantida, por ter conferido adequado tratamento fático e jurídico à controvérsia.\r\r\n\r\r\n  Afirma que a análise dos documentos juntados aos autos, especialmente relatório fotográfico e croqui, demonstra de forma inequívoca que o recorrente instalou cercas de maneira irregular na Rodovia BR-104/AL, nos quilômetros 65,92 e 66,45, ocupando tanto a faixa non aedificandi quanto a faixa de domínio da rodovia federal, sendo desnecessária a realização de perícia diante da precisão do croqui apresentado.\r\r\n\r\r\n Defende que a faixa de domínio constitui bem público de uso especial, integrante do patrimônio público, não se confundindo com a faixa non aedificandi, que permanece no domínio do particular, embora sujeita a limitação administrativa.\r\r\n\r\r\n Assevera que a ocupação irregular das margens das rodovias gera sérios riscos à segurança viária, à integridade da própria rodovia, dos usuários da via e do próprio ocupante, além de poder obstar a execução de políticas públicas e obras de ampliação da capacidade de tráfego.\r\r\n\r\r\n Argumenta, ainda, que os terrenos situados na faixa de domínio pertencem à União e são administrados pelo DNIT, de modo que eventual ocupação por particular configura mera detenção precária, e não posse, não sendo passível de usucapião nem gerando direito à indenização.\r\r\n\r\r\n Acrescenta que eventual omissão estatal não convalida a ocupação irregular nem transforma o ilícito em situação legítima, à luz do princípio da indisponibilidade do interesse público e da jurisprudência do STJ.\r\r\n\r\r\n Ao final, pugna pelo desprovimento do recurso, com a manutenção integral da sentença.\r\r\n\r\r\n É o relatório.\r\r\n\r\r\n APELAÇÃO CÍVEL (198) Nº 0800202-12.2023.4.05.8002\r\r\n\r\r\n APELANTE: JOSE MEDEIROS ROCHA\r\r\n\r\r\n ADVOGADO do(a) APELANTE: THIAGO MAIA NOBRE ROCHA - AL6213\r\r\n\r\r\n ADVOGADO do(a) APELANTE: MARX ANDERSON DE OLIVEIRA GOMES - AL17227\r\r\n\r\r\n APELADO: DNIT-DEPARTAMENTO NACIONAL DE INFRAEST DE TRANSPORTES", "voto": "Recebo a apelação interposta, considerando presentes os requisitos intrínsecos e extrínsecos para a admissibilidade do recurso.\r\r\n\r\r\n No mérito, o recurso merece provimento.\r\r\n\r\r\n O Departamento Nacional de Infraestrutura de Transportes DNIT ajuizou ação de obrigação de fazer em face de José Medeiros Rocha. A autarquia afirmou que, durante fiscalização realizada na rodovia federal BR-104, no trecho localizado aproximadamente entre os quilômetros 65,92 e 66,45, no Estado de Alagoas, foi constatada a instalação de cercas na margem da rodovia em área considerada irregular. Segundo o DNIT, a estrutura estaria situada dentro da faixa de domínio e também na área non aedificandi da rodovia, circunstância que representaria risco à segurança viária.\r\r\n\r\r\n Com base nessa constatação, foi lavrado auto de infração administrativo no qual se registrou que a cerca se encontrava em situação classificada como localização perigosa, enquadrada no código de risco nº 4, descrito como ocupação situada a menos de 10 metros do bordo externo do acostamento sem dispositivos de segurança. A autarquia notificou o proprietário para que removesse ou relocasse as cercas para fora da faixa de domínio, indicada no documento como tendo largura de 40 metros.\r\r\n\r\r\n Diante da permanência da estrutura no local, o DNIT ingressou em juízo requerendo a condenação do réu à retirada das cercas e à sua relocação para fora da faixa de domínio da rodovia. O juízo de primeiro grau julgou procedente o pedido e determinou que o réu promovesse a remoção das cercas no prazo fixado na sentença, sob pena de multa diária e com autorização para retirada pelo próprio DNIT em caso de descumprimento.\r\r\n\r\r\n Inconformado, o réu interpôs apelação sustentando, em síntese, a nulidade do auto de infração e a ausência de prova técnica suficiente da alegada invasão da faixa de domínio.\r\r\n\r\r\n A controvérsia não gira em torno da legitimidade do DNIT para proteger o patrimônio público rodoviário e impedir ocupações irregulares em faixa de domínio. Essa atribuição é inerente à atuação da autarquia e encontra respaldo na legislação. O ponto central deste processo é outro. É verificar se houve demonstração clara, precisa e tecnicamente confiável de que a cerca do recorrente invadiu a faixa de domínio da BR-104 ou a área non aedificandi em extensão capaz de justificar a ordem judicial de relocação imposta pela sentença.\r\r\n\r\r\n A sentença explicou corretamente, em termos conceituais, a diferença entre faixa de domínio e área non aedificandi. A primeira integra o espaço público vinculado à rodovia. A segunda permanece no domínio do particular, embora sujeita a limitação administrativa de uso. Também está correto afirmar que a ocupação irregular dessas áreas pode comprometer a segurança viária e justificar providências administrativas. O problema não está nessas premissas jurídicas. O problema está na conclusão de que, neste caso concreto, a invasão teria sido demonstrada de forma inequívoca.\r\r\n\r\r\n O pedido do DNIT foi fundamentado em auto de infração (SR 20-104-01/2023) lavrado em fiscalização realizada na rodovia BR-104, no trecho situado aproximadamente entre os quilômetros 65,92 e 66,45, no Estado de Alagoas. Na autuação administrativa foi registrado que o particular teria implantado cercas na margem da rodovia, em situação classificada pelo órgão como \"localização perigosa\", enquadrada no código de risco nº 4, descrito como ocupação situada a menos de 10 metros do bordo externo do acostamento sem dispositivos de segurança. A notificação também mencionou que a faixa de domínio da rodovia teria largura de 40 metros no lado esquerdo e determinou a retirada ou relocação da cerca para fora dessa área.\r\r\n\r\r\n Ocorre que o próprio conteúdo do auto de infração revela uma deficiência relevante. O documento não indica de maneira clara qual é o ato normativo específico que instituiu a faixa de domínio aplicável ao trecho da BR-104 onde ocorreu a autuação. Também não apresenta delimitação precisa entre a faixa de domínio e a área non aedificandi. A notificação afirma, de forma genérica, que a faixa de domínio possuiria 40 metros, mas não demonstra qual norma concreta estabelece essa medida para aquele ponto específico da rodovia nem apresenta referência técnica que permita verificar essa informação com segurança.\r\r\n\r\r\n Esse aspecto é essencial. Quando o poder público pretende impor ao particular a retirada de estrutura instalada em seu imóvel, é indispensável que a autuação administrativa indique com clareza a base normativa que delimita a área pública supostamente invadida. Sem essa indicação precisa, o particular não consegue compreender de maneira completa a acusação que lhe é dirigida e o Judiciário não dispõe de base técnica suficiente para confirmar a penalidade aplicada.\r\r\n\r\r\n A sentença mencionou o art. 4º, inciso III, da Lei nº 6.766/1979 ao tratar da área non aedificandi e fez referência à Portaria nº 19/49 do Ministério da Viação e Obras Públicas como fundamento para a largura da faixa de domínio. Em tese, esses fundamentos podem ser utilizados para explicar o regime jurídico das áreas marginais às rodovias. No entanto, no caso concreto, a simples menção a essas normas não supre a deficiência do auto de infração. A autuação precisava indicar expressamente o ato normativo aplicável ao trecho fiscalizado e demonstrar como essa norma definia a largura da faixa de domínio naquele local específico. Essa informação não aparece de forma clara no processo administrativo que deu origem à demanda (Processo Administrativo nº 50620.000413/2022-89).\r\r\n\r\r\n Outro ponto importante diz respeito à prova utilizada para afirmar a existência da invasão. A sentença considerou suficiente o relatório fotográfico acompanhado de croqui georreferenciado elaborado pelo DNIT. Esse material foi utilizado para afirmar que a cerca estaria instalada dentro da faixa de domínio e também dentro da área non aedificandi.\r\r\n\r\r\n O croqui georreferenciado é, sem dúvida, uma ferramenta técnica útil. Ele permite representar graficamente coordenadas e facilita a visualização do espaço físico. Contudo, ele possui limitações quando comparado a uma perícia técnica completa realizada no âmbito do processo judicial. O croqui apresentado foi produzido unilateralmente pela própria parte interessada na demanda e não passou por verificação técnica independente.\r\r\n\r\r\n Em situações como esta, nas quais se discute a exata delimitação entre área pública e propriedade privada, a perícia técnica assume papel fundamental. É a perícia que permite analisar a metodologia utilizada no levantamento georreferenciado, verificar os pontos de referência adotados, conferir a correspondência entre o levantamento e os marcos normativos da rodovia e assegurar que todas essas informações sejam submetidas ao contraditório. Sem essa verificação técnica independente, o croqui permanece como elemento informativo, mas não alcança o grau de confiabilidade necessário para fundamentar uma condenação judicial.\r\r\n\r\r\n A sentença concluiu que o croqui e as fotografias seriam suficientes para demonstrar, de forma inequívoca, a invasão da faixa de domínio. Com a devida vênia, essa conclusão não se sustenta diante das lacunas existentes no próprio auto de infração e da ausência de perícia técnica. A existência de documento cartográfico unilateral não elimina a necessidade de confirmação pericial quando a controvérsia depende justamente da definição precisa dos limites da área pública.\r\r\n\r\r\n Também merece atenção o fato de que o próprio enquadramento utilizado no auto de infração menciona ocupação situada a menos de 10 metros do bordo externo do acostamento. Esse dado, por si só, não demonstra automaticamente invasão de faixa de domínio de 40 metros. A informação indica proximidade com o acostamento, mas não estabelece de maneira técnica que a cerca esteja dentro da área pública delimitada pela legislação rodoviária. Essa diferença é relevante e reforça a necessidade de prova técnica mais robusta.\r\r\n\r\r\n Em síntese, a análise do processo revela três problemas centrais. O primeiro é a ausência de indicação clara, no auto de infração, do ato normativo instituidor da faixa de domínio aplicável ao trecho da BR-104 fiscalizado. O segundo é a falta de precisão quanto à metragem efetivamente atribuída à faixa de domínio e à área non aedificandi na autuação administrativa. O terceiro é a inexistência de perícia técnica capaz de confirmar, com segurança e sob contraditório, a efetiva invasão dessas áreas.\r\r\n\r\r\n Essas lacunas impedem a formação de convicção segura sobre a existência da ocupação irregular. A proteção da infraestrutura rodoviária é importante, mas não dispensa a necessidade de prova clara quando se pretende impor ao particular a obrigação de remover cercas de sua propriedade, sob pena de multa diária e retirada forçada pelo poder público.\r\r\n\r\r\n Diante desse quadro, concluo que o auto de infração que embasou a pretensão do DNIT não possui consistência suficiente para sustentar a condenação imposta na sentença. A prova produzida nos autos não demonstra de forma segura a invasão da faixa de domínio ou da área non aedificandi no trecho indicado na autuação.\r\r\n\r\r\n Por essas razões, dou provimento à apelação para reformar a sentença, anulando o julgamento antecipado do mérito e determinando o retorno dos autos à origem, a fim de que seja realizada prova técnica pericial destinada a apurar, com precisão, os limites da faixa de domínio e da área non aedificandi no trecho da BR-104 indicado no auto de infração, bem como identificar o ato normativo instituidor da faixa de domínio aplicável ao trecho fiscalizado da rodovia e verificar a eventual ocupação dessas áreas pela cerca existente no imóvel do recorrente, assegurado às partes o pleno contraditório sobre a prova produzida.\r\r\n\r\r\n É como voto.", "acordao": "Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, DAR PROVIMENTO à apelação, nos termos do voto do relator, na forma do relatório constante dos autos, que fica fazendo parte integrante do presente julgado.\r\r\n\r\r\n Des. Federal ROGÉRIO FIALHO MOREIRA\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Provido", "css": "provido"}, {"nome": "20260317_165101_Re__VOTO.0801663-54.2025.4.05.8000.VIRTUAL.26.03.2026", "cnj": "0801663-54.2025.4.05.8000", "cab": "APELAÇÃO CÍVEL (198) Nº 0801663-54.2025.4.05.8000", "assessor": "Wellington dos Santos Santana", "comentario": "﻿Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "DIREITO ADMINISTRATIVO E EDUCACIONAL. AÇÃO ANULATÓRIA DE ATO ADMINISTRATIVO. APELAÇÃO CÍVEL. RECONHECIMENTO DE DIPLOMA ESTRANGEIRO. AUTOTUTELA ADMINISTRATIVA. DECADÊNCIA ADMINISTRATIVA (ART. 54 DA LEI Nº 9.784/1999). INSTAURAÇÃO TEMPESTIVA DE PROCEDIMENTO REVISIONAL. IMPUGNAÇÃO FORMAL DO ATO. AUTONOMIA UNIVERSITÁRIA (ART. 207 DA CF). REAVALIAÇÃO DE COMPATIBILIDADE DE CURSO. EXIGÊNCIA DE EQUIVALÊNCIA SUBSTANCIAL. PRESENCIALIDADE, CONTINUIDADE E NÃO CONDENSAÇÃO DO CURSO. AUSÊNCIA DE COMPROVAÇÃO. INEXISTÊNCIA DE RETROATIVIDADE NORMATIVA ILÍCITA. PRINCÍPIOS DA LEGALIDADE, SEGURANÇA JURÍDICA E PROTEÇÃO DA CONFIANÇA. SÚMULA 473 DO STF. MANUTENÇÃO DA SENTENÇA. DESPROVIMENTO DO RECURSO.\r\r\n\r\r\n 1. Apelação cível interposta por Marcia Kelly da Silva Rodrigues contra a sentença proferida pelo Juízo da 1ª Vara Federal de Alagoas que julgou improcedente o pedido formulado na ação, objetivando a reforma do decisum para (i) reconhecer a decadência administrativa do direito da UFRJ de anular o ato de reconhecimento de seu diploma estrangeiro e (ii) afastar a reanálise de compatibilidade de curso fundada em nova interpretação normativa superveniente, com a consequente preservação/restabelecimento da validade do reconhecimento do título.\r\r\n\r\r\n 2. Na origem, trata-se de ação anulatória proposta em face de universidade federal, visando ao reconhecimento da decadência administrativa e à invalidação do ato que desconstituiu o reconhecimento do diploma anteriormente concedido. A recorrente sustenta que teve seu diploma de Mestrado em Educação reconhecido pela UFRJ em 29/01/2019, após cumprir integralmente as exigências do procedimento administrativo. Afirma que, somente em 27/03/2024 - portanto, após o transcurso de mais de cinco anos - ocorreu o cancelamento do reconhecimento no âmbito do SEI, o que caracterizaria a decadência administrativa, nos termos do art. 54 da Lei nº 9.784/1999. Argumenta, ainda, que a Carta nº 001/2020 (PR2/UFRJ) possui natureza meramente informativa e genérica, não se qualificando como ato de impugnação apto a interromper o prazo decadencial.\r\r\n\r\r\n 3. Nesse sentido, colhe-se dos autos a narrativa de que o diploma foi reconhecido em 29/01/2019, tendo sido instaurado procedimento revisional em 22/01/2020 e formalizada a anulação em 27/03/2024, após reavaliação da compatibilidade do curso estrangeiro com os critérios exigidos pela instituição.\r\r\n\r\r\n 4. A sentença concluiu pela inexistência de decadência administrativa e pela legalidade do ato de anulação, reconhecendo a atuação legítima da Administração no exercício da autotutela.\r\r\n\r\r\n 5. A recorrente, então, sustenta a ocorrência de decadência administrativa, sob o argumento de que a Administração teria ultrapassado o prazo quinquenal para anular o ato, bem como a ilegalidade da reavaliação do diploma com base em interpretação normativa superveniente, em afronta à segurança jurídica e ao ato jurídico perfeito.\r\r\n\r\r\n 6. A controvérsia consiste em verificar: (i) se houve decadência administrativa no exercício do poder de autotutela; e (ii) se a revisão do reconhecimento do diploma configurou aplicação retroativa indevida de nova interpretação normativa ou legítima reavaliação de compatibilidade do curso.\r\r\n\r\r\n 7. No tocante à decadência, o art. 54 da Lei nº 9.784/1999 estabelece prazo quinquenal para anulação de atos favoráveis, considerando-se exercido o direito com a adoção de medida administrativa inequívoca de impugnação (§ 2º). Demonstrado que a revisão foi instaurada dentro do prazo, mediante ato formal de impugnação, não se exige a conclusão do processo no quinquênio, afastando-se a decadência.\r\r\n\r\r\n 8. Quanto ao mérito, a autonomia universitária assegura às instituições competência para avaliar a equivalência de diplomas estrangeiros, nos termos do art. 207 da Constituição e da legislação educacional aplicável. A reavaliação realizada baseou-se em elementos técnico-fáticos que evidenciaram a ausência de comprovação de que o curso foi realizado em regime presencial, contínuo e não condensado, requisitos indispensáveis à equivalência com cursos stricto sensu nacionais.\r\r\n\r\r\n 9. A revisão administrativa não configura retroatividade normativa ilícita, mas exercício legítimo de controle de legalidade, diante da constatação de incompatibilidade substancial do curso com os padrões exigidos, inexistindo direito adquirido a ato administrativo eivado de ilegalidade.\r\r\n\r\r\n 10. Exercido o poder de autotutela dentro do prazo legal, mediante instauração tempestiva de procedimento revisional, e constatada a ausência de equivalência substancial do curso estrangeiro, impõe-se a manutenção da anulação do reconhecimento do diploma.\r\r\n\r\r\n 11. Apelação desprovida. Majoração dos honorários recursais para R$ 1.200,00, mantida a suspensão de exigibilidade em razão da gratuidade da justiça.", "relatorio": "Trata-se de apelação cível interposta por Marcia Kelly da Silva Rodrigues contra a sentença proferida pelo Juízo da 1ª Vara Federal de Alagoas que julgou improcedente o pedido formulado na ação, objetivando a reforma do decisum para (i) reconhecer a decadência administrativa do direito da UFRJ de anular o ato de reconhecimento de seu diploma estrangeiro e (ii) afastar a reanálise de compatibilidade de curso fundada em nova interpretação normativa superveniente, com a consequente preservação/restabelecimento da validade do reconhecimento do título.\r\r\n\r\r\n Alega a recorrente que obteve o reconhecimento, pela UFRJ, de seu diploma de Mestrado em Educação em 29/01/2019, após aprovação em todas as etapas do procedimento administrativo; que, apenas em 27/03/2024, mais de cinco anos depois, sobreveio o cancelamento do reconhecimento no SEI, o que configuraria decadência administrativa à luz do art. 54 da Lei nº 9.784/1999. Aduz que a Carta nº 001/2020 (PR2/UFRJ) teria caráter meramente genérico e informativo, não constituindo impugnação válida apta a interromper o prazo decadencial.\r\r\n\r\r\n No mérito, afirma que a universidade, a pretexto de \"revisão\", operou verdadeira nova análise de compatibilidade de curso, lastreada em mudança interpretativa superveniente -- exigindo comprovação de curso 100% presencial, contínuo e não-condensado -- inexistente nas normas aplicáveis ao tempo do reconhecimento (Resolução CNE/CES nº 3/2016 e Portaria Normativa MEC nº 22/2016), as quais orientam a equivalência por \"valor formativo\" e dispensam cotejo estrito de currículos e cargas horárias. Sustenta que a retroatividade dessa nova interpretação viola a segurança jurídica, o ato jurídico perfeito (CF, art. 5º, XXXVI) e o art. 2º, XIII, da Lei nº 9.784/1999 e que a autonomia universitária encontra limites nos princípios da legalidade e da proteção da confiança.\r\r\n\r\r\n Invoca, ainda, julgados em casos análogos e sustenta que a Administração tem cinco anos para concluir e anular o ato, e não apenas para instaurar procedimento, inexistindo má-fé da interessada.\r\r\n\r\r\n Em suas contrarrazões, a Universidade Federal do Rio de Janeiro sustenta, em síntese, o desprovimento do apelo, aduzindo que a prestação jurisdicional de origem conferiu a solução adequada ao litígio, com análise detida dos fatos e das normas aplicáveis, devendo a sentença ser mantida por seus próprios fundamentos.\r\r\n\r\r\n A apelante noticia, como prova superveniente, decisão do CNE/CES em outro processo (Parecer nº 951/2023) -- aprovada por unanimidade -- que, em situação substancialmente semelhante, deu provimento a recurso para considerar válidos os atos de reconhecimento de diploma expedidos em janeiro de 2019, assentando a impossibilidade de aplicação retroativa da Resolução CEPG/UFRJ nº 5/2019 a processos deferidos sob a Resolução anterior, reafirmando que a modalidade do curso (presencial, semipresencial ou a distância) não constitui, por si, ilegalidade impeditiva do reconhecimento e enfatizando os limites da autotutela administrativa à luz do direito adquirido, do ato jurídico perfeito e da LINDB.\r\r\n\r\r\n É o relatório.\r\r\n\r\r\n APELAÇÃO CÍVEL (198) Nº 0801663-54.2025.4.05.8000\r\r\n\r\r\n APELANTE: MARCIA KELLY DA SILVA RODRIGUES\r\r\n\r\r\n ADVOGADO do(a) APELANTE: MAICON DA SILVA ALVES ROCHA - RJ214826\r\r\n APELADO: UNIVERSIDADE FEDERAL DO RIO DE JANEIRO", "voto": "Recebo a apelação interposta, considerando presentes os requisitos intrínsecos e extrínsecos para a admissibilidade do recurso.\r\r\n\r\r\n Conforme relatado, a demanda versa sobre ação anulatória de ato administrativo proposta por Márcia Kelly da Silva Rodrigues contra a Universidade Federal do Rio de Janeiro - UFRJ, que objetiva desconstituir a decisão administrativa que anulou o reconhecimento de seu diploma de Mestrado em Ciências da Educação obtido no exterior. Consta na sentença que o reconhecimento pela UFRJ se deu em 29/01/2019, após regular processamento; a autora afirma ter cumprido o edital vigente à época e que não havia exigência normativa de residência no exterior durante o curso. O juízo consignou o objeto da lide e a origem do título (Universidad Autónoma del Sur - Paraguai).\r\r\n\r\r\n Cinge-se a controvérsia em verificar se o ato da UFRJ que anulou o reconhecimento do diploma da autora, em 2024, encontra respaldo legal ou se esbarra na decadência administrativa prevista no art. 54 da Lei nº 9.784/1999.\r\r\n\r\r\n Delimito, de início, que este voto acompanha integralmente a sentença no capítulo em que rejeitou a alegação de decadência administrativa quanto à anulação do reconhecimento do diploma da autora, por reputar corretos os fundamentos adotados e a subsunção normativa realizada.\r\r\n\r\r\n É incontroverso nos autos que: (i) o reconhecimento administrativo do diploma ocorreu em 29/01/2019; (ii) a revisão administrativa foi instaurada em 22/01/2020, com a expedição da Carta nº 001/2020/UFRJ, providência formal de abertura e impulso do procedimento revisional; e (iii) a anulação do reconhecimento foi formalizada em 27/03/2024. Tais marcos foram expressamente fixados na sentença.\r\r\n\r\r\n O art. 54, caput, da Lei n. 9.784/1999 estabelece o prazo quinquenal para o exercício, pela Administração, do poder-dever de autotutela para anular atos favoráveis ao administrado, salvo comprovada má-fé. O § 2º do mesmo dispositivo confere a chave interpretativa para a contagem e o modo de exercício: \"considera-se exercício do direito de anular qualquer medida de autoridade administrativa que importe impugnação do ato\". A ratio é clara: tutelar a confiança legítima sem paralisar a autotutela, bastando que, dentro do quinquênio, a Administração adote medida inequívoca de impugnação e instaure a revisão, independentemente de a decisão final ser prolatada ainda dentro desse lapso. Essa é, precisamente, a leitura feita na origem.\r\r\n\r\r\n Projetando-se a moldura normativa sobre o itinerário fático assentado, verifica-se que entre 29/01/2019 e 22/01/2020 transcorreu menos de um ano; logo, a Carta nº 001/2020/UFRJ consubstanciou medida administrativa idônea de impugnação do ato de reconhecimento, aperfeiçoando, dentro do prazo legal, o exercício do direito de anular (art. 54, § 2º, da Lei nº 9.784/1999). Assim, ainda que o ato final de anulação tenha sido formalizado em 27/03/2024, a Administração já havia exercido validamente sua pretensão anulatória no quinquênio, o que obsta o reconhecimento de decadência. Foi exatamente nessa linha que decidiu a sentença, com apoio nos documentos dos autos.\r\r\n\r\r\n Os precedentes invocados pela autora não infirmam a solução, porque, como corretamente ponderado na origem, referem-se a hipóteses de inércia administrativa por prazo superior a cinco anos sem qualquer iniciativa formal de impugnação; não é o caso dos autos, em que houve instauração tempestiva do procedimento revisional. A sentença, com acerto, rechaçou a tese de que o prazo de cinco anos seja destinado à conclusão do processo, e não ao exercício do direito, pois o legislador, ao qualificar qualquer medida impugnativa como exercício suficiente, optou por um modelo que preserva a confiança legítima sem tolher a autotutela em procedimentos que, por sua natureza, exigem instrução.\r\r\n\r\r\n À luz do art. 54, § 2º, da Lei nº 9.784/1999 e dos marcos temporais fixados, não se reconhece a decadência administrativa. Mantenho integralmente a sentença nesse ponto, por seus próprios fundamentos, que adoto como razões de decidir deste voto.\r\r\n\r\r\n No mérito, a Constituição (art. 207) assegura às universidades autonomia didático-científica, administrativa e de gestão financeira e patrimonial, abrangendo a normatização e a execução dos processos de revalidação/reconhecimento de diplomas estrangeiros. Nesse contexto, a LDB (art. 48, § 3º) e a Resolução CNE/CES nº 3/2016 estabelecem critérios rigorosos para o reconhecimento de mestrados e doutorados obtidos no exterior, dentre os quais avultam: (i) a existência, na universidade reconhecedora, de curso equivalente ou superior; e (ii) a exigência de presencialidade efetiva e residência no exterior no período de integralização, de modo a assegurar a equivalência substancial da formação.\r\r\n\r\r\n A sentença assenta que, nesse quadro, a UFRJ atuou dentro dos limites de sua autonomia acadêmica e administrativa ao revisar, com base em elementos concretos e parecer técnico, o reconhecimento anteriormente deferido.\r\r\n\r\r\n Confira-se trechos do Parecer Técnico 190/2022-PR2/CEPG/CLN, em sede do processo administrativo 23079.010512/2018-11:\r\r\n\r\r\n [...]\r\r\n\r\r\n Conforme a legislação brasileira, o currículo de disciplinas deve ser ministrado em atividades presenciais. Outro dado importante sobre as regras gerais do MEC é que no Brasil, para ser considerado curso semipresencial, os cursos devem possuir 80% dos conteúdos de forma presencial. Novas resoluções, posteriores à abertura deste processo de reconhecimento de diploma, abrem possibilidades para que o percentual de conteúdos presenciais seja menor somente em cursos estritamente no formato EAD (vide https://www.in.gov.br/en/web/dou/-/portaria-n-2.117-de-6-de-dezembro-de-2019-232670913 e https://www.in.gov.br/en/web/dou/-/portaria-n-343-de-17-de-marco-de-2020-248564376). Conste, então, que os cursos da UFRJ Stricto Sensu são todos presenciais, contínuos e não condensados, e assim permanecem.\r\r\n\r\r\n O § 3º, Art. 48, da Lei nº 9.394/1996, legislação que define as Diretrizes e Bases da Educação Nacional (LDB) estabelece que o reconhecimento de diploma emitido por universidade estrangeira requer a existência de curso de pós-graduação na mesma área de conhecimento e em nível equivalente (ou superior) ao da universidade emissora do reconhecimento. Desta forma, para que um diploma seja equivalente ao da UFRJ é exigido que o curso seja presencial, contínuo e não condensado. Com efeito, a Faculdade de Educação da UFRJ tem sua periodicidade semestral, cursos contínuos e não condensados.\r\r\n\r\r\n A CLN ressalta que mesmo não tendo recebido nenhum documento do(a) interessado(a), procedeu a análise da documentação verificando a presencialidade no exterior. Para tal, foi utilizada a Certidão de Movimentos Migratórios (CMM), documento emitido pela Polícia Federal do Brasil e encaminhado à UFRJ pela Procuradoria da República no Estado do Rio de Janeiro.\r\r\n\r\r\n Datas do fluxo migratório do interessado(a) pela CMM:\r\r\n\r\r\n Saída 08/10/2015 - Entrada 18/10/2015\r\r\n\r\r\n Saída 16/06/2016 - Entrada 27/06/2016\r\r\n\r\r\n Saída 01/08/2018 - Entrada 17/08/2018 (EUA)\r\r\n\r\r\n Períodos do curso indicados no histórico escolar e da ata de defesa:\r\r\n\r\r\n INICIO DO CURSO 2014\r\r\n\r\r\n FIM DO CURSO 2016\r\r\n\r\r\n Ata de defesa não foi localizada no processo. No Histórico Escolar (Certificado de Estudios) consta defesa em 26 de junho de 2016.\r\r\n\r\r\n Deste modo, fica caracterizada a incompatibilidade do regime presencial contínuo do curso, não podendo ser considerado o curso de Mestrado em Ciências da Educação da UNIVERSIDAD AUTÓNOMA DEL SUR (UNASUR), Paraguai, um curso correlato ao stricto sensu da UFRJ, que é totalmente presencial, contínuo e não-condensado, estando, portanto, impossibilitada a sua equivalência para o reconhecimento. Este fato, per se, impõe a anulação do reconhecimento do diploma já expedido.\r\r\n\r\r\n Apesar do parecer favorável ao Reconhecimento do Diploma emitido pela Comissão Especial de Revalidação - CER, que acenou positivamente à aprovação pela CLN e permitiu a realização dos protocolos necessários para a recepção do diploma internacional da interessada e seu reconhecimento, a CLN entende agora, inequivocamente, e amparada pelas Resoluções supracitadas, que a documentação encaminhada pelo (a) interessado (a) não comprova a realização de um curso presencial, contínuo e não-condensado.\r\r\n\r\r\n [...]\r\r\n\r\r\n No plano do controle de legalidade, rege a espécie a Súmula 473 do STF, segundo a qual a Administração pode - e deve - anular os atos eivados de ilegalidade, por deles não se originarem direitos, respeitados o devido processo, os direitos adquiridos e a apreciação judicial. A disciplina específica da decadência administrativa (Lei nº 9.784/1999, art. 54) fixa prazo quinquenal para o exercício do poder de anular atos favoráveis ao administrado, e o § 2º do mesmo artigo explicita que se considera \"exercício do direito de anular qualquer medida de autoridade administrativa que importe impugnação do ato\". Em outras palavras: não se exige a conclusão do procedimento anulatório no quinquênio, bastando a adoção, dentro desse lapso, de medida inequívoca de impugnação, assegurados contraditório e ampla defesa.\r\r\n\r\r\n Assim, nos termos do art. 54, §2º, da Lei n. 9.784/1999, é direito da UFRJ revisar o ato administrativo de validação de diploma, assegurando à parte apelada o direito ao contraditório e ampla defesa.\r\r\n\r\r\n Conforme a sentença, não se tratou de mera reinterpretação normativa, mas de reavaliação de compatibilidade do curso com exigências mínimas de qualidade e equivalência previstas no regime regulatório aplicável. Essa conclusão apoia-se, ademais, na ausência de comprovação de realização do curso nos moldes exigidos (presencial, contínuo e não-condensado).\r\r\n\r\r\n Diante desse conjunto - competência universitária para avaliação técnica, atuação dentro dos contornos da autonomia, reavaliação de compatibilidade fundada em substrato fático-técnico e ausência de comprovação de atendimento aos requisitos mínimos - a sentença concluiu pela inexistência de ilegalidade no ato impugnado e, por consequência, pela improcedência da demanda. Acompanho tais fundamentos.\r\r\n\r\r\n Nesse mesmo sentido, confira-se: (PROCESSO: 08004092920244058405, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL ROBERTO WANDERLEY NOGUEIRA, 1ª TURMA, JULGAMENTO: 12/06/2025); (PROCESSO: 08022831020254050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL RODRIGO ANTONIO TENORIO CORREIA DA SILVA, 6ª TURMA, JULGAMENTO: 15/04/2025).\r\r\n\r\r\n Ante o exposto, NEGO PROVIMENTO À APELAÇÃO.\r\r\n\r\r\n Condeno a recorrente ao pagamento de honorários recursais, nos termos do art. 85, § 11, CPC/2015, ficando os honorários sucumbenciais que lhe cabem majorados para R$ 1.200,00 (mil e duzentos reais). Mantenho a exigibilidade da verba honorária suspensa, nos termos do artigo 98, § 3º, do Código de Processo Civil, tendo em vista que a parte autora é beneficiária da justiça gratuita.\r\r\n\r\r\n É como voto.", "acordao": "Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO à apelação, nos termos do voto do relator, na forma do relatório constante dos autos, que fica fazendo parte integrante do presente julgado.\r\r\n\r\r\n Des. Federal ROGÉRIO FIALHO MOREIRA\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido"}, {"nome": "20260317_172455_Re__VOTO.0800202-12.2023.4.05.8002.VIRTUAL.26.03.2026", "cnj": "0800202-12.2023.4.05.8002", "cab": "APELAÇÃO CÍVEL (198) Nº 0800202-12.2023.4.05.8002", "assessor": "Wellington dos Santos Santana", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "DIREITO ADMINISTRATIVO. INFRAESTRUTURA RODOVIÁRIA. FAIXA DE DOMÍNIO. ÁREA NON AEDIFICANDI. OCUPAÇÃO EM MARGEM DE RODOVIA FEDERAL. AÇÃO DE OBRIGAÇÃO DE FAZER. APELAÇÃO CÍVEL. AUTO DE INFRAÇÃO. AUSÊNCIA DE INDICAÇÃO CLARA DO ATO NORMATIVO INSTITUIDOR DA FAIXA DE DOMÍNIO. INDEFINIÇÃO DA METRAGEM DA FAIXA DE DOMÍNIO E DA ÁREA NON AEDIFICANDI. CROQUI GEOREFERENCIADO PRODUZIDO UNILATERALMENTE. INSUFICIÊNCIA PROBATÓRIA. NECESSIDADE DE PROVA TÉCNICA PERICIAL. ANULAÇÃO DO JULGAMENTO ANTECIPADO DO MÉRITO. RETORNO DOS AUTOS À ORIGEM. PROVIMENTO DA APELAÇÃO.\r\r\n\r\r\n 1. Apelação cível interposta contra sentença que julgou procedente ação de obrigação de fazer e determinou a relocação de cercas instaladas em imóvel rural para fora da faixa de domínio da rodovia federal BR-104, com imposição de multa diária e autorização para retirada compulsória pelo DNIT em caso de descumprimento.\r\r\n\r\r\n 2. Na origem, trata-se de ação de obrigação de fazer ajuizada pelo Departamento Nacional de Infraestrutura de Transportes - DNIT com fundamento em auto de infração lavrado durante fiscalização realizada na BR-104, no trecho compreendido aproximadamente entre os quilômetros 65,92 e 66,45, no Estado de Alagoas.\r\r\n\r\r\n 3. A autarquia afirmou que o proprietário teria instalado cercas na margem da rodovia, ocupando área considerada irregular, supostamente localizada dentro da faixa de domínio e da área non aedificandi, circunstância classificada no auto de infração como \"localização perigosa\", enquadrada no código de risco nº 4, descrito como ocupação situada a menos de 10 metros do bordo externo do acostamento sem dispositivos de segurança.\r\r\n\r\r\n 4. A sentença reconheceu a irregularidade da ocupação e determinou a retirada ou relocação das cercas para fora da faixa de domínio da rodovia, sob o fundamento de que a prova documental apresentada pelo DNIT, composta por relatório fotográfico e croqui georreferenciado, demonstraria de forma inequívoca a invasão da área pública e da área não edificável.\r\r\n\r\r\n 5. O recorrente sustenta a nulidade do auto de infração que embasou a pretensão do DNIT, argumentando que o documento não indica de forma clara o ato normativo instituidor da faixa de domínio da BR-104, tampouco especifica a metragem correspondente à faixa de domínio e à área non aedificandi. Afirma ainda que a autuação se baseia apenas na indicação de proximidade inferior a 10 metros do acostamento, circunstância que não comprova invasão de faixa de domínio de 40 metros, além de apontar ausência de prova técnica pericial capaz de confirmar a suposta irregularidade.\r\r\n\r\r\n 6. A controvérsia consiste em definir se há prova suficiente da ocupação irregular da faixa de domínio ou da área non aedificandi da rodovia federal e se o conjunto probatório apresentado pelo DNIT é suficiente para justificar a imposição judicial de obrigação de remoção das cercas.\r\r\n\r\r\n 7. Reconhece-se que a distinção entre faixa de domínio e área non aedificandi foi corretamente exposta na sentença e que a proteção das rodovias federais constitui atribuição legítima da administração pública. Contudo, verifica-se que o auto de infração não indica com precisão o ato normativo instituidor da faixa de domínio aplicável ao trecho fiscalizado da BR-104, nem apresenta delimitação técnica clara entre a faixa de domínio e a área non aedificandi, limitando-se a afirmar genericamente que a faixa de domínio possuiria largura de 40 metros.\r\r\n\r\r\n 8. Assenta-se que o croqui georreferenciado e o relatório fotográfico apresentados pela autarquia, embora constituam instrumentos técnicos úteis, foram produzidos unilateralmente e não substituem a realização de perícia judicial quando a controvérsia depende da delimitação precisa entre área pública e propriedade privada. A ausência de perícia impede a verificação da metodologia empregada no levantamento, dos marcos de referência utilizados e da efetiva correspondência entre o levantamento técnico e os limites normativos da rodovia.\r\r\n\r\r\n 9. A imposição de obrigação de remoção de estruturas instaladas em imóvel particular exige prova técnica clara e segura acerca da efetiva invasão da faixa de domínio ou da área sujeita à limitação administrativa, não sendo suficiente a mera indicação de proximidade com o acostamento ou a apresentação de documento cartográfico unilateral desacompanhado de verificação pericial.\r\r\n\r\r\n 10. Apelação provida para reformar a sentença, anular o julgamento antecipado do mérito e determinar o retorno dos autos ao juízo de origem para realização de prova técnica pericial destinada a apurar a delimitação da faixa de domínio e da área non aedificandi no trecho da BR-104 mencionado no auto de infração e verificar eventual ocupação irregular. Sem majoração de honorários, em razão da anulação da sentença.", "relatorio": "Trata-se de apelação cível interposta por José Medeiros Rocha contra sentença proferida pelo Juízo da 7ª Vara Federal da Seção Judiciária de Alagoas, que julgou procedente ação de obrigação de fazer ajuizada pelo Departamento Nacional de Infraestrutura de Transportes - DNIT, confirmando a liminar e determinando que o réu procedesse, no prazo de 60 dias úteis, à relocação das cercas de arame, mantendo-as fora da faixa de domínio, sob pena de multa diária, bem como autorizando o DNIT, em caso de descumprimento, a promover a retirada das cercas, com prévia notificação.\r\r\n\r\r\n Alega o recorrente, em síntese, que o auto de infração que embasou a pretensão do DNIT é insubsistente, por não indicar de forma clara o ato normativo instituidor da área de domínio da BR-104, nem precisar a metragem correspondente à faixa de domínio e à área non aedificandi, elementos que reputa essenciais para a validade da penalidade aplicada.\r\r\n\r\r\n Sustenta, ainda, que a notificação mencionou código de risco referente à \"localização perigosa\", ligado à ocupação situada a menos de 10 metros do bordo externo do acostamento sem dispositivos de segurança, circunstância que, segundo afirma, não se confunde com a existência de faixa de domínio e não justificaria a desocupação de 40 metros pretendida pelo DNIT.\r\r\n\r\r\n Aduz também que é proprietário do imóvel desde 1984, que as cercas existem desde a aquisição da propriedade e que, durante cerca de 41 anos, o poder público permaneceu inerte quanto à remoção das cercas, o que teria gerado legítima confiança na legalidade da situação, razão pela qual requer a aplicação do instituto da supressio ao direito do DNIT de exigir a retirada das cercas.\r\r\n\r\r\n Em suas contrarrazões, o Departamento Nacional de Infraestrutura de Transportes - DNIT sustenta que a sentença deve ser integralmente mantida, por ter conferido adequado tratamento fático e jurídico à controvérsia.\r\r\n\r\r\n  Afirma que a análise dos documentos juntados aos autos, especialmente relatório fotográfico e croqui, demonstra de forma inequívoca que o recorrente instalou cercas de maneira irregular na Rodovia BR-104/AL, nos quilômetros 65,92 e 66,45, ocupando tanto a faixa non aedificandi quanto a faixa de domínio da rodovia federal, sendo desnecessária a realização de perícia diante da precisão do croqui apresentado.\r\r\n\r\r\n Defende que a faixa de domínio constitui bem público de uso especial, integrante do patrimônio público, não se confundindo com a faixa non aedificandi, que permanece no domínio do particular, embora sujeita a limitação administrativa.\r\r\n\r\r\n Assevera que a ocupação irregular das margens das rodovias gera sérios riscos à segurança viária, à integridade da própria rodovia, dos usuários da via e do próprio ocupante, além de poder obstar a execução de políticas públicas e obras de ampliação da capacidade de tráfego.\r\r\n\r\r\n Argumenta, ainda, que os terrenos situados na faixa de domínio pertencem à União e são administrados pelo DNIT, de modo que eventual ocupação por particular configura mera detenção precária, e não posse, não sendo passível de usucapião nem gerando direito à indenização.\r\r\n\r\r\n Acrescenta que eventual omissão estatal não convalida a ocupação irregular nem transforma o ilícito em situação legítima, à luz do princípio da indisponibilidade do interesse público e da jurisprudência do STJ.\r\r\n\r\r\n Ao final, pugna pelo desprovimento do recurso, com a manutenção integral da sentença.\r\r\n\r\r\n É o relatório.\r\r\n\r\r\n APELAÇÃO CÍVEL (198) Nº 0800202-12.2023.4.05.8002\r\r\n\r\r\n APELANTE: JOSE MEDEIROS ROCHA\r\r\n\r\r\n ADVOGADO do(a) APELANTE: THIAGO MAIA NOBRE ROCHA - AL6213\r\r\n\r\r\n ADVOGADO do(a) APELANTE: MARX ANDERSON DE OLIVEIRA GOMES - AL17227\r\r\n\r\r\n APELADO: DNIT-DEPARTAMENTO NACIONAL DE INFRAEST DE TRANSPORTES", "voto": "Recebo a apelação interposta, considerando presentes os requisitos intrínsecos e extrínsecos para a admissibilidade do recurso.\r\r\n\r\r\n No mérito, o recurso merece provimento.\r\r\n\r\r\n O Departamento Nacional de Infraestrutura de Transportes DNIT ajuizou ação de obrigação de fazer em face de José Medeiros Rocha. A autarquia afirmou que, durante fiscalização realizada na rodovia federal BR-104, no trecho localizado aproximadamente entre os quilômetros 65,92 e 66,45, no Estado de Alagoas, foi constatada a instalação de cercas na margem da rodovia em área considerada irregular. Segundo o DNIT, a estrutura estaria situada dentro da faixa de domínio e também na área non aedificandi da rodovia, circunstância que representaria risco à segurança viária.\r\r\n\r\r\n Com base nessa constatação, foi lavrado auto de infração administrativo no qual se registrou que a cerca se encontrava em situação classificada como localização perigosa, enquadrada no código de risco nº 4, descrito como ocupação situada a menos de 10 metros do bordo externo do acostamento sem dispositivos de segurança. A autarquia notificou o proprietário para que removesse ou relocasse as cercas para fora da faixa de domínio, indicada no documento como tendo largura de 40 metros.\r\r\n\r\r\n Diante da permanência da estrutura no local, o DNIT ingressou em juízo requerendo a condenação do réu à retirada das cercas e à sua relocação para fora da faixa de domínio da rodovia. O juízo de primeiro grau julgou procedente o pedido e determinou que o réu promovesse a remoção das cercas no prazo fixado na sentença, sob pena de multa diária e com autorização para retirada pelo próprio DNIT em caso de descumprimento.\r\r\n\r\r\n Inconformado, o réu interpôs apelação sustentando, em síntese, a nulidade do auto de infração e a ausência de prova técnica suficiente da alegada invasão da faixa de domínio.\r\r\n\r\r\n A controvérsia não gira em torno da legitimidade do DNIT para proteger o patrimônio público rodoviário e impedir ocupações irregulares em faixa de domínio. Essa atribuição é inerente à atuação da autarquia e encontra respaldo na legislação. O ponto central deste processo é outro. É verificar se houve demonstração clara, precisa e tecnicamente confiável de que a cerca do recorrente invadiu a faixa de domínio da BR-104 ou a área non aedificandi em extensão capaz de justificar a ordem judicial de relocação imposta pela sentença.\r\r\n\r\r\n A sentença explicou corretamente, em termos conceituais, a diferença entre faixa de domínio e área non aedificandi. A primeira integra o espaço público vinculado à rodovia. A segunda permanece no domínio do particular, embora sujeita a limitação administrativa de uso. Também está correto afirmar que a ocupação irregular dessas áreas pode comprometer a segurança viária e justificar providências administrativas. O problema não está nessas premissas jurídicas. O problema está na conclusão de que, neste caso concreto, a invasão teria sido demonstrada de forma inequívoca.\r\r\n\r\r\n O pedido do DNIT foi fundamentado em auto de infração (SR 20-104-01/2023) lavrado em fiscalização realizada na rodovia BR-104, no trecho situado aproximadamente entre os quilômetros 65,92 e 66,45, no Estado de Alagoas. Na autuação administrativa foi registrado que o particular teria implantado cercas na margem da rodovia, em situação classificada pelo órgão como \"localização perigosa\", enquadrada no código de risco nº 4, descrito como ocupação situada a menos de 10 metros do bordo externo do acostamento sem dispositivos de segurança. A notificação também mencionou que a faixa de domínio da rodovia teria largura de 40 metros no lado esquerdo e determinou a retirada ou relocação da cerca para fora dessa área.\r\r\n\r\r\n Ocorre que o próprio conteúdo do auto de infração revela uma deficiência relevante. O documento não indica de maneira clara qual é o ato normativo específico que instituiu a faixa de domínio aplicável ao trecho da BR-104 onde ocorreu a autuação. Também não apresenta delimitação precisa entre a faixa de domínio e a área non aedificandi. A notificação afirma, de forma genérica, que a faixa de domínio possuiria 40 metros, mas não demonstra qual norma concreta estabelece essa medida para aquele ponto específico da rodovia nem apresenta referência técnica que permita verificar essa informação com segurança.\r\r\n\r\r\n Esse aspecto é essencial. Quando o poder público pretende impor ao particular a retirada de estrutura instalada em seu imóvel, é indispensável que a autuação administrativa indique com clareza a base normativa que delimita a área pública supostamente invadida. Sem essa indicação precisa, o particular não consegue compreender de maneira completa a acusação que lhe é dirigida e o Judiciário não dispõe de base técnica suficiente para confirmar a penalidade aplicada.\r\r\n\r\r\n A sentença mencionou o art. 4º, inciso III, da Lei nº 6.766/1979 ao tratar da área non aedificandi e fez referência à Portaria nº 19/49 do Ministério da Viação e Obras Públicas como fundamento para a largura da faixa de domínio. Em tese, esses fundamentos podem ser utilizados para explicar o regime jurídico das áreas marginais às rodovias. No entanto, no caso concreto, a simples menção a essas normas não supre a deficiência do auto de infração. A autuação precisava indicar expressamente o ato normativo aplicável ao trecho fiscalizado e demonstrar como essa norma definia a largura da faixa de domínio naquele local específico. Essa informação não aparece de forma clara no processo administrativo que deu origem à demanda (Processo Administrativo nº 50620.000413/2022-89).\r\r\n\r\r\n Outro ponto importante diz respeito à prova utilizada para afirmar a existência da invasão. A sentença considerou suficiente o relatório fotográfico acompanhado de croqui georreferenciado elaborado pelo DNIT. Esse material foi utilizado para afirmar que a cerca estaria instalada dentro da faixa de domínio e também dentro da área non aedificandi.\r\r\n\r\r\n O croqui georreferenciado é, sem dúvida, uma ferramenta técnica útil. Ele permite representar graficamente coordenadas e facilita a visualização do espaço físico. Contudo, ele possui limitações quando comparado a uma perícia técnica completa realizada no âmbito do processo judicial. O croqui apresentado foi produzido unilateralmente pela própria parte interessada na demanda e não passou por verificação técnica independente.\r\r\n\r\r\n Em situações como esta, nas quais se discute a exata delimitação entre área pública e propriedade privada, a perícia técnica assume papel fundamental. É a perícia que permite analisar a metodologia utilizada no levantamento georreferenciado, verificar os pontos de referência adotados, conferir a correspondência entre o levantamento e os marcos normativos da rodovia e assegurar que todas essas informações sejam submetidas ao contraditório. Sem essa verificação técnica independente, o croqui permanece como elemento informativo, mas não alcança o grau de confiabilidade necessário para fundamentar uma condenação judicial.\r\r\n\r\r\n A sentença concluiu que o croqui e as fotografias seriam suficientes para demonstrar, de forma inequívoca, a invasão da faixa de domínio. Com a devida vênia, essa conclusão não se sustenta diante das lacunas existentes no próprio auto de infração e da ausência de perícia técnica. A existência de documento cartográfico unilateral não elimina a necessidade de confirmação pericial quando a controvérsia depende justamente da definição precisa dos limites da área pública.\r\r\n\r\r\n Também merece atenção o fato de que o próprio enquadramento utilizado no auto de infração menciona ocupação situada a menos de 10 metros do bordo externo do acostamento. Esse dado, por si só, não demonstra automaticamente invasão de faixa de domínio de 40 metros. A informação indica proximidade com o acostamento, mas não estabelece de maneira técnica que a cerca esteja dentro da área pública delimitada pela legislação rodoviária. Essa diferença é relevante e reforça a necessidade de prova técnica mais robusta.\r\r\n\r\r\n Em síntese, a análise do processo revela três problemas centrais. O primeiro é a ausência de indicação clara, no auto de infração, do ato normativo instituidor da faixa de domínio aplicável ao trecho da BR-104 fiscalizado. O segundo é a falta de precisão quanto à metragem efetivamente atribuída à faixa de domínio e à área non aedificandi na autuação administrativa. O terceiro é a inexistência de perícia técnica capaz de confirmar, com segurança e sob contraditório, a efetiva invasão dessas áreas.\r\r\n\r\r\n Essas lacunas impedem a formação de convicção segura sobre a existência da ocupação irregular. A proteção da infraestrutura rodoviária é importante, mas não dispensa a necessidade de prova clara quando se pretende impor ao particular a obrigação de remover cercas de sua propriedade, sob pena de multa diária e retirada forçada pelo poder público.\r\r\n\r\r\n Diante desse quadro, concluo que o auto de infração que embasou a pretensão do DNIT não possui consistência suficiente para sustentar a condenação imposta na sentença. A prova produzida nos autos não demonstra de forma segura a invasão da faixa de domínio ou da área non aedificandi no trecho indicado na autuação.\r\r\n\r\r\n Por essas razões, dou provimento à apelação para reformar a sentença, anulando o julgamento antecipado do mérito e determinando o retorno dos autos à origem, a fim de que seja realizada prova técnica pericial destinada a apurar, com precisão, os limites da faixa de domínio e da área non aedificandi no trecho da BR-104 indicado no auto de infração, bem como identificar o ato normativo instituidor da faixa de domínio aplicável ao trecho fiscalizado da rodovia e verificar a eventual ocupação dessas áreas pela cerca existente no imóvel do recorrente, assegurado às partes o pleno contraditório sobre a prova produzida.\r\r\n\r\r\n É como voto.", "acordao": "Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, DAR PROVIMENTO à apelação, nos termos do voto do relator, na forma do relatório constante dos autos, que fica fazendo parte integrante do presente julgado.\r\r\n\r\r\n Des. Federal ROGÉRIO FIALHO MOREIRA\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Provido", "css": "provido"}, {"nome": "20260317_175202_Re__VOTO.0008289-66.2025.4.05.0000.VIRTUAL.26.03.2026", "cnj": "0008289-66.2025.4.05.0000", "cab": "AGRAVO DE INSTRUMENTO (202) Nº 0008289-66.2025.4.05.0000", "assessor": "Rita de Cássia R. S. de Macêdo", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "EXECUÇÃO DE TÍTULO EXTRAJUDICIAL. AGRAVO DE INSTRUMENTO. OAB. COBRANÇA DE ANUIDADES (2019 A 2022). EXCEÇÃO DE PRÉ-EXECUTIVIDADE REJEITADA. GRATUIDADE DA JUSTIÇA. AUSÊNCIA DE DECLARAÇÃO DE HIPOSSUFICIÊNCIA. INDEFERIMENTO. DECISÃO FUNDAMENTADA. INEXISTÊNCIA DE NULIDADE. TÍTULO EXECUTIVO VÁLIDO. DESNECESSIDADE DE NOTIFICAÇÃO PRÉVIA. CANCELAMENTO DE INSCRIÇÃO NÃO COMPROVADO. INSCRIÇÃO ATIVA COMO FATO GERADOR. IRRELEVÂNCIA DO EFETIVO EXERCÍCIO PROFISSIONAL. PRESCRIÇÃO. APLICAÇÃO DO ART. 8º DA LEI Nº 12.514/2011 À OAB. TERMO INICIAL DA PRETENSÃO EXECUTIVA. EXIGIBILIDADE CONDICIONADA AO ATINGIMENTO DO PISO LEGAL. PRAZO QUINQUENAL. NÃO CONFIGURAÇÃO. EXCESSO DE EXECUÇÃO. AUSÊNCIA DE MEMÓRIA DE CÁLCULO. NÃO CONHECIMENTO. HONORÁRIOS ADVOCATÍCIOS. FIXAÇÃO JUDICIAL. LEGALIDADE. IMPROVIMENTO.\r\r\n\r\r\n 1. Agravo de instrumento interposto por HUGO MARTINS GOMES NETO em face de decisão proferida nos autos de execução de título extrajudicial ajuizada pela Ordem dos Advogados do Brasil – Seccional Pernambuco, que rejeitou exceção de pré-executividade e determinou o regular prosseguimento do feito, em que se busca a cobrança das anuidades referentes aos exercícios de 2019 a 2022, no valor de R$ 6.074,37 (seis mil setenta e quatro reais e trinta e sete centavos).\r\r\n\r\r\n 2. Sustenta o agravante, em síntese, a nulidade da decisão por ausência de fundamentação; a existência de pedido administrativo de cancelamento de sua inscrição; a ocorrência de prescrição quinquenal; a nulidade da cobrança por ausência de notificação prévia; o excesso de execução e a ilegalidade da cobrança de honorários advocatícios extrajudiciais; além de requerer a redução da verba sucumbencial. Pleiteia, ainda, a concessão dos benefícios da justiça gratuita.\r\r\n\r\r\n 3. A concessão da gratuidade da justiça à pessoa natural depende da apresentação de declaração de hipossuficiência, que goza de presunção relativa de veracidade, nos termos do art. 99, §3º, do CPC, não sendo suficiente a mera alegação desacompanhada do documento correspondente, o que autoriza o indeferimento do benefício.\r\r\n\r\r\n 4. Não há nulidade por ausência de fundamentação quando a decisão agravada enfrenta de forma suficiente as questões essenciais ao deslinde da controvérsia, sendo desnecessário o exame exaustivo de todos os argumentos das partes.\r\r\n\r\r\n 5. A certidão emitida pela OAB constitui título executivo extrajudicial dotado de certeza, liquidez e exigibilidade, nos termos do art. 46, parágrafo único, da Lei nº 8.906/94 e dos arts. 783 e 784, XII, do CPC, sendo desnecessária a comprovação de notificação administrativa prévia para o ajuizamento da execução.\r\r\n\r\r\n 6. A ausência de comprovação do pedido administrativo de cancelamento da inscrição, aliada à demonstração de manutenção do registro ativo, impõe o reconhecimento da legitimidade da cobrança, uma vez que o fato gerador das anuidades é a inscrição nos quadros da entidade de classe, sendo irrelevante o efetivo exercício da profissão.\r\r\n\r\r\n 7. O Superior Tribunal de Justiça firmou entendimento no sentido de que a OAB, apesar de sua natureza jurídica sui generis, submete-se ao art. 8º da Lei nº 12.514/2011, que condiciona a cobrança judicial ao atingimento de valor mínimo correspondente a múltiplas anuidades.\r\r\n\r\r\n 8. O termo inicial do prazo prescricional pode ser considerado a partir do momento em que o crédito se torna exequível, ou seja, quando atinge o piso legal para ajuizamento da execução, aplicando-se, a partir de então, o prazo quinquenal previsto no art. 206, §5º, I, do Código Civil.\r\r\n\r\r\n 9. No caso concreto, a dívida, correspondente a anuidades referentes aos exercícios de 2019 a 2022, atingiu o patamar de cinco anuidades exigido pela lei em 2021. Como a execução foi ajuizada em 11/01/2024, não houve consumação do prazo prescricional.\r\r\n\r\r\n 10. A exceção de pré-executividade somente é cabível para matérias de ordem pública cognoscíveis de plano, não sendo possível o reconhecimento de excesso de execução sem a apresentação de memória de cálculo, conforme exigência legal.\r\r\n\r\r\n 11. Os honorários advocatícios fixados judicialmente, em percentual compatível com os critérios do art. 85 do CPC, não comportam redução, inexistindo cobrança indevida em âmbito extrajudicial.\r\r\n\r\r\n 12. Agravo de instrumento improvido.", "relatorio": "Trata-se de agravo de instrumento interposto por HUGO MARTINS GOMES NETO em face de decisão proferida nos autos de execução de título extrajudicial ajuizada pela Ordem dos Advogados do Brasil – Seccional Pernambuco, que rejeitou exceção de pré-executividade e determinou o regular prosseguimento do feito, em que se busca a cobrança das anuidades referentes aos exercícios de 2019 a 2022, no valor de R$ 6.074,37 (seis mil setenta e quatro reais e trinta e sete centavos).\r\r\n\r\r\n Sustenta o agravante, em síntese, a nulidade da decisão por ausência de fundamentação; a existência de pedido administrativo de cancelamento de sua inscrição; a ocorrência de prescrição quinquenal; a nulidade da cobrança por ausência de notificação prévia; o excesso de execução e a ilegalidade da cobrança de honorários advocatícios extrajudiciais; além de requerer a redução da verba sucumbencial. Pleiteia, ainda, a concessão dos benefícios da justiça gratuita.\r\r\n\r\r\n Contrarrazões apresentadas.\r\r\n\r\r\n É o relatório.", "voto": "A concessão da gratuidade da justiça encontra previsão no art. 98 do Código de Processo Civil, sendo suficiente, para a pessoa física, a apresentação de declaração de hipossuficiência, a qual goza de presunção relativa de veracidade, nos termos do art. 99, §3º, do CPC, somente afastável mediante elementos concretos que evidenciem capacidade financeira.\r\r\n\r\r\n No caso, embora o agravante alegue a existência de declaração de hipossuficiência, verifica-se que não consta dos autos a referida declaração.\r\r\n\r\r\n Ressalte-se que a presunção legal de veracidade somente incide quando efetivamente apresentada a declaração, não sendo suficiente a mera alegação desacompanhada do documento correspondente.\r\r\n\r\r\n Dessa forma, ausente a declaração de hipossuficiência ou qualquer outro indicativo mínimo da alegada incapacidade financeira, impõe-se o indeferimento do pedido de gratuidade da justiça, sem prejuízo de que o agravante venha a formular novo requerimento perante o juízo de origem, devidamente instruído.\r\r\n\r\r\n No mérito, não assiste razão ao agravante.\r\r\n\r\r\n A alegação de nulidade da decisão por ausência de fundamentação não procede. A decisão agravada examinou de forma suficiente as questões essenciais ao deslinde da controvérsia, notadamente quanto à validade do título executivo, à inexistência de prova de cancelamento da inscrição, à rejeição da alegação de excesso de execução e à regularidade da cobrança. O ordenamento jurídico não exige que o magistrado enfrente, de forma individualizada, todos os argumentos das partes, sendo suficiente a exposição clara das razões de decidir.\r\r\n\r\r\n No que se refere à alegação de nulidade do título por ausência de notificação prévia, cumpre registrar que, de acordo com o art. 46, § único, da Lei 8.906/94, a certidão emitida pelo órgão diretivo da OAB/PE constitui título executivo extrajudicial, não havendo previsão legal quanto à exigência de se fazer juntar prova da notificação prévia do executado no âmbito administrativo, como condição para a propositura da execução. Decerto, a certidão emitida pelo órgão diretivo da OAB/PE, possui, nos termos dos artigos 783 e 784, XII, do CPC, os requisitos legais de certeza, liquidez e exigibilidade para a execução. Ademais, cumpre mencionar que o extrato de renegociação de títulos presente nos autos indica atrasos no pagamento das anuidades. A propósito, este TRF5 tem se posicionado no sentido da desnecessidade de notificação administrativa prévia para a propositura da execução das anuidades em atraso. Precedentes: 08021336820194058300, Apelação Cível, Desembargador Federal Paulo Roberto De Oliveira Lima, 2ª Turma, Julgamento: 06/09/2022; 08014734020204058300, Apelação Cível, Desembargador Federal Cid Marconi Gurgel De Souza, 3ª Turma, Julgamento: 17/12/2020) E 08010501720194058300, Apelação Cível, Desembargador Federal Roberto Wanderley Nogueira, 1ª Turma, Julgamento: 03/03/2022.\r\r\n\r\r\n No tocante à alegação de cancelamento da inscrição, o agravante não apresentou qualquer comprovação documental do suposto requerimento administrativo. Registre-se, inclusive, que o próprio recorrente não anexou aos autos nenhum documento apto a demonstrar que tenha solicitado à Seccional de Pernambuco a sua exclusão dos quadros da Ordem dos Advogados do Brasil, limitando-se a alegações desacompanhadas de prova.\r\r\n\r\r\n Por sua vez, a exequente demonstrou a manutenção da inscrição ativa do agravante, sem anotação de cancelamento ou licenciamento.\r\r\n\r\r\n Cumpre destacar que a obrigação de pagamento das anuidades decorre do vínculo jurídico estabelecido com a Ordem dos Advogados do Brasil, possuindo disciplina própria, nos termos do Estatuto da Advocacia. O fato gerador da anuidade é a inscrição do profissional nos quadros da entidade, sendo irrelevante o efetivo exercício da atividade. Assim, enquanto não houver o cancelamento regular do registro, persiste a obrigação de pagamento, sendo legítima a cobrança das anuidades.\r\r\n\r\r\n Nesse contexto, a mera alegação de inatividade profissional, desacompanhada da comprovação do cancelamento da inscrição, não afasta a exigibilidade do crédito, subsistindo o dever de adimplemento.\r\r\n\r\r\n No que se refere à prescrição, tem-se que o STJ consolidou entendimento de que a OAB, apesar de sua natureza jurídica sui generis, submete-se ao art. 8º da Lei nº 12.514/2011, que fixa limite mínimo de anuidades para a execução judicial (AREsp 2.147.187/MS).\r\r\n\r\r\n A regra do art. 8º da Lei nº 12.514/2011 objetiva racionalizar a atividade jurisdicional e uniformizar o tratamento dado aos conselhos profissionais, não havendo exceção para a OAB.\r\r\n\r\r\n O STJ fixou que o termo inicial do prazo prescricional se dá quando a dívida atinge o valor mínimo exigido para exequibilidade, e não no vencimento isolado de cada anuidade (REsp 1.524.930/RS, Rel. Min. Og Fernandes, Segunda Turma, j. 02/02/2017).\r\r\n\r\r\n A partir da alteração promovida pela Lei 14.195/2021, o teto para o ajuizamento da execução fiscal não mais depende do valor da anuidade fixado pelo respectivo Conselho, considerando a opção legislativa por um valor fixo. Assim, nos termos do art. 6º, \"caput\", I e §1º, da Lei nº 12.514/2011, o valor de alçada é de R$ 2.500,00 (dois mil e quinhentos reais), que deve ser reajustado de acordo com a variação integral do Índice Nacional de Preços ao Consumidor - INPC. (STJ, REsp nº 2.043.494/SC, Relator Ministro Herman Benjamin, Segunda Turma, julgado em 14.02.2023, DJe de 05.06.2023).\r\r\n\r\r\n O valor de R$ 2.500,00 (dois mil e quinhentos reais - referente ao teto da anuidade de profissional de nível superior), atualizado pelo INPC, corresponde a R$ 5.012,47 (cinco mil e doze reais e quarenta e sete centavos) na data de ajuizamento.\r\r\n\r\r\n A pretensão de cobrança das anuidades da OAB se submete ao prazo quinquenal previsto no art. 206, §5º, I, do Código Civil. No caso concreto, a dívida, correspondente a anuidades referentes aos exercícios de 2019 a 2022, atingiu o patamar de cinco anuidades exigido pela lei em 2021. Como a execução foi ajuizada em 11/01/2024, não houve consumação do prazo prescricional.\r\r\n\r\r\n A Súmula 393/STJ dispõe que a exceção de pré-executividade é admissível relativamente às matérias conhecíveis de ofício que não demandem dilação probatória.\r\r\n\r\r\n No que se refere ao excesso de execução, correta a decisão agravada ao rejeitar a alegação, tendo em vista que o agravante não apresentou memória de cálculo indicando o valor que entende devido, limitando-se a impugnações genéricas, o que inviabiliza o exame da matéria.\r\r\n\r\r\n Em decorrência da via eleita e observado que o agravante sequer apresentou o valor que entende devido, nos ter
