 PROVAB e do PRMGFC, motivo pelo qual a Apelante, integrante do PMMB, não faria jus à bonificação de 10% (dez por cento) na nota da prova da residência médica, a hipótese é de se privilegiar o entendimento colegiado firmado por esta eg. Terceira Turma.\r\r\n\r\r\n 3. A referida bonificação tem origem na Lei nº 12871/2013, que instituiu o Programa Mais Médicos e previu, no seu art. 22, pontuação adicional de 10% (dez por cento) na nota de todas as fases ou da fase única do processo de seleção pública dos Programas de Residência Médica, desde que realizado o programa em 1 (um) ano, nas ações de aperfeiçoamento na área de Atenção Básica em saúde em regiões prioritárias para o SUS, voltadas especificamente para os médicos formados em instituições de educação superior brasileiras ou com diploma revalidado, serão desenvolvidas por meio de projetos e programas dos Ministérios da Saúde e da Educação.\r\r\n\r\r\n 4. Consoante jurisprudência que se colhe deste Regional, em caso análogo ao presente, \"conquanto a norma editalícia possua status de lei entre as partes envolvidas no certame, ela não pode contrariar norma legal. Ainda que a questão controvertida tenha sido omissa no instrumento convocatório, como ocorreu no caso em análise, os ditames legais devem ser obedecidos. Precedente: (...) PROCESSO: 08009307620184050000, AG - Agravo de Instrumento, DESEMBARGADOR FEDERAL LEONARDO CARVALHO, 2ª Turma, JULGAMENTO: 18/12/2018\". \"Conclui-se que a omissão no corpo do edital não exclui a bonificação, eis que prevista em lei, vigente, de hierarquia superior àquela que se fundou o edital, no caso a Resolução nº 2/2015, do Conselho Nacional de Residência Médica.\" (TRF5 - Processo 0815065-77.2017.4.05.8100, Apelação Cível, Rel. Desembargador Federal Leonardo Henrique de Cavalcante Carvalho, 2ª Turma, Julgamento: 01/09/2020).\r\r\n\r\r\n 5. O Poder Judiciário não está substituindo a Banca Examinadora do Certame, na medida em que seu exame está restrito ao controle da legalidade do ato Administrativo, diante da inobservância dos preceitos da Lei nº 12871/2013, que estabeleceu apenas 2 (dois) requisitos para que o candidato obtenha a bonificação de 10% (dez por cento) na nota de todas as fases ou da fase única do processo de seleção pública dos Programas de Residência Médica, quais sejam: a) participação e cumprimento integral de ações na área de Atenção Básica em saúde em regiões prioritárias para o SUS; e b) realização do Programa em 1 (um) ano.\r\r\n\r\r\n 6. Precedentes desta Terceira Turma:  PROCESSO: 08000411420244058504, APELAÇÃO / REMESSA NECESSÁRIA, DESEMBARGADOR FEDERAL LUIZ BISPO DA SILVA NETO (CONVOCADO), 3ª TURMA, JULGAMENTO: 17/10/2024; PROCESSO: 0002570-06.2025.4.05.0000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL CID MARCONI, 3ª TURMA, JULGAMENTO: 02/10/2025.\r\r\n\r\r\n 7. Apesar de a Lei 15.233/25, de 07/10/25, ter revogado o trecho que prévia o acréscimo de 10% nas notas dos processos seletivos de residência medica para quem tivesse atuação por pelo menos 1 ano em programas relacionados à Atenção Básica, dada a necessidade de preservar a segurança jurídica, tal norma deve se restringir aos interessados que ainda não tenham completado 1 ano até 08/10/2025.\r\r\n\r\r\n 8. A despeito do preenchimento dos requisitos legais, houve recusa por parte da autoridade coatora para incluir a Apelante na lista de candidatos aptos à bonificação em processos seletivos de residência ainda durante a vigência do dispositivo legal que previa a bonificação.\r\r\n\r\r\n 9. Apelação provida para, reformando a sentença, conceder a segurança pleiteada. Sem condenação em honorários sucumbenciais (art. 25, Lei nº. 12.016/2009).", "relatorio": "Trata-se de Recurso de Apelação interposto por CLAUDIA PATRÍCIA CARVALHO GOIS em face de sentença proferida pelo Juízo da 4ª Vara Federal da Seção Judiciária de Alagoas que denegou a segurança, visando o reconhecimento de seu direito à pontuação adicional de 10% em processos seletivos de residência médica, nos termos do art. 22, §2º, da Lei nº 12.871/2013, em virtude de sua atuação no Programa Mais Médicos para o Brasil (PMMB), no Município de Quebrangulo/AL, desde 21/09/2023.\r\r\n\r\r\n Em síntese, o Apelante alega que: a) o art. 22, § 2º, da Lei nº 12.871/13, garante bonificação de 10% (dez por cento) sobre sua pontuação em todas as etapas ou na fase única dos processos seletivos de Residência Médica, em virtude do cumprimento de um ano de atividades no mencionado programa; b) apesar de atender os requisitos legais, teve indeferida a inclusão de seu nome na lista do Ministério da Educação relativa aos médicos habilitados a usufruir da bonificação adicional de 10% (dez por cento) na nota de todas as etapas dos processos seletivos; c) a bonificação tem sido concedido apenas em dois casos: (i) aos concluintes do PROVAB; e (ii) aos participantes de Programa de Residência Médica Geral da Família e Comunidade (PRMGFC); d) não pode resolução/portaria, ato administrativo hierarquicamente inferior, acrescentar conteúdo material à norma regulamentadora e estabelecer restrição não prevista em lei.\r\r\n\r\r\n Contrarrazões apresentadas pela União Federal.\r\r\n\r\r\n É o relatório.", "voto": "De início, recebo a apelação, considerando presentes os pressupostos recursais intrínsecos (cabimento, legitimação, interesse e inexistência de fato impeditivo ou extintivo do direito de recorrer) e extrínsecos (preparo, tempestividade e regularidade formal) para a admissibilidade do recurso.\r\r\n\r\r\n Ressalvado o entendimento pessoal do Relator, no sentido de que benefício pretendido é extensível tão somente para os candidatos egressos do PROVAB e do PRMGFC, motivo pelo qual a Apelante, integrante do PMMB, não faria jus à bonificação de 10% (dez por cento) na nota da prova da residência médica, a hipótese é de se privilegiar o entendimento colegiado firmado por esta eg. Terceira Turma.\r\r\n\r\r\n A referida bonificação tem origem na Lei nº 12871/2013, que instituiu o Programa Mais Médicos e previu, no seu art. 22, o seguinte:\r\r\n\r\r\n \"Art. 22. As demais ações de aperfeiçoamento na área de Atenção Básica em saúde em regiões prioritárias para o SUS, voltadas especificamente para os médicos formados em instituições de educação superior brasileiras ou com diploma revalidado, serão desenvolvidas por meio de projetos e programas dos Ministérios da Saúde e da Educação.\r\r\n\r\r\n (...)\r\r\n\r\r\n 2º O candidato que tiver participado das ações previstas no caput deste artigo e tiver cumprido integralmente aquelas ações, desde que realizado o programa em 1 (um) ano, receberá pontuação adicional de 10% (dez por cento) na nota de todas as fases ou da fase única do processo de seleção pública dos Programas de Residência Médica a que se refere o art. 2º da Lei no 6.932, de 1981.\"\r\r\n\r\r\n Ademais, consoante jurisprudência que se colhe deste Regional, em caso análogo ao presente, \"conquanto a norma editalícia possua status de lei entre as partes envolvidas no certame, ela não pode contrariar norma legal. Ainda que a questão controvertida tenha sido omissa no instrumento convocatório, como ocorreu no caso em análise, os ditames legais devem ser obedecidos. Precedente: (...) PROCESSO: 08009307620184050000, AG - Agravo de Instrumento, DESEMBARGADOR FEDERAL LEONARDO CARVALHO, 2ª Turma, JULGAMENTO: 18/12/2018\". \"Conclui-se que a omissão no corpo do edital não exclui a bonificação, eis que prevista em lei, vigente, de hierarquia superior àquela que se fundou o edital, no caso a Resolução nº 2/2015, do Conselho Nacional de Residência Médica.\" (TRF5 - Processo 0815065-77.2017.4.05.8100, Apelação Cível, Rel. Desembargador Federal Leonardo Henrique de Cavalcante Carvalho, 2ª Turma, Julgamento: 01/09/2020).\r\r\n\r\r\n Importante esclarecer, ainda, que, decidindo assim, o Poder Judiciário não está substituindo a Banca Examinadora do Certame, na medida em que seu exame está restrito ao controle da legalidade do ato Administrativo, diante da inobservância dos preceitos da Lei nº 12871/2013.\r\r\n\r\r\n Portanto, a Lei nº 12871/2013 estabeleceu apenas 2 (dois) requisitos para que o candidato obtenha a bonificação de 10% (dez por cento) na nota de todas as fases ou da fase única do processo de seleção pública dos Programas de Residência Médica, quais sejam: a) participação e cumprimento integral de ações na área de Atenção Básica em saúde em regiões prioritárias para o SUS; e b) realização do Programa em 1 (um) ano.\r\r\n\r\r\n Do exame dos autos, verifica-se que a Apelante iniciou suas atividades no Programa Mais Médicos em 21/09/2023, permanecendo até os dias atuais.\r\r\n\r\r\n No mesmo sentido, precedentes desta Terceira Turma:\r\r\n\r\r\n \"ADMINISTRATIVO. CONCURSO. RESIDÊNCIA MÉDICA. BONIFICAÇÃO DE 10%. LEI Nº 12.871/2013. PREENCHIMENTOS DOS REQUISITOS. CONCESSÃO DA SEGURANÇA. MANUTENÇÃO. REMESSA OFICIAL IMPROVIDA. APELAÇÃO IMPROVIDA. 1. Apelação interposta em face de sentença que concedeu a segurança para determinar à autoridade impetrada que inclua o nome da impetrante na listagem de candidatos aptos à bonificação em processos seletivos de residência médica, conforme o art. 22, § 2º, da Lei n. 12.871/2013, intimando-se a presidência do Conselho Nacional de Residência Médica, vinculado ao MEC, para cumprir este decisório, no prazo de 15 (quinze) dias, sob pena de multa diária no importe de R$ 200,00 (duzentos reais), limitada, inicialmente, a R$ 3.000,00 (três mil reais).\r\r\n\r\r\n 2. A matéria foi apreciada por este eg. Tribunal, por ocasião do julgamento do AGTR nº 0803223-09.2024.4.05.0000, oportunidade em que a Terceira Turma, à unanimidade, negou provimento ao agravo de instrumento, concluindo que \"a impetrante comprovou, por meio de declaração emitida pela Secretaria Municipal de Saúde da Prefeitura de Feira Nova/SE anexada aos autos de origem, ser profissional médica, inscrita no CRM/SE sob n. 7.069, bem como sua participação, desde janeiro de 2022, no programa de Atenção Primária à Saúde na condição de médica da Estratégia de Saúde da Família\".\r\r\n\r\r\n 3. A Lei 12.871/2013 estabeleceu apenas dois requisitos para que o candidato obtenha a bonificação de 10% (dez por cento) na nota de todas as fases ou da fase única do processo de seleção pública dos Programas de Residência Médica, quais sejam: a) participação e cumprimento integral de ações na área de Atenção Básica em saúde em regiões prioritárias para o SUS; e b) realização do programa em 1 (um) ano (PROCESSO: 08009644120244050000, PEDIDO DE EFEITO SUSPENSIVO À APELAÇÃO, DESEMBARGADOR FEDERAL LUIZ BISPO DA SILVA NETO (CONVOCADO), 3ª TURMA, JULGAMENTO: 18/04/2024). 4. A conclusão do Juízo de Origem também está em consonância com o entendimento adotado pelo TRF5, em casos semelhantes: PROCESSO: 08014526220234058202, APELAÇÃO / REMESSA NECESSÁRIA, DESEMBARGADOR FEDERAL RUBENS DE MENDONÇA CANUTO NETO, 4ª TURMA, JULGAMENTO: 30/09/2024; PROCESSO: 08000182920234058205, APELAÇÃO / REMESSA NECESSÁRIA, DESEMBARGADOR FEDERAL RAFAEL CHALEGRE DO REGO BARROS (CONVOCADO), 3ª TURMA, JULGAMENTO: 26/09/2024; PROCESSO: 08014517720234058202, APELAÇÃO / REMESSA NECESSÁRIA, DESEMBARGADOR FEDERAL ANDRE LUIS MAIA TOBIAS GRANJA (CONVOCADO), 6ª TURMA, JULGAMENTO: 27/08/2024. 5. Considerando ainda que a previsão do edital não pode contrariar a norma legal, tampouco ser omissa quanto ao percentual em questão, deve a concessão da segurança ser mantida, por seus termos. 6. Remessa oficial improvida. Apelação improvida. Condenação da recorrente ao pagamento de honorários recursais, nos termos do art. 85, § 11, CPC/2015, ficando os honorários sucumbenciais que lhe cabem majorados em um ponto percentual, mantida a suspensão, por ser a parte beneficiária da assistência judiciária gratuita.\"\r\r\n\r\r\n (PROCESSO: 08000411420244058504, APELAÇÃO / REMESSA NECESSÁRIA, DESEMBARGADOR FEDERAL LUIZ BISPO DA SILVA NETO (CONVOCADO), 3ª TURMA, JULGAMENTO: 17/10/2024)\r\r\n\r\r\n ADMINISTRATIVO E PROCESSUAL CIVIL. AGRAVO DE INSTRUMENTO. PROCESSO SELETIVO PARA RESIDÊNCIA MÉDICA. CANDIDATA VINCULADA AO PROGRAMA DE ATENÇÃO PRIMÁRIA À SAÚDE DA ESTRATÉGIA DE SAÚDE DA FAMÍLIA EM REGIÃO PRIORITÁRIA PARA O SUS. BONIFICAÇÃO DE 10%. DIREITO À PONTUAÇÃO ADICIONAL. LEI Nº 12.871/2013. AGRAVO DE INSTRUMENTO PROVIDO.\r\r\n\r\r\n 1. Agravo de Instrumento interposto pela Impetrante do Mandado de Segurança originário em face de decisão que indeferiu o pedido de liminar, qual seja, o que pretendia a pontuação adicional de 10% (dez por cento) no processo seletivo para residência médica previsto no Edital nº 03/2025 - ENARE, por entender o douto Magistrado que a atuação na rede de Atenção Básica em Saúde, através da Estratégia Saúde da Família (ESF), não se encontra albergada pelo disciplinamento legal para fins da mencionada bonificação, uma vez que tem finalidade diversa do Programa Mais Médicos.\r\r\n\r\r\n 2. Na hipótese, o Edital 03/2025 - residência médica ENARE previu o bônus de 10% de pontuação para os candidatos que provarem ter participado por, no mínimo, 1 ano, do Programa de Valorização do Profissional da Atenção Básica - PROVAB.\r\r\n\r\r\n 3. Alega a Impetrante/Agravante que quem atua nas áreas de atenção básica tem direito ao mencionado acréscimo em sua nota na prova do ENARE.\r\r\n\r\r\n 4. Referida bonificação tem origem na Lei nº 12871/2013, que instituiu o Programa Mais Médicos e previu, no seu art. 22, o seguinte: \"Art. 22. As demais ações de aperfeiçoamento na área de Atenção Básica em saúde em regiões prioritárias para o SUS, voltadas especificamente para os médicos formados em instituições de educação superior brasileiras ou com diploma revalidado, serão desenvolvidas por meio de projetos e programas dos Ministérios da Saúde e da Educação. (...). 2º O candidato que tiver participado das ações previstas no caput deste artigo e tiver cumprido integralmente aquelas ações, desde que realizado o programa em 1 (um) ano, receberá pontuação adicional de 10% (dez por cento) na nota de todas as fases ou da fase única do processo de seleção pública dos Programas de Residência Médica a que se refere o art. 2º da Lei no 6.932, de 1981\".\r\r\n\r\r\n 5. Portanto, a Lei nº 12871/2013 estabeleceu apenas 2 (dois) requisitos para que o candidato obtenha a bonificação de 10% (dez por cento) na nota de todas as fases ou da fase única do processo de seleção pública dos Programas de Residência Médica, quais sejam: a) participação e cumprimento integral de ações na área de Atenção Básica em saúde em regiões prioritárias para o SUS; e b) realização do Programa em 1 (um) ano.\r\r\n\r\r\n 6. No caso, a Declaração de Vínculo, emitida pela Coordenação de Atenção Básica de Pombal e assinada pela Secretária Municipal de Saúde, informa que a Requerente vem atuando como médica de Estratégia de Saúde da Família do Município de Pombal/PB, desde dezembro de 2023 até o momento da emissão da certidão (julho de 2025), na UBS XIV Altiplano, com carga-horária de 40 horas semanais. Essa mesma declaração informa que a ESF a que está vinculada a Agravante está ligada à Unidade Básica de Saúde localizada em setor que compõe os 20% mais pobres do Município, considerada, portanto, área prioritária para o SUS.\r\r\n\r\r\n 7. A Agravante comprovou, portanto, ser profissional médica e estar participando, desde dezembro de 2023, do programa de Atenção Primária à Saúde da Estratégia de Saúde da Família em região prioritária para o SUS, cabendo-lhe a bonificação pretendida.\r\r\n\r\r\n 8. Ademais, consoante jurisprudência que se colhe deste Regional, em caso análogo ao presente, \"conquanto a norma editalícia possua status de lei entre as partes envolvidas no certame, ela não pode contrariar norma legal. Ainda que a questão controvertida tenha sido omissa no instrumento convocatório, como ocorreu no caso em análise, os ditames legais devem ser obedecidos. Precedente: (...) PROCESSO: 08009307620184050000, AG - Agravo de Instrumento, DESEMBARGADOR FEDERAL LEONARDO CARVALHO, 2ª Turma, JULGAMENTO: 18/12/2018\". \"Conclui-se que a omissão no corpo do edital não exclui a bonificação, eis que prevista em lei, vigente, de hierarquia superior àquela que se fundou o edital, no caso a Resolução nº 2/2015, do Conselho Nacional de Residência Médica.\" (TRF5 - Processo 0815065-77.2017.4.05.8100, Apelação Cível, Rel. Desembargador Federal Leonardo Henrique de Cavalcante Carvalho, 2ª Turma, Julgamento: 01/09/2020).\r\r\n\r\r\n 9. Importante esclarecer, ainda, que, decidindo assim, o Poder Judiciário não está substituindo a Banca Examinadora do Certame, na medida em que seu exame está restrito ao controle da legalidade do ato Administrativo, diante da inobservância dos preceitos da Lei nº 12871/2013.\r\r\n\r\r\n 10. Nesse mesmo sentido, colhem-se precedentes desta e. Terceira Turma: 08000411420244058504, APELAÇÃO / REMESSA NECESSÁRIA, DESEMBARGADOR FEDERAL LUIZ BISPO DA SILVA NETO (CONVOCADO), 3ª TURMA, JULGAMENTO: 17/10/2024; e 08032230920244050000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL ROGÉRIO DE MENESES FIALHO MOREIRA, 3ª TURMA, JULGAMENTO: 09/05/2024.\r\r\n\r\r\n 11. Agravo de Instrumento provido para determinar que seja computada, a título provisório, enquanto não decidido o processo originário, a pontuação adicional de 10% (dez por cento) na nota da Agravante, nos processos seletivos para residência médica.\r\r\n\r\r\n (PROCESSO: 0002570-06.2025.4.05.0000, AGRAVO DE INSTRUMENTO, DESEMBARGADOR FEDERAL CID MARCONI, 3ª TURMA, JULGAMENTO: 02/10/2025)\r\r\n\r\r\n Vale ponderar, ainda, que apesar de a Lei 15.233/25, de 07/10/25, ter revogado o trecho que prévia o acréscimo de 10% nas notas dos processos seletivos de residência medica para quem tivesse atuação por pelo menos 1 ano em programas relacionados à Atenção Básica, dada a necessidade de preservar a segurança jurídica, tal norma deve se restringir aos interessados que ainda não tenham completado 1 ano até 08/10/2025.\r\r\n\r\r\n A despeito do preenchimento dos requisitos legais, houve recusa por parte da autoridade coatora para incluir a Apelante na lista de candidatos aptos à bonificação em processos seletivos de residência ainda durante a vigência do dispositivo legal que previa a bonificação.\r\r\n\r\r\n Ante o exposto, DOU PROVIMENTO à Apelação para, reformando a sentença, conceder a segurança pleiteada.\r\r\n\r\r\n Sem condenação em honorários sucumbenciais, com fundamento no art. 25, Lei nº. 12.016/2009.\r\r\n\r\r\n É como voto.", "acordao": "Vistos, etc.\r\r\n\r\r\n Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, DAR PROVIMENTO à Apelação, nos termos do voto do relator e na forma do relatório constante dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Provido", "css": "provido"}, {"nome": "20260313_135948_Re__VOTO.0003960-11.2025.4.05.0000.VIRTUAL.26.03.2026", "cnj": "0003960-11.2025.4.05.0000", "cab": "PROCESSO Nº: 0003960-11.2025.4.05.0000 - APELAÇÃO CÍVEL", "assessor": "Ana Carolina Olímpia Portella", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "PREVIDENCIÁRIO. SALÁRIO-MATERNIDADE. SEGURADA ESPECIAL. NÃO COMPROVAÇÃO DA CONDIÇÃO DE TRABALHADORA RURAL. DOCUMENTOS DECLARATÓRIOS E/OU CONTEMPORÂNEOS AO PARTO. EXTINÇÃO DO PROCESSO SEM RESOLUÇÃO DO MÉRITO. APELAÇÃO PREJUDICADA.\r\r\n\r\r\n 1. Cuida-se de Apelação Cível interposta pelo Autor, em face de sentença que julgou improcedente o pedido de concessão do benefício de salário-maternidade.\r\r\n\r\r\n 2. A suplicante alega que as provas carreadas aos autos socorrem suas pretensões, vez que a mesma comprovou, na forma do art. 106 da lei 8.213/91, o preenchimento do requisito para concessão do benefício.\r\r\n\r\r\n 3. A Trabalhadora Rural tem direito ao benefício de salário-maternidade, desde que comprove o exercício de labor no campo durante o período de carência de 10 meses (arts. 71 a 73 da Lei 8.213/91).\r\r\n\r\r\n 4. Há nos autos os seguintes documentos: I) Documentos pessoais, inclusive certidão de nascimento da filha da requerente (22/10/2019); II) Documentos referentes ao proprietário das terras trabalhadas; III) Declaração de aptidão ao PRONAF, com emissão em 14/09/2022; IV) Um recibo de pagamento de contribuição sindical de 24/08/2022; V) CNIS do cônjuge da autora em que consta vínculo empregatício urbano até janeiro de 2018 e entre 19/09/2022 a 06/03/2023.\r\r\n\r\r\n 5. Os documentos apresentados não servem para fins de comprovação do exercício de atividade rural nos dez meses anteriores ao parto, que ocorreu em 22/10/2019, ante seu caráter meramente declaratório, além de terem sido produzidos às vésperas do requerimento administrativo, ou de estarem em nome da mãe da requerente.\r\r\n\r\r\n 6. O Superior Tribunal de Justiça, no julgamento do REsp 1.352.721/SP, julgado sob o regime do artigo 543-C, do CPC, assentou o entendimento no sentido de que: \"A ausência de conteúdo probatório eficaz a instruir a inicial, conforme determina o art. 283 do CPC, implica a carência de pressuposto de constituição e desenvolvimento válido do processo, impondo a sua extinção sem o julgamento do mérito (art. 267, IV do CPC) e a consequente possibilidade de o autor intentar novamente a ação (art. 268 do CPC), caso reúna os elementos necessários à tal iniciativa\".\r\r\n\r\r\n 7. Extinção do processo, de ofício, sem resolução do mérito, nos termos do artigo 485, IV do CPC/2015. Apelação prejudicada. Agravo interno prejudicada.", "relatorio": "Cuida-se de Apelação Cível interposta pelo Autor, em face de sentença que julgou improcedente o pedido de concessão do benefício de salário-maternidade.\r\r\n\r\r\n Em razões de apelo a suplicante alega que as provas carreadas aos autos socorrem suas pretensões, vez que a mesma comprovou, na forma do art. 106 da lei 8.213/91, o preenchimento do requisito para concessão do benefício.\r\r\n\r\r\n Devidamente intimada, a parte ré não apresentou contrarrazões ao recurso.\r\r\n\r\r\n É o que havia de relevante para relatar.\r\r\n\r\r\n FIM RELATÓRIO", "voto": "Recebo a Apelação interposta pela parte autora, considerando presentes os requisitos intrínsecos e extrínsecos para a admissibilidade do recurso.\r\r\n\r\r\n O benefício de salário-maternidade foi instituído com o objetivo de proteger o mercado de trabalho da mulher, desse modo, o legislador retirou das empresas o encargo de seu pagamento, que passou a ser feito unicamente pelo INSS.\r\r\n\r\r\n A Lei nº 8.213, de 24.07.91, ao dispor sobre o salário-maternidade, assim dispõe:\r\r\n\r\r\n \"Art. 71. O salário-maternidade é devido à segurada da Previdência Social, durante 120 (cento e vinte) dias, com início no período entre 28 (vinte e oito) dias antes do parto e a data de ocorrência deste, observadas as situações e condições previstas na legislação no que concerne à proteção à maternidade.\"\r\r\n\r\r\n A seu turno, o artigo 93, §2º, do Decreto nº 3.048/99 estabelece que:\r\r\n\r\r\n Art. 93\r\r\n\r\r\n (...)\r\r\n\r\r\n § 2o Será devido o salário-maternidade à segurada especial, desde que comprove o exercício de atividade rural nos últimos dez meses imediatamente anteriores à data do parto ou do requerimento do benefício, quando requerido antes do parto, mesmo que de forma descontínua, aplicando-se, quando for o caso, o disposto no parágrafo único do art. 29.\r\r\n\r\r\n No caso em tela, o pedido inicial foi indeferido pela sentença do Juízo de origem, sob o entendimento de que não restou comprovada a condição de rurícola da autora pelo período de carência necessário para a concessão do benefício.\r\r\n\r\r\n Alega a suplicante que, através de início de prova documental, comprovou a sua condição de trabalhadora rural pelo período de carência exigido em lei.\r\r\n\r\r\n Constam nos autos os seguintes documentos:\r\r\n\r\r\n I) Documentos pessoais, inclusive certidão de nascimento da filha da requerente (22/10/2019);\r\r\n\r\r\n II) Documentos referentes ao proprietário das terras trabalhadas;\r\r\n\r\r\n III) Declaração de aptidão ao PRONAF, com emissão em 14/09/2022;\r\r\n\r\r\n IV) Um recibo de pagamento de contribuição sindical de 24/08/2022\r\r\n\r\r\n V) CNIS do cônjuge da autora em que consta vínculo empregatício urbano até janeiro de 2018 e entre 19/09/2022 a 06/03/2023.\r\r\n\r\r\n Os documentos apresentados não servem para fins de comprovação do exercício de atividade rural nos dez meses anteriores ao parto, que ocorreu em 22/10/2019, ante seu caráter meramente declaratório, além de terem sido produzidos às vésperas do requerimento administrativo, ou de estarem em nome de terceiros.\r\r\n\r\r\n Conforme disposto no art. 55, § 3º da Lei 8.213/9, a comprovação do tempo de serviço só produzirá efeito quando baseada em início de prova material, não sendo admitida prova exclusivamente testemunhal. Assim, a prova testemunhal, assim como qualquer outro meio de prova idôneo, corrobora início de prova material que for razoável.\r\r\n\r\r\n No mesmo sentido dispõe a Súmula nº 149 do STJ, segundo a qual: \"A prova exclusivamente testemunhal não basta à comprovação da atividade rurícola, para efeito da obtenção do benefício previdenciário\".\r\r\n\r\r\n O Col. Superior Tribunal de Justiça, última instância em matéria infraconstitucional, pacificou o entendimento de que a regra supracitada, ao vedar a valorização de prova exclusivamente testemunhal, é dirigida também ao Judiciário, independentemente do tipo de ação manejada, inclusive nos feitos em que se assegure a garantia do contraditório.\r\r\n\r\r\n A jurisprudência desta Corte Regional é uníssona quanto à matéria objeto desta ação judicial. Veja-se: PJE 3000313-90.2023.8.06.0120, Relator Des. Federal Alexandre Luna Freire, 3ª Turma, julg. 05/09/2024; PJE 0200033-67.2023.8.06.0095, Relator Des. Federal Cid Marconi Gurgel de Souza, 3ª Turma, julg. 18/07/2024 e PJE 3000004-39.2023.8.06.0130, Relator Des. Federal Rogério Fialho Moreira, 3ª Turma, julg. 04/07/2024.\r\r\n\r\r\n O Superior Tribunal de Justiça, no julgamento do REsp 1.352.721/SP, julgado sob o regime do artigo 543-C, do CPC, assentou o entendimento no sentido de que: \"A ausência de conteúdo probatório eficaz a instruir a inicial, conforme determina o art. 283 do CPC, implica a carência de pressuposto de constituição e desenvolvimento válido do processo, impondo a sua extinção sem o julgamento do mérito (art. 267, IV do CPC) e a consequente possibilidade de o autor intentar novamente a ação (art. 268 do CPC), caso reúna os elementos necessários à tal iniciativa\".\r\r\n\r\r\n A jurisprudência desta Corte Regional é uníssona quanto à matéria objeto desta ação judicial. Veja-se: PJE 3000313-90.2023.8.06.0120, Relator Des. Federal Alexandre Luna Freire, 3ª Turma, julg. 05/09/2024; PJE 0200033-67.2023.8.06.0095, Relator Des. Federal Cid Marconi Gurgel de Souza, 3ª Turma, julg. 18/07/2024 e PJE 3000004-39.2023.8.06.0130, Relator Des. Federal Rogério Fialho Moreira, 3ª Turma, julg. 04/07/2024.\r\r\n\r\r\n Com estas considerações, reconhecendo a insuficiência de prova eficaz a instruir a inicial, julgo de ofício extinto o feito sem resolução do mérito, por carência de pressuposto de constituição e desenvolvimento válido do processo, a teor do disposto no art. 485, IV, do CPC/2015.  Apelação e agravo interno prejudicados.\r\r\n\r\r\n É como voto.", "acordao": "Vistos, etc.\r\r\n\r\r\n Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, de ofício, EXTINGUIR o processo sem resolução do mérito e JULGAR PREJUDICADA a apelação do particular e o agravo interno, nos termos do voto do relator, na forma do relatório e notas taquigráficas constantes dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Resultado não identificado", "css": "outro"}, {"nome": "20260313_205400_Re__VOTO.ED.0005557-49.2022.4.05.8300.VIRTUAL.26.03.2026", "cnj": "0005557-49.2022.4.05.8300", "cab": "APELAÇÃO CÍVEL (198) Nº 0005557-49.2022.4.05.8300", "assessor": "Joana Barbosa Lima De Oliveira", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "TRIBUTÁRIO. EMBARGOS DE DECLARAÇÃO. AÇÃO ANULATÓRIA. AUTO DE INFRAÇÃO. REGIME NÃO CUMULATIVO. APURAÇÃO. PIS E COFINS. CONTRARIEDADE AO TÍTULO JUDICIAL. APURAÇÃO PELA SISTEMÁTICA CUMULATIVA. AUSÊNCIA OMISSÃO. EMBARGOS NÃO PROVIDOS.\r\r\n\r\r\n 1. Embargos de declaração opostos pela Fazenda Nacional em face de acórdão desta Turma que, à unanimidade de votos, deu parcial provimento à apelação para declarar a invalidade das apurações fundadas na sistemática não cumulativa do PIS/COFINS, relativas aos períodos de apuração discutidos no Processo Administrativo nº 10480.721683/2009-87, nos exatos termos do título judicial formado no Mandado de Segurança nº 0013797-18.2008.4.05.8300, ficando reservado à fase de liquidação por cálculos o reprocessamento no regime cumulativo, por competência, com os abatimentos legais (pagamentos, retenções e parcelamentos) e a verificação de eventual saldo remanescente.\r\r\n\r\r\n 2. Os embargos de declaração, consoante disciplina o art.1.022 do CPC, objetivam corrigir erro material ou sanar eventuais omissões, contradições ou obscuridades da decisão judicial, não se prestando como instrumento processual apto a promover a reapreciação do julgado.\r\r\n\r\r\n 3. A Fazenda Nacional, nas razões recursais, apesar de mencionar supostas omissões, não traz qualquer elemento que demonstre o alegado, limitando-se a rediscutir o mérito da questão.\r\r\n\r\r\n 4. O acórdão embargado, ao decidir em consonância com a legislação e a jurisprudência aplicáveis à controvérsia, firmou o entendimento de que, tendo o Auto de Infração adotado a sistemática da não cumulatividade para apuração de receitas de prestação de serviços referentes às competências do ano de 2007, o lançamento se mostra em dissonância com o título judicial, razão pela qual deve ser reprocessado segundo o regime cumulativo.\r\r\n\r\r\n 5. Consoante consignado no decisum, o Tema 337 do STF reconhece a coexistência dos regimes cumulativo e não cumulativo na apuração do PIS e da COFINS das empresas prestadoras de serviços, bem como a legitimidade de o legislador submetê-las a distintos critérios normativos. No caso dos autos, contudo, a permanência da autora no regime cumulativo decorre de título judicial transitado em julgado, o qual vincula a Administração Tributária.\r\r\n\r\r\n 6. Ausência de omissão quanto à ausência de trânsito em julgado do Mandado de Segurança nº 0013797-18.2008.4.05.8300. O acórdão enfrentou expressamente a matéria ao consignar que o acórdão proferido naquele writ transitou em julgado em 14/03/2023, conforme certidão juntada pela apelante (Id 4340001).\r\r\n\r\r\n 7. A tese referente ao regime cumulativo integrou a própria petição inicial, constituindo, precisamente, o núcleo do fundamento de nulidade do auto de infração. Com efeito, a parte autora sustentou ter sido indevidamente deslocada do regime cumulativo para o não cumulativo, o que a teria compelido ao recolhimento de PIS e COFINS em valores indevidamente majorados.\r\r\n\r\r\n 8. O acórdão também enfrentou de forma expressa a validade residual dos capítulos do lançamento vinculados a divergências declaratórias, ao assentar que o título judicial não alcança, de modo automático e universal, todos os fundamentos do auto de infração. Ficou consignado que subsistem, em tese, capítulos de natureza estritamente declaratória, tais como divergências entre DCTF e escrituração, comprovação de retenções informadas em DIRFs, bem como o abatimento de DARFs e de parcelas do parcelamento previsto na Lei nº 11.941/2009, matérias que demandam recomposição aritmética por competência, mediante memória de cálculo idônea, antes de eventual declaração de extinção do crédito.\r\r\n\r\r\n 9. No tocante à alegação de omissão quanto à legalidade da multa de ofício, o acórdão apreciou diretamente a questão e concluiu pelo seu afastamento, ao fundamento de que, tendo o auto sido lavrado após a sentença concessiva no mandado de segurança, incidem o art. 63 da Lei nº 9.430/1996 e o art. 62 do Decreto nº 70.235/1972, de modo que somente se admitia lançamento conservatório, sem imposição de penalidade.\r\r\n\r\r\n 10. O julgador não está obrigado a rebater todos os argumentos suscitados pelas partes, mas a fundamentar o julgado com as razões suficientes ao seu convencimento, conforme assentado pelo STF.\r\r\n\r\r\n 11. A embargante deseja rediscutir questões efetivamente apreciadas por ocasião do julgamento que originou o acórdão ora questionado, entretanto, os embargos de declaração, ainda que opostos para fins de prequestionamento, não se prestam a este fim.\r\r\n\r\r\n 12. Embargos de declaração conhecidos e desprovidos.", "relatorio": "Trata-se de embargos de declaração opostos pela Fazenda Nacional em face de acórdão desta Turma que, à unanimidade de votos, deu parcial provimento à apelação para declarar a invalidade das apurações fundadas na sistemática não cumulativa do PIS/COFINS, relativas aos períodos de apuração discutidos no Processo Administrativo nº 10480.721683/2009-87, nos exatos termos do título judicial formado no Mandado de Segurança nº 0013797-18.2008.4.05.8300, ficando reservado à fase de liquidação por cálculos o reprocessamento no regime cumulativo, por competência, com os abatimentos legais (pagamentos, retenções e parcelamentos) e a verificação de eventual saldo remanescente.\r\r\n\r\r\n Nas razões recursais, a Fazenda Nacional aponta que o acórdão embargado teria sido omisso na análise dos seguintes pontos: a) não houve comprovação, nos autos, do trânsito em julgado do Mandado de Segurança nº 0013797-18.2008.4.05.8300 à época da prolação da sentença; b) a constatação de que a discussão sobre o regime cumulativo não integrou a causa de pedir originária; c) a validade do lançamento por diferenças fundado em divergências declaratórias e retenções não comprovadas; d) a legalidade da multa de ofício à luz dessas infrações materiais.\r\r\n\r\r\n Contrarrazões apresentadas pelo particular.\r\r\n\r\r\n É o relatório.", "voto": "Os embargos de declaração, consoante disciplina o art.1.022 do CPC, objetivam corrigir erro material ou sanar eventuais omissões, contradições ou obscuridades da decisão judicial, não se prestando como instrumento processual apto a promover a reapreciação do julgado.\r\r\n\r\r\n A Fazenda Nacional, nas razões recursais, apesar de mencionar supostas omissões, não traz qualquer elemento que demonstre o alegado, limitando-se a rediscutir o mérito da questão.\r\r\n\r\r\n O acórdão embargado, ao decidir em consonância com a legislação e a jurisprudência aplicáveis à controvérsia, firmou o entendimento de que, tendo o Auto de Infração adotado a sistemática da não cumulatividade para apuração de receitas de prestação de serviços referentes às competências do ano de 2007, o lançamento se mostra em dissonância com o título judicial, razão pela qual deve ser reprocessado segundo o regime cumulativo.\r\r\n\r\r\n Consoante consignado no decisum, o Tema 337 do STF reconhece a coexistência dos regimes cumulativo e não cumulativo na apuração do PIS e da COFINS das empresas prestadoras de serviços, bem como a legitimidade de o legislador submetê-las a distintos critérios normativos. No caso dos autos, contudo, a permanência da autora no regime cumulativo decorre de título judicial transitado em julgado, o qual vincula a Administração Tributária.\r\r\n\r\r\n Diversamente do que sustenta a embargante, não há omissão quanto à ausência de trânsito em julgado do Mandado de Segurança nº 0013797-18.2008.4.05.8300. O acórdão enfrentou expressamente a matéria ao consignar que o acórdão proferido naquele writ transitou em julgado em 14/03/2023, conforme certidão juntada pela apelante (Id 4340001).\r\r\n\r\r\n Ademais, a tese referente ao regime cumulativo integrou a própria petição inicial, constituindo, precisamente, o núcleo do fundamento de nulidade do auto de infração. Com efeito, a parte autora sustentou ter sido indevidamente deslocada do regime cumulativo para o não cumulativo, o que a teria compelido ao recolhimento de PIS e COFINS em valores indevidamente majorados.\r\r\n\r\r\n O acórdão também enfrentou de forma expressa a validade residual dos capítulos do lançamento vinculados a divergências declaratórias, ao assentar que o título judicial não alcança, de modo automático e universal, todos os fundamentos do auto de infração. Ficou consignado que subsistem, em tese, capítulos de natureza estritamente declaratória, tais como divergências entre DCTF e escrituração, comprovação de retenções informadas em DIRFs, bem como o abatimento de DARFs e de parcelas do parcelamento previsto na Lei nº 11.941/2009, matérias que demandam recomposição aritmética por competência, mediante memória de cálculo idônea, antes de eventual declaração de extinção do crédito.\r\r\n\r\r\n Por fim, no tocante à alegação de omissão quanto à legalidade da multa de ofício, o acórdão apreciou diretamente a questão e concluiu pelo seu afastamento, ao fundamento de que, tendo o auto sido lavrado após a sentença concessiva no mandado de segurança, incidem o art. 63 da Lei nº 9.430/1996 e o art. 62 do Decreto nº 70.235/1972, de modo que somente se admitia lançamento conservatório, sem imposição de penalidade.\r\r\n\r\r\n Conforme assentado pelo STF, o julgador não está obrigado a rebater todos os argumentos suscitados pelas partes, mas a fundamentar o julgado com as razões suficientes ao seu convencimento.\r\r\n\r\r\n Dito isso, acaso pretenda desconstituir os fundamentos utilizados no acórdão, cabe a parte manejar o recurso cabível, não se prestando os aclaratórios a revisar e reformar o julgado, modificando a sua conclusão por mero inconformismo.\r\r\n\r\r\n Conclui-se, assim, que, em relação ao tema, a embargante deseja rediscutir questões efetivamente apreciadas por ocasião do julgamento que originou o acórdão ora questionado. Frise-se, entretanto, que embargos de declaração, ainda que opostos para fins de prequestionamento, não se prestam a este fim.\r\r\n\r\r\n Em face do exposto, CONHEÇO dos embargos de declaração e NEGO-LHES PROVIMENTO.\r\r\n\r\r\n É como voto.", "acordao": "Vistos, etc.\r\r\n\r\r\n Decide a 3ª Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, CONHECER dos embargos de declaração e NEGAR-LHES PROVIMENTO, nos termos do voto do relator e na forma do relatório constante dos autos, que ficam fazendo parte integrante do presente julgado.\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Resultado não identificado", "css": "outro"}, {"nome": "20260313_205420_Re__VOTO.0006765-34.2025.4.05.0000.VIRTUAL.26.03.2026", "cnj": "0006765-34.2025.4.05.0000", "cab": "AGRAVO DE INSTRUMENTO (202) Nº 0006765-34.2025.4.05.0000", "assessor": "Mariana Nascimento Marinho", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "TRIBUTÁRIO E PROCESSUAL CIVIL. EXECUÇÃO FISCAL. CÉDULA DE CRÉDITO RURAL. PRESCRIÇÃO INTERCORRENTE. ART. 40 DA LEI N 6.830/80. AUSÊNCIA DE FATO INTERRUPTIVO OU SUSPENSIVO DA PRESCRIÇÃO. EXTINÇÃO DO FEITO. AGRAVO DE INSTRUMENTO PROVIDO.\r\r\n\r\r\n 1. Agravo de instrumento, com pedido de atribuição de efeito suspensivo, interposto por SEVERINO BATISTA DA SILVA FILHO contra decisão proferida pelo Juízo da 22ª Vara Federal da Seção Judiciária de Pernambuco que rejeitou o pedido de reconhecimento da prescrição intercorrente e determinou a expedição de mandado de penhora e avaliação do imóvel de matrícula nº 4.334, de sua propriedade.\r\r\n\r\r\n 2. Nas razões recursais, traz os seguintes argumentos: a) trata-se, na origem, de execução fiscal ajuizada em 03/04/2001, objetivando a cobrança de crédito inscrito em 21/05/1999; b) o feito foi redirecionado aos sócios, incluindo o agravante; c) determinada a suspensão (art. 40 da LEF) em 14/06/2017, pelo prazo de 1 (um) ano, o prazo de prescrição intercorrente se iniciou em 14/06/2018; d) em 22/08/2019 foi proferido novo despacho suspensivo, por mais 1 (um) ano;  e) tal ato é ineficaz para reiniciar o ciclo prescricional, nos moldes do Tema 566/STJ. Apesar disso, o Juízo a quo utilizou esta data para fixar o termo final da prescrição em 22/08/2025; f) houve bloqueio parcial de R$ 1.873,37 em conta do agravante, informado em 30/09/2019; g) referido bloqueio configurou um ato constritivo efetivo, interrompendo a prescrição; h) no intervalo entre 01/10/2019 e 01/10/2024, não houve qualquer outro ato de constrição ou diligência útil ao prosseguimento; i) o pedido de penhora do imóvel (matrícula nº 4.334) pela Fazenda Nacional, ocorrido apenas em 10/07/2025, é manifestamente posterior ao termo final da prescrição (01/10/2024), não podendo restaurar a exigibilidade do crédito; j) a decisão agravada se equivoca ao considerar o novo despacho de suspensão de 22/08/2019 como marco relevante, pois o Tema 566/STJ veda a renovação sucessiva da suspensão do art. 40 da LEF; k) o prosseguimento da execução com a determinação de penhora e avaliação do imóvel de matrícula nº 4.334 pode ocasionar grave constrição patrimonial ao agravante em relação a um crédito extinto pela prescrição intercorrente. Ademais, a continuidade de atos expropriatórios fundados em crédito prescrito configura violação à segurança jurídica e ao devido processo legal, podendo sujeitar o Agravante a prejuízos irreparáveis ou de difícil reparação.\r\r\n\r\r\n 3. A prescrição tem como objetivo por fim à pretensão do titular da ação que permaneceu inerte por um determinado lapso de tempo, privilegiando, assim, a segurança jurídica e a ordem social. Observe-se que a aplicação do instituto da prescrição não decorre de qualquer inércia momentânea, mas, sim, da inércia prolongada, fruto da negligência do titular do direito.\r\r\n\r\r\n 4. Visando evitar que os feitos executivos fiscais se prolonguem aguardando diligências a cargo do exequente, cabível a decretação da prescrição intercorrente, como forma de obstar a imprescritibilidade da pretensão executiva. (artigo 40 da Lei nº 6.830/80).\r\r\n\r\r\n 5. Como forma de impedir a eternização dos feitos executivos fiscais, o STJ formulou a Súmula 314, dispondo que \"em execução fiscal, não localizados bens penhoráveis, suspende-se o processo por um ano, findo o qual se inicia o prazo prescricional da prescrição intercorrente\".\r\r\n\r\r\n 6. Decorridos mais de 5 (cinco) anos do arquivamento provisório do processo, sem a existência de qualquer causa interruptiva ou suspensiva da fluência do lustro prescricional, configura-se a prescrição intercorrente.\r\r\n\r\r\n 7. A Primeira Seção do STJ, no julgamento do Tema 566, REsp 1.340.553/RS, fixou a tese de que o prazo de 1 (um) ano de suspensão do processo e do respectivo prazo prescricional previsto no art. 40, parágrafos 1º e 2º, da Lei nº 6.830/80 - LEF tem início automaticamente na data da ciência da Fazenda Pública a respeito da não localização do devedor ou da inexistência de bens penhoráveis no endereço fornecido, havendo, sem prejuízo dessa contagem automática, o dever de o magistrado declarar ter ocorrido a suspensão da execução.\r\r\n\r\r\n 7. No caso dos autos, em 14/06/2017, ocorreu a primeira suspensão do processo nos termos do art. 40 da Lei de Execuções Fiscais. Posteriormente, em 22/08/2019, foi proferido despacho de suspensão que a decisão recorrida considerou como marco relevante para a fixação do prazo prescricional. Em 30/09/2019, houve bloqueio parcial de R$ 1.873,37 em conta do agravante, configurando ato constritivo efetivo e apto a interromper a prescrição. Assim, em 01/10/2019, iniciou-se novo prazo prescricional de cinco anos, em razão da interrupção provocada pelo referido bloqueio. Nessa perspectiva, o termo final da prescrição intercorrente ocorreria em 01/10/2024. Apesar disso, apenas em 10/07/2025 a Fazenda Nacional requereu nova penhora, quando, segundo a tese do agravante, o prazo prescricional já se encontrava esgotado.\r\r\n\r\r\n 8. Decorridos mais de 5 (cinco) anos do arquivamento provisório do processo, sem a existência de qualquer causa interruptiva ou suspensiva da fluência do lustro prescricional, configura-se a prescrição intercorrente, de modo que não merece reforma a sentença proferida em 09/09/2025 que reconheceu a prescrição intercorrente.\r\r\n\r\r\n 9. Agravo de instrumento provido para reconhecer a prescrição intercorrente, extinguindo a execução fiscal, com base no artigo 40, § 4º da Lei nº 6.830/80 e dos artigos 487, II e 925 do CPC/2015.", "relatorio": "Trata-se de agravo de instrumento, com pedido de atribuição de efeito suspensivo, interposto por SEVERINO BATISTA DA SILVA FILHO contra decisão proferida pelo Juízo da 22ª Vara Federal da Seção Judiciária de Pernambuco que rejeitou o pedido de reconhecimento da prescrição intercorrente e determinou a expedição de mandado de penhora e avaliação do imóvel de matrícula nº 4.334, de sua propriedade.\r\r\n\r\r\n Nas razões recursais, traz os seguintes argumentos:\r\r\n\r\r\n a) trata-se, na origem, de execução fiscal ajuizada em 03/04/2001, objetivando a cobrança de crédito inscrito em 21/05/1999;\r\r\n\r\r\n b) o feito foi redirecionado aos sócios, incluindo o agravante;\r\r\n\r\r\n c) determinada a suspensão (art. 40 da LEF) em 14/06/2017, pelo prazo de 1 (um) ano, o prazo de prescrição intercorrente se iniciou em 14/06/2018;\r\r\n\r\r\n d) em 22/08/2019 foi proferido novo despacho suspensivo, por mais 1 (um) ano;\r\r\n\r\r\n e) tal ato é ineficaz para reiniciar o ciclo prescricional, nos moldes do Tema 566/STJ. Apesar disso, o Juízo a quo utilizou esta data para fixar o termo final da prescrição em 22/08/2025;\r\r\n\r\r\n f) houve bloqueio parcial de R$ 1.873,37 em conta do agravante, informado em 30/09/2019;\r\r\n\r\r\n g) referido bloqueio configurou um ato constritivo efetivo, interrompendo a prescrição;\r\r\n\r\r\n h) no intervalo entre 01/10/2019 e 01/10/2024, não houve qualquer outro ato de constrição ou diligência útil ao prosseguimento;\r\r\n\r\r\n i) o pedido de penhora do imóvel (matrícula nº 4.334) pela Fazenda Nacional, ocorrido apenas em 10/07/2025, é manifestamente posterior ao termo final da prescrição (01/10/2024), não podendo restaurar a exigibilidade do crédito;\r\r\n\r\r\n j) a decisão agravada se equivoca ao considerar o novo despacho de suspensão de 22/08/2019 como marco relevante, pois o Tema 566/STJ veda a renovação sucessiva da suspensão do art. 40 da LEF;\r\r\n\r\r\n k) o prosseguimento da execução com a determinação de penhora e avaliação do imóvel de matrícula nº 4.334 pode ocasionar grave constrição patrimonial ao agravante em relação a um crédito extinto pela prescrição intercorrente. Ademais, a continuidade de atos expropriatórios fundados em crédito prescrito configura violação à segurança jurídica e ao devido processo legal, podendo sujeitar o Agravante a prejuízos irreparáveis ou de difícil reparação.\r\r\n\r\r\n Contrarrazões apresentadas.\r\r\n\r\r\n É o relatório.", "voto": "Cinge-se a questão sobre a ocorrência ou não da prescrição intercorrente da execução fiscal.\r\r\n\r\r\n A prescrição tem como objetivo por fim à pretensão do titular da ação que permaneceu inerte por um determinado lapso de tempo, privilegiando, assim, a segurança jurídica e a ordem social. Observe-se que a aplicação do instituto da prescrição não decorre de qualquer inércia momentânea, mas, sim, da inércia prolongada, fruto da negligência do titular do direito.\r\r\n\r\r\n Visando evitar que os feitos executivos fiscais se prolonguem aguardando diligências a cargo do exequente, cabível a decretação da prescrição intercorrente, como forma de obstar a imprescritibilidade da pretensão executiva.\r\r\n\r\r\n Acerca da prescrição intercorrente, estabelece o art. 40 e parágrafos da Lei de Execução Fiscal (6.830/80):\r\r\n\r\r\n Art. 40 - O Juiz suspenderá o curso da execução, enquanto não for localizado o devedor ou encontrados bens sobre os quais possa recair a penhora, e, nesses casos, não correrá o prazo de prescrição.\r\r\n\r\r\n § 1º - Suspenso o curso da execução, será aberta vista dos autos ao representante judicial da Fazenda Pública.\r\r\n\r\r\n § 2º - Decorrido o prazo máximo de 1 (um) ano, sem que seja localizado o devedor ou encontrados bens penhoráveis, o Juiz ordenará o arquivamento dos autos.\r\r\n\r\r\n § 3º - Encontrados que sejam, a qualquer tempo, o devedor ou os bens, serão desarquivados os autos para prosseguimento da execução.\r\r\n\r\r\n § 4o Se da decisão que ordenar o arquivamento tiver decorrido o prazo prescricional, o juiz, depois de ouvida a Fazenda Pública, poderá, de ofício, reconhecer a prescrição intercorrente e decretá-la de imediato. (Incluído pela Lei nº 11.051, de 2004).\r\r\n\r\r\n § 5o A manifestação prévia da Fazenda Pública prevista no § 4º deste artigo será dispensada no caso de cobranças judiciais cujo valor seja inferior ao mínimo fixado por ato do Ministro de Estado da Fazenda. (Incluído pela Lei nº 11.960, de 2009).\r\r\n\r\r\n Como forma de impedir a eternização dos feitos executivos fiscais, o STJ formulou a Súmula 314, dispondo que \"em execução fiscal, não localizados bens penhoráveis, suspende-se o processo por um ano, findo o qual se inicia o prazo prescricional da prescrição intercorrente\".\r\r\n\r\r\n Assim, decorridos mais de 5 (cinco) anos do arquivamento provisório do processo, sem a existência de qualquer causa interruptiva ou suspensiva da fluência do lustro prescricional, configurar-se-ia a prescrição intercorrente.\r\r\n\r\r\n A Primeira Seção do STJ, no julgamento do Tema 566, REsp 1.340.553/RS, fixou a tese de que o prazo de 1 (um) ano de suspensão do processo e do respectivo prazo prescricional previsto no art. 40, parágrafos 1º e 2º, da Lei nº 6.830/80 - LEF tem início automaticamente na data da ciência da Fazenda Pública a respeito da não localização do devedor ou da inexistência de bens penhoráveis no endereço fornecido, havendo, sem prejuízo dessa contagem automática, o dever de o magistrado declarar ter ocorrido a suspensão da execução.\r\r\n\r\r\n No caso dos autos, em 14/06/2017, ocorreu a primeira suspensão do processo nos termos do art. 40 da Lei de Execuções Fiscais. Posteriormente, em 22/08/2019, foi proferido despacho de suspensão que a decisão recorrida considerou como marco relevante para a fixação do prazo prescricional. Em 30/09/2019, houve bloqueio parcial de R$ 1.873,37 em conta do agravante, configurando ato constritivo efetivo e apto a interromper a prescrição. Assim, em 01/10/2019, iniciou-se novo prazo prescricional de cinco anos, em razão da interrupção provocada pelo referido bloqueio. Nessa perspectiva, o termo final da prescrição intercorrente ocorreria em 01/10/2024. Apesar disso, apenas em 10/07/2025 a Fazenda Nacional requereu nova penhora, quando, segundo a tese do agravante, o prazo prescricional já se encontrava esgotado.\r\r\n\r\r\n Assim, decorridos mais de 5 (cinco) anos do arquivamento provisório do processo, sem a existência de qualquer causa interruptiva ou suspensiva da fluência do lustro prescricional, configura-se a prescrição intercorrente, de modo que não merece reforma a sentença proferida em 09/09/2025 que reconheceu a prescrição intercorrente.\r\r\n\r\r\n No mesmo sentido, destaco precedente desta Eg. Corte:\r\r\n\r\r\n PROCESSUAL CIVIL. EXECUÇÃO FISCAL. CÉDULA DE CRÉDITO RURAL TRANSFERIDA À UNIÃO. MP Nº 2.196-3/2001. PRAZO PRESCRICIONAL QUINQUENAL. LEIS ESPECIAIS. SUSPENSÃO DO PRAZO PRESCRICIONAL. PRESCRIÇÃO INTERCORRENTE CONSUMADA. EXTINÇÃO DA EXECUÇÃO. APELAÇÃO NÃO PROVIDA. SENTENÇA MANTIDA.\r\r\n\r\r\n 1. Recurso de apelação interposto pela UNIÃO (FAZENDA NACIONAL) em face de sentença proferida pelo douto Juízo da Vara do Único Ofício de Colônia Leopoldina/AL, que reconheceu a consumação da prescrição intercorrente e extinguiu a execução, na forma dos arts. 487, II, do CPC e 40, § 4º, da LEF.\r\r\n\r\r\n 2. Entendeu o magistrado que, desde 2007 teria sido constatada a inexistência de bens de nome do devedor, com início do prazo de suspensão nos termos do art. 40, da LEF, com aplicação do Tema 566, do Superior Tribunal de Justiça à hipótese dos autos.\r\r\n\r\r\n 3. No julgamento do REsp 1.373.292/PE, em sede de recurso repetitivo, o STJ firmou entendimento de que a União, cessionária do crédito rural, executa, não a Cédula de Crédito Rural (ação cambial), mas a dívida oriunda de contrato de financiamento, de modo que se aplica o artigo 39, § 2º, da Lei nº 4.320/64. Assim, após a inscrição em dívida ativa, deve-se buscar a satisfação do crédito através da Execução Fiscal, não sendo aplicado o artigo 70 da Lei Uniforme de Genebra (Decreto n. 57.663/1966), que fixa em 3 (três) anos a prescrição do título cambial.\r\r\n\r\r\n 4. Com o ajuizamento da execução fiscal, o título passa a ter natureza pública, de modo que, se a Fazenda optou pela cobrança como crédito público, com os privilégios que essa cobrança possui, através da execução fiscal, deve-se sujeitar à Lei nº 6.830/1980, que dispõe sobre a cobrança judicial da Dívida Ativa da Fazenda Pública.\r\r\n\r\r\n 5. Assim, é aplicável a regra da prescrição intercorrente prevista no art. 40, da LEF, cingindo-se a controvérsia dos autos a essa espécie de prescrição.\r\r\n\r\r\n 6. A prescrição intercorrente tem como objetivo pôr fim à pretensão do titular da ação que permaneceu inerte por um determinado lapso de tempo, privilegiando, assim, a segurança jurídica e a ordem social. Observe-se que a aplicação do instituto da prescrição não decorre de qualquer inércia momentânea, mas, sim, da inércia prolongada, fruto da negligência do titular do direito.\r\r\n\r\r\n 7. Visando evitar que os feitos executivos fiscais se prolonguem aguardando diligências a cargo do exequente, cabível a decretação da prescrição intercorrente, como forma de obstar a imprescritibilidade da pretensão executiva (Artigo 40 da Lei nº 6.830/80).\r\r\n\r\r\n 8. Como forma de impedir a eternização dos feitos executivos fiscais, o STJ formulou a Súmula 314, dispondo que \"em execução fiscal, não localizados bens penhoráveis, suspende-se o processo por um ano, findo o qual se inicia o prazo prescricional da prescrição intercorrente\".\r\r\n\r\r\n 9. Decorridos mais de 5 (cinco) anos do arquivamento provisório do processo, sem a existência de qualquer causa interruptiva ou suspensiva da fluência do lustro prescricional, configurar-se-ia a prescrição intercorrente.\r\r\n\r\r\n 10. A Primeira Seção do STJ, no julgamento do Tema 566, REsp 1.340.553/RS, fixou a tese de que o prazo de 1 (um) ano de suspensão do processo e do respectivo prazo prescricional previsto no art. 40, parágrafos 1º e 2º, da Lei nº 6.830/80 - LEF tem início automaticamente na data da ciência da Fazenda Pública a respeito da não localização do devedor ou da inexistência de bens penhoráveis no endereço fornecido, havendo, sem prejuízo dessa contagem automática, o dever de o magistrado declarar ter ocorrido a suspensão da execução.\r\r\n\r\r\n 11. No caso dos autos, como bem destacado na sentença recorrida, percebe-se que, ainda em 2007 (13/12/2007), após a ciência da fazenda pública da não localização de bens penhoráveis do devedor, e citação por edital dos devedores, teve início o prazo automático de suspensão do processo e do respectivo prazo prescricional previsto no art. 40, parágrafos 1º e 2º, da Lei nº 6.830/80 - LEF, nos termos do Tema 566, do STJ. Consequentemente, o arquivamento provisório ocorreu em 13/12/2008, e o decurso do prazo prescricional se daria em 13/12/2013.\r\r\n\r\r\n 12. Porém, na hipótese, houve incidência das sucessivas leis que autorizaram a renegociação das dívidas, a saber: a Lei nº 11.775/2008, que suspendeu o prazo entre 31/05/2008 e 30/06/2011; a Lei nº 13.340/2016, sucedida pela Lei nº 13.729/2018, com suspensão dos prazos de 28/09/2016 (data da publicação da lei) até 27/12/2018.\r\r\n\r\r\n 13. Contudo, a incidência das causas legais de suspensão do prazo prescricional previstas nas leis supracitadas, em razão da possibilidade de renegociação do crédito rural, não teve o condão de afastar a prescrição intercorrente no presente caso, cuja contagem automática iniciou ainda em 2007.\r\r\n\r\r\n 14. Com efeito, entre 13/12/2007 (início da suspensão nos termos do art. 40, da LEF) e 13/07/2020 (data da sentença), decorreram 12 anos e 7 meses, de modo que ainda que sejam subtraídos os 5 anos e 4 meses do total do prazo suspenso, houve o transcurso de 7 anos e 3 meses, a ensejar a consumação da prescrição intercorrente.\r\r\n\r\r\n 15. Com isso, resta configurada a inércia do exequente, uma vez que não foi indicada qualquer medida apta a impulsionar o processo executivo, conforme julgamento do Tema 566, REsp 1.340.553/RS, razão pela qual deve ser mantida a sentença que constatou a inocorrência da prescrição intercorrente.\r\r\n\r\r\n 16. Apelação não provida.\r\r\n\r\r\n (PROCESSO: 05001958620088020010, APELAÇÃO CÍVEL, DESEMBARGADOR FEDERAL RAFAEL CHALEGRE DO REGO BARROS (CONVOCADO), 3ª TURMA, JULGAMENTO: 31/10/2024)\r\r\n\r\r\n  Em face do exposto, DOU PROVIMENTO ao Agravo de Instrumento para reconhecer a prescrição intercorrente, extinguindo a execução fiscal, com base no artigo 40, § 4º da Lei nº 6.830/80 e dos artigos 487, II e 925 do CPC/2015.\r\r\n\r\r\n É como voto.", "acordao": "Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, DAR PROVIMENTO ao Agravo de Instrumento, nos termos do voto do relator, na forma do relatório constante dos autos, que fica fazendo parte integrante do presente julgado.\r\r\n\r\r\n Des. Federal ROGÉRIO FIALHO MOREIRA\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido"}, {"nome": "20260313_205437_Re__VOTO.ED.0811941-42.2024.4.05.8100.VIRTUAL.26.03.2026", "cnj": "0811941-42.2024.4.05.8100", "cab": "APELAÇÃO / REMESSA NECESSÁRIA (1728) Nº 0811941-42.2024.4.05.8100", "assessor": "Mariana Nascimento Marinho", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "TRIBUTÁRIO. EXCLUSÃO ISS. BASE DE CÁLCULO. PIS/COFINS. INTERPRETAÇÃO ANALÓGICA. RE 574.706/PR (TEMA 69). POSSIBILIDADE. TEMA 118/STF. COMPENSAÇÃO. OMISSÃO INEXISTENTE. EMBARGOS DE DECLARAÇÃO IMPROVIDOS.\r\r\n\r\r\n 1. Embargos de declaração pela FAZENDA NACIONAL em face do acórdão que negou provimento à Remessa Oficial e à Apelação contra sentença que concedeu a segurança para reconhecer o direito da impetrante à exclusão do ISS da base de cálculo das contribuições para o PIS e a COFINS.\r\r\n\r\r\n 2. Sustenta a Embargante que o acordão incorreu em omissão quanto aos seguintes pontos: a) o Tema 69 da repercussão geral (RE 574.706) tratou exclusivamente da exclusão do ICMS da base de cálculo das contribuições, não havendo pronunciamento definitivo da Corte Suprema sobre a inclusão do ISS, matéria submetida ao Tema 118 da repercussão geral (RE 592.616), ainda pendente de julgamento; b) a ratio decidendi do julgamento do RE 574.706 está vinculada às particularidades do ICMS, especialmente à compreensão de que o imposto estadual não integra o patrimônio do contribuinte, sendo apenas valor destinado ao ente federado. Defende que tal raciocínio não se aplica ao ISS, pois, na prestação de serviços, o preço do serviço pertence integralmente ao prestador, que posteriormente se torna devedor do tributo municipal, de modo que o ISS constitui custo da atividade econômica, e não mero ingresso transitório; c) o art. 12 do Decreto-Lei nº 1.598/1977 — demonstra que os tributos incidentes sobre vendas e serviços integram a receita bruta, da qual se extrai a base de cálculo do PIS e da COFINS, inexistindo previsão para exclusão do ISS.\r\r\n\r\r\n 3. Dispõe o art. 1.022 do Código de Processo Civil que cabem embargos de declaração “contra qualquer decisão judicial para esclarecer obscuridade ou eliminar contradição; suprir omissão de ponto ou questão sobre o qual devia se pronunciar o juiz de ofício ou a requerimento; e/ou corrigir erro material.”.\r\r\n\r\r\n 4. Inexistem as omissões apontadas pela Embargante, não se subsumindo o objeto dos embargos a nenhuma das hipóteses previstas em lei.\r\r\n\r\r\n 5. Com efeito, restou consignado no acórdão embargado que “é possível a interpretação analógica do RE 574.706/PR, uma vez que tanto o ICMS quanto o ISS são tributos que incidem sobre a produção ou circulação, além de possuírem idêntica base de cálculo, qual seja, a receita bruta. O entendimento aqui perfilhado encontra-se pacificado por este E. Tribunal, conforme possível observar através dos seguintes julgados: Processo: 0812451-89.2023.4.05.8100, Apelação Cível, Des. Relator: Rogério Fialho Moreira, 3ª Turma, Julgamento: 06/06/2024; Processo: 0806792-97.2022.4.05.8500, Apelação Cível, Des. Relator: Cid Marconi, 3ª Turma, Julgamento: 03/08/2023; Processo: 0803785-70.2021.4.05.8100, Apelação Cível, Des. Relator: Luiz Bispo Da Silva Neto (Convocado), 3ª Turma, Julgamento: 13/07/2023 e Processo: 0821191-70.2022.4.05.8100, Apelação Cível, Des. Relator: Rafael Chalegre Do Rego Barros (Convocado), 3ª Turma, Julgamento: 18/05/2023.”.\r\r\n\r\r\n 6.  O juiz, ao proferir a decisão, não está obrigado a mencionar todos os dispositivos legais trazidos para discussão, cumprindo ao mesmo entregar a prestação jurisdicional, levando em consideração as teses discutidas no processo.\r\r\n\r\r\n 7. Conclui-se, assim, que a Embargante deseja rediscutir questões efetivamente apreciadas por ocasião do julgamento que originou o acórdão ora questionado. Frise-se, entretanto, que embargos de declaração, ainda que opostos para fins de prequestionamento, não se prestam a este fim.\r\r\n\r\r\n 8. Embargos de declaração conhecidos e improvidos.", "relatorio": "Trata-se de embargos de declaração pela FAZENDA NACIONAL em face do acórdão que negou provimento à Remessa Oficial e à Apelação contra sentença que concedeu a segurança para reconhecer o direito da impetrante à exclusão do ISS da base de cálculo das contribuições para o PIS e a COFINS.\r\r\n\r\r\n Sustenta a Embargante que o acordão incorreu em omissão quanto aos seguintes pontos:\r\r\n\r\r\n a) o Tema 69 da repercussão geral (RE 574.706) tratou exclusivamente da exclusão do ICMS da base de cálculo das contribuições, não havendo pronunciamento definitivo da Corte Suprema sobre a inclusão do ISS, matéria submetida ao Tema 118 da repercussão geral (RE 592.616), ainda pendente de julgamento;\r\r\n\r\r\n b) a ratio decidendi do julgamento do RE 574.706 está vinculada às particularidades do ICMS, especialmente à compreensão de que o imposto estadual não integra o patrimônio do contribuinte, sendo apenas valor destinado ao ente federado. Defende que tal raciocínio não se aplica ao ISS, pois, na prestação de serviços, o preço do serviço pertence integralmente ao prestador, que posteriormente se torna devedor do tributo municipal, de modo que o ISS constitui custo da atividade econômica, e não mero ingresso transitório;\r\r\n\r\r\n c) o art. 12 do Decreto-Lei nº 1.598/1977 — demonstra que os tributos incidentes sobre vendas e serviços integram a receita bruta, da qual se extrai a base de cálculo do PIS e da COFINS, inexistindo previsão para exclusão do ISS.\r\r\n\r\r\n Contrarrazões apresentadas.\r\r\n\r\r\n É o relatório.", "voto": "A teor do que dispõe o art. 1.022 do Código de Processo Civil, cabem embargos de declaração “contra qualquer decisão judicial para esclarecer obscuridade ou eliminar contradição; suprir omissão de ponto ou questão sobre o qual devia se pronunciar o juiz de ofício ou a requerimento; e/ou corrigir erro material”.\r\r\n\r\r\n De acordo com o seu parágrafo único, considera-se omissa a decisão que “deixe de se manifestar sobre tese firmada em julgamento de casos repetitivos ou em incidente de assunção de competência aplicável ao caso sob julgamento; e incorra em qualquer das condutas descritas no art. 489, § 1º. Este dispositivo, por seu turno, não considera fundamentada qualquer decisão judicial, seja ela interlocutória, sentença ou acórdão, que:\r\r\n\r\r\n I - se limitar à indicação, à reprodução ou à paráfrase de ato normativo, sem explicar sua relação com a causa ou a questão decidida;\r\r\n\r\r\n II - empregar conceitos jurídicos indeterminados, sem explicar o motivo concreto de sua incidência no caso;\r\r\n\r\r\n III - invocar motivos que se prestariam a justificar qualquer outra decisão;\r\r\n\r\r\n IV - não enfrentar todos os argumentos deduzidos no processo capazes de, em tese, infirmar a conclusão adotada pelo julgador;\r\r\n\r\r\n V - se limitar a invocar precedente ou enunciado de súmula, sem identificar seus fundamentos determinantes nem demonstrar que o caso sob julgamento se ajusta àqueles fundamentos;\r\r\n\r\r\n VI - deixar de seguir enunciado de súmula, jurisprudência ou precedente invocado pela parte, sem demonstrar a existência de distinção no caso em julgamento ou a superação do entendimento.\r\r\n\r\r\n O acórdão embargado encontra-se assim ementado:\r\r\n\r\r\n TRIBUTÁRIO. EXCLUSÃO ISS. BASE DE CÁLCULO PIS/COFINS. INTERPRETAÇÃO ANALÓGICA. RE 574.706/PR (TEMA 69). REPERCUSSÃO GERAL. MODULAÇÃO DOS EFEITOS. COMPENSAÇÃO/RESTITUIÇÃO. APELAÇÃO IMPROVIDA.\r\r\n\r\r\n 1. Remessa Oficial e Apelação interposta pela FAZENDA NACIONAL contra sentença que concedeu a segurança para reconhecer o direito da impetrante à exclusão do ISS da base de cálculo das contribuições para o PIS e a COFINS.\r\r\n\r\r\n 2. Nas razões recursais, a Apelante traz os seguintes argumentos: a) o Supremo Tribunal Federal no julgamento do RE 574.706, em sessão finalizada no dia 15/03/2017, entendeu pela inconstitucionalidade da inclusão do ICMS na base de cálculo do PIS/COFINS; b) não significa dizer, no entanto, que a dispensa se aplica a todas as teses indicadas pelos contribuintes semelhantes. Ao revés, somente se aplica à hipótese de exclusão do ICMS da base de cálculo do PIS/COFINS. Ou seja, apesar de tratar de situação bastante similar, a discussão sobre a inclusão do ISS na base de cálculo da mesma PIS/COFINS não está abrangida pela dispensa; c) o julgamento do tema 118 de repercussão geral, no bojo do qual se discute a matéria ora tratada, iniciou-se em 14/08/2020, tendo o Ministro Relator Celso de Mello proferido voto pela exclusão do ISS da base de cálculo do PIS/COFINS. Todavia, na sequência, o Ministro Dias Toffoli pediu vista dos autos e o julgamento permanece suspenso até a presente data.\r\r\n\r\r\n 3. A questão se encontra afetada, pelo STF, ao julgamento sob o rito da Repercussão Geral, no RE 592.616/RS (Tema 118), contudo, como não há determinação da Corte Superior de suspensão dos feitos que versem sobre a matéria, nos termos previstos no art. 1.037, II, do CPC, o processo deve seguir o curso natural até o juízo de admissibilidade dos Recursos Extraordinário e Especial eventualmente interpostos.\r\r\n\r\r\n 4. O cerne da questão consiste em analisar a possibilidade de exclusão do ISS na base de cálculo do PIS/COFINS, tendo a apelante argumentado que o ISSQN por ostentar \"mero ingresso de caixa\", não poderia compor a base de cálculo do PIS ou da COFINS.\r\r\n\r\r\n 5. O STF decidiu a questão, quanto ao ICMS, no julgamento de RE 574.706/PR, processado sob o regime de Repercussão Geral, definindo que o ICMS não compõe a base de cálculo para a incidência do PIS e da COFINS (Tema 69).\r\r\n\r\r\n 6. O conceito de faturamento, base de cálculo do PIS/COFINS, deve ser entendido como riqueza auferida pelo contribuinte, originária da atividade negocial - venda de mercadoria ou prestação de serviço. O valor pago a título de Imposto sobre Serviços de Qualquer Natureza - ISS não tem natureza de faturamento, não representa riqueza para o sujeito passivo, mas apenas para o município-membro arrecadador.\r\r\n\r\r\n 7. Em que pese, a decisão do STF não ter abordado especificamente a inclusão do ISS na base de cálculo do PIS e COFINS, o raciocínio é análogo, não sendo possível aplicá-lo ao ICMS e deixar de proceder da mesma forma no caso do ISS.\r\r\n\r\r\n 8. A reforçar a tese, verifica-se que a mesma analogia foi apontada em decisão do Plenário do STF que reconheceu a Repercussão Geral do tema da exclusão do ISS da base de cálculo do PIS e da COFINS (RE 592.616/RS - Tema 118) correlacionando-o diretamente com a exclusão do ICMS da base de cálculo do PIS e da COFINS (RE nº 574.706/PR - Tema 69). Desse modo, é possível a interpretação analógica do RE 574.706/PR, uma vez que tanto o ICMS quanto o ISS são tributos que incidem sobre a produção ou circulação, além de possuírem idêntica base de cálculo, qual seja, a receita bruta.\r\r\n\r\r\n 9. O entendimento aqui perfilhado encontra-se pacificado por este E. Tribunal, conforme possível observar através dos seguintes julgados: Processo: 0812451-89.2023.4.05.8100, Apelação Cível, Des. Relator: Rogério Fialho Moreira, 3ª Turma, Julgamento: 06/06/2024; Processo: 0806792-97.2022.4.05.8500, Apelação Cível, Des. Relator: Cid Marconi, 3ª Turma, Julgamento: 03/08/2023; Processo: 0803785-70.2021.4.05.8100, Apelação Cível, Des. Relator: Luiz Bispo Da Silva Neto (Convocado), 3ª Turma, Julgamento: 13/07/2023 e Processo: 0821191-70.2022.4.05.8100, Apelação Cível, Des. Relator: Rafael Chalegre Do Rego Barros (Convocado), 3ª Turma, Julgamento: 18/05/2023.\r\r\n\r\r\n 10. É possível concluir pela aplicabilidade analógica da decisão do STF acerca da exclusão do ICMS da base de cálculo do PIS e da COFINS à tese da exclusão do ISS da base de cálculo dos referidos tributos.\r\r\n\r\r\n 11. No tocante a compensação/restituição, a sentença recorrida determinou que fosse assegurar a compensação dos valores recolhidos indevidamente, não alcançados pela prescrição quinquenal, ao tempo que reconheceu o direito à repetição do indébito referente ao montante indevidamente recolhido durante a tramitação da ação, o qual poderá ser restituído pela impetrante mediante compensação ou expedição do competente requisitório, nos termos da fundamentação.\r\r\n\r\r\n 12. Como bem tratado pelo Juízo sentenciante, a compensação apenas pode ser realizada após o trânsito em julgado da sentença, nos termos do art. 170-A, do CTN, obedecida a prescrição quinquenal, nos termos do art. 168, I, do CTN, devendo ser observado ainda o disposto no art. 26-A da Lei 11.457/2007, incluído pela Lei 13.670/2018. Registre-se, contudo, que em relação a períodos anteriores a essa alteração legal não é possível a compensação cruzada, sendo interdita a compensação de débitos relativos a contribuições previdenciárias e contribuições devidas a terceiros (arts. 2º e 3º da Lei 11.457/2007) com créditos de outros tributos administrados pela Secretaria da Receita Federal do Brasil relativos ao período anterior à utilização do eSocial para apuração das referidas contribuições (Precedente: Processo: 08023844320204058400, Apelação / Remessa Necessária, Desembargador Federal Andre Dias Fernandes (Convocado), 3ª Turma, Julgamento: 25/07/2024).\r\r\n\r\r\n 13. Ao apreciar os embargos de declaração opostos pela Fazenda Nacional no RE 574.706/PR (Tema 69), o STF, por maioria qualificada, decidiu modular os efeitos do julgado, estabelecendo como marco inicial a data em que fixada a respectiva tese jurídica (15/03/2017), ressalvando as ações judiciais e administrativas protocoladas até a data da sessão em que proferido o julgamento de mérito.\r\r\n\r\r\n 14. Tal entendimento deve ser aplicado também na hipótese presente, já que está a se utilizar o mesmo raciocínio jurídico, por analogia (TRF5, 0801118-71.2022.4.05.8102, Apelação Cível, Desembargador Relator: Cid Marconi Gurgel de Souza, 3ª Turma, Julgamento: 22/02/2024).\r\r\n\r\r\n 15. Considerando que a impetrante ingressou com o mandado de segurança em 26/08/2024, deve ser mantida a sentença que reconheceu o direito da impetrante de compensar administrativamente os indébitos, respeitando a prescrição quinquenal, devidamente acrescidas da Taxa SELIC, nos moldes do art. 74 da Lei nº 9.430/96 e Súmulas nº 461 do STJ, observando, ainda, o disposto no art. 170-A do CTN.\r\r\n\r\r\n 16. Apelação improvida. Agravo interno prejudicado.\r\r\n\r\r\n 17. Ausência de condenação em honorários sucumbenciais por se tratar de Mandado de Segurança.\r\r\n\r\r\n Inexistem as omissões apontadas pela Embargante, não se subsumindo o objeto dos embargos a nenhuma das hipóteses previstas em lei.\r\r\n\r\r\n Com efeito, restou consignado no acórdão embargado que “é possível a interpretação analógica do RE 574.706/PR, uma vez que tanto o ICMS quanto o ISS são tributos que incidem sobre a produção ou circulação, além de possuírem idêntica base de cálculo, qual seja, a receita bruta. O entendimento aqui perfilhado encontra-se pacificado por este E. Tribunal, conforme possível observar através dos seguintes julgados: Processo: 0812451-89.2023.4.05.8100, Apelação Cível, Des. Relator: Rogério Fialho Moreira, 3ª Turma, Julgamento: 06/06/2024; Processo: 0806792-97.2022.4.05.8500, Apelação Cível, Des. Relator: Cid Marconi, 3ª Turma, Julgamento: 03/08/2023; Processo: 0803785-70.2021.4.05.8100, Apelação Cível, Des. Relator: Luiz Bispo Da Silva Neto (Convocado), 3ª Turma, Julgamento: 13/07/2023 e Processo: 0821191-70.2022.4.05.8100, Apelação Cível, Des. Relator: Rafael Chalegre Do Rego Barros (Convocado), 3ª Turma, Julgamento: 18/05/2023.”.\r\r\n\r\r\n Ademais, o juiz, ao proferir a decisão, não está obrigado a mencionar todos os dispositivos legais trazidos para discussão, cumprindo ao mesmo entregar a prestação jurisdicional, levando em consideração as teses discutidas no processo.\r\r\n\r\r\n Conclui-se, assim, que a Embargante deseja rediscutir questões efetivamente apreciadas por ocasião do julgamento que originou o acórdão ora questionado. Frise-se, entretanto, que embargos de declaração, ainda que opostos para fins de prequestionamento, não se prestam a este fim.\r\r\n\r\r\n Em face do exposto, CONHEÇO dos embargos de declaração, porém NEGO-LHES PROVIMENTO.\r\r\n\r\r\n É como voto.", "acordao": "Decide a Terceira Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, CONHECER E NEGAR PROVIMENTO aos embargos de declaração e, nos termos do voto do relator, na forma do relatório constante dos autos, que fica fazendo parte integrante do presente julgado.\r\r\n\r\r\n DES. Federal ROGÉRIO FIALHO MOREIRA\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido"}, {"nome": "20260316_114353_Re__VOTO.0802997-08.2025.4.05.8200.VIRTUAL.26.03.26", "cnj": "0802997-08.2025.4.05.8200", "cab": "APELAÇÃO CÍVEL (198) Nº 0802997-08.2025.4.05.8200", "assessor": "Mariana Nascimento Marinho", "comentario": "Ok", "tipo": "Virtual", "data": "", "ementa": "TRIBUTÁRIO. PIS. COFINS. BASE DE CÁLCULO. ARTS. 1º, CAPUT, § 3º, V, A, DAS LEIS NS. 10.637/2002 E 10.883/2003. AQUISIÇÃO PRODUTOS POR VAREJISTA. DESCONTO CONCEDIDO POR FORNECEDORES. ENTENDIMENTO STJ. RESP 1.836.082/SE. DESCONTO INCONDICIONADO. NÃO COMPROVAÇÃO. APELAÇÃO IMPROVIDA.\r\r\n\r\r\n 1. Apelação  interposta por SUPERMERCADO BRASIL CJZ LTDA contra sentença que denegou  a segurança que objetivava a autorização para não se sujeitar à  incidência de PIS/COFINS sobre os valores apurados a título de descontos  financeiros,  comerciais e bonificações concedidos por força de acordos comerciais  firmados.\r\r\n\r\r\n2. Nas razões recursais, a Apelante alega em síntese que: a)  os descontos comerciais e bonificações decorrentes de acordos  comerciais possuem natureza de redução de custos do estoque, não se  enquadrando no conceito de receita para fins de incidência das  contribuições ao PIS/COFINS; b)  tais valores configuram redutores do preço da operação, razão pela qual  devem ser excluídos da base de cálculo das contribuições, nos termos do  art. 1º, §3º, inciso V, “a”, das Leis nº 10.637/2002 e nº 10.833/2003.  Na prática comercial,  as bonificações e descontos comerciais representam apenas diminuição do  custo de aquisição das mercadorias, não havendo ingresso de recursos no  caixa da pessoa jurídica; c)  a contabilização dessas bonificações como redução de custos do estoque  apenas posterga a tributação, pois eventual vantagem econômica será  naturalmente capturada no momento da venda da mercadoria, quando  ocorrerá a incidência das  contribuições sobre o valor agregado; d)  é necessária a consignação dos descontos e bonificações em nota fiscal  para o reconhecimento de sua natureza jurídica, devendo prevalecer a  análise da essência do negócio jurídico e da verdade real, e não mera  formalidade relativa  ao cumprimento de obrigação acessória; e)  a exigência de destaque prévio em documento fiscal não pode alterar a  natureza econômica das operações, sobretudo quando demonstrado que os  valores representam parcelas redutoras do preço efetivamente pago pelo  adquirente; f)  a inclusão desses valores na base de cálculo das contribuições viola os  princípios da capacidade contributiva e da vedação ao confisco, pois  implica tributação sobre valores que não representam ingresso de riqueza  no patrimônio  do contribuinte, inexistindo manifestação de capacidade econômica apta a  justificar a incidência tributária; g)  subsidiariamente, caso não acolhida a tese principal, requer que seja  reconhecido o direito de exclusão ao menos quando os descontos e  bonificações estiverem destacados nas notas fiscais.\r\r\n\r\r\n 3. A Apelante é sociedade empresária dedicada ao setor do comércio varejista de mercadorias em geral, com predominância de produtos alimentícios (supermercado), padaria e confeitaria com predominância em revenda, comércio varejista de laticínios e frios, comércio varejista de carnes (açougue), comércio varejista de hortifrutigranjeiros, bem como o transporte rodoviário de cargas, exceto produtos perigosos e mudanças, nas modalidades municipal, intermunicipal, interestadual e internacional. Aduzem que, no contexto de suas operações mercantis de compra e venda, com certa frequência experimentam descontos e bonificações, concedidos por seus fornecedores, ora mediante abatimentos ou valores em dinheiro.\r\r\n\r\r\n  4. O cerne da presente controvérsia consiste na análise acerca da possibilidade de declarar o direito à exclusão dos descontos e bonificações incondicionais das bases de cálculo da contribuição para o PIS e a COFINS.\r\r\n\r\r\n 5. Em matéria tributária, a desoneração do contribuinte perante determinado tributo deve obedecer ao comando de legislação específica, conforme preceituado no art. 150, § 6º da Constituição Federal.\r\r\n\r\r\n 6. Os “descontos incondicionais”, previstos nos arts. 1º, § 3º, V, alínea a, das Leis nº 10.637/2002 e 10.833/2003, estão definidos na Instrução Normativa SRF Nº 51, de 03/11/1978, como \"parcelas redutoras do preço de venda, quando constarem da nota fiscal de venda dos bens ou da fatura de serviços e não dependerem de evento posterior à emissão desses documentos\".\r\r\n\r\r\n 7. O STJ, no julgamento do REsp nº 1.836.082/SE, firmou o seguinte entendimento sobre a exclusão dos descontos da base de cálculo do PIS e da COFINS: \"Os descontos concedidos pelo fornecedor ao varejista, mesmo quando condicionados a contraprestações vinculadas à operação de compra e venda, não constituem parcelas aptas a possibilitar a incidência da contribuição ao PIS e da COFINS a cargo do adquirente\".\r\r\n\r\r\n 8.  A Apelante não logrou êxito em comprovar o caráter incondicional dos descontos recebidos, uma vez que não cuidou em juntar a exordial os contratos de parceria comercial para promoção de marca firmados com alguns dos seus fornecedores. Também não apresentou notas fiscais demonstrando os descontos.\r\r\n\r\r\n 9. Ausente comprovação do caráter incondicional dos descontos e das bonificações objeto dos autos, inexistindo prova pré-constituída apta a demonstrar que tais valores não integram a base de cálculo das contribuições discutidas.\r\r\n\r\r\n 10. Precedente: TRF5, 0802299-27.2024.4.05.8300, Apelação Cível, Desembargadora Relatora: Amanda Torres de Lucena Diniz Araújo (Convocada), Julgamento: 05/07/2024, DJe: 08/07/2024.\r\r\n\r\r
