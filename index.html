fluente a análise da incidência das mencionadas contribuições sob o prisma do contribuinte, o qual, na consecução do negócio jurídico, incorre em despesas.\r\r\n\r\r\n [...]\r\r\n\r\r\n Desse modo, a legislação estabelece o ângulo do vendedor como elemento estrutural da noção de descontos e somente nesse sentido é possível avaliar os impactos tributários decorrentes da redução do valor pactuado na compra e venda, perspectiva amparada pela supracitada jurisprudência desta Corte e do Supremo Tribunal Federal.\r\r\n\r\r\n [...]\r\r\n\r\r\n Por oportuno, vale frisar que a tese ora estampada não inviabiliza a apreciação do alcance dos descontos pela contribuição ao PIS e pela COFINS. Ao Fisco permite-se efetuar investigação dessa natureza, desde que direcione a fiscalização ao sujeito passivo encarregado da concessão dos abatimentos. No entanto, não há como alterar a lógica aplicável à relação jurídica discutida para transformar as despesas incorridas pelo varejista em receitas.\r\r\n\r\r\n Assim, a análise da relação tributária pela Corte de origem, em meu sentir, partiu do equivocado pressuposto segundo o qual a Recorrente, ao desembolsar valores para aquisição de mercadorias com descontos, obteve receita, destoando do regramento relativo à contribuição ao PIS e à COFINS previsto nos arts. 1º, caput, § 3º, V, a, das Leis n. 10.637/2002 e 10.833/2003, os quais foram indevidamente aplicados na espécie.\r\r\n\r\r\n Na mesma linha, também não é viável considerar correta a exegese lançada no acórdão recorrido no sentido de que as condições fixadas pelo fornecedor para o gozo dos descontos configuram prestação de serviços e, por isso, a diminuição da quantia a pagar pelo varejista na operação de compra e venda equivale à remuneração pelos encargos previstos no contrato.\r\r\n\r\r\n Com efeito, a composição do preço praticado em contratos de compra e venda celebrados entre sociedades empresárias leva em consideração uma gama elevada de arranjos comerciais - tais como prazos de entrega, condições de pagamento, vantagens publicitárias ou mesmo a relação pretérita entre as partes -, de modo que a diminuição do valor a ser despendido pela Recorrente na aquisição de mercadorias, embora atrelada a uma contraprestação em favor do fornecedor, não pode ser dissociada desse contexto para figurar, autonomamente, como a contraprestação por um serviço, sob pena de modificar a essência do negócio jurídico pactuado.\r\r\n\r\r\n Ajustes dessa natureza são ancorados no princípio da liberdade de contratar, o qual confere aos agentes econômicos margem de apreciação acerca dos elementos relevantes para a fixação do preço avençado. Desse modo, a despeito das variadas formas pelas quais são negociados os descontos sujeitos a contrapartidas por parte adquirente, as tratativas são intrinsecamente ligadas ao contrato de compra e venda com o escopo de reduzir a quantia paga pelo varejista e de permitir ao vendedor a obtenção de proveitos comerciais. Grifos nossos.\r\r\n\r\r\n In casu, observo que, a Apelante não logrou êxito em comprovar o caráter incondicional dos descontos recebidos, uma vez que não cuidou em juntar a exordial os contratos de parceria comercial para promoção de marca firmados com alguns dos seus fornecedores. Também não apresentou notas fiscais demonstrando os descontos.\r\r\n\r\r\n Assim, ausente comprovação do caráter incondicional dos descontos e das bonificações objeto dos autos, inexistindo prova pré-constituída apta a demonstrar que tais valores não integram a base de cálculo das contribuições discutidas.\r\r\n\r\r\n Por fim, trago à baila recente julgado deste Egrégio Tribunal Federal que corrobora com o entendimento aqui perfilhado, vejamos:\r\r\n\r\r\n DIREITO TRIBUTÁRIO. RECURSO DE APELAÇÃO. BASE DE CÁLCULO DA CONTRIBUIÇÃO AO PIS E DA COFINS. ARTS. 1º, CAPUT, § 3º, V, A, DAS LEIS NS. 10.637/2002 E 10.883/2003. DESCONTO CONCEDIDO POR FORNECEDORES NA AQUISIÇÃO DE PRODUTOS POR VAREJISTA. DEDUZIDO SE A PARCELA REDUTORA DO CUSTO NÃO CARACTERIZA RECEITA DO COMPRADOR E SE A CONTRAPARTIDA DO ADQUIRENTE PARA OBTENÇÃO DO ABATIMENTO NÃO CONFIGURA PRESTAÇÃO DE SERVIÇO. NECESSIDADE DE DESTAQUE DOS DESCONTOS INCONDICIONAIS NAS NOTAS FISCAIS. ENTENDIMENTO DO STJ.\r\r\n\r\r\n 1. Recurso de apelação interposto pela parte impetrante, contra sentença que, denegando a segurança pleiteada, não reconheceu o direito da impetrante de proceder ao recolhimento do PIS e da COFINS sem a inclusão dos valores referentes a descontos comerciais e bonificações concedidos por fornecedores.\r\r\n\r\r\n 2. A questão central nos autos diz respeito à possibilidade de declarar o direito à exclusão dos descontos pactuados e bonificações das bases de cálculo da contribuição para o PIS e da COFINS. (...) 11. 'In casu', quando da impetração do presente mandamus, foram juntados aos autos cópias de notas fiscais nas quais constam remessas/saídas na forma de bonificações, doações ou brindes. No entanto, a parte impetrante não acostou cópia dos contratos que ensejaram tais bonificações e descontos, o que impossibilita seja analisado se, de fato, as avenças ostentam o caráter incondicional necessário à concessão da segurança. 12. Após instado pelo magistrado \"a quo\" a fazê-lo, o impetrante coligiu ao feito cópias tela de sistema interno relativo a pactuação firmada com a Nestlé (ID. 4058300.29906745), as quais não descrevem satisfatoriamente os termos da ação promocional respectiva. O mesmo ocorre nas cópias de \"acordo verba comercial\" anexadas sob os IDs. 4058300.29906747 e 4058300.29906744. Nestas, inclusive, há expressa a observação de que \"as ações serão pagas mediante comprovação das contrapartidas. As ações deverão ser comprovadas em até no máximo 7 dias corridos após o encerramento da execução. Para ações atreladas a volume Sell-out, serão pagos acordos com atingimento entre 80% e 100% do volume negociado. A não comprovação acarretará no não pagamento do acordo\" - o que sugere se tratar de descontos condicionados. 13. Não é possível, pelo que dos autos consta, verificar se as contrapartidas supracitadas estão intrinsecamente relacionadas, ou não, ao objeto central da avença. Apenas se assim estivessem, não poderiam ser confundidas com autônoma prestação de serviços, pois se configurariam como ações levadas em conta pelos contratantes para avaliar a composição do preço das transações empresariais por si entabuladas. 14. Vale ressaltar que, para a exclusão dos descontos incondicionais da base de cálculo dos tributos incidentes sobre as operações mercantis, a jurisprudência do STJ exige que tais bonificações estejam destacadas nas notas fiscais. 15. No caso em descortino, embora a impetrante tenha anexado aos autos notas fiscais que mencionam operações que detêm natureza de bonificações, doações ou brindes, as notas fiscais em epígrafe são insuficientes para demonstrar que os descontos e bonificações avençados são de fato incondicionais. A própria impetrante menciona receber tanto descontos e bonificações condicionais quanto incondicionais, sem distinguir, na presente hipótese, a qual modalidade - condicionada ou incondicionada - se referem as deduções objeto dos comprovantes coligidos. 16. A mera afirmação de que os descontos e as bonificações entabulados são incondicionais, portanto, é insuficiente. Tal informação deveria ser comprovada pelo manancial probatório do presente writ, a partir da descrição das contrapartidas a serem prestadas, para que se pudesse verificar se estas estão intrinsecamente relacionadas ao objeto central das avenças ou se transbordam a referida finalidade. Para tanto, a impetrante poderia ter juntado aos autos os termos dos contratos firmados entre ela e os fornecedores, o que não fez. 17. Ainda que não seja possível afirmar que a mera pactuação de contrapartida (in casu, repise-se que algumas das avenças mencionam contrapartidas a cargo do revendedor) para a redução da quantia paga ao fornecedor constitui-se, por si só, em fato gerador de receita - e, portanto, passível de incidência da exação sobre os descontos questionados -, não há nos autos substrato suficiente para que se entenda qual a natureza das contrapartidas em comento e de que forma elas devem ser prestadas. 18. Esclareça-se que os negócios jurídicos celebrados mediante condição são definidos no Código Civil como aqueles que têm seus efeitos subordinados a evento futuro e incerto (cf. art. 121). De fato, não há nos autos demonstração de que as ações de contrapartida assumidas pela apelante se revestiriam dessa qualidade. Porém, de mesmo modo, tampouco a apelante logrou demonstrar se as referidas contrapartidas caracterizariam condição autônoma de prestação de serviço e, estando vinculadas aos objetos contratuais - nenhum contrato foi coligido, frise-se -, estariam vinculadas a evento futuro e certo (o que faria com que deixassem de ser condicionais), consubstanciado em eventuais ações a serem desenvolvidas pela apelante. 19. Ausente comprovação do caráter incondicional dos descontos e das bonificações objeto dos autos, estes não devem ser excluídos das bases de cálculo do PIS e da COFINS, motivo pelo qual deve ser mantida a denegação da segurança. 20. Sem honorários (art. 25 da Lei n. 12.016/2009). (TRF5, 0802299-27.2024.4.05.8300, Apelação Cível, Desembargadora Relatora: Amanda Torres de Lucena Diniz Araújo (Convocada), Julgamento: 05/07/2024, DJe: 08/07/2024).\r\r\n\r\r\n Diante do exposto, nego provimento à apelação.\r\r\n\r\r\n Sem honorários advocatícios, nos termos do art. 25 da Lei nº 12.016/09.\r\r\n\r\r\n É como voto.", "voto": "(pendente)", "acordao": "Decide a 3ª Turma do Tribunal Regional Federal da 5ª Região, à unanimidade, NEGAR PROVIMENTO à apelação, nos termos do voto do relator, na forma do relatório constante dos autos, que fica fazendo parte integrante do presente julgado.\r\r\n\r\r\n Des. Federal ROGÉRIO FIALHO MOREIRA\r\n\r\n────────────────────────────────────────────────────────────", "resultado": "Não provido", "css": "nao-provido"}, {"nome": "20260316_161603_Re__VOTO.ED.0800884-90.2025.4.05.8100.VIRTUAL.26.03.2026", "cnj": "0800884-90.2025.4.05.8100", "cab": "APELAÇÃO CÍVEL (198) Nº 0800884-90.2025.4.05.8100", "assessor": "Joana Barbosa Lima De Oliveira", "comentario": "Ok", "tipo": "Virtual", "data": "26.03.2026", "ementa": "TRIBUTÁRIO. EMBARGOS DE DECLARAÇÃO. PROGRAMA EMERGENCIAL DE RETOMADA DO SETOR DE EVENTOS (PERSE). BENEFÍCIO FISCAL. TEMA 1.283/STJ. LEI Nº 14.859/2024.  INSCRIÇÃO NO CADASTUR. EXIGÊNCIA. AUSÊNCIA OMISSÃO. REDISCUSSÃO. EMBARGOS NÃO PROVIDOS.\r\r\n\r\r\n 1. Embargos de declaração opostos por PIATO PIZZARIA LTDA em face de acórdão desta Turma que, à unanimidade de votos, negou provimento à apelação da autora para manter a sentença que julgou improcedente a pretensão autoral que buscava assegurar o direito da autora de fazer jus ao benefício da desoneração fiscal estabelecido pelo Programa de Retomada do Setor de Eventos (PERSE), ou melhor, a redução para zero das alíquotas/ do PIS, COFINS, CSLL e IRPJ.\r\r\n\r\r\n 2. Os embargos de declaração, consoante disciplina o art.1.022 do CPC, objetivam corrigir erro material ou sanar eventuais omissões, contradições ou obscuridades da decisão judicial, não se prestando como instrumento processual apto a promover a reapreciação do julgado.\r\r\n\r\r\n 3. A embargante, nas razões recursais, apesar de mencionar suposta omissões, não traz qualquer elemento que demonstre o alegado, limitando-se a rediscutir o mérito da questão.\r\r\n\r\r\n 4. O acórdão embargado, ao apreciar a controvérsia em conformidade com a legislação aplicável e a jurisprudência pertinente, aplicou o entendimento firmado pelo Superior Tribunal de Justiça no julgamento do Tema nº 1.283, segundo o qual é necessária a prévia inscrição do prestador de serviços turísticos no CADASTUR, nos termos da Lei nº 11.771/2008, como condição para a fruição da alíquota zero aplicável ao PIS/COFINS, ao IRPJ e à CSLL, instituída pelo art. 4º da Lei nº 14.148/2021, no âmbito do Programa Emerg let IDX_ATIVO = -1;

// ── Filtro por tipo de sessão ─────────────────────────────────
let FILTRO_TIPO = 'todas';

function getFiltrados() {
  // Retorna [{d, idxGlobal, num}] com numeração reiniciada por tipo
  return DECISOES
    .map((d, i) => ({ d, idxGlobal: i }))
    .filter(item => {
      if (FILTRO_TIPO === 'todas') return true;
      const t = (item.d.tipo || '').toLowerCase();
      if (FILTRO_TIPO === 'virtual')   return t === 'virtual';
      if (FILTRO_TIPO === 'ordinária') return t.startsWith('ordin');
      return true;
    })
    .map((item, seq) => ({ ...item, num: seq + 1 }));
}

function aplicarFiltroTipo() {
  FILTRO_TIPO = document.getElementById('filtro-tipo').value;
  IDX_ATIVO = -1;
  document.getElementById('estado-vazio').style.display = '';
  document.getElementById('conteudo-decisao').style.display = 'none';
  SELECIONADAS.clear();
  getFiltrados().forEach(item => SELECIONADAS.add(item.idxGlobal));
  renderLista(document.getElementById('busca').value);
}

// ── Utilitários ───────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function normalizar(texto) {
  return texto.replace(/\r\n/g,'\n').replace(/\r/g,'\n')
              .replace(/\n{3,}/g,'\n\n').trim();
}
function parasHtml(texto, classe) {
  const cls = classe ? ` class="${classe}"` : '';
  return normalizar(texto).split(/\n\n+/)
    .map(b => b.replace(/\s+/g,' ').trim()).filter(Boolean)
    .map(b => `<p${cls}>${esc(b)}</p>`).join('\n');
}
function formatarEmenta(texto) {
  texto = normalizar(texto);
  const m = texto.match(/^\s*1\s*\./m);
  const verb     = m ? texto.slice(0, m.index).trim() : texto.trim();
  const itensRaw = m ? texto.slice(m.index).trim() : '';
  let html = '';
  if (verb) html += `<p class="verb">${esc(verb.replace(/\s+/g,' '))}</p>\n`;
  for (const bloco of itensRaw.split(/\n\n+/)) {
    const b = bloco.replace(/\s+/g,' ').trim();
    if (b) html += `<p class="item">${esc(b)}</p>\n`;
  }
  return html;
}
function extrairMioloAcordao(texto) {
  if (!texto) return '';
  texto = normalizar(texto);
  // Localiza parágrafo que começa com "Decide" (case-insensitive)
  const m = texto.match(/(?:^|\n)[ \t]*(decide\b)/i);
  if (!m) return `<p class="ac">${esc(texto.replace(/\s+/g,' ').trim())}</p>`;
  const pos = m.index + m[0].length - m[1].length;
  const bloco = texto.slice(pos).split(/\n\n/)[0].replace(/\s+/g,' ').trim();
  return `<p class="ac">${esc(bloco)}</p>`;
}
function metaRow(rot, val) {
  if (!val || !val.trim()) return '';
  return `<tr><td class="r">${esc(rot)}</td><td class="v">${esc(val)}</td></tr>`;
}

// ── Renderização da decisão ───────────────────────────────────
function renderDecisao(d, opts, numero) {
  const { incComent, incAssessor, incRel, incVoto } = opts;
  let h = '<div class="decisao">';

  // Chamada XX
  if (numero) h += `<div class="chamada">Chamada ${String(numero).padStart(2,'0')}</div>`;

  h += `<p class="cab-decisao">${esc(d.cab)}</p>`;

  // Tabela meta
  let meta = metaRow('Processo', d.cnj);
  if (incAssessor) meta += metaRow('Assessor', d.assessor);
  meta += metaRow('Tipo de sessão', d.tipo ? d.tipo.toUpperCase() : '');
  meta += metaRow('Data da sessão', d.data);
  if (meta) h += `<table class="meta">${meta}</table>`;

  // Comentário
  if (incComent && d.comentario) {
    const c = esc(d.comentario).replace(/\n/g,'<br>');
    h += `<div class="coment"><strong>Observação do Desembargador</strong>${c}</div>`;
  }

  // Ementa
  if (d.ementa) {
    h += '<div class="sec">Ementa</div>';
    h += formatarEmenta(d.ementa);
  }

  // Relatório
  if (d.relatorio) {
    if (incRel) {
      h += '<div class="sec">Relatório</div>' + parasHtml(d.relatorio);
    } else {
      h += `<details><summary>📄 Ver Relatório</summary>` +
           `<div class="sec-conteudo">${parasHtml(d.relatorio)}</div></details>`;
    }
  }

  // Voto
  if (d.voto) {
    if (incVoto) {
      h += '<div class="sec">Voto</div>' + parasHtml(d.voto);
    } else {
      h += `<details><summary>⚖️ Ver Voto</summary>` +
           `<div class="sec-conteudo">${parasHtml(d.voto)}</div></details>`;
    }
  }

  // Acórdão — apenas o miolo (parágrafo "Decide…")
  if (d.acordao) {
    h += '<div class="sec">Acórdão</div>';
    h += extrairMioloAcordao(d.acordao);
  }

  // Resultado
  h += '<div class="sec">Resultado</div>';
  h += `<span class="badge-resultado ${d.css}">${esc(d.resultado)}</span>`;
  h += '</div>';
  return h;
}

// ── Seleção de chamadas para exportação ──────────────────────
const SELECIONADAS = new Set(DECISOES.map((_, i) => i)); // todas marcadas por padrão

function toggleSel(idx, ev) {
  ev.stopPropagation();
  if (SELECIONADAS.has(idx)) SELECIONADAS.delete(idx);
  else SELECIONADAS.add(idx);
  atualizarContSel();
}
function toggleAll(marcar) {
  getFiltrados().forEach(item => {
    if (marcar) SELECIONADAS.add(item.idxGlobal);
    else SELECIONADAS.delete(item.idxGlobal);
  });
  renderLista(document.getElementById('busca').value);
}
function atualizarContSel() {
  const el = document.getElementById('sel-count');
  if (!el) return;
  const filtrados  = getFiltrados();
  const selCount   = filtrados.filter(item => SELECIONADAS.has(item.idxGlobal)).length;
  el.textContent   = selCount + '/' + filtrados.length;
}
function getExportList() {
  const filtrados = getFiltrados();
  const sel = filtrados.filter(item => SELECIONADAS.has(item.idxGlobal));
  if (sel.length) return sel.map(item => ({ d: item.d, num: item.num }));
  // fallback: se nada marcado, exporta a decisão ativa
  if (IDX_ATIVO >= 0) {
    const item = filtrados.find(x => x.idxGlobal === IDX_ATIVO);
    if (item) return [{ d: item.d, num: item.num }];
  }
  return [];
}

// ── Lista ─────────────────────────────────────────────────────
function renderLista(filtro) {
  const lista    = document.getElementById('lista');
  const contador = document.getElementById('contador');
  const q        = (filtro || '').toLowerCase().trim();
  const base     = getFiltrados();
  const visiveis = base.filter(item =>
    !q || (item.d.cnj + ' ' + item.d.assessor + ' ' + item.d.ementa + ' ' + item.d.cab)
          .toLowerCase().includes(q)
  );
  contador.textContent = visiveis.length + ' de ' + base.length + ' decisão(ões)';
  lista.innerHTML = visiveis.map(item => {
    const { d, idxGlobal, num } = item;
    const numStr = String(num).padStart(2, '0');
    const chk    = SELECIONADAS.has(idxGlobal) ? 'checked' : '';
    return `<div class="item-lista${idxGlobal === IDX_ATIVO ? ' ativo' : ''}"
                onclick="abrirDecisao(${idxGlobal})">
      <div class="item-cnj">
        <input type="checkbox" class="item-chk" ${chk} onclick="toggleSel(${idxGlobal},event)">
        Chamada ${numStr} · ${esc(d.cnj || d.nome)}
      </div>
      <div class="item-cab">${esc(d.cab)}</div>
      <div class="item-meta">
        ${d.assessor ? `<span>${esc(d.assessor)}</span>` : ''}
        ${d.data     ? `<span>${esc(d.data)}</span>`     : ''}
        <span class="bdg ${d.css}">${esc(d.resultado)}</span>
      </div>
    </div>`;
  }).join('');
  atualizarContSel();
}

// ── Abrir decisão (toggle fix) ────────────────────────────────
function abrirDecisao(idxGlobal) {
  IDX_ATIVO = idxGlobal;
  const d    = DECISOES[idxGlobal];
  // Descobre o número sequencial deste item no filtro atual
  const item = getFiltrados().find(x => x.idxGlobal === idxGlobal);
  const num  = item ? item.num : idxGlobal + 1;

  document.getElementById('estado-vazio').style.display = 'none';
  const cont = document.getElementById('conteudo-decisao');
  cont.style.display = 'block';

  // Preserva estado atual dos controles antes de reescrever innerHTML
  const opts = {
    incComent:   document.getElementById('chk-coment')  ?.checked ?? true,
    incAssessor: document.getElementById('chk-assessor')?.checked ?? true,
    incRel:      document.getElementById('chk-rel')     ?.checked ?? false,
    incVoto:     document.getElementById('chk-voto')    ?.checked ?? false,
  };
  cont.innerHTML = barraExport(opts) + renderDecisao(d, opts, num);
  renderLista(document.getElementById('busca').value);
  cont.scrollTop = 0;
}

// ── Barra de exportação (toggle fix) ─────────────────────────
function barraExport(opts) {
  const chkC  = (opts && opts.incComent   !== false) ? 'checked' : '';
  const chkA  = (opts && opts.incAssessor !== false) ? 'checked' : '';
  const chkR  = (opts && opts.incRel      === true)  ? 'checked' : '';
  const chkV  = (opts && opts.incVoto     === true)  ? 'checked' : '';
  return `<div id="barra-export">
    <label><input type="checkbox" id="chk-coment"   ${chkC} onchange="rerender()"> Obs. Desembargador</label>
    <label><input type="checkbox" id="chk-assessor" ${chkA} onchange="rerender()"> Assessor</label>
    <label><input type="checkbox" id="chk-rel"      ${chkR} onchange="rerender()"> Relatório</label>
    <label><input type="checkbox" id="chk-voto"     ${chkV} onchange="rerender()"> Voto</label>
    <button class="btn-html" onclick="exportar('html')">⬇ HTML</button>
    <button class="btn-pdf"  onclick="exportar('pdf')">⬇ PDF</button>
    <button class="btn-docx" onclick="exportar('docx')">⬇ DOCX</button>
  </div>`;
}

function rerender() {
  if (IDX_ATIVO >= 0) abrirDecisao(IDX_ATIVO);
}

// ── Helpers de exportação ─────────────────────────────────────
function getExportFilename(ext) {
  const list = getExportList();
  if (list.length === 1) return `ementa_${list[0].d.cnj || 'decisao'}.${ext}`;
  return `ementas_${list.length}_chamadas.${ext}`;
}

function buildCorpo(list, opts) {
  return list.map(item => renderDecisao(item.d, opts, item.num)).join('\n<hr>\n');
}

function getExportOpts() {
  return {
    incComent:   document.getElementById('chk-coment').checked,
    incAssessor: document.getElementById('chk-assessor').checked,
    incRel:      document.getElementById('chk-rel').checked,
    incVoto:     document.getElementById('chk-voto').checked,
  };
}

// ── Exportação unificada ─────────────────────────────────────
function exportar(tipo) {
  const list = getExportList();
  if (!list.length) { alert('Nenhuma chamada selecionada.'); return; }
  const optsBase = getExportOpts();
  const titulo   = document.title;

  if (tipo === 'html') {
    const corpo = buildCorpo(list, optsBase);
    const html = `<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>${esc(titulo)}</title>
<style>${CSS_EXPORT}</style></head><body>
<h1>${esc(titulo)}</h1>
${corpo}
</body></html>`;
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = getExportFilename('html');
    a.click();

  } else if (tipo === 'pdf') {
    const corpo = buildCorpo(list, optsBase);
    const printHtml = `<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>${esc(titulo)}</title>
<style>
@page { margin: 2cm; }
${CSS_EXPORT}
</style></head><body>
${corpo}
</body></html>`;
    const win = window.open('', '_blank');
    if (!win) { alert('Permita pop-ups para exportar PDF.'); return; }
    win.document.write(printHtml);
    win.document.close();
    setTimeout(() => { win.print(); }, 400);

  } else if (tipo === 'docx') {
    // DOCX: apenas ementa e acórdão (sem relatório e voto)
    const opts = { ...optsBase, incRel: false, incVoto: false };
    const corpo = buildCorpo(list, opts);
    const docCss = `body{font-family:"Times New Roman",Times,serif;font-size:12pt;color:#111;line-height:1.7;margin:2cm}
h1{font-size:14pt;color:#1a237e;border-bottom:2pt solid #1a237e;padding-bottom:6pt;margin-bottom:18pt}
.chamada{font-size:9pt;font-family:"Segoe UI",Arial,sans-serif;text-transform:uppercase;
letter-spacing:1pt;color:#fff;background:#1a237e;padding:2pt 8pt;font-weight:bold}
.decisao{border:1pt solid #ccc;padding:18pt 24pt;margin-bottom:28pt;page-break-inside:avoid}
.cab-decisao{font-size:12pt;font-weight:bold;color:#1a237e;margin-bottom:8pt;font-family:"Segoe UI",Arial,sans-serif}
table.meta{width:100%;border-collapse:collapse;margin-bottom:14pt;font-family:"Segoe UI",Arial,sans-serif;font-size:10pt}
table.meta td{padding:4pt 8pt;border:1pt solid #d0d7de;vertical-align:top}
table.meta td.r{background:#e8eaf6;color:#1a237e;font-weight:bold;white-space:nowrap}
table.meta td.v{background:#f8f9fa}
.coment{background:#fff8e1;border-left:3pt solid #f9a825;padding:8pt 12pt;margin-bottom:12pt;
font-family:"Segoe UI",Arial,sans-serif;font-size:10pt;color:#333}
.coment strong{color:#e65100;font-size:9pt;display:block;margin-bottom:3pt;text-transform:uppercase}
.sec{font-size:9pt;font-family:"Segoe UI",Arial,sans-serif;text-transform:uppercase;letter-spacing:1pt;
color:#666;border-left:3pt solid #1a237e;padding-left:6pt;margin:16pt 0 6pt 0}
p{text-align:justify;margin:0 0 4pt 0}p.verb{font-weight:bold;text-transform:uppercase;margin-bottom:8pt}
p.item{margin-bottom:6pt}p.ac{margin-bottom:4pt}
.badge-resultado{display:inline-block;padding:3pt 10pt;font-weight:bold;font-size:10pt;
font-family:"Segoe UI",Arial,sans-serif;margin-top:4pt;border:1pt solid}
.badge-resultado.provido{background:#e8f5e9;color:#2e7d32;border-color:#2e7d32}
.badge-resultado.parcial{background:#fff3e0;color:#e65100;border-color:#e65100}
.badge-resultado.nao-provido{background:#fce4ec;color:#c62828;border-color:#c62828}
.badge-resultado.outro{background:#e3f2fd;color:#1565c0;border-color:#1565c0}
hr{border:none;border-top:1pt dashed #999;margin:24pt 0}`;
    const docHtml = `<html xmlns:o="urn:schemas-microsoft-com:office:office"
xmlns:w="urn:schemas-microsoft-com:office:word"
xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="UTF-8">
<meta name="ProgId" content="Word.Document">
<meta name="Generator" content="Microsoft Word 15">
<!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View>
<w:Zoom>100</w:Zoom><w:DoNotOptimizeForBrowser/></w:WordDocument></xml><![endif]-->
<style>${docCss}</style></head><body>
<h1>${esc(titulo)}</h1>
${corpo}
</body></html>`;
    const blob = new Blob(['\ufeff' + docHtml], { type: 'application/msword' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = getExportFilename('doc');
    a.click();
  }
}

// Sincroniza o select com o filtro inicial vindo do Python
(function() {
  const sel = document.getElementById('filtro-tipo');
  if (sel) sel.value = FILTRO_TIPO;
  // Marca como selecionados apenas os itens do filtro inicial
  SELECIONADAS.clear();
  getFiltrados().forEach(item => SELECIONADAS.add(item.idxGlobal));
})();
renderLista('');
if (DECISOES.length > 0) {
  const first = getFiltrados()[0];
  if (first) abrirDecisao(first.idxGlobal);
}
document.getElementById('busca').addEventListener('input', e => renderLista(e.target.value));
</script>
